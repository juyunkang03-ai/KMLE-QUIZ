있습니다. 응급실에서 시행한 혈액검사, 가슴 X선 사진, 심전도에서 이상이 없었으며, 지난 1개월 동안 이와 유사한 증상이 있었으나, 모두 수분 내에 회복되었으므로 다른 전신질환의 가능성은 떨어집니다. 치료로는 benzodiazepine을 사용할 수 있으며, 보기 중에는 알프라졸람이 가능합니다."}, {"major": "불안장애", "minor": "공황장애 및 광장공포증", "qnum": "13", "question": "25세 여자가 숨쉬기가 힘들다며 병원에 왔다. 2개월 전 비행기 안에서 호흡곤란, 어지러움, 가슴 통증이 발생한 후 파록세틴을 꾸준히 복용하고 괜찮아졌다. 3일 전 버스 안에서 호흡곤란이 다시 시작된 것 같아 걱정을 하고 있다. 혈액검사와 심전도에서 이상이 없으니 안심하고 복식 호흡 훈련을 자주하고 파록세틴을 계속 복용하라고 하였다. 그러나 다음 주에 당장 해외 출장이 있어 비행기를 타야한다며 추가 약물을 요청하였다. 치료는?", "textbox": "", "images": [], "options": ["졸피뎀", "벤라팍신", "부스피론", "부프로피온", "알프라졸람"], "answer": 4, "explanation": "환자의 병력을 살펴보았을 때 공황장애가 가장 의심됩니다. 현재 환자는 유지치료로 SSRI를 복용하고 있고, 급성발작을 위한 추가처방을 묻고 있습니다. 따라서 답은 BZD계열인 알프라졸람이 되겠습니다. 공황장애의 주된 약물치료는 항우울증약 및 비정형 항정신약이며, 급성기 치료제는 Benzodiazepine입니다. 주요우울장애의 치료파트에서 SSRI가 작용까지 시간이 걸린다는 점을 기억하시면 이해하기 쉽겠습니다."}, {"major": "불안장애", "minor": "공황장애 및 광장공포증", "qnum": "14", "question": "30세 여자가 지하철에서 갑자기 가슴이 두근거리며 숨이 막히고 죽을 것 같은 공포감이 들어 응급실에 왔다. 임신 8주였으며 심전도 및 혈액검사에서 이상 소견은 없었다. 3개월 전부터 지하철이나 버스를 타면 비슷한 증상이 자주 나타나 외출을 꺼렸다고 한다. 치료는?", "textbox": "", "images": [], "options": ["환기", "습관반전훈련", "체계적 탈감작", "노출과 반응방지", "안구운동탈민감재처리"], "answer": 2, "explanation": "공황장애 증례입니다. 치료로는 체계적 탈감작법을 사용할 수 있겠습니다."}, {"major": "불안장애", "minor": "공황장애 및 광장공포증", "qnum": "15", "question": "다음 열거한 불안장애와 그 치료법이 바르게 연결된 것은?", "textbox": "가. 광장공포증 — 인지행동치료\n나. 범불안장애 — 통찰정신치료\n다. 공황장애 — 인지행동치료\n라. 강박장애 — 통찰정신치료", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 1, "explanation": "가, 다. 정신치료적 방법으로 환자상태에 따라 분석적 내지 지지적 치료, 가족치료, 행동치료 및 인지치료 등이 단독으로 또는 약물치료와 같이 종합적으로 사용됩니다. 나. 분석적이거나 지지적 정신치료를 시행합니다. 통찰지향 정신치료는 무의식적 갈등을 밝히고 자아의 능력을 확인하는 것입니다. 라. 정신치료는 최근 사용되는 빈도가 줄어들고 있으나 한다면 지지적이나 분석적 정신치료를 시도합니다. cf. 분석적 정신치료 ① 표현형 ⊃ 통찰지향 ② 지지적"}, {"major": "불안장애", "minor": "특정 공포증 및 사회불안장애", "qnum": "01", "question": "23세 남자가 불안하다며 병원에 왔다. 대학생으로 이번 학기부터 원어민 강사의 영어회화 수업에 참여했다. 강의시간마다 모든 학생이 발표하는데, 자신의 차례가 되면 가슴이 심하게 두근거리고 식은땀이 나며, 목소리가 떨려 발표를 제대로 못 했다. 최근에는 영어회화 수업시간에 4번이나 결석을 하였다. 다음 주에는 영어로 발표하는 시험이 예정되어 있는데 그 생각만 하면 너무 불안해진다. 중학교 2학년 때 발표를 하다가 창피를 당한 이후로 발표할 때면 심하게 긴장했다. 다른 과목 수업을 듣는 데는 전혀 문제가 없다고 한다. 치료는?", "textbox": "", "images": [], "options": ["언어치료", "감각통합훈련", "습관역전훈련", "인지행동치료", "안구운동탈민감재처리"], "answer": 3, "explanation": "발표 차례가 되면 가슴이 심하게 두근거리고 식은땀이 나며, 목소리가 떨리고, 긴장하는 등 사회적 활동, 타인의 주목을 받는 상황에 대해 두려움과 불안함을 보이고 있습니다. 또한 4번이나 결석하면서 대상이 되는 상황을 회피하기도 합니다. 이를 보아 사회불안장애로 진단할 수 있으며, 선지 중 할 수 있는 치료로는 인지행동치료가 있습니다. 인지행동치료는 왜곡된 비적응적 인지와 관련된 행동장애를 경험적으로 교정하고 더 나은 인지행동의 기술을 습득하도록 돕는 것입니다."}, {"major": "불안장애", "minor": "특정 공포증 및 사회불안장애", "qnum": "02", "question": "25세 남자가 타인과의 만남을 어려워하고 공중 화장실에서 소변을 보는 것이 힘들다는 것을 주소로 내원하였다. 의심되는 장애에 관한 다음 설명 중 옳은 것은?", "textbox": "", "images": [], "options": ["호발연령은 30대 후반이다.", "어린 시절 부모의 과잉보호와 관련이 있다.", "예기불안이 없는 것이 특징이다.", "정신분석적 정신치료가 효과적이다.", "약물로는 carbamazepine이 효과적이다."], "answer": 1, "explanation": "사회공포증의 증상 : 무대공포, 타인과의 접촉, 공공장소에서 먹고 마시거나 공중화장실에서 소변보기가 힘든 것 등\n1) 대개 10대부터 발병 : 사회적 활동이 증가하기 시작하는 시기에 발현\n2) 어릴 때부터 체질적으로 부끄럼이 많고, 행동억제의 소질, 부모의 과잉보호가 있기도 합니다.\n3) 예기불안이 있는 경우가 대부분입니다. 진단 기준에도 언급되어 있습니다.\n4) 인지치료/행동치료가 우선됩니다. 분석적 치료에서는 공포증이 잘 호전되지 않는다고 합니다.\n5) SSRI, MAOI, 벤조디아제핀"}, {"major": "불안장애", "minor": "특정 공포증 및 사회불안장애", "qnum": "03", "question": "37세 남자가 많은 사람들 앞에서 발표할 때마다 심한 불안을 느낀다고 왔다. 2일 후에 직장에서 중요한 발표를 할 예정이다. 발표 전에 복용할 적절한 약물은?", "textbox": "", "images": [], "options": ["부스피론(buspirone)", "퀘티아핀(quetiapine)", "아리피프라졸(aripiprazole)", "프로프라놀롤(propranolol)", "에스시탈로프람(escitalopram)"], "answer": 3, "explanation": "타인 앞에서 행동하는 발표에 대해서 심한 불안을 느끼고 있습니다. 이는 사회불안장애(사회공포증)에 해당합니다. 그 중에서 무대공포증을 보이고 있기 때문에 베타차단제인 propranolol을 사용해볼 수 있겠습니다. 사회불안장애에는 SSRI나 benzodiazepine, buspirone 등이 사용되나 무대공포에 대해서는 베타차단제를 사용하는 것을 알아두시기 바랍니다."}, {"major": "불안장애", "minor": "특정 공포증 및 사회불안장애", "qnum": "04", "question": "27세 남자가 공중화장실에서 소변을 보기 힘들다고 하였다. 사람의 시선을 의식하면 온몸이 긴장되고 소변이 나오지 않아서 대변을 보는 곳에서 해결해 왔다고 하였다. 이러한 증상 때문에 공공장소에 외출하기가 불편한 것 이외에 나머지 일상생활에서는 문제가 없다고 하였다. 비뇨기과 진료에서 이상소견은 없었다. 진단은?", "textbox": "", "images": [], "options": ["강박장애", "범불안장애", "사회공포증", "주요우울장애", "회피성인격장애"], "answer": 2, "explanation": "낯선 환경에서 사회적 또는 수행적 상황이 발생하면 공포를 느끼는 사회공포증 증례입니다. 사회공포증 환자는 사람들 앞에서 연설하거나, 타인 앞에서 글을 쓰거나, 심지어 본 증례와 같이 공중 화장실을 사용하거나 공공장소에서 음식을 먹는 상황에서도 불안을 경험할 수 있습니다.1) 강박장애에서는 자신의 의지와 무관한 불필요한 사고나 행동이 반복되는 특징적 양상이 있습니다.2) 범불안장애에서는 불안이 특정 대상에 국한되지 않습니다.5) 회피성(avoidant) 성격장애와의 감별은 어려운 경우가 많고, 실제로 두 병이 동반되는 경우도 많습니다. 회피성성격장애는 확고한 보장이 없는 한 대인관계를 회피하며, 거절과 배척에 대한 극도의 예민성을 보이며, 사회적 위축이 있으나, 내적으로는 친밀한 관계를 원하는 것이 특징입니다. 이 경우 대인관계에 대한 언급은 없으므로 사회공포증이 맞겠습니다."}, {"major": "불안장애", "minor": "특정 공포증 및 사회불안장애", "qnum": "05", "question": "시골로 전학을 간 10세 남아가 비둘기가 무서워 학교가기를 거부하였다. 아이는 비둘기의 깃털이 징그럽고 자신에게 달려들까봐 무서워 학교를 가기 싫다고 다른 학교로 전학시켜 달라고 했다. 담임선생님과 또래 친구들과의 관계는 원만하였다. 진단은?", "textbox": "", "images": [], "options": ["특정 공포증", "광장공포증", "분리불안장애", "급성스트레스장애", "외상후스트레스장애"], "answer": 0, "explanation": "특정한 대상이나 상황에 대하여 강력하고 지속적인 두려움을 갖고 이를 피하는 것 → 특정 공포증으로 진단할 수 있습니다.이 환아의 경우 대상이 쉽게 마주칠 수 있는 비둘기이므로 일상생활에 심각한 지장을 초래하고 예후가 나쁜 편에 속합니다."}, {"major": "불안장애", "minor": "특정 공포증 및 사회불안장애", "qnum": "06", "question": "22세 남자가 집에 혼자만 있고 사회생활에는 전혀 관심을 갖지 않아 병원을 방문하였다. 어려서부터 수줍음이 많고 내성적인 성격이었다. 고등학교 음악시간에 노래를 부르다가 목소리가 떨리고 얼굴이 붉어진다고 수군거리는 친구들의 이야기를 듣고 다른 사람들 앞에서 이야기하기가 두려워졌다고 하였다. 진단은?", "textbox": "", "images": [], "options": ["광장공포증", "특정 공포증", "사회공포증", "범불안장애", "외상후스트레스장애"], "answer": 2, "explanation": "타인으로부터 심사받을 수 있는 사회적 상황, 일을 수행해야 하는 상황에 대한 현저하고 지속적인 공포 → 사회공포증으로 진단할 수 있겠습니다."}, {"major": "불안장애", "minor": "특정 공포증 및 사회불안장애", "qnum": "07", "question": "27세 여자가 출근하는 것이 두렵다며 병원에 왔다. 1개월 전에 사무직에서 영업직으로 부서를 이동한 후에 낯선 사람 앞에서 발표하는 업무가 잦아지면서 두려움이 심해졌다. 대학생 시절부터 사람들과 대화하거나 낯선 사람을 만나게 되는 상황에서 얼굴이 붉어지고 땀을 흘리며 말을 더듬거렸다. 윗사람이나 동료로부터 나쁜 평가를 받게 될 것을 염려하며 서 계속 두려워했다. 치료는?", "textbox": "", "images": [], "options": ["인지재활", "작업치료", "감각집중훈련", "인지적재구성", "현실지남력훈련"], "answer": 3, "explanation": "낯선 사람 앞에서 발표를 두려워하며, 대학생 시절부터 사람들과의 대화 및 낯선 사람과의 대면 등 사회적 활동에 의해 공포와 불안 증상을 보이고 있습니다. 종합해 볼 때 사회불안장애를 의심해 볼 수 있으며, 사회불안장애의 정신사회적 치료로 인지행동치료를 시행할 수 있습니다. 인지행동치료는 왜곡된 비적응적 인지와 관련된 행동장애를 경험적으로 교정하고, 더 나은 인지행동의 기술을 습득하도록 돕는 것입니다.1) 인지재활은 신경인지장애(치매, 뇌졸중, 두부외상 등)에 대한 비약물적 인지교정 기법을 말합니다."}, {"major": "불안장애", "minor": "특정 공포증 및 사회불안장애", "qnum": "08", "question": "25세 여자가 남자들과 대화하거나 여러 사람 앞에서 발표할 때 심하게 불안하다며 병원에 왔다. 엄한 부모 밑에서 자라 어려서부터 긴장감이 높았고, 4년 전 동아리에서 성추행을 당한 이후 이런 증상이 시작되었는데, 점점 심해져 최근에는 대중음식점에서도 손이 떨리고 가슴이 두근거려 식사를 할 수 없다고 한다. 2개월 후에는 취업을 위해 면접시험을 보아야 하는데, 이번에는 꼭 합격하기를 바란다고 말한다. 치료는?", "textbox": "", "images": [], "options": ["인지행동치료", "정신분석", "감각통합훈련", "가족치료", "성치료"], "answer": 0, "explanation": "타인과 대화하거나 발표하는 상황에서 심한 불안을 느끼며, 이로 인해 실생활기능수행에 장애를 겪는 것으로 보아 사회불안장애를 의심할 수 있는 증례입니다. 행동치료나 인지행동치료가 흔히 시행됩니다."}, {"major": "불안장애", "minor": "특정 공포증 및 사회불안장애", "qnum": "09", "question": "어려서부터 유난히 수줍음이 많았던 24세 여자가 초등학교 교사로 처음 부임하였다. 수업시간 중 얼굴이 붉어지고 칠판에 글씨를 쓰거나 책을 읽을 때 땀이 많이 나고 떨리고 가슴이 두근거렸다. 이 환자에게 도움을 줄 수 있는 치료는?", "textbox": "가. SSRI\n나. 인지행동치료\n다. MAOI\n라. 정신분석적 정신치료", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 0, "explanation": "타인으로부터 심사받을 수 있는 사회적 상황, 일을 수행해야 하는 상황에 대한 현저하고 지속적인 공포 → 사회공포증① 약물치료 : SSRI, MAOI, 벤조디아제핀② 정신사회적 치료 : 인지행동치료 및 biofeedback(정신분석적 정신치료의 대상은 제한됨)"}, {"major": "불안장애", "minor": "특정 공포증 및 사회불안장애", "qnum": "10", "question": "17세 여자 고등학생이 수업 중 책을 읽다가 갑자기 얼굴이 붉어지고 땀이 나면서 가슴이 두근거렸다. 이후 다른 사람 앞에 나서는 일을 회피하고 누군가와 대화해도 얼굴이 붉어지고 식은땀이 나 부모와 함께 정신과 외래를 방문하였다. 가장 의심되는 진단에 대한 설명으로 옳은 것은?", "textbox": "가. 증상 발현 후에는 긴장감이 완화된다.\n나. 정상 발달 과정에서도 나타날 수 있다.\n다. 약물치료는 도움이 되지 않는다.\n라. 인지행동 치료가 효과적이다.", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 2, "explanation": "가. 증상 발현은 더더욱 두려움을 강화시키는 악순환을 반복하다 결국 대인관계의 위축으로 빠지게 됩니다.\n나. 소아의 단순공포증은 대개 정상적이며 저절로 소실되기도 합니다.\n다. MAOI, SSRI, BZD 등이 사용됩니다.\n라. 인지행동치료가 가장 주된 정신사회적 치료입니다."}, {"major": "불안장애", "minor": "범불안장애", "qnum": "01", "question": "42세 여자가 불안하다며 병원에 왔다. 3년 전부터 별다른 이유 없이 초조하고 긴장하고 걱정하면서 잠을 못 자서, 피로감이 심해졌다. 3개월 전부터 짜증이 나고 집중력이 떨어져서 직장업무를 수행하는 데 어려움이 있다고 한다. 치료 약물은?", "textbox": "", "images": [], "options": ["둘록세틴", "벤즈트로핀", "아토목세틴", "옥스카바제핀", "메틸페니데이트"], "answer": 0, "explanation": "42세 여성이 불안을 주소로 내원하였습니다. 3년 전부터 별다른 이유없이 과도한 불안과 걱정이 지속되었고, 쉽게 짜증남, 수면장애, 집중력 저하, 긴장 및 초조한 증상을 보이고 있기 때문에 범불안장애의 진단 기준에 부합합니다. 그 외 다른 불안장애나 내과적 원인에 대한 증거를 찾을 수 없기 때문에 범불안장애가 가장 적절한 진단입니다. 범불안장애의 일차치료제는 SSRI(파록세틴, 에스시탈로프람)과 SNRI(둘록세틴, 벤라팍신)입니다. 따라서 가장 적절한 치료 약물은 둘록세틴입니다."}, {"major": "불안장애", "minor": "범불안장애", "qnum": "02", "question": "38세 여자가 6개월 전부터 거의 매일 사소한 일에도 과도하게 예민해지며 병원에 왔다. 20대부터 걱정이 많았고 2년 전부터 심해져서 일상 업무를 제대로 수행하지 못했다. 일하는 동안에 아들이 사고를 당하면 어떻게 하나 염려가 되어, 수시로 어린이집에 연락을 해서 직장업무에 집중하지 못했다. 퇴근 후 집에 돌아와서는 오히려 직장업무에 대한 걱정이 심해져서 잠들지 못했다. 비약물 치료는?", "textbox": "", "images": [], "options": ["인지왜곡의 교정", "신경인지결손의 회복", "정신적 외상의 재처리", "공포유발자극의 둔감화", "혐오자극과 문제행동의 짝 지움"], "answer": 0, "explanation": "6개월 이상 지속되는 과도한 불안과 걱정이 있으며 걱정을 조절하기 어려운 상태입니다. 쉽게 예민해지고 집중이 어려운 모습을 보이며, 수면장애 증상을 보이고 있습니다. 범불안장애로 진단 가능하고 비약물적 치료로는 분석적, 지지적 정신치료와 인지행동 치료가 가능합니다. 이 중 인지치료는 환자의 인지적 왜곡을 다루면서 환자에게 인지적 대응전략을 가르치는 것입니다. 행동치료는 이완과 생체되먹임 등이 있습니다. 이들을 통합한 것이 인지행동 치료입니다."}, {"major": "불안장애", "minor": "범불안장애", "qnum": "03", "question": "37세 여자가 머리가 아프다며 병원에 왔다. 1년 전부터 유치원에 보낸 아이에게 무슨 일이 생길까 봐 신경을 쓰면서 두통이 심해졌고 목과 어깨가 늘 뭉쳐있다고 한다. 수시로 유치원에 전화를 하는데도 마음이 놓이지 않았고, 집중력이 떨어져 회사에서 실수가 잦아졌다고 한다. 사소한 일에도 걱정이 많았으며 짜증이 많이 나고 쉽게 피로감을 느낀다. 치료는?", "textbox": "", "images": [], "options": ["벤라팍신", "라모트리진", "아리피프라졸", "프로프라놀롤", "아세트아미노펜"], "answer": 0, "explanation": "6개월 이상 지속되는 과도한 불안감이 있으며 근육 긴장, 쉽게 짜증냄, 피로함 등의 증상이 함께 나타나고 있습니다. 범불안장애로 진단 가능하고 약물치료로는 벤조디아제핀, 부스피론, SSRI, 벤라팍신 등을 사용할 수 있습니다. 베타차단제는 불안의 말초증상(예: 손떨림)을 감소시키기 위해 사용할 수 있습니다."}, {"major": "불안장애", "minor": "범불안장애", "qnum": "04", "question": "매사에 걱정이 많고 불안해하여 35세 여자가 정신과 외래를 방문하였다. 10대 후반부터 아무 이유 없이 불안해하고 안절부절 못하며 피로, 불면을 호소하였다. 최근에는 컴퓨터 문서작성 실기시험에 지각할까봐 걱정이 많았다. 진단은?", "textbox": "", "images": [], "options": ["강박장애", "적응장애", "사회공포증", "범불안장애", "급성스트레스장애"], "answer": 3, "explanation": "불안한 느낌이 과도하게, 광범위하게, 다양한 신체증상을 동반하여 지속되는 상태. 근거 없는(특정 대상이 없는) 부유불안(부동성 불안, free-floating anxiety), 자율신경과민, 공황발작은 없는 것이 공황장애와의 차이입니다."}, {"major": "불안장애", "minor": "범불안장애", "qnum": "05", "question": "50세 여자가 20대부터 사소한 일에도 신경을 쓰고 걱정을 많이 했다. 스스로 마음을 가라앉히려 했으나 소용이 없었다. 평소 머리가 아팠고 불면증을 호소했으며 자주 피곤해했다. 여러 병원에서 검사를 받았지만 이상은 없었다. 진단은?", "textbox": "", "images": [], "options": ["강박장애", "건강염려증", "단순공포증", "범불안장애", "신체화장애"], "answer": 3, "explanation": "스스로 조절이 안 되는 지나친 걱정과 불안 증상이 6개월 이상 지속 + 안절부절못함, 피로감, 근육의 긴장, 과민함, 집중이 안 됨, 수면 장애 중 적어도 3가지 이상을 만족하므로 범불안장애로 진단할 수 있습니다.\n2) 건강염려증이 범불안장애와 합병될 수도 있지만, 본 환자는 질병에 걸리는 것에 불두려워하지 않기 때문에 이 경우는 건강염려증으로 진단할 수 없습니다. 건강염려증은 DSM-5에서 질병불안장애로 통합되었습니다.\n5) 신체화장애가 범불안장애와 합병될 수 있으나 여러 다양한 증상을 호소해야 합니다. 참고로 신체화장애는 DSM-5에서 신체증상장애로 통합되었습니다."}, {"major": "불안장애", "minor": "범불안장애", "qnum": "06", "question": "2년 전부터 매사에 불안해하고 초조해하며, 가슴이 두근거리고 안절부절 못해 28세 여자가 내원하였다. 환자는 입이 마르고 소변을 자주 보며 소화불량과 상복부 불편감을 호소하였다. 이 환자에게 도움이 될 수 있는 치료는?", "textbox": "가. β-blocker\n나. Benzodiazepine\n다. Biofeedback\n라. Buspirone", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 4, "explanation": "범불안장애의 치료\n가. 베타차단제는 불안의 비운동성증상을 감소시키는 데 사용할 수 있습니다.\n나. BZD은 효과가 빨라 투약 첫날부터 증상의 완화를 경험하는 경우도 있습니다.\n다. 인지행동치료 : 환자가 자신의 불합리한 인지과정을 깨닫고 이를 긍정적인 방향으로 돌리도록 도와주는 치료로, 이완요법이나 biofeedback이 흔히 이용됩니다.\n라. Buspirone은 치료효과는 BZD과 비슷하여 60~80% 정도의 환자가 도움을 받습니다."}, {"major": "강박 및 관련장애", "minor": "강박장애", "qnum": "01", "question": "26세 남자가 너무 불안하다며 어머니와 함께 병원에 왔다. 4년 전부터 자신이 도로 하수구에 빠질까 봐 두려워하고 자신의 실수로 행인들이 하수구에 빠질 것을 걱정해서 하수구 뚜껑을 확인하는 행동을 반복하였다. 행인들이 하수구에 빠질 가능성이 거의 없다는 것을 알면서도 뚜껑을 확인하지 않으면 다른 일을 할 수 없었다. 심지어는 하수구 뚜껑을 열어 확인하고 뚜껑을 제대로 닫지 않은 것 같은 두려움에 어머니에게 함께 가서 확인하자고 요구한다. 행동치료는?", "textbox": "", "images": [], "options": ["혐오치료", "습관반전치료", "자기주장훈련", "노출과 반응억제", "안구운동민감소실"], "answer": 3, "explanation": "26세 남성이 불안을 주소로 내원하였습니다. 자신이 하수구에 빠지거나 자신의 실수로 행인들이 하수구에 빠질 것을 걱정하고 있는데, 이는 다소 비현실적 공포로서 일반적으로 현실적/구체적 불안이 존재하는 불안장애보다는 강박장애를 시사합니다. 또한 현실적으로 그러한 사건이 발생할 가능성이 거의 없다는 것을 인지하고 있음에도 뚜껑을 반복적으로 확인하는 것은 강박장애에서 전형적으로 나타나는 확인 강박행동이고, 현재 하수구 뚜껑에 대한 공포와 강박행동이 생활에 장애를 초래하고 있기 때문에 강박장애로 진단할 수 있습니다. 강박장애의 치료는 약물치료(SSRI)와 행동치료입니다. 강박장애에서 행동치료는 약물치료만큼이나 효과가 있고 지속성이 더 좋다는 보고가 있는데요, 대표적으로 환자가 두려워하는 자극에 노출시키고 강박행동을 억제하는 노출과 반응방지 기법이 사용됩니다. 따라서 가장 적절한 치료는 노출과 반응억제입니다."}, {"major": "강박 및 관련장애", "minor": "강박장애", "qnum": "02", "question": "17세 여자 고등학생이 하루에도 수차례 손을 씻고 가족들이 자신의 방에 있는 물건을 만져 오염시킬까봐 방에 출입하지 못하게 하였다. 이 환자에서 가장 의심되는 정신장애에 대한 설명으로 옳은 것은?", "textbox": "", "images": [], "options": ["여자에서 2배 더 흔하다.", "우울증이 흔히 동반된다.", "증상에 대한 병식이 없다.", "주된 방어기제는 투사와 부정이다.", "급성 발병과 호전이 반복되는 양상이다."], "answer": 1, "explanation": "1) 남녀 비는 비슷(청소년기에는 남자가 많음)2) 2/3에서 주요우울증 동반3) 병식이 있다(ego-dystonic).4) 투사, 부정,을 주된 방어기제로 사용하는 것은 망상장애강박장애에 반동형성, 취소, 격리를 사용반동 형성만이 강박장애와 망상장애에서 공통으로 사용되는 방어기제입니다.5) 만성 경과를 밟으며 약물/행동치료"}, {"major": "강박 및 관련장애", "minor": "강박장애", "qnum": "03", "question": "36세 여자가 성적인 생각이 자꾸 떠올라 생각을 하지 않으려고 노력하지만 자꾸 떠오른다. 이 환자에서 불안을 유발하는 자극을 주지 않고 치료할 수 있는 방법은?", "textbox": "", "images": [], "options": ["홍수법", "상상적 노출", "점진적 노출", "사고 중지법", "체계적 민감 소실"], "answer": 3, "explanation": "사고 중지법은 강박적 사고가 주 증상인 환자에게 적용할 수 있는데, 불안 유발 자극을 주지 않고 치료할 수 있지만, 오히려 역으로 불안이 증가하는 효과가 나타날 수도 있습니다."}, {"major": "강박 및 관련장애", "minor": "강박장애", "qnum": "04", "question": "44세 남자가 불안하다하며 병원에 왔다. 15년 전부터 자신이 다른 사람의 물건을 훔치지 않을까 늘 불안해했다. 자신이 남의 물건에 손대지 않았다는 것을 늘 확인해야 했으며, 외출할 때면 항상 손을 주머니에 넣고 다녀야 안심이 되었다. 이런 생각이 쓸데없다는 것을 알고 있으나 멈춰지지 않았다. 최근 이사를 가면서 신경을 많이 썼더니 직장생활을 유지하기 힘들 정도로 불안이 심해졌다고 한다. 치료는?", "textbox": "", "images": [], "options": ["리튬", "부스피론", "리스페리돈", "트리아졸람", "플루옥세틴"], "answer": 4, "explanation": "강박사고(다른 사람의 물건을 훔치지 않을까 불안해함, 이런 생각이 쓸데없다는 것을 알고 있음)와 강박행동(늘 확인해야함, 항상 손을 주머니에 넣고 다녀야 안심이 됨)을 보이고 있습니다. 이로 인해 직장생활을 유지하기 힘들 정도이므로 강박장애로 진단할 수 있습니다. 치료로는 SSRI를 고용량으로 장기간 복용할 수 있으며, 보기 중에는 플루옥세틴이 가능합니다."}, {"major": "강박 및 관련장애", "minor": "강박장애", "qnum": "05", "question": "33세 남자가 출근이나 약속 시간에 늦는 경우가 잦아졌다며 병원에 왔다. 외출 전에 물건을 숫자, 가나다, 색깔의 순서에 따라 정리하는 데 2시간 이상 걸렸다. 물건 정리를 하는 것은 10년 전부터 시작되었으며, 최근 4~5개월 전부터 더욱 심해졌다. 정리해놓은 것이 흐트러지면 안절부절못하며, 물건 등을 반드시 제자리에 두어야 편안해진다고 한다. 치료는?", "textbox": "", "images": [], "options": ["날트렉손", "티아넵틴", "파록세틴", "부프로피온", "알프라졸람"], "answer": 2, "explanation": "정리해놓은 것이 흐트러지면 현저한 불안감을 느끼며, 이에 대한 반응으로 반복적으로 정리 정돈을 하는 강박행동을 보이고 있습니다. 이로 인해 출근이나 약속에 늦는 등 현저한 고통과 시간 소모를 초래하므로 강박장애로 진단할 수 있습니다. SSRI를 고용량으로 장기 복용할 수 있겠으며, 보기 중에서는 3) 파록세틴이 가능합니다."}, {"major": "강박 및 관련장애", "minor": "강박장애", "qnum": "06", "question": "22세 여자가 2년 전부터 시험공부를 할 때마다 손가락으로 머리카락을 마는 습관이 생겼다며 병원에 왔다. 머리카락을 말지 않고 공부를 하면 집중력이 떨어지고 앞서 암기한 내용이 기억되지 않을 것 같아 계속 반복해 암기만 하여 진도가 늦었다고 한다. 이런 행동이 공부에 전혀 도움이 안 된다는 것을 알지만 멈출 수가 없어 괴롭다고 한다. 치료는?", "textbox": "", "images": [], "options": ["도네페질", "메틸페니데이트", "디아제팜", "날트렉손", "파록세틴"], "answer": 4, "explanation": "환자는 강박사고와 강박행동을 겪고 있어 강박장애로 진단이 가능합니다. SSRI나 clomipramine을 고용량, 장기간 사용하여 치료합니다. 보기 중에서는 파록세틴이 가능합니다."}, {"major": "강박 및 관련장애", "minor": "강박장애", "qnum": "07", "question": "고등학교 2학년 여학생이 잡생각이 많고 책을 읽으면서 자꾸 잊어버리는 것 같아 반복적으로 확인한다고 하였다. 이러한 정신 병리와 관련된 뇌 구조물은?", "textbox": "", "images": [], "options": ["편도(amygdala)", "해마(hippocampus)", "띠다발(cingulum)", "송과체(pineal body)", "시상하부(hypothalamus)"], "answer": 2, "explanation": "신경해부학 및 뇌 영상 연구: 양전자 방출 단층촬영(PET) 연구에 의하면 강박장애 환자의 전두엽, 기저핵(특히 미상핵 caudate) 그리고 띠다발(cingulum)에 대사와 혈류가 증가되고 약물치료나 행동치료 후에 이러한 소견이 정상으로 되었다는 보고가 있습니다. 강박장애가 심한 환자에서는 수술적 치료로 cingulotomy를 시행하기도 합니다."}, {"major": "강박 및 관련장애", "minor": "강박장애", "qnum": "08", "question": "25세 여자가 외출 전 반복적으로 현관 출입문을 확인하고 하루에도 여러 차례 손을 씻는다고 한다. 이러한 장애와 관련된 방어기제는?", "textbox": "", "images": [], "options": ["취소, 고립", "부정, 억압", "분리, 동일시", "투사, 전치", "상징화, 함입"], "answer": 0, "explanation": "강박장애에서 주로 사용하는 방어기제\n고립(격리), 취소, 반동형성, 지식화 → 고취\n반지!"}, {"major": "강박 및 관련장애", "minor": "강박장애", "qnum": "09", "question": "고통스런 생각과 동반되어 있는 감정을 의식적으로 몰아내는 방어기제를 주로 사용하는 정신장애는?", "textbox": "", "images": [], "options": ["신체형 통증장애", "범불안장애", "강박장애", "신체형장애", "기분부전장애"], "answer": 2, "explanation": "고통스런 생각에 결합되어 있는 감정을 의식에서 몰아내는 방어기제 : 격리(isolation)\n1), 4) 억압\n2) 교과서적으로 언급된 직접적으로 연관된 특정방어기제는 없습니다.\n3) 고립, 취소, 반동형성\n5) 우울과 관련된 방어기제는 함입(introjection)"}, {"major": "강박 및 관련장애", "minor": "강박장애", "qnum": "10", "question": "25세 여자가 세균에 오염될 것 같은 지나친 걱정 때문에 왔다. 외출할 때 장갑과 마스크를 꼭 끼고 다녀야 하며, 물건을 만지면 30분 이상 손을 씻어야 안심이 된다고 하였다. 약물 부작용을 걱정하여 약은 먹지 않겠다고 하고, 증상이 빨리 호전되기를 원한다. 치료는?", "textbox": "", "images": [], "options": ["자극조절법", "감각집중훈련", "지지정신치료", "노출과 반응방지", "정신분석적 정신치료"], "answer": 3, "explanation": "오염되었다고 생각하여 손을 씻고 강박적으로 오염을 기피하는 모습을 보이고 있으므로 강박장애로 쉽게 진단할 수 있습니다. 강박장애의 약물치료는 SSRI, clomipramine이고 비약물적 치료로는 행동치료가 대표적입니다. 비약물적 치료로는 노출과 반응방지가 주로 사용됩니다.\n3), 5) 정신사회적치료도 사용되기는 하지만 최근 빈도가 줄어들고 있고 강박장애의 치료로는 약물치료와 행동치료가 더 흔하게 사용되고 있습니다."}, {"major": "강박 및 관련장애", "minor": "강박장애", "qnum": "11", "question": "25세 여자가 세균에 오염되었다는 생각에 반복적으로 손을 씻고 외출 시 가스밸브를 몇 번씩 확인하는 행동으로 정신과 외래를 방문하였다. 불합리한 줄 알지만 불안한 마음에 어쩔 수 없다고 하였다. 이 환자에게 가장 적절한 치료는?", "textbox": "", "images": [], "options": ["가족치료", "집단치료", "행동치료", "지지정신치료", "통찰정신치료"], "answer": 2, "explanation": "A. 강박사고 또는 강박행동이 있으면서(\"계속 손 씻고 가스밸브가 잠겨있나 계속 확인\") B. 어느 시점에서 이것이 과도하거나 비현실적이라는 것을 인지하고(\"불합리한 줄 알면서도\") C. 이것이 고통을 주고 시간을 소모하며 D. 다른 I축 장애가 없으면 강박장애를 진단할 수 있다(DSM-5). 치료는 약물(SSRI가 우선적)과 행동치료의 조합이 가장 효과적이며 특히 행동치료는 약물치료보다 효과가 더 오래 간다는 장점이 있습니다."}, {"major": "강박 및 관련장애", "minor": "강박장애", "qnum": "12", "question": "25세 여자가 물건에 손을 닿기만 해도 세균에 오염되었다고 생각하여 반복적으로 손을 씻는다. 이 환자에게 적합한 인지행동치료는?", "textbox": "가. 노출 및 방지 요법\n나. 사고 중지\n다. 홍수법\n라. 토큰경제", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 0, "explanation": "강박장애의 행동치료\n① 노출요법 및 반응방지 : 강박사고보다 강박행동에 효과적\n② 홍수법, 사고중지\n50~70%에서 호전되며 약물치료보다 효과가 더 오래 가는 것이 장점입니다.\n라. token economy는 조현병의 행동치료요법입니다. 어린이들에게 교육목적으로 쓰는 \"스티커 붙여 주기\"와 비슷하다고 볼 수 있습니다."}, {"major": "강박 및 관련장애", "minor": "강박장애 이외의 강박 관련장애", "qnum": "01", "question": "25세 여자가 머리가 아프다며 병원에 왔다. 1년 전부터 왼쪽 귀 연골이 튀어나오면서 귀 모양이 변하는 것 같아 신경이 쓰인다고 한다. 매일 아침 귀 모양이 전날과 달라졌는지 확인하기 위해 거울을 보느라 회사에 2시간씩 지각을 했다. 4개월 전 아예 일을 그만두었고 거울 앞에서 보내는 시간도 5시간으로 늘어났다. 귀 때문에 추해 보일 것 같아 외출할 때에는 반드시 귀를 가릴 수 있는 모자를 쓴다. 귀에 대해 걱정하다 보면 이마가 지끈거리면서 쑤시고 어깨까지 아프다가 자고 일어나면 괜찮아졌다. 실제로 귀 모양이 달라졌다고 생각하지는 않지만 걱정이 하루 종일 머릿속에서 맴돌고 거울로 확인을 해도 안심이 되지 않았다. 진단은?", "textbox": "", "images": [], "options": ["망상장애", "전환장애", "인위성장애", "신체이형장애", "신체증상장애"], "answer": 3, "explanation": "환자는 자신의 귀 모양에 대해 집착을 보이고 있고, 자신의 외모에 결함이 있다고 믿고 있습니다. 이를 반복적으로 거울로 확인하고, 모자로 숨기려고 하고, 이로 인해 직장을 그만두는 등 사회적 기능이 떨어진 모습을 보입니다. 이는 신체이형장애의 임상 양상과 일치하는 모습입니다."}, {"major": "강박 및 관련장애", "minor": "강박장애 이외의 강박 관련장애", "qnum": "02", "question": "66세 남자가 아내에게 짜증을 많이 내어 병원에 왔다. 젊을 때부터 필요 없는 물건도 버리지 않고 집에 쌓아 놓았고 나이가 들면서 점점 더 심해졌다고 한다. 쌓아 놓은 잡동사니가 많아 집의 공간이 부족해졌다. 아내가 물건을 버릴까 봐 청소도 못 하게 했다. 최근에는 밖에서 남들이 버린 물건을 자꾸 들고 와서 아내와 자주 다투었다. 나중에 쓸지도 모르는 물건도 있고 추억이 있는 물건도 많은데 버리는 것은 말도 안 된다고 주장한다. 진단은?", "textbox": "", "images": [], "options": ["조현병", "저장장애", "양극성장애", "분리불안장애", "편집성인격장애"], "answer": 1, "explanation": "가치 없는 물건들을 쌓아 두어 집의 공간이 부족해지고 물건을 버리는 것에 어려움을 느끼는 등 전형적인 저장장애의 증례입니다. 저장장애의 치료로는 인지행동치료가 사용됩니다."}, {"major": "강박 및 관련장애", "minor": "강박장애 이외의 강박 관련장애", "qnum": "03", "question": "16세 여자가 2년 전부터 머리카락을 자주 뽑아서 병원에 왔다. 성적과 공부에 대한 부담으로 스트레스를 많이 받았다고 하였다. 머리카락을 뽑기 전에 긴장이 증가하고 머리카락을 뽑고 나면 후련해지고 긴장이 풀린다고 하였다. 치료는?", "textbox": "", "images": [], "options": ["홍수법", "벨경보요법", "습관반전훈련", "신체자극감응훈련", "안구운동민감제거처리"], "answer": 2, "explanation": "전형적인 발모광의 증례입니다. 치료로는 습관반전훈련, 항불안제 및 항우울제를 사용해 볼 수 있겠습니다."}, {"major": "강박 및 관련장애", "minor": "강박장애 이외의 강박 관련장애", "qnum": "04", "question": "24세 여자가 코뼈가 한쪽으로 기울었으며 병원에 왔다. 어렸을 때 턱 교정치료를 받은 적이 있었고, 1년 전에는 오른쪽 눈꺼풀이 처졌다며 성형수술을 받았다고 한다. 여러 의사로부터 비중격은 정상적으로도 휘어져 있을 수 있으므로 안심하라는 설명을 들은 후, 자신의 생각에 문제가 있다는 것을 알게 되었다. 하지만 자꾸 거울을 들여다보고 싶어 불편하다고 한다. 치료는?", "textbox": "", "images": [], "options": ["리튬", "부스피론", "알프라졸람", "플루옥세틴", "할로페리돌"], "answer": 3, "explanation": "환자는 자신 신체부위에 대해 집착을 보이고 있고, 자신의 외모에 결함이 있다고 믿고 있습니다. 또한 문제에서 자신의 행위가 잘못되었음을 인지하고도 그 행위를 멈출 수 없는 강박사고/행위가 기술되어 있어 진단이 강박관련장애, 그 중에서도 신체이형장애임을 판단할 수 있습니다. 강박장애의 일차치료제로 SSRI계열인 플루옥세틴이 정답이 되겠습니다."}, {"major": "강박 및 관련장애", "minor": "강박장애 이외의 강박 관련장애", "qnum": "05", "question": "오른쪽 눈이 왼쪽에 비해 작아 수술을 받아야 한다고 주장하는 24세 여자가 병원에 왔다. 3년 전에도 코가 비뚤어졌다고 하여 부모님을 설득하여 여러 차례 수술을 받았다. 지나치게 외모에 집착하였고 대인관계를 기피하였다. 가장 적절한 진단은?", "textbox": "", "images": [], "options": ["건강염려증", "대인공포증", "인공적 장애", "신체화장애", "신체이형장애"], "answer": 4, "explanation": "A. 사소한 외모결함에도 과도한 걱정(오른쪽 눈이 왼쪽에 비해 작다며 수술을 받아야 한다고 주장, 3년 전에는 코가 삐뚤어졌다며 여러 차례 수술 받음)B. 기능의 장애(대인관계 기피)C. 신체상의 왜곡이 있는 다른 정신질환의 clue가 없으므로 신체이형장애 진단"}, {"major": "강박 및 관련장애", "minor": "강박장애 이외의 강박 관련장애", "qnum": "06", "question": "15세 여자가 9개월 전부터 피부가 나빠서 남들 보기 부끄럽다며 얼굴을 가리기 위해 마스크를 쓰고, 하루 종일 거울로 피부 상태를 체크하는 것 때문에 병원에 왔다. 최근 6개월 동안 학교 성적이 많이 떨어졌고 학교에 다니고 싶지 않다며 눈물을 흘리는 일이 종종 있었다. 면담 시 여자의 피부에 여드름이 약간 있었으나 걱정할 정도는 아니었다. 진단은?", "textbox": "", "images": [], "options": ["신체화장애(somatization disorder)", "기분저하장애(dysthymic disorder)", "회피인격장애(avoidant personality disorder)", "신체추형장애(body dysmorphic disorder)", "건강염려증(hypochondriasis)"], "answer": 3, "explanation": "정상적인 용모를 가진 사람이 자신의 외모가 달라졌거나 추한 모습으로 변했다고 믿으며, 그것에 의해 심각한 심적 고통이나 일상 기능의 장애를 초래하고 있습니다. 신체상의 왜곡과 관련된 다른 정신질환의 증거가 없으므로 신체추형장애라 할 수 있습니다."}, {"major": "외상 및 스트레스 관련 장애", "minor": "급성 스트레스장애", "qnum": "01", "question": "42세 여성이 불안하고 잠들기 힘들다며 병원에 왔다. 1년 전 교통사고를 당해서 다발골절을 겪으며 죽을 수도 있겠다고 느꼈다. 이후 당시 교통사고에서 공포에 질렸던 경험들이 생생하게 떠올라 일상생활을 할 때 불안하다고 한다. 사소한 자극에도 깜짝깜짝 놀라며 그 사건을 다시 경험하는 듯한 느낌이 반복되고 악몽을 꾼다고 한다. 치료 약물은?", "textbox": "", "images": [], "options": ["메만틴", "아토목세틴", "메틸페니데이트", "아캄프로세이트", "에스시탈로프람"], "answer": 4, "explanation": "42세 여성이 불안과 수면장애를 주소로 내원하였습니다. 1년 전 교통사고를 겪은 후 사건에 대한 침습적인 회상, 반복적 악몽, 과각성(사소한 자극에도 깜짝 놀람, 수면장애)을 보이고 있으며 증상 지속기간이 1개월 이상이기 때문에 외상 후 스트레스 장애(PTSD)로 진단할 수 있습니다. PTSD의 일차 치료약물은 SSRI이고, 이외에 인지행동치료, 지속노출치료, 인지처리치료, 안구운동탈민감재처리(EMDR) 등의 정신사회적 치료를 병행할 수 있습니다. 따라서 가장 적절한 치료 약물은 에스시탈로프람입니다."}, {"major": "외상 및 스트레스 관련 장애", "minor": "급성 스트레스장애", "qnum": "02", "question": "26세 남자가 5일 전부터 불안하다며 병원에 왔다. 5일 전 투신자살을 한 시신을 봤다고 한다. 피투성이가 된 시신이 반복해서 떠올라 깜짝깜짝 놀라고 초조하고 무서워서 일상 업무에 집중할 수 없다. 잠을 이루지 못하고 악몽을 꾼다. 앞으로 다시는 긍정적인 감정을 느낄 수 없을 것이라고 생각하고 있다. 혼란스러워하면서 시간이 느리게 가는 것처럼 느끼고, 시신을 목격한 장소 근처에도 가지 않으려고 한다. 진단은?", "textbox": "", "images": [], "options": ["적응장애", "범불안장애", "지속성애도장애", "급성스트레스장애", "외상후스트레스장애"], "answer": 3, "explanation": "5일 전부터 시작된 불안을 주소로 내원한 26세 남자입니다. 5일 전에 외상적 사건을 목격하였으며, 이후 재경험, 회피, 인지의 부정적 변화('앞으로 다시는 긍정적인 감정을 느낄 수 없을 것'), 과각성을 경험하고 있습니다. 기간이 1달 이내이기 때문에 외상후 스트레스 장애로 진단할 수 없으며, 급성스트레스 장애로 진단할 수 있습니다."}, {"major": "외상 및 스트레스 관련 장애", "minor": "급성 스트레스장애", "qnum": "03", "question": "27세 여자가 불안하다하며 병원에 왔다. 3개월 전 어머니의 교통사고를 목격한 이후부터 도로에서 자동차를 보면 공포감과 불안감을 극심하게 느낀다. 차 소리만 들어도 예민해져서 깜짝 놀란다. 하루 종일 멍해서 직장업무에 집중하기가 어렵고, 가족에게 짜증을 자주 낸다. 어머니가 자동차에 치이는 순간 자신의 몸이 얼어붙어 제자리에서 꼼짝 못 하는 꿈을 자주 꾼다. 충동성이나 자해행동은 없었다. 치료는?", "textbox": "", "images": [], "options": ["대인관계치료", "사회기술재활", "습관역전훈련", "변증법적행동치료", "안구운동탈민감재처리"], "answer": 4, "explanation": "3개월 전 어머니에게 발생한 외상적 사건을 목격한 이후 재경험, 회피 및 과각성 증상을 보이고 있기 때문에 외상후 스트레스장애로 진단할 수 있습니다. 외상후 스트레스장애의 정신사회적 치료로는 인지행동치료가 가장 권장되며, 세부적으로는 지속노출치료, 인지처리치료, 안구운동탈민감재처리 등이 있습니다."}, {"major": "외상 및 스트레스 관련 장애", "minor": "급성 스트레스장애", "qnum": "04", "question": "33세 여자가 불안해서 병원에 왔다. 2주일 전 오토바이 사고 현장에서 피를 흘리며 쓰러진 남자를 본 뒤 증상이 시작되었다고 하였다. 사고 장면이 자꾸 떠오르고 작은 소리에도 깜짝 놀랐으며 운전하는 것을 피한다고 하였다. 또한 낯설게 느껴지는 경험과 멍하게 있는 순간이 자주 있었고, 흐르는 물이 핏물처럼 보여 손을 씻다가 뛰쳐나오기도 했다고 하였다. 진단은?", "textbox": "", "images": [], "options": ["특정공포증", "외상후스트레스장애", "강박장애", "급성스트레스장애", "범불안장애"], "answer": 3, "explanation": "2주일 전 사고에 대해 재경험, 회피, 과각성을 경험하고 있으며 비현실감, 멍한 느낌 등의 해리성 증상을 호소하고 있습니다. 이는 급성 스트레스 장애에 속하며, 이러한 증상이 1달 이상 지속되면 외상후 스트레스장애(PTSD)로 진단명을 바꾸게 됩니다."}, {"major": "외상 및 스트레스 관련 장애", "minor": "급성 스트레스장애", "qnum": "05", "question": "25세 여자가 지하철 화재사고 후 반복적으로 악몽을 꾸며 깜짝깜짝 놀라고, 또 사고가 발생하지 않을까 걱정하여 지하철을 탈 수가 없다고 하였다. 최근에는 매사에 흥미를 잃고 일에 대한 의욕도 저하되어 휴직 중이었다. 이 환자에 대한 조치로 적합하지 않은 것은?", "textbox": "", "images": [], "options": ["가능한 조기에 업무 복귀", "약물치료로 TCA 사용", "역동적 정신치료", "혐오요법", "집단치료"], "answer": 3, "explanation": "눈앞에서 사람들이 불타는 경험과 함께 생명에 대한 직접적 위협을 느꼈을 테니 지하철 화재는 일상생활에서 흔히 겪을 수 있는 범위를 넘어서는 스트레스겠죠? 이 환자에도 악몽을 꾸고(재경험) 지하철 타는 것을 피하려고 하며(회피) 자주 놀라는(과민성) 조건이 모두 있습니다.1) 치료 : 원칙적으로 외상 직후 시작, 집중 치료시설에서 단기간 치료, 사회로 조기 복귀2) 약물치료 : TCA, SSRI, MAOI3) 정신치료 : crisis intervention, 역동적 정신치료, 해리성기억상실증4) 행동치료는 혐오요법 대신 상상기법/실제 노출입니다(혐오요법은 paraphilia나 알코올중독의 치료에 씁니다).5) 집단치료, 가족치료도움이 됩니다(집단 치료의 금기증은 몇 가지 없죠. 대표적으로 망상장애만 알아둡시다)."}, {"major": "외상 및 스트레스 관련 장애", "minor": "급성 스트레스장애", "qnum": "06", "question": "45세 여자가 3개월 전 교통사고로 친구가 죽는 것을 목격한 후부터 사고장면이 자주 떠오르고, 작은 소리에도 많이 놀라며, 차가 두려워서 외출을 하지 않으려 한다. 치료약물은?", "textbox": "", "images": [], "options": ["서트랄린(sertraline)", "올란자핀(olanzapine)", "부프로피온(bupropion)", "프로프라놀롤(propranolol)", "메틸페니데이트(methylphenidate)"], "answer": 0, "explanation": "친구가 죽는 외상적 사건을 목격하고 재경험, 회피, 과각성 증상이 나타나고 있습니다. 또한 사건이 발생한 지 1개월 이상이 지났으므로 외상후 스트레스 장애로 진단내릴 수 있습니다. 외상후 스트레스장애의 약물치료는 SSRI이므로 답은 서트랄린이 되겠습니다."}, {"major": "외상 및 스트레스 관련 장애", "minor": "급성 스트레스장애", "qnum": "07", "question": "42세 남자가 불안하다하며 병원에 왔다. 4개월 전 운전 중에 중앙선을 넘어 돌진하는 트럭을 피하다가 옆 건물을 들이받았다. 사고로 갈비뼈가 골절되었지만 다른 곳은 다치지 않았다. 그 후 사고 장면이 자꾸 떠올라 운전을 하지 못했다. 다른 사람이 운전하는 차를 타는 것도 불안해서 지하철만 타고 다녔다. 거리에서 달리는 트럭을 보면 숨이 답답하고 불안해졌다. 물건이 떨어지거나 문이 닫히는 소리에 깜짝 놀라기도 했다. 교통사고가 나는 꿈을 계속 꾸고 자다가 중간에 깨는 일이 흔했다. 집중도 잘 되지 않고 짜증이 심해져 앞으로 제대로 살아가기 힘들 것 같다는 생각이 들었다. 치료는?", "textbox": "", "images": [], "options": ["사고에 대해 이야기하지 않게 한다.", "정서적 안정화 전에 노출치료를 시작한다.", "최대한 빨리 디브리핑(debriefing)을 실시한다.", "원치 않아도 사고에 대해 계속 이야기하게 한다.", "사고 관련 자극에 익숙해지도록 만들어 회피행동을 줄인다."], "answer": 4, "explanation": "교통사고 이후 1개월 이상 지속된 재경험(사고 장면이 떠오르고 꿈), 회피(운전을 하거나 차를 타지 못함), 인지적 부정적 변화(불안, 짜증, 앞으로 살아가기 힘들 것 같음), 과각성(깜짝 놀람, 집중장애, 수면장애)을 보이는 외상후 스트레스장애 환자입니다. 외상후 스트레스장애에서 노출치료는 환자를 외상 자극에 노출시켜 익숙해지게 만들어 부정적인 감정과 회피행동을 감소시키게 합니다.1), 3), 4) 디브리핑(Debriefing)은 외상경험에 대해 진술하게 하는 것으로 환자가 외상사건에 대해 이야기 할 수 있도록 격려하되, 반드시 환자가 원하는 때에 할 수 있도록 해야 합니다. 원하지 않는 환자에게 시행하는 경우 스트레스를 악화시킬 수 있어 권장되지 않습니다.2) 우선 정서적 안정화를 잘 시행하는 것이 향후 정신치료로 연결되는데 중요합니다."}, {"major": "외상 및 스트레스 관련 장애", "minor": "급성 스트레스장애", "qnum": "08", "question": "54세 남자가 2개월 전 운전을 하다가 트럭과 충돌하였다. 사고 당시 의식 소실과 두부 외상은 없었다. 그러나 사고 이후 사고가 나는 악몽을 자주 꾸고 트럭만 보면 사고 장면이 떠올라서 괴로워하였으며 차를 타는 것을 피했으며 짜증이 많아졌다. 치료는?", "textbox": "", "images": [], "options": ["아캄프로세이트", "라모트리진", "리스페리돈", "플루옥세틴", "모다피닐"], "answer": 3, "explanation": "사고 이후 1달 이상 재경험, 회피, 과각성을 경험하고 있으므로 외상후 스트레스장애(PTSD)입니다. 약물 치료로는 SSRI, TCA 등의 항우울제를 사용합니다.1) 아캄프로세이트 : 금주를 위한 약제입니다.5) 모다피닐 : 기면증(narcolepsy) 치료 약제입니다."}, {"major": "외상 및 스트레스 관련 장애", "minor": "급성 스트레스장애", "qnum": "09", "question": "28세 여자가 성폭행을 당한 후 매일 밤 그 일에 대한 악몽으로 잠을 이루지 못하고 불안하여 정상적인 생활을 할 수가 없었다. 이 환자에 대한 조치로 옳은 것은?", "textbox": "", "images": [], "options": ["증상이 완전히 소실될 때까지 입원치료가 원칙이다.", "증상 완화를 위해 imipramine을 사용한다.", "환자의 보상 심리를 만족시켜 병이 만성화되는 것을 방지한다.", "충분한 회복기간을 위해 휴식을 권고한다.", "빠른 복귀를 위해 조기에 단기역동 정신치료를 시행한다."], "answer": 1, "explanation": "2) 약물치료는 SSRI나 TCA를 사용할 수 있습니다.1), 4) 조기집중치료, 조기퇴원이 원칙5) 조기에는 지지적 치료(역동적 치료도 외상경험의 재구성 및 재반응을 위해 사용가능하긴 하나 일부 환자에만 사용)PTSD의 정신치료는 위기개입과 지지, 교육, 스트레스 극복 메커니즘(coping mechanism)의 개발, 사건을 받아들이는 방법의 개발 등이 개개인별로 이루어져야 합니다."}, {"major": "외상 및 스트레스 관련 장애", "minor": "급성 스트레스장애", "qnum": "10", "question": "25세 여자가 성폭행을 당한 후 남자들이 무서워 피하며 밖에 나가지 못하고 멍한 표정으로 방안에만 있으려고 하였다. 매일 밤 지난 일에 대한 악몽으로 깜짝 놀라며 잠을 이룰 수 없다고 하였다. 이 장애와 관련된 설명으로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["어린 시절 아동학대가 취약조건이다.", "감정둔화가 나타난다.", "이차 이득이 없다.", "해리상태가 동반될 수 있다.", "어리거나 고령인 경우 예후가 나쁘다."], "answer": 2, "explanation": "외상기억과 연관된 자극(남자)에 대한 회피/악몽/놀라 자꾸 깬다.1) 취약조건 : 어린 시절의 이별을 비롯한 외상경험, 성격장애 등2) 진단 기준 중 인지의 부정적 변화에 해당합니다.3) 정신치료시 2차적 이득의 이해가 중요합니다.4) 해리상태나 공황발작이 동반될 수 있습니다.5) 어리거나 고령인 경우 예후가 나쁩니다."}, {"major": "외상 및 스트레스 관련 장애", "minor": "급성 스트레스장애", "qnum": "11", "question": "24세 여자가 악몽을 꾸고 깜짝깜짝 놀라는 증상으로 병원에 왔다. 2개월 전에 교통사고로 옆에 탔던 남자 친구가 사망하였다. 그 후 환자는 멍하고 짜증이 많아지고 의욕도 떨어져서 회사를 쉬고 있는 상태이다. 이 환자에게 적합한 조치는?", "textbox": "", "images": [], "options": ["출근은 충분히 회복될 때까지 기다리는 것이 좋다.", "선택적 세로토닌 재흡수 억제제는 사용하지 않는다.", "사고 상황에 대해 사실만 간단히 물어보는 것이 좋다.", "가능하면 일상생활을 하면서 통원 치료하는 것이 좋다.", "불안이 유발될 수 있어서 집단치료는 바람직하지 않다."], "answer": 3, "explanation": "단기간 치료하여 사회로 조기 복귀2) SSRI가 일차치료제로 사용됩니다.3) 정신역동적 정신치료는 외상적 사건을 재구성하는 것이 치료적인데 사실만 간단히 물어보는 것과는 거리가 있겠죠?4) 맞는 보기입니다.5) 집단치료와 가족치료도 중요합니다."}, {"major": "외상 및 스트레스 관련 장애", "minor": "급성 스트레스장애", "qnum": "12", "question": "건설현장에서 머리에 벽돌을 맞고 쓰러진 사람이 의식이 회복되고 여러 검사에서 이상이 발견되지는 않았으나 똑같은 사고를 당하지 않을까 두려워 2개월째 휴직상태이다. 이 환자에게 적합한 조치는?", "textbox": "", "images": [], "options": ["새로운 직업을 갖도록 권유한다.", "장기간 정신치료가 필요하다.", "역동적 정신치료로 재반응이 효과적이다.", "치료자의 태도가 지지적이면 안 된다.", "회복될 때까지 계속해서 휴직을 권유한다."], "answer": 2, "explanation": "PTSD의 치료 원칙 : 조기 발견, 철저한 조기 치료, 업무에의 조기 복귀2) 단기간 위기개입이 중요합니다.3) 정신역동적 정신치료는 외상적 사건에 대한 논의를 반복함으로써 재반응(abreaction)을 촉진하고, 외상으로 인한 부정적 영향을 인지하도록 도움으로써 외상적 경험을 좀 더 실제적이고 적응적인 방향으로 재구성하도록 합니다.4) 치료자는 지지적인 태도로 임해야 합니다.5) 조기 복귀가 중요합니다."}, {"major": "외상 및 스트레스 관련 장애", "minor": "적응장애", "qnum": "01", "question": "35세 남자가 5개월 전부터 초조하고 불안하다하며 병원에 왔다. 당시 새 아파트로 이사를 왔는데, 위층 사람이 수시로 올라와 층간 소음 때문에 괴롭다고 항의를 하였다. 이후로 또 항의를 받을까 걱정되어 신경이 과민해지고 안절부절못하게 되었고, 최근에는 차라리 이사가는 것을 고민할 정도라고 한다. 진단은?", "textbox": "", "images": [], "options": ["강박장애", "적응장애", "범불안장애", "급성스트레스장애", "외상후스트레스장애"], "answer": 1, "explanation": "생명에 직접적 위해가 가해지지 않았으면서 흔히 경험할 스트레스로 스트레스에 대해 통상 기대할 수 있는 반응보다 과도하게 사회, 직업적 기능에 장애를 초래했습니다. 이것이 스트레스 시작 3개월 이내에 일어나고 6개월 이상 지속되지 않았으므로 적응장애로 진단할 수 있겠습니다."}, {"major": "외상 및 스트레스 관련 장애", "minor": "적응장애", "qnum": "02", "question": "2년 전까지 외국에서 살다가 한국으로 전학 온 중학교 3학년 여학생이다. 전학 온 직후부터 5개월 동안 두통과 소화불량, 불안, 불면을 호소하면서 주변에 짜증을 내고 학교에 가지 않으려 했으나, 요즘은 친구들을 사귀면서 증상이 많이 호전되었다. 진단은?", "textbox": "", "images": [], "options": ["신체화장애", "외상후스트레스장애", "범불안장애", "급성스트레스장애", "적응장애"], "answer": 4, "explanation": "전학은 명백히 스트레스지만, 생명에 직접적 위해가 되지 않으면서 흔히 경험할만한 일입니다. 스트레스가 작용한지 3개월 이내에 증상이 나타났으며, 주변에 적응하면서 증상이 호전되었습니다. 적응장애가 의심됩니다."}, {"major": "해리장애", "minor": "해리장애", "qnum": "01", "question": "26세 여자가 전날 남편에게 폭행당한 것이 기억나지 않는다며 보호자와 내원하였다. 전날 남편 외도를 목격한 후 싸우다 심한 욕설을 듣고 폭행을 당하고 난 뒤, 오늘 아침 남편이 사과하는데 기억이 안 난다고 하였다. 평소와 다름없이 식사 준비를 했고, 기억 안 나는 것에 대해 염려하고 있지는 않았다. 진단은 무엇인가?", "textbox": "", "images": [], "options": ["이인증", "해리성 둔주", "뇌진탕 증후군", "해리성 정체성 장애", "해리성 기억상실"], "answer": 4, "explanation": "폭행과 같은 스트레스 상황 후 삽화적 기억의 회상의 손상과 염려하지 않는 모습을 통해 해리성 기억상실로 진단할 수 있습니다."}, {"major": "해리장애", "minor": "해리장애", "qnum": "02", "question": "25세 남자가 가끔 자신의 몸으로부터 분리되어 다른 사람이 된 듯한 느낌을 자주 경험하였다고 한다. 현실 검증력은 유지하고 있었다. 적절한 진단은?", "textbox": "", "images": [], "options": ["이인성 장애", "해리성 둔주", "해리성 주체장애", "해리성 기억상실", "단기 정신병적 장애"], "answer": 0, "explanation": "현실검증력이 유지되는 상태에서 이인증이 고통 받을 정도로 심한 경우"}, {"major": "해리장애", "minor": "해리장애", "qnum": "03", "question": "26세 여자가 갑자기 기억이 나지 않는다며 응급실에 왔다. 어제 어머니와 함께 은행에 갔다가 2년 동안 고생하며 모든 돈을 보이스피싱으로 모두 잃은 것을 알게 되었다. 책망하는 어머니와 다투고 울면서 뛰어나간 후 연락이 두절되었다. 오늘 아침 다니던 회사 앞에서 탈진된 모습으로 발견되었다. 지난 1년 동안 자신이 한 일이 전혀 기억나지 않는다고 한다. 오늘 날짜를 알고 이런 일은 처음이라며 놀랐다. 1년 이전의 일은 모두 기억하고 있고, 다른 인지기능 이상은 없다. 혈액 검사, 뇌파, 뇌 자기공명영상은 정상 소견이다. 진단은?", "textbox": "", "images": [], "options": ["전환장애", "적응장애", "해리 기억상실", "해리정체성장애", "급성스트레스장애"], "answer": 2, "explanation": "환자가 심한 심리적 스트레스 이후 스트레스 사건 이전의 기억에 대한 국소적 기억상실을 겪고 있습니다. 다른 기질적인 원인도 배제할 수 있으므로 해리성기억상실로 진단할 수 있습니다."}, {"major": "해리장애", "minor": "해리장애", "qnum": "04", "question": "45세 남자가 기억 장애로 병원에 왔다. 오늘 아침에 갑자기 \"여보 여기가 어디야\", \"내가 왜 여기 있지\"라며 반복해 묻는 증상이 생겼다고 한다. 고혈압과 당뇨병은 없다. 장소에 대한 지남력 장애가 있으나 국소신경학적 이상은 없다. 기억력검사에서 5분 후 지연회상을 할 수 없다. 뇌 자기공명영상과 뇌파 검사 결과는 정상이다. 검사를 받은 후 정상으로 회복되었으나, 증상이 있었던 동안의 일은 기억하지 못한다. 진단은?", "textbox": "", "images": [], "options": ["복합부분발작", "측두엽뇌전증", "일과성허혈발작", "척수뇌바닥동맥부전", "일과성전체기억상실"], "answer": 4, "explanation": "급성 기억상실을 주소로 내원한 환자입니다. 환자는 의식수준에 장애가 없으며 기저 질환이 없고, 동반된 국소 신경학적 이상이 없습니다. 뇌파검사 또한 정상이기 때문에 보기에 있는 복합부분발작, 측두엽뇌전증, 일과성허혈발작, 척수뇌바닥동맥부전을 배제할 수 있겠습니다. 환자가 단기간 내 기억이 회복된 점, 최근 기억에 장애가 있다는 점에서 일과성전체기억상실이 진단임을 알 수 있습니다."}, {"major": "해리장애", "minor": "해리장애", "qnum": "05", "question": "45세 여자가 교통사고로 아들을 잃고 장례를 치르던 중 갑자기 아들이 살아 있는 것처럼 행동하여 병원에 왔다. 이 환자에 관한 설명으로 옳은 것은?", "textbox": "", "images": [], "options": ["최면요법이 도움이 된다.", "전기경련요법을 실시한다.", "신경학적 검사는 필요 없다.", "약물치료는 회복을 방해한다.", "초기 정신분석을 실행한다."], "answer": 0, "explanation": "스트레스가 되고 상처가 되는 중요한 개인적 정보를 일상적 건망증으로 설명할 수 없을 정도로 기억하지 못하는 삽화1) 최면술도움이 된다(효과에 대해서는 논란이 있다).2) 전기경련요법과는 무관3) 기질적 원인의 감별 필요4) 응급조치로 short acting barbiturate5) 정신치료는 기억이 회복된 뒤 시행해야 합니다."}, {"major": "해리장애", "minor": "해리장애", "qnum": "06", "question": "38세 남자가 서울에서 실종되고 3년 후 부산에서 발견되었다. 그는 새로운 직업을 갖고 있었으며, 그 전의 자신에 대한 기억은 전혀 하지 못하였다. 진단은?", "textbox": "", "images": [], "options": ["해리성 둔주", "해리성 기억장애", "해리성 정체성 장애", "이인성 장애", "갠서증후군(Ganser syndrome)"], "answer": 0, "explanation": "해리성 둔주는 DSM-5에서는 해리성 기억상실의 특정형으로 포함되어 있습니다. 환자는 자신의 정체성에 대한 기억을 상실하고 가정/직장을 떠나 방황하거나 예정에 없던 여행을 하게 되는데, 현재 증례에 제시된 case와 임상 양상이 잘 부합합니다."}, {"major": "해리장애", "minor": "해리장애", "qnum": "07", "question": "다음 중 해리장애에서 가장 흔한 것은?", "textbox": "", "images": [], "options": ["해리성 기억상실", "이인성 장애", "해리성 정체성 장애", "해리성 둔주", "갠서증후군(Ganser's syndrome)"], "answer": 0, "explanation": "해리성 기억상실이 해리장애 중 가장 흔합니다. 그 때문인지 몰라도 드라마에서도 자주 볼 수 있죠. 5) Ganser's syndrome : 의식의 혼탁이 동반된 상태에서 질문의 의미를 알면서도 정답이 아닌 비슷한 대답을 하는 경우. 예를 들어 2 더하기 2는 5라고 대답한다."}, {"major": "신체증상 및 관련장애", "minor": "질병불안장애(건강염려증)", "qnum": "01", "question": "42세 여자가 숨이 차다며 보호자인 남편과 함께 병원에 왔다. 진료 동영상 상이다. 진단은?", "textbox": "• 의 사 : 어디가 불편해서 오셨나요?\n• 환 자 : 병원을 여러 군데 다녀도 다 나았고 검사결과도 정상이라고는 하는데, 계속 숨이 차서 불안해요.\n• 의 사 : 하루 중 숨이 언제 찬가요?\n• 환 자 : 매일 숨이 안찬 적이 없이 계속 숨이 차요. 그래서 계속 불안해요. 병원을 여러 군데 방문해서 검사도 이것저것 안 해본 것이 없는데, 계속 정상이라는 이야기만 들어요.\n• 보호자 : 아내가 6개월 전에 독감 때문에 입원을 했다가 완치되었다고 듣고 퇴원했는데, 그 이후로 계속 숨차다고 하고 일상생활을 힘들어하네요.", "images": [], "options": ["망상장애", "전환장애", "인위성장애", "질병불안장애", "신체증상장애"], "answer": 4, "explanation": "숨이 계속 차다는 신체증상을 호소하고 있으며, 이로 인해 고통스럽고 일상생활에서 심각한 장애가 발생하고 있습니다. 이로 인해 여러 병원을 다니고 계속해서 불안해하고 있으며, 6개월 이상 증상이 지속되고 있으므로 신체증상장애로 진단할 수 있습니다."}, {"major": "신체증상 및 관련장애", "minor": "질병불안장애(건강염려증)", "qnum": "02", "question": "40세 여자가 두통이 심하다며 병원에 왔다. 10년 전에 머리 전체를 누르는 듯한 통증이 시작된 후 소화불량, 어지러움, 피로감 등이 자주 나타났고, 여러 병원을 다니며 많은 검사를 받았지만 특별한 이상은 발견되지 않았다고 한다. 최근 두통이 악화되어 어떤 일도 하기가 어렵고 계속 더 심해질까봐 걱정 된다고 한다. 진단은?", "textbox": "", "images": [], "options": ["인위장애", "전환장애", "신체이형장애", "신체증상장애", "질병불안장애"], "answer": 3, "explanation": "신체증상장애\nA. 하나 이상의 신체증상을 호소하며 이 증상으로 인해 고통스러우며 일상생활에서 심각한 와해\nB. 신체 증상 및 관련 건강문제와 연결된 지나친 생각, 느낌, 행동이 다음 3가지 중 1가지 이상\n1. 증상의 심한 정도와 관련된 생각이 불균형적이고 지속적\n2. 건강과 증상에 대한 불안이 지속적으로 높음\n3. 이들 증상들과 건강염려증에 바친 시간과 에너지가 과도함\nC. 어느 한 신체증상이 지속적으로 있지 않더라도, 증상 상태는 지속적(전형적으로 6개월 이상)\n신체증상장애의 진단을 묻는 질문입니다. 뚜렷한 증상발생의 동기가 없으므로 전환장애를 배제할 수 있습니다. 특정질병을 얻었다는 믿음도 없어 질병불안장애도 아닙니다. 신체부위에 대한 강박관념이 존재하지 않기 때문에 신체이형장애도 답이 아닙니다."}, {"major": "신체증상 및 관련장애", "minor": "질병불안장애(건강염려증)", "qnum": "03", "question": "신체화장애 환자의 치료에 대한 설명으로 옳은 것은?", "textbox": "", "images": [], "options": ["신경안정제는 약물의존이 강하므로 금기이다.", "정신치료는 분석적인 방법이 좋다.", "치료적 관계를 위해 신체질환임을 시인해 준다.", "처음 내원 시 세밀한 이학적 검사를 시행한다.", "증상이 심인성이므로 가급적 무시한다."], "answer": 3, "explanation": "1) 우울증이나 불안장애 같은 다른 정신과 질환이 동반될 때는 약물의 투여가 필요합니다.2) 정신치료의 방법은 분석적인 것보다 지지적인 것이 좋습니다.3) 신체질환임을 시인해 주어서는 안 됩니다. 증상을 고정시킬 수 있습니다.4) 우선 세밀한 이학적 검사를 하고, 필요하다면 임상병리검사도 해서 안심시켜 주어야 합니다.5) 신체질환임을 무시도 시인도 하지 말아야 합니다."}, {"major": "신체증상 및 관련장애", "minor": "질병불안장애(건강염려증)", "qnum": "04", "question": "40세 여자가 병원에 왔다. 환자는 여러 장기에 관련된 다양한 신체증상을 지루하고 장황하게 설명하였다. 그간 여러 병원에서 검사를 하였으나 이상이 발견되지 않았고, 환자는 의사들이 자신의 병의 원인을 찾지 못한다고 생각하였다. 이 환자에게 적합한 조치는?", "textbox": "", "images": [], "options": ["신체증상은 무시한다.", "이차적 이득은 직면을 통해 막는다.", "여러 전문분야의 의사들이 개입한다.", "같은 검사를 반복하여 환자를 안정시킨다.", "정신분석치료보다는 지지정신치료가 효과적이다."], "answer": 4, "explanation": "1) 우선 세밀한 이학적 검사를 하고, 필요하다면 임상병리검사도 해서 안심시켜 주어야 합니다.2), 5) 정신치료의 방법은 분석적인 것보다 지지적인 것이 좋습니다. ‘직면’은 정신분석의 기법입니다.3) 의사 한 사람이 일관성 있게 치료를 전담하는 것이 바람직합니다.4) 처음에는 세밀한 검사 : 검사나 진찰을 환자 요구대로 반복하여서는 말아야 합니다."}, {"major": "신체증상 및 관련장애", "minor": "질병불안장애(건강염려증)", "qnum": "05", "question": "평소 건강검진을 자주 받는 30세 남자가 정신과를 방문하였다. 누나가 위암으로 사망한 후부터 복부통증과 식욕부진, 메스꺼움을 호소하였다. 여러 병원을 다니면서 검사를 받았지만 이상 없다고 하였다. 이 환자에 대한 설명으로 옳은 것은?", "textbox": "", "images": [], "options": ["우울, 불안 등이 흔히 동반된다.", "증상은 보상이 주어지면 사라진다.", "사회생활이나 직업적 기능장애는 없다.", "스트레스와는 관련이 없다.", "환자의 요구대로 모든 검사를 시행하는 것이 필요하다."], "answer": 0, "explanation": "1) 환자의 80%에서 우울장애나 불안장애가 동반됩니다. 우울이나 불안이 병합되어 있으면 약물치료가 효과적입니다.2) 이차 이득이 없습니다. 즉, 보상에 의해서 증상이 사라지는 것은 아닙니다.3) 사회생활이나 직업 기능에 지장을 초래하고 있습니다.4) 회복과 재발이 반복되는 경과를 보이는데 스트레스에 의해 흔히 나타납니다.5) 정기적으로 반복 검사를 통해 의사가 환자를 무시하거나 포기하지 않는다는 확신을 주는 것이 도움이 되지만, 불필요하게 모든 검사를 반복해서 원하는 대로 시행하면 안 됩니다."}, {"major": "신체증상 및 관련장애", "minor": "질병불안장애(건강염려증)", "qnum": "06", "question": "64세 여자가 2년 전부터 머리가 아프다며 병원에 왔다. 머리가 아파서 일상업무를 제대로 수행하지 못했다. 20대 중반부터 얼굴이 화끈거리고 시리며, 피부가 따가웠다고 한다. 목, 턱, 어깨에도 통증이 있어 여러 병원에서 진찰과 검사를 수차례 받았지만 이상소견은 없었다. 1년 전부터 통증이 심각한 병 때문이 아닌지 걱정하고 있다. 치료는?", "textbox": "", "images": [], "options": ["날트렉손", "멜라토닌", "부스피론", "아토목세틴", "플루마제닐"], "answer": 2, "explanation": "머리가 아픈 것을 주소로 내원한 64세 여자 환자입니다. 해당 신체 증상으로 인해 일상생활에 어려움이 발생하고 있는 상황이고, 신체 증상들과 관련된 불안이 지속적으로 높은 상황입니다. 따라서 신체증상장애로 진단할 수 있습니다. 신체 증상 장애에는 부스피론 등의 항불안제를 사용하는 것이 가능합니다."}, {"major": "신체증상 및 관련장애", "minor": "질병불안장애(건강염려증)", "qnum": "07", "question": "27세 남자가 불안하다며 내원하였다. 진단은?", "textbox": "• 의사 : 어떤 일로 오셨죠?\n• 환자 : 제가 사실…며칠 전에 클럽에서 모르는 여성과 하룻밤을 보냈는데 알고 보니 유흥업소에서 일하는 분이더라고요. 그래서 혹시 에이즈에 걸린 게 아닐까 불안해서 병원에서 검사도 받아봤어요.\n• 의사 : 검사 결과가 어땠나요?\n• 환자 : 결과는 음성으로 나왔는데 뭔가 성기에 뭐가 난 것 같고 피부도 간지러운 것 같고 그래서 다른 병원에서도 검사받아봤어요. 근데 또 정상이라고 나오더라고요. 검사 결과가 믿을 수가 없어서 이번에는 큰 병원에서 검사를 한 번 더 받고 싶어서 진료받으러 왔어요.\n• 의사 : 네 잘 알겠습니다.", "images": [], "options": ["전환장애", "인위성 장애", "신체이형장애", "신체증상장애", "질병불안장애"], "answer": 4, "explanation": "환자는 현재 에이즈가 있다는 생각에 사로잡혀 두려워하고 있지만, 검사 결과에선 음성으로 나오고, 이를 믿지 못하고 반복적인 검사를 요구하고 있습니다. 이는 질병불안장애의 전형적인 모습입니다.1) 전환장애는 심리적 갈등 등 스트레스 상황에서 갑작스럽게 발생하는 기능의 상실이 특징으로 해당 문제에선 특별한 기능의 상실이 있다고 보기 어렵습니다.2) 인위성 장애는 꾀병과 비슷하지만 다른 병으로, 의도적으로, 그러나 무의식적으로 병원행태를 보여 병을 꾀하고, 꾸미지만, 꾀병과는 달리 의식적인 이득이 없는 것이 특징입니다. 이 문제에선 증상을 만들어내려는 환자의 행동이 보이지 않는다.3) 신체이형장애는 정상인 특정 신체부위에 변형이나 결손이 있다는 생각에 집착하는 장애이다. 이 문제에선 특정 신체부위에 집착하는 모습은 보이지 않는다.4) 신체증상장애는 존재하지 않는 증상에 대해 호소한다는 점에서 헷갈리기 쉬우나, 신체증상장애는 환자가 호소하는 신체증상이 있으며 이를 통해 고통스럽고 일상생활에 지장이 간다는 점을 주장한다는 점과 달리 이 문제에서 환자는 증상보다는 특정 질병에 대해 걱정하고 그에 대한 검사를 반복적으로 요구하는 모습에서 배제할 수 있습니다."}, {"major": "신체증상 및 관련장애", "minor": "전환 장애(기능성 신경증상 장애)", "qnum": "01", "question": "39세 여자가 다리가 마비되고 갑자기 목소리가 나오지 않아 병원을 찾았다. 남편의 외도 문제로 남편과 다투다 갑자기 생긴 증상이다. 여러 의학적 검사에서 이상소견 나타나지 않았다. 적절한 치료 계획은?", "textbox": "", "images": [], "options": ["반복적인 뇌영상검사", "이차적 이득 증진", "병자역할 증진", "증상 직면", "암시"], "answer": 4, "explanation": "전환 장애는 심리적 갈등이 원인이 되어 무의식적으로 일어나는 수의운동 및 감각 장애를 일으킵니다. 정신치료나 행동치료는 회복을 촉진시키며, 무엇보다도 환자-의사 관계를 공고히 하는 것이 치료의 관건입니다. 설득하고 암시를 주며 스트레스나 갈등을 줄여주는 것이 도움이 됩니다. 반복적인 뇌영상검사는 병자역할을 증진시키며, 병자역할 및 이차적 이득 증진은 증상을 악화시킵니다."}, {"major": "신체증상 및 관련장애", "minor": "전환 장애(기능성 신경증상 장애)", "qnum": "02", "question": "47세 여자가 남편과 다툰 이후 갑자기 다리가 마비되어 걷지 못하였다. 뇌영상검사, 신경학적 검사, 혈액검사는 정상이었다. 신체질환으로 치료를 받은 적은 없었으나 8개월 전부터 우울장애로 치료받고 있었다. 평소 내성적이었고 사람을 만나는 것을 꺼려하여 사회생활 적응에 어려움이 많았다. 상속 받은 부동산 문제로 1년 전부터 재판이 진행 중이었다. 남편은 모두 자신의 잘못이라며 환자에게 집안일도 시키지 않았고 평소와 다르게 지나친 관심을 보이고 있었다. 좋은 예후를 시사하는 소견은?", "textbox": "", "images": [], "options": ["갑작스런 마비", "진행 중인 재판", "동반된 우울장애", "남편의 관심 정도", "사회생활 적응 정도"], "answer": 0, "explanation": "예전에는 출제되지 않았던 전환장애의 예후에 대한 문제가 나와서 많은 학생들이 당황하였던 문제입니다.\n* 좋은 예후\n• 급성 발병\n• 원인이 되는 스트레스 요인이 뚜렷함\n• 병전 적응 정도가 좋음\n• 내과적 질환(-) & 다른 정신과적 장애(-)\n• 법적인 문제가 없을 때"}, {"major": "신체증상 및 관련장애", "minor": "전환 장애(기능성 신경증상 장애)", "qnum": "03", "question": "19세 여자가 어머니에게 심한 꾸지람을 들은 후 갑자기 생긴 하지마비로 병원에 왔다. 그녀는 증상에 대해서 별로 걱정이 없어 보였다. 깊은힘줄반사, 뇌컴퓨터단층촬영과 근전도검사는 정상이었다. 치료 기법은?", "textbox": "", "images": [], "options": ["습관반전(habit reversal)", "환기(ventilation)", "홍수법(flooding)", "체계적탈감작(systematic desensitization)", "노출과 반응방지(exposure and response prevention)"], "answer": 1, "explanation": "스트레스 직후에 생긴 마비증상으로, 건반사, 근전도, 영상검사의 이상소견은 보이지 않고 있습니다. 또한 스스로는 걱정이 없다는 특징으로 보아 전환 장애입니다. 전환장애는 benzodiazepine 계통의 약물치료 뿐만 아니라, 지지적 정신치료, 환기요법, 암시요법, 행동치료 등의 치료방법도 사용할 수 있습니다.\n환기요법은 (의식 속의) 갈등, 의문을 털어놓으면서 긴장이 풀리도록 하는 지지적 정신치료방법입니다.\n1) 습관반전이란 틱장애/뚜렛장애에서 사용되는 행동요법입니다.\n3), 4) 홍수법, 체계적탈감작은 공포증의 치료에 사용됩니다.\n5) 노출과 반응방지는 강박증 치료 방법입니다."}, {"major": "신체증상 및 관련장애", "minor": "전환 장애(기능성 신경증상 장애)", "qnum": "04", "question": "32세 여자가 오른손을 움직일 수 없다고 응급실에 왔다. 2시간 전 남편과 심하게 다 nce)", "감정표현불능증(alexithymia)"], "answer": 2, "explanation": "심각한 증상에 불구하고 대수롭지 않은 태도를 보이는 것을 만족스러운 무관심(la belle indifference)이라 합니다. 전환 장애의 일부 환자에서 관찰되는 모습입니다."}, {"major": "신체증상 및 관련장애", "minor": "전환 장애(기능성 신경증상 장애)", "qnum": "08", "question": "45세 여자가 갑자기 발생한 오른쪽 팔의 마비와 구음 장애를 주소로 응급실을 방문하였다. 당일 저녁에 시어머니와의 갈등으로 남편과 부부싸움을 하던 중 남편이 던진 베개에 오른쪽 팔을 맞고 난 후 증상이 발생하였다. 내원 후 시행한 신경학적 신체검진 및 각종 검사는 모두 정상이었다. 환자의 증상에 관한 설명으로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["남편과의 갈등이 신체증상으로 표현된 것이다.", "2차적 이득은 증상의 지속과는 무관하다.", "감각장애와 운동마비가 주된 신체증상이다.", "주변에서 관심을 가질 경우 증상은 심해진다.", "증상은 주로 갑작스럽게 극적으로 나타난다."], "answer": 1, "explanation": "2차적 이득은 증상의 지속과 관계있습니다."}, {"major": "신체증상 및 관련장애", "minor": "전환 장애(기능성 신경증상 장애)", "qnum": "09", "question": "40세 여자가 갑자기 오른손에 힘이 빠지고 어지럽다고 응급실에 왔다. 설 연휴에 시댁에 가지 않겠다고 남편과 언쟁 중 증상이 생겼다. 신경학적 진찰, 뇌 자기공명영상, 뇌파검사는 정상이었다. 과거에도 명절을 앞두고 이런 증상이 자주 있었다고 하였다. 면담 후 증상이 사라져 귀가를 권유했으나, 환자는 입원을 원하였다. 향후 치료 전략은?", "textbox": "", "images": [], "options": ["암시", "입원", "재검사", "이차이득 최소화", "노출과 반응방지"], "answer": 3, "explanation": "전형적인 전환장애 증례로 면담 후 증상이 사라졌지만 환자가 입원하기를 원하고 있습니다. 전환환자의 치료는 치료기간을 짧게 하여 환자 역할이 심해지지 않도록 하고 이차적 이득의 만족을 차단시키는 것이 중요합니다."}, {"major": "신체증상 및 관련장애", "minor": "전환 장애(기능성 신경증상 장애)", "qnum": "10", "question": "갑자기 목소리가 나오지 않고 오른쪽 편마비가 발생한 58세 여자가 내원하였다. 다음 중 이 환자의 증상이 기질성보다 심인성임을 시사한 소견에 해당하지 않는 것은?", "textbox": "", "images": [], "options": ["며느리와 분가 문제로 다툰 후 발생하였다.", "걱정하는 간호사의 물음에 “괜찮습니다. 선생님이 알아서 해주시겠지요.”라고 차분한 목소리로 대답하였다.", "신경 해부학적으로 설명하기 힘든 부위에 마비가 발생하였다.", "혼자 있는 병실에서 요실금이 있었다.", "근육 위축이나 연축을 보이지 않는다."], "answer": 3, "explanation": "수의운동 또는 감각기관의 증상을 호소함\n1) 심리적 발병계기가 뚜렷\n2) la belle indifference(만족스러운 무관심)\n3) 신경학적 근거에 맞지 않고 제멋대로, 암시에 의해 잘 생기고 또 잘 해소됩니다.\n4) 주위에 사람이 있으면 증상이 심해지는 것이 전환 장애의 특징입니다."}, {"major": "신체증상 및 관련장애", "minor": "전환 장애(기능성 신경증상 장애)", "qnum": "11", "question": "다음 중 전환 장애 환자에서 흔히 사용되는 방어기제는?", "textbox": "", "images": [], "options": ["상징화", "억제", "유머", "취소", "투사"], "answer": 4, "explanation": "전두엽동(전환, 투사, 동일시, 억  장애", "minor": "성도착증", "qnum": "02", "question": "중년 이상에서 처음 발생할 경우 치매를 의심해 보아야 하는 성도착증은?", "textbox": "", "images": [], "options": ["관음증", "노출증", "성적피학증", "의상도착증", "여성물건애"], "answer": 1, "explanation": "노출증이 중년 이상의 연령에서 처음 발생할 때 치매를 암시할 수 있습니다."}, {"major": "성 및 성 장애", "minor": "성도착증", "qnum": "03", "question": "다음 성도착증 가운데 법적 문제가 되는 경우가 가장 많은 형은?", "textbox": "", "images": [], "options": ["의상도착증", "동물기호증", "성적가학증", "소아성애증", "여성물건애"], "answer": 3, "explanation": "법적 문제가 되는 경우 중 소아성애증(기아증, pedophilia)이 가장 많습니다. 우리나라에서도 많은 문제가 됐습니다."}, {"major": "성 및 성 장애", "minor": "성별 불쾌감", "qnum": "01", "question": "21세 남자가 미니스커트 차림으로 성전환수술을 받고 싶다고 왔다. 어려서 주로 여자아이들과 인형을 갖고 놀았으며 남자아이들과 놀거나 운동을 한 적은 없었다. 동성애자가 아니라 잘못 태어난 여성이기 때문에 이성교제로 남자친구를 사귄다고 하였다. 진단은?", "textbox": "", "images": [], "options": ["성주체성 장애", "성기능장애", "의상도착증", "소아성애증", "여성물건애"], "answer": 0, "explanation": "자신의 생물학적 성과 성역할에 지속적인 불편을 가지고 있는 것으로 보아 성주체성 장애(=성별 불쾌감)의 환자입니다. 주로 남성에 많고 원인은 생물학적인 것보다 정신사회적이라는 것이 지배적인 의견입니다."}, {"major": "성 및 성 장애", "minor": "성별 불쾌감", "qnum": "02", "question": "8세 남아이가 여자 옷을 입고 화장놀이를 좋아하는 것을 이상하게 여긴 엄마가 병원에 데리고 왔다. 아이는 자라서 엄마처럼 아름다운 여성이 되기를 바란다고 한다. 이 환아의 성 장애는?", "textbox": "", "images": [], "options": ["성기능장애", "의상 도착증", "여성물건애", "성주체성 장애", "성지남력 장애"], "answer": 3, "explanation": "이 환아의 경우 성적 흥분을 위해 비정상적이고 괴이한 상상이나 대상 또는 행위를 필요로 하는 것이 아니므로 성도착증은 아닙니다. 성지남력 장애는 성에 대한 지남력, 즉 남자와 여자의 차이를 인지하지 못하는 것입니다. 성주체성 장애(=성별 불쾌감)는 자신의 생물학적 성이나 성적 역할에 대하여 지속적인 불편과 부적당하다는 느낌, 또는 성전환 수술을 받고 반대의 성으로 살고 싶다는 욕망이 지속되는 것으로 신체적으로 양성인 경우는 제외합니다."}, {"major": "섭식장애", "minor": "회피제한적 음식 섭취장애", "qnum": "01", "question": "19세 여자가 1년 전부터 시작된 체중감소로 어머니와 함께 병원에 왔다. 1년 전 다이어트를 시작하였고, 체중을 46kg에서 33kg까지 줄였다고 한다. 식탐이 과도하여 또래가 먹는 4배 정도의 음식을 먹고, 과식 후에는 속이 불편하다며 구토를 한다. 자신의 방에 다량의 과자나 음식을 감추어 두었다. 최근에는 편의점에서 과자를 훔쳐 경찰조사를 한 차례 받기도 하였다. 주변에서 조금이라도 자신에게 싫은 소리를 하면 받아들이지 못하고, 융통성이 없다는 이야기를 자주 듣는다. 머리카락이 빠져 머리숱은 적고 몸에서는 솜털이 보인다. 생리는 최근 수개월 동안 없다고 한다. 키 159cm, 몸무게 36kg이다. 혈압 90/50mmHg, 맥박 65회/분, 호흡 20회/분, 체온 36.2℃이다. 검사 결과는 다음과 같다. 진단은?", "textbox": "혈색소 12.1g/dL, 백혈구 4,270/mm³, 혈소판 104,000/mm³, Na⁺/K⁺/Cl⁻ 135/4.1/102mEq/L, 갑상샘자극호르몬 1.71mIU/L(참고치, 0.34~4.25), 유리 T₄ 0.8ng/dL(참고치, 0.7~2.0)", "images": [], "options": ["절도광", "저장장애", "폭식장애", "신경성폭식증", "신경성식욕부진증"], "answer": 4, "explanation": "19세 여성이 체중감소를 주소로 내원하였습니다. 1년 전 다이어트를 시작한 이후 BMI 13 미만의 극심한 저체중을 유지하고 있고, 체중증가에 대한 극심한 두려움이 있으며, 폭식 등에 대한 강한 집착을 보이고, 과식 후 구토를 반복하는 행동을 보입니다. 또한 탈모, 솜털(lanugo), 무월경, 저혈압, 백혈구 및 혈소판 감소 등 영양결핍으로 인한 신체적 합병증이 발생한 상황입니다. 이는 전형적인 신경성 식욕부진증의 양상으로, 가장 적절한 진단은 신경성식욕부진증입니다.4) 신경성폭식증 : 폭식과 구토가 반복되는 점을 동일하나 대개 체중이 정상범위입니다.3) 폭식장애 : 구토와 같은 부적절한 보상행동이 없고 과체중인 경우가 많습니다."}, {"major": "섭식장애", "minor": "회피제한적 음식 섭취장애", "qnum": "02", "question": "다음 중 신경성 대식증 환자에서 흔히 볼 수 있는 증상은?", "textbox": "", "images": [], "options": ["심한 체중 감소", "무월경", "불안장애", "자신의 외모에 대한 무관심", "갑상선 기능 이상"], "answer": 2, "explanation": "1) 체중이 심하게 감소되지 않습니다.2) 무월경도 드뭅니다.3) 신경성 대식증 환자들은 기분의 변화폭이 크며 우울증과 불안장애가 흔히 동반됩니다.4) 신경성 식욕부진증에 비해 외모나 자신의 성적 매력에 대해 관심이 많습니다.5) 식도손상, 혈중 amylase 농도 증가, 부정맥, 심근증 등이 생길 수 있으나 갑상선 기능에 대한 기술은 없습니다."}, {"major": "섭식장애", "minor": "회피제한적 음식 섭취장애", "qnum": "03", "question": "23세 여자가 최근 1년 동안 몸무게가 15kg 가량 줄었다고 병원에 왔다. 최근 5개월 동안 몸무게가 느는 것을 극도로 걱정해서, 반복적으로 폭식을 한 이후에 구토를 하였고 빈번하게 이뇨제를 복용했다. 최근 6개월 동안 생리가 없다. 체질량지수는 15kg/m²이다. 진단은?", "textbox": "", "images": [], "options": ["제거장애", "폭식장애", "신경성폭식증", "폭식/제거형 신경성식욕부진증", "제한형 신경성식욕부진증"], "answer": 3, "explanation": "1년 동안 체중이 15kg 줄어 현재 BMI가 15kg/m²로 극심한 저체중 상태이며, 체중증가에 대한 극심한 두려움이 있기 때문에 신경성 식욕부진증을 의심할 수 있습니다. 최근 5개월 동안 폭식 및 제거행동이 반복적으로 존재했다는 점에서 폭식/제거형 신경성 식욕부진증이 있을 것으로 생각됩니다. 참고로 환자의 BMI는 15kg/m²로 중증에 해당합니다."}, {"major": "섭식장애", "minor": "회피제한적 음식 섭취장애", "qnum": "04", "question": "5세 여아가 또래 아이에 비해 지나치게 왜소한 것 같다며 어머니가 여아를 데리고 병원에 왔다. 출생 직후부터 잘 먹지 않아서 어머니가 젖을 먹이는 것이 쉽지 않았다고 한다. 생후 11개월 무렵 어머니가 약을 복용하면서 2일 정도 환아에게 수유를 중단한 적이 있었다. 이후 환아에게 다시 젖을 물려도 뱉어내며 먹지 않으려고 해 애를 먹었다고 한다. 2세에 우연하게 국수는 쉽게 먹는다는 것을 알게 되었고, 그 후로는 국수, 계란환자, 오이, 사과 반쪽 정도로 한 끼 식사를 하고, 한번 식사하는 데 2시간 정도 걸린다고 한다. 어려서부터 자꾸 보채고 울어서 키우기가 어려웠으며, 어머니와 먹는 것을 가지고 실랑이를 하는 경우가 많아 어머니가 밥을 먹지 않는 환아의 입술을 숟가락으로 때리는 일도 있었다고 한다. 키 105cm(15~25백분위수), 체중 15kg(3~5백분위수)이다. 진단은?", "textbox": "", "images": [], "options": ["지적장애", "신경성식욕부진증", "자폐스펙트럼장애", "사회의사소통장애", "회피/제한적 음식섭취장애"], "answer": 4, "explanation": "또래에 비해 왜소한 것을 주소로 내원한 5세 여아입니다. 출생 직후부터 음식 섭취에 어려움을 보였으며, 보호자의 노력에도 섭식에 지속적 어려움을 겪고 있습니다. 이로 인해 부적절한 성장이 발생하고 있는 것으로 보아 회피/제한적 음식섭취장애로 진단할 수 있습니다. 환아의 입술을 숟가락으로 때리는 행위 역시 식사와 관련된 부정적 경험으로서 병의 경과에 악영향을 미쳤다고 추론할 수 있습니다. 해당 환자는 자신의 체형에 대해 병적 왜곡은 가지고 있지 않습니다."}, {"major": "섭식장애", "minor": "회피제한적 음식 섭취장애", "qnum": "05", "question": "23세 여자가 살을 빼고 싶다며 병원에 왔다. 대학교 홍보 모델인 친구에게 \"너도 살 빼서 해봐.\"라는 말을 들은 뒤로 닭가슴살, 삶은 달걀, 샐러드만 먹으면서 2개월 동안 8kg을 뺐다. 날씬해진 모습을 거울에 비춰볼 때마다 기분이 좋아지고 자존감이 높아졌다. 내년 초 모델 지원을 목표로 살을 더 빼고 싶은데 6개월 전부터는 체중이 빠지지 않아 스트레스를 받았다. 5개월 전부터 닭가슴살이 지겨워 피자 3판을 1시간 만에 목구멍에 밀어 넣듯 먹고 나서 후회하며 토하는 일이 이틀에 한 번 있었다. 폭식한 다음 날에는 밥을 먹는 자신이 싫어서 하루 종일 굶었다. 어렵게 뺀 살이 다시 찔까 봐 불안하고, 하루 종일 밥을 먹을지 말지를 고민하는 게 힘들고 짜증 난다고 한다. 키 171cm, 체중 63kg이다. 진단은?", "textbox": "", "images": [], "options": ["이식증", "제거장애", "신경성폭식증", "회피/제한적 음식섭취장애", "신경성식욕부진증, 폭식/제거형"], "answer": 2, "explanation": "5개월 전부터 많은 양의 음식을 폭식하고 이를 보상하기 위해 곧바로 토를 한 후 다음 날에 아무것도 먹지 않는 모습이 반복되는 모습이 보이며, 체중과 체형이 자아평가에 과도한 영향을 미치는 모습이 보입니다. 이는 신경성폭식증의 임상 양상과 유사합니다. 2) 구토와 하제 사용 등 제거행동만 있고 폭식은 없는 경우에 진단됩니다. 4) 주로 유아나 소아기에 나타나는 장애로, 음식을 앞에 두고도 먹지 않고 기피하는 모습을 보입니다. 5) 신경성식욕부진증과 신경성폭식증, 폭식/제거형은 저체중 여부로 감별할 수 있습니다. 이 환자는 BMI 21.5로 정상범위에 속해있으므로, 신경성폭식증에 더 합당합니다."}, {"major": "섭식장애", "minor": "회피제한적 음식 섭취장애", "qnum": "06", "question": "24세 여자가 8개월 전부터 시작된 잦은 폭식과 반복적인 구토로 병원에 왔다. 고교 시절에는 다이어트를 하면서 체중을 22kg 줄였고, 이후 약 11개월 동안 생리가 없었다. 2년 전 부터는 먹는 양이 늘어나 짧은 시간 동안 속이 불편할 만큼 음식을 먹고 체중도 12kg 정도 늘었다. 살찌는 것이 싫어서 자주 끼니를 거르기도 하나, 그 후에는 한꺼번에 많은 양의 음식을 먹는다. 8개월 전부터 체중이 늘어날 걱정때문에 식사 후에 의도적으로 구토를 하기 시작하였다. 처음에는 간헐적으로 구토를 하였으나, 5개월 전부터는 식사를 하면 속이 더부룩하고 배가 불러서 식후에 거의 매번 토한다고 한다. 식욕을 조절하지 못하는 자신이 한심하다고 생각해 우울해했다. 키 160cm, 체중 54kg이다. 진단은?", "textbox": "", "images": [], "options": ["폭식장애", "회피적/제한적 음식섭취장애", "신경성폭식증", "신경성식욕부진증, 폭식/제거형", "신경성식욕부진증, 제한형"], "answer": 2, "explanation": "현재 BMI가 21.09kg/m²로 정상 범위 상태이며, 잦은 폭식과 체중 증가를 억제하기 위한 구토(부적절한 보상행동)를 하기 때문에 신경성대식증(신경성폭식증)을 의심할 수 있습니다. 이러한 행동이 5개월 동안 식후 거의 매번 발생하며, 자아평가에도 영향을 끼치고 있으므로 신경성대식증(신경성폭식증)으로 진단할 수 있습니다. 신경성식욕부진증의 경우 체중이 정상수준에 미치지 못하며, 폭식장애는 폭식 후 구토와 같은 보상행동이 없습니다."}, {"major": "섭식장애", "minor": "회피제한적 음식 섭취장애", "qnum": "07", "question": "다음 중 신경성 대식증 환자의 치료에 관한 설명으로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["약물치료로는 항우울제 사용이 효과적이다.", "좌절이나 죄책감과 관련된 느낌을 말하도록 격려해 준다.", "면담 시 환자를 비판하지 않는다.", "정신치료로는 정신분석치료가 가장 효과적이다.", "신경성 식욕부진증보다 치료에 대한 협조도가 높다."], "answer": 3, "explanation": "1) 약물치료로는 항우울제(TCA, MAOI, SSRI)가 효과적인 경우가 많습니다.2) 이미 죄책감과 부끄러움으로 분노, 이상한 기분, 자제력의 상실과 관련된 느낌과 행동을 말하도록 격려해 주어야 합니다.3) 면담 시 환자를 비판하거나 나무라지 말아야 합니다.4) 정신치료로는 인지행동치료가 가장 효과적이며 행동에 대한 약속에 따라 거식 전의 생각이나 느낌에 대해 탈감작 프로그램을 진행해야 합니다."}, {"major": "섭식장애", "minor": "회피제한적 음식 섭취장애", "qnum": "08", "question": "28세 여자가 1년 전부터 폭식과 구토를 자주 한다고 병원에 왔다. 화가 나거나 조금만 먹겠다고 다짐한 날에는 폭식이 더 심해졌고 자책감과 우울감이 생긴다고 하였다. 체중 증가를 두려워하였다. 키 165cm, 몸무게 52kg이었다. 식사에 대한 태도를 교정하기 위한 치료는?", "textbox": "", "images": [], "options": ["정신분석", "생체되먹임", "인지행동치료", "노출과 반응방지", "단기역동정신치료"], "answer": 2, "explanation": "폭식 및 그에 대한 보상행동으로 구토가 나타나고 있습니다. BMI는 19로 정상범위이기 때문에 신경성 대식증으로 진단이 가능합니다. 이에 대한 치료로는 인지행동치료가 가장 효과적인 치료입니다."}, {"major": "섭식장애", "minor": "회피제한적 음식 섭취장애", "qnum": "09", "question": "23세 여자가 살을 빼야 한다는 스트레스가 심하고 우울하여 병원에 왔다. 2년 전부터 스트레스를 받고 나면 주체할 수 없이 많이 먹고, 먹은 뒤에는 후회를 하며 손가락을 입에 넣어 구토하기를 반복해 왔다. 끼니를 거를 때가 많고 이뇨제와 관장약도 자주 사용해 왔다. 체중 55kg, 신장 160cm이다. 진단은?", "textbox": "", "images": [], "options": ["폭식장애", "야식증후군", "신경성폭식증", "신경성식욕부진증, 제한형", "신경성식욕부진증, 폭식/제거형"], "answer": 2, "explanation": "3개월 이상 반복된 폭식과 제거행동(구토, 이뇨제, 관장약)을 보이나, 체중은 정상범위이기 때문에 신경성 폭식증 환자입니다. 섭식장애 환자의 2가지 감별 포인트(제거행동 유무, 정상체중 여부)를 기억해두세요!1) 폭식장애: 폭식 후 죄책감을 느끼지만 제거행동, 금기 등의 보상행동이 없습니다.2) 야식증후군: 3개월 이상 반복적으로 자다가 깨서 먹거나 저녁 식사 후 과식을 하며, 먹은 것에 대해 인식하고 있고, 야간 식이로 심각한 스트레스를 받습니다.4), 5) 신경성 식욕부진증: 체중  적, 직장에서도 졸음 때문에 집중하기 힘듦 등), 탈력발작(화를 내거나 크게 웃을 때 갑자기 힘이 빠져 고개를 떨어뜨림), 수면마비(자고 일어났을 때 가끔씩 몸이 움직여지지 않음) 등의 양상이 오래 지속되고 있습니다. 또한 야간 수면다원검사에서 렘수면 잠복기가 15분 이하이므로 기면증으로 진단할 수 있습니다."}, {"major": "수면과 수면-각성장애", "minor": "이상수면", "qnum": "02", "question": "다음 중 기면병에서 가장 흔한 증상은?", "textbox": "", "images": [], "options": ["이갈이", "탈력발작", "수면무호흡", "수면마비", "입면환각"], "answer": 1, "explanation": "주체할 수 없이 쏟아지는 잠(sleep attack) 혹은 과도한 졸림증과 탈력발작(cataplexy)을 주 증상으로 하는 기면병은 수면마비, 입면환각과 같은 부수적인 증상을 동반하고 불규칙한 야간수면을 보입니다. 기면병 환자의 70~80%에서 탈력발작을 경험하고, 수면마비와 입면환각은 기면병 환자의 20~30%에서 경험합니다."}, {"major": "수면과 수면-각성장애", "minor": "이상수면", "qnum": "03", "question": "57세 여자가 6개월 전부터 잠들기가 어렵다며 병원에 왔다. 10년 전 폐경이 되었고 몇 년간 얼굴 화끈거림과 갑작스러운 발한이 있다가 저절로 소실되었다고 한다. 밤에 자려고 누우면, 쉽게 잠이 들기 어려웠으며, 새벽녘 잠에서 깨면 다시 잠들기가 힘들었다고 한다. 밤 10시부터 새벽 6시까지 잠자리에 누워있으나 실제 수면 시간은 4시간 정도이며, 기상 시 개운하지 않은 느낌이 계속되었다고 한다. 수면 전 다리를 움직이고 싶은 기분이나 우울감 등에 대해서는 부인하였다. 함께 잠자리에 드는 남편에 따르면, 수면 중 코골이나 무호흡 등은 없었다고 한다. 다만 불면으로 주간에 졸림과 피로를 호소하였다. 치료는?", "textbox": "", "images": [], "options": ["광치료", "부부치료", "자극조절", "체계적 탈감작", "안구운동민감감소처리"], "answer": 2, "explanation": "잠이 잘 오지 않고, 잠에 들었다가도 금방 깨는 등 불면장애에 해당하는 모습을 보이는 환자입니다. 불면장애의 치료로는 행동 및 인지요법, 이완요법, biofeedback, 수면제한, 자극조절법 등을 사용해 볼 수 있습니다. 환자의 경우 밤 10시에 미리 누워 억지로 잠을 청하는 행동을 취하고 있기 때문에 우선은 자극조절법을 통해 잠자리를 잘 때에만 이용하게 하고 잠이 오지 않으면 일어나야 합니다. 이를 통해 조건화된 각성을 줄일 수 있습니다."}, {"major": "수면과 수면-각성장애", "minor": "이상수면", "qnum": "04", "question": "17세 여자가 6개월 전부터 낮 졸음이 너무 심해서 병원에 내원하였다. 밤에 10시간 이상 자도 낮에 졸린다고 했다. TV를 보다가 크게 웃으면 몸에 힘이 풀려서 쓰러지기도 했다. 잠들 때 종종 환청이 들린다고 한다. 주간 졸음의 치료제로 적합한 것은?", "textbox": "", "images": [], "options": ["Diazepam", "Phototherapy", "Clonazepam", "Methylphenidate", "CPAP(continuous positive airway pressure)"], "answer": 3, "explanation": "1개월 이상 낮의 과도한 졸음을 보이고, 수면 발작, 졸도발작, 입면환각의 임상 양상을 보아 기면증(narcolepsy)을 의심할 수 있습니다. 기면증의 치료는 중추신경자극제로 modafinil, methylphenidate, amphetamine, pemoline 등이 주로 사용됩니다."}, {"major": "수면과 수면-각성장애", "minor": "이상수면", "qnum": "05", "question": "35세 여자가 항상 피곤하다며 병원에 문에 고생하고 다리에 힘이 풀려 주저앉는 증상(탈력발작)은 발작수면(기면증)의 특징적인 증상입니다. 악몽을 자주 꾸는 것은 REM 수면 억제가 정상적으로 이루어지지 못하는 기면증의 생리에 의해서 생겼다고 볼 수 있습니다.3) 주기사지운동장애(Periodic limb movement(PLM) disorder) : 수면 중 다리와 발목의 근육이 급작스럽고 상동적으로 수축되는 것4) 지연 수면위상 증후군(Delayed Sleep Phase Syndrome) - 생체시계와 일상생활 패턴이 일치하지 않는 현상"}, {"major": "수면과 수면-각성장애", "minor": "이상수면", "qnum": "09", "question": "57세 여자가 잠이 오지 않는다며 병원에 왔다. 7개월 전 남편과 크게 다툰 이후 잠을 못 자기 시작했지만, 현재는 부부 사이도 좋고 기분도 괜찮다고 한다. 그러나 그때부터 잠은 점점 더 오지 않고 잠이 들었다가도 금방 깬다고 한다. 푹 자고 싶다는 생각에 졸리지 않아도 저녁 8시부터 미리 누워 억지로 잠을 청하고, 새벽에 일찍 깨면 더 자려고 아침 8시까지 계속 누워있다고 한다. 그러나 실제 자는 시간은 4시간 정도인 것 같다고 한다. 침실의 온도와 밝기는 적당하며, 침실에서는 잠을 청하는 것 외의 활동은 하지 않았다. 코골이, 주간졸음, 취침 시 다리의 이상 감각은 없었다. 술과 담배는 하지 않고, 카페인 음료는 마시지 않는다. 치료는?", "textbox": "", "images": [], "options": ["부부치료", "수면제한", "이완요법", "자극제한", "최면치료"], "answer": 1, "explanation": "환자에게 별 다른 정신질환이나 의학적 상태가 없고, 적절한 수면 기회에도 불구하고 수면의 양과 질에 대한 불만족으로 내원하였기 때문에 불면증을 가장 의심할 수 있습니다. 불면장애의 치료는 불면의 원인을 밝혀 이를 교정해주는 것이 가장 중요하며, 행동 및 인지 요법, 이완요법, biofeedback, 역설적 노력, 수면제한, 자극조절법 등이 있고 이를 환자의 특성에 맞게 적용해야 합니다. 환자는 현재 일상의 심리적 스트레스로 불면을 겪는 것이 아니기 때문에 부부치료나 이완요법은 효과가 떨어질 것으로 예상됩니다. 수면을 방해하거나 잘못 유도하는 생활습관도 없기 때문에 자극제한도 정답에서 배제할 수 있겠습니다. 따라서 가장 적합한 치료는 수면제한이 되겠습니다."}, {"major": "수면과 수면-각성장애", "minor": "이상수면", "qnum": "10", "question": "60세 남자가 낮에 심하게 졸려하며 집중력이 떨어져 병원에 왔다. 부인 말로는 잠을 잘 때 심하게 코를 골며 숨을 쉬지 않는 현상이 수차례 있었다고 하였다. 우선적인 치료는?", "textbox": "", "images": [], "options": ["수면박탈", "수면위생교육", "수면제 투여", "체계적 둔감", "수면자세 지도"], "answer": 4, "explanation": "심하게 코를 골며 숨을 쉬지 않는 현상은 수면 무호흡증입니다. 수면자세를 지도하고, 비만 환자의 경우 체중을 줄이는 것이 가장 우선적인 치료입니다."}, {"major": "수면과 수면-각성장애", "minor": "이상수면", "qnum": "11", "question": "19세 남자가 낮에 주체할 수 없이 쏟아지는 잠 때문에 수업을 들을 수 없다고 왔다. 대화 중 크게 웃다가 갑자기 주저앉은 적이 여러 번 있었고, 잘 때 자주 가위에 눌린다고 하였다. 검사는?", "textbox": "", "images": [], "options": ["근전도", "혈장 철", "심박변이도검사", "수면잠복기반복검사", "뇌 자기공명영상촬영"], "answer": 3, "explanation": "낮에 지나치게 졸리는 증상과 함께 자기도 모르게 갑자기 잠을 자고, 탈력발작과 수면마비 등의 증상이 나타나므로 기면증을 의심할 수 있습니다. 기면증의 진단은 수면다원검사 및 수면잠복기반복검사(Multiple Sleep Latency Test, MSLT)를 통해 할 수 있습니다."}, {"major": "수면과 수면-각성장애", "minor": "이상수면", "qnum": "12", "question": "뚱뚱한 45세 남자가 충분한 수면시간에도 불구하고 아침에 일어나면 머리가 멍하고 잠을 잔 것 같지 않다고 병원에 왔다. 부인의 말에 의하면 평소 남편이 심하게 코를 고는데 가끔 코를 고는 소리가 들리지 않으면 죽지 않았는지 걱정되었다고 하였다. 이 환자에 대한 조치로 옳은 것은?\n가. 금주를 권한다.\n나. 바로 누운 수면자세를 권한다.\n다. 운동을 통한 체중감소를 시도한다.\n라. 증상이 지속되면 수면제를 처방한다.", "textbox": "", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 1, "explanation": "나. 복와위를 권합니다.\n라. 술과 안정제는 피해야 합니다."}, {"major": "수면과 수면-각성장애", "minor": "사건수면(수면수반증)", "qnum": "01", "question": "56세 여자가 잠을 자기가 어렵다며 병원에 왔다. 4개월 전부터 거의 매일, 가만히 누워 있으면 종아리에 뭔가 기어 다니는 듯해 다리를 움직이고 싶은 충동을 참을 수가 없다고 한다. 증상은 가만히 있으면 악화되고, 잠시 일어서거나 다리를 주무르면 호전된다. 수면다원검사 결과이다. 치료 약물은?", "textbox": "", "images": [], "options": ["루라시돈", "마그네슘", "멜라토닌", "아고멜라틴", "프라미펙솔"], "answer": 4, "explanation": "56세 여성이 수면장애를 주소로 내원하였습니다. 수면 직전 누워있을 때 종아리에 뭔가 기어다니는 느낌 및 움직이고 싶은 충동, 다리를 움직이거나 주무르면 완화되는 증상은 전형적인 하지불안증후군(Restless Legs Syndrome)의 임상 양상입니다. 하지불안증후군인 경우 도파민과 철 대사 장애로 인해 생기기 때문에, 치료 또한 일차약물로 프라미펙솔, 로피니롤과 같은 도파민 효현제를 사용합니다. 철결핍성 빈혈이 있다면 철분제 또한 효과적입니다. 마그네슘의 경우 보조적으로 사용되는 경우가 있으나 일차치료제로서의 근거는 부족합니다. 따라서 가장 적절한 치료 약물은 프라미펙솔입니다."}, {"major": "수면과 수면-각성장애", "minor": "사건수면(수면수반증)", "qnum": "02", "question": "6세 여아가 2개월 전부터 무서운 꿈에 깜짝 놀라 잠에서 깨면 가슴이 두근거렸고, 악몽으로 인해 다시 잠에 들기가 불안하고 무섭다고 하였다. 치료를 위해 장기간 복용이 가능한 약물은?", "textbox": "", "images": [], "options": ["Imipramine", "Carbamazepine", "Diazepam", "Fluoxetine", "Bupropion"], "answer": 0, "explanation": "악몽은 REM 수면 억제제인 삼환계 항우울제나 벤조디아제핀계의 약물을 사용할 수 있습니다. 벤조디아제핀계는 장기 사용 시 의존성의 위험이 있습니다."}, {"major": "수면과 수면-각성장애", "minor": "사건수면(수면수반증)", "qnum": "03", "question": "뇌의 산소소비량이 증가하고 호흡과 심박수 호흡의 변화가 심한 시기에 나타날 수 있는 것은?", "textbox": "", "images": [], "options": ["악몽", "몽유병", "유뇨증", "이갈이", "하지불편증후군"], "answer": 0, "explanation": "REM 수면 동안 나타나는 질환을 묻는 문제입니다. 꿈을 꾸는 시기인 REM 수면 동안 잠에서 깬 후 기억할 수 있는 악몽이 나타날 수 있고, 나머지 보기의 질환들은 NREM 수면 동안 발생하며 기상 후 기억하지 못합니다."}, {"major": "수면과 수면-각성장애", "minor": "사건수면(수면수반증)", "qnum": "04", "question": "40세 여자가 잠을 자기 어렵다며 병원에 왔다. 가만히 누워 있으면 다리를 움직이거나 주무르고 싶은 충동을 참기 어렵고, 자려고 하면 다리에 간질거리는 이상한 느낌이 들어 잠을 잘 수가 없다고 한다. 증상은 주로 정강이 부분에 있었으나, 가끔은 허벅지나 발바닥에도 있었다. 낮에 움직이고 있을 때는 증상이 전혀 없다고 한다. 혈액검사 결과는 다음과 같다. 치료는?", "textbox": "혈색소 11.1g/dL, 백혈구 8,700/mm³, 혈소판 230,000/mm³, 칼슘/인 9.2/3.7mg/dL, 요산 4.1mg/dL, 마그네슘 2.1mg/dL(참고치, 1.5~2.3), 철 68µg/dL(참고치, 41~141), 총철결합능 350µg/dL(참고치, 251~406), 페리틴 8ng/mL(참고치, 10~150), 갑상샘자극호르몬 2.25mIU/L(참고치, 0.34~4.25), T₃ 90ng/dL(참고치, 77~135), 유리 T₄ 1.3ng/dL(참고치, 0.8~1.7)", "images": [], "options": ["졸피뎀", "철분 제제", "레보티록신", "클로미프라민", "마그네슘 제제"], "answer": 1, "explanation": "다리가 간질거리는 이상 감각으로 수면에 방해를 받는 하지불안증후군 환자입니다. 혈액검사상 혈색소와 페리틴 수치가 감소되어 있습니다. 혈청 페리틴 수치가 50ng/mL 미만인 경우 철분 제제를 투여하는 것이 도움이 됩니다. 하지불안증후군의 치료는 철결핍성 빈혈이 있는지 확인하여 교정하는 것이 우선이고, 증상에 대한 약물치료로 도파민 효현제(Pramipexole, Ropinirole), L-dopa 등을 사용할 수 있습니다."}, {"major": "수면과 수면-각성장애", "minor": "사건수면(수면수반증)", "qnum": "05", "question": "5세 남아아가 자다가 이상 행동을 보여 병원에 왔다. 2달 전부터 자다가 새벽 1~2시경에 갑자기 깨어나 소리지르고 놀란 것처럼 보였다. 주위 사람을 알아보지 못하고 쉽게 진정되지 않는다고 하였다. 아침에 일어나서 전날 밤에 일어난 일을 기억하지 못한다고 하였다. 진단은?", "textbox": "", "images": [], "options": ["야경증", "발작수면", "몸서리발작", "호흡중지발작", "양성발작체위현기증"], "answer": 0, "explanation": "자다가 갑자기 깨어나 소리를 지르고 놀란 것은 야경증과 악몽 등을 생각할 수 있는 증상입니다. 새벽 1~2시에 발생한 점, 아침에 일어났을 때 기억하지 못하는 점은 야경증을 시사합니다."}, {"major": "수면과 수면-각성장애", "minor": "사건수면(수면수반증)", "qnum": "06", "question": "다음 중 악몽에 관한 설명으로 옳은 것은?", "textbox": "", "images": [], "options": ["잠든 직후 1시간 이내에 나타난다.", "다음날 아침에 아무것도 기억하지 못한다.", "불안이나 자율신경의 변화는 별로 없다.", "환각, 착란 등의 증상이 있다.", "학동기 남아에서 가장 흔하다."], "answer": 2, "explanation": "1) 수면 중반 이후, 주로 새벽에 발생\n2) 꿈 내용을 생생하게 기억할 수 있습니다.\n3) 자율신경계 항진은 야경증만큼 심하지 않습니다.\n4) 착란, 지남력 장애는 없습니다.\n5) 남녀 모두 성인에도 나타날 수 있으며 학동기 남아에 흔한 것은 야경증입니다."}, {"major": "수면과 수면-각성장애", "minor": "사건수면(수면수반증)", "qnum": "07", "question": "62세 남자가 2년 전부터 자다가 잠꼬대를 한다고 병원에 왔다. 꿈을 꾸면서 하는 말을 실제로 잠꼬대로 하는 경우가 많아서 같이 자는 배우자가 자주 깬다고 한다. 지난달에는 강도와 싸우는 꿈을 꾸다가 팔다리를 휘둘러 배우자가 맞기도 했다. 검사는?", "textbox": "", "images": [], "options": ["뇌척수액검사", "뇌파검사", "수면다원검사", "뇌 자기공명영상촬영", "근전도검사"], "answer": 2, "explanation": "잠꼬대만 있으면 큰 문제가 아니지만, 꿈의 내용을 실제로 실행하기도 한다는 점에서 렘수면 행동장애를 의심할 수 있습니다. 60대 남성이라는 점도 이 질환의 역학적 특성과 맞습니다. 진단을 위해서는 수면다원검사를 통해 REM 수면 시 근긴장도의 저하가 없음을 확인해야 합니다."}, {"major": "수면과 수면-각성장애", "minor": "사건수면(수면수반증)", "qnum": "08", "question": "34세 남자가 잠든 중에 일어나서 돌아다니다가 다친다는 증상을 주소로 내원하였다. 이 환자는 이전에도 잘 때 옆에서 자는 사람을 다치게 하곤 했는데 이때 격투하거나 싸우는 꿈을 꾸었다고 한다. 수면다원검사상 안구움직임이 많은 렘수면 상태였고 근 긴장도가 증가한 상태였다. 이 환자의 치료약은?", "textbox": "", "images": [], "options": ["Fluoxetine", "Clonazepam", "Propranolol", "Amitriptyline", "Methylphenidate"], "answer": 1, "explanation": "꿈의 내용을 구체적으로 실행하여 옆에 자는 사람을 다치게 하고, 렘수면 중 필요한 근긴장도 소실이 불완전하여 꿈의 내용을 실행하게 되는 렘수면 행동장애(REM sleep behavior disorder)로 진단할 수 있습니다. 치료는 clonazepam(carbamazepine도 가능)과 안전한 환경을 유지하는 것입니다."}, {"major": "수면과 수면-각성장애", "minor": "사건수면(수면수반증)", "qnum": "09", "question": "6세 남아이가 잠든 직후 1시간 만에 갑자기 일어나서 식은땀을 흘리며 소리를 지르고 멍한 상태로 여기저기 돌아다니다가 5분 정도 지난 후 다시 잠이 들었다고 한다. 아침에는 전날 밤의 일을 전혀 기억하지 못하였다. 1개월 전부터 비슷한 증상이 여러 차례 있었으나 심각하게 생각하지 않고 있었다고 한다. 이 환자의 장애에 관한 설명으로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["일반적으로 나이가 들면서 자연히 해소된다.", "우선 부모를 안심시키는 것이 중요하다.", "심한 경우 벤조디아제핀계 약물을 소량 투여한다.", "REM 수면단계에 일어나는 현상이다.", "감별 진단으로 수면경련발작(nocturnal seizure)이 있다."], "answer": 3, "explanation": "4) NREM stage 5) 측두엽 뇌전증의 증상일 수 있습니다."}, {"major": "수면과 수면-각성장애", "minor": "사건수면(수면수반증)", "qnum": "10", "question": "57세 여자가 잠을 자지 못한다며 병원에 왔다. 3개월 전부터 밤에 자려고 누우면 다리가 저리고 근질거리는 느낌이 들어서야 잠을 잘 수가 없다고 한다. 증상은 거의 매일 밤마다 나타났으나 낮 동안은 없었다. 다리를 주무르거나 움직이면 증상이 나아진다고 한다. 치료는?", "textbox": "", "images": [], "options": ["로피니롤", "멜라토닌", "퀘티아핀", "리스페리돈", "마그네슘 제제"], "answer": 0, "explanation": "수면 직전 하지의 근질거리는 이상감각 및 불편함이 느껴져 잠을 자지 못한 환자입니다. 다리를 주무르거나 움직이면 증상이 일시적으로 완화되는 증상과 종합해 볼 때 하지불안증후군으로 진단할 수 있습니다. 우선 철결핍성 빈혈이 있는지 확인하고 이에 대한 교정을 해야 합니다. 약물치료로는 dopamine agonist인 로피니롤(ropinirole), 프라미펙솔(pramipexole)을 사용해 볼 수 있으며 dopamine 항진을 위한 L-dopa/carbidopa도 사용해 볼 수 있습니다."}, {"major": "수면과 수면-각성장애", "minor": "사건수면(수면수반증)", "qnum": "11", "question": "71세 여자가 4년 전부터 시작된 불면증을 주소로 내원하였다. 자려고 누우면 다리가 근질거려 잠들기 어렵다고 한다. 다리를 움직이면 나아지지만 가만히 있으면 심해지며, 저녁에 증상이 심하다고 한다. 다음 중 적합한 약제는?", "textbox": "", "images": [], "options": ["할로페리돌", "리튬", "플루옥세틴", "레보도파", "이미프라민"], "answer": 3, "explanation": "저녁에 심하며 움직이면 나아지는 하지 불편감으로 인하여 수면이 방해되고 있으므로 하지불안증후군입니다. 치료약물로는 ropinirole, clonazepam, carbamazepine, baclofen (GABA agonist), L-dopa, opioid, propranolol, clonidine 등이 사용됩니다."}, {"major": "수면과 수면-각성장애", "minor": "사건수면(수면수반증)", "qnum": "12", "question": "68세 남자가 잠든 곳과 깨어난 곳이 다른 경우가 반복된다며 병원에 왔다. 7개월 전부터 수면 중에 잠꼬대를 많이 하거나 소리를 크게 지르고 꿈의 내용에 따라 행동하였다. 자다가 침대에서 굴러 떨어지고, 옆에서 자는 부인을 때리기도 했다. 잠이 깨면 바로 정신이 들어 일상생활이 가능하였다. 진단은?", "textbox": "", "images": [], "options": ["기면증", "야경증", "수면보행장애", "렘수면행동장애", "하지불안증후군"], "answer": 3, "explanation": "수면 중에 꿈의 내용에 따라 행동하며, 잠에서 깨면 바로 정신이 들고 지남력을 회복하는 모습이 렘수면행동장애의 임상 양상에 일치한다. 3) 수면보행장애는 수면 동안 움직임을 보인다는 점에서 비슷하지만, 소아에서 더 호발하며, 잠에서 깼을 시 기억이 없고 잠시 정신을 차리지 못하는 모습을 보인다."}, {"major": "수면과 수면-각성장애", "minor": "사건수면(수면수반증)", "qnum": "13", "question": "4세 여자 아이가 자다가 식은땀을 흘리고 소리를 지르며 걸어 다니는 문제로 병원에 왔다. 아이는 부모가 달래도 정신을 차리지 못하고 흥분한 상태였다가 다시 잠이 들었다. 아침에는 밤에 있었던 일을 기억하지 못하였다. 치료 약물은?", "textbox": "", "images": [], "options": ["다이아제팜", "이미프라민", "플루옥세틴", "클로르프로마진", "메틸페니데이트"], "answer": 0, "explanation": "야경증은 수면생리의 정상발달과정에서 나타날 수 있으므로 동반되는 병리가 없으면 치료를 하지 않습니다. 하지만 증상이 너무 잦거나 심할 경우 벤조디아제핀(benzodiazepine)을 소량, 일시적으로 사용합니다."}, {"major": "수면과 수면-각성장애", "minor": "사건수면(수면수반증)", "qnum": "14", "question": "60세 여자가 3개월 전부터 잠을 자지 못해 병원에 왔다. 잠이 들만 하면 다리에 벌레가 기어다니는 것 같은 느낌 때문에 다리를 자주 깬다고 하였다. 기분이나 식욕에는 문제가 없었다. 관련된 신경전달물질은?", "textbox": "", "images": [], "options": ["도파민", "글라이신", "히스타민", "아세틸콜린", "노르에피네프린"], "answer": 0, "explanation": "다리에 벌레가 기어다니는 것 같은 느낌 때문에 잠을 잘 자지 못하는 하지불안증후군의 전형적인 양상을 나타내고 있습니다. 이는 도파민, 철 대사, endogenous opiate system이 연관이 있는 것으로 알려져 있습니다."}, {"major": "파괴적, 충동조절 및 품행장애", "minor": "파괴적, 충동조절 및 품행장애", "qnum": "01", "question": "35세 남자가 직장 생활에서 사소한 일에도 심하게 화가 나며, 식당에 가서도 식사를 하다가 물이 없다는 사실에 화가 치밀어 기물을 파손하는 등의 행동으로 병원에 왔다. 자신도 공격적인 행동을 하지 말아야 한다는 것을 알지만 화가 나면 참을 수가 없어 행동에 옮기게 된다고 하였고, 자신의 행동에 대해 곧 후회나 자책감이 생긴다고 하였다. 진단은?", "textbox": "", "images": [], "options": ["정신분열병", "행실장애", "간헐성 폭발장애", "반사회성인격장애", "양극성장애"], "answer": 2, "explanation": "자신의 의지와 상관없이 충동을 억제하지 못해 지나친 분노나 공격적 행동을 보이는 질병은 간헐성 폭발장애입니다. 또한 충동에 의해 어쩔 수 없이 행동에 옮기며, 행동 결과에 대해 곧바로 후회나 자책감을 느끼는 것이 특징입니다."}, {"major": "파괴적, 충동조절 및 품행장애", "minor": "파괴적, 충동조절 및 품행장애", "qnum": "02", "question": "41세 여자가 월경 때마다 슈퍼마켓에서 쓸모없는 물건을 반복적으로 훔쳤다. 훔치기 전에는 긴장이 고조되었고 훔칠 때 쾌감과 만족감을 느낀 이후 긴장이 완화되었다. 훔치고 나면 죄책감을 느낀 적이 많았다. 진단은?", "textbox": "", "images": [], "options": ["강박장애", "정신분열병", "충동조절장애", "월경전불쾌장애", "히스테리성인격장애"], "answer": 2, "explanation": "병적 도벽이 의심되는 환자입니다. 충동적인 행동 전까지 긴장감이 고조되고, 행동 후에는 쾌감, 만족감을 느끼고 긴장이 해소되는 특징적인 양상을 보입니다. 죄책감은 있기도, 없기도 합니다."}, {"major": "파괴적, 충동조절 및 품행장애", "minor": "파괴적, 충동조절 및 품행장애", "qnum": "03", "question": "뇌파이상 혹은 뇌기능장애 등이 발생하며 신경학적 검사가 필요한 충동조절장애는?", "textbox": "", "images": [], "options": ["발모광", "병적 도벽", "간헐성 폭발성 장애", "병적 방화벽", "병적 도박"], "answer": 2, "explanation": "간헐성 폭발성 장애가 이에 해당됩니다. 불안정한 성장환경이나 공격적인 부모와의 동일시 등 심리적, 환경적 요인으로 이 질병을 설명하는 경우도 있으나 최근에는 뇌 기능 장애, 특히 충동을 담당하는 변연계의 이상이 주요 원인으로 알려지고 있습니다. 출산시의 뇌 손상, 유아기 경련, 두부외상이나 뇌염을 앓은 경우 발생 빈도가 높고 검사 상 과잉행동이나 경도의 신경학적 이상, 비특이적 뇌파 이상이 동반되는 경우가 많아 뇌 기능 장애 가설이 설득력을 얻고 있습니다."}, {"major": "파괴적, 충동조절 및 품행장애", "minor": "파괴적, 충동조절 및 품행장애", "qnum": "04", "question": "충동조절장애 중 여자에서 더 흔히 발생하는 것은?", "textbox": "", "images": [], "options": ["병적 도박", "병적 방화벽", "간헐성 폭발 장애", "발모벽", "인터넷 중독"], "answer": 3, "explanation": "인터넷 중독, 병적도박, 병적 방화벽, 간헐적 폭발성 장애는 남자에게서 많고 병적 도벽, 발모벽은 여자에서 더 많습니다. DSM-5로 개정되기 이전에 출제된 문제로 현재 발모벽은 강박 및 관련 장애로 분류되어 있습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "물질 관련 및 중독성 장애(총론)", "qnum": "01", "question": "다음 중 물질과 그 작용 수용체간의 연결이 옳은 것은?", "textbox": "", "images": [], "options": ["니코틴 — 아세틸콜린 수용체", "카페인 — GABA 수용체", "디아제팜 — 세로토닌 수용체", "코카인 — GABA 수용체", " 중독성 장애(총론)", "qnum": "05", "question": "물질관련장애 환자에서 정신과적 질환이 흔히 동반된다. 이에 대한 설명으로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["남자에서 그 빈도가 높다.", "가장 흔히 동반되는 병발증은 우울증이다.", "물질관련장애 환자의 자살률은 일반인보다 높다.", "중독성이 강한 물질을 사용하는 환자일수록 동반 이환을 가질 가능성이 높다.", "반사회성 인격장애 환자에서 동반된 경우 정신병리가 심하다."], "answer": 1, "explanation": "1) 76%의 남자와 65%의 여자에게서 추가의 정신과적 진단이 가능합니다. 2) 가장 흔한 병발증은 두 가지의 물질의 남용입니다. 3) 물질 남용자에서 일반 인구의 20배입니다. 4) 대체로 강력하고 위험한 물질들에서 높은 병발증을 보입니다. 5) 반사회성 성격장애에 동반된 경우 정신병리가 더 심합니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "알코올 사용 장애", "qnum": "01", "question": "32세 남자가 불안하다며 병원에 왔다. 약 2년 전부터 잠을 자기 위해 매일 맥주 1캔을 마시기 시작하였다. 11개월 전부터는 소주 1병을 마셔야 잘 수 있고, 점차 음주량이 늘어나 3개월 전부터는 소주 3병을 거의 매일 마신다. 술에 취해 직장에 늦게 출근하거나 결근을 하는 경우가 잦아서, 스스로 술을 끊어보려고 했으나 어려웠다. 술을 마시지 않으면 불면, 식은땀, 손 떨림, 두근거림이 생기고, 다시 술을 마시면 이런 증상이 줄어들었다. 최근에는 낮에도 술을 마시고 직장 내 회의에서 횡설수설하여 사직을 권유받았다고 한다. 면담 시에도 술 냄새가 많이 난다. 우선해야 할 조치는?", "textbox": "", "images": [], "options": ["가족치료 시작", "사회기술 훈련", "신체상태 평가", "자조모임 안내", "항갈망제 투여"], "answer": 2, "explanation": "알코올 중독, 알코올 의존(내성, 금단증상) 등 알코올 사용 장애를 보이고 있습니다. 알코올 사용 장애 환자에서 치료적 접근에 앞서, 환자의 신체적정신적 상태에 대한 평가가 우선시 되어야 하므로, 선지 중 신체상태 평가를 가장 먼저 해야 합니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "알코올 사용 장애", "qnum": "02", "question": "53세 남자가 술을 끊고 싶다며 병원에 왔다. 20년 전부터 하루 소주 1병을 거의 매일 마셨는데, 2개월 전 알코올간경화증 진단을 받으면서 금주 권고를 받았음에도 계속 음주를 해왔다. 술을 마시지 않으면 불안하고 초조하고 식은땀이 심하게 나서 다시 마셨다. 잠이 오지 않아 술에 취해 잠들려고 하고, 다음 날에는 해장술을 마셨다. 아내가 금주를 권해서 병원에 왔다. 치료는?", "textbox": "", "images": [], "options": ["홍수법", "수면제한", "동기강화치료", "체계적 탈감작", "노출과 반응차단"], "answer": 2, "explanation": "금주 상담을 위해 내원한 환자입니다. 술을 끊으려 해도 금단 증상이 있어 끊지 못했으며, 2개월 전 알코올간경화증 진단에도 계속 음주를 해왔습니다. 알코올 사용장애의 치료 단계는 개입, 해독, 재활 치료로 나뉘어지는데, 먼저 개입 치료를 통해 음주에 대한 인식을 새롭게 하여 하여금 술을 끊으려 부정하려는 저항을 넘고 치료 동기를 가지게끔 하는 동기강화치료가 중요합니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "알코올 사용 장애", "qnum": "03", "question": "알코올 사용 장애 환자의 치료방법 중 혐오조건화의 방법에 사용되는 약물은?", "textbox": "", "images": [], "options": ["클로르디아제폭사이드(chlordiazepoxide)", "칼슘카바마이드(calcium carbamide)", "아캄프로세이트(acamprosate)", "페노티아진(phenothiazine)", "날트렉손(naltrexone)"], "answer": 1, "explanation": "항주제(antabuse) : 알코올의 신진대사를 차단하여 중간대사물질인 acetaldehyde가 축적, 일종의 혐오치료. disulfiram, calcium carbamide 등이 대표적입니다. 기타 보상효과를 줄이는 naltrexone, 대체요법인 acamprosate 등이 있습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "알코올 사용 장애", "qnum": "04", "question": "45세 남자가 술을 끊고 싶다며 병원에 왔다. 20년 전부터 거의 매일 소주 1병을 마셨고, 1개월 전에 금주했다. 술을 마셨을 때 명랑해지고 쾌감을 크게 느꼈던 경험이 떠올라서 금주를 하고는 있지만 술을 다시 마시고 싶은 갈망을 느낀다고 한다. 혈액검사 결과는 다음과 같다. 치료는?", "textbox": "혈액요소질소 40mg/dL, 크레아티닌 4.0mg/dL, 크레아티닌청소율 18mL/분, 아스파르트산아미노기전달효소 35U/L, 알라닌아미노기전달효소 31U/L, 알칼리성인산분해효소 67U/L", "images": [], "options": ["티아민", "날트렉손", "발프로산", "팔리페리돈", "아캄프로세이트"], "answer": 1, "explanation": "금주 상담을 위해 내원한 45세 남자 환자입니다. 현재 술을 마시고 싶은 갈망을 다시 느끼고 있으므로 항갈망제인 날트렉손을 처방하는 것이 가장 적절합니다. 날트렉손은 아편 길항제로, 음주에 의한 쾌감을 차단하여 갈망을 없앱니다. 아캄프로세이트 역시 음주에 대한 갈망을 감소시키는 측면이 있지만 크레아티닌 청소율이 30 이하인 신기능 장애 환자에서는 사용할 수 없습니다. 날트렉손은 간 기능 장애를 유발할 수 있어 처방 시에 주의가 필요한데, 이 환자는 해당 사항이 없습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "알코올 사용 장애", "qnum": "05", "question": "48세 남자가 술을 끊고 싶다며 병원에 왔다. 1년 전 사업에 실패한 후 자주 식사를 거르고 아침까지 술을 마시다 직장에서 해고당했다고 한다. 술을 끊고 싶어 여러 번 단주를 시도했지만 술 생각이 너무 많이 나서 실패했다고 한다. 다시 단주한 지 열흘이 지났다. 치료는?", "textbox": "", "images": [], "options": ["날트렉손", "로라제팜", "리스페리돈", "아토목세틴", "카르바마제핀"], "answer": 0, "explanation": "주어진 약물들 중 알코올 사용 장애의 치료에 사용되는 약물은 날트렉손입니다. 날트렉손은 아편계 길항제로 보상 효과를 감소시키는 역할을 합니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "알코올 사용 장애", "qnum": "06", "question": "62세 남자가 술을 끊고 싶어서 병원에 왔다. 지난 20년간 매일 소주 2~3병을 마셨다. 과거에도 음주문제로 세 차례 입원한 적이 있다. 음주를 중단하면 헛것이 보이고 식은땀을 흘렸다고 한다. 어제 새벽에 마지막으로 술을 마셨고, 당장 술을 끊겠다고 한다. 혈압 144/91mmHg, 맥박 96회/분, 호흡 21회/분, 체온 36.9℃이다. 의식은 정상이다. 우선적인 조치는?", "textbox": "", "images": [], "options": ["집단치료", "해독치료", "사회기술훈련", "인지행동치료", "항갈망제 투여"], "answer": 1, "explanation": "금주 상담을 위해 내원한 환자입니다. 알코올로 인해 입원한 적도 있었고, 금단 증상이 있어 알코올 사용장애로 진단할 수 있습니다. 치료의 단계는 개입, 해독치료, 재활치료로 나눌 수 있는데, 현재 본인의 금주 의지가 확실하므로 개입을 통한 동기 부여의 단계는 지나 있습니다. 금단 증상이 우려되므로 금단을 줄이는 약물 등을 통한 해독치료로 신체와 정신을 안정시키고 재활치료로 이행할 수 있도록 하는 것이 가장 적합합니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "알코올 사용 장애", "qnum": "07", "question": "45세 남자가 술을 너무 많이 마셔 아내가 병원에 데리고 왔다. 고등학교 2학년 때부터 술을 마시기 시작했고 점점 주량이 늘어났다. 8년 전 술을 마시고 공장에서 근무하던 것이 드러나 직장을 잃었다. 이후 일용직으로 일하면서 술은 더욱 늘어 매일 소주를 2병 이상 마셨다. 6년 전 술에 취해서 사람을 때려 고소를 당하기도 했다. 2년 전 술 마시다 시비가 붙고 폭행을 당해 병원에 입원했다. 하지만 입원 중에도 밤에 나가 술을 마셨다. 1년 전부터 술을 마시지 않으면 잠도 오지 않고 손이 떨리기 시작했다. 교육 원칙은?", "textbox": "", "images": [], "options": ["최대한 빨리 정신분석을 받게 한다.", "삶의 여러 어려움이 음주 때문에 생겼음을 설명한다.", "음주로 생긴 문제는 가족들이 무마하게 하고 환자를 보호한다.", "술을 끊었다가도 실수로 마시면 다시는 돌이킬 수 없다고 경고한다.", "자신의 인성에 결함이 있다는 것을 냉정하고 비판적으로 직면시킨다."], "answer": 1, "explanation": "알코올사용장애의 치료는 일반적으로 개입, 해독, 재활의 세 단계를 거칩니다. 개입 단계에서는 술이 어떻게 문제를 일으키는지 설명하고, 금주를 통해 해소될 수 있음을 확신시켜야 합니다. 이 과정에서 의사는 알코올 관련 문제들이 발견될 때마다 비판적인 태도 없이 환자가 자기 문제를 인정하도록 합니다. 또한 가족들도 동기부여에 도움이 되기 때문에, 문제들을 무마하여 환자를 보호하려는 행동을 하지 않도록 해야 합니다. 해독단계에서는 약물치료, 지지요법 등을 통해 신체질환 및 금단증상을 치료합니다. 재활단계에서는 금주를 유지할 수 있도록 도와주어야 합니다. 시행착오의 과정으로 실수를 통해 재발 위험이 있는 상황을 파악하고 적합한 대처 기술들을 개발할 수 있도록 도와주어야 합니다. 또한 단주모임, 약물치료도 도움을 줄 수 있습니다.1) 정신분석 : 불안장애, 강박장애, 공포증, 신경성 우울 등의 신경증과 대부분의 성격장애 환자들이 대상이 되고 있습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "알코올 사용 장애", "qnum": "08", "question": "45세 남자가 15년 간 매일 소주 2병씩 마셨고 음주로 인해 결근도 자주 하였다. 술을 마시지 않으면 잠을 자지 못하였고, 다음날에는 불안해지고 술 생각이 나서 다시 술을 마시게 되었다. 날트렉손 치료 시 기대효과는?", "textbox": "", "images": [], "options": ["자극 대체", "혐오조건화", "금단증상 완화", "보상효과 차단", "체계적 탈감작"], "answer": 3, "explanation": "아편계 길항제 naltrexone의 효과에 대한 설명입니다.“혐오 같니? 보나마나 대감집!”(본문해설 참조)"}, {"major": "물질 관련 및 중독성 장애", "minor": "알코올 사용 장애", "qnum": "09", "question": "주로 감마아미노부티르산(GABA) 신경세포의 작용을 강화시키고, 글루탐산염(glutamate)을 길항하여 단주기간을 연장시키고 음주량을 감소시키는 약물은?", "textbox": "", "images": [], "options": ["날록손", "메사돈", "디설피람", "날트렉손", "아캄프로세이트"], "answer": 4, "explanation": "acamprosate에 관한 설명입니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "알코올 사용 장애", "qnum": "10", "question": "48세 남자가 술을 마시고 싶은 충동을 억누르기 힘들어 병원에 왔다. 18년 전부터 매일 소주를 1병 폭사이드"], "answer": 4, "explanation": "24세 남자가 금주 3일 후 발생한 불안감, 식은땀, 손떨림, 심계항진, 불면을 주소로 내원하였습니다. 이는 전형적인 알코올 금단(withdrawal) 증후군의 증상으로, 알코올 섭취를 줄인 후 5~10시간 이내에 진전이 발생하고, 2~3일째 가장 증상이 악화되고 4~5일째에 호전되는 임상양상을 보입니다. 알코올 금단 의 일차치료제는 중추신경 억제제인 벤조디아제핀으로, 알코올과 교차내성을 보이고 금단으로 인한 GABA 신경전달물질 활성도의 급성 결핍을 경감시켜 경련, 섬망과 같은 심각한 금단 증상 발현의 가능성을 현저히 낮추어 줍니다. 추가적으로 수액 및 전해질 보충, 티아민 보충 등이 필요합니다. 따라서 본 상황에 가장 적절한 치료약물은 벤조디아제핀계 약물인 클로르디아제폭사이드입니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "알코올에 의해 유발되는 장애", "qnum": "02", "question": "58세 남성이 오늘 오전부터 의식이 혼미하여 보호자와 함께 내원하였다. 혈압 152/110mmHg, 맥박 110회/분, 호흡수 20회/분, 체온 37.5℃이다. 이 환자에게 적절한 치료를 고르시오.", "textbox": "", "images": [], "options": ["콜히친", "싸이아민", "페니토인", "할로페리돌", "페니실아민"], "answer": 3, "explanation": "58세 남성이 의식저하로 내원하였습니다. 만성적으로 과음하고, 3일 전 음주를 중단하였다. 안정부절 못함, 지남력 장애, 환각(벌레가 기어다님) 증상을 보이고 있습니다. 이러한 특징적인 벌레같은 생물체를 보는 환시(liliputian hallucination) 및 의식혼탁은 알코올 금단에 의한 진전섬망(delirium tremens)의 전형적인 알코올 금단 섬망(진전 섬망)의 증상입니다. 보통 진전 섬망은 알코올 중단 후 48~72시간 동안 나타난다는 점 역시 환자의 임상 양상과 부합합니다. 또한 알코올 중독 상태에서 정신착란 및 눈 근육 마비(눈동자를 내릴 때 한쪽만 내려감)가 나타나는 것은 베르니케 뇌병증을 강하게 시사하는 소견입니다. 따라서 이 환자의 경우 알코올 금단으로 인한 진전섬망과 베르니케 뇌병증이 동반된 상황으로 의심됩니다. 베르니케 뇌병증의 경우 즉시 고용량의 thiamine(하루 200~300mg)을 정맥 내로 투여하여 코르사코프 증후군으로 진행하는 것을 막아야 합니다. 알코올 금단 섬망의 일차 치료는 벤조디아제핀이지만, 현재 베르니케 뇌병증에 대한 즉각적인 개입이 필요한 상황임을 고려할 때 가장 적절한 치료는 싸이아민입니다. 참고로 알코올 중독자들에선 싸이아민 결핍이 흔하고 싸이아민 결핍 상태에서 포도당을 투여하면 결핍이 심화되어 베르니케 뇌병증을 유발할 수 있기 때문에, 일반적인 알코올 금단 환자에도 싸이아민을 예방적으로 투여합니다. 할로페리돌 : 알코올 금단 섬망 환자의 일차치료는 벤조디아제핀이지만, 환자의 정신병적 증상이 있다고 하여 알코올 금단 섬망과 병발하여 동반되는 베르니케 뇌병증을 강하게 의심되는 상황이기 때문에 싸이아민이 더 적절한 치료입니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "알코올에 의해 유발되는 장애", "qnum": "03", "question": "47세 남자가 3일 전부터 횡설수설하고 자꾸 넘어져서 병원에 왔다. 10여 년 전부터 소주 3~5병씩 매일 마셨다. 진찰에서 안진(nystagmus)이 관찰되었다. 가장 먼저 투여해야 할 약물은?", "textbox": "", "images": [], "options": ["티아민", "로라제팜", "할로페리돌", "프로프라놀롤", "아캄프로세이트"], "answer": 0, "explanation": "안구운동 이상, 정신착란, 운동실조를 보이는 Wernicke 뇌병증에 합당한 환자입니다. 이 경우 thiamine을 가장 먼저 투여해야 합니다."}, {"major": "물질 관련 및 중독성 장애  약물을 사용하여 알코올 금단 섬망을 예방해야 하며, 그 중 chlordiazepoxide가 많이 사용됩니다. 망상이나 환각이 나타났을 경우 이 증상의 치료로 항정신병 약물을 사용할 수 있습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "알코올에 의해 유발되는 장애", "qnum": "14", "question": "20년 이상 장기간 음주력이 있는 55세 남자가 내과 병동에 입원하였다. 입원 후 3일째 초조해하며, 자신을 데리러 온 저승사자의 목소리가 들린다고 하였다. 의식과 지남력은 정상이었다. 가장 가능성이 높은 진단은?", "textbox": "", "images": [], "options": ["알코올 의존", "알코올 금단 섬망", "알코올 남용", "급성 알코올 중독", "알코올 환각증"], "answer": 4, "explanation": "의식이 명료하며 지남력이 정상적이므로 섬망 상태는 아닙니다. 장기적 알코올 사용자에서 금주 중, 또는 금주 후에 환청 등 정신병적 증상이 단기간에 발생 가능합니다. 섬망과는 달리 의식이나 지남력 장애는 없으며 환각의 내용은 체계적입니다(=alcoholic hallucinosis)."}, {"major": "물질 관련 및 중독성 장애", "minor": "알코올에 의해 유발되는 장애", "qnum": "15", "question": "10년 이상 매일 소주 2병씩 마셔온 66세 남자가 의식혼미와 전반적인 건강 악화로 응급실에 왔다. 신경학적 검사에서 눈 떨림(nystagmus)과 보행 조화운동못함(gait ataxia)을 보인다. 진단은?", "textbox": "", "images": [], "options": ["진전섬망", "알코올 환각증", "알코올 실신", "베르니케 뇌증", "코르사코프 증후군"], "answer": 3, "explanation": "Wernicke 뇌병증은 급발성 정신착란, 운동실조, 안구운동 이상 등의 신경 증상을 보이는 질병입니다. 수일 내지 수면 회복하나 알코올성 건망증으로 진행 가능합니다. 대량의 thiamine 정주로 예방이 가능합니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "알코올에 의해 유발되는 장애", "qnum": "16", "question": "60세 남자가 3일 전부터 기억력이 저하되어 병원에 왔다. 평소에 식사 대신 술을 즐겨 마셨다고 한다. 신경학적 진찰에서 장소와 사람에 대한 지남력 저하, 비틀거리는 보행, 눈떨림 및 운동실조를 보였다. 정맥 투여 약제는?", "textbox": "", "images": [], "options": ["엽산", "티아민", "마그네슘", "5% 포도당", "아스코르빈산"], "answer": 1, "explanation": "여러 신경학적 증상을 동반한 급성 기억장애를 보이는 환자로 기질적인 원인을 의심할 수 있습니다. 환자는 만성적으로 음주를 하였고 정신착란, 보행장애, 안구진탕을 보이고 있어 Wernicke 뇌증이 의심되며, 기억장애를 보이고 있어 Korsakoff 증후군이 의심됩니다. 치료는 Thiamine 정주가 되겠습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "알코올에 의해 유발되는 장애", "qnum": "17", "question": "55세 남자가 1일 전부터 갑자기 걷지를 못해서 응급실에 왔다. 3일 전부터 오심과 구토로 거의 먹지 못했고, 20년간 거의 매일 마시던 술도 마시지 못했다고 한다. 혈압 130/90mmHg, 맥박 80회/분, 호흡 20회/분, 체온 36.9℃이다. 의사의 얼굴을 바로 주시하지 못하며 안구가 매우 빠르게 흔들렸다. 2년 전 암으로 죽은 부인이 어제 교통사고로 죽었다며 맞지 않는 이야기를 한다. 치료는?", "textbox": "", "images": [], "options": ["티아민", "날트렉손", "도네페질", "서트랄린", "리스페리돈"], "answer": 0, "explanation": "Wernicke 뇌증 급발성, 정신
