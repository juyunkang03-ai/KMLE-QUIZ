<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>정신과 KMLE</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ivory:      #FAF7F2;
    --cream:      #F3EDE2;
    --white:      #FFFFFF;
    --purple-900: #2D0D5A;
    --purple-800: #3D1671;
    --purple-700: #5B2A99;
    --purple-500: #7B3FD1;
    --purple-300: #B896E8;
    --purple-100: #EEE5FB;
    --purple-50:  #F7F0FC;
    --gold-700:   #8A6526;
    --gold-600:   #A07432;
    --gold-100:   #F2E9D6;
    --rose-600:   #C94F7C;
    --rose-100:   #FBE7EE;
    --red-600:    #A32D2D;
    --red-100:    #FCEBEB;
    --gray-900:   #1a1530;
    --gray-700:   #3a3447;
    --gray-500:   #6b6378;
    --gray-400:   #958da0;
    --gray-300:   #d8d0e0;
    --gray-200:   #e8e2ea;
    --gray-100:   #f0ebea;
    --gray-50:    #f7f3f3;
    --shadow-sm:  0 2px 8px rgba(61,22,113,0.06);
    --shadow:     0 4px 20px rgba(61,22,113,0.10);
    --shadow-lg:  0 12px 40px rgba(45,13,90,0.22);
  }

  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--ivory);
    color: var(--gray-900);
    min-height: 100vh;
  }
  .hidden { display: none !important; }

  /* ───── 비밀번호 게이트 ───── */
  .pwd-gate {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, var(--purple-900) 0%, var(--purple-800) 55%, var(--purple-700) 100%);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .pwd-gate::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(184,150,232,0.18), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(123,63,209,0.22), transparent 55%);
    pointer-events: none;
  }
  .pwd-box {
    position: relative;
    background: var(--white);
    border-radius: 16px;
    padding: 40px 32px 32px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 16px 60px rgba(0,0,0,0.35);
    border-top: 3px solid var(--purple-500);
    animation: cardIn 0.3s ease;
  }
  .pwd-diamond { width: 44px; height: 44px; margin: 0 auto 14px; color: var(--purple-700); }
  .pwd-title {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 18px;
    color: var(--purple-800);
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .pwd-title .pwd-series {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--purple-500);
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
  }
  .pwd-sub { font-size: 12px; color: var(--gray-500); margin-bottom: 22px; }
  .pwd-input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--gray-300);
    border-radius: 10px;
    font-size: 16px;
    font-family: 'IBM Plex Mono', monospace;
    text-align: center;
    letter-spacing: 0.25em;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 8px;
    background: var(--ivory);
  }
  .pwd-input:focus { border-color: var(--purple-500); background: var(--white); }
  .pwd-input.shake { animation: shake 0.4s; border-color: var(--red-600); background: var(--red-100); }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-7px); }
    40%, 80% { transform: translateX(7px); }
  }
  .pwd-error { font-size: 11px; color: var(--red-600); min-height: 18px; margin-bottom: 6px; }
  .pwd-submit {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--purple-800);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.02em;
  }
  .pwd-submit:hover { background: var(--purple-700); }

  /* ───── 슬림 스티키 헤더 (~70px) ───── */
  .site-header {
    background: linear-gradient(180deg, var(--purple-800) 0%, var(--purple-900) 100%);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 10px rgba(45,13,90,0.22);
  }
  .header-main {
    max-width: 820px;
    margin: 0 auto;
    padding: 10px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    min-height: 40px;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .brand-diamond { color: var(--purple-300); flex: 0 0 auto; }
  .brand-title {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.005em;
  }
  .brand-sep { color: rgba(255,255,255,0.22); font-size: 12px; margin: 0 2px; }
  .brand-series {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--purple-300);
    font-weight: 500;
  }
  .header-stats {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'IBM Plex Mono', monospace;
    flex-wrap: wrap;
  }
  .stat-chip { display: flex; align-items: baseline; gap: 4px; }
  .stat-n { font-size: 14px; font-weight: 700; color: #fff; line-height: 1; }
  .stat-n.wrong  { color: #F8B4C6; }
  .stat-n.accent { color: var(--purple-300); }
  .stat-k {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    font-weight: 500;
  }
  .progress-track { height: 2px; background: rgba(255,255,255,0.08); }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple-300), var(--purple-500));
    transition: width 0.4s ease;
    width: 0;
  }
  .nav-dots-wrap {
    max-width: 820px;
    margin: 0 auto;
    padding: 5px 22px 3px;
    display: flex;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav-dots-wrap::-webkit-scrollbar { display: none; }
  .nav-dot {
    flex: 0 0 auto;
    min-width: 22px;
    height: 20px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.32);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    border-radius: 3px 3px 0 0;
    font-weight: 500;
    padding: 0 4px;
    transition: all 0.12s;
  }
  .nav-dot:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-dot.current { background: var(--ivory); color: var(--purple-800); font-weight: 700; }
  .nav-dot.correct { color: var(--purple-300); }
  .nav-dot.wrong   { color: #F8B4C6; }

  /* ───── 메인 ───── */
  .main { max-width: 820px; margin: 18px auto 0; padding: 0 22px 120px; }

  .q-card {
    background: var(--white);
    border-radius: 14px;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    animation: cardIn 0.25s ease;
    margin-bottom: 12px;
    border: 1px solid var(--gray-200);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .q-meta {
    background: var(--cream);
    padding: 12px 22px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--gray-200);
  }
  .q-major-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background: var(--purple-800);
    color: #fff;
    padding: 3px 11px;
    border-radius: 20px;
    letter-spacing: 0.03em;
    font-weight: 500;
  }
  .q-minor-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 11px;
    border-radius: 20px;
    background: var(--gold-100);
    color: var(--gold-700);
    border: 1px solid rgba(160,116,50,0.22);
  }
  .q-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--gray-500);
    margin-left: auto;
  }

  .q-body { padding: 22px 22px 0; }
  .q-text {
    font-size: 16px;
    line-height: 1.75;
    color: var(--gray-900);
    margin-bottom: 16px;
    white-space: pre-wrap;
  }
  .text-box {
    background: var(--gray-50);
    border-left: 3px solid var(--purple-500);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--gray-700);
    margin-bottom: 16px;
    white-space: pre-wrap;
  }
  .q-images {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .q-images img {
    max-height: 260px;
    max-width: 100%;
    border-radius: 8px;
    border: 1px solid var(--gray-300);
    object-fit: contain;
    cursor: zoom-in;
    background: var(--white);
  }

  .options-list { display: flex; flex-direction: column; gap: 9px; padding-bottom: 20px; }
  .opt-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    border: 1.5px solid var(--gray-300);
    border-radius: 10px;
    background: var(--white);
    cursor: pointer;
    text-align: left;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.55;
    color: var(--gray-700);
    transition: all 0.15s;
    width: 100%;
  }
  .opt-btn:not(:disabled):hover {
    border-color: var(--purple-500);
    background: var(--purple-50);
    color: var(--purple-800);
  }
  .opt-num {
    flex: 0 0 24px;
    height: 24px;
    background: var(--gray-100);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--gray-500);
    transition: all 0.15s;
  }
  .opt-btn:not(:disabled):hover .opt-num { background: var(--purple-700); color: #fff; }
  .opt-btn.correct-answer {
    border-color: var(--purple-500);
    background: var(--purple-100);
    color: var(--purple-800);
    cursor: default;
  }
  .opt-btn.correct-answer .opt-num { background: var(--purple-700); color: #fff; }
  .opt-btn.wrong-answer {
    border-color: var(--red-600);
    background: var(--red-100);
    cursor: default;
  }
  .opt-btn.wrong-answer .opt-num { background: var(--red-600); color: #fff; }
  .opt-btn:disabled { cursor: default; }

  .explanation-box {
    margin: 0;
    padding: 18px 22px;
    background: var(--purple-100);
    border-top: 1px solid rgba(91,42,153,0.15);
  }
  .explanation-box.wrong {
    background: var(--rose-100);
    border-top-color: rgba(201,79,124,0.2);
  }
  .expl-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--purple-700);
    margin-bottom: 8px;
  }
  .explanation-box.wrong .expl-label { color: var(--rose-600); }
  .expl-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--gray-700);
    white-space: pre-wrap;
  }

  .result-row {
    padding: 12px 22px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid var(--gray-200);
    background: var(--cream);
  }
  .result-msg { font-size: 14px; font-weight: 500; color: var(--purple-700); }
  .result-msg.wrong { color: var(--rose-600); }

  .action-row {
    padding: 16px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--gray-200);
    flex-wrap: wrap;
  }
  .btn-nav {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: 8px;
    border: 1.5px solid var(--gray-300);
    background: var(--white);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--gray-700);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-nav:hover:not(:disabled) { border-color: var(--purple-500); color: var(--purple-700); }
  .btn-nav:disabled { opacity: 0.35; cursor: default; }
  .btn-next {
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    background: var(--purple-800);
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-next:hover { background: var(--purple-700); }
  .btn-next:disabled { background: var(--gray-300); cursor: default; }
  .kbd-hint { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--gray-500); }
  kbd {
    display: inline-block;
    padding: 1px 5px;
    border: 1px solid var(--gray-300);
    border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--gray-700);
    background: var(--gray-50);
  }

  .empty-card { padding: 50px 30px; text-align: center; color: var(--gray-500); font-size: 14px; line-height: 1.7; }
  .empty-card .empty-emoji { font-size: 32px; margin-bottom: 10px; display: block; }

  /* ───── 점수 화면 ───── */
  .score-screen {
    background: var(--white);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 48px 32px;
    text-align: center;
    animation: cardIn 0.25s ease;
    border: 1px solid var(--gray-200);
  }
  .score-trophy { font-size: 52px; margin-bottom: 16px; }
  .score-title { font-size: 28px; font-weight: 700; color: var(--purple-800); margin-bottom: 6px; }
  .score-sub { font-size: 14px; color: var(--gray-500); margin-bottom: 32px; }
  .score-grid { display: flex; justify-content: center; gap: 32px; margin-bottom: 36px; flex-wrap: wrap; }
  .score-stat-num { font-family: 'IBM Plex Mono', monospace; font-size: 32px; font-weight: 700; color: var(--purple-700); }
  .score-stat-num.wrong { color: var(--rose-600); }
  .score-stat-label { font-size: 12px; color: var(--gray-500); margin-top: 4px; }
  .btn-restart {
    padding: 12px 30px;
    border-radius: 8px;
    border: none;
    background: var(--purple-800);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 0.02em;
  }
  .btn-restart:hover { background: var(--purple-700); }

  /* ───── 플로팅 필터 버튼 (FAB) ───── */
  .fab-filter {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--purple-800);
    color: #fff;
    border: none;
    padding: 11px 18px;
    border-radius: 26px;
    box-shadow: 0 6px 20px rgba(45,13,90,0.35);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 9px;
    z-index: 90;
    transition: all 0.18s;
    max-width: calc(100vw - 40px);
  }
  .fab-filter:hover {
    background: var(--purple-700);
    box-shadow: 0 10px 28px rgba(45,13,90,0.45);
    transform: translateY(-1px);
  }
  .fab-filter:active { transform: translateY(0); }
  .fab-icon { flex: 0 0 auto; opacity: 0.92; }
  .fab-text { display: flex; align-items: baseline; gap: 7px; min-width: 0; }
  .fab-label {
    font-weight: 600;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fab-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--purple-300);
    flex: 0 0 auto;
  }
  @media (max-width: 480px) {
    .fab-filter { padding: 10px 14px; font-size: 12px; bottom: 16px; right: 16px; }
    .fab-label  { max-width: 120px; }
  }

  /* ───── 필터 모달 ───── */
  .filter-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(45,13,90,0.42);
    backdrop-filter: blur(4px);
    z-index: 500;
    align-items: flex-start;
    justify-content: center;
    padding: 60px 16px 20px;
    overflow-y: auto;
  }
  .filter-overlay.open { display: flex; }
  .filter-panel {
    background: var(--white);
    border-radius: 16px;
    max-width: 600px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    animation: cardIn 0.22s ease;
    overflow: hidden;
    border-top: 3px solid var(--purple-500);
  }
  .filter-panel-head {
    padding: 16px 22px 14px;
    border-bottom: 1px solid var(--gray-200);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(180deg, var(--purple-50) 0%, var(--white) 100%);
  }
  .filter-panel-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--purple-800);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .filter-reset {
    font-size: 11px;
    background: transparent;
    border: none;
    color: var(--gray-500);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 6px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .filter-reset:hover { background: var(--gray-100); color: var(--purple-700); }
  .filter-close {
    background: transparent;
    border: none;
    font-size: 20px;
    color: var(--gray-500);
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 4px;
    line-height: 1;
  }
  .filter-close:hover { background: var(--gray-100); color: var(--purple-800); }
  .filter-head-right { display: flex; align-items: center; gap: 4px; }

  .filter-panel-body {
    padding: 16px 22px 22px;
    max-height: calc(100vh - 200px);
    overflow-y: auto;
  }
  .filter-panel-body::-webkit-scrollbar { width: 8px; }
  .filter-panel-body::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 4px; }

  .filter-section { margin-bottom: 20px; }
  .filter-section:last-child { margin-bottom: 0; }
  .filter-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--gray-200);
  }
  .filter-section-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--purple-700);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .filter-section-hint { font-size: 11px; color: var(--gray-500); }

  .filter-options {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 6px;
  }
  .filter-option {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 12px;
    border: 1px solid var(--gray-300);
    border-radius: 8px;
    background: var(--white);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    color: var(--gray-700);
    transition: all 0.13s;
    text-align: left;
    line-height: 1.3;
  }
  .filter-option:hover {
    border-color: var(--purple-500);
    background: var(--purple-50);
    color: var(--purple-800);
  }
  .filter-option.active {
    background: var(--purple-800);
    color: #fff;
    border-color: var(--purple-800);
  }
  .filter-option.active .opt-cnt { color: var(--purple-300); }
  .opt-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1 1 auto;
    min-width: 0;
  }
  .opt-cnt {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    opacity: 0.75;
    flex: 0 0 auto;
    margin-left: 8px;
    color: var(--gray-500);
  }
  .filter-minor-empty { padding: 16px 0; text-align: center; font-size: 12px; color: var(--gray-400); font-style: italic; }

  /* ───── 라이트박스 ───── */
  .lightbox {
    display: none;
    position: fixed; inset: 0;

떼어내 자신을 보호하고자 하는 방어기제이다. 현재 환자는 “암에 대한 생존 가능성”에 대해 불안, 우울 등을 감정 없이 설명하고 있기 때문에 격리가 정답이 되겠습니다.2) 부정 : 무의식적인 부인이 주요방어기제입니다.3) 전치 : 욕구나 감정을 보다 덜 위험적인 상대에게 표현하는 것입니다.4) 퇴행 : 발달 이전 단계로 돌아가는 것입니다.5) 해리 : 받아들일 수 없는 성격이 통제를 벗어나 독립적으로 행동하는 것입니다."}, {"major": "인간행동의 사회심리학적 이해", "minor": "학습이론", "qnum": "01", "question": "종소리에 침을 흘리도록 조건화된 강아지가 부저 소리에도 침을 흘리는 현상은?", "textbox": "", "images": [], "options": ["변별(discrimination)", "강화(reinforcement)", "일반화(generalization)", "연관(association)", "소거(extinction)"], "answer": 2, "explanation": "파블로프는 종소리에 조건형성이 되어 침을 흘리는 개는 부저 소리나 메트로놈 소리와 같이 비슷한 자극에도 동일 반응을 일으키는 것을 발견하였습니다. 이것이 '일반화'입니다.1) 비슷한 자극간의 차이에 의해 다르게 반응하게 되는 것. 원자극과 차이가 클수록 일반화는 줄어들고 대신 변별이 생깁니다.2) 조작적 조건화(operant conditioning)에서, 상을 받으면 행동이 증가, 벌을 받으면 행동이 감소하는 것5) 비조건자극 없이 조건자극만 계속할 때 조건반응이 사라지는 것"}, {"major": "인간행동의 사회심리학적 이해", "minor": "학습이론", "qnum": "02", "question": "흰 개에게 물린 아이가 이후 흰 곰인형만 보고도 무서워했다. 다음 중 해당되는 것은?", "textbox": "", "images": [], "options": ["각인", "고전적 조건화", "조작적 조건화", "모형화", "학습된 무력감"], "answer": 1, "explanation": "1) 각인 : 초기학습의 한 형태로 갓 부화된 새의 새끼가 일정한 결정적 시기 이내에 어떤 움직이는 물체에 노출되면 그 이후에도 그 물체를 어미로 생각하고 따라다니는 것2) 고전적 조건화 : Pavlov의 개가 대표적이다. 고기를 줄 때 종소리를 들려주면 종소리에만으로 침을 흘리는 것. 이런 조건반응이 애초의 조건자극 뿐 아니라 그와 유사한 다른 자극에 의해서도 나타나는 것을 자극일반화라고 하는데 이것이 문제의 설명과 일치한다.3) 조작적 조건화 : 강화 기제를 통해 일정한 행동이 학습되는 것4) 모형화 : 다른 사람의 반응을 관찰하는 것만으로 그 반응을 학습하는 것, 조건화나 강화가 필요 없다는 점이 독특하다. 예) 부모의 공포반응을 보고 자신도 그것을 무서워하는 것5) 학습된 무력감 : 도망갈 수 없는 상황에서 계속 고통을 주면 동물을 '포기' 상태에 빠진다. 이를 학습된 무력감(learned helplessness)이라 한다."}, {"major": "정신병리학", "minor": "기억장애", "qnum": "01", "question": "40세 여자와의 면담내용이다. 해당하는 정신병리는?", "textbox": "• 의사 : 집이 어딘가요?\n• 환자 : 개포동입니다.\n• 의사 : 누구와 함께 사시나요?\n• 환자 : 개포동입니다.\n• 의사 : 혼자 오셨나요?\n• 환자 : 개포동입니다.", "images": [], "options": ["반향언어(echolalia)", "말비빔(word salad)", "보속증(perseveration)", "우원증(circumstantiality)", "소리연상(clang association)"], "answer": 2, "explanation": "보속증은 사고과정의 장애로 한 관념이 지속적으로 반복 표현되는 것을 의미합니다. 다른 질문에도 같은 대답을 하는 정신병리입니다.1) 반향언어 : 주어진 말을 따라하는 경우2) 말비빔 : 사고과정의 장애 중 하나로 지리멸렬하거나 이해할 수 없는 사고의 연관4) 우원증 : 환자가 말하고자 하는 생각의 목적에 도달하기는 하지만 그렇게 되기까지에는 쓸데없이 상세한 지엽적인 이야기들로 많은 시간을 보낸 후에야 가능한 경우5) 소리연상 : 사고과정의 장애 중 하나로 문장의 구성에 단어의 의미보다는 단어의 소리에 따르는 것"}, {"major": "정신병리학", "minor": "기억장애", "qnum": "02", "question": "33세 남자가 4개월 전부터 잠들기가 힘들다며 병원에 왔다. 6개월 전 아파트 옆집 부부가 싸우는 소리를 자기를 납치하려는 방법을 두고 다투는 것이라고 생각하였다. 이후 옆집에서 의자 끄는 소리나 발자국 소리가 들리면 경고를 보낸다는 생각이 들어 잠을 못 잤다고 한다. 사람들이 자기 동자들을 보면서 자기 생각을 조종하려 한다며 진료실에서도 색안경을 벗지 않았다. 정신병리는?", "textbox": "", "images": [], "options": ["사고두절(thought blocking)", "사고전파(thought broadcasting)", "마술적 사고(magical thinking)", "환청(auditory hallucination)", "망상지각(delusional perception)"], "answer": 4, "explanation": "환자는 옆집 부부가 싸우는 소리, 의자를 끄는 소리, 발자국 소리 등 정상적으로 지각된 내용에 개인적 의미를 부여하는 망상지각을 보이고 있습니다. 마술적 사고는 어떤 현상이 잘못된 원인에 의해 일어났다고 해석하는 것입니다(e.g. 사람이 죽었으면 좋겠다고 생각했더니 교통사고가 일어났다)."}, {"major": "정신병리학", "minor": "기억장애", "qnum": "03", "question": "21세 남자가 2주 전부터 공부에 집중할 수 없다며 병원에 왔다. 한 달 전에 지하철에서 모르는 여자와 가볍게 어깨를 부딪힌 후, 고발당할 것 같다는 생각이 자꾸 떠올라 괴롭다고 하였다. 이런 생각이 잘못되었다는 것을 알면서도 머리에서 떠나지 않는다고 하였다. 정신병리는?", "textbox": "", "images": [], "options": ["착각(illusion)", "섬광회상(flashback)", "강박사고(obsession)", "관계사고(idea of reference)", "피해망상(persecutory delusion)"], "answer": 2, "explanation": "강박사고\n의식적으로 원치 않음에도 불구하고 계속해서 같은 생각이 의식에 떠오르는 것\n1) 착각 : 감각자극을 잘못 해석하여 지각\n2) 섬광회상 : 약물 장기복용자 중 한동안 약물 복용이 끝난 후 잠깐 동안 강한 환시 등 지각 증상을 재경험하는 것\n4) 관계사고 : 주변의 일이 자기 자신과 관련 되고 있다는 생각\n5) 피해망상 : 누군가 자신을 해치려 한다는 망상"}, {"major": "정신병리학", "minor": "기억장애", "qnum": "04", "question": "25세 남자가 2일 전부터 전혀 움직이려 하지 않아서 응급실로 내원하였다. 면담 시 자발적으로 자세를 바꾸지 않았고 검사 시 타인이 바꾸어 놓은 자세를 유지하였다. 이에 해당하는 정신 병리는?", "textbox": "", "images": [], "options": ["실어증", "상동증", "반향언어", "보속증", "납굴증"], "answer": 4, "explanation": "2) 상동증 : 같은 행동을 반복하는 것\n4) 보속증 : 다른 행동이나 말을 하려고 하지만 정신기능의 장애로 새로운 동작이나 말로 넘어가지 못하고 반복적으로 같은 행동을 하는 것\n5) 납굴증 : 타동적으로 취해진 자세를 유지하려는 경향 때문에 관절에서의 움직임이 밀랍과 같은 것"}, {"major": "정신병리학", "minor": "기억장애", "qnum": "05", "question": "25세 남자가 3개월 전부터 엉뚱한 말을 한다며 부모와 함께 병원에 왔다. 면담에서 직업에 대해 묻자 \"예수님은 목수였어요. 나는 예수를 좋아해요. 예수도 나를 좋아해요. 나는 예수님의 오른팔입니다. 나도 목수입니다.\"라고 답하였다. 정신병리는?", "textbox": "", "images": [], "options": ["반향언어(echolalia)", "보속증(perseveration)", "사고이탈(tangentiality)", "우원증(circumstantiality)", "사고두절(thought blocking)"], "answer": 3, "explanation": "우원증은 많은 불필요한 묘사를 거친 후에 말하고자 하는 목적에 도달하는 경우를 말합니다. 직업에 대해 물었을 때 결국 목수라는 대답을 하였으므로 목적에 도달하였다고 할 수 있습니다."}, {"major": "정신병리학", "minor": "기억장애", "qnum": "06", "question": "41세 남자와의 면담내용이다. 사고 장애의 유형은?\n• 환자: 선생님 제가 오늘 너무 좋은 일이 있었어요.\n• 의사: 무슨 일이 있으셨나요?\n• 환자: …(침묵)…\n• 의사: 무슨 좋은 일이 있으셨나요?\n• 환자: 네? 무슨 좋은 일이에요? 제가 그런 말을 했나요?", "textbox": "", "images": [], "options": ["사고비약(flight of idea)", "사고전파(thought broadcasting)", "사고이탈(tangentiality)", "사고두절(thought blocking)", "사고지체(psychomotor retardation)"], "answer": 3, "explanation": "이 환자처럼 사고가 진행되다가 돌연 중단되는 것을 사고의 두절이라고 합니다. 3) 사고의 이탈은 이야기가 진행되다가 다른 쪽으로 빠지면서 원래의 이야기를 마무리 짓지 못할 경우입니다."}, {"major": "정신병리학", "minor": "기억장애", "qnum": "07", "question": "23세 여자가 갑작스런 불안감과 공포로 응급실을 방문하였다. 환자는 '내 몸이 내 것이 아닌 것 같다. 다른 사람의 몸에 들어온 것 같다.'라고 말했다. 이에 해당하는 것은?", "textbox": "", "images": [], "options": ["퇴행", "이인증", "기시감", "지남력장애", "만족스런 무관심"], "answer": 1, "explanation": "만족스런 무관심(la belle indifference) : 전환증상에 대해 이상할 정도로 걱정을 하지 않는 것. 전환 장애에서 특징적입니다. =기분 좋은 무관심"}, {"major": "정신병리학", "minor": "기억장애", "qnum": "08", "question": "33세 남자환자가 정신과 병동에 입원한 다음날 \"나는 외계인을 만나서 대화를 나눴다\", \"남북한 통일을 위해 중대 임무를 가지고 있는데 컴퓨터와 FAX로 청와대와 정보교환을 해야 한다.\", \"나는 석유재벌이다. 이 병원에서 제일 크고 좋은 특실을 달라\", \"나의 신변을 보호하기 위해 24시간 전담 경찰이 필요하니 불러 달라\" 등의 말을 하였다. 정신과적 면담에서 보이는 사고의 흐름 중 가장 옳은 것은?", "textbox": "", "images": [], "options": ["보속증", "음송증", "사고의 비약", "사고의 이탈", "사고의 우원증"], "answer": 2, "explanation": "사고의 비약 : 사고 연상이 비정상적으로 빠르게 진행, 조증에서 흔합니다. cf. 음송증(verbigeration) : 의미 없는 단어나 짧은 문장을 반복해서 발성 예) 숭늉, 숭늉, 숭늉"}, {"major": "정신병리학", "minor": "기억장애", "qnum": "09", "question": "정신상태검사에서 정신과 의사가 \"<대한민국만세>를 거꾸로 말해보세요\"라고 지시했을 때 환자는 \"거꾸로 말해보세요사고가 진행이 되다가요?\"라고 대답하였다. 이에 해당하는 정신 병리는?", "textbox": "", "images": [], "options": ["매너리즘", "반향 언어", "거부증", "보속증", "납굴증"], "answer": 1, "explanation": "1) 기행증(mannerism) : 환자의 이상한 버릇이 몸동작으로 자주 되풀이\n2) 반향언어(echolalia) : 주어진 말을 따라하는 경우\n3) 거부증(negativism) : 타인의 요구에 반대되는 행동을 하거나 저항의 표시로 반응을 하지 않는 것\n4) 보속증(perseveration) : 뇌의 기질적 손상 시 새로운 동작을 하려고 노력해도 반복적으로 같은 동작만 함\n5) 납굴증(waxy flexibility) : 타동적으로 취해진 자세를 그대로 유지"}, {"major": "정신병리학", "minor": "기억장애", "qnum": "10", "question": "32세 남자가 성분을 알 수 없는 약물에 중독된 상태로 응급실로 왔다. 며칠 전부터 자동차 경적 소리나 거슬리는 소리가 들릴 때마다 온 세상이 빨간색으로 보였으며, 자신이 붉은 세상 속으로 빠져들었다고 하였다. 정신병리는?", "textbox": "", "images": [], "options": ["거시증", "공감각", "기시감", "미시감", "이인증"], "answer": 1, "explanation": "공감각(synesthesia)은 음악소리가 색채로 보이는 등 한 감각이 다른 감각의 형태로 지각되는 착각을 말합니다. 이는 착각(illusion)의 특수한 형태 중 하나입니다. 최근 세세한 정신병리들에 대해서 묻는 문제들이 출제되고 있으니 한번쯤 읽어 보면서 개념을 확실히 잡아 두는 것이 좋겠습니다.\n1) 거시증 : 사물이 크게 보임\n3) 기시감 : 처음 보는 대상을 보고 이전에 본 듯한 느낌이 나는 것\n4) 미시감 : 익숙한 것인데도 낯설고 생소하게 느껴지는 것\n5) 이인증 : 자신의 존재감각이 비현실적이거나 이상하거나 낯선 것"}, {"major": "정신병리학", "minor": "기억장애", "qnum": "11", "question": "26세 여자 환자가 어머니와 면회하던 중 음식을 던지며 흥분한 모습을 보였다. 잠시 후 어머니가 돌아가려 하자 잘못했다고 하며 다시 음식을 먹고 말을 잘 듣는 모습을 보였다. 이 환자에서 보이는 정신 병리는?", "textbox": "", "images": [], "options": ["양가감정", "민감성", "반향 행동", "거부증", "비현실적 사고"], "answer": 0, "explanation": "양가감정(Ambivalence) 동일한 대상이나 상황에 대하여 정반대의 감정이나 태도, 그리고 생각이나 욕구를 동시에 갖고 있는 것. 정상인에서도 나타날 수 있습니다."}, {"major": "정신병리학", "minor": "기억장애", "qnum": "12", "question": "25세 남자가 2일 전부터 전혀 움직이려 하지 않아서 응급실로 내원하였다. 면담 시 자발적으로 자세를 바꾸지 않았고 검사 시 타인이 바꾸어 놓은 자세를 유지하였다. 이에 해당하는 정신 병리는?", "textbox": "", "images": [], "options": ["실어증", "상동증", "반향언어", "보속증", "납굴증"], "answer": 4, "explanation": "2) 상동증 : 같은 행동을 반복하는 것\n4) 보속증 : 다른 행동이나 말을 하려고 하지만 정신기능의 장애로 새로운 동작이나 말로 넘어가지 못하고 반복적으로 같은 행동을 하는 것\n5) 납굴증 : 타동적으로 취해진 자세를 유지하려는 경향 때문에 관절에서의 움직임이 밀랍과 같은 것"}, {"major": "정신병리학", "minor": "기억장애", "qnum": "13", "question": "25세 남자가 교회 종소리를 듣고 갑자기 흥분하여 난동을 피웠다. 자신을 비난하는 소리라며 \"종, 종각, 종달새, 종아리……\"이라는 말을 반복했다. 이 환자에서 보이는 정신 병리는?", "textbox": "가. 음연상(clang association)\n나. 신어증(neologism)\n다. 착각(illusion)\n라. 환각(hallucination)", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 1, "explanation": "음연상(clang association) : 사고 진행의 장애인 사고비약이 심한 경우 나타나는 현상으로 음향상 유사하나 논리적인 의미의 연관성이 없는 단어를 반복\n다. 착각(illusion) : 실제의 외부자극을 잘못 받아들이는 것\n라. 환각(hallucination) : 외부자극 없는 감각 지각"}, {"major": "정신과적 평가", "minor": "정신과적 면담", "qnum": "01", "question": "정신과적 면담 기술에 대한 설명으로 옳은 것은?", "textbox": "", "images": [], "options": ["환자가 꺼려하는 질문은 하지 않는다.", "개방형 질문보다는 폐쇄형 질문을 한다.", "청소년 면담의 경우 부모를 먼저 만난다.", "눈높이에 맞게 앉아서 정면으로 똑바로 마주친다.", "정신연령이 아닌 실제 나이에 맞게 면담한다."], "answer": 4, "explanation": "환자에게 거북한 주제를 묻는 것을 두려워하지 않아야 합니다. 특히, 자살 생각에 대하여 물어보기를 잊지 않아야 합니다. 질문을 할 때 개방형 질문과 폐쇄형 질문을 섞어서 사용하는 것이 좋습니다. 개방형 질문을 통하여 환자의 사고 과정이나 내용을 볼 수 있고, 폐쇄형 질문으로는 구체적인 답을 할 수 있는가를 알 수 있습니다. 청소년 면담의 경우에도 환자의 이야기를 먼저 듣고 환자에게 양해를 구한 뒤, 가족 등 정보제공자와 별도의 면담을 갖는 것이 좋습니다. 사선으로 마주 앉아 시선이 너무 직접적으로 마주치지 않도록 하는 편이 낫습니다."}, {"major": "정신과적 평가", "minor": "정신과적 면담", "qnum": "02", "question": "정신과적 면담에 관한 기술 중 가장 적절한 것은?", "textbox": "", "images": [], "options": ["환자의 말을 많이 적는 것이 좋다.", "환자보다도 의사의 의자 높이가 약간 높은 것이 좋다.", "망상에 대해 비합리성을 조목조목 말해주어야 한다.", "환자와 정보제공자는 따로 보는 것이 좋다.", "어떤 경우에도 환자의 비밀을 누설해서는 안 된다."], "answer": 3, "explanation": "정신과 면담 중 환자가 3~4분 동안 혼자서 중단 없이 계속 이야기하도록 해보는 것은 좋지만 이를 다 기록할 필요는 없습니다. 의사는 환자의 말을 적당히 해석하여 기록하는 것이 좋습니다. 환자와 의사의 의자는 그 높이가 같아야 합니다. 망상을 틀렸거나 불가능한 일이라고 매도하게 되면 환자의 불안이 증폭될 뿐이고 환자는 오히려 더욱 필사적으로 망상에 매달리게 됩니다. 그러나 환자의 망상을 의사도 같이 믿는 것처럼 보이는 것도 좋지 않습니다. 환자와 면담을 마치면 환자에게 양해를 구한 뒤 가족 등 정보제공자와 별도의 면담을 갖는 것이 좋습니다. 자살이나 타살의 위험이 있는 경우에는 적극적으로 대처해야 합니다."}, {"major": "정신과적 평가", "minor": "정신과적 면담", "qnum": "03", "question": "환자의 임종을 앞두고 의사로서 취해야 할 행동으로 옳은 것은?", "textbox": "", "images": [], "options": ["수회 정기적 면담을 한다.", "세세하게 모든 임상결과를 설명한다.", "더 이상 해줄 게 없으므로 퇴원시킨다.", "극단적인 감정변화에 관심을 주지 않는다.", "면회를 제한하여 마지막을 조용하게 보내게 한다."], "answer": 0, "explanation": "임종을 앞둔 환자는 정기적으로 환자를 방문하고 마주보며 환자의 말에 귀를 기울이고 피부를 접촉하는 것이 중요하다고 강조하고 있습니다. 특히 환자가 죽음의 불안에 직면할 수 있도록 하는 것이 중요합니다."}, {"major": "정신과적 평가", "minor": "정신과적 면담", "qnum": "04", "question": "처음 정신과 외래로 내원한 환자를 면담하고 평가할 때 조심해야 할 사항 중 가장 옳은 것은?", "textbox": "", "images": [], "options": ["신체검사는 필요하지 않다.", "자살에 대한 구체적인 질문은 피한다.", "환자가 비협조적일 때는 다음 날 오도록 한다.", "가족이 동반한 경우라도 환자의 말을 먼저 듣는다.", "첫 면담은 별로 중요하지 않으므로 간단한 질문만을 한다."], "answer": 3, "explanation": "정신과로 직접 내원한 환자의 경우에는 자세한 신체적 검사가 필요합니다. 구체적으로 물어야 합니다. 비협조적인 환자도 관찰에 의하여 기록하고 협조할 때까지 기다리는 것이 필요합니다. 환자의 이야기를 먼저 듣고, 가족이 중간에서 가로채는 일이 없게 해야 합니다. 첫 면담부터 체계적으로 질문해야 합니다."}, {"major": "정신과적 평가", "minor": "정신과적 면담", "qnum": "05", "question": "정신과 환자와 면담할 때 가장 바람직한 의사의 태도는?", "textbox": "", "images": [], "options": ["지시적 태도를 취한다.", "권위적 태도를 유지한다.", "객관적 입장을 유지한다.", "공감보다는 동정심이 필요하다.", "비언어적 표현보다는 언어적 표현에 집중한다."], "answer": 2, "explanation": "권위를 내세우지 말고 선입관이나 편견 없이 진실한 관심을 갖고 대해야 합니다. 자기 자신을 환자의 입장에 두고 공감할 수 있어야 합니다. 비언어적인 대화가 면담을 이끄는 데 도움이 됩니다."}, {"major": "정신과적 평가", "minor": "정신과적 면담", "qnum": "06", "question": "정신과적 면담 기술에 대한 설명으로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["환자가 어려워하거나 거북해 할 만한 화제는 묻지 않는다.", "애매모호한 대답에는 명확히 짚고 넘어간다.", "개방성 질문과 폐쇄성 질문을 함께 사용한다.", "면담초기에 치료적 관계 형성이 중요하다.", "면담 종료 시 환자에게 질문할 기회를 준다."], "answer": 0, "explanation": "환자가 어려워하거나 거북해 할 만한 화제에 대하여 물어 보는 것을 두려워해서는 안 됩니다."}, {"major": "정신과적 평가", "minor": "간이정신상태검사", "qnum": "01", "question": "다음의 정신상태검사 항목의 일반적인 예시 중 옳지 않은 것은?", "textbox": "", "images": [], "options": ["집중력(concentration) : \"삼천리강산을 거꾸로 말해보세요\"", "시공간능력(visuospatial ability) : \"보여드린 시계 판을 그려 보세요.\"", "사회적 판단력(social judgement) : \"주민등록증을 주웠을 때 어떻게 해야죠?\"", "추상적 사고력(abstract thinking) : \"사과와 배의 공통점은 무엇인가요?\"", "단기기억력(short term memory) : \"불러드린 숫자 6개를 순서대로 따라하세요.\""], "answer": 4, "explanation": "단기 기억력을 검사하기 위해서는 식욕을 물어본 후 아침 식사나 전날 저녁 식사로 무엇을 먹었는지 질문합니다. 불러준 5~6개의 숫자를 따라하게 하는 것은 즉각 회상(immediate recall)에 대한 검사입니다."}, {"major": "정신과적 평가", "minor": "간이정신상태검사", "qnum": "02", "question": "74세 남자가 4년 전부터 기억력이 떨어졌고, 최근에는 집을 찾아오지 못하고 옆집 사람도 알아보지 못했다. 6개월 전부터 자식들이 돈을 훔쳐 간다고 의심하면서 자주 욕을 하였다. 선별검사는?", "textbox": "", "images": [], "options": ["인물화검사", "간이정신상태검사", "레이복합도형검사", "웩슬러성인용지능검사", "미네소타다면인성검사"], "answer": 1, "explanation": "병력상 치매가 의심되는 상황입니다. 인지기능 장애의 선별검사는 간이정신상태검사(MMSE)입니다.1) 인물화검사 : 투사적 성격검사3) 레이복합도형검사 : 시공간처리능력검사4) 웩슬러성인용지능검사 : 지능검사5) 미네소타다면인성검사 : 자기보고식 성격검사"}, {"major": "정신과적 평가", "minor": "간이정신상태검사", "qnum": "03", "question": "\"물체가 크게 혹은 작게 보인 적이 있습니까?\" 또는 \"이상한 소리가 반복해서 들린 적이 있습니까?\"라고 묻는 것은 무엇을 확인하고자 하는 것인가?", "textbox": "", "images": [], "options": ["행동장애", "지각장애", "사고장애", "병식유무", "판단력"], "answer": 1, "explanation": "환각(hallucination), 착각(illusion)은 지각의 장애에 해당합니다."}, {"major": "정신과적 평가", "minor": "간이정신상태검사", "qnum": "04", "question": "다음 면담에 해당하는 정신상태검사 항목은?\n• 의사 : 사과와 배의 공통점은 뭔가요?\n• 환자 : 음…… 사과와 배는…… 둥글다는 공통점이 있어요.\n• 의사 : 그러면 '돌다리도 두드려보고 건너라'가 무슨 뜻일까요?\n• 환자 : 돌다리도 두드려보라는 뜻이겠죠?", "textbox": "", "images": [], "options": ["추상적사고", "상식", "언어이해력", "충동조절능력", "계산력"], "answer": 0, "explanation": "상식을 평가할 때에는 우리나라의 역대 대통령이 누구인지 묻는 질문을 합니다. 속담의 숨겨진 의미를 유추하거나 서로 다른 두 물체의 공통점을 찾는 것은 추상적 사고에 해당합니다."}, {"major": "정신과적 평가", "minor": "신경인지기능검사 및 심리검사", "qnum": "01", "question": "72세 여자가 기억력이 떨어져서 가족과 함께 병원에 왔다. 4년 전부터 자기가 했던 말이나 약속을 잊어버리기 시작했다. 최근에는 더 심해져 방금 했던 대화도 기억하지 못하거나 물건 이름을 생각해내지 못하는 일이 있었다고 한다. 검사는?", "textbox": "", "images": [], "options": ["단어연상검사(word association test)", "인물화검사(draw-a-person test)", "주제통각검사(thematic apperception test)", "문장완성검사(sentence completion test)", "신경인지기능검사(neurocognitive function test)"], "answer": 4, "explanation": "치매가 의심되는 환자입니다. 고위 인지기능에 대한 평가가 필요하겠습니다. 단어연상검사, 인물화검사, 주제통각검사, 문장완성검사는 모두 투사적 성격검사법입니다."}, {"major": "정신과적 평가", "minor": "신경인지기능검사 및 심리검사", "qnum": "02", "question": "2개월 전부터 직장동료들이 자신을 험담하고 해치려 한다며 출근하지 않는 것을 주소로 35세 남자가 내원하였다. 이 환자의 진단에 가장 도움이 되는 검사는?", "textbox": "", "images": [], "options": ["간이정신상태검사", "지능 검사", "벤더 – 게스탈트 심리검사", "로르샤하 검사", "해밀턴 불안 우울 척도"], "answer": 3, "explanation": "투사적 검사들은 개념상의 혼란이나 사고장애를 결정하는 데 유용할 수 있습니다. 특히 이 검사들은 전형적인 임상 면담에서는 분명하지 않은 사고의 혼란 또는 망상적 사고를 알아내는 데 큰 도움이 될 수 있습니다.1) 간이정신상태검사(MMSE) : 인지손상의 screening test2) 지능검사 : 개인이 합목적적으로 행동하고 합리적으로 사고하며 능률적으로 자신의 환경을 처리하는 총체적 능력율 평가3) 벤더 – 게스탈트 심리검사 : 지각 및 기억력 검사4) 로르샤하 검사 : 투사적 검사5) 해밀턴 불안 우울 척도 : 행동평가 척도"}, {"major": "정신과적 평가", "minor": "미네소타 다면적 인성검사", "qnum": "01", "question": "1주 전부터 잠만 자고 식사도 거절하며 꼼짝하지 않는 것을 주소로 25세 남자가 내원하였다. 그는 2주 전에 회사에서 감원대상이라는 이야기를 통고받았다. 신체검사 결과는 정상이었으며 입원 1주째 실시한 미네소타 다면적 인성검사(MMPI) 소견은 다음 그림과 같다. 가장 의심되는 진단은?", "textbox": "", "images": [], "options": ["긴장성 혼미", "우울성 혼미", "해리성 둔주", "기분순환장애", "급성 스트레스장애"], "answer": 4, "explanation": "1주 전부터 증상이 시작된 병력(급성) 외상적 사건과 마비/멍한 느낌/비현실감 MMPI 소견을 종합해서 판단"}, {"major": "정신과적 평가", "minor": "미네소타 다면적 인성검사", "qnum": "02", "question": "미네소타 다면적 인성검사(MMPI) 소견이 다음과 같은 환자에서 볼 수 있는 소견으로 옳은 것은?", "textbox": "", "images": [], "options": ["신어증", "상동행동", "사고비약", "감정둔마", "정신운동지연"], "answer": 2, "explanation": "타당성 척도가 70점 미만이므로 응답 전체의 기본적인 신뢰성은 일단 확보되었다고 할 때, 우울증 척도가 낮고 경조증 척도가 올라가 있으므로 경조증상에 잘 나타나는 정신 병리를 찾으면 됩니다.1) 신어증 : 심한 조현병에서 나타나는 사고 진행의 장애2) 상동증 : 조현병이나 강박장애에서 흔히 나타나는 행동장애3) 사고비약 : 양극성장애의 조증상태에 많고 과대망상과도 연관되는 사고 진행의 장애4) 감정둔마 : 조현병, 기질적 정신장애, 심한 우울증상에 나타날 수 있는 감정 장애(주로 조현병에 사용하는 용어이다). 조현병의 대표적인 음성증상입니다.5) 정신운동지연 : 과소활동이라고도 하는 행동장애로 심한 우울증의 허무감이나 죄책망상, 조현병의 자폐적 사고나 기괴한 망상 때문에도 나타난다."}, {"major": "정신과적 평가", "minor": "미네소타 다면적 인성검사", "qnum": "03", "question": "30세 여자의 미네소타 다면적 인성검사(MMPI) 결과이다. 의심되는 진단은?", "textbox": "", "images": [], "options": ["해리정체성장애", "조현병", "급성스트레스장애", "전환장애", "주요우울장애"], "answer": 1, "explanation": "주어진 그래프에서 6번 Pa(paranoia, 편집증), 8번 Sc(Schizophrenia)이 T점수 70점 이상입니다. 이는 조현병이 가장 의심되는 결과입니다(이 결과 자체만으로는 진단을 할 수 없다는 것도 참고로 알아두세요). 문제를 풀기 위해서는 Pa와 Sc가 의미하는 바를 알아야 했습니다.한동안 출제되지 않는 듯하더니 다시 출제된 부분입니다. 방심하지 말고 해설에 있는 각 척도의 약자와 특징을 기억해두세요!"}, {"major": "생물학적 치료", "minor": "항정신병약물의 작용기전과 분류", "qnum": "01", "question": "45세 여자가 불안하다며 병원에 왔다. 1개월 전부터 주변에 사람이 없는데도 자신을 비난하는 목소리가 들린다며 불안해한다. 자신의 행동이 사람들에게 방송되는 것 같아 5년 전부터 집에서 커튼을 치고 불을 켜지 않고 어둡게 생활하고 있다. 집 밖으로 나가면 다른 사람들이 자신을 주시하고 자신에게 신호를 계속 준다고 한다. 키 159cm, 몸무게 85kg이다. 검사 결과는 다음과 같다. 심전도이다. 치료는?", "textbox": "• 혈액 : 포도당 182mg/dL, 당화혈색소 7.1%, 혈액요소질소/크레아티닌 26/1.1mg/dL, 총콜레스테롤 240mg/dL, 중성지방 258mg/dL\n• 소변 : 포도당(+), 단백질(+), 케톤(-)\nVent. rate : 57BPM, PR interval : 144ms, QRS duration : 72ms\nQT/QTc : 514/500ms, P-R-T axes : 43 19 31", "images": [], "options": ["올란자핀", "클로자핀", "케티아핀", "지프라시돈", "아리피프라졸"], "answer": 4, "explanation": "45세 여성이 불안을 주소로 내원하였습니다. 청각 환각 증상(자신을 비난하는 목소리가 들림)이 있고, 자신의 행동이 사람들에게 방송되고 사람들이 자신을 주시하고 신호를 준다고 믿는 등 정신병적 증상이 있는 환자입니다. 이러한 증상이 6개월 이상 지속되며 이로 인해 장애가 동반되고 있으므로 조현병으로 진단할 수 있습니다. 환자의 경우 비만, 고혈당, 이상지질혈증, 소변 단백 양성으로 대사 이상 동반되어 있어 올란자핀, 클로자핀, 케티아핀은 대사 부작용을 고려할 때 부적절하고, 심전도 상 QTc 460ms 이상으로 QT prolongation 위험이 높은 지프라시돈 또한 부적절합니다. 아리피프라졸은 비정형 항정신병 약물로 상대적으로 대사 부작용이 적고 QT 연장 위험도 낮습니다. 따라서 가장 적절한 치료약물은 아리피프라졸입니다."}, {"major": "생물학적 치료", "minor": "항정신병약물의 작용기전과 분류", "qnum": "02", "question": "49세 여자가 1개월 전부터 유방이 부풀어 오르고, 가끔 젖이 흐른다며 병원에 왔다. 6개월 전 혼자 중얼거리고, 상황에 맞지 않는 엉뚱한 말을 해서 2개월 전부터 처방받은 약을 복용하고 있다. 약물치료를 받은 후 혼자 중얼거리는 것도 덜하고 엉뚱한 말도 거의 하지 않으나 유방이 부풀어 오르고 젖이 흘러 옷을 적시는 증상이 생겼다. 키 157cm, 몸무게 49kg이다. 치료 약물은?", "textbox": "", "images": [], "options": ["케티아핀", "리스페리돈", "팔리페리돈", "할로페리돌", "아미설프라이드"], "answer": 0, "explanation": "조현병으로 인해 약물치료를 받고 있던 여성이 유방이 부풀어 오르고 젖이 흐르는 부작용으로 내원하였습니다. 항정신병 약물의 D2 도파민 수용체 차단 작용으로 인해 프로락틴 분비에 대한 도파민의 억제 기전이 감소하면 서 유즙분비, 유방비대, 무월경 등의 부작용이 발생할 수 있습니다. 정형 항정신병 약물과 리스페리돈, 아미설프라이드 등은 프로락틴 상승을 잘 일으키는 반면 케티아핀은 D2 수용체 길항 강도가 상대적으로 약해 프로락틴 상승을 유발하지 않는 편입니다. 따라서 치료 약물로는 케티아핀이 가장 적절합니다."}, {"major": "생물학적 치료", "minor": "항정신병약물의 작용기전과 분류", "qnum": "03", "question": "75세 여자가 밤에 잠을 잘 자지 않는다면 가족이 데리고 병원에 왔다. 2주 전부터 식사를 전혀 못 했고, 3일 전부터 질문을 해도 멍하게 있거나, 질문에 엉뚱하게 대답하였다. 밤이 되면 아파트 천장에 검은 고양이가 왔다 갔다 한다며 잡으려 하고, 자기 집에 있는데도 집으로 가겠다며 나가려는 모습을 보인다. 낮 시간에는 그런 증상들이 조금 덜하거나 없다. 혈압 135/80mmHg, 맥박 60회/분, 호흡 20회/분, 체온 37℃이다. 신경계진찰에서 국소징후는 없다. 심전도검사에서 QTc 간격은 500msec로 연장되어 있다. 치료는?", "textbox": "", "images": [], "options": ["지프라시돈 경구투여", "페노바비탈 정맥주사", "할로페리돌 정맥주사", "아리피프라졸 경구투여", "클로르프로마진 경구투여"], "answer": 3, "explanation": "집중력 장애(질문을 해도 멍하게 있거나 엉뚱하게 대답), 인신(자신이 있는 곳이 어디인지 모름) 능력(자기 집에 있는데도 집으로 가겠다며 나가는 모습) 등에 보이며, 이러한 증상이 단기간(3일 전부터)에 걸쳐, 주로 밤에 악화되고 있습니다. 이를 보아 식사를 하지 못 해 발생한 영양부족 등으로 인한, 섬망을 의심해볼 수 있습니다. 섬망의 경우 비정형 항정신병약제를 사용할 수 있으며, 선지 중 심장 독성이 없는 아리피프라졸을 사용할 수 있습니다.1) 지프라시돈 : 비정형 항정신병약제이지만 QTc 간격을 연장하는 부작용이 있음2) 페노바비탈 : Barbiturate계열 약물로 진정제, 항경련제, 수면제로 사용되며, 알코올금단섬망 등 특정 상황의 섬망에서 사용할 수 있으며, QTc 간격을 연장하는 부작용이 있음3) 할로페리돌 : 섬망에서 정신병적 증상 개선을 위한 1차적 약제로 주로 사용되지만, QTc 간격을 연장하는 부작용이 있어, 본 환자에게는 적절하지 않음5) 클로르프로마진 : phenothiazine계열의 정형 항정신병 약물로, 섬망에서는 항콜린성 효과 때문에 피하는 것이 좋으며, QTc 간격을 연장하는 부작용이 있음"}, {"major": "생물학적 치료", "minor": "항정신병약물의 작용기전과 분류", "qnum": "04", "question": "45세 여자가 3달 전부터 시작된 피해망상과 환청으로 병원에 왔다. 1년 전부터 당뇨병과 뼈엉성증으로 치료 중이었다. 키 155cm, 몸무게 85kg이었다. 치료는?", "textbox": "", "images": [], "options": ["리스페리돈", "클로자핀", "퀘티아핀", "올란자핀", "아리피프라졸"], "answer": 4, "explanation": "3달 전부터 시작된 피해망상과 환청으로 내원한 환자입니다. 진단 기준 상 조현양상 장애에 해당하고, 치료로 항정신병 약물을 사용해야 합니다.보기에 있는 5가지 약물 모두 항정신병 약물인데, 환자의 경우 BMI가 35가 넘어서 고도비만 이네요. 체중증가의 부작용이 없는 약제를 선택해야겠습니다. Aripiprazole과 ziprasidone 외에는 모두 체중 증가의 부작용이 있으니, 정답으로는 aripiprazole이 적당하겠습니다. ‘알(Aripiprazole)집(Ziprasidone)으로 압축해서 체중감소!’ 기억해두세요.또한 clozapine, olanzapine, quetiapine은 당뇨병 발생 위험이 증가하고, risperidone은 폐경전 여성에서 bone density를 줄인다는 연구가 있으니 참고로 알아두세요!"}, {"major": "생물학적 치료", "minor": "항정신병약물의 작용기전과 분류", "qnum": "05", "question": "41세 여자가 3개월 전부터 가만히 있어도 눈물이 나고 죽고 싶은 생각이 든다며 병원에 왔다. 3개월 전 남편이 교통사고로 사망했고, 그 후 만사가 귀찮아서 거의 매일 누워만 지냈다고 한다. 입맛이 없어져 체중이 4kg 가량 줄었고, 밤에 잠도 오지 않아 자다가 종종 깬다. 죄가 많아서 살 가치가 없다고 생각하며, 죽은 남편이 자신을 질책하는 소리도 들린다고 한다. 1년 전부터 주요우울장애로 데스벤라팍신을 복용해왔다. 추가해야 할 약물은?", "textbox": "", "images": [], "options": ["가바펜틴", "모다피닐", "아리피프라졸", "토피라메이트", "메틸페니데이트"], "answer": 2, "explanation": "3개월 전에 남편이 교통사고로 사망한 후부터 시작된 우울감과 자살사고를 주소로 내원한 41세 여자입니다. 1년 전부터 주요우울장애로 진단되어 현재 데스벤라팍신을 복용하고 있으나 상실 이후 증상이 잘 조절되고 있지 않으며, 죽은 남편이 자신을 질책하는 소리가 들리는 등의 정신병적 증상이 동반되고 있습니다. 따라서, 비정형 항정신병 약물인 아리피프라졸을 사용할 수 있습니다. 아리피프라졸은 진정 작용이 거의 없으며, 체중 증가가 없고 혈중 prolactin 증가가 없으며 심장에 대한 독성도 거의 없어서 장기 복용 시 장점이 많은 약물입니다. 항정신병약물의 경우 대체로 병명에 관계없이 긴장, 정신운동 증가, 흥분, 충동성, 걱정, 공격성 또는 파괴적 행동, 과도한 불안, 편집증적 또는 적대적 행동, 여러 망상과 환각 등의 증상에 사용된다고 이해하면 됩니다."}, {"major": "생물학적 치료", "minor": "항정신병약물의 작용기전과 분류", "qnum": "06", "question": "58세 남자가 2주 전부터 과도하게 흥분하고 공격적인 모습을 보여 병원에 왔다. 잠을 못 자고, 가족들이 자신을 죽이기 위해 음식에 약을 섞었다고 하면서 식사를 거부하고, 가족들에게 공격적인 모습을 보였다. 6개월 전부터 물건을 잡으면 힘이 없어 떨어뜨리거나 손이 떨리기 시작했고, 최근에는 행동이 점점 더 느려지고 걸을 때 앞으로 넘어질 듯이 종종걸음을 걷는다고 한다. 치료는?", "textbox": "", "images": [], "options": ["퀘티아핀", "리스페리돈", "팔리페리돈", "페르페나진", "아미설프라이드"], "answer": 0, "explanation": "공격성을 주소로 내원한 58세 남자 환자입니다. 6개월 전부터 손떨림, bradykinesia, 종종걸음의 증상을 보였으므로 파킨슨병을 의심할 수 있습니다. 이 경우 추체외로 부작용이 있는 항정신병약물로 이 증상이 악화될 수 있어 신중한 약물 선택이 필요합니다. 따라서 추체외로 부작용이 적고, 불면에도 도움이 되는 비정형 항정신병 약제인 퀘티아핀이 가장 적합합니다."}, {"major": "생물학적 치료", "minor": "항정신병약물의 작용기전과 분류", "qnum": "07", "question": "비정형 항정신병약물은 정형 항정신병약물에 비해 추체외로 증상이 적고 음성 증상에 효과가 있다. 이것은 어떤 신경전달물질의 차단과 관련이 있는가?", "textbox": "", "images": [], "options": ["GABA", "노르에피네프린", "Glutamate", "세로토닌", "아세틸콜린"], "answer": 3, "explanation": "Clozapine, olanzapine, quetiapine, risperidone은 D2 수용체에 비해서 5-HT2A 수용체 차단 작용이 강하여 serotonin-dopamine receptor antagonist라고도 불리는데, 뇌겉질의 5-HT2A 수용체의 80% 이상을 점유하는 것으로 알려져 있습니다."}, {"major": "생물학적 치료", "minor": "항정신병약물의 작용기전과 분류", "qnum": "08", "question": "27세 남자가 3주 전부터 발음이 어둔해지고 눈이 치켜 올라간다며 병원에 왔다. 1년 전부터 국가정보원이 자신을 도청 한다면서 집 밖으로 나가지 않아, 1개월 전에 병원에서 진료를 받고 할로페리돌을 복용 중이다. 최근에는 외출할 정도로 호전되었으나, 눈동자가 자신도 모르게 자꾸 올라가고, 발음이 어둔해져 일상생활을 하는 데 불편하다고 한다. 키 165cm, 체중 140kg이다. 대체 약물은?", "textbox": "", "images": [], "options": ["올란자핀", "퀘티아핀", "리스페리돈", "지프라시돈", "팔리페리돈"], "answer": 3, "explanation": "3주 전부터 발음이 어둔해지고 눈이 치켜올라가는 증상을 주소로 내원한 27세 환자입니다. 기존에 조현병으로 진단 받아 정형 항정신병 약물인 할로페리돌을 복용 중이었음을 알 수 있습니다. 조현병 증상은 완화되었으나 할로페리돌의 부작용으로 급성 근긴장 이상증(Acute dystonia)이 발생했음을 알 수 있습니다. 이런 추체외로 부작용을 줄이기 위해서는 비정형 항정신병 약물을 사용할 수 있습니다. 현재 환자는 체중이 140kg로 비정형 항정신병 약물 중에서도 체중 증가 부작용이 없는 아리피프라졸과 지피라시돈이 사용 가능합니다."}, {"major": "생물학적 치료", "minor": "항정신병약물의 작용기전과 분류", "qnum": "09", "question": "22세 여자가 3개월 전부터 월경이 없다며 병원에 왔다. 13세 초경 이후로 1개월 간격으로 규칙적으로 월경을 해왔다고 한다. 6개월 전 조현병으로 진단 받고, 현재까지 팔리페리돈 6mg으로 약물치료 중이라고 한다. 유방에 찌릿한 통증이 있고 유두에서 우윳빛 분비물이 나온다고 한다. 혈압 115/75mmHg, 맥박 86회/분, 호흡 16회/분, 체온 36.5℃이다. 검사 결과는 다음과 같다. 조치는?", "textbox": "• 혈액: 혈중 프로락틴 농도 120ng/mL(참고치, 1.9~25.0)\n• 소변: 임신반응검사 음성", "images": [], "options": ["발프로산 추가", "리스페리돈 추가", "팔리페리돈 증량", "아리피프라졸로 교체", "아미설프라이드로 교체"], "answer": 3, "explanation": "조현병으로 인해 항정신병약물을 복용하고 있는 여성이 무월경과 유즙분비를 호소하고 있습니다. 현재 팔리페리돈을 복용 중인데, 이는 risperidone 계열 약물로 prolactin 증가 작용이 강해 해당 증상이 나타난 것으로 보입니다. 따라서 보기 중에서는 prolactin 증가 작용이 적은 아리피프라졸로 교체해야 하겠습니다. Ziprasidone 역시 prolactin 증가 작용이 적어 본 환자에서 사용할 수 있겠네요."}, {"major": "생물학적 치료", "minor": "항정신병약물의 작용기전과 분류", "qnum": "10", "question": "43세 여자가 2주 전부터 자꾸 젖이 흘러나온다며 병원에 왔다. 성욕이 감소하였고, 3개월 째 생리가 없었다. 국정원이 달에서 내려온 자신을 감시한다고 해서 6개월 전부터 정신건강의학과에서 약물치료를 받고 있다. 필요한 검사는?", "textbox": "", "images": [], "options": ["간기능검사", "갑상샘기능검사", "혈청 코티솔검사", "복용약물농도검사", "혈청 프로락틴검사"], "answer": 4, "explanation": "망상 증상을 보이는 환자입니다. 정황상 항정신병약을 사용하고 있을 확률이 높습니다. 항정신병약의 부작용으로 프로락틴이 증가되었을 때 발생할 수 있는 증상들을 보이고 있습니다. 따라서 혈청 프로락틴을 검사하여 프로락틴이 증가하였는지 확인하고, 약물 용량을 조절하는 것이 필요할 것으로 판단됩니다. 항정신병약의 약물농도검사는 아직 임상적으로 수행되고 있지는 않고, 프로락틴이 증가하였는지를 확인하는 것이 우선적입니다."}, {"major": "생물학적 치료", "minor": "항정신병약물의 작용기전과 분류", "qnum": "11", "question": "25세 남자가 화를 내고 욕을 한다며 어머니와 함께 병원에 왔다. 3개월 전에는 사는 것이 힘이 들고 아무도 자기를 좋아하지 않는 것 같아 죽으려는 마음을 먹었다고 한다. 2주 전부터 짜증이 나고 살고 있는 아파트에서 위층 주민의 발자국 소리가 예민하게 들려 경비실에 항의를 자주 하였다. 위층 사람들이 걸어 다니는 모습이 자꾸 떠올라 잠을 잘 수가 없었다. 1주 전에는 참다 못해 윗집으로 올라가 초인종을 눌렀고 문을 열어주지 않자 문을 발로 차고 욕을 하여 경찰이 오기도 하였다. 밤새 소음에 잠을 자지 못했는데도 피곤하지 않았다고 한다. 치료는?", "textbox": "", "images": [], "options": ["갈란타민", "부스피론", "올란자핀", "조피클론", "밀나시프란"], "answer": 2, "explanation": "폭력성을 주소로 병원을 방문한 25세 남자입니다. 이전에 자살 시도를 한 적이 있으며, 주위 자극에 예민하게 반응하여 난폭한 행동을 보이기도 하였습니다. 밤새 잠을 자지 않아도 피곤하지 않았던 것으로 보아 조증 삽화를 의심할 수도 있습니다. 하지만, 삽화 기간에 대한 언급이 없고, 이전에 3개월간 우울증으로 단정짓기는 어려워 주어진 정보만으로는 진단이 어려운 상황입니다. 하지만, 현재 공격성과 난폭한 행동을 보이는 것에 대해 비정형 항정신병 약물인 올란자핀을 쓸 수 있습니다. 갈란타민은 AChEI로 치매에 쓰이는 약제입니다. 부스피론은 항불안제, 조피클론은 비벤조디아제핀계 수면제, 밀나시프란은 SNRI 계열 항우울제입니다."}, {"major": "생물학적 치료", "minor": "항정신병약물의 작용기전과 분류", "qnum": "12", "question": "신체 건강한 20세 청년이 약 6개월 전부터 \"태양 빛이 나를 불태우려고 한다.\"라는 등의 엉뚱한 말과 한 번 취한 동작을 좀처럼 바뀌지 않는 이상한 행동을 주소로 내원하였다. 이 환자의 치료를 위한 약물의 주된 작용 기전은?", "textbox": "", "images": [], "options": ["신경 접합부에서 노르에피네프린을 방출한다.", "혈소판 단가아민 산화효소의 활성도를 증가시킨다.", "뇌척수액 내의 아세틸콜린을 감소시킨다.", "신경 접합부 이후 도파민 수용체를 차단시킨다.", "신경 접합부에서 세로토닌의 재흡수를 차단시킨다."], "answer": 3, "explanation": "antipsychotics의 기전\n1) 시냅스전 수용체를 차단하여 방출을 증가시키는 정신과 약물은 mirtazapine\n2) MAO억제제 : 혈중 Monoamine oxidase 작용 억제\n3) 항콜린성 작용이 있는 것은 삼환계 항우울제\n4) 도파민 수용체 차단 : 항정신병 약물\n5) 선택적 세로토닌 재흡수 차단제(SSRI) : 항우울제"}, {"major": "생물학적 치료", "minor": "항정신병약물의 작용기전과 분류", "qnum": "13", "question": "25세 남자가 5년 전부터 조현병으로 항정신병약물을 투여하던 중 추체외로증상이 발생하였다. 이러한 부작용과 관련이 깊은 도파민 신경 경로는?", "textbox": "", "images": [], "options": ["중간뇌변연계 경로(mesolimbic pathway)", "중간뇌겉질 경로(mesocortical pathway)", "흑질줄무늬체 경로(nigrostriatal pathway)", "겉질깔때기 경로(tuberoinfundibular pathway)", "중심분절 경로(central segmental pathway)"], "answer": 2, "explanation": "뇌간의 흑질에서 기시하여 선조체에 닿는 경로는 기저핵을 통한 추체외로 운동제어계에 작용합니다. 파킨슨병에서 이국의 도파민계의 파괴가 보입니다. 항정신병약물이 파킨슨양 부작용을 갖는 이 때문입니다. nigrostriatal pathway의 차단으로 추체외로 증상을 야기하여 부작용을 나타냅니다."}, {"major": "생물학적 치료", "minor": "항정신병약물의 작용기전과 분류", "qnum": "14", "question": "42세 여자가 1개월 전부터 혼잣말을 하고 불안하여 남편과 함께 병원에 왔다. \"보이지 않는 사람이 내게 행동을 지시한다.\", \"검은색 양복을 입은 사람이 나를 감시한다.\", \"모든 사람이 내 생각을 알고 있다.\"고 하였다. 1년 전부터 이상지질혈증으로 치료 중이었고, 양쪽 무릎 골관절염이 심하였다. 키 152cm, 몸무게 80kg이었다. 치료는?", "textbox": "", "images": [], "options": ["발프로산", "올란자핀", "클로자핀", "미르타자핀", "지프라시돈"], "answer": 4, "explanation": "기간이 1개월이어서 단기정신병장애와 조현양상 장애를 정확히 구분하기는 힘드나, 치료로 항정신병 약물을 사용해야 합니다. 환자의 경우 BMI가 30이 넘어서 고도비만이네요. 체중증가의 부작용이 없는 약제를 선택해야겠습니다. Aripiprazole과 ziprasidone 외에는 모두 체중 증가의 부작용이 있으니, 정답으로는 ziprasidone이 적당하겠습니다. '알(Aripiprazole)/지(Ziprasidone)으로 압축해서 체중감소!' 기억해두세요."}, {"major": "생물학적 [], "options": ["정위불능", "파킨슨증후군", "지연성 운동장애", "급성 근긴장 이상증", "신경이완제 악성 증후군"], "answer": 0, "explanation": "투여 초기의 불수의적 좌불안 상태 : “정위불능” (akathisia)\n→ 치료 : 약물투여 중단/감량, propranolol, benzodiazepine계 약물"}, {"major": "생물학적 치료", "minor": "항정신병약물의 부작용 및 금기", "qnum": "11", "question": "25세 여자가 1시간 전에 의식을 잃은 채로 발견되어 응급실로 실려 왔다. 1개월 전 조현병으로 진단되어 치료 약제를 증량하고 있었다. 혈압 110/70mmHg, 맥박 120회/분, 호흡 26회/분, 체온 40.2℃이다. 큰 소리로 이름을 불러도 반응이 없으나 통증 자극에는 다리를 조금 움직인다. 사지의 근 긴장도가 증가되어 있다. 몸통과 사지에서 30분 간격으로 경직을 동반한 경련이 20초 정도 지속된다. 검사 결과는 다음과 같다. 진단은?", "textbox": "• 혈액: 혈색소 10.5g/dL, 백혈구 15,500/mm³, 혈소판 140,000/mm³, 혈액요소질소/크레아티닌 45/2.1mg/dL, Na⁺/K⁺/Cl⁻ 152/3.9/118mEq/L, 아스파르테이트아미노전달효소 1,820U/L, 알라닌아미노전달효소 320U/L, 총빌리루빈 1.1mg/dL, 크레아틴키나아제 84,300U/L(참고치, 51~294)\n• 소변: 비중 1.025, 단백질(1+), 잠혈(3+), 적혈구 0~1/고배율시야\n• 동맥혈가스: pH 7.50, PaCO₂ 26.0mmHg\n(대기호흡) PaO₂ 57.2mmHg, HCO₃⁻ 19.0mEq/L, SaO₂ 90.2%\n• 뇌 컴퓨터단층촬영: 정상", "images": [], "options": ["열사병(heat stroke)", "코카인중독(cocaine intoxication)", "세로토닌증후군(serotonin syndrome)", "용혈요독증후군(hemolytic uremic syndrome)", "신경이완제악성증후군(neuroleptic malignant syndrome)"], "answer": 4, "explanation": "조현병 치료제를 복용하던 중 발생한 증상으로 내원한 환자입니다. 1개월 전부터 복용하기 시작했고 증량을 하고 있었기 때문에 항정신병약물에 의한 부작용을 우선적으로 고려합니다. 환자는 고열, 의식장애, 심한 근육강직, 백혈구 증가, CK 상승이 있어 Neuroleptic malignant syndrome에 가장 합당한 임상 양상임을 알 수 있습니다."}, {"major": "생물학적 치료", "minor": "항정신병약물의 부작용 및 금기", "qnum": "12", "question": "수술 후 섬망으로 리스페리돈(risperidone 4mg/일), 로라제팜(lorazepam 1mg/일)을 복용 중인 47세 남자환자가 잠을 잘 자게 되고 환각이 없어지며 지남력과 인지기능이 호전되어 가던 중 몸이 쑤시다면서 침대에서 자꾸 내려오려 하고 병실을 서성거리고 불안해하였다. 자신도 불안한 이유를 모르겠다고 하였다. 가장 가능성이 높은 진단은?", "textbox": "", "images": [], "options": ["뇌손상에 의한 치매의 조기 증상", "적응장애", "로라제팜에 의한 역설적 탈억제", "리스페리돈에 의한 정좌불능증", "약물내성에 의한 섬망의 악화"], "answer": 3, "explanation": "치매가 생기기에는 급작스러운 발병이므로 제외할 수 있고, 적응 장애라고 보기에는 “수술”이란 생명에 직접적인 위해가 가지 않는 스트레스가 아니므로 제외됩니다. 따라서 약물에 의한 부작용으로 생각해야 합니다. 이때 환자가 호소하는 막연한 불안, 표현하기 어려운 불편한 느낌과 지속적으로 왔다 갔다 하고 의자를 흔들거나 안절부절 못하는 증상은 정좌불능증입니다. EPS의 하나로 대개 항정신병약물 투여 수 시간에서 수일 내에 나타나며 정형적인 항정신병약물일 경우 20~25%에서 발생합니다. 역설적 탈억제는 행동조절이 제대로 이뤄지지 않는 증상이므로 환자와 맞지 않습니다. 또한 섬망의 악화로 보기에도 환각, 인지 기능의 저하 등이 보이지 않아 합당하지 않습니다."}, {"major": "생물학적 치료", "minor": "항정신병약물의 부작용 및 금기", "qnum": "13", "question": "조현병 치료를 위해 약 3개월간 약물을 투여하였으나 효과가 없어 약물을 교체하였다. 새로운 약물 투여 후 갑자기 체중이 늘고 혈액검사에서 백혈구 감소증을 보였다. 교체 투여했을 가능성이 높은 약물은?", "textbox": "", "images": [], "options": ["퀘티아핀(quetiapine)", "몰린돈(molindone)", "리스페리돈(risperidone)", "올란자핀(olanzapine)", "클로자핀(clozapine)"], "answer": 4, "explanation": "molindone을 제외한 다른 약물들은 2세대 비정형 항정신병약물\n1) 퀘티아핀 : 진정작용, 저혈압이 특징적 부작용\n2) 몰린돈 : 체중증가가 없는 정형 항정신병약물\n3) 리스페리돈 : 유즙 분비, 추체외로 증후군\n4) 올란자핀 : 항콜린, 진정, 저혈압, 체중증가\n5) 클로자핀 : 보통 무과립구증만 외워두었을 텐데 체중증가도 흔한 부작용이니 알아두세요."}, {"major": "생물학적 치료", "minor": "항정신병약물의 부작용 및 금기", "qnum": "14", "question": "25세 남자가 피해망상, 환청, 불면증으로 내원하였다. 입원 치료 중 3일째에 왼쪽으로 목이 돌아가 심한 통증을 호소하였다. 이 환자가 복용한 약물은 무엇인가?", "textbox": "", "images": [], "options": ["리스페리돈", "파록세틴", "클로르프로마진", "할로페리돌", "알프라졸람"], "answer": 3, "explanation": "투여 초기(대개 4일째) 목과 어깨 등이 갑자기 뒤틀리는 사정 및 안구운동발작, 연하곤란 : 급성 근긴장이상증(Acute dystonia)\nhaloperidol, piperazine계 phenothiazine 등의 고역가 항정신병 약물의 대표적 부작용 중 하나입니다.\n치료 : benztropine, diphenhydramine, benzodiazepine 등\n1) 비정형 항정신병약\n2) SSRI계 항우울제\n3) 저역가 정형 항정신병약\n4) 고역가 정형 항정신병약\n5) benzodiazepine계 항불안제"}, {"major": "생물학적 치료", "minor": "기분안정제", "qnum": "01", "question": "29세 여자가 2주일 전부터 평소에 안 하던 공부를 한다고 밤을 새우고, 이전과 다르게 직장 동료들과 자꾸 싸우고 쉽게 흥분하였다. 혈액검사는 다음과 같았다. 치료는?", "textbox": "아스파르테이트아미노전달효소(AST) 130U/L, 알라닌아미노전달효소(ALT) 96U/L", "images": [], "options": ["리튬", "플루옥세틴", "카르바마제핀", "발프로산", "이미프라민"], "answer": 0, "explanation": "비정상적으로 들뜬, 확장된, irritable한 기분이 1주일 이상 지속되고 있으며, 감소된 수면 요구, 정신운동초조(흥분) 등을 보이고 있으므로 조증 혹은 경조증 삽화를 보이고 있습니다. 치료로는 Li이나 valproate, carbamazepine 등을 사용할 수 있습니다. 그런데 환자의 경우 AST, ALT가 증가해 있어 간기능 이상이 있음을 알 수 있고, valproate와 carbamazepine은 간기능을 악화시키므로 사용할 수 없습니다. 참고로 Li을 사용하면 심장, 신장, 갑상선에 이상이 생길 수 있습니다."}, {"major": "생물학적 치료", "minor": "기분안정제", "qnum": "02", "question": "20세 여자 대학생이 평소와 달리 잠을 자지 않고 말이 많아지며 기분이 들떠 있었다. \"나는 세계평화를 수호하기 위한 중요한 사람이다\"라는 등 과대망상이 심하였다. 정신과 병동에 입원하여 약물치료를 받고 호전되던 중 갑자기 오심, 구토와 복통을 호소하였고 안구운동장애, 언어장애, 경련발작이 발생하였다. 가장 우선적으로 의심해야 할 원인은?", "textbox": "", "images": [], "options": ["항콜린성 섬망상태", "신경이완성 악성 증후군", "항경련제 금단증상", "지연성 운동장애", "리튬 중독"], "answer": 4, "explanation": "과대망상을 보이고 잠을 자지 않고 말이 많아지는 등 조증 삽화를 보이고 있습니다. 이 때 사용하는 약제는 Li이므로, 그에 따른 부작용으로 유추됩니다. Lithium사용 후 1~2주 동안에는 약간의 메스꺼움, 구토, 설사, 복통, 식욕부진, 입 마름, 피로 등이 나타나고, 심할 경우 안구운동장애, 언어장애, 경련 등으로 자두 투여함으로써 해소할 수 있습니다. 항콜린성 섬망상태는 말 그대로 ‘섬망’의 증상을 보입니다. 따라서 인지기능장애, 환각 등 이 있겠죠. 신경이완성 악성 증후군은 근육 강직이 동반되어야 합니다."}, {"major": "생물학적 치료", "minor": "기분안정제", "qnum": "03", "question": "25세 여자가 5년 전부터 조증과 우울증의 반복적인 삽화로 괴로움을 호소하여 병원에 왔다. 내원 후 시행한 검사실 검사에서 혈액 백혈구가 2,500/mm³, AST/ALT가 각각 80U/L, 70U/L이었다. 갑상선 기능검사에서 정상소견을 보였을 때, 이 환자의 치료로 가장 적합한 약물은?", "textbox": "", "images": [], "options": ["Carbamazepine", "Valproate", "Lithium", "Fluoxetine", "Imipramine"], "answer": 2, "explanation": "5년 전부터 조증과 우울증이 반복적으로 있던 환자로 현재 기분안정제를 처방해야 합니다. 환자의 검사실결과를 봤을 때 백혈구의 감소증이 있고, 간수치는 mild elevation을 보이고 있습니다. 보기 중 기분안정제는 1~3번 보기입니다. 이 중 항경련제인 carbamazepine과 valproate는 조혈장애와 간기능 장애를 초래한다고 알려져 있어 환자에게는 부적절합니다. 남은 것이 Lithium인데 현재 환자가 갑상선 기능에 문제가 없고 임신 상태가 아니며 심장, 신장 등 장기에 이상이 없으므로 가장 적합한 답이 되겠습니다. 참고로 교과서에서는 리튬이 조혈 기관 장애, 그 중에서도 백혈구 증가를 일으킬 수 있다고 언급되어 있습니다."}, {"major": "생물학적 치료", "minor": "기분안정제", "qnum": "04", "question": "46세 남자가 잘 걷지 못하고 말이 어둔하며 의식저하를 보여 응급실로 내원하였다. 검진소견 상 안구진탕을 보이고, DTR이 항진되어 있었다. 양극성장애로 치료받고 있던 환자로서 방에서 다수의 빈 약봉지가 발견되었다. 복용이 의심되는 약은?", "textbox": "", "images": [], "options": ["Lithium", "Valproate", "Diazepam", "Haloperidol", "Fluoxetine"], "answer": 0, "explanation": "중독 증상은 혈중 lithium의 농도가 높을수록, 높은 상태가 오래갈수록 더욱 심해집니다. ① Mild-moderate : vomiting, abdominal pain, ataxia, nystagmus, lethargy ② Moderate-severe : anorexia, blurred vision, hyperactive DTR, convulsions ③ Severe : generalized convulsions, renal failure, death"}, {"major": "생물학적 치료", "minor": "기분안정제", "qnum": "05", "question": "리튬으로 장기간 치료중인 양극성장애 환자가 요즘 들어 추위를 타고 전신 쇠약감을 호소하였다. 진단을 위해 가장 적절한 검사는?", "textbox": "", "images": [], "options": ["덱사메타손 억제 검사", "마그네슘 혈중 농도 측정", "리튬 농도 측정", "소변 및 간기능 검사", "갑상샘 기능 검사"], "answer": 4, "explanation": "추위를 타고 전신쇠약감이 있는 것은 리튬의 부작용으로 갑상선 기능저하를 의심해야 합니다. 리튬 사용 시 약 20%에서 혈중농도와 관계없이 가역적인 갑상선 기능저하증이 나타납니다."}, {"major": "생물학적 치료", "minor": "항우울제", "qnum": "01", "question": "25세 여자가 1개월 전부터 잠을 잘 자지 못하고 우울하다며 병원에 왔다. 자려고 누우면 다리에 설명하기 힘든 이상한 느낌이 들어서 잠들기가 어려웠고, 가만히 누워 있으면 자꾸 움직이고 싶은 충동을 느낀다고 한다. 이런 증상은 다리를 두드리거나 움직이면 조금 나아지며, 낮에는 거의 나타나지 않고 밤에 심해진다고 한다. 수면 부족 때문인지는 모르지만 1개월 전부터 뚜렷한 이유 없이 매사에 의욕도 없고, 주변에서 재미있는 이야기를 들어도 전혀 즐겁지가 않고, 과거에 잘못한 일들이 반복적으로 떠올라 자꾸 눈물이 난다고 한다. 평소 생리량이 많고 자주 어지럽다고 한다. 치료는?", "textbox": "", "images": [], "options": ["벤라팍신", "서트랄린", "부프로피온", "플루옥세틴", "아미트리프틸린"], "answer": 2, "explanation": "항우울제의 자세한 기전까지 알아야 풀 수 있는 문제입니다. 불면과 우울을 주소로 온 25세 여자환자는 RLS(Restless leg syndrome; RLS)에 전형적인 증상과 함께 주요우울장애로 진단할 수 있는 증상을 보이고 있습니다. 평소 생리량이 많고 자주 어지러운 것으로 보아 RLS를 유발하는 요인인 철결핍이 동반되어 있음을 유추할 수 있습니다. RLS의 다른 약물적 치료로는 pramipexole, ropinirole 같은 dopamine agonist를 사용하는데 보기에 항우울제 중에 bupropion은 dopamine과 norepinephrine의 재흡수를 억제하는 작용이 있기 때문에 해당 상황에서 효과적으로 쓰일 수 있습니다. bupropion은 뇌전증을 촉발시킬 수 있는 부작용을 가지고 있는데 해당 환자는 뇌전증 병력이 없기 때문에 사용이 가능합니다."}, {"major": "생물학적 치료", "minor": "항우울제", "qnum": "02", "question": "35세 남자가 성욕이 줄고 발기가 되지 않는다고 병원에 왔다. 무기력하고 우울하여 파록세틴을 3개월째 복용하고 있었다. 교체할 약물은?", "textbox": "", "images": [], "options": ["둘록세틴", "벤라팍신", "서트랄린", "부프로피온", "이미프라민"], "answer": 3, "explanation": "파록세틴은 SSRI로, 부작용으로 성기능 장애가 발생할 수 있습니다. Bupropion은 이러한 성기능 장애가 있을 때 활용할 수 있습니다."}, {"major": "생물학적 치료", "minor": "항우울제", "qnum": "03", "question": "48세 여자가 2주 전부터 발열, 발한, 안절부절못함, 떨림, 안면홍조, 경직, 설사, 졸림 증상이 있어 응급실에 왔다. 3년 전부터 플루옥세틴, 할로페리돌, 리튬을 복용하다가 3주 전부터 우울증상이 심해져 파록세틴을 추가로 복용 중이었다. 응급실에서 측정한 혈중 리튬농도는 1.2mEq/L이었다. 진단은?", "textbox": "", "images": [], "options": ["정좌불능증", "파킨슨증", "항콜린성 섬망", "리튬독성", "세로토닌 증후군"], "answer": 4, "explanation": "Li 농도 1.2mEq/L은 유지용량의 upper limit에 해당되는 농도로 Li에 의한 독성이 나타나기 위해선 1.5mEq/L 이상이 되어야 합니다. 환자가 보이는 증상은 serotonin 증후군의 주된 증상과 일치합니다. serotonin 증후군-SSRI 또는 MAOI 사용 시 혈중 농도가 독성 수준으로 상승하여 이 증후군이 나타날 수 있습니다. 주된 증상으로 설사, 쇠약, 불안, 심한 걱정, hyper reflection, 자율신경계기능 불안정, myoclonus, 고열, 진전, 경직이 있고, 심하면 섬망, 혼수, 중첩성 뇌전증을 보입니다. 치료로는 약물의 중단, 지지치료, nitroglycerin, BZD 등이 사용됩니다."}, {"major": "생물학적 치료", "minor": "항우울제", "qnum": "04", "question": "Complete AV block으로 치료를 받고 있는 35세 여자가 최근 심한 우울감과 식욕 저하 및 불면증으로 병원에 왔다. 이 환자에게 가장 적합한 항우울제는?", "textbox": "", "images": [], "options": ["Alprazolam", "Imipramine", "Fluoxetine", "Propranolol", "Doxepin"], "answer": 2, "explanation": "우울증의 치료제로는 TCA와 SSRI를 사용할 수 있습니다. 하지만 심하게 항우울제의 심혈관계에 부작용이 있기 때문에 complete AV block 환자에서는 SSRI를 사용하는 것이 좋습니다. alprazolam은 BZD, imipramine과 doxepin은 TCA이고, propranolol은 BB입니다."}, {"major": "생물학적 치료", "minor": "항우울제", "qnum": "05", "question": "22세 여자가 공부를 하려고 해도 집중이 잘 되지 않는다면 병원에 왔다. 3개월 전 기말고사를 망친 이후 기분이 우울하고 아무것도 하기가 싫었다고 한다. 특히 아침에 일어난 이후에 기분이 쳐지고 무기력해진다고 한다. 잠을 잘 자지 못했고, 밥맛이 없어 체중이 1개월 동안 7kg 정도 줄었다. 1주일 전 자살 목적으로 수면제 10알을 한꺼번에 먹기도 하였다. 어릴 적부터 뇌전증이 있어 항경련제를 복용 중이며, 다른 정신과적 과거력은 없었다. 치료는?", "textbox": "", "images": [], "options": ["벤라팍신", "부스피론", "클로자핀", "부프로피온", "메틸페니데이트"], "answer": 0, "explanation": "2주 이상 지속된 집중력 감퇴, 우울함, 불면, 체중감소, 자살시도 등을 보이는 주요우울장애 환자입니다. 보기에 제시된 항우울제로는 NDRI에 해당하는 부프로피온, SNRI에 해당하는 벤라팍신이 있습니다. 부프로피온은 뇌전증을 유발할 수 있기에, 뇌전증으로 항경련제를 복용하고 있는 환자에게 적합하지 않습니다. 벤라팍신은 SSRI 사용으로 성기능장애가 발생한 환자에서 교체약물로 사용될 수 있습니다.2) 부스피론 : 항불안제3) 클로자핀 : 비정형정신병약물5) 메틸페니데이트(Methylphenidate) : 정신자극제, 주로 ADHD 치료에 이용"}, {"major": "생물학적 치료", "minor": "항우울제", "qnum": "06", "question": "43세 여자가 2개월 전부터 잠을 못자고 우울해서 병원에 왔다. 지난 2개월 동안 체중이 6kg 줄었으며 걱정하였다. 2년 전에 처음 우울증을 진단받고 약을 복용했으나 식욕이 더 떨어져 중단했다고 한다. 다른 신체적 질환은 없었다. 정신상태검사에서 불면, 정신운동초조, 식욕저하, 집중력저하를 보였다. 치료 약물은?", "textbox": "", "images": [], "options": ["부프로피온(bupropion)", "리스페리돈(risperidone)", "라모트리진(lamotrigine)", "미르타자핀(mirtazapine)", "메틸페니데이트(methylphenidate)"], "answer": 3, "explanation": "우울함과 체중감소, 정신운동 초조 등의 증상을 보이고 있는 주요우울장애 환자입니다. 우울증에 대한 약으로 대개 SSRI를 시도하는데, 가장 흔한 부작용은 위장관계 부작용으로 오심, 구토, 설사 및 식욕저하가 발생할 수 있습니다. 식욕저하 부작용이 없고 우울증에 사용할 수 있는 약으로는 mirtazapine이 있습니다. Mirtazapine은 식욕증가 작용이 있기 때문에 식욕저하가 문제인 환자에서 효과적으로 사용이 가능합니다. Bupropion은 성기능 장애가 있을 때 활용할 수 있고 대체적으로 식욕을 떨어뜨리는 것으로 알려져 있습니다."}, {"major": "생물학적 치료", "minor": "항우울제", "qnum": "07", "question": "42세 여자가 우울증 치료를 위해 파록세틴(paroxetine)을 8개월간 복용하였다. 우울증이 회복되어 약물의 감량을 권하였으나, 자의로 약물을 중단하였다. 중단 후 이틀째부터 구역, 두통, 현기증이 심해지고 다시 불안 증상이 발생하였다. 선명한 꿈이 많아졌다고 한다. 현재 상태는?", "textbox": "", "images": [], "options": ["세로토닌증후군", "우울증상 악화", "좌불안석증", "약물중단현상", "항콜린작용"], "answer": 3, "explanation": "SSRI 투약을 갑자기 중단할 경우 많은 환자들이 금단 증상을 경험하게 됩니다. 전형적인 증상은 구역, 구토, 선명한 꿈, 흥분, 현기증 등이 있습니다. 이러한 증상은 약을 서서히 감량함으로써 최소화할 수 있습니다."}, {"major": "생물학적 치료", "minor": "항우울제", "qnum": "08", "question": "주요우울장애로 장기간 약물치료 받은 환자에서 성기능장애와 체중증가가 발생하였다. 자의로 약을 끊은 후 우울증이 재발하였을 때 치료제로 적합한 것은?", "textbox": "", "images": [], "options": ["Sertraline", "Fluoxetine", "Paroxetine", "Bupropion", "Amitriptyline"], "answer": 3, "explanation": "① TCA 부작용: 항콜린성 부작용, 심계항진 및 부정맥 발생, 성기능장애\n② SSRI 부작용: 성욕감퇴, 체중감소, 세로토닌 증후군\n4) Bupropion은 중추신경계 외에 다른 인체 장기에 대한 작용이 거의 없는데, 오히려 체중을 감소시키고, 성기능에 별 영향을 미치지 않습니다."}, {"major": "생물학적 치료", "minor": "항불안제 및 수면제", "qnum": "01", "question": "23세 남자가 1개월 전 폭발물 사고를 겪은 후 사고 장면이 머릿속을 떠나지 않아 매우 예민하고 두려우며 집중하기 어렵다고 병원에 왔다. 1주 일 전부터 에스시탈로프람과 알프라졸람을 복용한 후 증상이 조금 나아졌으나, 가끔 날카로운 소리가 들리면 과호흡을 하며 불안해한다. 그때마다 알프라졸람을 추가로 복용하면 불안감은 호전되나 졸려서 힘들다고 한다. 알프라졸람의 대체 약물은?", "textbox": "", "images": [], "options": ["독세핀", "트라조돈", "노르트립틸린", "프로프라놀롤", "메틸페니데이트"], "answer": 3, "explanation": "불안증세를 주소로 현재 에스시탈로프람과 알프라졸람을 복용하는 23세 남자 환자입니다. 불안감 호전을 위해 알프라졸람을 추가 복용하고 있고, 불안감은 호전되나 졸린 양상을 보이고 있어 대체 약물을 묻는 문제입니다. 이 경우 진정/수면 부작용이 없는 베타차단제인 프로프라놀롤을 이용할 수 있습니다. 베타차단제의 경우 기관지 천식이 있는 경우에 금기이지만 이 환자에는 해당사항이 없어 사용이 가능합니다."}, {"major": "생물학적 치료", "minor": "항불안제 및 수면제", "qnum": "02", "question": "23세 남자가 난폭하고 예민하여 병원에 왔다. 6개월 전부터 불면증이 심하여 자기 전 에스시탈로프람 5mg, 졸피뎀 10mg을 복용하기 시작하였다. 약을 복용하였을 때에는 난폭해지고 예민해져 주변 사람들이 말릴 수가 없고 과소비를 하고, 약에 취한 채 운전을 하여 여러 번 교통사고가 났었다고 한다. 이러한 일들을 전혀 기억하지 못한다고 하며, 약을 복용하지 않았을 때에는 괜찮았다고 한다. 혈압 124/68mmHg, 맥박 80회/분, 호흡 20회/분, 체온 36.5℃이다. 면담 중에는 예민하지 않고 차분하게 얘기한다. 조치는?", "textbox": "", "images": [], "options": ["졸피뎀 감량", "졸피뎀 중단", "발프로산 추가", "에스시탈로프람 중단", "에스시탈로프람 오전으로 변경"], "answer": 1, "explanation": "불면증으로 에스시탈로프람(SSRI), 졸피뎀을 복용하던 환자입니다. 약을 복용했을 때 난폭해지고 예민해지며, 과소비 등의 문제활동을 하고, 이러한 일들을 전혀 기억하지 못한다고 합니다. 또한 약을 복용하지 않았을 때에는 괜찮다는 점을 생각하면 약물로 인해서 유발되었을 것이라고 유추할 수 있습니다. 졸피뎀의 부작용으로 주의력 저하, sleep driving, anterograde amnesia, 비정상적 공격성 및 외향성, 초조, 환각 등이 보고되고 있으며 이는 환자가 호소하는 증상과 부합합니다. 따라서 졸피뎀을 중단해야 하겠습니다."}, {"major": "생물학적 치료", "minor": "항불안제 및 수면제", "qnum": "03", "question": "벤조디아제핀계 약물 중 고용량을 장기간 사용 도중 중단하였을 때, 반동불안과 같은 금단 증상을 보일 가능성이 가장 높은 것은?", "textbox": "", "images": [], "options": ["Buspirone", "Diazepam", "Alprazolam", "Clonazepam", "Chlordiazepoxide"], "answer": 2, "explanation": "장기간 벤조디아제핀을 고용량으로 복용하던 중, 급작스럽게 투여를 중단하면 심각한 신체적 및 심리적 금단 증상이 출현할 수 있으며, 반감기가 짧은 제제를 복용하던 환자에서 더 신속하고 강력하게 나타납니다. 위에 열거된 약제 중 반감기가 가장 짧은 alprazolam이 금단증상을 일으킬 위험이 가장 높습니다."}, {"major": "생물학적 치료", "minor": "항불안제 및 수면제", "qnum": "04", "question": "48세 여자가 1년 전부터 불안하고 집중력이 떨어진다고 병원에 왔다. 매사에 걱정이 지나치게 많고 긴장이 자주 되었는데 6개월 전 만성폐쇄폐질환이 악화되면서 증상이 더 심해졌다고 한다. 최근에는 잠을 자다가 몇 초간 숨을 안 쉴 때가 있다며 걱정하였다. 치료는?", "textbox": "", "images": [], "options": ["졸피뎀", "디아제팜", "로라제팜", "부스피론", "아토목세틴"], "answer": 3, "explanation": "불안장애가 있는 여성으로 항불안제를 사용해야겠습니다. 보기에서는 아토목세틴을 제외한 보기를 고려해 볼 수 있습니다. 환자가 잠을 자다가 몇 초간 숨을 안 쉬는 것을 걱정하고 있기 때문에 여러 보기들 중 진정작용이 없는 부스피론을 사용하는 것이 제일 좋은 선택입니다. 참고로 아토목세틴은 NRI 혹은 SNRI로 분류되는 약으로 ADHD에 사용됩니다."}, {"major": "생물학적 치료", "minor": "항불안제 및 수면제", "qnum": "05", "question": "2개월 전 두부외상력이 있는 39세 남자가 불면증으로 내원하였다. 불안하고 잠을 못 잔다고 하여 디아제팜 20mg을 복용하기 시작하였다. 복용 후 이틀째부터 잠을 더 못 자고 쉽게 흥분하며 불안해하고 공격적 행동을 보였다. 이 상태는?", "textbox": "", "images": [], "options": ["심리의존(psychological dependence)", "탈억제(disinhibition)", "강화(reinforcement)", "신체의존(physical dependence)", "내성(tolerance)"], "answer": 1, "explanation": "벤조디아제핀이 행동의 탈억제를 초래하여 오히려 공격적인 행동을 유발하는 경우가 있습니다. 노인 환자, 뇌손상 환자, 혹은 반사회성/경계성 성격장애 환자에서 이러한 역설적인 반응이 나타날 수 있습니다. 불면 및 불안 증상이 약제 복용 후 오히려 악화되었으므로 탈억제에 해당합니다."}, {"major": "생물학적 치료", "minor": "항불안제 및 수면제", "qnum": "06", "question": "상복부 통증과 체중감소를 주소로 입원하여 검사를 받고 있는 70세 남자가 불안과 초조 등의 증상을 보여 정신과에 의뢰되었다. 신체검진 상 황달 소견을 보이고 간기능 검사도 이상소견을 보였다. 정신상태검사에서 지남력과 인지기능은 모두 정상이었다. 이 환자의 불안 증상을 완화시키기 위해 가장 적합한 약물은?", "textbox": "", "images": [], "options": ["Chlordiazepoxide", "Flurazepam", "Diazepam", "Lorazepam", "Chlorpromazine"], "answer": 3, "explanation": "Lorazepam, oxazepam, temazepam은 작용 시간이 짧고 간을 거치지 않고 대사되기 때문에 노인이나 간 기능장애 환자에서 안전하게 사용할 수 있습니다."}, {"major": "생물학적 치료", "minor": "전기경련요법 및 기타 생물학적 치료", "qnum": "01", "question": "33세 남자가 손목에서 피를 흘리면서 보호자와 함께 병원에 왔다. \"누가 나를 죽이려 한다. 이 병원도 믿을 수 없다.\"라며 모든 처치와 면담을 거부하였다. 2년 전에는 기분이 들떠 부자가 될 거라며 큰 돈을 빌려 밤새도록 코인을 거래하였다. 번 돈을 노리고 조폭이 나를 미행하는 것 같다며 바깥 출입을 못하였다. 집에서 불안해하고 자해를 하여 입원하였다. 입원해서도 자해가 계속되어 2주 동안 진정제를 맞았고 강박 처치를 반복적으로 받았다. 행동이 안정된 후 퇴원하여 약물을 복용하는 중에 음식을 삼키기 힘들어서 약물을 먹지 않고 지냈다. 1년 전에는 아무것도 하지 못하고 누워만 지내며 우울해하다가 1개월 전에는 손해를 본 코인을 돌려받겠다며 코인 회사를 찾아가 소란을 피웠고 \"회사 대표가 코인을 빼 갔고 나를 죽이려 한다.\"라며 \"자살을 하여 이를 세상에 알리겠다.\"는 말을 하고 다녔다. 치료는?", "textbox": "", "images": [], "options": ["생체되먹임", "전기경련요법", "미주신경자극술", "두개경유자기자극술", "두개경유직류자극술"], "answer": 2, "explanation": "33세 남성이 자해 시도 및 피해망상으로 내원하였습니다. 과거 조증 삽화(들뜬 기분, 큰 돈을 빌려 코인 거래)와 우울 삽화(우울하고 누워만 지냄)가 모두 존재하므로 제1형 양극성 장애로 추정되며, 현재 누군가 자신을 죽이려 한다는 피해망상 및 자살 사고가 동반되어 전반적인 정신병적 증상이 심한 급성 기분장애입니다. 또한 음식을 삼키기 어려워 약물 복용이 불가능한 상태입니다. 따라서 생물학적 치료가 고려될 수 있는 상태입니다. 정신병적 우울증, 자살고위험군, 급성 조증삽화, 조현병 등에 효과적인 전기경련요법(ECT)가 치료로 가장 적합합니다.1) 생체되먹임 : 보조적, 비약물적 기법으로 정신병적 증상을 동반한 급성 기분장애의 일차치료로 부적절합니다.3) 미주신경자극술 : 만성 난치성 우울증에 사용하는 치료로, 효과 발현에 오래 걸리고 현 상황에 부적절합니다.4), 5) 두개경유자기자극술, 두개경유직류자극술 : 주로 비정신병적 우울증에 사용되며 현재 환자의 상태를 고려할 때 일차치료로 부적절합니다."}, {"major": "생물학적 치료", "minor": "전기경련요법 및 기타 생물학적 치료", "qnum": "02", "question": "다음 중 ECT 치료가 가장 효과적인 적응증은?", "textbox": "", "images": [], "options": ["강박장애", "급성 조증", "망상장애", "신체화 장애", "만성조현병"], "answer": 1, "explanation": "ECT는 다양한 정신과적 장애에 시도되고 있지만, 대부분 우울증이나 양극성장애 등과 같은 기분장애의 치료로 사용됩니다."}, {"major": "생물학적 치료", "minor": "전기경련요법 및 기타 생물학적 치료", "qnum": "03", "question": "20세 남자가 1주 전부터 방에서 나오지도 않고 아무것도 먹지 않았다. 2일 전부터는 말도 하지 않고 죽은 듯이 누워 있다가 갑자기 벌떡 일어나서 손가락을 돌리는 등 이상한 행동을 보여 병원에 왔다. 입원 후에도 의사에게 전혀 반응을 보이지 않고 괴이한 행동을 반복하였다. 이 환자의 치료로 가장 적합한 것은?", "textbox": "", "images": [], "options": ["인지 치료", "전기경련요법", "지지 정신치료", "노출 후 반응 차단", "항우울제 단독 투여"], "answer": 1, "explanation": "전기경련요법은 조현병에서 긴장(catatonic) 증상 또는 정동 증상이 동반되는 경우나 급성 조현병에서 항정신병약물과 동등한 효과를 기대할 수 있습니다."}, {"major": "생물학적 치료", "minor": "전기경련요법 및 기타 생물학적 치료", "qnum": "04", "question": "46세 여자가 3개월 전부터 기분이 우울하고 의욕이 없고 식욕이 줄었으며 병원에 왔다. 2년 전 우울증으로 진단받고 에스시탈로프람을 복용하던 중 증상이 좋아져 2개월만에 자의적으로 투약을 중단하였다고 한다. 이번에 증상이 악화되어 증량하여 투약했음에도 효과가 충분치 않다고 한다. 비약물적 치료를 병행하기를 원한다고 하나, 주사나 마취, 수술적 처치는 원하지 않는다고 한다. 치료는?", "textbox": "", "images": [], "options": ["대상회절개술", "심부뇌자극술", "자기발작치료", "미주신경자극술", "경두개자기자극술"], "answer": 4, "explanation": "약물 치료에 효과가 잘 없는 우울증 환자가 주사나 마취, 수술적 처치가 없는 비약물적 치료를 병행하기를 원합니다. 경두개자기자극술(TMS)은 전자기 코일을 머리 표면의 특정 부위에 놓고 자기장을 통해 특정 부위의 뇌신경세포를 활성화시키는 뇌 자극술로, 치료 효과가 만족스럽지 못한 우울증 치료에 사용되며 비침습적이기 때문에 환자의 상황에 맞는다고 볼 수 있겠습니다."}, {"major": "생물학적 치료", "minor": "전기경련요법 및 기타 생물학적 치료", "qnum": "05", "question": "임신 4개월인 산모가 2일 전부터 잠도 자지 않고 먹지도 않으며 소파에 앉아서 꼼짝도 하지 않고 창밖을 바라보기만 하여 남편과 함께 병원을 방문하였다. 환자는 과거에도 비슷한 증상으로 정신과 병동에 입원한 바 있었다. 남편은 출산을 희망하고 있으나 환자는 자신이 임신했다는 사실을 모르고 있는 상태이다. 이 환자에 대한 조치로 옳은 것은?", "textbox": "", "images": [], "options": ["남편에게 임신중절 수술을 권한다.", "벤조디아제핀계 약물이 일차치료제이다.", "특별한 조치 없이 만삭까지 유지시킨다.", "태아에게 가장 안전한 전기경련요법을 시도한다.", "전기경련요법과 항정신병 약물을 증상에 따라 적절히 사용한다."], "answer": 4, "explanation": "전기경련요법에 절대금기는 뇌종양, 뇌혈관장애밖에 없습니다. 노인, 고혈압, 폐결핵, 임신, 동맥경화증 등일 때는 주의해서 적용하나 임신 중에도 사용할 수 있습니다. 항정신병약물도 1st trimester를 제외하면 대체로 안전한 편입니다."}, {"major": "생물학적 치료", "minor": "전기경련요법 및 기타 생물학적 치료", "qnum": "06", "question": "29세 남자가 아버지를 때려 경찰과 함께 병원에 왔다. 6개월 전부터 다른 사람이 변장해서 아버지 행세를 한다고 생각했다. 그 사람을 죽여야 아버지가 돌아온다는 소리가 들려 아버지를 때렸다. 심하게 초조해 보이며 주변을 경계했다. 자신의 말이 녹음되고 있다며 알아듣기 힘든 소리로 중얼거렸다. 이전에 비슷한 증상으로 약물치료를 받았지만 효과가 없었다고 한다. 치료는?", "textbox": "", "images": [], "options": ["혐오요법", "감각통합훈련", "전기경련요법", "노출과 반응방지", "안구운동탈민감재처리"], "answer": 2, "explanation": "6개월 이상 지속된 망상, 환청이 있는 조현병 환자입니다. 전기경련요법은 긴장형 증상, 약물에 반응하지 않는 심한 초조를 동반한 조현병에 효과적입니다. 환자는 심하게 초조해 보이며, 이전 약물 치료에 효과가 없었기에 전기경련요법을 시도해볼 수 있습니다."}, {"major": "생물학적 치료", "minor": "전기경련요법 및 기타 생물학적 치료", "qnum": "07", "question": "62세 여자가 3개월 전부터 제대로 식사를 하지 않는다며 가족과 함께 병원에 왔다. 식사를 강력히 거부하여 끼니마다 바나나우유만 보호자가 억지로 먹였고, 다른 식사를 권유하면 찡그리며 손으로 밀어내면서 거부했다. 최근에는 전혀 말을 하지 않고 거의 하루 종일 누워서 허공만 보며 지낸다. 대소변을 가리지 못하고 자주 실수한다. 말을 걸어도 전혀 반응이 없고 자발적인 의사 표현도 없다. 가족 중 한 명이 처방받은 신경안정제를 복용하도록 한 적이 있는데, 약물을 복용한 후 일시적으로 증상이 호전되었으나 수 시간이 지나면 다시 원래대로 돌아왔다. 현재 복용 중인 약물은 없다. 최근 4개월 동안 13kg이 줄어서 현재는 키 160cm, 체중 38kg이다. 뇌 자기 공명영상에서 이상소견은 없다. 치료는?", "textbox": "", "images": [], "options": ["광치료", "바이오피드백", "인지행동치료", "전기경련요법", "변증법적행동치료"], "answer": 3, "explanation": "전혀 말을 하지 않고 거의 하루 종일 누워 허공만 보며 지내는 등 주요우울장애를 의심할 수 있는 여환입니다. 그 중 반응이 거의 없고 심한 식사거부와 체중 저하를 보이는 멜랑콜리아 양상을 동반하고 있습니다. 멜랑콜리아 양상을 동반한 주요우울장애 환자에서 금식 등 심각한 신체적 합병증이 우려되는 경우입니다. 참고로 전기경련요법에서 뇌종양은 절대금기 사항이므로 문제에서 뇌 자기 공명영상에서 이상소견이 없다는 것을 제시한 것을 통해 전기경련요법을 떠올려 볼 수 있을 것 같습니다."}, {"major": "생물학적 치료", "minor": "전기경련요법 및 기타 생물학적 치료", "qnum": "08", "question": "27세 여자가 자살을 시도하여 응급실에 왔다. 3개월 전부터 우울하고 죽고 싶다는 생각이 들었으며, 밥맛이 없어 식사를 거의 하지 않았다. 체중도 7kg가 감량하여 현재 160cm, 44kg이었다. 그리고 2달 전부터 생리가 없어 시행한 소변 임신 검사에서 양성이었고 질 초음파검사에서 임신 10주로 판명되었다. 우선적인 치료는?", "textbox": "", "images": [], "options": ["광치료", "임신중절수술", "식욕촉진제 투여", "항우울제 투여", "전기경련요법"], "answer": 4, "explanation": "주요우울장애에서 빠른 호전이 요구되는 상황(자살의 위험이 클 경우, 탈진상태, 식사거부)은 전기경련요법(ECT)의 적응증에 해당합니다. 위 환자는 임신초기라 약물을 쓸 수 없으며, 식사거부를 보이므로 ECT를 시행하는 것이 좋겠습니다."}, {"major": "생물학적 치료", "minor": "전기경련요법 및 기타 생물학적 치료", "qnum": "09", "question": "48세 여자가 '만사가 귀찮고 무기력하다'며 왔다. 5년 전부터 매년 겨울이 되면 별다른 이유 없이 이러한 느낌과 우울감, 불면 등이 반복되었다. 치료는?", "textbox": "", "images": [], "options": ["광치료", "미주신경자극", "약물이용면담", "전기경련요법", "두개경유자기자극술(transcranial magnetic stimulation)"], "answer": 0, "explanation": "우울삽화가 특정 계절에 발생하고, 특정 계절에 호전되는 경우를 계절성(seasonal) 우울증이라고 합니다. 계절성 우울증 환자에서는 광치료(phototherapy)가 효과적입니다. 단, 우울증상이 심한 경우에는 약물치료가 병행되어야 합니다."}, {"major": "생물학적 치료", "minor": "전기경련요법 및 기타 생물학적 치료", "qnum": "10", "question": "31세 여자가 목을 매다가 가족에게 발견되어 병원에 왔다. 임신 17주였으며 1개월 전부터 식사를 하지 않고 누워만 지냈다고 한다. 기분이 우울하고 아무것도 하기가 싫다고 한다. 아이를 잘 키울 자신도 없고 살고 싶지 않으니 죽게 내버려 두라고 한다. 치료는?", "textbox": "", "images": [], "options": ["광치료", "심부뇌자극술", "전기경련요법", "두개경유자기자극술", "두개경유직류자극술"], "answer": 2, "explanation": "주요우울장애에서 빠른 호전이 요구되는 상황(자살의 위험이 클 경우, 탈진상태, 식사거부) 등의 경우가 전기경련요법의 적응증에 해당합니다. 위 환자는 식사를 거부하고 자살 시도를 하는 등 빠른 호전이 필요한 상황이므로 전기경련요법을 시행해야 합니다. 전기경련요법은 임신부에게도 안전하게 시행할 수 있는 치료법입니다."}, {"major": "정신사회적 치료", "minor": "정신분석과 정신분석적 정신치료", "qnum": "01", "question": "31세 남자가 회사에서 상급자가 계속 자신이 올린 보고서를 집어던지고 회식자리에서도 자신에게만 술을 주는 등 괴롭힘을 당한 이야기를 하면 서 눈물을 흘리며 상급자에 대한 분노를 표현하였다. 이후 불안이 감소하 면서 누적된 스트레스가 해소되었다고 한다. 사용된 정신치료의 기법은?", "textbox": "", "images": [], "options": ["안심시킴", "환기", "재반응", "지지", "암시"], "answer": 2, "explanation": "재반응은 불편함을 초래한 상황을 감정적으로 다시 경험함으로써 긴장이나 불안을 완화시키는 치료법으로 ‘억압된 기억이 되살아나는 것과 동시에 슬픔, 분노, 공포, 적개심 등의 쌓였던 감정이 분출되어 치료효과를 보게 됩니다. 학생들이 많이 헷갈렸던 답안은 환기인데요, 환기는 구체적인 경험보다는 환자의 고민이나 속마음을 말하도록 유도하고, 환자는 고민을 토로함으로써 후련함을 느끼는 것입니다. 이 증례에서 환자는 과거의 경험을 구체적으로 연상하여 재경험을 하였기 때문에 재반응이 더 적합한 답입니다. 만일 “남자가 상급자에 대한 불만과 억울함을 토로하면서 속이 시원해짐을 느꼈다.”라고 문 제가 나온다면 환기가 답이 되겠습니다."}, {"major": "정신사회적 치료", "minor": "정신분석과 정신분석적 정신치료", "qnum": "02", "question": "우울증으로 치료 받고 있던 52세 남자 환자가 2개월 전 어머니가 돌아 가신 후 우울함이 심해지고 불면 등의 증상으로 힘들어 하고 있었다. 당 의사가 \"지금껏 잘해왔다. 힘들겠지만 조금만 더 견뎌보자.\"라고 이야 기하였다. 다음 사용된 정신치료의 기법은?", "textbox": "", "images": [], "options": ["지지", "환기", "재반응", "직면", "명료화"], "answer": 0, "explanation": "지지: 어려운 상황에서 비록 감정적 불균형 으로 고생하고 있지만 나름대로 이겨내려고 고생하는 환자에게 “과연 그렇겠다, 힘들겠 다.”라고 이해하는 자세를 취하는 것. 지금 당 장은 어렵겠지만 차차 좋아질 가망성이 있을 것이라고 해주는 것"}, {"major": "정신사회적 치료", "minor": "정신분석과 정신분석적 정신치료", "qnum": "03", "question": "다음 정신장애와 치료에 이용되는 비약물적 치료방법의 연결이 옳지 않은 것은?", "textbox": "", "images": [], "options": ["범불안장애 — 인지치료", "공포장애 — 체계적 탈감작", "약물남용 — 행동수정", "적응장애 — 지지적 정신치료", "조현병 — 정신분석"], "answer": 4, "explanation": "1) 인지치료는 우울증에 주로 사용되며 범불 안장애, 강박증, 공황장애 등에도 사용됩 니다. 2) 체계적 탈감작법 : 공포증에 가장 효과적 입니다. 기타 강박증, 성기능장애에도 사 용됩니다. 3) 행동수정법은 알코올중독, 약물남용, 식 사장애, 행동장애 등 충동조절장애에 효과 가 있습니다. 4) 지지적 정신치료의 적응증 : 급성애도반 응, 적응장애, 급성불안발작 5) 급성기의 조현병이나 기분장애는 정신분 석 대상에서 제외됩니다."}, {"major": "정신사회적 치료", "minor": "정신분석과 정신분석적 정신치료", "qnum": "04", "question": "실질적이고 긍정적인 변화가 나타날 때까지 해석을 반복적으로 받아들이는 과정을 지칭하는 정신 분석의 기법을 무엇이라고 하는가?", "textbox": "", "images": [], "options": ["설득(persuading)", "모형화(modelling)", "훈습(work through)", "긍정적 강화(positive reinforcement)", "치료적 동맹(therapeutic alliance)"], "answer": 2, "explanation": "훈습에 관한 설명입니다."}, {"major": "정신사회적 치료", "minor": "정신분석과 정신분석적 정신치료", "qnum": "05", "question": "정신사회적 치료의 한 방법으로 지지정신치료에 많이 사용되는 방법은?", "textbox": "", "images": [], "options": ["암시", "해석", "탈감작", "명료화", "자유연상"], "answer": 0, "explanation": "지지정신치료의 기법\n① 안심시킴 reassurance\n② 지지 support\n③ 마취분석요법(마취합성) narcosynthesis\n④ 환기 ventilation\n⑤ 속풀림(재반응) abreaction\n⑥ 설득 persuasion\n⑦ 암시 suggestion\n표현형 정신치료의 기법\n① 해석 interpretation\n② 직면 confrontation\n③ 명료화 clarification\n④ 자세하게 말하도록 격려 encouragement to elaborate\n⑤ 감정이입적 확인 empathic validation\n⑥ 충고와 칭찬 advice & praise\n⑦ 확인 affirmation"}, {"major": "정신사회적 치료", "minor": "정신분석과 정신분석적 정신치료", "qnum": "06", "question": "62세 여자를 정신치료 중인 분석가가 환자를 대할 때 10년 전 사망한 어머니 생각이 나면서 마음이 불편하다고 하였다. 환자를 만나기로 한 시간이 다가오면 피하고 싶은 마음까지 든다고 하였다. 이런 현상을 이르는 용어는?", "textbox": "", "images": [], "options": ["전이(transference)", "반동형성(reaction formation)", "저항(resistance)", "역전이(countertransference)", "훈습(working through)"], "answer": 3, "explanation": "환자가 과거의 중요한 인물과의 관계를 분석가에 재현하는 것을 전이라 하며, 역전이는 이와 반대로 분석가가 자신의 과거의 중요한 인물을 대하듯 환자를 경험하는 것을 말합니다."}, {"major": "정신사회적 치료", "minor": "정신분석과 정신분석적 정신치료", "qnum": "07", "question": "재경험을 통해 억압된 기억과 감정을 되살리고 쌓였던 감정을 분출하게 하는 정신치료를 무엇이라 하는가?", "textbox": "", "images": [], "options": ["재반응", "환기", "지지", "직면", "명료화"], "answer": 0, "explanation": "재반응은 불편함을 초래한 상황을 감정적으로 재경험 함으로써 긴장이나 불안을 완화시키는 방법으로 억압된 기억이 되살아나는 것과 동시에 슬픔, 분노, 공포, 적개심 등의 쌓였던 감정이 분출되어 치료효과를 보게 됩니다."}, {"major": "정신사회적 치료", "minor": "정신분석과 정신분석적 정신치료", "qnum": "08", "question": "정신분석 치료방법 중 하나인 자유 연상 과정에서 무의식적 요소가 의식화 되는 것이 고통스러워 이를 억압하는 방어기제는?", "textbox": "", "images": [], "options": ["승화", "취소", "퇴행", "저항", "반동형성"], "answer": 3, "explanation": "치료과정 중 자신의 무의식적 갈등이나 감정을 드러내지 않으려 하는 환자의 무의식적 기도를 저항이라 합니다. 무의식적 요소가 의식화되는 것이 고통스러우므로 이것을 억압하려 하는 것, 즉 자유연상이 되지 않고 차단(blocking)되거나, 치료시간에 오지 않거나 늦는 것이 그 예시입니다."}, {"major": "정신사회적 치료", "minor": "정신분석과 정신분석적 정신치료", "qnum": "09", "question": "다음 정신사회적 치료방법에 대한 설명 중 옳은 것은?", "textbox": "", "images": [], "options": ["정신분석 → “지금 그리고 여기”에서 일어난 문제를 다룬다.", "단기역동정신치료 → 환자가 갖고 있는 현실적 심리문제를 다룬다.", "지지정신치료 → 전이를 체계적으로 분석한다.", "통찰지향정신치료 → 대표적으로 암시와 충고가 이용된다.", "인지치료 → 과거의 사건으로부터 현재문제의 원인과 그 해결책을 찾는다."], "answer": 1, "explanation": "1) 정신분석은 환자의 문제보다 주로 환자가 과거 어린 시절에 경험한 정신적 상처가 원인이 되어 억압된 무의식적 갈등을 의식화하여 자기문제의 핵심을 통찰하게 하는 것을 목적으로 합니다. “지금 그리고 여기”는 단기정신치료의 특징입니다.2) 단기역동정신치료 : 정신분석, 지지적 정신치료, 행동치료를 절충시킨 치료기법 : 역동적 의미나 내담자의 성격(인격)문제는 꼭 필요하지 않으면 다루지 않으며 재반응이나 암시 등의 지지적 요법도 활용합니다.3) 전이의 체계적 분석은 정신분석적 정신치료와는 구별되는 정신분석의 특징입니다.4) 통찰지향 정신치료도 표현형 정신분석적 정신치료에 속합니다. 암시는 대표적인 지지적 정신치료의 기법이며, 충고는 표현형 정신치료에 속하나 확인 다음으로 지지적 정신치료에 가까운 기법입니다.5) 인지치료는 단기간의 구조화된 치료기법으로 현재의 문제와 그 해결책이 치료목표입니다."}, {"major": "정신사회적 치료", "minor": "정신분석과 정신분석적 정신치료", "qnum": "10", "question": "26세 남자가 정신치료 중 긴장된 표정으로 의사에게 \"선생님께서 저를 쳐다보실 때마다 괜히 혼날 것 같은 마음이 들어 불편합니다.\"라고 말하였다. 이에 대해 의사가 \"당신은 어렸을 때 아버지와의 관계에서 경험한 감정을 이 자리에서도 자주 느끼고 있는 것 같습니다.\"라고 말하였다. 사용한 치료기법은?", "textbox": "", "images": [], "options": ["공감", "직면", "충고", "해석", "명료화"], "answer": 3, "explanation": "해석은 과거에 무의식적이었던 내용을 의식하게 하는 것으로, 환자의 느낌·생각·행동에 대해 무의식적 의미나 연관성(연결시켜 설명해 주는 것)입니다. 문제의 의사는 환자의 불안을 어릴 때 아버지와의 관계로 설명하고 있으므로 해석에 해당하겠습니다. 나머지 보기에 대해서는 해설을 참조하시기 바랍니다."}, {"major": "정신사회적 치료", "minor": "정신분석과 정신분석적 정신치료", "qnum": "11", "question": "20세 여자 대학생이 고등학교 시절부터 자신과 경쟁관계로 사이가 좋지 않던 친구가 과로로 사망한 후 그 친구에 대한 죄책감으로 괴로워하였다. 정신과적 면담 후 환자는 \"다 털어놓고 나니 속이 시원합니다.\"라고 말하였다. 이에 해당하는 정신사회적 치료방법은?", "textbox": "", "images": [], "options": ["암시", "직면", "해석", "명료", "환기"], "answer": 4, "explanation": "마음속의 갈등을 하소연하는 과정이 환기입니다(대부분의 여성분들이 환기를 통해 갈등을 해소하지요). 암시는 치료자가 환자에게 병이 좋아지고 있다고 생각하게끔 지지를 해주는 것이고, 직면은 환자의 생각이 잘못된 점을 지적하는 등, 잘못을 직면시켜 주는 것입니다. 해석은 환자의 속뜻에 대해서 치료자가 분석해서 알려주는 과정이고, 명료는 환자의 상태, 말 등에 대해서 간단하게 정리해주는 것입니다."}, {"major": "정신사회적 치료", "minor": "정신분석과 정신분석적 정신치료", "qnum": "12", "question": "다음 중 지지적 정신치료에 관한 설명으로 옳은 것은?", "textbox": "", "images": [], "options": ["환자의 방어기제를 억제시킨다.", "환자의 무의식을 의식화한다.", "치료자가 중립적인 태도를 갖는다.", "재반응이 주요 치료기법 중 하나이다.", "환자는 자유연상을 한다."], "answer": 3, "explanation": "방어기제와 통합능력을 강화\n정신분석의 핵심\n정통 정신분석의 특징 : 중립이란 치료자의 태도가 수동적, 허용적일 뿐만 아니라 옳고 그름을 판단하는 기준을 치료에 적용해서는 안 된다는 원칙을 말합니다. 반면 지지적 정신치료에서는 기술적으로 강하고 긍정적인 치료자에게 의존하도록 합니다.\n안심시킴, 환기, 재반응, 지지, 설득, 암시, 마취합성\n자유연상, 해석, 직면 : 정신분석의 핵심기법"}, {"major": "정신사회적 치료", "minor": "정신분석과 정신분석적 정신치료", "qnum": "13", "question": "40세 남자 환자와 면담을 하고 있는 정신과 의사가 아무런 이유 없이 답답하고 불안한 감정을 느끼게 되었다. 곰곰이 생각해보니 환자의 모습과 자신의 모습이 닮았다는 것을 발견하였다. 환자에 대한 치료자의 이러한 감정 반응을 무엇이라 하는가?", "textbox": "", "images": [], "options": ["저항", "전이", "역전이", "환기", "재반응"], "answer": 2, "explanation": "환자가 마치 자기 과거의 중요한 인물로 치료자의 무의식에서 부각되어 일어나는 현상"}, {"major": "정신사회적 치료", "minor": "정신분석과 정신분석적 정신치료", "qnum": "14", "question": "독단적이고 강압적인 아버지 밑에서 내성적이고 복종적인 성격으로 성장한 남자가 과민하고 신경증적 증상으로 정신과 진료를 받고 있다. 환자가 면담 중 치료자를 두려워하고 엄하게 느끼는 것을 무엇이라고 하는가?", "textbox": "", "images": [], "options": ["반동형성", "기시감", "자유연상", "전이", "역전이"], "answer": 3, "explanation": "환자가 유아시절에 부모나 부모대행자에게서 경험했던 사랑과 미움의 감정이 치료자를 향해 재현되는 현상\n2) 처음 보는 대상을 보고 이전에 본 듯한 느낌이 나는 것\n3) 정신분석의 기법"}, {"major": "정신사회적 치료", "minor": "행동치료, 인지치료 및 기타 정신사회적 치료기법", "qnum": "01", "question": "52세 남자가 머리가 자주 아프다고 왔다. 6개월 전부터 직장에서 오후가 되면 양쪽 윗머리와 목이 뻣뻣해지면서 두통이 악화되고, 주말에 쉬면 호전된다고 하였다. 꼼꼼하고 경쟁적인 성격이고 평소 긴장감이 높다고 하였다. 치료는?", "textbox": "", "images": [], "options": ["광치료", "바이오피드백", "심부뇌자극술", "미주신경자극술", "반복두개경유자기자극술"], "answer": 1, "explanation": "바이오피드백은 질환의 병리에 따라 근육긴장도, 혈압, 맥박수, 체온, 뇌파 등을 모니터링하여 이완을 통해 생리기능을 조절하게 하는 방법이다. 증례의 경우 긴장성두통이 의심되는 상황으로 바이오피드백이 효과적입니다."}, {"major": "정신사회적 치료", "minor": "행동치료, 인지치료 및 기타 정신사회적 치료기법", "qnum": "02", "question": "25세 여자가 남자들과 대화하거나 여러 사람 앞에서 발표할 때 심하게 불안하다며 병원에 왔다. 엄한 부모 밑에서 자라 어려서부터 긴장감이 높았고, 4년 전 동아리에서 성추행을 당한 이후 이런 증상이 시작되었는데, 점점 심해져 최근에는 대중음식점에서도 손이 떨리고 가슴이 두근거려 식사를 할 수 없다고 한다. 2개월 후에는 취업을 위해 면접시험을 보아야 하는데, 이번에는 꼭 합격하기를 바란다고 말한다. 치료는?", "textbox": "", "images": [], "options": ["인지행동치료", "정신분석", "감각통합훈련", "가족치료", "성치료"], "answer": 0, "explanation": "타인과 대화하거나 발표하는 상황에서 심한 불안을 느끼며, 이로 인해 실생활기능수행에 장애를 겪는 것으로 보아 사회불안장애를 의심할 수 있는 증례입니다. 행동치료나 인지행동치료가 흔히 시행됩니다."}, {"major": "정신사회적 치료", "minor": "행동치료, 인지치료 및 기타 정신사회적 치료기법", "qnum": "03", "question": "25세 여자가 4개월 전부터 무기력하고 우울하다며 병원에 왔다. 지난 3년 동안 공무원 시험공부를 했으나 계속 떨어지고, 6개월 전에 남자친구와 헤어진 후 항상 비관적인 생각만 든다고 한다. 자신은 가치가 없는 인간이며, 세상의 그 누구도 자기를 좋아해 주지 않을 것이며, 앞으로도 어떤 희망도 없을 것이라고 한다. 치료는?", "textbox": "", "images": [], "options": ["이완훈련", "작업치료", "사회기술훈련", "인지행동치료", "안구운동탈민감재처리"], "answer": 3, "explanation": "2주 이상 지속되는 우울감과 동반되는 무기력감 무가치감이 있고, 생활에 장애가 충분히 발생하였으므로 주요우울장애인 것을 진단내릴 수 있습니다. 주요우울장애의 정신치료로는 정신분석적 정신치료, 인지행동치료, 대인관계치료, 가족치료, 집단치료가 있습니다. 1) 이완훈련 : 주로 불안장애나 신체통증장애에 사용됩니다. 5) 안구운동탈민감재처리 : 외상후 스트레스 증후군에서 사용됩니다."}, {"major": "정신사회적 치료", "minor": "행동치료, 인지치료 및 기타 정신사회적 치료기법", "qnum": "04", "question": "긴장성두통 등 정신신체장애가 있는 사람에게 근육긴장도, 체온 등의 생리적 상태를 보여주면서 이완을 통해 생리기능을 조절하게 하는 치료법은?", "textbox": "", "images": [], "options": ["생체되먹임(biofeedback)", "노출치료(exposure therapy)", "반응예상(response prevention)", "근육이완훈련(muscle relaxation training)", "체계적민감소실법(systemic desensitization)"], "answer": 0, "explanation": "질환의 병리에 따라 근육긴장도, 혈압, 맥박수, 체온, 뇌파 등을 모니터링 하여 이완을 통해 생리기능을 조절하게 하는 방법인 biofeedback에 관한 설명입니다."}, {"major": "정신사회적 치료", "minor": "행동치료, 인지치료 및 기타 정신사회적 치료기법", "qnum": "05", "question": "어려서부터 높은 곳을 무서워하는 환자를 낮은 층부터 높은 곳을 향해 순차적으로 올라가도록 함으로써 이를 극복하도록 하는 치료방법을 무엇이라고 하는가?", "textbox": "", "images": [], "options": ["홍수법", "인지행동치료", "체계적 탈감작", "단계적 노출", "행동수정기법"], "answer": 3, "explanation": "Flooding(implosion) : 단계가 없이 in vivo 에서 한꺼번에 대량노출시킴\n행동치료와 인지치료를 병합한 경우\n긴장이완훈련을 포함한다.\n노출치료의 일종으로 점차 조금씩 공포의 대상에 노출시킴. 탈감작법과 유사하나 실제 상황에서 실시하며 이완훈련이 없습니다.\n조작적 조건기법 : 조작적 조건화 이론에 근거하여 상벌에 의한 행동변화를 꾀하는 것(=행동수정기법). 학습 원리에 기반합니다."}, {"major": "정신사회적 치료", "minor": "행동치료, 인지치료 및 기타 정신사회적 치료기법", "qnum": "06", "question": "20세 남자가 자신과 비슷한 증상으로 고통스러워하는 사람들과 함께 모여 정신과 치료를 받고 있다. 그는 다른 환자들도 나와 마찬가지로 증상을 창피해하고 남에게 숨기고 조절하지 못한다는 것을 알게 되었다. 이 경우 치료인자는?", "textbox": "", "images": [], "options": ["학습", "이타심", "보편성", "집단압력", "감정정화"], "answer": 2, "explanation": "Yalom의 집단치료의 치료적 기제 11가지 중 보편성 : 치료 집단에서 특히 초기 단계에 그들의 문제가 혼자만의 문제가 아니라는 것을 인식할 때 환자는 강한 안도감을 경험하는 것을 일컫습니다."}, {"major": "정신사회적 치료", "minor": "행동치료, 인지치료 및 기타 정신사회적 치료기법", "qnum": "07", "question": "26세 남자가 사소한 자극에도 화가 나고 우울하여 치료를 받고 있다. 아래의 치료법은?\n• 환자 : 오늘 운전하는데 옆 차가 갑자기 끼어들어서 화가 났어요.\n• 의사 : 그때 무엇이 마음에 스쳐 지나갔나요?\n• 환자 : 저 차 운전자가 나를 무시하는구나 생각했어요.\n• 의사 : 그런 생각이 들었다면 많이 우울했겠네요. 그런데 그때 다르게 생각해 볼 수는 없을까요?\n• 환자 : 글쎄요, 그 사람이 많이 바빴나 보다 생각할 수도 있겠죠.\n• 의사 : 그렇게 바쁜 사람을 도왔다 생각하면 기분은 어떻게 달라질까요?\n• 환자 : 그런 생각이 먼저 들면 기분은 한결 나아지겠네요.", "textbox": "", "images": [], "options": ["위기개입", "인지치료", "정신분석", "사회기술훈련", "체계적탈민감화"], "answer": 1, "explanation": "인지치료는 환자에게 자신이 부정적으로 인지한다는 것을 깨닫도록 그 부정적 인지에 대한 근거를 검증하게 하고, 더 나은 융통성 있는 관점을 발전시키고, 새 인지반응과 행동반응을 연습시켜서 우울증세를 경감시키는 치료입니다. 이 환자의 경우 의사가 사소한 자극에 대해서 부정적으로 인지하고 있음을 확인시키고 있고, 이에 대해서 다르게 생각하도록 교정하고 있으므로 인지치료에 해당한다고 하겠습니다."}, {"major": "정신사회적 치료", "minor": "행동치료, 인지치료 및 기타 정신사회적 치료기법", "qnum": "08", "question": "48세 여자가 여태 헛살았고, 자신이 아무 쓸모없다고 하였으며, 전혀 희망이 없다고 하였다. 이런 왜곡을 야기한 역기능적 특이 믿음을 수정해주는 치료는?", "textbox": "", "images": [], "options": ["정신분석", "최면", "지지형 정신치료", "인지 정신치료", "대인관계치료"], "answer": 3, "explanation": "인지 정신치료는 환자에게 자신이 부정적으로 인지한다는 것을 깨닫도록 그 부  처벌입니다."}, {"major": "정신사회적 치료", "minor": "행동치료, 인지치료 및 기타 정신사회적 치료기법", "qnum": "13", "question": "29세 남자가 고소공포증 치료를 위해 병원에 왔다. 5층에서 찍은 사진을 보여주고 공포를 느끼는 환자에게 근육을 이완시키게 하였다. 이 치료에 사용된 것은?", "textbox": "", "images": [], "options": ["반응차단", "상호 억제", "처벌", "긍정 강화", "부정 강화"], "answer": 1, "explanation": "1) 반응차단 : 환자가 불안이나 충동을 줄이기 위해 행동을 못하게 함으로써 노출효과와 극대화 시키고 부정강화를 차단하는 기법\n예) 오염을 두려워하는 강박장애 환자에게 쓰레기통을 만지고 나서 손을 씻지 못하게 하는 것\n2) 상호억제 : 체계적 탈감작법에서 사용되는 것으로 환자에게 불안, 공포를 일으키는 상황을 주어지게 한 후, 긴장상태에서 근육을 이완시키게 하는 것\n3) 처벌 : 문제행동의 빈도를 줄이기 위해 그 행동을 실제로 했을 때 혐오자극을 주는 방법\n4) 긍정강화 : 치료목표로 삼은 행동을 했을 때 보상을 해주는 것\n5) 부정강화 : 치료목표로 삼은 행동을 했을 때 환자에게 불편함을 주는 것을 덜어주는 것\n반응 차단은 강박장애에서, 상호억제는 공포증에서 사용한다고 연관시켜 생각하세요."}, {"major": "조현병", "minor": "조현병의 역사, 원인 및 역학", "qnum": "01", "question": "조현병으로 꾸준히 약물치료 중인 25세 남자가 피해망상이 재발하여 병원에 왔다. 어머니는 그를 지나치게 비난하고 매사에 과잉 간섭을 하며 부정적인 표현을 자주 했다. 관련 있는 가족관계 이론은?", "textbox": "", "images": [], "options": ["거짓상호가족(pseudomutual family)", "결혼왜곡(marital skew)", "결혼분파(marital schism)", "감정표출(expressed emotion)", "이중결속(double bind)"], "answer": 3, "explanation": "과거 기항항목인 망상형 조현병에 관한 문제입니다. 조현병의 원인 중 정신사회적 요인이 출제되었습니다. 조현병의 가족이론 중에 지문에서 제시하고 있는 것과 관련 있는 것을 고르는 문제네요. 5가지 보기 모두 조현병의 가족관계 이론에 속합니다. 가족관계 이론 중 감정표출은 환자의 가족이 환자에 대해서 지나친 비판, 공격성 등 과도한 감정표현을 하는 것이 원인이 된다는 이론입니다. 나머지는 항목 해설에 있으니 참고하시기 바랍니다. 최근 중요성이 많이 감소한 부분임에도 불구하고 출제된 문제로 당황스럽게 느껴질 수 있는 부분입니다. 하지만 생소한 부분은 앞으로 다시 출제되기 어려우니 너무 걱정하지 마시고 해설을 읽어보세요. 국시에서 이런 문제가 나오는 경우 문제에서 유추해서 풀 수 있는 경우도 많으니 너무 당황하지 않으시길 바랍니다."}, {"major": "조현병", "minor": "조현병의 역사, 원인 및 역학", "qnum": "02", "question": "다음의 조현병 역학에 관한 설명 중 옳은 조합은?", "textbox": "가. 전 세계적으로 평생 유병률은 1% 전후로 동일\n나. 형제가 조현병일 때 발병 위험도는 대략 10%\n다. 일란성 쌍둥이에서의 일치율은 약 50%\n라. 환경의 영향은 미약함", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 0, "explanation": "가. 전 세계적으로 지역이나 문화적 특성과 무관하게 1% 전후\n나. 친형제에서 10%(synopsis: nontwin sibling에서 8%)\n다. 일란성 쌍둥이에서 평균 50%, 이란성 쌍둥이에서 10% 전후(synopsis: 일란성 47%, 이란성 12%)\n라. 일란성 쌍생아 사이의 일치율이 100%가 아니라는 점은 환
