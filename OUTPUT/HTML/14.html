 사람한테 소리 지르며 폭력을 행사했다. 이 환자의 정신 병리는?", "textbox": "", "images": [], "options": ["긴장증(Catalepsy)", "보속증(Perseveration)", "동작모방(Echokinesis)", "자동증(Automatism)", "긴장성 흥분(Catatonic excitement)"], "answer": 4, "explanation": "스스로 행동을 조절하지 못하고 목적 없는 운동성 활동을 보이는 긴장성 흥분(Catatonic excitement)의 정신병리 상태를 보이고 있습니다.\n1) 가장 심한 반복행동으로 한 가지 부동의 자세를 계속 유지하는 것\n2) 의사가 새로운 질문을 해서 시정시켜보려는 노력에도 불구하고 계속적으로 한 단어, 또는 몇 개의 단어만을 반복해서 되풀이하는 경우\n3) 보고 있는 행동을 따라하는 경우\n4) 타인의 말에 강박적으로 따르는 경우"}, {"major": "조현병", "minor": "조현병의 임상 양상 및 진단", "qnum": "05", "question": "1년 전부터 이상한 말과 행동을 보이며 집에만 있으려고 하는 고등학교 2학년 남학생이 부모와 함께 정신과 병원을 방문하였다. 이웃 사람들이 자신의 자위행위를 알고 큰 소리로 비웃으며 욕한다고 하며 자신의 귀가 없어졌으면 좋겠다고 하였다. 1주 전부터는 잠을 자지 않고 잘 먹지도 않으며 하루 종일 중얼거리고 킥킥대며 방안을 서성거렸다. 가장 우선적으로 고려해야 할 질환은?", "textbox": "", "images": [], "options": ["망상장애", "조현병", "분열정동장애", "비정형정신병", "조현형장애"], "answer": 1, "explanation": "① 망상: 자위행위 한 것을 이웃에서 알게 되었다. - thought leakage, thought broadcasting\n② 환각: 자신을 욕하고 비웃는 소리 - commentary voice\n→ 6개월 이상 증상 지속되고 있으므로 조현병에 해당됩니다.\n1) 괴이하지 않은 망상이어야 합니다.\n3) 기분장애가 동반되어야 합니다.\n4) 정신병적 증상이 있으면서 분류 불가능한 경우\n5) 증상이 6개월 미만이어야 합니다."}, {"major": "조현병", "minor": "조현병의 임상 양상 및 진단", "qnum": "06", "question": "33세 남자가 4개월 전부터 잠들기가 힘들다며 병원에 왔다. 6개월 전 아파트 옆집 부부가 싸우는 소리를 자기를 납치하려는 방법을 두고 다투는 것이라고 생각하였다. 이후 옆집에서 의자 끄는 소리나 발자국 소리가 들리면 경고를 보낸다는 생각이 들어 잠을 못 잤다고 한다. 사람들이 자기 눈동자를 보면서 자기 생각을 조종하려 한다며 진료실에서도 색안경을 벗지 않았다. 정신병리는?", "textbox": "", "images": [], "options": ["사고두절(thought blocking)", "사고전파(thought broadcasting)", "마술적 사고(magical thinking)", "환청(auditory hallucination)", "망상지각(delusional perception)"], "answer": 4, "explanation": "환자는 옆집 부부가 싸우는 소리, 의자를 끄는 소리, 발자국 소리 등 정상적으로 지각된 내용에 개인적 의미를 부여하는 망상지각을 보이고 있습니다.3) 마술적 사고는 어떤 현상이 잘못된 원인에 의해 일어났다고 해석하는 것입니다(e.g. 사람이 죽었으면 좋겠다고 생각했더니 교통사고가 일어났다)."}, {"major": "조현병", "minor": "조현병의 임상 양상 및 진단", "qnum": "07", "question": "27세 여자가 1) 말수가 적어지고, 2) 감정 표현이 적어지는 증상을 보였다. 3) 외모와 위생에 전혀 신경을 쓰지 않았고, 4) 친구를 전혀 만나지 않았다. 5) 이웃집 남자가 자신을 욕한다고 말하였다. 이 중 약물로 치료 효과가 가장 좋은 것은?", "textbox": "", "images": [], "options": ["말수가 적어지고", "감정 표현이 적어지는 증상", "외모와 위생에 전혀 신경을 쓰지 않았고", "친구를 전혀 만나지 않았다", "이웃집 남자가 자신을 욕한다고 말하였다"], "answer": 4, "explanation": "조현병의 증상 중 양성 증상과 음성 증상을 구분할 수 있는가를 물어보는 문제입니다. 1), 2), 3), 4)는 음성 증상에 해당하는 반면, 5)만 양성 증상에 해당됩니다. 약물에 의한 치료 효과가 좋은 것은 양성 증상입니다."}, {"major": "조현병", "minor": "조현병의 임상 양상 및 진단", "qnum": "08", "question": "다음 조현병 증상 중 그 성격이 다른 하나는?", "textbox": "", "images": [], "options": ["피해망상", "환청", "무쾌감증", "지리멸렬한 사고", "기이한 행동"], "answer": 2, "explanation": "① 양성증상 : 망상, 환각, 지리멸렬한 사고장애, 괴이하고 혼란된 행동\n② 음성증상 : 무논리증, 둔마된 정동, 무쾌감, 무의욕, 사회적 위축, 운동기체, 사고차단"}, {"major": "조현병", "minor": "조현병의 치료 및 예후", "qnum": "01", "question": "35세 여자가 1시간 전 목을 매려고 했다며 가족이 병원에 데리고 왔다. 10년 전부터 누군가 자신을 계속 주시하는 것 같고, 자신이 하는 야한 생각을 다른 사람들이 알고 흉을 본다고 믿었다. 이런 생각들 때문에 우울해지고 무기력감을 느꼈고, 대인관계도 위축되었다. 다른 사람들이 모두 자신을 성적인 상대로 보고, 환자의 아버지마저도 자신을 강간할 것이라고 믿었다. 이런 자신은 살 가치가 없는 것 같다며 우울해하였다. 오늘 죽으려고 집에서 목에 끈을 매었으나 가족이 빨리 발견하여 병원에 오게 되었다. 10년 전부터 이런 생각들 때문에 병원에서 약물을 처방받아 복용하였으나 증상이 크게 호전되지 않았고, 약을 먹으면 몸이 둔화고 느려졌다. 면담에서도 죽고 싶다며 표정 없이 이야기하였다. 치료 약물은?", "textbox": "", "images": [], "options": ["갈란타민", "모다피닐", "부스피론", "클로니딘", "클로자핀"], "answer": 4, "explanation": "35세 여성이 자살 시도를 주소로 내원하였습니다. 피해망상(누군가 자신을 주시, 사람들이 모두 자신을 성적인 대상으로 보고 있음), 사고전파(자신의 생각을 타인이 알고있음)의 정신병적 증상 있고, 10년 전부터 약물치료 받았으나 호전 없으며, 최근 자살시도까지 있어 자살 고위험군 저항성 조현병으로 볼 수 있습니다. 또한 항정신병 약물 복용 시 몸이 둔화고 느려졌다는 지연성 이상운동(tardive dyskinesia)이 나타납니다. 치료저항성, 자살 위험성, 항정신병 약물 복용 시 tardive dyskinesia 모두 클로자핀 사용의 적응증이 되기 때문에, 가장 적절한 약물은 클로자핀입니다.1) 갈란타민 : 아세틸콜린에스테라제 억제제로, 알츠하이머병에서 인지기능 개선을 위한 치료제입니다.2) 모다피닐 : 중추신경 자극제로, 기면증, 수면장애에서 사용됩니다.3) 부스피론 : 5-HT1A 부분 효현제로, 불안장애에 주로 사용됩니다.4) 클로니딘 : 알파2 아드레날린 수용체 작용제로, 고혈압, ADHD, 틱장애, 약물 금단 증상 완화 등에 사용됩니다."}, {"major": "조현병", "minor": "조현병의 치료 및 예후", "qnum": "02", "question": "조현병의 예후에 대한 설명으로 옳은 것은?", "textbox": "", "images": [], "options": ["재발이 잦은 경우 지적 황폐화가 발생한다.", "대뇌 구조적 이상이 있는 경우 예후는 양호하다.", "오랜 약물치료의 부작용으로 치매가 발생할 수 있다.", "만성치료에선 약물요법의 유지가 가장 중요하다.", "어린 연령에서 발병하였을 때 예후가 더 좋다."], "answer": 3, "explanation": "1) 지능의 황폐화까지는 오지 않는 것으로 알려져 있습니다.2) 정동불안 등의 음성증상은 대뇌의 구조적 이상과 관련되며 예후가 나쁘고 약물치료에 잘 반응하지 않습니다.3) 항정신병약물의 부작용에 치매는 없습니다.4) 핵심적 치료입니다.5) 예후가 더 나쁩니다."}, {"major": "조현병", "minor": "조현병의 치료 및 예후", "qnum": "03", "question": "급성으로 조현병 증상을 보인 환자가 약물치료를 통해 안정기에 접어들었다. 앞으로 재발을 막기 위한 조치로 적합한 것은?", "textbox": "", "images": [], "options": ["항정신병 약물 용량을 줄인다.", "항정신병 약물 용량을 서서히 중단하고 면밀히 관찰한다.", "항정신병 약물 용량을 서서히 중단하고 가족치료를 한다.", "항정신병 약물치료를 지속하면서 사회직업훈련을 병행한다.", "항정신병 약물치료를 지속하면서 정신분석적 정신치료를 병행한다."], "answer": 3, "explanation": "증세가 회복되더라도 재발방지를 위해 유지요법이 반드시 필요합니다. 조현병의 정신치료로는 역동적 방법보다는 현실적, 실용적 지지요법이 선호됩니다. 근본적으로 치료관계 형성에 한계가 있어 정신분석치료는 어렵습니다."}, {"major": "조현병", "minor": "조현병의 치료 및 예후", "qnum": "04", "question": "25세 남자가 이웃과의 시비로 소란을 자주 일으켜서 병원에 왔다. 2년 전부터 모든 사람들이 자기 이야기를 하고 쳐다본다며 외출을 꺼리면서 직장도 잃었다. 1년 전부터는 한마디 말도 없이 멍하니 서 있기도 하고, 잠도 안 자고 혼자 중얼거리다가 갑자기 고함을 지르기도 하였다. 면담 중에는 얼굴 표정이 굳어 있었고, 의사가 \"어디가 불편하신가요?\"라고 묻자 \"어디가 불편하신가요?\"라고 따라 말했다. 치료는?", "textbox": "", "images": [], "options": ["졸피뎀", "올란자핀", "보티옥세틴", "알프라졸람", "트리헥시페니딜"], "answer": 1, "explanation": "2년 전부터 시작된 망상, 1년 전부터는 긴장성 행동을 보이며, 면담 중에도 동어 반복, 반향언어의 특성을 보이는 조현병 환자입니다. 조현병 치료에는 항정신병 약물 치료가 가장 중요합니다. 보기 중 올란자핀은 비정형 항정신병 약물에 해당합니다.1) 졸피뎀 : 수면제3) 보티옥세틴(Vortioxetine) : 항우울제4) 알프라졸람 : 벤조디아제핀계 약물5) 트리헥시페니딜 : 항콜린제, 항파킨슨 약물"}, {"major": "조현병", "minor": "조현병의 치료 및 예후", "qnum": "05", "question": "20세 여자가 1년 전부터 말수가 없어지고 대인관계를 회피하고, 8개월 전부터는 누군가 감시한다며 외출을 거부하였다. 1개월 전부터 식사를 거부하고 부르거나 꼬집어도 반응 없었다. 이 환자에서 우선적으로 사용 가능한 치료약은?", "textbox": "", "images": [], "options": ["리튬", "다이아제팜", "플루옥세틴", "할로페리돌", "발프로에이트"], "answer": 3, "explanation": "망상과 와해된 언어와 행동을 통해 조현병을 진단할 수 있고, 우선적으로 항정신병약물을 사용할 수 있습니다."}, {"major": "조현병", "minor": "조현병의 치료 및 예후", "qnum": "06", "question": "23세 남자가 5년 전부터 조현병으로 진단받고 치료 중이다. 장기간 약물치료를 통해 망상이나 환각 등의 증상은 감소되었으나, 시간이 지날수록 의욕이 없고, 감정둔마를 보이며 사회적으로 위축되어 일상생활을 거의 하지 않았다. 이 환자에게 효과적인 약물은?", "textbox": "", "images": [], "options": ["Chlorpromazine", "Thioridazine", "Trifluoperazine", "Bromperidol", "Risperidone"], "answer": 4, "explanation": "감정둔마, 사회적 위축은 음성증상에 해당합니다. 음성증상에 효과적인 약물은 비정형 항정신병약물입니다.1), 2), 3) phenothiazine 계통의 저역가 정형 항정신병약물4) butyrophenone계의 고역가 정형 항정신병약물5) clozapine, olanzapine 등과 함께 비정형 항정신병약물"}, {"major": "조현병", "minor": "조현병의 치료 및 예후", "qnum": "07", "question": "장기적으로 만성 조현병의 치료에 있어서 가장 핵심적인 것은?", "textbox": "", "images": [], "options": ["행동요법", "약물치료", "전기경련치료", "정신치료", "정신분석치료"], "answer": 1, "explanation": "약물치료는 무엇보다도 핵심적인 치료입니다."}, {"major": "조현병", "minor": "조현병의 치료 및 예후", "qnum": "08", "question": "18세 남학생이 학교를 가지 않으려고 해서 병원에 왔다. 1개월 전부터 친구들이 자기를 비웃고 더럽다고 욕하는 소리를 들었다고 한다. 자신도 친구들에게 같이 욕을 하여 학교에서 문제가 되자 등교를 거부하였다. 1년 전부터 자기에게 냄새가 난다며 혼자 있으려 하고, 엄마가 가짜인 것 같고 독을 탄 음식을 준다며 식사를 거부하였다. 어릴 때는 말이 늦게 트였지만 대소변도 시기에 맞게 가렸고 또래와 어울림도 적절하였다. 치료는?", "textbox": "", "images": [], "options": ["디아제팜", "벤라팍신", "라모트리진", "리스페리돈", "아토목세틴"], "answer": 3, "explanation": "망상과 환각증상이 6개월 이상 지속되었고 발달력을 보아 뇌에 다른 기질적인 질환이 없어 보입니다. 조현병이 가장 의심되는 증례입니다. 조현병은 약물치료가 가장 중요하며 1차적으로 항정신병 약물을 사용합니다. 따라서 답은 리스페리돈입니다."}, {"major": "조현병", "minor": "조현병의 치료 및 예후", "qnum": "09", "question": "가족에 의해 정신과 외래를 내원한 환자를 면담한 후 담당 의사가 작성한 정신상태검사의 일부이다. 이 환자에 대한 치료로 옳은 조합은?", "textbox": "• 외모 : 20대 청년으로 오랫동안 자르지 않은 긴 머리 에 잘 씻지 않는 것 같다. 시선을 회피하고 숨으려고 한다.\n• 정신운동 활동 : 감소\n• 언어 : 목소리가 작고 느리다. 말이 거의 없다.\n• 태도 : 수동적이고 방어적임\n• 사고 과정 : 부적절하고 지리멸렬함\n• 사고 내용 : 피해 및 관계사고 없음\n• 지각 : 환각 없음\n• 판단과 병식 : 없음\n가. 단기간 항정신병 약물을 사용하고 끊는다.\n나. 전기경련요법은 효과가 없다.\n다. 오랫동안 입원시키고 관찰한다.\n라. 심리사회적 치료가 필요하다.", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 3, "explanation": "지리멸렬, 무언증 등 특징적 증상 : 조현병 추정진단 가능\n가. 유지요법이 중요합니다.\n나. 급성조현병에서 효과가 있습니다.\n다. 4~6주간의 short term hospitalization이 장기입원만큼 효과적임이 입증되었습니다.\n라. 재발방지에 중요 : 아직 무시할 수 없습니다."}, {"major": "기타 정신병적 장애", "minor": "망상장애", "qnum": "01", "question": "60세 여자가 남편과 함께 정신과 외래를 방문하였다. 1년 전부터 자식들이 서로 짜고 그녀가 소유하고 있는 재산을 뺏으려 한다고 믿고 있으며 며느리가 음식물에 약을 타서 자신을 살해하려 한다고 경찰서에 고소하였다고 한다. 그녀는 노인정에서의 생활 등 그 외의 일상 활동에서는 이상한 점이 의해 주어 치료동맹을 형성한다."], "answer": 2, "explanation": "망상장애의 정신치료 원칙에 대한 문제입니다. 망상장애 환자를 대할 때에는 망상을 비판하거나 망상에 동조하여서는 안 되며 망상에 대해 토의하는 등 직접적으로 접근하지 말아야 합니다. 치료자는 환자가 느끼는 불안을 제거해주고 환자와 의사소통을 하기 위해 환자의 불안을 이해하려는 태도를 가져야 합니다."}, {"major": "기타 정신병적 장애", "minor": "망상장애", "qnum": "05", "question": "27세 남자가 아내를 집에 가두고 못 나가게 하며 항상 의심을 하여 정신과 외래를 방문하였다. 연애 시절부터 아내가 다른 남자를 보거나 말을 걸 때마다 몹시 격분해 하며 화를 내곤 하였다. 결국 주변의 권유로 이혼을 하였고, 그 뒤 증상은 소실되었다. 가장 의심되는 진단은?", "textbox": "", "images": [], "options": ["질투형 망상 장애", "색정형 망상 장애", "편집형 망상 장애", "혼합형 망상 장애", "조현병"], "answer": 0, "explanation": "괴이하지 않은, 실생활에서 일어날 수 있는 일에 대한 망상 이외에는 전반적 기능장애가 보이지 않는 것이 망상장애의 특징입니다. 주로 성파트너를 믿을 수 없다는 망상이 주된 증상인 경우가 많습니다.4) 하나의 주된 망상 없이 다양한 망상만이 혼합된 장애5) 다른 증상 없이 기괴하지 않은 망상만 있을 경우에는 조현병을 진단할 수 없습니다."}, {"major": "기타 정신병적 장애", "minor": "망상장애", "qnum": "06", "question": "1년 전 남편이 젊은 여성과 함께 차에서 내리는 것을 본 35세 주부가 그 후로 남편의 일에 간섭이 심해지고 의심이 많아졌다. 1개월 전에는 남편이 이웃집 젊은 여성과 바람을 피운다고 젊은 여성과 싸워 경찰서에 간적이 있다. 그 이후에도 남편에 대해 지속적으로 의심을 하여 친정식구와 내원하였다. 검사 상 남편에 대한 불신과 의심을 제외하고는 정상이었다. 이 질환에 대한 설명으로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["환각과 착각이 흔하고 결국 인격의 황폐화가 발생한다.", "대체로 망상은 체계적이고 적절한 감정을 동반한다.", "의사는 망상내용에 대해 비판하거나 동조해서는 안 된다.", "자신이나 남을 해칠 위험이 적을 때에는 통원치료를 한다.", "기억력과 지남력 장애는 없다."], "answer": 0, "explanation": "1) 성격 황폐화는 없습니다. 망상의 주제에 맞는 환각은 있을 수 있습니다.2) 체계적이고 적절한 감정 동반3)~5) 맞는 진술입니다."}, {"major": "기타 정신병적 장애", "minor": "망상장애", "qnum": "07", "question": "48세 남자 환자가 자기 몸에서 이상한 냄새가 나기 때문에 회사에 동료들이 자신에게 불이익을 주고 사람들이 자신에 대해 수군댄다며 직장에 나가지 못하고 있다. 이 환자는 망상장애 중 어떤 유형에 속하는가?", "textbox": "", "images": [], "options": ["질투형", "색정형", "피해형", "과대형", "신체형"], "answer": 4, "explanation": "1) 질투형: 의처증, 의부증\n2) 색정형: 유명인, 상사에게 사랑을 받고 있다는 상상\n3) 피해형: 반복되는 투서, 고소\n4) 과대형: 자신이 위대한 능력을 가졌다는 착각\n5) 신체형: 악취, 피부 내에 기생충이 산다는 착각, 기형 등에 대한 망상으로 병원을 전전"}, {"major": "기타 정신병적 장애", "minor": "망상장애", "qnum": "08", "question": "다음 중 망상장애에 대한 설명으로 옳은 것은?", "textbox": "", "images": [], "options": ["주요 방어기제 중 하나는 부정이다.", "조현병의 초기단계이다.", "가장 흔한 형태는 질투형이다.", "인지기능 장애가 흔히 동반된다.", "망상은 체계적이지 않다."], "answer": 0, "explanation": "1) 망상장애의 방어기제: 투사, 부정, 반동형성\n2) 25% 미만에서 진단명이 조현병으로 바뀐다는 언급이 있기는 하나 이는 오진으로 보이며 조현병의 초기단계로 보기는 무리로 생각됩니다.\n3) 피해형이 가장 흔한 형태입니다.\n4) 기능 저하는 없습니다.\n5) 망상이 기괴하지 않습니다."}, {"major": "기타 정신병적 장애", "minor": "망상장애", "qnum": "09", "question": "52세 남자가 6개월 전부터 아내의 외도를 의심하다가 불면증이 심해져 병원에 왔다. 부인이 외도를 하지 않았는데도, 하루에도 수십 번씩 부인에게 전화를 걸고 부인을 미행하였다고 한다. 직장생활이나 다른 대인관계에는 문제가 없었고, 정신질환의 병력도 없었다. 진단은?", "textbox": "", "images": [], "options": ["조현병(schizophrenia)", "망상장애(delusional disorder)", "강박장애(obsessive compulsive disorder)", "조현성인격장애(schizoid personality disorder)", "편집성인격장애(paranoid personality disorder)"], "answer": 1, "explanation": "아내를 지속적으로 의심하는 망상적 행동을 보이고 있습니다. 망상의 양상은 괴이하지 않은 편이고, 다른 대인관계에 문제가 없으므로 성격기능은 유지되고 있는 것으로 보입니다. 이러한 증상으로 볼 때 질투형 망상장애가 가장 의심되며 6개월 이상의 증상을 보이고 있으므로 1개월 이상이라는 망상장애의 기준에도 합당합니다.\n1) 조현병: DSM-5 기준으로 조현병이 되기 위해서 망상, 환각, 와해된 언어, 전반적으로 혼란스러운 또는 긴장성 행동, 음성증상 중 2가지 이상이 1개월 기간 존재해야 합니다. 이 경우 망상은 보이고 있지만 그 외의 증상은 없으며, 문제에서도 정신질환 병력을 부정하므로 조현병의 기준에는 맞지 않습니다.\n5) 성격장애: 성격장애는 행동 및 타인과의 관계 문제가 두드러집니다. 이 경우 다른 대인관계 문제가 없다고 하였고, 6개월 전부터 발생하였으므로 성격장애의 가능성은 낮은 편입니다."}, {"major": "기타 정신병적 장애", "minor": "산후 정신병", "qnum": "01", "question": "22세 여자가 이상한 느낌이 든다며 병원에 왔다. 4개월 전부터 주변에서 뭔가 설명하기 힘든 이상한 일이 벌어지고 있다는 느낌이 들었다. 2개월 전부터 귓속에서 \"너는 죄인이다.\", \"당장 회개하라.\"라는 소리가 생생하게 들렸다. 나도 모르게 큰 죄를 지은 게 틀림없다는 생각에 목소리가 시키는 대로 하려고 했지만 교회나 성당을 다녀본 적이 없어 어떻게 해야 될지 몰라 혼란스러웠다. 대학생이며 지난 학기에는 과대표를 하고 성적도 좋았으나, 4개월 전부터 수업에 집중하지 못해 시험도 망치고 친구들과도 멀어져 혼자 다녔다고 한다. 치료는?", "textbox": "", "images": [], "options": ["리튬", "파록세틴", "라모트리진", "부프로피온", "아리피프라졸"], "answer": 4, "explanation": "환청과 그로 인한 일상생활의 지장을 호소하는 환자입니다. 유병기간이 4개월로, 1개월 이상 6개월 미만이므로 조현형상장애에 해당됩니다. 치료로는 비정형 항정신병 약물인 아리피프라졸을 사용하게 됩니다."}, {"major": "기타 정신병적 장애", "minor": "산후 정신병", "qnum": "02", "question": "25세 여자가 불안하다며 응급실에 왔다. 2주 전 출산한 뒤로 누군가가 자신을 죽이고 아기를 납치하려고 한다며 초조해했다. 출산 중 자신의 배에 이상한 장치를 주입해서 감시한다고 주장하면서 가족들조차 의심했다. 임신 및 출산과 관련된 합병증은 없다. 치료는?", "textbox": "", "images": [], "options": ["부스피론", "케티아핀", "클로자핀", "라모트리진", "부프로피온"], "answer": 1, "explanation": "출산 직후 초조, 불안과 함께 망상을 보이고 있는 것으로 보아 산후 정신병을 진단할 수 있습니다. 산후 정신병에는 항정신병 약물을 투여합니다. 클로자핀은 항정신병 약물에 해당하나 일차치료제로 사용되지는 않습니다."}, {"major": "기타 정신병적 장애", "minor": "산후 정신병", "qnum": "03", "question": "25세 여자가 1주일 전 대형 교통사고를 목격한 후 '악마', '원죄' 등 이해할 수 없는 말과 허공에 손으로 뭔가 를 밀어내는 듯한 행동을 하여 병원에 왔다. 입원하여 4일째 완전히 회복되었다. 7년 전 전신홍반루푸스를 진단받았고, 최근 수년간 약물 조정 없이 저용량의 글루코코티코이드를 복용하며 안정된 상태로 지내고 있다고 한다. 뇌 자기공명영상에서 이상은 없고 혈액검사 결과는 다음과 같다. 진단은?", "textbox": "혈색소 11.1g/dL, 백혈구 4,200/mm³, 혈소판 161,000/mm³, 적혈구침강속도 15mm/시간(참고치, ≤20), 항핵항체 양성(1:320), 항이중가닥 DNA항체 음성, C₃ 85mg/dL(참고치, 83~177), C₄ 18mg/dL(참고치, 16~47)", "images": [], "options": ["급성스트레스장애", "단기정신병적장애", "이인증/비현실감장애", "전신홍반루푸스로 인한 정신병적장애", "글루코코티코이드로 유발된 정신병적장애"], "answer": 1, "explanation": "정신병적 증상이 11일 동안 지속된 25세 환자입니다. 7년 전부터 전신홍반루푸스를 진단받고 저용량의 글루코코티코이드를 복용하며 지내고 있습니다. 혈액 검사 상 증상과 관련된 특이 소견은 없습니다. 약물로 인한 증상으로 보기에는 비교적 안정적으로 약물 장기간 복용하고 있었기 때문에 가능성이 떨어집니다. 조현병과 유사한 증상을 1일 이상, 1달 이내로 보이고 있으므로 단기정신병적장애로 진단할 수 있습니다. 약물치료로는 정신병 증상의 조절을 위해 항정신병 약물을 쓸 수 있으며, 진정효과를 위해 benzodiazepine이 사용됩니다."}, {"major": "기타 정신병적 장애", "minor": "산후 정신병", "qnum": "04", "question": "34세 여성이 출산 후 불안해하여 남편이 병원에 데리고 왔다. 치료는?", "textbox": "[의사-부부간의 대화]\n• 의사 : 어떻게 오셨나요?\n• 남편 : 아내가 출산 후 불안하고 초조해 합니다. 아이가 바뀌었다고 하고, 장애가 있을까봐 불안해합니다. 그리고 이런 증상이 점점 심해지고 있어요.\n• 아내 : (몹시 불안해하며) 내 아이가 아닌 게 분명해요. 그렇지 않고서야 이렇게 정이 안 갈 수가 없어요. 분명히 바뀌었어요. 내 진짜 아이가 어딘가에 있을 텐데, 내 아이를 찾아야 해요. 다들 거짓말을 하고 있어요.\n• 의사 : 아내분께서 언제부터 이런 증상이 있었나요?\n• 남편 : 출산 전부터 불안해하고 초조해했어요. 출산 이후에도 잠을 못 자고 이상한 소리를 했습니다. 아이에게 애정이 없어 잘 돌보지 않을까봐 걱정돼요.", "images": [], "options": ["로라제팜", "리보트릴", "클로자핀", "팔리페리돈", "메틸페니데이트"], "answer": 3, "explanation": "출산 전후로 불안 증상과 함께 아이가 바뀌었다는 망상을 동반하고 있는 환자입니다. 산후 정신병으로 의심할 수 있는 환자이며, 이는 정신과적 응급에 해당하는 사항입니다 우선 영아 살해나 자살의 위험이 있기 때문에 아이와의 접촉을 감시해야 하고, lithium이나 항정신병 약물을 단독 혹은 병용 투여해야 합니다. Clozapine의 경우 다른 항정신병 약물로는 효과가 없거나 추체외로 부작용 등으로 다른 정형 항정신병 약물을 사용할 수 없을 때 사용합니다. 따라서 가장 적절한 치료는 비정형 항정신병 약물인 4) 팔리페리돈이 되겠습니다."}, {"major": "기타 정신병적 장애", "minor": "산후 정신병", "qnum": "05", "question": "27세 여자가 출산 1주일 후부터 아기에게 귀신에 씌어 자신을 노려본다며 열흘간 수유를 거부하여 왔다. 3일 뒤 면담 및 정신상태 검사에서 이상 소견이 관찰되지 않았다. 진단은?", "textbox": "", "images": [], "options": ["조현병(Schizophrenia)", "망상 장애(Delusional disorder)", "산후 우울 기분(Postpartum blues)", "단기 정신병적 장애(Brief schizophreniform disorder)", "공유 정신병적 장애(Shared schizophreniform disorder)"], "answer": 3, "explanation": "환자는 출산 1주일 후부터 아기와 관련된 망상을 보이고 있고, 그 지속기간이 1개월이 넘지 않기 때문에 산후 정신병(단기정신병적 장애의 아형)으로 진단할 수 있습니다.※ DSM-5에서는 산후 정신병을 따로 분류하지 않고, 단기 정신병적 장애로 분류하고 있습니다.1) 6개월 이상 지속되어야 합니다.2) 1개월 이상 지속되어야 합니다.3) 산후 직후 울음, 불안, 피로, 과민성 등이 산후 수일 내 발병하고 대개 1주일 이내 회복, 망상이 없어야 합니다.5) 한 사람의 망상체계가 가까운 관계 때문에 다른 사람에게 전달되어 비슷한 망상 체계를 갖게 된 경우"}, {"major": "기타 정신병적 장애", "minor": "산후 정신병", "qnum": "06", "question": "28세 여자가 밤마다 누군가 방에 들어와 자기를 성폭행하고 죽이려 해서 불안하다며 병원에 왔다. 2개월 전 운전하다가 접촉사고를 낸 후 이 증상이 시작되었다. 가벼운 사고라서 의식소실이나 외상은 없었지만, 상대 운전자와 법적 시비가 붙어 스트레스를 받았다고 한다. 진료 중에도 자신의 옷차림에 대해 수군대는 말소리가 들린다고 하며, CCTV가 자신을 감시하는 것 같다고도 했다. 진단은?", "textbox": "", "images": [], "options": ["조현병", "조현양상장애", "망상장애", "적응장애", "외상후스트레스장애"], "answer": 1, "explanation": "괴이한 피해망상과 환청을 호소하는 환자입니다. 유병기간이 2개월로, 조현양상장애에 해당됩니다.1) 증상이 6개월 이상 지속되어야 합니다.3) 환각이 드물고, 망상이 괴이하지 않습니다.4), 5) 선행하는 사건이 있기는 하지만, 적응장애나 외상후 스트레스장애에서는 환각이나 괴이한 망상이 동반되지 않습니다."}, {"major": "기타 정신병적 장애", "minor": "산후 정신병", "qnum": "07", "question": "35세 가정주부가 아들의 장례식장에서 흐느껴 울며, 반복하여 정신을 잃더니, 갑자기 \"호랑이가 보인다. 모두 다 잡아먹히기 전에 피해야 한다.\"며 공포에 질려 소리를 지르다가 응급실로 실려 왔다. 평소 활발하며 명랑한 성격이었고 정신질환을 앓았던 적은 없었다. 호랑이가 으르렁대는 소리가 분명히 들린다며 불안해하였지만 신체검사는 정상이었다. 2주 만에 모든 증상이 소실되었고, 평상시 상태로 회복되었다. 진단은?", "textbox": "", "images": [], "options": ["급성스트레스장애", "외상후스트레스장애", "단기 정신병적 장애", "애도반응", "해리둔주"], "answer": 2, "explanation": "단기 정신병적 장애는 1일 이상 1개월 이내의 기간 동안 지속되고, 회복 후에는 병전 기능 수준으로 완전히 돌아오는 정신병을 말합니다. 환각을 보였지만 1개월 이내로 평상시 상태로 회복되었으며 단기 정신병적 장애에 해당합니다."}, {"major": "기타 정신병적 장애", "minor": "산후 정신병", "qnum": "08", "question": "23세 남자가 대학동기들과 함께 여행을 떠났다. 여행 2일째 초조하고 불안해하며 사람들이 자신을 몰래 흉본다고 말하기 시작하였다. 3일째 밤에는 잠을 자지 않고 돌아다니면서 침대 밑에 숨는 이상한 행동을 보여 입원하게 되었다. 입원 1주 후 상기 증상은 모두 사라지고 예전과 같은 모습으로 돌아왔다. 이 환자의 장애에 대한 설명으로 옳은 것은?", "textbox": "가. 높은 사회경제적 계층의 사람에서 발생률이 높다.\n나. 장애의 발생은 보통 3개월 이상이다.\n다. 조현병으로 이행하는 경우가 흔하다.\n라. 동반장애로 인격장애가 흔하다.", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 3, "explanation": "단기 정신병적 장애에 대한 설명입니다.가. 낮은 계층에 많습니다.나. 1일 이상, 1개월 미만다. 가능하나 드뭅니다.라. 히스테리성, 자기애적, 편집성, 조현형, 경계성 성격장애에 흔합니다."}, {"major": "기타 정신병적 장애", "minor": "조현정동장애", "qnum": "01", "question": "27세 여자가 1주 전부터 식사를 거르고 잠을 거의 자지 않아 병원에 왔다. 1개월 전부터 자신에게 세계 경제를 예측할 수 있는 능력이 생겨 큰 돈을 벌 수 있다면서 사업 내용에 대하여 말을 많이 하고 여기저기 전화를 거는 등 들뜬 모습을 보이다가, 1주 전부터는 주식 공부나 인터넷 검색을 하며 밤에 잠을 자지 않는다고 한다. 가족에 의하면 2년 전부터 자신과 가족을 욕하는 소리가 들리고, 자신의 생각이 외부로 빠져나가고 모든 행동을 누군가로부터 감시당해 불안하고 무섭다면서 집 안에서만 지내는 문제로 병원을 방문하였고 이후 약물치료와 상담을 받았다고 한다. 치료를 받으면서 불안한 느낌은 나아졌으나 가끔 혼잣말을 하였고 거의 외출을 하지 않은 채로 지냈지만 우울해하지는 않았다고 한다. 진단은?", "textbox": "", "images": [], "options": ["조현병", "망상장애", "양극성장애", "조현양상장애", "조현정동장애"], "answer": 4, "explanation": "2년 전부터 자신과 가족을 욕하는 환청이 들리고, 자신의 생각이 외부로 빠져나가고 모든 행동을 누군가로부터 감시당해 불안해하는 등 사고유출 및 피해망상이 나타나고 있습니다. 이와 연동하여 1개월 전부터 들뜬 모습을 보이고, 1주 전부터는 식사를 거르고, 밤에 잠을 자지 않으며 목적 지향적 활동이 증가된 조증삽화의 모습을 보입니다. 현재 주요기분 삽화가 병의 전체 지속 기간의 대부분 동안 존재했다는 단서는 주어지지 않았으나, 조현병 진단 기준 A를 만족하며 동시에 주요기분 삽화가 존재하기 때문에 조현정동장애를 가장 의심할 수 있습니다."}, {"major": "기분장애", "minor": "주요우울장애", "qnum": "01", "question": "34세 여자가 우울하다며 병원에 왔다. 2년 전 아들을 교통 사고로 잃었 고, 그 후 매일 아들 사진이나 물건을 보며 지냈다. 아들이 살아 돌아올 것 같다며 아들의 방을 매일 깨끗하게 정리하고, 아들 친구들에게 연락 하기도 한다. 아들을 다시 볼 수 없다는 생각이 들면 이렇게 살아가는 게 무의미하다는 생각이 가끔씩 들기도 한다. 가족들이 아들의 죽음을 받아 들이라고 하면 불같이 화를 낸다. 이런 증상들이 지난 수개월간 거 의 매일 반복되고 있다. 치료는?", "textbox": "", "images": [], "options": ["작업치료", "환경치료", "동기강화치료", "사회기술훈련", "인지행동치료"], "answer": 4, "explanation": "33세 여성이 우울을 주소로 내원하였습니다. 애도반응이 2년간 지속되고 있고, 아들의 상실을 수용하지 못하고 아들을 죽음으로 가족들이 받아들이도록 종용하고 있습니다. 또한 대상의 상실이 본인 인생의 무의미함으로 이어지고 있어 치료적 개입이 필요한 병적 애도반응, 특히 12개월 이상 지속되고 있어 지속적 복합 애도장애로 진단할 수 있습니다. , "explanation": "MMSE 27점으로 파킨슨에 의한 치매는 배제시킬 수 있고, 우울증 진단 기준에 속하는 식욕저하, 체중감소, 불안, 우울, 정신운동지체, 자살사고를 보이는 것으로 보아 주요우울장애에 합당한 소견이라고 볼 수 있습니다. 참고로 MMSE에서 25점 미만이 되면 인지기능 장애를 의심합니다."}, {"major": "기분장애", "minor": "주요우울장애", "qnum": "08", "question": "주요우울장애의 생물학적 소견으로 맞는 것은?", "textbox": "", "images": [], "options": ["갑상샘 저하증", "Serotonin 증가", "Norepinephrine 증가", "REM 감소", "덱사메타손 억제검사 suppression"], "answer": 0, "explanation": "1) TRH에 대한 TSH 반응 저하로 인한 갑상선기능 저하 2) 노르에피네프린과 세로토닌 감소가 가장 중요 4) REM pressure : REM latency 감소, REM density 증가 5) HPA axis 항진"}, {"major": "기분장애", "minor": "주요우울장애", "qnum": "09", "question": "23세 여자가 하루 10시간 이상 자는데도 피곤하다며 병원에 왔다. 4년 전 대학에 입학하고 잘 지내다가 6개월 전 친구에게 여행을 가자고 했는데 거절당한 후 우울해지고 의욕이 떨어졌다. 재미있는 영화를 보면 잠깐 기분이 나아지지만 팔다리가 무겁고 생각하는 것도 귀찮아 주로 누워서 지내면서 학교도 가지 않았다. 식욕이 늘고 단것이 당겨서 최근 한 달 동안 체중이 6kg 늘었다고 한다. 진단은?", "textbox": "", "images": [], "options": ["긴장증 동반 주요우울장애", "혼재성 동반 주요우울장애", "비전형적 양상 동반 주요우울장애", "정신병적 양상 동반 주요우울장애", "멜랑콜리아 양상 동반 주요우울장애"], "answer": 2, "explanation": "주요우울장애에서 나타나는 과식과 과수면, 사지의 무거운 마비감, 대인관계에서 거부에 대한 예민성 등은 '비전형적 양상 동반' 특정형에 해당합니다. 비전형적 양상 동반 주요우울장애의 경우는 양극성장애를 의심해야 합니다."}, {"major": "기분장애", "minor": "주요우울장애", "qnum": "10", "question": "42세 여자가 멍한 시간이 늘고 기운이 없다며 병원에 왔다. 1개월 전부터는 피곤해서 아무것도 할 수가 없어 누워있기만 하며 식사도 안 했다. 밤에는 잠이 안 오고 불안하며 숨이 막혀 가만히 누워있을 수가 없었다. 아이들과 남편이 있어도 사는 재미가 없고 가정부처럼 사는 자신이 불쌍하다며 이혼을 요구했다. 5일 전부터는 동네 사람들이 자신 때문에 집안이 망한다고 수군거리며 흉을 보아서, 자살을 생각할 정도로 힘들다고 한다. 진단은?", "textbox": "", "images": [], "options": ["조현병", "공황장애", "적응장애", "주요우울장애", "단기정신병장애"], "answer": 3, "explanation": "1개월 전부터 흥미감소, 불면, 피로감, 무기력, 반복적 자살사고 등을 보이고 있으며, 이로 인해 아무것도 할 수 없는 사회직업적 기능의 손상을 보이고 있어 주요우울장애를 의심해 볼 수 있습니다. 이러한 증상이 물질이나 다른 의학적 상태에 의한 것이 아니고 다른 정신병적 장애로 더 잘 설명되지 않습니다. 또한 조증이나 경조증 삽화가 없으므로 주요우울장애로 진단할 수 있습니다. 참고로 5일 전부터 동네 사람들이 수군거리며 흉을 보았다는 것이 사실인지 망상이나 환각인지는 판단하기 어렵고 단기정신병장애로 진단하기에는 어려움이 있습니다."}, {"major": "기분장애", "minor": "주요우울장애", "qnum": "11", "question": "10년 전부터 심부전으로 치료받고 있는 환자에게서 우울증이 발생하였을 때, 가장 적절한 치료제는?", "textbox": "", "images": [], "options": ["비정형적 항정신병제(Atypical antipsychotics)", "선택적 세로토닌 재흡수 차단제(SSRI)", "단가아민 산화효소 억제제(MAOI)", "벤조디아제핀(Benzodiazepine)", "삼환계 항우울제(TCA)"], "answer": 1, "explanation": "우울증의 약물치료에는 선택적 세로토닌 재흡수억제제(SSRI)와 삼환계 항우울제(TCA)가 가장 보편적으로 사용되고 있습니다. 특히 삼환계 항우울제는 심장독성에 대한 주의가 필요합니다. 따라서 다른 조건 없이 심혈관질환이 있는 우울증 환자라고 했으므로 우울증의 보편적 치료약물 가운데 심혈관계 부작용이 적은 것을 골라야 합니다."}, {"major": "기분장애", "minor": "주요우울장애", "qnum": "12", "question": "62세 여자가 무기력하다며 병원에 왔다. 남편과는 12년 전에 사별하였고, 외동딸이 있었으나 2년 전에 자살로 사망해서 현재는 혼자 지내고 있다. 환자가 딸의 결혼을 반대하고 얼마 지나지 않아 딸이 스스로 목숨을 끊었다. 환자는 딸의 죽음이 자신 때문인 것 같아 그 후로 심한 우울감과 자책감에 시달린다. 자신이 하던 사업도 남에게 맡기다시피 하고, 거의 매일 딸의 친구들을 찾아가 딸에 대한 이야기를 들으면서 그리움을 달랜다고 한다. 아직도 딸이 살아 있는 것 같아서 딸의 방을 매일 청소하고 정리하면서 지내고 있다. 딸의 죽음으로 자신의 인생이 무의미하다는 생각이 들고, 세상에 혼자 남겨진 것 같은 외로움을 느낀다. 진단은?", "textbox": "", "images": [], "options": ["정상애도반응", "반응성애착장애", "지속성애도장애", "급성스트레스장애", "외상후스트레스장애"], "answer": 2, "explanation": "망자에 대한 지속적인 우울감과 자책감, 망자에 대한 집착을 보이고 있으며, 망자 없이는 인생이 무의미하다고 생각하는 등의 증상을 보이고 있습니다. 이 증상으로 인해 유의한 고통과 정신사회적 기능에 장애(자신이 하던 사업도 남에게 맡기다시피 하는 등)를 보이고 있고, 딸이 죽은 지 12개월 이상 되었으므로 지속성애도장애로 진단할 수 있습니다."}, {"major": "기분장애", "minor": "주요우울장애", "qnum": "13", "question": "33세 남자가 일주일에 걸친 수면장애로 내원하였다. 10일 전 교통사고로 아내를 잃고 난 뒤 기분이 우울하고, 식욕이 없이 하루 종일 멍하니 지내는 날이 많았다. 직장에 가서는 그런대로 정상적인 생활을 하지만 일에 집중이 잘되지 않고 죽은 아내가 자꾸 떠오른다고 한다. 멍하니 창밖을 바라보는 시간도 많아졌다. 진단은?", "textbox": "", "images": [], "options": ["애도반응", "주요우울장애", "기분순환장애", "급성스트레스장애", "외상 후 스트레스장애"], "answer": 0, "explanation": "Sx : 10일 전 아내 잃음. 일주일간 수면장애. 우울. 식욕저하. 집중이 잘 안되고 아내가 자꾸 떠오름. 멍하니 창밖을 바라봄\n→ 증상이 오래 지속된 편이 아니고 정상애도 반응의 예외증상 없으므로 애도반응으로 생각할 수 있습니다.\n(DSM-IV 기준으로는 2개월 이상 확인해야 하지만, DSM-5에서는 이 기준이 사라졌으므로 임상 양상으로 판단합니다)"}, {"major": "기분장애", "minor": "주요우울장애", "qnum": "14", "question": "25세 여자가 4개월 전부터 무기력하고 우울하다며 병원에 왔다. 지난 3년 동안 공무원 시험 공부를 했으나 계속 떨어지고, 6개월 전에 남자친구와 헤어진 후 항상 비관적인 생각만 든다고 한다. 자신은 가치가 없는 인간이며, 세상의 그 누구도 자기를 좋아해 주지 않을 것이며, 앞으로도 어떤 희망도 없을 것이라고 한다. 치료는?", "textbox": "", "images": [], "options": ["이완훈련", "작업치료", "사회기술훈련", "인지행동치료", "안구운동민감소실및재처리"], "answer": 3, "explanation": "2주 이상 지속되는 우울감과 동반되는 무기력감 무가치감이 있고, 이로 인해 생활에 장애가 충분히 발생하였으므로 주요우울장애인 것을 진단할 수 있습니다.\n주요우울장애의 정신치료로는 정신분석적 정신치료, 인지행동치료, 대인관계치료, 가족치료, 집단치료가 있습니다."}, {"major": "기분장애", "minor": "주요우울장애", "qnum": "15", "question": "25세 여자가 우울하다하며 병원에 왔다. 2개월 전 아버지가 자살한 뒤로 모든 것이 허무하게 느껴지고 자꾸 눈물이 난다고 한다. 아버지와 함께 했던 일들이 생각나 잠들기 힘들고, 아버지가 나오는 꿈을 꾸다가 자주 깬다고 한다. 아버지가 그동안 힘들었다는 사실을 몰랐던 자신을 용서할 수 없어 죽고 싶다고 한다. 입맛이 없어 하루에 한 끼만 겨우 먹고 뭘 해도 재미가 없다고 한다. 2주 전부터는 도저히 일에 집중할 수 없어 직장을 그만 두었다. 진단은?", "textbox": "", "images": [], "options": ["적응장애", "정상애도반응", "주요우울장애", "반응성애착장애", "급성스트레스장애"], "answer": 2, "explanation": "아버지의 자살 이후 우울함을 주소로 내원한 환자입니다. 주요우울장애의 진단 기준을 만족하므로 주요우울장애로 진단할 수 있습니다. 지속적이고 현저한 기능장애를 겪고 있는 것으로 보아 정상애도반응을 배제할 수 있습니다."}, {"major": "기분장애", "minor": "주요우울장애", "qnum": "16", "question": "57세 여자가 1개월 사이에 체중이 9kg 빠져 병원에 왔다. 2개월 전 보이스피싱 피해를 당한 후 1개월 동안 범인을 찾으려 애를 쓰다가 포기한 후 절망했다. 3주 전부터 죽어서 가족에게 사죄해야 한다면서 우울해하며 종일 눈물을 흘리며 누워서만 지냈다. 잠을 자지 못하고 아무것도 먹지 못해 기력이 쇠약해졌다. 5일 전부터 내장이 녹아 들어가 죽을 것 같다며 가족들이 억지로 먹이는 소량의 음식 외에는 물만 마셨다. 3일 전부터는 죽은 어머니가 \"곧 만나자.\"라고 얘기하는 소리가 가끔 들리기 시작했다고 한다. 진단은?", "textbox": "", "images": [], "options": ["망상장애", "조현양상장애", "조현정동장애", "주요우울장애", "단기정신병적장애"], "answer": 3, "explanation": "1개월 전부터 체중감소, 2주 이상 지속된 우울감, 삶에 대한 흥미 감소, 자책감, 불면 등 주요우울장애의 진단 기준에 맞는 모습을 보입니다. 3일 전부터 정신병적 양상도 보이고 있습니다."}, {"major": "기분장애", "minor": "주요우울장애", "qnum": "17", "question": "35세 여자가 2개월 전부터 우울하고 입맛이 없고 잠을 못 잔다며 병원에 왔다. 아무런 의욕이 없고 세상 만사가 모두 귀찮고 피곤하며 기운이 없어서 3일 전에 직장도 그만두었다고 한다. 자기가 한심하고 멍청한 사람같이 느껴져 자주 눈물이 나고 앞으로 살아갈 자신이 없다고 한다. 감별 진단을 위해 확인할 병력은?", "textbox": "", "images": [], "options": ["경제상태", "학업성적", "과거 자살시도 여부", "과거 조증/경조증 삽화", "주요우울장애의 가족력"], "answer": 3, "explanation": "2주 이상 지속된 우울함, 식욕감소, 불면, 흥미감소, 피로감, 무가치감이 있고, 이로 인해 일상생활에 장애를 보이고 있습니다. 주요우울장애는 과거 조증/경조증 삽화가 없어야 진단할 수 있기에, 감별 진단을 위해서는 과거 조증/경조증 삽화를 확인해야 합니다. 과거 조증삽화가 있는 경우 양극성장애 I형, 과거 경조증삽화가 있는 경우 양극성장애 II형으로 진단할 수 있습니다. 3) 자살의 위험인자에 해당합니다."}, {"major": "기분장애", "minor": "주요우울장애", "qnum": "18", "question": "비전형적 주요우울장애의 특징적인 임상 양상으로 옳은 것은?", "textbox": "", "images": [], "options": ["불면증", "식욕저하", "심한 죄책감", "아침에 심해지는 우울", "타인의 거부에 대한 과민성"], "answer": 4, "explanation": "비전형 양상의 진단 기준(DSM-IV)\n* DSM-5에서는 특정형으로 바뀌었습니다.\nA. 기분 반응이 있음(즉, 실제적인 혹은 잠재적인 긍정적인 사건이 있으면 기분이 좋아진다.)\nB. 아래 증상 중 2가지 이상\n① 뚜렷한 체중 증가 혹은 식욕 항진\n② 수면과다\n③ 마비된 듯한 무력감(leaden paralysis)\n④ 대인 관계에서 거부당했을 때 과민해지는 경향 때문에 심각한 사회적, 직업적 장애를 받음\nC. Melancholia 양상이나 긴장증 양상에 해당되지 않음"}, {"major": "기분장애", "minor": "주요우울장애", "qnum": "19", "question": "최종 학력이 초등학교 졸업인 88세 남자가 3개월 전 친구가 사망하자, '나도 살 날이 얼마 남지 않았다'는 말을 자주 하였고, 기억력이 떨어져 일을 제대로 할 수 없었다. 처음에는 자신이 없어 인지기능검사를 못하겠다고 했지만, 격려하여 검사를 마쳤다. 간이정신상태검사에서 26점이 나왔고, 우울, 불안, 정신운동 지연이 관찰되었다. 진단은?", "textbox": "", "images": [], "options": ["적응장애", "범불안장애", "주요우울장애", "알츠하이머치매", "외상후스트레스장애"], "answer": 2, "explanation": "정상 애도 과정에서 2개월 이상 증상이 지속되면 주요우울장애로 진단할 수 있습니다.\n환자는 기억력 저하를 호소하였지만 MMSE 결과는 정상인 것으로 보아 치매가 아닌 우울증에 의한 기억력 저하가 의심됩니다(MMSE는 30점 만점에 25점 이상이면 정상입니다).\n1) 적응장애 : 누구나 겪을 수 있는 정신·사회적 스트레스가 작용한 지 3개월 이내에 일어나는 부적합한 적응 반응으로 애도반응이 아니어야 합니다.\n5) 외상후스트레스장애 : 생명에 위협이 되는 극심한 외상경험 이후 1개월 이상 지속되는 재경험, 회피, 과각성 증상을 보입니다."}, {"major": "기분장애", "minor": "주요우울장애", "qnum": "20", "question": "39세 남자가 화를 못 참겠다며 병원에 왔다. 1개월 전에 골육종으로 오른쪽 다리를 절단해야 한다는 진단을 받았다. 상급종합병원에서 다시 한번 검사를 받았으나 결과는 같았다. 왜 이런 일이 생긴 건지 믿을 수가 없다며 화를 내다가도 아직 8개월밖에 안 된 아들을 생각하면 갑자기 눈물이 나와 멈출 수가 없었다. 직장에서는 사소한 일에도 화가 치밀어 동료들과 다툼이 잦아졌고 업무에도 실수가 많아져 사람이 갑자기 변했다는 소리를 들었다고 한다. 밤에는 미래에 대한 걱정으로 잠을 거의 자지 못했고 식욕이 없어 하루에 한 끼를 겨우 먹었다. 치료는?", "textbox": "", "images": [], "options": ["졸피뎀", "부프로산", "부스피론", "미르타자핀", "할로페리돌"], "answer": 3, "explanation": "1개월 전부터 생긴 우울감, 불면, 식욕 저하, 등 이 주요우울장애의 진단 기준에 부합합니다.\n주요우울장애의 치료에는 항우울제로 치료할 수 있습니다. 보통 SSRI를 많이 사용하지만, 특정 항우울제가 다른 항우울제보다 치료적으로 우수하지 않으므로 보기 중 항우울제인 미르타자핀을 사용할 수 있습니다.\n임상에서는 동반효과 및 부작용 등을 고려하여 약물을 선택하는데, NaSSA인 미르타자핀은 SSRI와 항우울효과는 같으면서 수면효과, 항불안효과, 식욕자극효과 등을 나타내므로 현재 환자에게 사용하기 좋은 약물이라고 할 수 있습니다."}, {"major": "기분장애", "minor": "주요우울장애", "qnum": "21", "question": "54세 여자가 6개월 전부터 우울하고 불안하고 초조하다며 병원에 왔다. 다른 병원에서 에스시탈로프람과 알프라졸람을 복용하기 시작한 지 4일이 지났다고 한다. 약물 복용 후 별다른 부작용은 없고 불안과 초조는 상당히 줄어들었다고 한다. 그러나 기분이 계속 우울하고 의욕이 없다고 걱정한다. 치료는?", "textbox": "", "images": [], "options": ["리튬 추가", "부스피론 추가", "기존 약물 유지", "알프라졸람 증량", "미르타자핀으로 교체"], "answer": 2, "explanation": "환자가 현재 복용하고 있는 약을 살펴보면 에시탈로프람(SSRI)으로 우울, 알프라졸람(Benzodiazepine)으로 불안과 초조에 대한 치료를 하고 있음을 알 수 있습니다. 부작용이 없고 불안과 초조의 호전이 있기 때문에 진정제 부분에 대해 처방변경이나 추가처방은 불필요할 것으로 판단할 수 있습니다. 다음은 우울증세에 대해 살펴보겠습니다. 현재 환자는 약물을 복용한 지 4일이 경과되는 시점에서 우울증세가 호전되지 않고 있습니다. 이 때문에 약물을 추가하거나 변경해야하나 고민할 수 있겠지만 중요한 것은 “4일”만 지났다는 점입니다. 항우울제의 처방지침에 따르면 항우울제의 효과는 복용 3~5주 후에 나타나기 때문에 일단은 현재치료를 유지하며 관찰해볼 수 있겠습니다."}, {"major": "기분장애", "minor": "주요우울장애", "qnum": "22", "question": "6개월 전부터 우울감이 지속되고 식욕저하, 체중감소, 불면, 자살에 대한 반복적인 생각을 주소로 35세 여자가 내원하였다. 다음 설명 중 옳은 것은?", "textbox": "", "images": [], "options": ["재발할수록 증상이 경미해진다.", "특별한 치료를 하지 않아도 3개월 안에 자연히 회복된다.", "회복기에 접어들 때 자살의 위험이 높다.", "동반된 망상에도 항우울제 단독 치료가 효과적이다.", "약물 부작용 때문에 증상이 회복되면 바로 약물을 중단한다."], "answer": 2, "explanation": "1) 지속기간은 재발이 되풀이될수록 길어집니다. 2) 치료하지 않으면 주요우울장애의 삽화기 간은 약 6~13개월이나, 치료하면 3개월 정도로 짧아집니다. 3) 우울증의 경우 많이 회복된 시기, 퇴원 직전에 자살 위험이 높다는 것은 잘 알려져 있습니다. 4) 망상을 비롯한 정신병적 상태에서는 항정신병 약물을 병용할 수 있습니다. 5) 증상이 호전된다 하더라도 최소한 6개월은 약물치료가 지속되어야 합니다."}, {"major": "기분장애", "minor": "주요우울장애", "qnum": "23", "question": "52세 여자가 불안하다며 병원에 왔다. 1년 전 갑상샘저하증으로 진단받고 치료를 받은 후, 갑상샘 기능은 정상으로 되었고 피곤함이 좋아졌다. 6개월 전부터 월경이 불규칙해지다가 3개월 전에 멈췄다. 1개월 전부터 얼굴이 달아오르고 감정의 기복이 심해지면서 초조하고 우울하다 여성으로서 역할이 끝났다는 생각에 자존심이 많이 상했고, 아무 일에도 흥미를 갖지 못해서 하루 종일 누워있었다. 치료는?", "textbox": "", "images": [], "options": ["리튬", "로라제팜", "발프로산", "데스벤라팍신", "아미설프라이드"], "answer": 3, "explanation": "우울, 흥미 저하, 정신운동초조, 무가치감 등을 보이고 있는 환자입니다. 40~50대 갱년기에 초조하고 불안함을 주로 보이고 있어 주요우울장애의 일종인 갱년기 우울증을 의심해 볼 수 있습니다. 갱년기 우울증의 경우 과거에는 널리 쓰이던 진단명이나 현재는 ICD-10이나 DSM-5에서 모두 쓰이지 않고 주요우울장애에 포함됩니다. 주요우울장애의 약물치료로는 SSRI를 일차로 사용하지만, 다른 항우울제 역시 치료효과가 동일하기 때문에 SNRI인 4) 데스벤라팍신을 사용할 수 있습니다."}, {"major": "기분장애", "minor": "주요우울장애", "qnum": "24", "question": "3개월 전 회사 간부에서 퇴직을 한 55세 남자가 의욕이 없고 만사가 귀찮다고 하며 식사를 하지 않아 6kg의 체중감소가 있었다. 밤마다 잠을 잘 이루지 못하고 초조하고 불안해하였다. \"나의 삶은 무의미하다\", \"나는 거지가 되었다\", \"차라리 죽고 싶다\"라는 말을 자주하였고 하루 전에 는 아파트 10층 계단에서 뛰어내리려고 하여 가족들에 의해 정신과 외 래를 방문하였다. 내원 후 시행한 각종 검사에서 특별한 이상소견은 없 었다. 최근에 소변보기가 힘들어 비뇨기과를 방문, 전립선비대증을 진단 받았다고 한다. 이 환자의 치료에 대한 설명으로 옳은 것은?\n가. 전기경련치료가 효과적일 수 있다.\n나. 항정신병 약물을 병용한다.\n다. 선택적 세로토닌 재흡수억제제를 투여한다.\n라. 삼환계 항우울제를 투여한다.", "textbox": "", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 0, "explanation": "의욕상실, 체중감소, 무가치감, 수면장애, 정신운동초조, 자살기도로 기능장애, 조증양상 없으므로 혼재성 삽화 아님. 사별의 병력 없음 → 주요우울삽화. 다른 삽화의 병력이 주어지지 않았으므로 주요우울장애로 진단할 수 있습니다.가. 증상이 심하고 자살의 위험성이 큰 경우에 사용 가능합니다.나. 초조가 심한 경우에는 항정신병약 병용투여 가능. 항우울제 단독으로는 psychotic feature가 없으므로 항정신병약 병용투여는 적응증이 아닙니다.다. 1차 약물은 SSRI입니다.라. TCA의 경우 항콜린성 부작용이 있어 전립선 비대증에는 금기입니다.보기 (나)의 경우 망상도 보이고 자살의 위험이 크므로 항정신병 약물을 사용합니다."}, {"major": "기분장애", "minor": "양극성 장애", "qnum": "01", "question": "27세 남자가 자살을 시도하여 응급실에 왔다. 2주 전부터 기분이 우울해지면서 일이 너무 힘들고 괴로워 자살을 생각하기 시작하였다. 지난달에는 1주일 동안 직장에서 밤샘 일을 하면서도 피곤함을 느끼지 않았고, 휴일에도 출근해 동료들의 일을 도와주었다. 업무로 바쁜 중에도 어릴 적 좋았던 기억들이 머릿속에서 계속 떠오른다며 고향에 다녀오기도 하였다. 진단은?", "textbox": "", "images": [], "options": ["강박장애", "적응장애", "양극성장애", "주요우울장애", "해리정체성장애"], "answer": 2, "explanation": "2주 이상 지속된 우울함, 자살시도로 우울삽화를 보이는 환자입니다. 지난달에는 1주일 동안 수면욕구 감소, 목적지향적 활동 증가를 보이는 경조증삽화가 있었습니다. 따라서 환자는 양극성장애로 진단할 수 있고, 현재는 양극성장애의 우울삽화로 생각됩니다. 양극성장애의 우울삽화는 조증삽화에 비해 자살 위험성이 높으며, 리튬은 자살 위험성을 낮추는 예방효과가 있다고 알려져 있습니다."}, {"major": "기분장애", "minor": "양극성 장애", "qnum": "02", "question": "38세 남자가 기분이 우울하다하며 병원에 왔다. 연구원으로 일하며, 직장 생활은 그럭저럭 해나가나 이유 없이 기분이 처지고 집중이 안 되는 경우가 반복되어 퇴직을 고민하기도 했다. 30대 초반부터 우울할 때는 성욕도 없어지고 잠도 안 오며, 귀찮고 힘들었다. 2주일 정도 지나면 우울한 기분은 괜찮아져서 다행이라는 생각이 들면서 들뜨고 자신감이 생기고 업무에 엄청난 집중력과 아이디어가 생겨나서 밤 늦게까지 일하는 경우가 있다. 이런 기분은 1주일 정도 지속 된다고 한다. 치료는?", "textbox": "", "images": [], "options": ["졸피뎀", "도네페질", "둘록세틴", "라모트리진", "아토목세틴"], "answer": 3, "explanation": "2주 이상의 기간 동안 우울한 기분이 들고, 집중이 안 되고, 잠이 오지 않고, 귀찮고 힘들 때 퇴직을 고민하는 등 주요우울삽화를 의심해볼 수 있습니다. 이후 1주일 이상 들뜨고, 자신감이 생기며, 업무에 엄청난 집중력과 아이디어가 생겨나서 밤늦게 일하는 경우(입원이 필요할 정도가 아니고, 현저한 장애가 보이지는 않으므로 조증삽화보다 경조증삽화에 가까울 것 같습니다.) 또한 보이고 있습니다. 주요우울삽화와 경조증삽화가 있으므로 양극성 장애 II형을 의심해볼 수 있으며, 양극성 장애에서 우울증에 효과 있는 lamotrigine을 사용할 수 있습니다. 다른 선지들은 현재 증상과 관련 없기 때문에 제외할 수 있습니다.1) 졸피뎀 : 수면제2) 도네페질 : Cholinesterase inhibitor, 치매에 사용3) 둘록세틴 : SNRI, 노인성 우울증에 효과5) 아토목세틴 : ADHD에서 틱을 동반할 경우 사용"}, {"major": "기분장애", "minor": "양극성 장애", "qnum": "03", "question": "41세 여자 환자가 3개월 전부터 시작된 불면, 식욕 감소로 내원하였다. 세상만사 귀찮고 업무에 집중할 수가 없어서 1개월 전 휴직하였다. 1년 전 좀 경조증 삽화가 있었다. 내원 전 3일간 환청을 들었다. 진단은?", "textbox": "", "images": [], "options": ["기분순환장애", "분열정동장애", "Bipolar disorder II", "Bipolar disorder I", "Major depressive disorder"], "answer": 2, "explanation": "경조증 삽화가 있고, MDD 증상을 보인 것으로 보아 BPD II에 해당합니다. 조현정동장애의 진단을 위해선 조현병의 진단 기준 A를 충족시키는 증상들을 보여야 하는데 환청만 3일간 보인 것으로는 불충분합니다."}, {"major": "기분장애", "minor": "양극성 장애", "qnum": "04", "question": "35세 여자가 3주 전부터 의욕저하, 무기력감, 우울감이 심해져 병원에 왔다. 1년 전에 평소와 다르게 기분이 들뜨고, 잠이 줄어들고, 활동이 많아졌으나, 직장은 다녔다고 하고 이러한 증상은 6일 만에 좋아졌다고 하였다. 일차 선택약물은?", "textbox": "", "images": [], "options": ["디아제팜", "발프로산", "벤라팍신", "페니토인", "메틸페니데이트"], "answer": 1, "explanation": "현재는 주요우울삽화, 1년 전에는 경조증 삽화(4~6일)의 병력이 의심되는 환자입니다. 양극성장애에 우울삽화의 일차 선택약물은 리튬이나 발프로산입니다. 최근에는 라모트리진도 권장되고 있습니다. 항우울약물의 단독치료는 피해야 합니다."}, {"major": "기분장애", "minor": "양극성 장애", "qnum": "05", "question": "35세 남자가 2개월 전부터 계속 기분이 처지고 무기력감이 심해져 병원에 왔다. 업무에 집중도 안 되며, 모든 일에 의욕이 생기지 않고 모든 것이 귀찮아졌다. 밤에는 잠이 안 오고 아침에는 일어날 수가 없어 4일간 무단결근을 하였다. 6개월 전에 공무원 시험을 준비하다가 좋은 사업 아이템을 찾았다며 잠을 안 자고 인터넷으로 이것저것 산만하게 찾아보며 몰두하느라 다니던 학원도 그만두었다. 평소와는 다르게 자신에 찬 모습을 5일 정도 보이다가 저절로 괜찮아져서 지금 다니는 회사에 들어갔다. 진단은?", "textbox": "", "images": [], "options": ["순환성장애", "주요우울장애", "제I형 양극성장애", "제II형 양극성장애", "주의력결핍과다활동장애"], "answer": 3, "explanation": "기분이 처지고 무기력감이 심한 것을 주소로 방문한 35세 남자입니다. 우울 삽화에 해당하는 기간이 2개월 간 지속되었으며, 이전에 경조증 삽화로 보이는 기간이 5일 간 있었습니다. 조증 삽화와 경조증 삽화를 감별하는 것이 중요한 문제입니다. 조증 삽화는 기간이 1주일 이상이 되거나, 입원이 필요한 경우(기간 무관) 진단할 수 있습니다. 경조증 삽화는 4일 이상인 경우에 진단할 수 있습니다."}, {"major": "기분장애", "minor": "양극성 장애", "qnum": "06", "question": "32세 남자가 1개월 전부터 우울하고 살고 싶지 않다며 병원에 왔다. 잠도 잘 자고 밥맛이 없으며 계속 피곤하다고 한다. 1년 전에는 기분이 들뜨고, 자신에게 무한한 능력이 있다면서 말수가 많아지고, 과소비와 충동적인 모습을 보여 입원 치료를 받은 적이 있었다고 한다. 치료는?", "textbox": "", "images": [], "options": ["리튬", "도네페질", "벤라팍신", "이미프라민", "아캄프로세이트"], "answer": 0, "explanation": "1년 전 조증 삽화로 입원치료 받은 경험이 있어, 양극성장애의 우울삽화가 의심됩니다. 양극성장애에 우울삽화에 권장되는 1차 약물로는 리튬, 발프로산, 라모트리진, 비정형 항정신병 약물(Quetiapine, Olanzapine, Lurasidone)이 있습니다.\n2) 도네페질 : Cholinesterase inhibitor, 치매에서 사용\n3) 항우울제(SNRI), 4) 항우울제(TCA) : 양극성장애에서 항우울제 사용은 조증삽화를 유발할 수 있기에 주의해야 합니다.\n5) 아캄프로세이트 : 알코올 사용 장애에서 대체요법으로 사용"}, {"major": "기분장애", "minor": "양극성 장애", "qnum": "07", "question": "25세 남자가 다른 사람들과 싸움을 벌여 병원에 왔다. 1개월 전부터 평소와 달리 자신감이 커지고 기분이 들떴으며 새로운 사업을 구상하기 시작했다고 한다. 3일 전부터는 잠을 안 자고 말을 많이 하며 밤마다 유흥비로 큰돈을 썼다고 했다. 1년 전에는 기분이 우울하고 매사에 의욕이 없어 플루옥세틴을 복용하다가 3개월 전에 중단하였다. 치료는?", "textbox": "", "images": [], "options": ["벤라팍신", "졸피뎀", "리바스티그민", "아토목세틴", "케티아핀"], "answer": 4, "explanation": "보기에 기분조절제가 없어서 당황하셨나요? 환자는 현재 팽창된 자존심, 들뜬 기분, 사업의 구상, 수면욕의 감소, 말이 많아짐, 충동적인 이로 인해 남과 싸우는 등 일상생활에 지장을 주는 것으로 보아 I형 양극성장애의 급성 조증 삽화를 겪고 있는 것으로 보입니다. 급성 조증기에는 리튬 등 기분조절제나 비정형 항정신병약물을 고려할 수 있습니다."}, {"major": "기분장애", "minor": "양극성 장애", "qnum": "08", "question": "17세 여자가 뾰족한 물건으로 팔을 긋는 행동을 반복하여 병원에 왔다. 이전에 중학교에 입학하고서 기분이 우울해지고 많이 자고 무기력하게 지내다가 2~3개월 후 저절로 좋아졌다고 한다. 사춘기 이후 반복적으로 자해를 시도했으며, 친구나 가족과 자주 싸웠다. 1개월 전에는 안절부절못하고 본인이 원하는 대로 되지 않으면 소리를 지르고 예민해졌다. 잠을 안 자고 술을 자주 마시며, 무분별한 성관계도 반복했다. 2주 전부 터 기분이 들뜨고 충동적이고 예민하며 극단적인 표현을 자주 했고 짜증이 날 때마다 팔에 상처를 내면 마음이 풀렸다. 치료는?", "textbox": "", "images": [], "options": ["부스피론", "조피클론", "리스페리돈", "밀나시프란", "메틸페니데이트"], "answer": 2, "explanation": "이전에 2~3개월간의 우울함, 과다수면, 무기력함의 시기가 있었으며, 최근 1주 이상 기분 의 과민, 주의산만, 수면욕구 감소, 무분별한 성행위 등 조증삽화의 기준을 만족하므로 양 극성장애 1형을 진단할 수 있습니다. 현재 조증삽화에서 사용할 수 있는 1차 약물은 lithium, valporate 등의 기분조절제 또는 비정형 항정신병약물을 사용합니다. 보기 중 에서 리스페리돈이 이에 해당합니다.1) 항불안제로, 범불안장애에 사용됩니다.2) 비벤조디아제핀계 수면제입니다.4) SNRI 계열 항우울제입니다(milnacipran).5) ADHD에 사용되는 각성제입니다."}, {"major": "기분장애", "minor": "양극성 장애", "qnum": "09", "question": "22세 여자가 한 달 전부터 잠을 자지 않으면서 하루 종일 쇼핑에만 빠져 병원에 왔다. 대화를 하다가도 쉽게 예민해지면서 화를 잘 내고 싸움을 자주 하여 병원에 왔다. 평소보다 말이 많아졌으며 사고비약을 보였다. 진단은?", "textbox": "", "images": [], "options": ["행실장애", "조현병", "충동조절장애", "양극성장애", "주의력결핍과다활동장애"], "answer": 3, "explanation": "예민하고 화를 잘 내고 싸움을 자주 하는 등 의 충동조절을 보이며, 말이 많아지고 밤에도 잠을 자지 않는 등의 전형적인 조증 삽화를 보이고 있습니다. 또한 사고의 비약 역시 조 증 삽화에서 주로 보이는 병리입니다. 따라서 위 환자는 조증 삽화를 보이는 양극성장애 환 자로 볼 수 있습니다."}, {"major": "기분장애", "minor": "양극성 장애", "qnum": "10", "question": "39세 남자가 감정 기복으로 병원에 왔다. 5일 전부터 수면 시간이 3시간 으로 줄었지만 피곤하지 않고 기분이 좋아 평소보다 많은 일을 했다고 하 였다. 2년 전에 주요우울장애로 치료를 받은 적이 있었다. 부인은 조용하 던 남편이 말이 많아지고, 직장에서 실수가 많아졌다고 했다. 진단은?", "textbox": "", "images": [], "options": ["양극성장애", "순환기분장애", "경계성인격장애", "일주기울동수면장애", "주의력결핍과다활동장애"], "answer": 0, "explanation": "비정상적으로 고양된 기분이 4일 이상 지속되 고 있고 수면욕구 감소, 말이 많아지는 등 경 조증 삽화에 해당하는 증상을 보이고 있습니 다. 이러한 기분의 변화는 타인에 의해서도 관찰되고 있고 주요우울장애로 진단받은 적도 있었으므로 양극성장애 II형에 의해서 가장 합리적으로 설명되므로 양극성장애를 진단할 수 있겠습니다.2) 순환기분장애 : 순환기분장애는 경조증 삽 화에 해당하지 않는 경증 증상이 있어야 합니다. 이 경우 경조증 삽화에 해당하 므로 순환기분장애로 진단할 수 없습니다."}, {"major": "기분장애", "minor": "양극성 장애", "qnum": "11", "question": "25세 남자가 7년 전부터 반복적인 조증과 우울증 삽화로 치료를 받고 있다. 꾸준히 약물치료를 받던 중 최근에 시행한 검사실 검사에서 백혈구 감소, 간 기능 이상소견을 보였다. 이 환자에게 적합한 치료제는?", "textbox": "", "images": [], "options": ["lithium", "carbamazepine", "valproate", "fluoxetine", "clozapine"], "answer": 0, "explanation": "Carbamazepine은 조혈 기관장애, valproate는 간기능장애를 일으킬 수 있습니다. clozapine도 agranulocytosis 등을 일으킬 수 있으므로 현재 환자에서 사용할 수 없습니다. 리튬에 의해 부작용이 생기는 장기는 신심갑조(신장, 심장, 갑상샘, 조혈기관, 입)이고, 문제의 환자를 급속 순환형으로 볼 근거도 부족하므로 리튬이 가장 적합한 치료가 되겠습니다."}, {"major": "기분장애", "minor": "양극성 장애", "qnum": "12", "question": "30세 남자가 쉴 새 없이 말을 하여 병원에 왔다. 7개월 전부터 기분이 매우 좋고, 잠을 자지 않아도 피로한 줄 몰랐다. 자신의 큰 능력을 보여주겠다며 회사를 그만두고 대출을 받아 창업을 준비하였으나, 능력에 걸맞은 차를 타야 한다는 생각에 최고급 승용차를 구입하느라 대출금을 모두 탕진하였다. 4개월 전부터는 의욕과 흥미가 사라져 방에 누워 잠만 자며 지냈다. 2주 전부터 말이 많아지고 행동은 부산해졌지만 우울한 기분도 들었다. 오전에는 기분이 좋고 자신감이 넘치며 활동이 늘어나지만 저녁에는 매사가 귀찮고 흥미를 잃어 죽고 싶은 생각이 들었다. 진단은?", "textbox": "", "images": [], "options": ["순환성장애", "제I형 양극성장애, 조증삽화, 불안증 동반", "제I형 양극성장애, 조증삽화, 혼재성 양상 동반", "제II형 양극성장애, 경조증삽화, 혼재성 양상 동반", "제II형 양극성장애, 우울증삽화, 혼재성 양상 동반"], "answer": 2, "explanation": "7개월 전 기분의 항진, 수면욕구 감소, 충동적인 창업 준비, 대출, 충동적 구매 및 이로 인한 재정적 실패는 조증 삽화에 해당하고, 4개월 전의 의욕과 흥미가 사라져 방에 누워 잠만 자며 지냈다는 것은 우울삽화에 해당합니다. 따라서 이 환자는 제I형 양극성장애로 진단할 수 있습니다. 현재 2주 전부터 기분이 들뜨고 자신감이 넘치며 활동이 늘어나는 것은 조증삽화의 기준을 만족합니다. 이와 동시에 하루 중에 흥미가 떨어지는 때가 공존하는 것은 혼재성 양상을 시사합니다. 혼재성 양상이 있어도 삽화의 진단 기준을 찾아 기준을 세우면 됩니다."}, {"major": "기분장애", "minor": "양극성 장애", "qnum": "13", "question": "성실한 성격과 뛰어난 업무 능력으로 회사에서 인정을 받고 있는 28세 남자가 1개월 전, 중요한 프로젝트에서 큰 실수를 하였다. 그 후부터 매일 야근을 하며 업무 계획을 세우더니 사장이 되어 직접 회사를 운영하게 될 것이라는 말을 하곤 하였다. 이 환자의 정신역동학적 특성에 해당하지 않는 것은?", "textbox": "", "images": [], "options": ["과대망상", "사고단절", "의기양양", "주의산만", "행동과다"], "answer": 1, "explanation": "회사의 사장이 될 것이라고(과대망상) 들뜨면서 (의기양양) 이것저것 계획을 세우고(주의산만, 행동과다) 다녔다. → 조증삽화 사고단절은 조현병의 특징적 증상입니다."}, {"major": "기분장애", "minor": "양극성 장애", "qnum": "14", "question": "32세 여자가 2개월 전부터 기분이 우울하다고 병원에 왔다. 매사에 의욕이 없고, 재미있는 일이 없으며, 식욕은 늘고, 잠이 많아져 계속 하루 종일 누워있는 일이 많다고 한다. 2년 전에도 우울과 의욕저하 때문에 플루옥세틴을 복용했는데 당시에 기분이 심하게 들뜨고 말이 많아지고 부산해지며 자신에게 초능력이 생겨 사람들이 자신을 숭배할 것이라고 말했다고 한다. 치료는?", "textbox": "", "images": [], "options": ["벤라팍신", "부스피론", "라모트리진", "미르타자핀", "아미트립틸린"], "answer": 2, "explanation": "처음에 주요우울장애로 진단받았지만 향후 양극성장애로 전환될 가능성이 높은 경우 ① 어린 나이에 발병 ② 수면과다 혹은 심한 정신운동지체 ③ 산후 우울증이나 항우울제에 의하여 경조증이 유발된 경우 ④ 양극성장애의 가족력이 있는 경우 우선 환자가 2년 전에 주요우울장애로 SSRI를 복용했는데 당시 약을 복용하고 조증삽화가 일어났으므로 환자에게 양극성장애가 의심됩니다. 현재 환자는 양극성장애의 주요우울삽화가 의심되므로 약물치료 중 우울증에 효과 있는 lamotrigine이 정답이 되겠습니다."}, {"major": "기분장애", "minor": "양극성 장애", "qnum": "15", "question": "주요우울장애보다 양극성장애에 더 특징적인 것은?", "textbox": "", "images": [], "options": ["발병이 늦다.", "유전성이 더 높다.", "여자에 흔하다.", "평생 유병률이 높다.", "기혼자에 더 흔하다."], "answer": 1, "explanation": "1) 발병 연령 : 양극성장애 1형의 평균 발생 연령은 30세 혹은 그 이전으로, 평균 발병 연령이 40세인 주요우울장애보다 조기에 시작합니다. 2) 유전적 요인은 주요우울장애보다 양극성 장애 1형에서 더 중요한 역할을 합니다. 3) 양극성장애 1형은 남녀가 같은 유병률을 보입니다. 4) 양극성장애 1형은 평생 유병률이 약 1%로 조현병과 비슷하고 주요우울장애보다는 드뭅니다. 5) 양극성장애 1형은 결혼한 사람보다 이혼한 사람들과 독신남성에서 흔합니다."}, {"major": "기분장애", "minor": "양극성 장애", "qnum": "16", "question": "27세 남자가 2주 전부터 갑자기 잠을 자지 않는다고 병원에 왔다. 병원에 온 이유를 묻자 다음과 같이 말하였다. \"하나님이 이 병원으로 저를 인도하셨어요. 하나님은 위대하시죠. 우리나라에서 제일 위대한 사람은 박지성인데, 월드컵 경기장 주변 땅값이 오른다길래 부동산에 갔는데, 돈이 필요해서 은행에 갔다가 커피를 마셨더니 기분이 참 좋아졌어요.\" 진단은?", "textbox": "", "images": [], "options": ["조현병", "인위장애", "해리성주체장애", "제I형 양극성장애, 조증삽화", "제I형 양극성장애, 경조증삽화"], "answer": 3, "explanation": "조증삽화 ① Distractibility(주의산만) ② Irresponsibility(악결과를 초래하는 활동) ③ Grandiosity(팽창된 자존심, 과대성) ④ Flight of idea(사고비약, 사고분주) ⑤ Activity(활동증가, 정신운동초조) ⑥ Sleeplessness(감소된 수면요구) ⑦ Talkativeness(말이 많아짐) 환자는 2주 전부터 잠을 자지 않는 것을 주소로 내원하였습니다. 문진 시 대답하는 내용을 보았을 때 사고비약이 있음을 알 수 있습니다. 조증삽화가 가장 의심됩니다. 조현병 같은 경우 6개월 이상의 경과가 있어야 하고, 망상과 환각 그리고 언어장애 등이 주소이기 때문에 배제할 수 있겠습니다."}, {"major": "기분장애", "minor": "양극성 장애", "qnum": "17", "question": "34세 여자가 잠을 자지 않는다며 남편과 함께 병원에 왔다. 2주 전에 직장을 그만두고 집안일도 하지 않으면서, 천지신명이 100억 원을 벌 수 있는 프로젝트를 알려줬다며 기분이 들떠 있었다. 3일 전부터는 하루 2~3시간밖에 자지 않으면서 기운이 넘쳐 프로젝트에 대해 끊임없이 말하며 집안 여기저기에 자료들을 펼쳐두었지만, 남편이 보기에는 아내가 산만하고 부산하게 움직일 뿐이었다. 진단은?", "textbox": "", "images": [], "options": ["망상장애", "양극성장애", "조현정동장애", "급성스트레스장애", "주의력결핍과다행동장애"], "answer": 4, "explanation": "2주 전부터 기분이 들떠 있으며 수면욕구의 감소, 말이 많아지는 증상, 주의산만 및 흥분 증상을 보이고 있습니다. 직장을 그만두고 집안일도 하지 않는 등 사회적, 직업적 기능 역시 현저히 감소되어 있기 때문에 조증삽화로 볼 수 있으며, 1번이라도 조증삽화가 있는 경우 양극성장애 I형으로 진단할 수 있습니다."}, {"major": "기분장애", "minor": "양극성 장애", "qnum": "18", "question": "2개월 전부터 발생한 심한 무력감과 피로, 식욕저하, 체중감소를 주소로 35세 여자가 내원하였다. 환자의 과거력 상 조증삽화를 주소로 2번 입원치료를 받은 적이 있었다. 이 환자에서 조증삽화를 유발하였을 가능성이 가장 높은 약은?", "textbox": "", "images": [], "options": ["lithium", "clozapine", "olanzapine", "paroxetine", "carbamazepine"], "answer": 3, "explanation": "조증삽화가 있으므로 양극성장애 I형입니다. 양극성장애의 우울삽화에서 항우울제 단독치료는 피해야 하며 일차 선택약물은 리튬과 valproate입니다. 우울 증상이 아주 심하거나 적정용량의 일차 약물에 반응하지 않는 경우 항우울제를 추가할 수 있는데, 조증으로 전환하는지 주의 깊게 살펴야 합니다. Paroxetine은 SSRI로 항우울제입니다. 양극성장애에서 항우울제는 조증삽화를 유발할 수 있습니다."}, {"major": "기분장애", "minor": "양극성 장애", "qnum": "19", "question": "35세 남자가 이상한 말을 하고 경찰관을 폭행하여 응급실에 끌려왔다. 새벽에 과속운전 검문을 당하였는데, \"나는 저승사자다. 너희들은 나를 따라서 지옥으로 갈 것이다.\"라며 난폭한 행동을 하여 경찰관이 부상을 당했다. 경찰관에게 끌려오는 도중에도 계속해서 낄낄거리며 웃고 크게 소리를 질렀다. 이 환자에서 의심해보아야 할 상황으로 옳은 것은?", "textbox": "가. 분열 정동장애\n나. 양극성장애\n다. 암페타민 중독\n라. 순환기분장애", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 0, "explanation": "가. 조현정동장애란 조현병과 기분장애의 양쪽 증상을 모두 가지고 있는 상태\n나. 조증 상태에는 의기양양, 기고만장, 흥분 상태가 되고, 과대망상이나 피해망상, 종교적 과대망상 등도 나타납니다.\n다. 암페타민 정신병(amphetamine psychosis)\n라. 순환기분장애는 경조증과 경우울증의 삽화가 교대로 나타나는 질병입니다."}, {"major": "기분장애", "minor": "물질약물치료로 유발된 우울장애", "qnum": "01", "question": "28세 여자가 1주일 전부터 잠이 오지 않아 병원에 왔다. 늘 기분이 저조하고 우울하기도 했지만, 1주일 전부터는 의욕도 떨어져서 만사 귀찮기만 하여 짜증이 나고 그러다 보니 기분이 더 우울해졌다고 한다. 평소에도 매사에 재미가 없고 고등학교를 졸업할 때부터 기분이 우울했고 대학에 다닐 때도 직장에 들어가서도 지금까지 한 번도 기분이 좋았던 적이 없다. 회사 생활은 어렵게 유지하였으나 일상생활에서 즐거움이나 성공을 기대하지 않았다. 진단은?", "textbox": "", "images": [], "options": ["적응장애", "순환성장애", "주요우울장애", "경계성인격장애", "지속성우울장애"], "answer": 4, "explanation": "28세 여성이 수면장애를 주소로 내원하였습니다. 고등학교를 졸업하면서부터 한번도 기분 좋았던 적 없이 늘 우울한 기분이 지속되었고 (2년 이상 지속, 증상이 없던 기간 2개월 미만), 최근 불면 증상까지 있어 지속성 우울장애의 진단 기준에 부합합니다.1) 적응장애 : 뚜렷한 스트레스 요인으로 인한 단기적 반응이 나타납니다.2) 순환성장애 : 경조증 증상과 우울 증상이 혼재되어 나타납니다.3) 주요우울장애 : 만성적으로 우울한 기분 외에 뚜렷한 주요우울삽화가 존재했었는지 불분명하고, 현재 1주 전부터 발생한 불면 외에 다른 전형적인 주요우울삽화의 기준을 만족하는 증상은 명시되어있지 않아 주요우울장애보다 지속성 우울장애가 더 적절합니다.4) 경계성인격장애 : 자신에 대한 평가 및 자아정체성, 정서, 타인에 대한 평가에서 극도의 불안정성을 보이는 인격장애로 자제력 부족, 충동성, 자해 등이 특징입니다."}, {"major": "기분장애", "minor": "물질약물치료로 유발된 우울장애", "qnum": "02", "question": "26세 여자가 고등학교 시절부터 늘 자신이 못나고 쓸모없는 존재라는 생각에 우울하다며 병원에 왔다. 집중이 안 되어 힘들었지만 직장생활은 지속하였다. 특별한 스트레스나 다른 증상은 없다고 한다. 진단은?", "textbox": "", "images": [], "options": ["순환기분장애", "기분저하장애", "범불안장애", "적응장애", "주요우울장애"], "answer": 1, "explanation": "고등학교 시절부터 26세까지, 즉 2년 이상 지속되어 온 우울 기분이 있습니다. 주요우울장애를 진단하기에는 증상이 모자라네요. 직장생활은 지속할 수 있는 등 기능 수행이 떨어지지 않았다는 점도 주요우울장애보다는 지속적 우울장애(기분저하장애)를 더 시사합니다."}, {"major": "기분장애", "minor": "물질약물치료로 유발된 우울장애", "qnum": "03", "question": "28세 여자가 불면과 식욕저하를 주소로 병원을 방문하였다. 5년 전부터 의기소침하고 매사에 자신감이 없다가 어느 날은 갑자기 기분이 좋아지면서 활동량이 늘고 적극적인 모습을 보였다. 이러한 경향이 주기적으로 반복해서 나타났고, 사회생활에 장애는 없었다. 이 환자의 진단으로 가장 적절한 것은?", "textbox": "", "images": [], "options": ["양극성장애 I 형", "양극성장애 II 형", "기분순환장애", "기분부전장애", "경계성 인격장애"], "answer": 2, "explanation": "2년 이상 우울한 기분과 들뜨는 기분이 주기적으로 보이지만 사회생활에 지장이 없으므로 기분순환장애입니다."}, {"major": "기분장애", "minor": "물질약물치료로 유발된 우울장애", "qnum": "04", "question": "43세 여자가 1개월 전부터 무기력해져서 병원에 왔다. 3개월 전부터 양쪽 손목과 손가락 마디가 아프고 부어서 프레드니솔론을 처방받아 매일 복용하고 있다. 통증과 부기는 가라앉았지만 다시 재발할 것 같았다. 안심이 되지 않아 불안하고 우울해지고 활력이 없어지면서 일에 집중도 되지 않고 집에서 먹기만 해서 살이 쪘다. 회사에 갈 의욕이나 자신감이 생기지 않아 병가를 내고 싶다고 한다. 진단은?", "textbox": "", "images": [], "options": ["주요우울장애", "질병불안장애", "지속성우울장애", "반복성단기우울증", "물질/약물치료로 유발된 우울장애"], "answer": 4, "explanation": "43세 여성이 1개월 전부터 지속된 무기력증을 주소로 내원하였습니다. 불안감, 우울감, 활력 저하, 집중도 저하, 체중 증가, 의욕 및 자신감 저하 등 주요우울장애의 기준을 만족하는 증상이 2주 이상 나타나고 있습니다. 본 환자의 경우 3개월 전 프레드니솔론을 처방받아 매일 복용한 병력이 있는데, 치료약물이 우울증상을 유발할 수 있고 약물 노출 후에 우울 증상이 발병하였으며, 약물치료 중단 이후에도 상당한 기간 지속되었다는 증거가 없으며, 과거력이 없어 독립적인 주요우울장애의 가능성은 떨어지기 때문에 물질/약물치료로 유발된 우울장애가 가장 적절한 진단입니다. 글루코코르티코이드는 HPA axis를 억제하여 우울증을 유발할 수 있는 약물로 알려져 있습니다. 또한 증상이 약물치료 시작보다 선행하지 않았고, 증상이 약물치료 중단 이후에도 상당한 기간 지속되었다는 증거가 없으며, 과거력이 없어 독립적인 주요우울장애의 가능성은 떨어지기 때문에 물질/약물치료로 유발된 우울장애가 가장 적절한 진단입니다."}, {"major": "기분장애", "minor": "물질약물치료로 유발된 우울장애", "qnum": "05", "question": "26세 여자가 2주 전부터 우울하고 피곤하고 집중이 되지 않았다. 우울하기 3~4일 전에는 기분이 고양되고 말이 많아지고 자신감에 넘쳐 3시간만 자고 일해도 피곤한 줄 몰랐다. 지난 3년 동안 지속적으로 우울한 기분과 고양된 기분 반복되었다고 한다. 진단은?", "textbox": "", "images": [], "options": ["기분부전장애", "기분순환장애", "경계성 인격장애", "양극성장애 I형", "반복성 주요우울장애"], "answer": 1, "explanation": "최소 2년 이상 주요우울삽화 기준을 만족 못 하는 우울증상과 경조증삽화의 반복, 그 2년간 증상이 없었던 기간은 2개월 미만, 주요우울삽화/조증삽화/혼합 삽화가 없는 것을 통해 기분순환장애로 진단할 수 있습니다."}, {"major": "기분장애", "minor": "물질약물치료로 유발된 우울장애", "qnum": "06", "question": "26세 남자가 하루 종일 우울하다며 병원에 왔다. 고등학교 때부터 거의 매일 무기력하고 우울했다고 한다. 잠을 너무 많이 자고 하루 중 12시간 이상을 침대에서 보냈으며, 의욕이 없어 직장 생활을 계속하기 어려웠다고 한다. 병원에서 한 번도 기분이 들뜨거나 에너지가 넘친 적이 없었다고 한다. 평소 몸이 안 좋아 병원을 자주 다녔지만 별다른 이상 소견은 없었다. 치료는?", "textbox": "", "images": [], "options": ["부스피론", "서트랄린", "트라조돈", "라모트리진", "아토목세틴"], "answer": 1, "explanation": "2년 이상 하루 종일 지속되는 우울감, 무기력함, 그리고 수면 과다 등으로 보아 지속성 우울장애로 진단할 수 있습니다. 지속성 우울장애의 약물 치료로는 항우울제를 사용합니다. 서트랄린과 트라조돈 모두 항우울제에 해당하나 트라조돈은 수면 효과가 크므로 수면 과다를 호소하는 환자에게 사용하기 적합하지 않습니다."}, {"major": "기분장애", "minor": "물질약물치료로 유발된 우울장애", "qnum": "07", "question": "33세 여자가 무기력하다며 병원에 왔다. 2년 전부터 잠이 안 오고 자신감이 없어지고 피로감이 하루 종일 지속되었다. 집안일은 그런대로 하고 있고, 별다른 이유가 없는 데도 우울과 불안이 없는 날보다 있는 날이 많았다. 평소 건강에 대한 걱정이 많다. 치료는?", "textbox": "", "images": [], "options": ["클로니딘", "클로자핀", "벤즈트로핀", "아고멜라틴", "카르바마제핀"], "answer": 3, "explanation": "2년 동안 수면부족, 피로감, 자신감의 하락 등 증상이 있고, 증상이 그 기간의 절반 이상 존재하지만, 집안일은 할 수 있는 정도이다. 주요우울삽화의 기준을 만족하지 않는 우울감이 2년 이상 지속되므로 지속적 우울장애를 진단내릴 수 있습니다. 치료로는 항우울제를 사용합니다. 아고멜라틴은 멜라토닌 수용체 작용제로, 항우울제로 사용됩니다. 부작용이 적고, 수면이 오도록 도와주는 작용도 있어 이 환자에 사용하기 알맞습니다.1) 알파2작용제로, ADHD에 보조적으로 사용된다.2) 비정형항정신병약물이다3) 항콜린제로, 항정신병의 급성추체외로증상에 사용될 수 있다.5) 항경련제로, 양극성애에 사용된다."}, {"major": "기분장애", "minor": "물질약물치료로 유발된 우울장애", "qnum": "08", "question": "29세 남자가 사소한 일에 짜증이 나고 화가 난다며 병원에 왔다. 2년 전부터 며칠은 잠을 줄여 가며 시키지 않은 야근을 열심히 하기도 하였고 직장 동료에게 참견을 많이 하고 쉽게 흥분하기도 하는 반면, 1주일 정도는 출근도 못 할 정도로 우울했다고 한다. 2년간 평온한 기분으로 지내는 기간이 1달이 안 되어 가족들이 힘들어 했다. 치료는?", "textbox": "", "images": [], "options": ["발프로산", "부프로피온", "이미프라민", "플루옥세틴", "리바스티그민"], "answer": 0, "explanation": "2년 동안 경조증 증상과 우울 증상이 반복되어 나타나는 등 순환성 장애의 진단 기준을 만족합니다. 순환성 장애의 치료는 리튬이 우선이나 카바마제핀, 발프로산 등도 효과가 있습니다."}, {"major": "기분장애", "minor": "물질약물치료로 유발된 우울장애", "qnum": "09", "question": "25세 여자가 항상 피곤하고 삶의 흥미가 없다고 하여 병원을 방문하였다. 그녀는 어려서부터 혼자 지내는 시간이 많고 우울하였으며, 지난 수년간 흥미 있는 일이 없고 주변에 무관심한 채로 직장생활을 해왔다. 가장 적절한 진단은?", "textbox": "", "images": [], "options": ["건강염려증(hypochondriasis)", "기분저하증(dysthymia)", "적응장애(adjustment disorder)", "범불안장애(generalized anxiety disorder)", "주요우울장애(major depression disorder)"], "answer": 1, "explanation": "기분저하증(=지속적 우울장애)은 2년 이상 꾸준히 우울한 상태가 지속되지만 주요우울삽화나 기타 기분삽화가 없어야 합니다.1) 건강에 대해 걱정하는 양상은 없음3) 뚜렷한 선행 스트레스 요인이 없음4) 불안상태의 지속이 주 증상이어야 함5) 이보다는 심각한 증상이 필요"}, {"major": "기분장애", "minor": "물질약물치료로 유발된 우울장애", "qnum": "10", "question": "24세 여자가 대인관계가 힘들어 불안하다며 병원에 왔다. 직장 동료와 자주 갈등이 생기고 가족과도 사이가 좋지 않다. 3년 전부터 자주 기분이 처질 때가 있고, 그럴 때는 평소에 잘하던 일도 귀찮게 느껴져 억지로 하는 경우가 많다. 기분이 괜찮아지면 밤에 잠도 자지 않고 책을 보거나 운동을 하기도 한다. 특별한 이유 없이 갑작스럽고 수시로 바뀌는 자신의 기분 때문에 주변 사람과도 자주 갈등이 생겨 힘들고 편안한 감정으로 산 때가 3년간 한 달도 채 지속되지 못한 것 같다고 한다. 진단은?", "textbox": "", "images": [], "options": ["순환성장애", "사회불안장애", "의사소통장애", "지속적우울장애", "탈억제성사회적유대감장애"], "answer": 0, "explanation": "2년 이상 동안 경조증 삽화에 해당하지 않는 경조 증상(밤에 잠도 자지 않고 책을 보거나 운동을 함)과 주요우울증 삽화의 기준을 충족하지 않는 우울증상(기분이 처지거나 일이 귀찮게 느껴짐)이 수시로 바뀌고 있고, 2개월 이상 증상이 없이 지낸 적이 없으므로 순환성장애로 진단할 수 있습니다."}, {"major": "기분장애", "minor": "물질약물치료로 유발된 우울장애", "qnum": "11", "question": "27세 여자가 심한 기분 변화로 병원에 왔다. 고등학교 졸업 이후로 1주 일 정도 기분이 우울하여 무기력하다가도 한동안 의욕에 넘치고 자신감 에 차기도 하는 등의 기분 변화가 반복되었다고 하였다. 하지만 정도가 심하지 않아 대학생활 및 직장생활을 계속하였다고 한다. 진단은?", "textbox": "", "images": [], "options": ["주요우울장애(major depressive disorder)", "기분저하장애(dysthymic disorder)", "순환기분장애(cyclothymic disorder)", "I형 양극성장애(bipolar I disorder)", "II형 양극성장애(bipolar II disorder)"], "answer": 2, "explanation": "순환기분장애는 경조증 삽화와 약한 우울삽화 가 반복되는 경우입니다. 주요우울삽화의 기 준에 맞지 않는 수많은 우울 증상과 경조증삽 화의 기준에 맞지 않는 경조증 증상이 2년 동 안 지속적으로 존재하는 경우 진단할 수 있습 니다."}, {"major": "기분장애", "minor": "물질약물치료로 유발된 우울장애", "qnum": "12", "question": "29세 남자가 직장에서 다툼이 지속되어 휴직을 하고 병원에 왔다. 감정 기복에 따라 예민해지고, 이런 감정이 2~3일 정도 지속되다가 다시 만 사가 귀찮고 기운이 없어지기가 반복된다고 한다. 대학생 때부터 우울했 고, 우울감은 1주일 정도 지속되다가 좋아지면 미뤄둔 일을 처리하고 친 구를 자주 만나러 다니며 말을 많이 하고 농담도 잘했다고 한다. 진단은?", "textbox": "", "images": [], "options": ["주의력결핍과다행동장애", "주요우울장애", "I형 양극성장애", "II형 양극성장애", "순환기분장애"], "answer": 4, "explanation": "경조증삽화 기준을 충족하지 못하는(1주보다 짧음) 여러 경조증 증상과 주요우울삽화 기준 을 충족하지 못하는(2주보다 짧음) 여러 우울 증상이 대학생 때부터 지금까지 반복해서 나 타나고 있습니다. 순환기분장애를 의심할 수 있습니다."}, {"major": "불안장애", "minor": "공황장애 및 광장공포증", "qnum": "01", "question": "52세 남자가 갑자기 숨이 막힌다며 병원에 왔다. 2개월 전부터 반복하여 갑자기 숨이 막히고 어지럽고 식은땀이 나고 가슴이 두근거려서 죽을 것 같다고 한다. 술을 마신 이후 악화되고, 이 증상들이 다시 나타나면 어떻게 하나 걱정하며 외출까지 꺼리게 되었다. 1개월 전에는 등산을 하다가 갑자기 숨쉬기가 힘들고 다리에 힘이 풀려서 응급실에서 검사를 받았지만 이상은 없었다고 한다. 치료는?", "textbox": "", "images": [], "options": ["날트렉손", "아토목세틴", "플루옥세틴", "리바스티그민", "메틸페니데이트"], "answer": 2, "explanation": "52세 남성이 갑작스런 호흡곤란으로 내원하였습니다. 2개월 전부터 반복적으로 호흡곤란, 어지러움, 식은땀, 두근거림과 죽음에 대한 공포가 발생하였고(반복적으로 예상치 못한 공황발작이 있음), 발작에 대한 두려움으로 외출을 꺼리고 있는 상황입니다(예기불안, 발작과 관련한 부적응적 행동변화). 또한 1개월 전 응급실에서 시행한 검사에서 신체적 이상이 없음이 확인되어 공황장애로 진단할 수 있습니다. 공황장애 약물치료의 일차선택제는 SSRI와 SNRI이고, 급성 발작기 및 예기불안 시에 benzodiazepine을 병용할 수 있으나 의존성으로 인해 장기사용은 주의해야합니다. 또한 약물치료와 함께 인지행동치료도 병행할 수 있습니다. 따라서 가장 적절한 치료는 플루옥세틴입니다."}, {"major": "불안장애", "minor": "공황장애 및 광장공포증", "qnum": "02", "question": "31세 여자가 5개월 전부터 남편 없이는 전혀 외출을 하지 못했다. 혼자서 외출할 때에 극심한 공포나 신체 증상이 나타나지는 않았지만, 무슨 일이 생기거나 아무도 자신을 도와주지 않을 것 같아 불안해하였다. 진단은?", "textbox": "", "images": [], "options": ["공황장애", "광장공포증", "범불안장애", "사회공포증", "특정공포증"], "answer": 1, "explanation": "광장공포증(agoraphobia)은 광장과 같은 넓은 장소뿐만 아니라, 공공장소, 특히 급히 빠져나갈 수 없는 장소에 가는 것에 공포가 있으며, 어떤 위험 상황이 일어날까봐 피하는 것을 말합니다. 참고로, 대부분의 광장공포증은 공황장애에 속발하는데, 공황장애가 없는 광장공포증은 잘 만성화하며 예후가 나쁩니다."}, {"major": "불안장애", "minor": "공황장애 및 광장공포증", "qnum": "03", "question": "43세 남자가 갑자기 생긴 심한 불안으로 응급실에 왔다. 숨이 답답하고 어지러우며 가슴이 두근거린다고 했다. 이런 증상으로 최근 한 달 동안 세 차례 응급실에 왔으나 매번 시행한 검사는 모두 정상이었다. 환자는 또 이런 증상이 생길까 봐 걱정하였다. 재발 방지를 위한 유지 치료는?", "textbox": "", "images": [], "options": ["벤조디아제핀(benzodiazepine)", "베타차단제(β-blocker)", "아세틸콜린에스테라아제억제제(acetylcholinesterase inhibitor)", "세로토닌도파민길항제(serotonin-dopamine antagonist)", "선택세로토닌재흡수억제제(selective serotonin reuptake inhibitor)"], "answer": 4, "explanation": "공황발작이 반복적으로 나타나고 있으며 예기불안이 있으므로 공황장애입니다. 공황장애는 급성 발작기에는 benzodiazepine으로 치료하지만 유지치료로는 TCA, SSRI, MAOI 등의 항우울제를 사용합니다."}, {"major": "불안장애", "minor": "공황장애 및 광장공포증", "qnum": "04", "question": "30세 남자가 갑작스럽게 호흡이 곤란하다며 응급실에 왔다. 가슴이 조이고 막힌 듯한 느낌이 들었으나, 약 10분 후에 증상은 호전되었다. 최근 4개월간 비슷한 증상으로 2차례 응급실에 내원하였고, 비슷한 증상이 다시 발생하는 것을 두려워하였다. 여러 병원을 다니면서 받은 심전도, 혈액검사, 심초음파검사, 운동부하검사, 관상동맥 컴퓨터단층촬영, 가슴 컴퓨터단층촬영 등의 여러 검사에서 이상소견은 발견되지 않았다. 치료는?", "textbox": "", "images": [], "options": ["부스피론", "테오필린", "에스시탈로프람", "프로사이클리딘", "나이트로글리세린"], "answer": 2, "explanation": "호흡곤란 및 흉통, 흉부 불쾌감이 갑작스럽게 발생한 것으로 보아 공황발작이 있었음을 추측할 수 있고, 최근 반복적으로 나타나 응급실에 내원한 병력이 있습니다. 공황발작으로 인해 예기불안을 보이고 있으며 검사 결과 다른 신체질환의 가능성은 떨어진다는 점에서 공황장애로 진단할 수 있습니다. 공황장애의 주된 치료약물은 SSRI로, 3) 에스시탈로프람이 이에 적합합니다."}, {"major": "불안장애", "minor": "공황장애 및 광장공포증", "qnum": "05", "question": "35세 여자가 숨쉬기 힘들다고 병원에 왔다. 3개월 전 비행기 안에서 갑자기 숨이 답답하고 질식할 것 같은 느낌이 들었고, 두근거리면서 어지러워 곧 죽을 것 같다는 두려움을 느꼈다. 착륙 직후 증상은 사라졌고, 응급실에서 검사를 받았지만 이상은 없었다. 그 이후 다시 숨이 막힐까 봐 걱정이 되어 비행기도 타지 않으려고 하고 혼자서 집 밖에 나가지 않으려고 한다. 치료는?", "textbox": "", "images": [], "options": ["최면치료", "동기강화치료", "사회기술훈련", "인지재활치료", "인지행동치료"], "answer": 4, "explanation": "환자는 3개월 전 공황발작(숨참, 질식감, 심계항진, 현기증, 죽을 것 같은 두려움)을 겪은 이후 1개월 이상 예기불안(다시 숨이 막힐까 걱정), 행동변화(비행기를 타지 않고, 혼자 집 밖에 나가지 않음)를 보이고 있습니다. 응급실 검사에서도 이상을 보이지 않아 공황장애에 가장 가깝습니다. 공황장애의 정신치료로는 인지행동치료가 가장 효과적입니다.1) 최면치료 : 해리장애에 효과적2) 동기강화치료 : 물질 관련 및 중독성 장애에 효과적4) 인지재활치료 : 치매, 만성 조현병에서 사용"}, {"major": "불안장애", "minor": "공황장애 및 광장공포증", "qnum": "06", "question": "20세 여자가 지하철을 타고 가던 중 가슴이 답답하고 식은땀이 나며 심계항진을 느껴 금방이라도 죽을 것 같아 응급실을 방문하였다. 내원 후 안정을 되찾았으나 숨을 가쁘게 몰아쉬고 있었다. 3개월 전부터 2주에 한 번씩 비슷한 증상을 경험하였다고 한다. 심혈관계 및 각종 검사에서 이상소견은 관찰되지 않았다. 가장 적합한 진단은?", "textbox": "", "images": [], "options": ["외상 후 스트레스장애", "범불안장애", "강박장애", "공포장애", "공황장애"], "answer": 4, "explanation": "숨이 막히고, 가슴이 두근거리고, 식은땀이 나고, 죽을 것 같은 극심한 공포까지 공황발작의 기준 13가지 중 4가지를 만족하였습니다. 이 증상이 여러 차례 있었으므로, 신체질환이 배제되면 공황장애로 진단할 수 있습니다."}, {"major": "불안장애", "minor": "공황장애 및 광장공포증", "qnum": "07", "question": "48세 남자가 숨이 안 쉬어진다며 병원에 왔다. 2년 전 등산 중에 크게 무리하지 않았음에도, 갑자기 가슴이 답답하고 조이듯 압박이 오고 숨이 막히며 하늘이 노래진 적이 있다고 한다. 4개월 전부터는 갑자기 사무실에서도 유사한 불편감을 느꼈다. 15일 전에는 숨쉬기가 어려울 때 머리가 아프고 식은땀이 한 시간 정도 지속되었으나, 별다른 처치 없이 호전되었다. 호흡곤란이 다시 일어날까 불안해하고, 큰 병은 아닐까 걱정이 많다. 치료는?", "textbox": "", "images": [], "options": ["정신교육", "혐오요법", "참여모델링", "행동수정기법", "안구운동 민감소실 및 재처리"], "answer": 0, "explanation": "2년 전, 4개월 전, 15일 전 등 반복적이고, 다양한 상황에서 예측되지 않는 숨이 막히고 가슴이 답답한 공황발작이 있었고, 그 후 발작에 대한 두려움과 걱정이 있으므로 공황장애로 진단내릴 수 있습니다. 급성 발작에는 Benzodiazepine계열 약물을 사용하고, 만성 치료는 SSRI 등을 사용합니다. 약물치료 이외에는 인지행동치료를 사용할 수 있는데, 공황증상에 대한 오해, 사고의 왜곡 등을 교정하고, 두려운 상황 및 신체증상에 노출시켜 반응을 줄이는 방법 등이 있습니다. 주어진 보기 중에서는 정신교육이 이에 가장 합당합니다. 2) 행동치료 중 하나로, 문제행동과 혐오자극을 짝짓게 하여 행동하지 않게 하는 기법이다. 3) 행동치료 중 하나로, 치료자가 특정 행위를 시범보이고 적절한 반응을 하고, 이를 따라하게 해 적절한 반응을 가르치는 기법이다. 4) 행동치료 중 하나로, 상과 벌을 통해 행동을 만들거나 제거하는 기법이다. 5) PTSD 치료에 사용되는 기법으로, 괴로운 기억을 떠올리게 하는 동시에 안구 운동 자극으로 기억에 대한 괴로움을 줄이는 기법이다."}, {"major": "불안장애", "minor": "공황장애 및 광장공포증", "qnum": "08", "question": "40세 남자가 운동을 하면 호흡곤란이 올까 염려된다며 병원에 왔다. 2년 전 운전 중에 갑자기 호흡곤란과 두근거림, 어지러움을 경험한 후 꾸준히 파록세틴을 복용하였다고 한다. 계단을 오르거나 달리기를 하면 다시 숨이 가빠질까 봐 두려운데, 이런 걱정이 지나치다는 것은 안다고 하였다. 최근에는 불안 발작을 경험한 적이 없고 운전도 잘하며 다른 증상은 없다고 하였다. 치료는?", "textbox": "", "images": [], "options": ["참여모델링", "혐오요법", "습관반전훈련", "신체감각 노출치료", "사회기술훈련"], "answer": 3, "explanation": "공황장애로 진단된 뒤 SSRI로 치료 중인 환자입니다. 공황장애에 대한 정신치료로는 인지행동치료가 효과적인데, 이는 공황증상에 대한 오해의 교정, 사고의 왜곡의 교정, 환자가 두려워하는 신체 증상과 상황에 노출시켜 파국적 인지오류를 교정하고 불안반응을 줄이는 과정 등으로 구성됩니다. 1) 남이 하는 행동을 관찰하여 배워나가는 치료법(예: 사회공포증 환자가 치료자가 청중 앞에서 발표하는 모습을 보고 따라함) 2) 잘못된 행동에 대해 처벌을 가하는 음성 강화기법의 일종(예: 알코올 중독자에게 disulfiram을 처방) 3) 틱장애 등과 같은 반복성행동장애의 치료를 위한 행동치료의 일종 5) 사회적 상황에 적절히 반응하고 자신의 의견을 사회에서 용납되는 방식으로 표시할 수 있도록 하는 훈련(참여모델링이 여기에 포함됨)"}, {"major": "불안장애", "minor": "공황장애 및 광장공포증", "qnum": "09", "question": "47세 남자가 공원에서 운동하다가 갑자기 숨이 막히고 가슴이 심하게 뛰며 응급실에 왔다. 어지럽고 속도 메슥거리며 곧 죽을 것 같은 느낌이 든다고 한다. 심전도, 혈액검사, 가슴 X선 검사에서 이상 소견은 없 다. 30분 정도 지나자 증상은 점차 호전되었다. 지난 1개월 동안 비슷한 증상으로 응급실에 3번 다녀왔다. 지하철이나 엘리베이터처럼 밀폐 된 공간에서는 숨을 쉬기 힘들고, 갑자기 쓰러질까 불안하여 혼자 외출 을 하지 않는다고 한다. 치료는?", "textbox": "", "images": [], "options": ["가족과 항상 같이 있게 한다.", "숨이 차는 운동을 피하게 한다.", "증상의 심각성에 대해 경각심을 갖게 한다.", "가벼운 신체 감각 변화도 세심하게 관찰하게 한다.", "두려워하는 상황에 노출시키고 불안이 줄어들 때까지 기다린다."], "answer": 4, "explanation": "공황발작을 반복적으로 경험하면서 예기 불안을 느끼고 혼자 외출하지 않는 등 공황장애의 진단 기준을 만족하는 상황입니다.1), 2) 공황 장애의 근본적 치료로 적절하지 않습니다.3) 공황 증상에 대한 오해를 교정해 주어야 합니다.4) 사소한 신체 변화를 공황과 연결시키지 않도록 해야 합니다.5) 환자가 두려워하는 상황에 직접 노출시켜 인지 오류를 교정하고 불안 반응을 줄여야 합니다."}, {"major": "불안장애", "minor": "공황장애 및 광장공포증", "qnum": "10", "question": "25세 여자 환자가 택시를 타고 가던 중 갑자기 심장이 빠르게 뛰며 식은 땀이 나고 가슴이 답답함을 느꼈다. 급히 택시에서 내렸으나 증상이 더 심해지고 이러다가 죽을 것 같다는 생각이 들어 근처 병원 응급실을 방문하였다. 내원 직후 심전도 검사 및 여러 검사에서 이상소견은 없었다. 환자는 지속적으로 불안함을 호소하고 초조해 보였다. 이 환자의 치료에 대한 설명으로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["집단 치료가 효과적일 수 있다.", "인지행동 치료가 도움이 된다.", "정신분석적 정신치료는 1차적 증상에 효과적이다.", "삼환계 항우울제 사용이 효과적이다.", "선택적 세로토닌 재흡수 차단제의 사용이 효과적이다."], "answer": 2, "explanation": "1) 불안장애에는 표현적 집단치료, 분석적 집단치료, 지지적 집단치료 등의 적응증이 됩니다.2) 인지 및 행동치료는 공황장애에 효과적일 뿐 아니라 그 효과를 장기적으로 유지하는 데 도움이 됩니다.3) 급성기에는 약물치료가 우선됩니다.4), 5) TCA, SSRI, 벤조디아제핀계 약물을 사용합니다."}, {"major": "불안장애", "minor": "공황장애 및 광장공포증", "qnum": "11", "question": "건장해 보이는 25세 남자가 지하철을 타고 가던 중 갑자기 가슴이 두근거리고 식은땀이 나며 어지럽고 숨이 차 금방이라도 죽을 것 같은 기분이 들었다. 가장 우선적으로 고려해야 할 진단은?", "textbox": "", "images": [], "options": ["범불안장애", "공포장애", "공황장애", "강박장애", "간질"], "answer": 2, "explanation": "(1) 가슴이 두근거리고, (2) 땀이 나고, (8) 어지럽고, (4) 숨이 차며, (11) 죽을 것 같은 기분이 들었다면 공황발작을 의심할 수 있습니다."}, {"major": "불안장애", "minor": "공황장애 및 광장공포증", "qnum": "12", "question": "35세 남자가 40분 전부터 갑자기 가슴이 조인다며 응급실에 왔다. 만원 버스를 타고 퇴근하던 중에 갑자기 숨이 멎을 것 같고, 숨을 쉬어도 막힌 듯 가슴이 답답하며, 어지럽고 식은땀이 났다. 지난 1개월 동안 이와 유사한 증상이 5~6회 있었으나 모두 수분 안에 자연적으로 회복되었다고 한다. 응급실에서 시행한 혈액검사 결과는 다음과 같다. 가슴 X선 사진과 심전도이다. 치료는?", "textbox": "• 혈색소 14.3g/dL, 백혈구 6,270/mm³(중성구 67%, 림프구 22%, 호산구 1%), 혈소판 188,000/mm³, C반응단백질 2.3mg/L(참고치, <10), 트로포닌 I 0.01µg/L(참고치, 0~0.03), 젖산탈수소효소 183U/L(참고치, 115~221)\n• 동맥혈기체(대기호흡) : pH 7.37, PaCO₂ 36mmHg, PaO₂ 102mmHg, HCO₃⁻ 23mmol/L", "images": ["data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAUUAAAE6CAIAAAAOYtceAAAAAXNSR0IArs4c6QAAAERlWElmTU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAABRaADAAQAAAAB
