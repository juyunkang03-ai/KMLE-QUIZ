 가장 효과적이겠습니다. 바레니클린은 니코틴 아세틸콜린 수용체에 대한 부분적 항진 및 억제 효과를 통해서 금단증상 및 흡연에 대한 갈망을 줄여 줄 수 있습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "니코틴", "qnum": "02", "question": "66세 여자가 담배를 끊고 싶다며 병원에 왔다. 1년 전 남편이 폐암으로 사망한 이후 우울하고 눈물이 자주 나며, 밤맛도 떨어지고, 사는 재미가 하나도 없으며, 이렇게 살아서 무엇하나 하는 생각이 자주 든다고 한다. 이럴 때면 담배를 더욱 피우게 되어서 흡연량이 평소보다 두 배 이상 늘었다고 한다. 치료는?", "textbox": "", "images": [], "options": ["벤라팍신", "미르타자핀", "부프로피온", "모클로베미드", "클로미프라민"], "answer": 2, "explanation": "남편이 사망한 후 우울함, 식욕감소, 흥미감소, 무가치감을 느끼는 환자로 우울 증상 개선과 금연치료를 위하여 항우울제를 사용할 수 있습니다. 금연치료에 사용되는 항우울제는 bupropion, nortriptyline, fluoxetine이 있습니다. 부프로피온은 특히 효과적이라고 알려져 있으나, 뇌전증 환자에서는 금기라는 것에 주의해야 합니다. 제시된 보기 모두 항우울제에 해당합니다. 1) SNRI, 2) NaSSA, 3) NDRI, 4) MAO 억제제, 5) TCA"}, {"major": "물질 관련 및 중독성 장애", "minor": "니코틴", "qnum": "03", "question": "45세 남자가 금연을 원하여 내원하였다. 수차례 금연을 시도했으나 실패하였으며, 간질로 치료 중이었다. 적합한 약제는?", "textbox": "", "images": [], "options": ["부프로피온", "아캄프로세이트", "바레니클린", "날트렉손", "벤라팍신"], "answer": 2, "explanation": "금연치료 중 약물요법을 묻는 문제입니다. 대표적인 것으로 항우울제(bupropion, nortriptyline, fluoxetine 등), clonidine, varenicline이 있습니다. Bupropion은 뇌전증 환자에게 금기인 약물이므로, varenicline을 골라야겠습니다. 참고로 최근 연구에 따르면 SNRI인 venlafaxine은 항우울제이긴 하지만 금연치료에는 유의미한 효과가 없는 것으로 나타났습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "니코틴", "qnum": "04", "question": "45세 남자가 금연을 위해 니코틴부착포를 사용하였다. 금연을 시작한 후로 기분이 가라앉고, 자주 짜증이 나고 불안하여 다시 담배를 피우고 싶은 마음이 간절하다고 하였다. 니코틴부착포와 같이 사용하면 좋은 약물은?", "textbox": "", "images": [], "options": ["날트렉손", "부프로피온", "카바마제핀", "플루옥세틴", "아캄프로세이트"], "answer": 1, "explanation": "니코틴 중독의 치료는 니코틴 대체치료, 약물치료, 최면, 혐오요법, 집단치료 등 여러 방법이 있습니다. 약물치료에서는 clonidine, 항우울제(특히 bupropion, nortriptyline, fluoxetine), varenicline을 사용할 수 있습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "니코틴", "qnum": "05", "question": "37세 남자가 금연을 시작한 이후로 주의집중이 되지 않고 불안하며 쉽게 짜증이 났다. 이런 증상이 최고조에 이를 것으로 예상되는 금연 후 시기는?", "textbox": "", "images": [], "options": ["1~2시간", "8~12시간", "24~48시간", "1~2주", "6~10주"], "answer": 2, "explanation": "금연 이후 주의집중이 되지 않고 불안하며 짜증이 나는 증상은 니코틴 금단으로 인한 증상입니다. 금단증상은 금연 후 90~120분부터 나타나기 시작하여 24~48시간에 최고조에 달하고 몇 주, 몇 개월간 지속됩니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "니코틴", "qnum": "06", "question": "니코틴을 억제하여 담배 맛을 줄이고 부분적으로 도파민 분비를 증가시켜 금단 증상을 완화시키는 약물은?", "textbox": "", "images": [], "options": ["Buspirone", "Naltrexone", "Varenicline", "Nortriptyline", "Nicotine patch"], "answer": 2, "explanation": "varenicline에 관한 설명입니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "벤조디아제핀계", "qnum": "01", "question": "44세 여자가 4일 전부터 계속 불안하다며 병원에 왔다. 어젯밤에는 불안해서 한숨도 못 잤다고 했다. 진료 중에도 계속 초조하며 안절부절 못했다. 이렇게 심한 불안은 평생 처음이라고 한다. 지난 1년 동안 잠을 자려고 트리아졸람과 알프라졸람을 복용해오다가 대장내시경검사를 받으려고 5일 전부터 약을 중단했다고 한다. 혈압 145/90mmHg, 맥박 115회/분, 호흡 20회/분, 체온 36.5℃이다. 우선적인 치료는?", "textbox": "", "images": [], "options": ["부스피론", "할로페리돌", "부프로피온", "디아제팜", "리튬"], "answer": 3, "explanation": "환자는 단기작용 벤조디아제핀(트리아졸람, 알프라졸람)을 장기간 남용하다가 갑작스럽게 끊은 뒤부터 불안, 초조, 불면 등의 증상을 호소하며 고혈압과 빈맥 등 자율신경항진의 임상 양상을 보이고 있습니다. 즉 벤조디아제핀 금단으로 5일전부터 우선적으로 디아제팜 등 장기작용 벤조디아제핀을 투약하여 점진적인 감량을 진행해야 하겠습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "벤조디아제핀계", "qnum": "02", "question": "32세 남자가 잠을 못자고 초조해서 응급실에 왔다. 잦은 설사, 복부불편감 및 불면증으로 수 년간 약을 복용하고 있는데, 갑작스런 출장으로 2일간 약을 복용하지 못했다. 이전에도 이 약을 중단한 뒤에 경련발작을 한 적이 있었다. 혈압 140/90mmHg, 맥박 100회/분, 호흡 22회/분, 체온 36.6℃였다. 정신상태검사에서 집중력과 단기기억력 저하를 보였다. 의심되는 물질은?", "textbox": "", "images": [], "options": ["리튬", "부스피론", "부프로피온", "알프라졸람", "플루옥세틴"], "answer": 3, "explanation": "불면증에 일차적으로 사용되는 약물은 벤조디아제핀계 약물입니다. 벤조디아제핀계 약물은 의존성이 있고 금단증상이 발생할 수 있습니다. 금단증상으로는 자율신경계 항진, 정신운동 초조, 불안, 발작 등이 있을 수 있습니다. 특히 단기작용 약물에서 장기작용 약물보다 증상 발현이 더 급격한데, 알프라졸람은 단기작용 약물이므로 가장 의심되는 물질이 되겠습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "벤조디아제핀계", "qnum": "03", "question": "남편과 부부싸움 후 diazepam을 다량 복용한 30세 여자가 의식저하와 호흡저하를 주소로 응급실을 방문하였다. 호흡수는 분당 7회였다. 환자에게 필요한 치료제는?", "textbox": "", "images": [], "options": ["Naloxone", "Dopamine", "Methadone", "Flumazenil", "Haloperidol"], "answer": 3, "explanation": "벤조디아제핀 과량 독성 시 길항제인 flumazenil을 씁니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "벤조디아제핀계", "qnum": "04", "question": "Benzodiazepine계 약물의존 환자들에게 가장 흔한 병발 장애는?", "textbox": "", "images": [], "options": ["적응장애", "불안장애", "망상장애", "주요우울증", "알코올 남용이나 중독"], "answer": 4, "explanation": "알코올 등 다른 물질을 같이 약용하는 예가 많습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "벤조디아제핀계", "qnum": "05", "question": "벤조디아제핀계 약물 의존성의 고위험 군에 해당하는 경우는?", "textbox": "가. 고용량 사용\n나. 동반된 알코올 남용\n다. 65세 이상 고령\n라. 6개월 이상 장기 투여", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 4, "explanation": "가, 라. 투여기간, 용량, 감량의 속도, 반감기 등이 관계가 있습니다.\n나. 알코올과 교차내성\n다. 노인에서는 대사속도가 느려 축적효과가 있기 때문에 의존성의 위험이 있습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "벤조디아제핀계", "qnum": "06", "question": "장기간 diazepam을 사용하는 환자가 갑자기 끊을 경우 보일 수 있는 증상은?", "textbox": "가. 경련\n나. 구역, 구토\n다. 손의 진전\n라. 불면", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 4, "explanation": "진정/수면/항불안제 금단증상\n① 자율신경기능항진\n② 손의 진전\n③ 불면\n④ 구역/구토\n⑤ 일시적 착각/환각(시각/청각/촉각)\n⑥ 정신운동 초조 psychomotor agitation\n⑦ 불안\n⑧ 대발작 grand mal seizure"}, {"major": "물질 관련 및 중독성 장애", "minor": "암페타민 및 코카인", "qnum": "01", "question": "필로폰과 코카인의 중독에 의한 보상기전에 중요한 신경전달물질은?", "textbox": "", "images": [], "options": ["도파민", "글루타메이트", "노르에피네프린", "세로토닌", "GABA"], "answer": 0, "explanation": "필로폰과 코카인 모두 시냅스에서 dopamine의 유리를 증가시키고 재흡수 차단으로 dopamine의 농도를 증가시키는 약리작용을 합니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "암페타민 및 코카인", "qnum": "02", "question": "Amphetamine 중독 증상에 대한 설명으로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["망상과 환각이 동반된다.", "도파민 항진과 관련 있다.", "충동적 행동을 한다.", "우울증이 가장 심각하다.", "식욕이 감퇴한다."], "answer": 3, "explanation": "4) 암페타민 금단 증상 중 가장 심각하며 뚜렷한 증상"}, {"major": "물질 관련 및 중독성 장애", "minor": "암페타민 및 코카인", "qnum": "03", "question": "31세 남자가 3시간 전부터 누군가가 자신을 감시해서 무섭다며 응급실에 왔다. 2년 전부터 나이트클럽에서 만난 친구를 통해 알게 된 약물을 계속 사용하면서 밤을 새워 일을 해도 전혀 피곤하지 않았다. 1개월 전 잠시 약물을 중단하면서 피로감이 심해지고 너무 많이 자며 식욕도 증가하여, 이내 다시 약물을 사용했다. 혈압 152/102mmHg, 맥박 110회/분, 호흡 25회/분, 체온 37.0℃이다. 정신상태검사에서 불안, 긴장, 분노가 관찰 된다. 남용한 것으로 예상되는 약물은?", "textbox": "", "images": [], "options": ["대마", "아편", "졸피뎀", "프로포폴", "메스암페타민"], "answer": 4, "explanation": "밤을 새워 일해도 전혀 피곤하지 않은 증상은 정신자극제의 중독 증상(피로 감소)을 시사하고, 약물을 중단하면서 발생한 피로감, 과면, 배고픔은 모두 전형적인 정신자극제의 금단 증상입니다. 현재 누군가가 자신을 감시한다는 편집증적 사고를 보이는데, 이는 전형적인 amphetamine psychosis로, 병의 경과가 1주일 이내이고 사고내용이 상대적으로 조현병에 비해 괴이하지 않으며 추상능력이 보존되어 있는게 특징입니다. 또한 혈압 상승, 빈맥 등의 증상 또한 자극제 중독 시 발생할 수 있는 신체 증상입니다. 따라서 환자가 남용한 것으로 예상되는 약물은 메스암페타민입니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "암페타민 및 코카인", "qnum": "04", "question": "21세 남자 배우가 안절부절못하고 짜증을 내다가 갑자기 욕을 하며 동료 배우를 구타하여 응급실에 왔다. 매니저에 의하면 그는 최근 모종의 약물을 사용하는 듯 했고, 그 이후로는 에너지가 넘치는 것 같고 식사나 수면 시간을 줄이면서 방송 활동을 늘렸다고 한다. 응급실에서도 그는 의사들이 자신을 죽이려고 한다며 흥분하였다. 혈압 130/80mmHg, 맥박 100회/분, 호흡 28회/분, 체온 36.7℃이다. 신체진찰에서 팔에 주사 자국이 여럿 관찰되고, 동공이 확장되어 있다. 치료는?", "textbox": "", "images": [], "options": ["날트렉손", "라모트리진", "바레니클린", "할로페리돌", "아캄프로세이트"], "answer": 3, "explanation": "충동적이고 공격적인 행동, 동공산대, 안절부절 못하는 자율신경계 자극증상이 보이는 것으로 보아 amphetamine 사용에 의한 증상이 의심됩니다. 팔에 주사자국이 여러 군데 있는 것도 amphetamine 사용을 의심할 수 있는 증거입니다. 동료 배우를 구타하는 과격한 폭력 행동과 의사들이 자기 죽이려 한다고 피 해망상을 보이므로 amphetamine psychosis 가 의심되며, 따라서 소량의 항정신병약물(haloperidol)을 사용해 볼 수 있겠습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "암페타민 및 코카인", "qnum": "05", "question": "23세 남자 가수가 안절부절못하고 공격적인 행동을 보여 응급실을 방문하였다. 매니저에 의하면 최근에 잠도 자지 않고, 식사도 잘하지 않으면서도 오히려 활동력은 항진되어 다양한 방송 활동을 하고 있었다. 꾸준히 모종의 약물을 복용 중이었던 환자로 최근에는 피해망상적인 언행을 보였다. 이 환자가 복용했을 가능성이 가장 높은 약물은?", "textbox": "", "images": [], "options": ["LSD", "Opiate", "Amphetamine", "Phenobarbital", "Cannabinoids"], "answer": 2, "explanation": "약물을 복용하면서 수면욕과 식욕이 감소하고 활동이 증가했으므로 각성제를 복용한 것이 의심됩니다. 현재 각성제 중독으로 amphetamine psychosis를 보이고 있는 것으로 보입니다. 복용했을 가능성이 높은 약물은 각성제인 amphetamine이 되겠습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "암페타민 및 코카인", "qnum": "06", "question": "37세 남자가 30분 전부터 폭력적인 행동을 보이며 형성수술하여 응급실에 실려 왔다. 응급실에서도 계속 공격적인 행동을 하면서 허로 입술을 핥는 행동을 반복하였다. 몸을 떨면서 식은땀을 흘리고 있다. 혈압 164/103mmHg, 맥박 122회/분, 호흡 19회/분, 체온 37.9℃이다. 동공은 커져 있고 양쪽 팔 여러 군데 주사자국이 있다. 치료는?", "textbox": "• 혈액: 혈액요소질소/크레아티닌 16/1.2mg/dL, Na⁺/K⁺/Cl⁻ 141/3.9/100mEq/L, 포도당 143mg/dL\n• 동맥혈가스(대기호흡): pH 7.46, PaCO₂ 30mmHg, PaO₂ 108mmHg, HCO₃⁻ 27mEq/L, SaO₂ 99%", "images": [], "options": ["날록손", "활성탄", "디아제팜", "플루마제닐", "N-아세틸시스테인"], "answer": 2, "explanation": "충동적이고 공격적인 행동, 동공산대, 떨면서 식은땀을 흘리는 자율신경계 자극증상이 보이는 것은 암페타민 중독의 증상입니다. 팔에 주사자국이 여러 군데 있는 것도 암페타민 사용을 의심할 수 있는 소견입니다. 해독을 위해 Diazepam을 사용합니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "암페타민 및 코카인", "qnum": "07", "question": "23세 남자가 누군가 자신을 미행하고 욕하는 소리가 들린다며 응급실에 왔다. 유학 중에 잠시 귀국했고, 남몰래 습관적으로 약을 사용하는 모습이 자주 목격되었다고 한다. 식사를 잘 하지 않고 잠을 잘 자지 않으면서도 활동이 증가하였다고 한다. 주변 사람들이 짜고 자신을 괴롭히고 있다며 흥분하는 모습이 자주 보였다고 한다. 복용했을 가능성이 높은 약물은?", "textbox": "", "images": [], "options": ["졸피뎀", "디아제팜", "메페리딘", "실데나필", "메스암페타민"], "answer": 4, "explanation": "환자가 약을 습관적으로 사용했을 때 식욕상실, 업무수행능률 증가를 보였기 때문에 각성제를 남용한 것이 의심됩니다. 암페타민류가 대표적인 약물인데, 대량 투여 시에는 걱정과 우울, 편집증 상태가 되기도 합니다. 보기 중에는 메스암페타민이 가장 가능성이 높은 약물이 되겠습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "암페타민 및 코카인", "qnum": "08", "question": "20세 재수생 남자가 과격하고 폭력적인 행동과 피해망상으로 병원을 방문하였다. 친구들의 말에 의하면 재수 준비를 하면서 꾸준히 모종의 약을 복용하고 있었다 하였으며, 최근에는 잠을 자지 않고 식사도 하지 않으며 학업에 매진하였다 하였다. 복용이 의심되는 약물은?", "textbox": "", "images": [], "options": ["본드", "대마초", "아편제제", "암페타민", "페노바비탈"], "answer": 3, "explanation": "amphetamine 중독증상 : 식욕상실, 성감증가, 피로감퇴, 수면감소, 흥분/예민 상태amphetamine psychosis : 편집상태, 피해망상1) inhalant의 경우 수면장애는 없습니다(금단 시에는 가능).2) 대마의 경우에는 식욕이 항진됨3) 아편은 진통, 졸음, 다행감5) 페노바비탈은 주의력 감퇴, 졸림, 다행감 등"}, {"major": "물질 관련 및 중독성 장애", "minor": "암페타민 및 코카인", "qnum": "09", "question": "체중감소를 위해 3개월 간 모종의 약을 복용한 23세 여자가 과격한 폭력 행동으로 경찰에 의해 응급실을 방문하였다. 집중력 향상과 각성 상태 유지효과로 소아 주의력결핍과잉행동장애 치료로 사용되기도 하는 이 약물의 금단증상으로 옳은 것은?", "textbox": "가. 두통\n나. 우울증\n다. 근육통\n라. 환시", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 0, "explanation": "amphetamine의 금단 증상\n금단 2~4일간 가장 심하고, 이후 1주 내 소실\n① 우울증 : 가장 뚜렷하게 나타남\n② 불쾌감, 불안, 악몽, 피로감, 과면 또는 불면\n③ 정신 운동성 격정, 진전, 두통, 진땀, 근육통, 복통, 배고픔\n라. 환시는 중독 증상에서 나타납니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "암페타민 및 코카인", "qnum": "10", "question": "정신분열병과 달리 Amphetamine psychosis에서 보이는 특징으로 옳은 조합은?", "textbox": "가. 추상적 사고 내용은 보존되어 있다.\n나. 사고 내용이 괴이하고 망상적이다.\n다. 질병 경과가 1주 이내로 짧다.\n라. 과대망상이 주된 사고의 장애이다.", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 1, "explanation": "편집상태, 관계망상, 피해망상, 폭력, 과대망상, 모욕적 환청/환시, 과잉성 행동, 착란, 지리멸렬 등 올 수 있으나\n가. 추상적 사고 능력이 보존되고 있으며\n나. 사고 내용이 괴이하지 않고\n다. 경과가 1주 이내로 짧으며 감정둔마 등은 별로 없습니다.\n라. 과대망상은 공통으로 올 수 있습니다.\n치료는 항정신병 약물입니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "아편류", "qnum": "01", "question": "28세 남자가 심한 불안으로 경찰과 함께 응급실에 왔다. 2일 전에 절도와 폭행으로 경찰서에 유치되었다. 1일 전부터 구역과 설사, 기침, 눈물과 콧물이 나며, 다리가 아프다고 한다. 혈압 162/102mmHg, 맥박 92회/분, 호흡 26회/분, 체온 37.9℃이다. 동공은 확대되어 있으며, 계속 하품을 한다. 원인은?", "textbox": "", "images": [], "options": ["대마", "본드", "환각제", "아편유사제", "진정수면제"], "answer": 3, "explanation": "불안, 구역, 설사, 기침, 눈물, 콧물, 다리 통증, 동공 확대, 하품은 모두 아편유사제 금단 증상입니다. 또한 혈압, 맥박수, 호흡수, 체온 상승도 아편유사제 사용을 중단하거나 용량을 줄이면 발생할 수 있습니다. 2일전부터 경찰서에 유치되어 약물 금단증상이 나타났다고 유추할 수 있습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "아편류", "qnum": "02", "question": "마약중독으로 대여섯 번의 정신과 치료받은 25세 남자가 십이지장 천공 수술 후 병실에서 자주 하품, 재채기, 눈물을 흘리고 온몸에 땀이 나고 설사를 하며 잠을 자지 못하였다. 치료제는?", "textbox": "", "images": [], "options": ["날록손", "메타돈", "디아제팜", "서트랄린", "리스페리돈"], "answer": 1, "explanation": "아편류 금단증상\n근육경련, 뼈의 통증, 설사, 복부경련, 콧물, 눈물, 입모, 소름, 하품, 발열, 불면, 동공산대, 고혈압, 빈맥, 온도조절이상\n아편류 금단은 장기적 methadone 유지요법으로 치료합니다. Methadone 감량 시 나타나는 금단증상은 clonidine으로 치료합니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "아편류", "qnum": "03", "question": "24세 남자가 3시간 전부터 설사를 심하게 하여 병원에 왔다. 1일 전부터 불안해하고 안절부절못하며 잠을 못 잔다. 2개월 전부터 불법적 물질을 매일 사용하다가 4일 전에 중단했다. 구토를 하고 콧물을 흘리고, 하품을 하며, 털이 곤두서고 닭살이 돋아 있다. 동공확대와 근육떨림이 관찰된다. 치료는?", "textbox": "", "images": [], "options": ["리튬", "디설피람", "클로니딘", "바레니클린", "에스케타민"], "answer": 2, "explanation": "동공 산대, 눈물, 콧물, 하품 증상은 모두 아편유사체 금단 증상입니다. 아편유사체의 금단 증상으로 메타돈을 사용할 수 있지만, 메타돈은 현재 우리나라에서 쓸 수 없습니다. 따라서 클로니딘이 답입니다. 클로니딘은 alpha 2 adrenergic agonist로 도파민계의 과다 활성으로 발생하는 틱 장애에서 쓰이는 것으로 아마 기억하고 계실텐데요, 아편유사체의 금단 증상을 살펴보면, 과도하게 흥분된 상태이므로 이를 완화하는 클로니딘을 사용한다고 답을 유추하는 것도 가능합니다. 보기에는 없지만 buprenorphin도 아편유사체 금단 증상 치료에 사용됩니다. 정신과 파트에서 증상과 약물을 크게 흥분/진정으로 구분하여 접근하면 대략적인 방향을 잡을 수 있습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "아편류", "qnum": "04", "question": "25세 남자가 의식저하를 주소로 응급실에 실려 왔다. 응급실 내원 시 동공축소, 위장관운동과 호흡운동 저하를 보였다. 고등학교 졸업 후 별다른 직업 없이 친구들과 어울려 외박을 많이 했고, 특별한 과거력은 없었다. 두부손상의 증거는 없었고 양 팔에 다발성 주사자국이 관찰되었다. 가장 의심되는 약물 중독증은?", "textbox": "", "images": [], "options": ["아편류 중독", "코카인 중독", "알코올 중독", "대마초 중독", "암페타민 중독"], "answer": 0, "explanation": "아편류 중독에서 의식저하, 동공축소, 위장관운동저하, 호흡억제 모두 나타날 수 있습니다. 양팔에 다발성 주사자국도 주사용 아편계 약물(헤로인)의 남용을 의심하게 하는 소견입니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "아편류", "qnum": "05", "question": "27세 남자가 하루 전부터 구역과 설사가 심하고 등과 다리가 아프다고 응급실에 왔다. 폭행으로 구속된 지 48시간이 지난 상태였다. 동공은 확대되어 있었으며, 눈물과 콧물을 흘리고 하품을 계속하였다. 혈압 160/100mmHg, 맥박 90회/분, 호흡 25회/분, 체온 38.2℃이었다. 추정되는 원인 물질은?", "textbox": "", "images": [], "options": ["코카인", "필로폰", "헤로인", "마리화나", "펜사이클리딘"], "answer": 2, "explanation": "동공산대, 눈물, 콧물, 하품은 모두 헤로인의 금단증상으로 나타날 수 있는 증상들입니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "아편류", "qnum": "06", "question": "25세 남자가 약물 복용 혐의를 받고 경찰서에서 3일째 조사를 받다 심하게 땀을 흘리고 설사를 하여 응급실에 왔다. 기침과 눈물, 콧물을 흘렸으며 하품을 하고 동공은 확장되어 있었으며 피부에 소름이 돋아 있었다. 치료약제는?", "textbox": "", "images": [], "options": ["메사돈", "날트렉손", "로라제팜", "페노바르비탈", "할로페리돌"], "answer": 0, "explanation": "아편제제 금단 증상은 일반적으로 약물의 급성 효과와 반대적인 경향을 보이며, 오심과 설사, 기침, 눈물, 산동, 콧물, 심한 땀, 근육경축, 입모 또는 닭살 돋음, 경도의 체온 및 호흡수와 혈압의 상승 등의 증상이 있습니다. 금단증상의 치료는 메사돈(methadone) 유지 요법 후 점진적인 감량을 시도하는 것이 되겠습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "아편류", "qnum": "07", "question": "40세 남자가 혼수 상태로 응급실로 실려 왔다. 혈압은 120/80mmHg, 맥박은 60회/분, 호흡은 7회/분, 체온은 35℃이고, 동공은 2mm 이하로 축동되었다. 중독물질은?", "textbox": "", "images": [], "options": ["알코올", "아편제제", "일산화탄소", "아세트아미노펜", "칼슘통로 차단제"], "answer": 1, "explanation": "아편류 중독의 신체적 증상\n동공 축소 및 다음 중 하나 이상\n① Drowsiness or coma\n② Slurred speech\n③ Impairment in attention or memory"}, {"major": "물질 관련 및 중독성 장애", "minor": "대마계(마리화나)", "qnum": "01", "question": "24세 남자가 의욕이 떨어진다며 병원에 왔다. 5년 동안 미국에서 유학 한 후 1개월 전 귀국했다고 한다. 유학 중 친구들과 함께 어떤 물질을 흡입한 적이 있다고 한다. 흡입 후 30분 정도 있으면 나른하고 편안하고 평화로운 느낌이 들었다고 하며, 흥분해서 공격적으로 행동한 적은 없었 다고 한다. 반복적으로 사용하면서 점점 의욕이 떨어지고, 모든 일에 무 관심해지고 게을러져서 아무 것도 하지 않고 먹기만 했다고 한다. 방학 때 한국에 들어와 2주 정도 사용하지 않은 경우에도 금단 현상은 없었으 며, 다시 사용하고 싶다는 강렬한 욕구도 없었다고 한다. 사용 물질은?", "textbox": "", "images": [], "options": ["대마", "헤로인", "부탄가스", "암페타민", "펜시클리딘"], "answer": 0, "explanation": "대마사용자에서 발생한 무욕증후군의 증례입 니다. 흡입 시 이완 및 다행감이 주증상인 점, 지속 사용 후 의욕이 떨어진 점, 과한 흥분상 이나 인지장애가 없는 점, 신체적 의존과 현 저한 금단증상이 없다는 점에서 대마를 사용 했다고 추측할 수 있겠습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "대마계(마리화나)", "qnum": "02", "question": "25세 여자가 남용약물 중단 후 식욕이 떨어지고 잠들기가 쉽지 않아 내 원하였다. 약물을 사용 할 때에는 식욕이 왕성하고 종종 눈이 충혈 된 모습을 볼 수 있었다. 가장 가능성 있는 물질은?", "textbox": "", "images": [], "options": ["대마초", "필로폰", "암페타민", "코카인", "모르핀"], "answer": 0, "explanation": "Sx : 중독 증상으로 식욕이 왕성, 눈이 충혈. 금단증상으로 식욕이 떨어지고, 불면\n→ 대마초에 해당합니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "대마계(마리화나)", "qnum": "03", "question": "34세 기타 연주자가 3개월 전부터 열심히 해 오던 연습도 점차 하기 싫 어하며 게을러졌다. 동료들과 어울리지도 않고, 좋아하던 예능 프로그램 을 시청해도 감흥이 없어졌으며 체중이 증가했다. 그는 1년 전부터 습관 성 물질을 계속 사용하고 있었다. 사용한 물질은?", "textbox": "", "images": [], "options": ["대마초", "코카인", "필로폰", "헤로인", "엑스터시"], "answer": 0, "explanation": "무기력, 무감동, 체중증가 등 대마초를 장기간 사용했을 시에 볼 수 있는 무욕증후군(amoti vational syndrome)을 보이고 있습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "대마계(마리화나)", "qnum": "04", "question": "다음 중 장기간 사용에도 불구하고 신체적 의존을 나타내지 않는 약물은?", "textbox": "", "images": [], "options": ["Alcohol", "Barbiturates", "Morphine", "Marijuana", "Cocaine"], "answer": 3, "explanation": "신체적 의존이 없는 것(abuse가 주 양상)1) 대마계2) 환각제3) 휘발성용매(부탄가스, 본드)4) PCP대환휘피로 기억하시면 됩니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "대마계(마리화나)", "qnum": "05", "question": "장기간 약물 사용에 의해 무동기 증후군이 유발될 수 있는 것은?", "textbox": "", "images": [], "options": ["코카인", "마리화나", "아편제제", "암페타민", "벤조디아제핀"], "answer": 1, "explanation": "장기간 사용 시 무욕증후군(amotivational syn-drome): 주의력 감퇴, 무감동, 무기력, 체중증가를 가져올 수 있습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "휘발성 용매 및 기타 물질", "qnum": "01", "question": "26세 남자가 난폭한 행동을 보여 응급실에 왔다. 주변 상황을 인지하지 못하고 흥분한 상태로 소리를 질렀다. 7시간 정도 지나 면담을 했을 때 의식은 명료했고 정신병적 증상은 없었다. 1년 전부터 외국인들과 자주 파티를 열면서 새롭고 신비로운 쾌감을 주는 약을 사용하곤 했고, 약을 하면 자신의 몸이 커지면서 시간이 천천히 흐르고 주변의 색채가 강렬해지기도 했다고 한다. 오늘 파티에서는 평소보다 많은 용량의 약을 사용했다고 한다. 약을 한참 사용하지 않을 때에도 기분과 식욕의 변화나 신체 이상은 없다고 한다. 의심되는 물질은?", "textbox": "", "images": [], "options": ["헤로인", "로라제팜", "프로포폴", "펜시클리딘", "메틸페니데이트"], "answer": 3, "explanation": "약을 사용하는 동안 자신의 몸이 커지면서 시간이 천천히 흐른다고 느끼는 등 신체상의 변화, 시간 개념의 변화를 경험하였으며 평소보다 많은 양의 약을 사용하여 정신병적 상태를 보였습니다. 약을 오래 사용하지 않아도 금단 증상을 호소하지 않았는데, 이러한 특징을 가지는 약물은 펜시클리딘입니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "휘발성 용매 및 기타 물질", "qnum": "02", "question": "16세 남자가 정신 혼미와 전신 쇠약으로 내원하였다. 3년 전부터 또래 친구들과 알 수 없는 물질을 남용하였다고 하였다. 신경심리검사에서 작업수행능력과 기억력이 감소하였으며, 혈액검사에서 빈혈소견을 보였다. 다음 중 남용이 의심되는 물질은?", "textbox": "", "images": [], "options": ["본드", "대마초", "코카인", "헤로인", "엑스터시"], "answer": 0, "explanation": "본드 가스의 남용은 뇌에 직접적인 손상을 주어 기억력 감퇴 등을 초래하고, 골수조직에 영향을 주어 재생불량성 빈혈 등이 나타날 수 있으며, 이 외에도 신장 및 간 등에 광범위한 장기손상을 유발하는 점이 특징입니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "휘발성 용매 및 기타 물질", "qnum": "03", "question": "다음 중 장기간 사용하여 대뇌위축, 골수기능 저하, 콩팥 및 간 기능 장애 등 광범위한 기관 손상을 야기하는 물질은?", "textbox": "", "images": [], "options": ["카페인", "본드", "아편", "마리화나", "암페타민"], "answer": 1, "explanation": "본드는 장기 사용에 의해 대뇌위축, 골수기능 저하, 백혈병, 횡문근변성, 콩팥 및 간 기능 장애 등의 광범위한 기관 손상이 일어날 수 있습니다."}, {"major": "물질 관련 및 중독성 장애", "minor": "휘발성 용매 및 기타 물질", "qnum": "04", "question": "17세 남자가 갑자기 부모를 못 알아보고 누구인가 자신을 죽일 것 같은 느낌과 환청으로 응급실을 방문하였다. 부모님의 말에 따르면 고등학교 친구들과 어울리며 가출이 잦았고 최근에 환자의 방에서 다수의 본드와 검은 봉지가 발견되었다. 응급실 내원 당시 환자에게서 볼 수 있는 임상 양상 중 옳은 것이 모두 조합된 것은?", "textbox": "가. 설사\n나. 동공확대\n다. 결막충혈\n라. 반사기능 저하", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 3, "explanation": "가. 설사와 동공확대는 opioid 금단증상입니다. 다. 결막충혈은 대마 중독 시 특징적인 소견입니다. 라. 다행 타나는 경우가 많습니다. 섬망의 원인 질환을 규명하는 것이 매우 중요하며, 원인이 되는 질환이나 의학적 상태를 먼저 교정하여야 합니다."}, {"major": "신경인지장애", "minor": "섬망", "qnum": "09", "question": "77세 여자가 폐렴 때문에 입원한 지 4일째 밤에 갑자기 귀신이 병실 구석에 서있다며 엉뚱한 이야기를 하고 잠을 자지 않았다. 정신상태검사에서 자기가 병실이 아니라 안방에 있다고 했으며, 담당 의사를 딸로 착각했다. 묻는 말에 횡설수설하면서 대답을 못 하기도 했다. 입원 전 두부외상이나 정신장애의 병력은 없다. 혈압 110/65mmHg, 맥박 68회/분, 호흡 20회/분, 체온 37.1℃이다. 치료는?", "textbox": "", "images": [], "options": ["플루옥세틴(fluoxetine)", "도네페질(donepezil)", "리스페리돈(risperidone)", "프로프라놀롤(propranolol)", "클로르프로마진(chlorpromazine)"], "answer": 2, "explanation": "고령의 환자가 입원한 뒤 급격한 인지장애를 보이고 있어 섬망이 의심됩니다. 섬망에는 1차적으로 haloperidol이 사용되나, 그 외에도 risperidone과 같은 비정형 항정신병약물도 사용이 가능합니다. Chlorpromazine 또한 항정신병약물이라는 점에서 헷갈릴 수 있는 보기인데, chlorpromazine은 phenothiazine 계열 약물로서 항콜린성 부작용으로 섬망을 악화시킬 수 있어 haloperidol이나 비정형 항정신병약물로 대체할 것이 권고되고 있습니다."}, {"major": "신경인지장애", "minor": "섬망", "qnum": "10", "question": "64세 남자가 3일 전부터 밤에 잠을 자지 않고 횡설수설했다. 5일 전에 넓다리뼈 골절로 수술을 받았다. 정신상태검사에서 대화에 집중하지 못했고, 지금이 낮인지 밤인지, 자신이 어디에 있는지, 금방 누가 왔다 갔는지 알지 못했다. 혈액검사 및 신경학적 검사에서 이상소견은 없었다. 치료는?", "textbox": "", "images": [], "options": ["메만틴", "갈란타민", "부스피론", "할로페리돌", "프로프라놀롤"], "answer": 3, "explanation": "5일 전 수술을 받은 후에 인지장애가 급격히 나타난 것으로 보아 섬망을 의심할 수 있습니다. 대부분의 섬망에서 haloperidol이 쓰이며 효과가 좋습니다."}, {"major": "신경인지장애", "minor": "섬망", "qnum": "11", "question": "58세 여자가 넓다리뼈 골절로 전신마취 후에 수술을 받았다. 수술을 마치고 다음 날부터 안절부절 못하며 밤에 잠을 자지 않고 횡설수설하였다. 시간과 장소에 대한 지남력장애를 보였으며, 환시를 호소했다. 다음 중 적합한 약제는?", "textbox": "", "images": [], "options": ["디아제팜(diazepam)", "클로르디아제폭사이드(chlordiazepoxide)", "리스페리돈(risperidone)", "도네페질(donepezil)", "아미트립틸린(amitriptyline)"], "answer": 2, "explanation": "섬망은 주의력감퇴를 동반한 의식장애, 인지와 지각장애, 급격한 발병과 증상의 기복을 핵심증상으로 하는 증후군입니다. 정신운동장애, 수면-각성주기장애, 기분장애도 자주 보입니다. 대부분의 섬망에서 haloperidol이 쓰이며 효과가 좋으며, 최근에는 risperidone 같은 비정형 항정신병약물이 점차 쓰이고 있습니다."}, {"major": "신경인지장애", "minor": "섬망", "qnum": "12", "question": "무릎관절치환술을 받은 75세 여자 환자가 수술 후 3일째에 밤이면 귀신이 나타난다고 안정부절못하는 모습을 보였다. 의료진과 가족들을 알아보지 못하였고, 귀신을 피해 침대 밑으로 숨으려고 하였다. 이 환자에 대한 조치로 적합하지 않은 것은?", "textbox": "", "images": [], "options": ["밤에도 실내등을 켜 놓는다.", "친숙한 물건을 주변에 배치시킨다.", "소량의 할로페리돌(haloperidol)을 투여한다.", "가족과 친지의 면회를 가급적 제한한다.", "전해질 농도를 측정하고 적절한 수액을 공급한다."], "answer": 3, "explanation": "1) 밤에 약한 실내등을 켜두는 것이 좋습니다. 2) 환자의 평소 생활과 익숙한 환경을 만들어 주는 것이 좋습니다. 3) 약물치료 : haloperidol을 일차적으로 사용합니다(2~10mg 근육). 4) 가족과의 유대를 지속시키는 환경의 조성이 중요합니다. 친근한 사람이 옆에서 지속적으로 간호하면 지남력의 교정이 쉽습니다. 5) 전해질, 수분 불균형에 대한 교정이 필요합니다."}, {"major": "신경인지장애", "minor": "섬망", "qnum": "13", "question": "75세 남자가 뇌경색 치료 1주일 후부터 의식이 왔다 갔다 하고 낮에 불 안해하고 밤에는 자지 못하고 불안 증상이 더 심해지는 증상을 보였다. 이 환자를 진정시키기 위한 약물은?", "textbox": "", "images": [], "options": ["Li", "lorazepam", "amitriptyline", "bupropion", "propranolol"], "answer": 1, "explanation": "뇌경색 치료 후 노인에게 생긴 섬망에 대한 문제입니다. 기저질환과 의식의 fluctuation 이 특징적인 감별점입니다. 섬망에서 진정을 위한 약물로는 Benzodiazepine 계통 약물을 사용할 수 있습니다. 하지만 일차적으로는 항정신병약물을 사용한다고 알아두세요. 1) Li는 항조증제 3) TCA 계통 4) bupropion은 NDRI 5) propranolol은 BB입니다."}, {"major": "신경인지장애", "minor": "섬망", "qnum": "14", "question": "65세 남자 환자가 요로감염으로 입원치료를 받고 있었다. 입원 후 5일째 화장실에 이상한 검은 동물이 보인다고 하고, 자신의 다리에 벌레가 기어 다닌다며 옷을 벗는 행동을 보였다. 주로 초저녁에 증상이 나타나서 밤에 심해졌다. 이 환자에 대한 치료원칙으로 옳은 것은?", "textbox": "", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 1, "explanation": "가. 유발요인의 파악이 선행되어야 하며 섬망의 원인이 되는 질환이나 의학적 상태를 먼저 교정해야 합니다. 나. 항정신병 약물을 사용할 수 있으나 항콜린성 부작용이 적은 고역가 약물로 비경구 투여가 가능한 haloperidol을 일차적으로 사용합니다. 다. 섬망 환자는 약물 부작용에 매우 예민하므로 모든 불필요한 약물은 중단해야 하며, 수면제 사용 시에는 작용시간이 짧은 oxazepam 또는 lorazepam을 사용합니다. 라. 감각박탈에서 벗어나게 하기 위해서는 야간에도 적당한 조명이 있는 것이 좋습니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "01", "question": "69세 남자가 \"아내가 바람을 피운다.\"라는 근거 없는 의심으로 자주 아내를 폭행하였다. 2년 전부터 자신이 방금 한 말을 잊어버려 다시 묻는 경우가 많았으며 집을 못 찾아오는 일도 발생하였다. 뇌 자기공명영상에서 양쪽 측두엽과 전두엽의 위축 소견을 보였다. 환자의 폭력행위를 감소시키기 위해 적절한 약물은?", "textbox": "", "images": [], "options": ["donepezil", "diazepam", "haloperidol", "chlorpromazine", "fluoxetine"], "answer": 2, "explanation": "치매 환자에서 폭력행동을 줄이기 위한 약물을 묻는 문제입니다. 초조성이나 정신병 상태, 행동장애를 교정하기 위한 약물로는 소량의 항정신병약물, 그 중 대표적으로 haloperidol을 사용합니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "02", "question": "15년 전부터 당뇨병과 고혈압으로 치료를 받고 있는 65세 남자가 3일 전에 갑자기 시작된 의식 혼탁과 기억력 장애를 주소로 내원하였다. 3개월 전에도 이러한 증상이 갑자기 나타났다가 별 치료 없이 1주 만에 회복된 적이 있었다. 가장 먼저 의심해야 할 질환은?", "textbox": "", "images": [], "options": ["알츠하이머 치매", "코르사코프 정신병", "비정형 정신병", "주요우울장애", "다발 경색 치매"], "answer": 4, "explanation": "단기간에 발병, 의식의 장애, 당뇨병과 고혈압의 병력은 혈관성 치매를 의심케 하는 소견입니다. 혈관성 치매의 위험인자로는 남성, 고령, 고혈압증, 흡연, 심장질환, 당뇨병, 알코올 의존, 흡연 등이 있습니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "03", "question": "68세 여자가 3개월 전부터 기억력이 떨어진다며 병원에 왔다. 그동안 한 번도 기억력을 걱정하지 않았는데 자주 잊고 실수가 많아지면서 전반적인 기분이 들고 아무것도 하기 싫고 하루 종일 누워만 있었다. '치매에 걸린 것은 아닌가' 하는 걱정에 매우 불안해하며 가족들 앞에서 자주 울었다. 2개월 전에는 기분이 좋아지면서 기억력이 좀 나아져 안심이 되었다. 그러나 1개월 전부터 기분이 저하되면서 기억력이 떨어져 걱정을 몸시 하고 잠도 오지 않았다. 길을 잃을까 봐 밖에 나가지도 못하고 집에서만 안절부절못하면서 지냈다. 재미있는 것도 없고 자식들에게 큰 짐을 지울 것 같아 괴로워했다. 진단은?", "textbox": "", "images": [], "options": ["해리장애", "양극성장애", "주요우울장애", "경도신경인지장애", "주요신경인지장애"], "answer": 2, "explanation": "68세 여성이 기억력 저하를 주소로 내원하였습니다. 3개월 전부터 현재까지 기억력에 관한 걱정으로 인해 불면, 불안, 무기력(하루 종일 누워만 있음), 수면장애, 사고/주의집중력 감퇴, 자책(자식들에게 짐을 지울 것 같음)의 증상 보이고, 증상이 사회적 기능에 심각한 고통 및 손상을 야기하고 있기 때문에 주요우울장애의 진단 기준을 만족합니다. 또한 2개월 전 기분이 좋아지면서 기억력이 호전되었던 소견을 볼 때, 신경인지장애보다는 노인성 우울증으로 인한 가성치매가 더 의심됩니다. 따라서 가장 적절한 진단은 주요우울장애입니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "04", "question": "64세 남자가 성격이 과격하게 변했다며 병원에 왔다. 2년 전부터 환자리에 가만히 있지 못하고 안절부절못하며, 조그만 일에도 쉽게 짜증을 냈다. 2주 전에는 남의 시선에 아랑곳하지 않고 공공장소에서 함부로 옷을 벗거나 소변을 보기도 했다. 원래는 예의 바르고 내성적인 편이었다고 한다. 혈압 147/95mmHg, 맥박 100회/분, 호흡 21회/분, 체온 36.8℃이다. 면담에 집중하지 못하고 자신의 주장만 고집한다. 간이정신상태검사 점수는 24/30점이다. 뇌 자기공명영상 사진이다. 진단은?", "textbox": "", "images": ["data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJwAAAC2CAIAAACj7XNKAAAAAXNSR0IArs4c6QAAAERlWElmTU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAAAnKADAAQAAAABAAAAtgAAAADkprh9AABAAElEQVR4Aezd15Nnx3Un+PLed1W19wbekAANSBiSIgmKlKEMl9JoKM2MRquhdmIe9i/Qy8buw8bu0+5oRxNylDiSKCmkEU 절못하고 쉽게 짜증내는 행위, 그리고 공공장소에서의 탈억제적 행동은 전두측두엽 치매의 전형적인 증상입니다. 특히 전두측두엽 치매의 가장 흔한 임상 증후군인 행동변형 전두측두엽 치매의 경우 행동 탈억제 및 충동성, 고집증(perseveration)이 특징적으로 나타나고, 초기에는 집행기능의 저하에 비해 상대적으로 기억력과 시공간 능력은 보존되는 특징을 보이는데 이는 환자의 상태와 부합합니다(충동적 행동, 자신의 주장만 고집, MMSE 24점). 또한 뇌 MRI 상에서도 뚜렷한 전측두엽의 위축이 관찰됩니다. 따라서 본 환자에게 가장 적절한 진단은 전두측두엽 치매(행동변형)입니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "05", "question": "77세 남자가 1년 전부터 기억력이 저하되어 병원에 왔다. 주로 낮시간에 멍하게 있으며 방금 했던 일도 기억을 못 하고 상황에 맞지 않는 말을 하였으나, 가끔 정상적인 모습을 보이기도 했다. 자다가 소리를 지르거나 팔다리를 휘두르는 일이 잦아졌다. 방에 혼자 있다가 천장에 초록색 옷을 입은 사람이 있다고 말하기도 한다. 10년 전부터 고혈압으로 진단 받고 치료 중이다. 신경계진찰에서 느린 행동을 보였다. 진단은?", "textbox": "", "images": [], "options": ["혈관치매", "레비소체치매", "알츠하이머병", "정상압수두증", "전두측두엽치매"], "answer": 1, "explanation": "77세 남성이 1년 전부터 지속된 기억력 저하로 내원하였습니다. 낮시간에 멍하게 있고 방금 했던 일도 기억을 못하고 상황에 맞지 않는 말을 하는 등의 인지기능/주의력 및 각성의 변동, 초록색 옷을 입은 사람을 보는 생생한 시각 환시, 신경계 진찰에서 관찰되는 느린 행동(parkinsonism)은 모두 루이소체 치매의 3가지 핵심 양상에 해당합니다. 또한 자다가 소리를 지르거나 팔다리를 휘두르는 것은 렘수면장애를 의심할 수 있는데 이 또한 레비소체 치매의 시사 양상으로서, 본 환자의 가장 적절한 진단은 레비소체 치매입니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "06", "question": "73세 남자가 아들이 돈을 훔쳐간다며 화를 내고 집에 불을 지르려 해서 병원에 왔다. 6년 전부터는 며칠 전의 일을 기억 하지 못하고, 물건 이름을 자주 잊어버렸다. 2년 전부터는 1시간 전에 밥을 먹고도 굶었다며 다시 달라고 요구했다고 한다. 혈액검사 결과는 정상이다. 뇌 자기공명영상에서 대뇌 피질의 위축 외에는 이상이 없다. 간이정신상태검사 결과는 다음과 같다. 치료는?", "textbox": "시간지남력 5/5, 장소지남력 5/5, 기억등록 3/3, 기억회상 0/3, 주의집중 및 계산 1/5, 언어능력 3/8, 시각구성 0/1, >총점 17/30", "images": [], "options": ["리튬", "클로니딘", "다이아제팜", "리스페리돈", "플루옥세틴"], "answer": 3, "explanation": "6년 전부터 며칠 전의 일을 기억 하지 못하고, 물건 이름을 자주 잊어버리는 등의 기억 장애의 증상을 보이고 있습니다. 또한 MMSE 점수가 20점 미만으로 분명한 인지기능 장애를 보이고 있습니다. 뇌 자기공명영상에서, 대뇌 피질의 위축이 보이므로 알츠하이머병을 의심할 수 있습니다. 이 때 나타난 행동장애(아들이 돈을 훔쳐간다며 화를 내고 집에 불을 지르려 함)에는 클로자핀, 리스페리돈, 퀘티아핀, 아리피프라졸 등의 비정형 항정신병 약물을 사용하는 것이 좋습니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "07", "question": "알츠하이머 치매와 인지기능 감퇴의 임상 양상이 유사하면서, 질병 초기에 파킨슨병의 운동증상과 정신병적 증상이 나타나는 질환은?", "textbox": "", "images": [], "options": ["픽병(Pick's disease)", "헌팅턴병(Huntington's disease)", "루이소체 치매(Lewy body dementia)", "이마관자엽 치매(Frontotemporal dementia)", "크로이츠펠트-야콥병(Creutzfeldt-Jakob disease)"], "answer": 2, "explanation": "점진적으로 진행하는 퇴행성 질환으로서 알츠하이머형 치매와 그 인지기능 감퇴의 임상 양상이 유사합니다. 질병 초기에 환시와 같은 정신병적 증상과 더불어 파킨슨병의 운동증상이 특징적으로 나타납니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "08", "question": "65세 여자가 1년 전부터 잠을 잘 자고 기억력이 떨어진다며 병원에 왔다. 1년 전부터 낮 동안에 멍하니 한 곳을 응시하기도 하고 의식이 명료한 상태에서 방 구석에서 '호랑이가 지나간다', '흰 강아지가 보인다'라고 하였다고 한다. 최근 3개월 전부터는 보행 시 허리가 앞으로 굽고 보폭이 좁아졌으며 자주 넘어지고 떨림이 발생하였다고 한다. 간이정신상태검사에서 20점이고 수면다원검사에서 무긴장증(atonia)이 없는 렘수면이 있다. 치료는?", "textbox": "", "images": [], "options": ["도네페질", "발프로산", "페르페나진", "할로페리돌", "메틸페니데이트"], "answer": 0, "explanation": "기억력 저하를 호소하는 환자에서 환시 및 파킨슨병 증상이 동반되므로 루이체 치매를 의심할 수 있습니다. 무긴장증이 없는 렘수면 행동장애는 루이체 치매에서 나타날 수 있는 증상입니다. 루이체 치매에서 인지기능 저하에 대해서는 알츠하이머병과 동일하게 cholinesterase 억제제를 사용할 수 있어, 가장 적절한 치료는 1) 도네페질입니다. 환시에 대해서는 비정형 항정신병 약물을 사용해 볼 수 있으나, 3) 페르페나진이나 4) 할로페리돌은 정형 항정신병 약물로 심한 부작용을 나타내므로 사용에 부적합합니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "09", "question": "혈관성 치매보다 알츠하이머 치매를 더 시사하는 임상 양상은?", "textbox": "", "images": [], "options": ["서서히 발병", "정서의 불안정", "계단식 진행", "국소 신경 증상", "일과성 의식혼탁"], "answer": 0, "explanation": "1) 급격한 발병이 Hachinski 척도에도 포함되는 혈관성 치매의 특징\n2) 감정 실금(emotional incontinence): pseudobulbar palsy : 혈관성 시사\n3) 계단식 진행: 다발경색에 의한 혈관성 치매의 특징\n4) 국소 신경증상이 있으면 혈관성 치매에 가까움을 시사합니다.\n5) 일과성 의식혼탁은 섬망의 특징입니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "10", "question": "73세 여자가 1년 전부터 물건을 잘 찾지 못하면서 누군가 자신의 물건을 훔쳐 간다고 의심하여 병원에 왔다. 3개월 전 부터는 조금 전에 만난 사람이 누구인지 잘 기억하지 못하고, 방금 밥을 먹고도 식구들이 자신에게 밥을 주지 않는다며 화를 냈다고 한다. 의사가 연필을 가리키며 무엇이냐고 묻자 한참을 머뭇거리더니 \"종이에 쓰는 그거\"라고 하였다. 간이정신상태검사는 15점이다. 의식은 명료하고 신경학적 검사에서 이상은 없다. 치료는?", "textbox": "", "images": [], "options": ["도네페질", "암페타민", "클로니딘", "이미프라민", "아캄프로세이트"], "answer": 0, "explanation": "1년 전부터 시작된 도둑망상, 최근 기억장애, 면담 시 이름대기 곤란으로 에둘러 말하기(Circumlocution), 낮은 MMSE 점수로 보아 알츠하이머병이 가장 의심됩니다. 알츠하이머병의 망상으로는 도둑망상, 유기망상이 흔하다고 합니다. 현재 알츠하이머병 치료제로는 Cholinesterase 억제제(도네페질, 리바스티그민, 갈란타민)와 메만틴이 사용됩니다.\n2) 암페타민: 각성제로 중독이 문제가 되며, ADHD, 기면증에 사용되기도 합니다.\n3) 클로니딘: alpha 2 adrenergic agonist, 주로 정착불능, 금단증상에 사용합니다.\n4) 이미프라민: TCA\n5) 아캄프로세이트: 알코올사용장애 환자에 서 대체요법으로 사용합니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "11", "question": "73세 여자가 기억력이 저하되었다며 병원에 왔다. 3년 전부터 물건을 자주 잃어버리고 약속을 잊는 경우가 있었다. 최근에는 증상이 더욱 심해져서 방금 했던 말도 기억하지 못해서 같은 질문을 반복하였다. 흥분을 잘하고 주변에 공격적인 모습을 보인다. 자주 다니던 딸 집도 제대로 찾아가지 못하고 찾으려 하지 않는다. 학력은 고등학교 졸업이고 간이정신상태검사(MMSE)는 15점이다. 치료는?", "textbox": "", "images": [], "options": ["아미트립틸린", "프라미펙솔", "레보도파", "도네페질", "졸피뎀"], "answer": 3, "explanation": "3년 전부터 기억장애를 보이고, MMSE 점수가 낮은 것으로 보아 치매를 의심할 수 있습니다. 일차적으로 도네페질과 같은 cholinesterase inhibitor를 사용할 수 있습니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "12", "question": "72세 여자가 기억력 저하로 병원에 왔다. 4년 전부터 기억력 저하가 시작되어 서서히 심해진다고 한다. 최근에는 집을 찾아오지 못하고 간단한 돈 계산도 틀린 적이 있다고 한다. 보행은 정상이고, 배뇨장애는 없다. 학력은 고등학교 졸업이며 간이정신상태검사는 17점이다. 뇌 자기공명영상에서는 대뇌 피질의 전반적인 위축이 보인다. 진단은?", "textbox": "", "images": [], "options": ["혈관치매", "경도인지장애", "알츠하이머병", "정상뇌압수두증", "크로이츠펠트-야코프병"], "answer": 2, "explanation": "4년 전부터 서서히 진행된 기억력 저하, 낮은 MMSE 점수, 뇌 MRI 상 광범위한 뇌 위축 소견을 보여 알츠하이머병을 가장 의심할 수 있습니다.1) 혈관치매 : 갑자기 발생하며, 뇌 MRI에서 뇌출혈이나 뇌경색 소견이 나타납니다.2) 경도인지장애 : 일상생활능력은 보존되어야 합니다. 환자는 집을 찾지 못하고, 간단한 돈 계산도 틀려 활동에 도움이 필요합니다.4) 정상뇌압수두증 : 치매, 보행장애, 요실금이 주 증상입니다.5) 크로이츠펠트-야코프병 : 급속히 진행하여 1년 전후로 사망합니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "13", "question": "72세 남자가 \"아들이 돈을 훔쳐간다.\"며 화를 내고 집에 불을 지르려 해서 응급실에 왔다. 5년 전부터 최근에 있었던 일을 기억하지 못하고 물건 이름을 자주 잊었다고 하였다. 1년 전부터는 한 시간 전에 밥을 먹고도 굶었다며 다시 달라고 요구하였다고 한다. 간이정신상태검사는 18점이었다. 뇌자기공명영상에서 대뇌피질위축 이외의 이상 소견은 없었다. 치료는?", "textbox": "", "images": [], "options": ["졸피뎀", "디아제팜", "케티아핀", "벤즈트로핀", "이미프라민"], "answer": 2, "explanation": "5년 전부터 최근에 있었던 일을 기억하지 못하는 등의 기억 장애가 있었고 MMSE 점수가 낮으며 대뇌피질위축 등의 소견으로 보아 치매를 의심할 수 있습니다. 이 때 나타난 행동장애에는 클로자핀, 리스페리돈, 퀘티아핀, 아리피프라졸 등의 비정형 항정신병 약물을 사용하는 것이 좋습니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "14", "question": "75세 여자가 2년 전부터 시작된 기억력 저하로 병원에 왔다. 간이정신상태검사 점수는 20점이다. 오래전 일은 잘 기억하고 있으나 최근 일들을 잘 기억하지 못하고 계산 능력은 확연히 떨어졌다고 한다. 언어능력, 수행능력, 공간지각력은 비교적 양호하다. 도네페질을 처방하였으나, 본인과 가족들은 일상 생활에 조금 더 잘 적응할 수 있는 추가적인 방법을 궁금해 한다. 치료는?", "textbox": "", "images": [], "options": ["노출치료", "인지재활", "환경치료", "생체되먹임", "대인관계정신치료"], "answer": 1, "explanation": "서서히 시작된 기억력 저하, 최근기억의 상실 등 전반적인 증상을 보였을 때 알츠하이머병 치매를 의심할 수 있습니다. 현재 환자의 비약물적인 치료를 묻고 있습니다. 치매의 정신사회적 치료는 환자가 직면하고 있는 스트레스를 감소시키고, 기능의 결손이 있더라도 남아있는 건강한 부분을 사용하여 상황에 적응할 수 있도록 도와주는 재활치료가 중요합니다. 아직 환자에게 우울증, 불안, 공포 등의 증상이 나타나지 않고 있으므로 노출치료, 생체되먹임, 대인관계정신치료는 답에서 배제할 수 있겠습니다. 환자의 언어능력, 수행능력, 공간지각력은 아직 양호하고 문제에서 일상생활에 적응을 잘 하기 위해 치료를 받는 것을 원하기 때문에 환경치료 보다는 인지재활이 더 적합한 답이 되겠습니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "15", "question": "63세 여자 가정주부가 2년 전부터 평소와 다르게 가사일에 관심이 없어지고, 짜증을 많이 내고 난폭해졌다. 1년 전부터 기억력이 떨어지고, 말수가 줄었고, 먹지도 못하는 것을 입에 넣기도 했다. 1개월 전부터 엉뚱한 소리를 하고, 문고리를 잡아뜯거나 손바닥을 문지르는 동작을 반복했다. 진단은?", "textbox": "", "images": [], "options": ["가성치매(pseudodementia)", "알츠하이머치매(Alzheimer's dementia)", "레비소체치매(dementia with Lewy body)", "이마관자엽치매(frontotemporal dementia)", "겉질밑혈관치매(subcortical vascular dementia)"], "answer": 3, "explanation": "전측두엽 치매는 인지기능의 저하보다는 성격 변화와 행동변화의 양상이 뚜렷하고 먼저 나타나는 경향이 있어 치매보다는 다른 정신과 질환으로 오인되기 쉽습니다. 사회적인 인지 능력의 상실, 탈억제에 의한 과격한 행동, 정신의 경직성(rigidity), 과식, 보속증, 자동증, 자동사용 행동(utilization behavior), 주의산만 등의 증상을 보입니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "16", "question": "가성치매보다 알츠하이머 치매를 시사하는 소견은?", "textbox": "", "images": [], "options": ["주의집중력이 유지된다.", "갑작스런 발병을 보인다.", "MMSE 점수변동이 크다.", "증상을 숨기려고 노력한다.", "동반된 우울증의 과거력이 있다."], "answer": 3, "explanation": "1), 2), 3), 5) → 가성치매의 특징입니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "17", "question": "65세 남자가 1년 전부터 기억력이 떨어져서 병원에 왔다. 8년 전부터 고혈압과 당뇨병을 앓고 있었다. 5년 전에는 오른쪽, 2년 전에는 왼쪽 팔다리에 힘이 빠져 열흘 정도 걷기가 힘들었다고 하였다. 1년 전부터 약속을 자주 잊고, 씻지도 않고, 운동을 하자고 하면 심하게 화를 내거나 운다고 하였다. 신체진찰에서 팔다리의 근력감소가 있었고, 발을 끌면서 걸었다. 뇌 자기공명영상 사진이다. 진단은?", "textbox": "", "images": ["data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAWEAAADDC  이상 소견은 보이지 않았다. 항정신병약물을 소량 복용한 후 몸이 심하게 뻣뻣해지는 부작용이 발생하였다. 진단은?", "textbox": "", "images": [], "options": ["가성치매(pseudodementia)", "알츠하이머치매(Alzheimer's dementia)", "레비소체치매(dementia with lewy body)", "혈관치매(vascular dementia)", "헌팅턴 병에 의한 치매(dementia due to Huntington's disease)"], "answer": 2, "explanation": "질병 초기에 발생하는 선명한 환시가 전형적인 레비소체치매 증례입니다. 또한 레비소체치매에서 질병의 초기에 경직에만 국한된 파킨슨병의 운동증상이 특징적으로 나타납니다. 또한 임상경과에 따라서 변동하는 양상을 보이는 것 역시 레비소체치매를 시사하는 바입니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "20", "question": "고령의 환자에서 치매가 의심될 때, 선별검사로 가장 유용한 것은?", "textbox": "", "images": [], "options": ["MMSE", "EEG", "MMPI", "SPECT", "WAIS"], "answer": 0, "explanation": "정신상태검사를 통해 전반적인 정신 병리의 존재유무를 확인하는 것은 진단 및 감별 진단에 도움이 됩니다. 치매에 보다 특이적인 임상적 검사로 한국판 간이정신상태검사 MMSE-K가 있으며 치매의 선별검사로도 활용될 수 있습니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "21", "question": "74세 여자가 약속을 자주 잊고 물건 이름이 바로 떠오르지 않는다면 병원에 왔다. 증상은 2년 전부터 시작되었고 점점 심해졌다. 최근에는 집을 못 찾고 헤매는 경우가 빈번했다. 유년기나 청년기의 과거기억은 비교적 잘 보존되었으나, 수일 전이나 수 시간 전 기억은 보존되지 않았다. 난폭한 행동은 없으며, 환청이나 환시도 없다. 신경학적 진찰에서 이상 소견은 없다. 검사 결과는 다음과 같다. 치료는?", "textbox": "• 간이정신상태검사 : 17점\n• 신경심리검사 : 인지기능 저하\n• 뇌 자기공명영상 : 대뇌피질 및 해마 위축", "images": [], "options": ["메만틴", "라모트리진", "에스트로젠", "아리피프라졸", "콜린알포세레이트"], "answer": 0, "explanation": "2년 전부터 점점 심해진 기억력 저하로 내원한 환자입니다. 최근의 일을 기억하는 데 더 어려움을 보이며, 뇌 자기공명영상에서도 대뇌피질 및 해마 위축이 관찰되고 낮은 MMSE 점수를 보이므로 알츠하이머병으로 진단할 수 있겠습니다. 알츠하이머병의 치료로는 cholinesterase 억제제(donepezil, rivastigmine, galantamine) 및 NMDA receptor antagonist(memantine)를 사용할 수 있습니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "22", "question": "66세 남자가 1~2년 전부터 기억력이 떨어진다고 병원에 왔다. 일상생활이나 사회생활을 하는 데 문제는 없다고 한다. 신경심리검사에서 기억력이 저하되어 있으나, 수행기능, 언어 기능 및 시공간기능은 정상이다. 뇌 자기공명영상은 정상이다. 검사 결과는 다음과 같다. 진단은?", "textbox": "간이정신상태검사 28점", "images": [], "options": ["레비소체치매", "혈관인지장애", "경도인지장애", "알츠하이머병", "전두측두엽치매"], "answer": 2, "explanation": "주관적 기억장애를 호소하며 내원한 환자입니다. 신경심리검사에서 기억력 저하 소견을 보이고 있으나 일상생활능력은 보존되어 있으니 간이정신상태검사 결과도 28점이므로 경도인지장애를 진단할 수 있습니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "23", "question": "과거력이 없는 74세 여자 환자가 5년 전부터 물건을 자주 잃어버리고, 가스레인지에 그릇을 태우고, 증상이 서서히 악화되어 방안에서 불을 끄고 지내고 있으며 지나치게 흥분하고 있다. 이 환자의 질환에 대해 옳은 것은?", "textbox": "", "images": [], "options": ["초기에는 병의 경과가 단계적으로 악화되는 경향을 보인다.", "치료제로는 항콜린성 약물이 유용하다.", "두통, 현훈 및 국소 신경학적 증상을 흔하게 동반한다.", "임상소견과 함께 뇌의 조직소견으로 확진한다.", "65세 이전 발병한 경우 병의 경과가 더 느리다."], "answer": 3, "explanation": "인지기능 장애가 노년기에 발생하여 서서히 진행하는 양상으로 보아 알츠하이머 치매가 가장 의심됩니다.1), 3) 알츠하이머 치매보다 급격하게 시작되어 단계적 진행을 하는 것은 혈관성 치매입니다.2) 항콜린제는 인지기능장애를 일으키며, 아세틸콜린을 증가시키는 cholinesterase 억제제로 치료합니다.4) 혈관성 치매 및 전두엽 양상을 보이면서 치매를 유발할 수 있는 다른 원인을 동반하지 않는 경우 진단할 수 있으나 최종적 진단을 위해서는 조직병리 소견이 필요합니다.5) 65세 이전에 발병하는 경우 조발성으로 분류되며 경과가 더 빠른 것으로 알려져 있습니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "24", "question": "72세 여자가 2개월 전부터 갑자기 시작된 기억력 저하로 병원에 왔다. 5년 전부터 고혈압과 당뇨병을 치료 중이다. 기억력 저하는 점차 심해져 일상생활이 어렵다고 한다. 감정기복이 심하며 대화 시 속도가 느리고 더듬거린다. 오른팔 사용이 불편했으며 오른쪽 다리를 끌면서 걷는다. 신경학적 진찰에서 오른쪽 심부건반사의 항진 및 바뱅스키징후가 보인다. 진단은?", "textbox": "", "images": [], "options": ["파킨슨병", "혈관치매", "레비소체치매", "알츠하이머병", "정상압수두증"], "answer": 1, "explanation": "2개월 전부터 갑자기 시작된 기억력 저하로 일상생활이 어려운 병원에 온 환자입니다. 기억력 저하가 갑작스럽게 나타난 점, 국소 신경학적 증세를 보이는 점, 고혈압 및 당뇨병 치료 병력이 있는 점을 종합 했을 때 혈관성 치매로 진단할 수 있습니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "25", "question": "72세 여자가 기억저하와 의욕저하로 병원에 왔다. 3년 전부터 기억력이 서서히 떨어졌고, 1년 전부터는 움직임이 느려지고 잘 걷지 못했다고 하였다. 손떨림이 관찰되었고 몸은 경직되어 있었다. 표정은 굳어 보였으나 환시는 없었다. 진단은?", "textbox": "", "images": [], "options": ["크로이츠펠트-야콥병에 의한 치매", "혈관치매", "파킨슨병에 의한 치매", "헌팅톤병에 의한 치매", "레비소체치매"], "answer": 2, "explanation": "72세 여자가 3년 전부터 시작된 기억저하로 내원하였으며 bradykinesia, tremor, rigidity 등 이 관찰되는 것으로 보아 파킨슨병으로 인한 치매가 의심됩니다.1) 크로이츠펠트-야콥병은 급속히 진행하여 1년을 전후로 사망하게 되므로 3년 전부터 기억력이 떨어졌다는 지문의 특성과 맞지 않습니다.2) 혈관치매는 급격한 발병, 단계적 악화의 특징을 가집니다.4) 헌팅톤병은 무도증을 특징적으로 나타내며, 20~30대에 증상이 나타납니다.5) 레비소체치매는 파킨슨병의 운동증상을 나타내지만 질병초기에 환시와 같은 정신병적 증상을 나타내는 특징이 있습니다."}, {"major": "신경인지장애", "minor": "치매", "qnum": "26", "question": "3년 전부터 물건이름, 전화번호 등 기억력장애가 발생하여 65세 할머니가 내원하였다. 최근에는 성격 변화가 나타나서 외모에 신경을 쓰지 않고 노인정에서 할아버지들과 성적 농담을 주고받기도 하였다. 의식은 명료하였으며 혈압과 뇌 단층촬영 모두 정상이었다. 이 질환의 치료원칙으로 맞는 것은?가. 갑상선기능검사를 한다.나. 가족에 대한 정서적 지지가 필요하다.다. 불필요한 자극을 줄이고 규칙적인 생활을 한다.라. Haloperidol보다 Chlorpromazine이 좋다.", "textbox": "", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 0, "explanation": "만성적으로 서서히 발병하는 기억, 언어, 판단, 추상력, 지남력, 시공간 능력 등의 인지기능 장애, 판단력 및 충동조절장애로 험악한 말, 갑자기 울거나 웃거나 어울리지 않는 농담을 말하는 것은 치매→ 알츠하이머 치매 진단가. 치매 환자의 공통적인 기본 Lab은 CBC, chemistry, TFT, Vit. B12/Folate, VDRL, HIV 검사 등나. 가족에 대한 정서적 지지가 필요다. 감각자극을 잘못 해석해 쉽게 당황하지 않도록 자극이 적은 환경에 있게 하고 생활이 일정하고 정규적이 되게 해야 합니다.라. 경정신병 상태에는 소량의 항정신병약물이 도움이 되나, 항콜린성 효과가 큰 저역가 항정신병약물은 피해야 합니다."}, {"major": "신경인지장애", "minor": "기억상실장애(건망장애) 및 기타 인지장애", "qnum": "01", "question": "교통사고로 머리에 심한 손상을 받고 의식을 잃은 30세 여자가 응급실로 왔다. 응급실 방문 후 곧 깨어났고 뚜렷한 국소 신경 증상이나 다른 신체검사에서도 이상은 없었고 뇌전산화단층촬영도 정상이었다. 그러나 사고 후 두통, 어지러움, 피로, 집중력 저하가 6개월간 지속되었다. 가장 의심되는 진단은?", "textbox": "", "images": [], "options": ["기질성 불안장애(organic anxiety disorder)", "뇌진탕후 증후군(postconcussional syndrome)", "외상후 스트레스장애(posttraumatic stress disorder)", "신체화 장애(somatization disorder)", "인위성 장애(factitious disorder)"], "answer": 1, "explanation": "의식상실을 동반할 정도의 심한 머리 외상 후에 생기며, 두통, 피로감, 어지러움, 이자극성, 집중력 장애, 기억장애, 수면장애, 스트레스 및 알코올에 대한 내성 감소 등이 나타나는 것이 주된 임상 양상입니다."}, {"major": "신경인지장애", "minor": "기억상실장애(건망장애) 및 기타 인지장애", "qnum": "02", "question": "54세 남자가 운동장에서 운동 중 갑자기 자신이 어디에 있는지 모르겠다며 혼란스러워 병원에 왔다. 운동장에 가기 전부터 병원에 오기까지 1시간 동안의 일이 기억나지 않는다고 하였다. 본인의 주민 등록번호, 집 전화번호는 알고 있고, 의식은 명료하고 지남력은 정상이었다. 기억은 3시간 후에 완전히 회복되었다. 먼저 시행할 검사는?", "textbox": "", "images": [], "options": ["뇌파검사", "신경인지검사", "다면적인성검사", "약물이용면담검사", "뇌 자기공명영상촬영"], "answer": 4, "explanation": "지남력과 의식은 정상인데도 불과 몇 시간 전에 있었던 일을 기억하지 못하는 상태입니다. 기억상실장애(amnestic disorder)가 의심되는 상황입니다. 여러 기질적 원인을 배제하기 위해 뇌 자기공명영상촬영부터 시행해볼 수 있겠습니다."}, {"major": "신경인지장애", "minor": "기억상실장애(건망장애) 및 기타 인지장애", "qnum": "03", "question": "뇌진탕후 장애에 관한 다음 설명 중 옳은 것은?", "textbox": "", "images": [], "options": ["뇌신경 인지기능 검사 상 이상소견이 없다.", "가장 흔한 증상은 피로, 두통, 현기증이 있다.", "두부 손상이 심할수록 증상이 심각하다.", "보상심리가 발병의 가장 큰 원인이다.", "뇌전산화단층촬영 상 특징적인 병변이 관찰된다."], "answer": 1, "explanation": "1) 뇌신경 인지기능 검사 상 이상소견이 있습니다.2) 두통, 피로감, 어지러움, 이자극성, 집중력 장애 등이 있습니다.3) 기능의 이상이므로 신체 손상정도와 비례하지 않습니다.4) 보상신경증에 대한 설명입니다.5) 뇌전산화단층촬영 상 특이 소견이 없습니다."}, {"major": "신경인지장애", "minor": "다른 의학적 상태(신체질환)에 의한 정신장애", "qnum": "01", "question": "1년 전 교통사고 후 점차 우울감을 호소하는 45세 남자가 내원하였다. 예전에 비해 짜증을 많이 내고 자신의 처지를 비관하고 죽는 것이 낫겠다는 이야기를 많이 했다. 내원 후 시행한 뇌파검사 상 오른쪽 대뇌반구의 서파소견이 관찰되었고, MRI 촬영 상 오른쪽 측두엽의 위축을 보였다. 가장 의심되는 진단은?", "textbox": "", "images": [], "options": ["기질성 기분장애", "기질성 불안장애", "기질성 인격장애", "뇌진탕 증후군", "외상후스트레스장애"], "answer": 0, "explanation": "우울감, 자살사고 등 기분장애에 해당하는 임상을 보이고 있습니다. DSM-5에서는 우울한 기분과 흥미나 즐거움의 상실이 주가 되는 기분장애가 다른 의학적 상태의 직접적인 병태생리적 결과로 생기고, 이런 것이 의학적으로 증명되어야 진단할 수 있다고 보고 있습니다. 기분장애의 임상 양상 + 기질적 이상을 확인했으므로 기질성 기분장애로 진단한다고 알아두시면 되겠습니다.2), 3) 임상 양상이 명확히 불안장애나 성격장애보다는 기분장애를 시사합니다.4) 영상소견에서 이상을 보이므로 뇌진탕 증후군은 제외할 수 있습니다.5) 외상후스트레스장애의 triad인 고통스러운 사건의 재경험, 관련된 자극의 회피, 지속된 각성 증상 중 단 한 가지조차도 없습니다. 교통사고 후 정신과에 온 환자가 무조건 PTSD 진단을 받는 것이 아닙니다!"}, {"major": "신경인지장애", "minor": "다른 의학적 상태(신체질환)에 의한 정신장애", "qnum": "02", "question": "29세 남자가 지나치게 화를 자주 내고 예민해져서 병원에 왔다. 5개월 전에 추락사고로 머리를 다쳐 의식을 잃었었다고 한다. 사고 이후부터, 불면증, 기억감퇴, 집중력저하, 어지러움, 두통 등을 호소하였으며, 감정조절이 되지 않고 충동적으로 변했다. 뇌자기공명영상에서 오른쪽 이마관자엽에 뇌연화증이 발견되었다. 진단은?", "textbox": "", "images": [], "options": ["인위장애", "보상신경증", "기질인격장애", "뇌진탕후증후군", "외상후스트레스장애"], "answer": 2, "explanation": "뇌자기공명영상에서 관찰되는 기질적 원인에 의하여 성격의 변화가 있었으므로 기질성 성격장애입니다. 뇌진탕후증후군에서는 영상 검사에서 분명한 뇌 손상이 관찰되지 않으며, 나머지 보기들도 마찬가지입니다."}, {"major": "신경인지장애", "minor": "다른 의학적 상태(신체질환)에 의한 정신장애", "qnum": "03", "question": "72세 남자가 2년 전 교통사고로 뇌출혈, 3일간 의식 소실을 경험하였다. 그 후 참을성이 없어지고, 욕하고 아내에게 성관계를 억지로 요구하였다. 사고 전에는 조용하고 내성적인 성격이었다. 진단은?", "textbox": "", "images": [], "options": ["PTSD", "간헐성 폭발장애", "기질성 인격장애", "두부외상성치매", "뇌진탕후 증후군"], "answer": 2, "explanation": "기질성 성격장애 : 두부외상 후 외상 이전의 성격양상에 변화가 생기는 질환으로 흔한 증상으로는 불안정한 정서, qnum": "07", "question": "도서관에서 대출업무를 담당하고 있는 31세 여자는 어려서부터 수줍음이 많았고, 사람들 앞에 서는 것을 두려워하였다. 그녀는 친구를 사귀고 싶었지만 자신이 못나서 친구들에게 비웃음 당하거나 버림받을 것 같은 걱정 때문에 어울리지 못했다. 도서관 업무 중 익숙한 일만 하려 하고, 낯선 대출자가 오면 업무를 다른 사람에게 맡겼다. 인격유형은?", "textbox": "", "images": [], "options": ["경계성", "분열성", "의존성", "편집성", "회피성"], "answer": 4, "explanation": "회피성(avoidant) 성격장애는 확고한 보장이 없는 한 대인관계를 회피합니다. 거절과 배척에 대한 극도의 예민성을 보이며, 사회적 위축이 있으나, 내적으로는 친밀한 관계를 원합니다. 참고로 조현성(schizoid) 성격장애에는 사회적 관계형성의 need 자체가 없고, 회피성(avoidant) 성격장애에는 관계를 형성하고 싶으나 두려워서 그러지 못하는 성격장애의 유형입니다."}, {"major": "성격장애", "minor": "성격장애", "qnum": "08", "question": "40세 남자 회사원 L씨는 직장에서 동료들과 잦은 언쟁과 다툼을 하였다. 타인의 행동을 악의적으로 해석하는 경우가 많았고, 한번 모욕을 당하면 지속적으로 원한을 품었다. 증권 회사에 근무하는 아내가 업무상 만나는 사람들이 많은데, 다른 남자와 바람을 피운다고 의심하고 자주 폭행하였다. 냉담한 성격에 권력과 지위에 대한 집착이 많고, 자신보다 열등하게 보이는 사람을 경멸하였다. 이 사람의 인격장애는?", "textbox": "", "images": [], "options": ["분열성 인격장애", "반사회성 인격장애", "경계성 인격장애", "히스테리성 인격장애", "편집성 인격장애"], "answer": 4, "explanation": "타인의 동기를 악의가 있는 것으로 해석, 불신, 원한, 악의적 해석 등 때로 공격적이며 아집 있고 유능하며 냉철하게 평가할 때 함. 권력에 집착, 강자에 적대적, 약자를 경멸 cf. 반사회성 성격장애에서는 무책임, 비양심, 타인의 권리 침해가 핵심입니다."}, {"major": "성격장애", "minor": "성격장애", "qnum": "09", "question": "23세 남자가 우울하다며 병원에 왔다. 2년 전부터 화를 참을 수 없고 불안할 때마다 뾰족한 물건으로 손목을 그었다. 감정이 힘들 때마다 몸을 긋고 싶은 생각을 참기 어려웠고 몸을 긋다 보면 안도감을 얻기도 하였다. 4개월 전에는 \"내가 아무리 매달려도 천사 같던 여자 친구가 나를 처참하게 버렸다.\"며 화를 참기 어려워 1주일간 매일 손목을 그었다고 한다. 내 곁의 모든 사람들은 결국 떠나간다며 늘 공허하다고 한다. 진단은?", "textbox": "", "images": [], "options": ["경계성인격장애", "연극성인격장애", "편집성인격장애", "반사회성인격장애", "자기애성인격장애"], "answer": 0, "explanation": "만성적인 공허감, 기복이 심한 대인관계 양상을 보이는 환자입니다. 감정이 쉽게 각성되며 불안함을 느끼는 점, 타인과 분리되는 상황을 두려워하는 점, 충동적으로 자해 행위를 하는 점 등은 경계성인격장애의 특징적인 임상 양상에 해당합니다."}, {"major": "성격장애", "minor": "성격장애", "qnum": "10", "question": "매사에 꼼꼼하고 철저한 완벽주의자이며, 규칙에 지나치게 얽매이는 30세 남자가 부인에 의해 억지로 정신과 외래를 왔다. 자신뿐만 아니라 가족에게도 엄격하게 규칙을 적용하고 강요하며 말이 통하지 않아 너무 괴롭다고 부인이 호소하였다. 면담 시 정신병적 증상은 없었다. 이 사람의 치료에 관한 설명으로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["인지치료가 도움이 된다.", "환자의 감정 표현을 되도록 억제한다.", "선택적 세로토닌 흡수 차단제를 사용한다.", "집단치료가 효과적이다.", "환자의 이야기에 말려들지 말아야 한다."], "answer": 1, "explanation": "강박장애와 강박성 성격장애는 닮은 모습이지만, 어느 한 가지에서 다른 한 가지로 발달하는 것은 아닙니다. 강박장애는 강박사고, 의식행동과 연관된 장애이나, 강박성 성격장애는 경직된 행동 양식과 연관되고 더 자아 동조적입니다. 타인에게 완벽성과 규칙을 강요한다는 부인에 이끌려 내원하였다는 점(ego-syntonic)에서 강박장애보다는 강박성 성격장애로 볼 수 있습니다.1) 역설적 기법, 인지치료 등이 도움 됨2) 감정표현의 인색함이 강박성 성격장애의 기본적 특징 중 하나입니다.3) SSRI는 강박장애뿐 아니라 강박성 성격장애에도 사용됩니다.4) 집단치료, 행동치료, 개인정신요법 모두 유효합니다.5) 환자는 지능화하고 감정표현에 제한이 크므로 말려들지 말아야 합니다."}, {"major": "성격장애", "minor": "성격장애", "qnum": "11", "question": "30세 여자가 우울하다며 다량의 수면제로 자살을 기도하여 병원에 왔다. 평소 공허함을 많이 느꼈으며 감정 기복이 심하고, 친구를 쉽게 사귀지만 조금이라도 갈등이 생기면 심하게 화를 내고 금방 헤어진다고 한다. 화날 때마다 충동적으로 자해와 자살 기도를 하였는데, 최근 횟수와 정도가 심해졌다고 한다. 치료는?", "textbox": "", "images": [], "options": ["홍수법", "습관반전훈련", "체계적탈민감화", "노출과 반응방지", "변증법적행동치료"], "answer": 4, "explanation": "정서가 정상에서 우울, 분노, 짜증을 자주 왕복하는 극도의 불안정성을 가진 환자입니다. 자제력 또한 부족하고 자해, 자살행위가 많은 것으로 보아 경계성 성격장애인 것으로 판단할 수 있습니다.성격장애는 기질적 정신병과 달리 치료가 힘들지만 경계성 인격장애에서는 변증법적 정신치료, 정신화 기반 치료 등이 효과가 있다고 알려져 있으며, 약물은 증상 안정을 위해 대증적으로 사용할 수 있습니다."}, {"major": "성격장애", "minor": "성격장애", "qnum": "12", "question": "30세 여자가 남자친구에게 버림을 받을까봐 걱정되어서 자해를 하여 내원하였다. 어릴 적에 양아버지에게 성학대를 당했다. 평소 매일 술에 취해 쉽게 아무 남자와 잠자리를 가졌다. 인생이 허무하다며 자살을 시도한 적이 여러 번 있었다. 이 환자에 해당하는 인격장애는?", "textbox": "", "images": [], "options": ["경계성", "편집성", "히스테릭", "의존성", "강박성"], "answer": 0, "explanation": "자해, 자살행위를 하고 여러 남자들과 잠자리(자제력 부족), 갑자기 화를 냄(충동성, 정서 불안정) 등의 모습으로 보아 전형적인 경계성 성격장애의 환자라고 볼 수 있습니다. 자해, 자살행위를 보이는 환자의 경우 경계성을 가장 먼저 의심해야 합니다."}, {"major": "성격장애", "minor": "성격장애", "qnum": "13", "question": "아무 이유 없이 배우자를 의심하고 타인의 행동을 악의적으로 해석하며, 자신보다 열등하게 보이는 사람들을 경멸하는 사람의 인격장애에 대한 설명으로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["고착화된 망상은 없다.", "환각, 괴이한 망상 등 정신분열병의 핵심증상은 없다.", "자기 파괴적이지 않다.", "반사회적 행동에는 복수의 의미가 담겨있다.", "사소한 자극에 분노로 반응하는 일은 드물다."], "answer": 4, "explanation": "망상장애와의 감별이 우선 : 고착화된 망상 없습니다.2) 망상형 조현병과는 달리 조현병의 핵심증상이나 환각이 없습니다.3) 경계성 성격장애와 달리 자기 파괴적이지 않습니다.4) 반사회적 성격장애에서의 반사회적 행동의 동기는 대개 모호하며, 처벌로도 교정되지 않습니다.5) 쉽게 자신의 성격이나 평판에 대한 공격으로 지각하여 화내고 반격합니다. 이들은 흔히 호전적이며, 예민하고 화를 잘 냅니다. 괴팍하고 병적으로 배우자를 의심하거나, 소송이나 투서를 습관적으로 합니다."}, {"major": "성격장애", "minor": "성격장애", "qnum": "14", "question": "20세 남자가 반복적인 강도행위와 폭력으로 교도소에 복역 중이다. 중학교 시절부터 무단결석, 싸움, 부진한 학업수행 등을 보였다. 그는 가족과의 관계도 밀접하지 않았으며, 한 직업을 3개월 이상 가지지 못하고 직장동료들과의 갈등, 무단결근으로 해고되곤 하였다. 이 사람의 인격장애에 관한 설명으로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["혼란스런 가정환경이 원인이 된다.", "아동기에 과잉행동을 보인다.", "비정상적인 뇌파 소견이 나타날 수 있다.", "장기간 입원 치료는 효과가 없다.", "40세 이상에서 자연 호전될 수도 있다."], "answer": 3, "explanation": "불안정한 가정환경 안에서 빈번하게 발생2) 아동기 과잉행동과 통계적 연관성3) 비정상적 뇌파나 soft neurologic sign 있음4) 교도소와 같이 매우 구조화된 환경 내에서 행동요법이 도움5) 40세를 넘어 자연 호전되는 경우도 있으나 결혼문제, 물질남용, 충동성 등은 지속적"}, {"major": "성격장애", "minor": "성격장애", "qnum": "15", "question": "28세 남자가 일정이 바쁜 줄을 앞질러 먼저 택시를 타려고 했을 뿐인데 이해를 못해준다며 정류장에서 싸움을 벌였다. 늘 특별대우를 받으려 했으며 다른 사람과 공감하지 못하였다. 평소 오만하고 대인관계에서 착취적이었다. 남이 잘되는 것을 보면 매우 시기하였다. 이 사람에서 보이는 인격장애의 유형은?", "textbox": "", "images": [], "options": ["경계성 인격장애", "편집성 인격장애", "반사회적 인격장애", "자기애성 인격장애", "히스테리성 인격장애"], "answer": 3, "explanation": "자기중심적이고, 특별대우를 받으려하고 오만하고 착취적이며 다른 사람이 잘되는 것을 시기하는 모습을 통해 자기애성 성격장애 유형임을 알 수 있습니다."}, {"major": "성격장애", "minor": "성격장애", "qnum": "16", "question": "다음 중 강박성 인격장애에 대해 맞게 설명한 것은?", "textbox": "", "images": [], "options": ["대부분 융통성이 없다.", "Freud 정신발달 단계 중 구강기와 관련이 있다.", "지나치게 강한 자아를 갖고 있다.", "시간이 지나면서 대부분 강박장애로 발전한다.", "대인관계에 전혀 문제가 없다."], "answer": 0, "explanation": "2) 구강기 → 항문기\n3) 자기애성 인격장애의 특징\n4) 강박장애와 강박성 성격장애는 닮은 모습이지만, 어느 한 가지에서 다른 한 가지로 발달하는 것은 아닙니다.\n5) 대인관계 기술이 부족, 대인관계를 지나치게 조절"}, {"major": "성격장애", "minor": "성격장애", "qnum": "17", "question": "다음 중 경계성 인격장애에 관한 설명으로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["여자에서 흔히 발생한다.", "정동의 불안정이 관찰된다.", "일시적 정신병적 증상이 있다.", "충동적 자해나 자살이 흔하다.", "정신분열병으로 진행하는 경우가 많다."], "answer": 4, "explanation": "5) 정신병적 삽화시 조현병과 감별해야 하나 삽화가 짧고 정신병적 증상이 뚜렷하지 않습니다."}, {"major": "성격장애", "minor": "성격장애", "qnum": "18", "question": "42세 남자가 사람 사귀는 것을 싫어하고 다른 사람의 칭찬이나
