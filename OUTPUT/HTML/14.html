ion": "사회적 상황과 친밀한 상황에서 과도하고 전반적인 불안을 느끼고 있어서 대인관계를 회피하고 있습니다. 따라서 회피성 성격장애를 진단할 수 있겠습니다.\n1) 조현성 : 조현성 성격장애는 대인관계에 대한 욕구가 전혀 없으므로 이 경우와 구별이 됩니다.\n5) 의존성 : 의존성 성격장애와 회피성 성격장애 모두 비판에 대한 과민성, 보상에 대한 욕구를 지니고 있습니다. 하지만 의존성 성격장애는 관계를 회피하거나 위축되지는 않고 중요한 다른 사람과의 관계를 계속 유지하려고 하므로 이 경우에는 회피성에 보다 부합하겠습니다."}, {"major": "성격장애", "minor": "성격장애", "qnum": "23", "question": "34세 주부가 남편과 다투다가 식칼로 자살을 시도했다. 그녀는 평소 충동적이며 변덕스럽다고 했다. 관련된 신경전달물질은?", "textbox": "", "images": [], "options": ["세로토닌", "에피네프린", "콜레시스토키닌", "히스타민", "아세틸콜린"], "answer": 0, "explanation": "‘생물학적 이해’ 단원에도 실려 있는 문제입니다. 참고하시라고 이 단원에도 넣었습니다. 감정, 공격성, 불안과 관계있는 신경전달물질은 세로토닌입니다. 또한 환자는 평소 충동적이고 변덕스러우며 남편과 다투다가 자살을 시도한 것으로 보아 경계성(borderline) 성격장애로 볼 수 있습니다. 경계성 성격장애의 치료로는 분석적 정신치료, 인지행동 치료와 함께, 기분의 조절과 충동성 통제를 위해 선택적 세로토닌 재흡수 억제제(SSRI)를 사용합니다."}, {"major": "성격장애", "minor": "성격장애", "qnum": "24", "question": "31세 여자가 화장과 복장이 화려하고 다른 사람과 금방 친해지는 것으로 유명하다. 하지만 금방 친해졌다가도 대화에서 다른 사람의 이야기를 하면 심하게 화를 내며 과장된 표현을 자주 사용하는 편이다. 또 친하지 않던 직장 동료가 퇴사한다는 소식을 듣고 주체할 수 없을 정도로 흐느껴 울며 아쉬워하는 모습을 보인다. 인격장애의 유형은?", "textbox": "", "images": [], "options": ["의존성", "연극성", "편집성", "분열성", "자기애성"], "answer": 1, "explanation": "연극성 성격장애(histrionic personality disorder)는 과장된 정서가 주목을 받기 위한 것이라는 것이 중요한 소견입니다. 이 증례에서 과장된 표현을 자주 사용한다는 점, 슬프지도 않은데 흐느껴 우는 점 등이 과장된 정서의 표현이라고 볼 수 있습니다."}, {"major": "성격장애", "minor": "성격장애", "qnum": "25", "question": "30세 남자가 식당에서 난동을 피우고 기물을 파손하여 경찰서에 연행되었다. 공금횡령과 사기로 여러 차례 고소를 당한 적이 있고, 무면허 운전으로 크고 작은 사고를 일으켰다. 중학교 때부터 무단결석과 가출, 폭력써클 활동 등 문제가 많았다. 이 사람에서 가능한 인격장애는?", "textbox": "", "images": [], "options": ["분열성 인격장애", "편집성 인격장애", "경계성 인격장애", "반사회적 인격장애", "자기애적 인격장애"], "answer": 3, "explanation": "행실이 불량하네요. 반사회적 성격장애입니다."}, {"major": "정신신체장애", "minor": "정신신체장애", "qnum": "01", "question": "48세 여자가 폐암 4기로 진단을 받고 완화치료를 받고 있다. 최근 종교 활동을 열심히 하고, 자신의 재산을 고아원에 기부하려고 결심하였다. 그렇게 하면 자신의 정성을 하늘이 저버리지 않고 병을 완치해 줄 것으로 믿었다. 환자의 심리 반응은?", "textbox": "", "images": [], "options": ["부정", "분노", "수용", "우울", "타협"], "answer": 4, "explanation": "죽음의 단계적 적응과정 문제입니다. 어떻게 하면 죽지 않을까 하여 종교기관에 헌금을 하거나 마음속으로 약속을 하는 타협의 단계를 보이고 있습니다."}, {"major": "정신신체장애", "minor": "정신신체장애", "qnum": "02", "question": "74세 여자가 췌장암 말기 진단을 받고 항암화학치료를 받고 있었다. 치료를 열심히 받다가 1주 전부터 식사도 하지 않으며 방 안에서 나오지 않고 간간히 우는 소리만 들린다고 한다. 퀴블러-로스(Kübler-Ross)의 죽음을 받아들이는 심리적 단계는?", "textbox": "", "images": [], "options": ["분노", "수용", "협상", "우울", "부정"], "answer": 3, "explanation": "죽음의 5단계는 부정 → 분노 → 타협 → 우울 → 용납입니다. 이 환자는 식욕도 줄고, 우는 일이 많아지는 것을 봐서 우울이라고 볼 수 있겠죠?"}, {"major": "정신신체장애", "minor": "정신신체장애", "qnum": "03", "question": "40세 남자가 사는 게 허무하다며 병원에 왔다. 6개월 전 말기 위암으로 진단받은 후 보존적 항암치료 중이다. 암에 걸린 이후 어렵게 입사한 회사에서 휴직을 해야 했고 치료비도 너무 많이 나와 더 이상 견디기가 어렵다고 한다. 그 누구도 자신의 고통을 이해하거나 도울 수 없을 것이라며 눈물을 흘리며 슬퍼한다. 임종 심리단계는?", "textbox": "", "images": [], "options": ["부정", "분노", "수용", "우울", "타협"], "answer": 3, "explanation": "환자는 말기 위암으로 진단 받은 후 누구도 자신을 도울 수 없을 것이라 절망하며, 슬퍼하고 있습니다. 이는 임종 심리단계 중 우울에 해당합니다. 임종 심리단계는 부정(죽지 않을 것이라 믿음) → 분노(화냄, 폭력적인 행동) → 타협(종교 활동, 기부) → 우울(절망, 슬픔) → 수용의 순서로 나타납니다."}, {"major": "정신신체장애", "minor": "정신신체장애", "qnum": "04", "question": "48세 남자 환자가 말기 간암 진단을 받고서 평소와 다름없이 일에 열중하고 자신은 결코 죽지 않을 것이라고 믿고 있었다. 죽음에 대한 적응단계 중 현재 환자가 겪고 있는 바로 다음으로 나타나는 단계에 대한 설명은?", "textbox": "", "images": [], "options": ["불우 이웃기부", "교회에 다니며 신앙으로 극복하려 한다.", "의사나 주위 사람들에게 분노와 적개심을 보인다.", "우울해하고 혼자만의 시간을 보내려 한다.", "치료법을 찾는다."], "answer": 2, "explanation": "죽음에 단계적 적응과정(E. Kubler-Ross)\n① 1단계 : 충격과 부정(현재 환자가 보이는 모습)-5\n② 2단계 : 분노-3\n③ 3단계 : 타협-2\n④ 4단계 : 우울-4\n⑤ 5단계 : 받아들임-1"}, {"major": "정신신체장애", "minor": "정신신체장애", "qnum": "05", "question": "신체질환의 발병, 악화, 완화, 재발 등에 심리적인 요소가 중요하게 관여하는 장애는?", "textbox": "", "images": [], "options": ["통증장애(pain disorder)", "전환 장애(conversion disorder)", "신체화장애(somatization disorder)", "정신신체장애(psychosomatic disorder)", "신체이형장애(body dysmorphic disorder)"], "answer": 3, "explanation": "정신신체의학은 신체질환의 발병, 진행, 악화, 완화, 재발에 사회심리적인 요소가 중요하게 관여한다는 관점에서 시작합니다."}, {"major": "정신신체장애", "minor": "정신신체장애", "qnum": "06", "question": "컴퓨터 프로그래머인 30세 남자가 반복적인 복통을 주소로 병원에 왔다. 진찰 결과 과민성 장증후군(Irritable bowel syndrome)으로 진단되었다. 이 환자에 대한 조치로 옳은 것은?", "textbox": "가. 정신신체장애에 대해 충분히 설명해 준다.\n나. 급성기에는 증상 해소를 위한 치료를 우선한다.\n다. 스트레스가 대장 기능에 미치는 영향을 설명해 준다.\n라. 심리적 원인이 중요하므로 즉각 정신분석 치료를 시행한다.", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 0, "explanation": "Irritable bowel syndrome : 소화기 증상을 주소로 의사를 찾는 환자의 반 가까이에서 발견가. 다양한 비특이적 정신병리 소견을 보입니다.\n나. 모든 정신신체장애에서 초기, 급성기에는 증상 자체의 해소를 위한 내과적 치료가 우선입니다.\n다. 급성기가 지난 다음에는 환자의 문제를 노출시키고 설명할 수 있습니다.\n라. 정신치료는 서서히, 주의 깊게 시작하는 것이 좋습니다."}, {"major": "정신신체장애", "minor": "정신신체장애", "qnum": "07", "question": "45세 대기업 부장이 뒷목이 뻣뻣하고 당긴다는 증상을 호소하며 병원에 왔다. 이러한 증상은 부장 진급 후 시작되었고 퇴근 직전까지 심하다가 퇴근 후에는 덜하였고, 공휴일에는 괜찮았다. 성실하고 경쟁적인 성격으로 회사에서 모범사원으로 인정받고 있지만 스트레스가 많다고 하였다. 이 환자의 두통 치료를 위한 방법은?", "textbox": "가. 항불안제 사용\n나. 온찜질 마사지\n다. 생체되먹이기 치료\n라. 긴장해소를 위한 잦은 커피 타임", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 0, "explanation": "긴장 두통(tension headache) : 뒷머리와 목이 뻣뻣한 양상\nA형 성격에 흔하며 불안, 우울 동반 흔함\n- 치료 : 정신치료, 항불안제, 근육이완, bio-feedback 등 이완 요법\n카페인의 금단증상으로 두통이 올 수 있습니다."}, {"major": "정신신체장애", "minor": "죽음의 문제", "qnum": "05", "question": "55세 남자가 폐암 3기로 항암제 치료 중, 10년 후 자신의 재산을 사회에 반납하겠다고 다짐하면서 의사에게는 돈은 얼마든지 들어도 좋으니 효과가 좋은 항암제를 달라고 부탁하였다. 이 환자가 보이는 임종의 심리단계는?", "textbox": "", "images": [], "options": ["부정", "타협", "분노", "용납", "우울"], "answer": 1, "explanation": "의사, 가족, 신과 타협하려 함. 교회나 절에 헌금, 마음속으로 약속"}, {"major": "정신신체장애", "minor": "죽음의 문제", "qnum": "06", "question": "45세 남자가 1개월 전 말기 이자암으로 진단받고 매일 폭음을 한다. 며칠 전에는 유흥업소에서 무분별하게 성관계를 하고, 오늘은 도박장에서 종업원과 싸우고 환전소에 불을 질렀다. 임종 심리단계는?", "textbox": "", "images": [], "options": ["분노", "부정", "수용", "타협", "우울"], "answer": 0, "explanation": "환자는 말기 이자암을 진단받은 뒤 무분별한 성관계, 도박, 싸움, 방화 등 폭력적인 행동 양상을 보이고 있습니다. 이는 임종 심리단계 중 분노의 단계에 해당합니다."}, {"major": "정신신체장애", "minor": "죽음의 문제", "qnum": "07", "question": "완치 가능성이 낮은 말기 암 환자가 이를 부정하고 받아들이지 못할 때 의사로서 가져야 할 바람직한 태도는?\n가. 정직함으로 환자의 신임을 얻는다.\n나. 모든 질문은 가족을 통해 대답한다.\n다. 사소한 불편이라도 즉시 해결해 준다.\n라. 부정(denial)은 서둘러서 직면시킨다.", "textbox": "", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 1, "explanation": "무엇보다 환자에게 정직하게 대하여 환자의 신임을 얻어야 합니다.\n나. 환자의 말에 귀를 기울여야 합니다.\n다. 죽음을 앞둔 환자의 신체적, 심리적 편안함, 위협 있는 죽음 : 특히 암 말기 환자의 경우 통증 관리에 유의해야 합니다.\n라. 개인이 처하고 있는 심리적인 면, 즉 질병의 인식과 자신의 죽음을 인정할 능력 여부 및 안정감 등을 고려하여 결정하여야 합니다."}, {"major": "정신과적 응급", "minor": "자살", "qnum": "01", "question": "다음 중 자살에 관한 설명으로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["청소년 자살률이 꾸준히 증가하는 추세이다.", "계절적으로 봄과 가을에 자살률이 높다.", "회복기에 접어든 우울증 환자에서 자살률이 높다.", "미혼자나 독신자의 자살률이 기혼자의 2배이다.", "자살 시도는 남녀 비슷하지만, 성공률은 남자가 2~4배 높다."], "answer": 4, "explanation": "1) 소아/청소년 자살은 지난 수십 년간 꾸준히 증가2) 계절적으로는 봄, 가을에 높다고 합니다.3) 회복기 때 자살 위험이 더 높아지므로 잘 감시해야 함4) 미혼자나 독신자의 자살률이 기혼자의 2배5) 자살기도율은 여자가 높습니다."}, {"major": "정신과적 응급", "minor": "자살", "qnum": "02", "question": "다음 중 자살에 관한 설명으로 옳은 것은?", "textbox": "", "images": [], "options": ["자살기도의 빈도는 남자에서 높다.", "사회경제적 수준이 높을수록 자살률이 높다.", "자살에 대해 직접적으로 묻는 것은 피해야 한다.", "자살기도 후 3개월 이내에는 자살의 재시도 가능성이 낮다.", "자살 생각을 갖고 있는 사람은 지인에게 자신의 생각을 알리지 않는다."], "answer": 1, "explanation": "1) 자살률 : 남>여, 자살기도 : 남<여2) 사회경제적 수준이 높을수록 자살률도 높아집니다.3) 자살 이야기를 꺼내는 데 주저하지 말 것. 환자는 도리어 안심4) 과거 자살기도가 위험인자, 3개월 이내가 특히 위험5) 대개 자살 의도가 있는 사람의 80% 가량이 자기 생각을 타인에게 알림"}, {"major": "정신과적 응급", "minor": "자살", "qnum": "03", "question": "29세 여자가 왼쪽 손목을 칼로 긋고 쓰러져 응급실로 실려 왔다. 3개월 전에 남자친구로부터 이별을 통보받은 후 하루 종일 눈물을 흘리거나 대부분 무기력하게 누워 지냈다. 입맛이 없어 하루에 1끼만 먹거나 아예 먹지 않기도 하였다. 밤에는 1~2시간밖에 못 자고 뜬눈으로 지냈으며, 매일 소주 1~2병씩을 마셨다. 세상에 혼자 남은 것 같아서 죽고 싶은 생각이 들었고 그에 따라 칼로 손목을 그었다고 한다. 자신이 못 나서 헤어진 것 같았다. 가족들과 함께 살기는 하나, 사이가 소원하여 각자 생활로 바빠 혼자 집에 있는 시간이 많았고 소주 2병을 마시고 잠이 오지 않아 충동적으로 죽고 싶은 마음에 손목을 그었다고 한다. 여전히 죽고 싶은 생각이 있으며 칼이나 꿈이 있으면 좋겠다고 한다. 조치는?", "textbox": "", "images": [], "options": ["음주 교육 후 귀가", "응급 처치 후 귀가", "정신건강의학과 통원치료", "자살예방센터 안내 후 귀가", "정신건강의학과와 보호병동 입원"], "answer": 4, "explanation": "3개월 전 남자친구와의 이별 후 주요우울장애로 의심되는 환자로 왼쪽 손목을 칼로 긋는 자살 시도를 하여 내원하였습니다. 가족들과의 사이가 소원하며 각자의 생활로 바쁜 등 지지체계가 확고하지 않고, 충동적으로 손목을 긋고 자살을 시도한 점은 자살환자의 입원 치료 적응증에 해당합니다. 따라서, 정신건강의학과와 보호병동 입원을 통해서 치료를 시행하는 것이 가장 바람직하겠습니다."}, {"major": "정신과적 응급", "minor": "자살", "qnum": "04", "question": "다음 중 자살에 관한 설명으로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["가족 내 불화가 청소년 자살의 원인이 된다.", "자살은 상실감이나 우울증과 관련이 높다.", "자살기도 3개월 이내 재시도가 흔하다.", "자살기도 성공률은 여자에서 높다.", "청소년 자살은 매스컴의 영향을 많이 받는다."], "answer": 3, "explanation": "청소년의 자살 유발요인\n① 부모의 불화\n② 부모와의 불화\n③ 부모상실\n④ 부모의 이혼\n⑤ 가까운 사이의 붕괴\n⑥ 진학실패, 성적부진\n⑦ 권태감, 또래집단의 압력이나 매스컴의 영향, 반사회적 행동과의 연관성도 있다.\n진정한 의미의 자살은 절망의 표현으로 우울증과 관련이 높다. 다른 정신장애에 의한 것이라도 희망 없음(hopelessness)이 자살과 관련됩니다.\n과거 자살기도가 위험인자, 3개월 이내가 특히 위험합니다.\n자살기도는 여자에서 흔하나, 성공률은 남자가 높습니다."}, {"major": "정신과적 응급", "minor": "자살", "qnum": "05", "question": "자살하려고 수면제를 과량 복용한 17세 여자가 응급실에 왔다. 응급처치가 시행된 후 환자를 면담하는 의사의 태도 중 옳지 않은 것은?", "textbox": "", "images": [], "options": ["환자의 가족을 질책하지 않는다.", "보호자를 먼저 만나 자살의 경위를 듣는다.", "환자가 행동을 뉘우치며 다시 하지 않겠다고 하면 귀가시킨다.", "법적인 문제에 대비해 차트의 기록을 철저히 한다.", "원칙적으로 입원시키는 것이 좋다."], "answer": 2, "explanation": "자살 사고에 대해 직접, 자세히 물어보아야 함. 청소년의 경우 부모를 먼저 만나지 않는 것이 좋다. 하지만 이 경우 수면제를 과다 복용한 환자의 의식이 없다면 보호자를 먼저 만나야 될 듯합니다.\n자살하려고 시도한 청소년은 입원시켜서 철저히 관찰, 퇴원 후의 계획을 완벽히 세운 후 퇴원시켜야 합니다."}, {"major": "정신과적 응급", "minor": "자살", "qnum": "06", "question": "환자가 응급실로 전화를 하여 의사에게 \"이제 곧 죽으려고 약을 먹으려고 한다.\"고 말했다. 당신이 이 전화를 받았을 경우에 가장 먼저 어떤 조치를 취하는 것이 적당한가?", "textbox": "", "images": [], "options": ["지금 바로 전화를 끊고 병원으로 오기를 권유한다.", "약을 먹지 말라고 말하고 죽으려는 이유를 묻는다.", "전화로 계속 통화를 하면서 다른 전화로 경찰에 신고한다.", "환자의 전화번호와 정확한 주소를 물어본다.", "구급차를 보낼 것이니 조금만 기다리라고 한다."], "answer": 3, "explanation": "미국에서는 시·군마다 ‘자살예방센터’가 운영되고 있는데 밤낮으로 전문가가 자살의도자의 전화를 접수합니다. 전화상담원은 자신의 이름을 밝힌 다음 무엇보다 상대의 성명, 주소, 전화번호를 먼저 꼭 물어보고 기록해 둡니다. 무조건 상대방의 이야기를 따뜻하게 들어주고, 상대가 진정되는 듯 하면 인근 병원이나 센터를 찾아오도록 합니다. 이미 음독을 했다고 알리거나 좋을 장전하고 있다고 하면 즉시 경찰에 위급상황을 알려 처음 물었던 환자의 성명, 주소지를 구속합니다."}, {"major": "정신과적 응급", "minor": "자살", "qnum": "07", "question": "평소 부부 금실이 좋았던 72세 여자가 교통사고로 사망한 남편의 첫 번째 기일에 자살하였다. 자살의 원인으로 추정되는 것은?", "textbox": "", "images": [], "options": ["보복적 포기", "이기형 자살", "망상에 의한 죽음", "죽은 자와의 재결합", "지배를 획득하는 수단"], "answer": 3, "explanation": "자살의 심리학적 동기를 묻는 문제입니다. 자살자가 죽음과 그 결과에 대해 품는 환상을 통해 자살 행위의 정신역동을 이해할 수 있습니다. 흔한 환상으로는 죽은 자와의 재결합, 복수, 권력 장악, 지배, 징벌, 용서, 희생 혹은 회복, 탈출 혹은 지속적인 수면, 구원, 재탄생, 새로운 삶에 대한 소원 등이 있습니다."}, {"major": "정신과적 응급", "minor": "자살", "qnum": "08", "question": "32세 여자가 자살을 기도하여 응급실에 왔다. 8년 전에 결혼을 하였고, 3년 전부터 통신사 콜센터에서 근무를 시작하였으며, 1년 전에도 자살을 기도한 적이 있다. 직장에서 회식 때만 술을 마셨고, 담배는 피우지 않았다. 이 사람의 가장 심각한 자살위험 요인은?", "textbox": "", "images": [], "options": ["성별", "결혼상태", "직업", "과거 자살기도", "음주력"], "answer": 3, "explanation": "증례의 내용 중 자살의 위험인자에 해당되는 것은 과거 자살기도력 뿐입니다. 물론 통신사 콜센터직원이라는 직업이 스트레스를 많이 받기는 하겠지만, 교과서에는 직업의 종류가 자살의 위험인자에 해당된다는 내용은 없네요."}, {"major": "정신과적 응급", "minor": "자살", "qnum": "09", "question": "35세 여자가 1년 전 사망한 딸의 기일을 앞두고 우울감이 심해지고 잠을 못 자서 병원에 왔다. \"사흘 후에 딸을 만나러갈 거예요. 목을 맬 장소도 봐두었어요.\"라며 우울하고 멍한 표정으로 이야기했다. 가족에게는 비밀로 해 달라고 부탁하면서 며칠 잠만 잘 수 있게 해달라고 했다. 입원치료를 권유했으나 거부하였다. 우선적인 조치는?", "textbox": "", "images": [], "options": ["정신분석", "수면제 처방", "가족에게 연락", "심리적 부검 실시", "반복경두개자기자극술 시행"], "answer": 2, "explanation": "뚜렷한 자살 계획을 갖고 있는 환자로 자살의 위험이 굉장히 높다고 할 수 있습니다. 이런 경우 환자가 극단적인 시도를 하지 않도록 감시를 하는 것이 중요하며 이를 위해 가족에게 연락을 취해야 합니다."}, {"major": "정신과적 응급", "minor": "비자살 자해", "qnum": "01", "question": "17세 여아가 커터칼로 손목을 그어 응급실로 왔다. 고등학교 진학 이후 학업 스트레스가 심해져 시험기간이 되면 뾰족한 도구로 손목을 긋기 시작했다고 한다. 손목을 그은 후에는 안도감이 들어서 반복적으로 해왔고, 최근 들어서 횟수와 강도가 점점 심해졌다고 한다. 혈압 115/75mmHg, 맥박 84회/분, 호흡 17회/분, 체온 36.6℃이다. 우선적인 조치는?", "textbox": "", "images": [], "options": ["응급입원", "전기경련치료", "로라제팜 정맥주사", "구체적 자살사고 확인", "혼자 생각할 장소 제공"], "answer": 3, "explanation": "학업 스트레스로 인해 반복적으로 뾰족한 도구를 이용해 손목을 그은 환자입니다. 손목을 그은 후 안도감이 들어 반복적으로 해왔다는 점에서 비자살성 자해가 가장 의심됩니다. 이를 자살행동장애와 감별하기 위해 먼저 구체적 자살사고를 확인해야 하고, 자살계획이 뚜렷하다면 입원치료가 필요할 수 있습니다."}, {"major": "정신과적 응급", "minor": "비자살 자해", "qnum": "02", "question": "31세 남자가 지나가는 사람을 폭행하여 경찰과 함께 병원에 왔다. 2개월 전부터 비밀요원이 자신을 해칠 것 같다는 생각에 주변 사람들을 의심하여 자주 시비를 걸었다. 병원에서도 의사에게 소리를 지르고 손에 잡히는 대로 물건을 집어던지고 발로 차려고 하였다. 우선적인 조치는?", "textbox": "", "images": [], "options": ["가족 면담", "약물 투여", "신체상태 평가", "안전환경 확보", "전기경련요법"], "answer": 3, "explanation": "정신질환으로 인해 조절되지 않는 난폭행위를 보이는 환자입니다. 난폭행위는 정신과적 응급 중 하나로, 응급치료 전 안전 확보가 최우선이고 그 후에 원인에 따른 치료를 진행합니다."}, {"major": "정신과적 응급", "minor": "난폭행위", "qnum": "01", "question": "14세 여자가 자신이 하얀 옷을 입은 귀신과 산다는 등 이상한 이야기를 해 학교 선생님이 데리고 병원에 왔다. 4년 전에 조현병 진단을 받은 어머니와 단 둘이 살고 있다. 어머니가 3개월 전부터 약을 중단하면서 사천장군, 최씨 할아버지, 친정어머니, 동자승 4명이 자신의 몸속에 들어왔다며 이들의 목소리를 흉내 내는 모습을 보였고, 이들이 시킨다며 갑자기 상황에 맞지 않는 행동을 했다. 그 후로 환자도 하얀 옷을 입은 할아버지를 보았고, 그 할아버지가 자신들과 같이 산다고 믿고 있다. 환자는 평소와 다름없이 정상적으로 학교생활을 하고 있다고 한다. 환자에 대한 조치는?", "textbox": "", "images": [], "options": ["가족치료", "어머니와 분리", "항우울제 경구투여", "정신건강의학과 입원", "항정신병제 경구투여"], "answer": 1, "explanation": "망상이나 환각 등의 증상을 보이는 조현병을 앓고 있는 어머니로 인해 딸이 왜곡된 믿음을 가지게 된 경우로, 이는 소아 정신적 학대의 일종으로 볼 수 있습니다. 소아 학대의 경우 가장 먼저 피해 아동을 위험한 상황으로부터 격리보호 해야 하므로, 어머니와 분리하여 더 이상의 피해가 일어나지 않도록 하여야 합니다."}, {"major": "정신과적 응급", "minor": "난폭행위", "qnum": "02", "question": "22세 여자가 남편의 구타로 얼굴에 멍이 들어 친구와 함께 병원에 왔다. 혼전 임신으로 18세에 결혼했다. 결혼 초부터 남편이 자주 때리고 원하지 않는 성관계를 강요하였다. 이혼을 요구하면 남편은 칼로 위협하고 신고하면 죽여 버리겠다고 협박했다. 적절한 조치는?", "textbox": "", "images": [], "options": ["환자와 남편을 분리한다.", "남편과 해결책에 대해 상의한다.", "환자에게 맞는 이유를 물어본다.", "환자의 친구와 함께 당시 상황을 물어본다.", "환자에게 이혼에 대한 법적 소송을 권유한다."], "answer": 0, "explanation": "가정폭력 상황에 처한 피해자에 대한 조치를 묻는 문제입니다. 가장 먼저 선행되어야 할 것은 피해자를 가해자로부터 분리시켜 더 이상의 피해가 일어나지 않도록 하는 것입니다. 그 후 법적·제도적 도움을 받아볼 수 있겠습니다."}, {"major": "정신과적 응급", "minor": "난폭행위", "qnum": "03", "question": "25세 남자가 가족들에 의해 손이 묶인 채로 응급실을 방문하였다. 하루 전부터 방에 혼자 있으면서 아무것도 먹지 않다가 자신을 죽이려고 가족들이 모의한다며 몽둥이를 휘둘렀다고 한다. 응급실에서도 가족들을 죽여야 한다며 난폭하게 굴었다. 이 환자에 대한 조치로 옳은 것은?", "textbox": "", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 1, "explanation": "환자를 만나기 전 환자에 대해 많은 정보를 얻도록 합니다. 나. 위험이 예견되는 경우에는 치료 보조 인력을 면담실에 대기시켜야 합니다. 다. 폭력이 용납되지 않는다는 점을 환자에게 알립니다. 라. 어느 정도 공감적 관계가 이루어질 때까지 결박 유지, 결박을 풀 때에는 환자를 예의 주시합니다."}, {"major": "정신과적 응급", "minor": "난폭행위", "qnum": "04", "question": "20대 남자가 응급실에서 흥분하여 공격적인 행동을 보이며 묻는 말에 횡설수설하고 자꾸 뛰쳐나가려 하였다. 이웃 주민의 신고로 경찰관과 함께 응급실을 방문하였다. 따라서 환자에 대하여 아는 것이 전혀 없었으며 환자의 정신과적 면담도 쉽지 않았다. 우선 상기 환자에 대하여 염두에 두어야 할 진단으로 맞는 조합은?\n가. 정신분열병\n나. 대뇌감염\n다. 약물중독\n라. 전환장애", "textbox": "", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": -1, "explanation": "난폭 행동의 감별 진단으로는 약물로 유발된 자극적인 치매, 반사회성 성격장애, 감정형 조현병, 대뇌감염, 대뇌종양, 강박장애, 충동조절장애, 성격장애, 특이성 알코올 중독, 망상장애, 편협성 성격장애, 조현병, 정신장애 없는 사회적응부전, 측두엽 뇌전증, 양극성장애, 대인 스트레스로 인한 비조절성 폭력 등을 들 수 있습니다. 전환 장애에서 난폭 행동을 보인다는 설명은 없습니다."}, {"major": "정신과적 응급", "minor": "난폭행위", "qnum": "05", "question": "20세 남자가 가계도구를 부수는 등 난폭한 행동을 보여 경찰관과 가족들에 의해 응급실로 왔다. 정신상태검사에서 의식은 명료하였으며 다른 기질적 이상을 시사할 만한 소견도 없었다. 환자는 응급실에서도 계속 큰 소리를 치며 진정하지 못했다. 이때 응급처치로 사용할 수 있는 약물은?\n가. haloperidol\n나. carbamazepine\n다. lorazepam\n라. propranolol", "textbox": "", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 1, "explanation": "나, 라. β-blocker, carbamazepine은 간헐적으로 난폭한 환자에게 예방적으로만 사용해야 합니다."}, {"major": "정신과적 응급", "minor": "난폭행위", "qnum": "06", "question": "3년 전 정신분열병으로 진단받고 치료를 받고 있는 25세 남자가 손이 묶인 채로 경찰관과 함께 응급실에 왔다. 가족들이 자신을 죽이려고 모의하는 이야기를 들었다며 몽둥이를 휘두르고 부모를 폭행했다고 한다. 응급실에서도 가족들을 죽여야 한다며 난폭하게 굴었다. 이 환자에 대한 조치로 적합한 것은?", "textbox": "", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 2, "explanation": "가. 신속히 제압하고 일시적으로 구속합니다. 나. 부드럽고 자극적이지 않은 말씨로 환자의 말을 경청해야 합니다. 다. 위험이 예견되는 경우에는 치료 보조 인력을 면담실에 대기시켜야 합니다. 라. 환자의 분노를 자극하지 않도록 합니다."}, {"major": "소아정신의학", "minor": "지적장애", "qnum": "01", "question": "7세 여아가 말이 늦다며 병원에 왔다. 임신나이 39주, 출생 체중 3,400g으로 태어났으며 특별한 과거력은 없다. 아이는 잘 뛰어놀고, 잘 웃는다. 부모에게 친밀한 행동을 보이며, 간단한 심부름을 수행한다. 또래 아이들보다는 동생 친구들과 상호 관계를 잘 유지하며 잘 어울린다. 제한된 특정영역에 집착하거나 반복적인 행동은 보이지 않는다. 검사 결과는 다음과 같다. 진단은?", "textbox": "• 언어검사(PRES, LSSC)\n- 표현언어등가연령: 4년 1개월(표현언어발달지수 58.3, <3백분위수)\n- 수용언어등가연령: 4년 2개월(수용언어발달지수 59.5, <3백분위수)\n• 조음검사(U-TAP)\n- 낱말수준 자음정확도 93%(참고치, >85%)\n- 낱말수준 모음정확도 99%(참고치, >85%)\n• 지능검사(K-WPPSI-IV)\n- 언어이해지표점수 58, 시공간지표점수 55\n- 유동추론지표점수 58, 처리속도지표점수 61\n- 전체척도지표점수 60(<3백분위수)\n• 적응행동검사(K-Vineland-II)\n- 의사소통 57점, 생활기술 56점 사회성 70점, 운동기술 83점\n- 적응행동 조합점수 67(<3백분위수)", "images": [], "options": ["지적장애(intellectual disability)", "아스페르거장애(Asperger disorder)", "말소리장애(speech sound disorder)", "반응애착장애(reactive attachment disorder)", "전반적발달지연(global developmental delay)"], "answer": 0, "explanation": "지적장애의 핵심 진단 기준은 1) 표준화된 지능 검사로 확인된 지적 기능의 결함 2) 적응 결함으로 인한 사회적 기능의 제한 3) 발달 시기에 시작된다. 본 환아의 경우 K-SPPSI-IV 지능검사 상 전체척도지표점수 60(<3백분위수)로 지능저하가 확인되고, K-Vineland-II 적응행동검사 상 적응행동 조합점수 67(<3백분위수)로 적응기능 저하가 확인됩니다. 또한 언어검사 상 표현언어, 수용언어 등가연령이 4세 수준으로 실제 연령 7세에 비해 낮기 때문에 현재 발달시기에 지적 기능의 장애가 진행되고 있어 지적장애의 진단 기준에 부합합니다. 따라서 가장 적절한 진단은 지적장애입니다.2) 아스페르거장애 : 부모 및 친구들과의 사회적 상호작용이 비교적 양호하게 존재하고, 제한적 행동/활동/흥미가 없기 때문에 부적절합니다.3) 말소리장애 : U-TAP 조음검사 결과 자음정확도, 모음정확도 모두 정상으로 부적절합니다.4) 반응애착장애 : 부모에게 친밀한 행동을 보이고 친구들과 사회적 상호작용도 양호하여 부적절합니다.5) 전반적발달지연 : 대운동, 미세운동, 인지, 언어, 사회성 및 일상생활 능력 중 두가지 이상 영역에서 또래보다 현저하게 발달이 늦어지는 상태로, 5세 이하의 영유아에게 적용하는 진단입니다."}, {"major": "소아정신의학", "minor": "지적장애", "qnum": "02", "question": "11세 남아아가 학교에서 또래 아이들에게 자주 따돌림을 당하였고, 선생님의 말을 이해하지 못하고 산만하였다. 집에서는 부모에게 많이 의존적이었다. 평가 결과는 다음과 같았다. 기본적인 치료목표는?", "textbox": "• 지능지수 : 66\n• 학령전기 발달력 : 특이 사항 없음\n• 뇌 자기공명영상 : 정상", "images": [], "options": ["지능 향상", "집중력 향상", "자립생활 영위", "학습능력 향상", "수용주거시설 입소"], "answer": 2, "explanation": "정신 지체 아동들을 위한 가장 기본적인 치료 목표는 적응 행동 발달을 도와줌으로써 사회적 제한(handicap)을 최소화하고 기본적인 생활 능력을 획득하는 데에 있습니다.지적장애 자체보다는 이차적인 정신질환과 후유증, 사회적응에 대한 치료가 필수적입니다. 개인정신치료를 포함한 가족치료와 행동치료, 약물치료를 시행하고, 뇌전증 등의 합병증을 치료합니다."}, {"major": "소아정신의학", "minor": "지적장애", "qnum": "03", "question": "9세 남아 가 쉽게 짜증을 내고 친구를 자주 때려 병원에 왔다. 학교에서 는 선생님의 지시를 따르지 못하고 집에서 자주 울고 떼를 썼으며 밤늦 게까지 안 자서 엄마가 감당하기 힘들었다. 5세 때 한 차례 경련을 했고 이후로 괜찮아 치료를 받지 않았다. 지능지수는 48이다. 치료는?", "textbox": "", "images": [], "options": ["졸피뎀", "도네페질", "리스페리돈", "아고멜라틴", "알프라졸람"], "answer": 2, "explanation": "지능지수가 48이므로 중등도 지적장애에 해 당합니다. 지적장애 환자에서 나타나는 공격 적 행동에는 리튬, 날트렉손, 카바마제핀, 발 프로산, 리스페리돈 등이 효과적입니다."}, {"major": "소아정신의학", "minor": "지적장애", "qnum": "04", "question": "5세 남아 가 말이 늦어서 왔다. 단순한 세 단어 문장은 구사할 수 있었지 만, 복잡한 표현이나 설명은 할 수 없었다. 또래아이들이 할 만한 심부름 은 이해를 못해 실행할 수 없었다. 또래에게 따돌림을 당했지만, 두세 살 어린 아이들과는 웃으며 잘 놀았다. 진단은?", "textbox": "", "images": [], "options": ["자폐증", "정신지체", "음성장애", "선택무언증", "발달성협응장애"], "answer": 1, "explanation": "언어발달 장애가 있고, 또래와 어울리지 못하 고 자기보다 어린 아이들과 웃으며 잘 노는 모습을 통해 지적장애로 진단할 수 있습니다."}, {"major": "소아정신의학", "minor": "지적장애", "qnum": "05", "question": "9세 남아 가 수업을 따라가지 못해서 병원에 왔다. 의사와의 눈맞춤은 적 절했으며 간단한 질문에는 대답했으나 복잡한 지시는 이해하지 못했다. 5세 동생과는 잘 놀지만 또래친구들과는 잘 어울리지 못했다고 한다. 지 능지수는 62였다. 진단은?", "textbox": "", "images": [], "options": ["자폐장애", "정신지체", "학습장애", "수용-표현성 혼합언어장애", "선택적함구증"], "answer": 1, "explanation": "적응행동 장애, 이해력 저하 등의 문제가 있 으며 지능지수가 62로 낮기 때문에 ICD-10 에 의한 정신지체의 진단에 해당합니다. (DSM-5에서는 지적발달장애에 해당합니다.)"}, {"major": "소아정신의학", "minor": "의사소통장애", "qnum": "01", "question": "6세 남아아가 말을 잘 못 한다며 병원에 왔다. 집에서 아이의 말을 잘 알아듣지 못하는 엄마, 아빠에게 아이는 자주 혼이 났다. 유치원에서도 아이가 말을 이상하게 해서 친구들에게 자주 놀림을 당했다. 아이는 유치원에 가지 않겠다고 떼를 썼다. 지능지수는 90이고, 언어의 이해와 표현 능력은 6세 수준이다. 면담 중에 '라면'을 '나면'으로, '고래'를 '고예'로 말하였다. 진단은?", "textbox": "", "images": [], "options": ["언어장애", "말소리장애", "선택적함구증", "특정학습장애", "자폐스펙트럼장애"], "answer": 1, "explanation": "말을 잘 못하는 것을 주소로 내원한 6세 남아로, 지능 지수와 언어 이해 및 표현 능력은 정상적이지만, 말하기 소리를 구사하는 수준이 정신연령에 적절한 수준 아래에 있는 상태입니다. 따라서 말소리 장애로 진단할 수 있습니다. 치료로는 언어 치료가 효과적이며, 환자의 친구 관계나 학교에서의 행동을 관찰하며, 필요한 경우 부모 상담도 진행하는 것이 좋습니다."}, {"major": "소아정신의학", "minor": "의사소통장애", "qnum": "02", "question": "8세 남아아가 또래와 어울리지 못해 병원에 왔다. 아이는 유치원을 다닐 때부터 말투가 독특해 친구들에게 놀림을 받았다. 초등학교에 입학해서는 선생님에게 인사할 줄 몰랐고 반말을 했다. 말할 때 얼굴을 잘 쳐다보지 않았고 친구들이 놀려도 이해하지 못하여 반응을 보이지 않았다. 지능지수는 80이다. 진단은?", "textbox": "", "images": [], "options": ["적응장애", "지적장애", "반응애착장애", "분리불안장애", "사회사의소통장애"], "answer": 4, "explanation": "또래와 어울리지 못해 병원에 온 8세 남아로, 지능지수가 70보다 높기 때문에 지적장애는 배제할 수 있습니다. 유치원에서부터 말투가 독특해 놀림을 받았고 놀림을 이해하지 못합니다. 또한, 어른에게도 반말로 얘기하고 인사할 줄 모르는 등 상황이나 상대에 따라 의사소통 방식을 변화시키는 능력에 장애가 있는 것으로 보입니다. 따라서 5) 사회의사소통장애로 진단이 가능합니다."}, {"major": "소아정신의학", "minor": "의사소통장애", "qnum": "03", "question": "7세 남자 아이가 말이 늦어 병원에 왔다. 평가 결과는 다음과 같았다. 진단은?", "textbox": "• 눈 맞춤 : 가능\n• 청각유발검사 : 정상\n• 모방행동 : 가능\n• 언어이해 : 4세 수준\n• 언어표현 : 4세 수준\n• 지능지수 : 82", "images": [], "options": ["자폐장애", "주요우울장애", "아스퍼거장애", "선택적 함구증", "수용성 표현성 혼합 언어장애"], "answer": 4, "explanation": "환아는 눈맞춤과 모방행동이 가능하고, 청각유발검사와 지능지수는 정상 소견입니다. 지능이 정상이고 청력에 문제가 없음에도 불구하고 언어의 이해와 표현의 수준이 저하된 경우는 수용성 표현성 혼합 언어장애로 볼 수 있습니다."}, {"major": "소아정신의학", "minor": "의사소통장애", "qnum": "04", "question": "42개월 남아이가 어린이집을 가지 않겠다고 하여 엄마와 함께 병원에 왔다. 어린이집에서 선생님이나 엄마 말은 알아듣고 잘 놀지만 말을 잘 하지 않고 아이들과 어울려 지내지 못한다고 한다. 면담결과 어머니와의 눈맞춤은 적절한 편이었으며, 언어이해는 40개월 수준, 언어표현은 28개월 수준, 지능지수는 83, 청력검사는 정상이었다. 진단은?", "textbox": "", "images": [], "options": ["언어장애", "우울장애", "자폐장애", "정신지체", "선택적함구증"], "answer": 0, "explanation": "환아는 눈맞춤이 적절하고 지능과 청각에 이상이 없습니다. 또한 선생님과 엄마 말을 잘 알아들으며, 언어이해가 월령에 적절한 수준임을 통해 언어의 수용에도 이상이 없다고 판단할 수 있습니다. 언어표현이 환아의 월령에 비하여 발달이 늦은 것으로 보아 표현성 언어장애(ICD-10 분류)로 볼 수 있습니다."}, {"major": "소아정신의학", "minor": "의사소통장애", "qnum": "05", "question": "7세 남아이가 친구들에게 놀림을 당한다고 학교에 가지 않으려고 하였다. 언어검사에서 '사과'를 '자과'로, '나비'를 '아비'로 말하지만, 언어표현과 이해는 아이의 연령에 적절한 수준이었다. 진단은?", "textbox": "", "images": [], "options": ["읽기장애", "정신지체", "아스퍼거장애", "음성학적장애", "표현언어장애"], "answer": 3, "explanation": "말소리장애(speech sound disorder, 음성학적장애)는 부적절하거나 분명하지 못한 발음을 나타내는 장애로, 아동의 나이나 지능에 맞지 않게 발음이 부정확한 경우를 말합니다. 빈번하게 잘못 발음되는 자음은 ㅅ, ㅆ, ㅊ, ㅈ 등입니다. 5세가 지난 후에도 발음 장애가 지속되고, 다른 의사소통장애가 동반되면 전반적 평가를 거친 후 언어치료를 시행합니다."}, {"major": "소아정신의학", "minor": "의사소통장애", "qnum": "06", "question": "올해로 만 3세가 되는 소아가 의미 있는 말을 하지 못해 병원에 왔다. 감별 진단으로 고려해야 할 것은?", "textbox": "가. 자폐장애\n나. 청력 장애\n다. 표현성 언어장애\n라. 적절한 교육 부족", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 4, "explanation": "언어장애와 감별 진단하여야 할 질병\n① 청력장애\n② 지적장애\n③ 유아자폐증\n④ 표현성 언어장애\n⑤ 수용성/표현성 혼합 언어장애\n⑥ 선택적 함구증\n⑦ 음성장애"}, {"major": "소아정신의학", "minor": "자폐스펙트럼장애", "qnum": "01", "question": "18세 남자가 보호자(어머니)와 함께 내원하였다. 다음은 진료 영상이다. 환자에게 적합한 치료는?\n• 의 사 : 무슨 일로 오셨나요?\n• 보 호 자 : 아들이 직업훈련을 받으러 특수학교를 다니고 있는데요, 학교에서 아이가 갑자기 흥분하고 머리를 박으려고 한다고 빨리 데리러 오라고 해서 데리고 나와 병원에 오는 길이에요.\n• 의 사 : 나 지금 너무 좋아! (벌떡 일어나며) 빨리 커피 마시러 나가야 돼요(벽에 머리를 쿵쿵 박기 시작함)\n• 보 호 자 : 아이가 뭐 하나에 꽂히면 집착이 심해서 그것만 해요. 아이가 평소에 매일 가는 카페가 있는데, 오늘 면담 때문에 못가게 될까봐 아까부터 계속 걱정하고 있어요.\n• 의 사 : 아이에게 무슨 문제가 있나요?\n• 보 호 자 : 아이가 말이도 느리고 해서 병원에 갔더니 4살 때 발달 지연으로 진단 받았어요. 그 이후로 쭉 특수학교를 다니고 있는데, 종종 흥분을 해서 벽에 머리를 박아서 머리에 혹이 난 적이 몇 번 있어요. 혹시라도 머리를 다치는 일이라도 생길까봐 걱정이 돼요. 친구도 몇 명 없고, 사회성도 없는 것 같아요.", "textbox": "", "images": [], "options": ["리스페리돈", "벤조디아제핀", "메틸페니데이트", "아토목세틴", "플루옥세틴"], "answer": 0, "explanation": "18세 남아가 이상행동을 주소로 내원하였습니다. 사회적 소통과 상호작용의 지속적 결함이 있고, 특정 카페에 대한 융통성 없는 집착을 보이는 것은 자폐스펙트럼장애(ASD)의 핵심 증상에 해당합니다. 머리를 박는 과다행동 및 자해 행위(head banging), 쉽게 흥분하는 과민성, 어릴 때부터의 발달 지연 역시 전형적으로 ASD 환자에서 나타날 수 있는 특징입니다. ASD는 완치 방법이 아직까지 존재하지 않아 행동장애를 감소시키고, 언어습득, 의사소통, 자립기술습득 등을 개선하는 것을 목표로 하는 대증치료가 이루어집니다. 행동증상의 감소를 위해 risperidone, haloperidol 등과 같은 항정신병약물을 사용할 수 있으며, 그 외에 SSRI, naltrexone, lithium 등을 증상에 따라 사용할 수 있습니다. 또한 다양한 프로그램이 포함된 포괄적 특수교육 및 행동치료, 정신치료가 필요합니다. 따라서 선택지 중 가장 적절한 치료는 리스페리돈입니다."}, {"major": "소아정신의학", "minor": "자폐스펙트럼장애", "qnum": "02", "question": "36개월 남아가 또래보다 말이 느리다며 병원에 왔다. 임신나이 40주, 출생체중 3,300g, 질분만으로 정상 출생하였다. 생후 8개월이 되어도 부모 눈을 맞추지 않았고, 이후로도 혼자서만 놀며, 낯도 가리지 않았다고 한다. 15개월부터 혼자 걷기 시작했지만 주로 발 앞쪽으로 서서 까치발로 걷는다고 한다. 진찰을 할 때도 의사와 눈을 맞추지 않고, 불러도 대답없이 혼자 서 있다가 가끔 괴성을 지른다. 바퀴 달린 자동차 모형 장난감에만 집착하고, 장난감을 주로 일렬로 늘어놓으며 논다. 진단은?", "textbox": "", "images": [], "options": ["전환장애", "학습장애", "자폐스펙트럼장애", "아동기발생유창성장애", "주의력결핍과다활동장애"], "answer": 2, "explanation": "또래보다 말이 느린 것을 주소로 온 36개월 남아입니다. 사회적 의사소통과 사회적 상호작용의 지속적 장애를 보이고 있으며 행동과 관심이 한정적이고 반복된 양상을 보입니다(바퀴 달린 자동차 모형에만 집착하고, 장난감을 주로 일렬로 늘어놓음). 이런 증상들로 보았을 때 자폐스펙트럼 장애를 의심할 수 있습니다."}, {"major": "소아정신의학", "minor": "자폐스펙트럼장애", "qnum": "03", "question": "7세 남아이가 고집을 부리고 머리를 문에 자주 박아 병원에 왔다. 아이는 눈을 마주 보지 않고 또래에게 관심을 보이지 않는다고 한다. 자주 손바닥을 들여다보고 수시로 박수를 치며 밥과 김 외에 다른 음식은 거의 먹으려고 하지 않는다고 한다. 계절이 바뀌어도 늘 장화를 신으려 하고 떼를 쓴다고 한다. 치료는?", "textbox": "", "images": [], "options": ["도세핀", "줄피뎀", "벤즈트로핀", "아고멜라틴", "아리피프라졸"], "answer": 4, "explanation": "사회적 소통과 교류의 지속적 결핍\n상동적 행동 및 흥미와 관심 범위의 제한을 보이고 있는 환아입니다. 자폐스펙트럼 장애가 의심됩니다.\n자폐스펙트럼장애에는 교육 및 행동치료가 효과적이며, 약물치료로는 항정신병 약물을 쓸 수 있습니다. 따라서 정답은 아리피프라졸이 되겠습니다.\n자폐증에 대한 약물치료는 이전에 나오지 않는 문제여서 당황할 수 있지만 전반적인 증상을 보였을 때 \"Psychotic\"한 것으로도 항정신병약을 써야한다고 생각할 수도 있겠습니다."}, {"major": "소아정신의학", "minor": "자폐스펙트럼장애", "qnum": "04", "question": "6세 남아이가 어려서부터 부모와 눈을 마주치지 않고, 말을 전혀 못하여 병원에 왔다. 장난감 오토바이를 나란히 세우는 데 열중하였으며 누군가 건드리면 울었다. 반향언어증(echolalia)을 보였으며, 이름을 불러도 쳐다보지 않았다. 진단은?", "textbox": "", "images": [], "options": ["자폐장애", "의사소통장애", "레트(Rett)장애", "소아기붕괴성장애", "아스퍼거(Asperger)장애"], "answer": 0, "explanation": "주변과의 상호작용을 전혀 보이지 않고, 일렬로 장난감 오토바이를 세우는 것에 집착하는 모습을 통하여 자폐스펙트럼장애를 의심할 수 있습니다. 레트장애는 여아에서 발생하며 특징적인 상동 손 운동이 있습니다. 소아기붕괴성장애는 생후 2~3년간 정상발달 후 수개월간 지적, 사회적, 언어기능이 붕괴되어 자폐장애와 유사합니다. 아스퍼거장애는 자폐스펙트럼장애와 유사한 사회적 상호교류 장애가 있지만, 정상 지능이며 언어장애가 없습니다."}, {"major": "소아정신의학", "minor": "자폐스펙트럼장애", "qnum": "05", "question": "12세 여아이가 자주 화를 내어 병원에 왔다. 학교에서 지나가다 다른 아이와 몸을 부딪치면 종일 그 아이를 따라다니며 \"잘못을 했으면 사과를 해야 해.\"라는 말을 반복하였고, 다툼이 생기면 그 학생을 때렸다. 5세 이후부터 간단한 문장을 만들 수 있었고 말이 늘고 나서도 남의 기분을 알아차리지 못하고 맥락을 이해하지 못하여 또래와 잘 어울리지 못했다. 같은 자리에만 앉으려 하고 자신의 뜻대로 되지 않으면 소리를 지르고 날뛰었다. 면담 중에는 눈을 마주치지 않고 단조롭고 낮은 말투로 대화하였다. 지능지수는 80이다. 진단은?", "textbox": "", "images": [], "options": ["지적장애", "의사소통장애", "간헐성폭발장애", "자폐스펙트럼장애", "파괴적기분조절장애"], "answer": 3, "explanation": "언어발달이 느리며, 맥락이나 다른 사람의 기분을 이해하지 못해 사회적 관계 형성에 어려움이 있고, 같은 자리를 고집하고 몸을 부딪치고 사과 받는 것에 집착하는 등 제한된 반복 행동이 있어 자폐스펙트럼장애로 진단내릴 수 있다. 지능지수는 70 이상으로 정상범위에 속하므로 지적장애를 배제할 수 있다."}, {"major": "소아정신의학", "minor": "자폐스펙트럼장애", "qnum": "06", "question": "11세 남아 학교를 가지 않으려 하고, 따돌림을 당해서 병원에 왔다. 부모와는 간단한 대화를 하였으나, 의사의 질문을 이해하지 못하고, 질문에 포함된 단어만 그대로 따라했다. 의사가 장난감을 건넬 때 쳐다보지 않고 제자리에서 빙글빙글 돌기만 했다. 어릴 때부터 말이 늦었고 혼자서 로봇만 가지고 놀았다고 한다. 지능지수는 79였고, 청력은 정상이었다. 진단은?", "textbox": "", "images": [], "options": ["자폐장애", "지적장애", "반응성애착장애", "주의력결핍과다활동장애", "수용-표현성 혼합언어장애"], "answer": 0, "explanation": "사회적 의사소통과 사회적 상호작용에서 계속적인 장애를 보이고 있으며, 상동적이고 반복적인 행동을 보이고 있는 아이입니다. 이 경우 지능지수가 70 이상이므로 지적장애로 진단할 수 없고, 자폐스펙트럼장애에 보다 부합한다고 할 수 있겠습니다."}, {"major": "소아정신의학", "minor": "자폐스펙트럼장애", "qnum": "07", "question": "다음 중 자폐장애의 가장 큰 위험요인에 해당하는 것은?", "textbox": "", "images": [], "options": ["경련 발작", "남아", "부적절한 양육 방식", "형제의 자폐증", "부모의 정신분열병"], "answer": 3, "explanation": "1) 자폐아동의 최대 1/3정도까지 뇌전증 발작이 보고되었으나, 일반인구의 뇌전증 발작 평생유병률이 5%라는 것, 자폐장애의 유병률이 0.02~0.05%라는 것을 고려하면 경련의 병력이 있어도 자폐장애의 가능성이 10배 이상 증가하기는 힘듭니다. 결정적으로 경련은 시간적 선후관계상 자폐증의 발병 후 나타나는 경우가 많으므로 가장 큰 위험인자로 보기에는 무리가 있습니다.2) 남녀비 3:1~5:13) 최근 연구에 따르면 자폐아동 부모들은 성격이나 양육방식에 차이 없음4) 자폐아의 형제자매들은 2~4%에서 자폐장애에 이환(일반인구의 50~100배)5) 알려진 바 없습니다."}, {"major": "소아정신의학", "minor": "자폐스펙트럼장애", "qnum": "08", "question": "자폐증 환아를 면담할 경우 볼 수 있는 모습은?", "textbox": "", "images": [], "options": ["장난감 오토바이를 타는 흉내를 낸다.", "인형에게 밥을 주는 놀이를 한다.", "치료자와 눈을 마주치면서 논다.", "혼자 괴성을 지르며 돌아다닌다.", "장난감을 건네주며 놀아달라고 떼를 쓴다."], "answer": 3, "explanation": "자폐스펙트럼장애의 핵심 증상은 사회적 상호교류의 질적인 장애, 의사소통 및 언어발달 장애, 제한된 활동 및 흥미 영역 그리고 다양한 행동장애를 들 수 있습니다.눈 맞춤을 피하고, 혼자 지내려 하며 비인간적 대상에 관심이 많습니다. 놀이 형태는 단순하고 반복적인 경우가 많아 다양한 장난감을 가지고 놀지 못하며 상상놀이가 결여되어 있습니다. 갑작스런 기분변화를 나타내며 특별한 이유 없이 울거나 웃거나 합니다."}, {"major": "소아정신의학", "minor": "자폐스펙트럼장애", "qnum": "09", "question": "5세 남아이가 말이 늦어서 내원하였다. 유아기에 옹알이를 하지 않았고 4세부터 단어를 말하기 시작하였다. 현재 10개미만의 단어를 말하였다. 표현을 위한 몸짓과 손짓을 한 적은 없었으며 면담 시 손바닥만 쳐다보고 높은 어조로 흥얼거렸다. 진단은?", "textbox": "", "images": [], "options": ["정신지체", "자폐장애", "선택무언증", "표현성 언어장애", "혼합수용성 - 표현성 언어장애"], "answer": 1, "explanation": "말할 때가 지났는데도 전혀 말이 없거나, 괴상한 소리를 지르거나, 유아기 때 옹알이를 하지 않는 등의 증상은 자폐스펙트럼장애에서 보일 수 있습니다. 어휘발달이 늦고 어휘력이 부족한 것 또한 자폐스펙트럼장애의 증상에 해당합니다. 지적장애의 경우 지능발달수준의 지연이 진단에 가장 중요한 것이지 그것이 지연이 없는 점, 그리고 면담 시 손바닥만 쳐다보고 높은 어조로 흥얼거린 것이 자폐스펙트럼장애의 가장 중요한 특징인 사회성 결여를 의미하므로 가능성이 떨어집니다. 지적장애의 경우, 사람들과의 관계를 전혀 맺지 않는 모습은 드뭅니다."}, {"major": "소아정신의학", "minor": "자폐스펙트럼장애", "qnum": "10", "question": "5세 남자 아이가 장난감에 관심이 없고 부모와 선생님과 눈을 마주치지 않는 것 때문에 병원에 왔다. 진료실에서 아이는 이름을 불러도 아는 척을 하지 않으며 벽을 치면서 계속 벽을 따라 돌고 있었다. 출생체중이 3.4kg이었고 주산기 합병증은 없었다고 하며 4세경에 말을 시작했다고 한다. 어릴 때부터 부모와 떨어져 있을 때에도 울지 않았다. 좋은 예후를 시사하는 소견은?", "textbox": "", "images": [], "options": ["정상 출생체중", "분리불안 없음", "남자 아이", "4세경 말하기 시작", "주산기 합병증 없음"], "answer": 3, "explanation": "자폐장애의 경과는 만성적이며 예후는 나쁜 편입니다. 지능과 언어발달의 정도에 따라 예후가 결정되며, 지능이 70 이상이고, 언어를 빨리 습득한 경우 예후가 좋습니다."}, {"major": "소아정신의학", "minor": "자폐스펙트럼장애", "qnum": "11", "question": "9세 남아이가 학교에서 친구들과 어울리지 못하고, 좋아하는 과목만 공부하며, 낯선 장소에 가는 것을 거부하였다. 집에서는 곤충과 관련된 책을 좋아해서 하루 종일 책만 읽었다. 묻는 질문에는 적절하게 대답했지만 억양과 운율이 이상했다. 발달력에서 1세 때 '엄마'라 불렀고 지능지수는 98이었다. 학교는 혼자서 다닐 수 있다고 한다. 좋은 예후를 시사하는 소견은?", "textbox": "", "images": [], "options": ["남아", "지능", "관심사 몰두", "언어발달 정도", "혼자서 등하교"], "answer": 1, "explanation": "많은 학생들이 당황하였던 문제입니다. 자폐스펙트럼장애가 의심되는 증례입니다. 적합한 친구관계를 형성하지 못하고, 행동, 관심 및 활동이 한정되나, 언어발달이나 인지발달의 현저한 지연은 보이고 있지 않습니다. 지능이 정상이고 사회성 기술이 양호한 경우에 예후가 좋습니다."}, {"major": "소아정신의학", "minor": "자폐스펙트럼장애", "qnum": "12", "question": "5세 남아가 어려서부터 부모와 눈을 마주치지 못하며, 또래 아이들과 잘 어울리지 못하고 항상 장난감 자동차 놀이에 열중하였다. 가끔 아무 이유 없이 고함을 지르고 발끝으로만 걸었다. 이 아이에서 볼 수 있는 의사소통으로 옳은 것은?", "textbox": "", "images": [], "options": ["소꿉놀이에서 아빠 역할을 좋아한다.", "낯선 사람에게 먼저 말을 건다.", "타인의 행동을 곧잘 따라한다.", "자신의 생각을 몸동작으로 표현한다.", "질문하는 사람의 말을 그대로 따라한다."], "answer": 4, "explanation": "자폐스펙트럼장애\n① 자폐스펙트럼장애 환아들의 놀이는 단순하고 반복적이며, 비기능적, 비사회적인 것이 특징으로 상징적인 놀이나 창조적인 놀이를 하기 어렵습니다. 아빠 역할을 한다는 것은 사회적인 기능을 하는 놀이입니다.\n② 자폐스펙트럼장애 환자의 경우 외부 세계와의 접촉을 끊고 자신의 세계 속에 갇혀있는 사람처럼 보입니다. 외부 세계와 접촉을 끊고 있는 상태에서 먼저 말을 걸 리가 없습니다.\n③ 타인의 행동을 모방하지 않습니다.\n④ 의사 표현에 걸맞은 표정이나 몸짓이 수반되지 않습니다. 상대방이 사용하는 비언어적 의사소통의 표현에도 둔감합니다.\n⑤ 말을 할 때의 톤이나 억양, 리듬 등이 어색해서 단조로운 음색, 부적절한 억양, 노래하듯 말하기, 기계적인 발음, 과성 등이 나타납니다. 이전에 들은 단어나 문장을 반복하는 반향어를 보이는 경우가 대부분입니다."}, {"major": "소아정신의학", "minor": "주의력결핍 과다행동장애", "qnum": "01", "question": "10세 남아 가 부진한 성적으로 병원을 찾았다. 성적을 잘 받으려 열심히 노력함에도 불구하고 성적이 좋지 않다고 하였다. 아이의 지능지수는 84이었고 책을 읽으며 철자를 자주 빼먹었고 속도 또한 느렸다. 진단은?", "textbox": "", "images": [], "options": ["음성학적장애", "표현 언어장애", "학습장애", "말더듬증", "정신지체"], "answer": 2, "explanation": "학습장애는 IQ 70 이상의 정상적인 지능과 신체 상태를 가지고 있으면서도 읽기, 수학, 쓰기 등의 기능이 떨어져서 학습 성취도 및 일상 활동에 지장이 될 때 진단합니다. 증례의 경우, 학습장애 중에서도 읽기장애에 속합니다."}, {"major": "소아정신의학", "minor": "주의력결핍 과다행동장애", "qnum": "02", "question": "10세 남아 가 화를 잘 참지 못한다며 엄마와 함께 병원에 왔다. 어릴 때부터 호기심이 많아 집 안을 수시로 뒤지고, 남의 집에 가서도 서랍을 뒤져 눈총을 받기도 하였다. 초등학교 입학 후 처음에는 또래 관계가 괜찮았으나 자기 마음대로 하려고 고집을 피우는 일이 조금씩 늘어나고, 친구들의 대화에 불쑥불쑥 끼어들면서 친구들이 조금씩 거리를 두었다. 최근에는 친구가 자신을 치고 갔다며 갑자기 친구를 때리는 일도 있었다. 숙제나 준비물을 챙기지 못해 자주 야단을 맞았다. 수업시간에는 끊임없이 몸을 움직이고 주변을 살피는 등 집중하지 못 했는데, 좋아하는 게임을 할 때는 옆에 누가 와도 모를 만큼 집중하는 모습을 보였다. 2년 전부터 눈을 자주 깜박거리고 코를 씰룩이며 킁킁거려 안과와 이비인후과에서 검사를 받았으나 이상은 없었다. 치료는?", "textbox": "", "images": [], "options": ["조피클론", "클로니딘", "아고멜라틴", "토피라메이트", "에스시탈로프람"], "answer": 3, "explanation": "12세 이전 시작된 산만, 대화 끼어들기, 물건 분실, 할 일 잊음, 몸 뒤틀기, 집중감소 등 부주의, 과다활동, 충동성을 보이고 있으므로 주의력결핍과다행동장애(ADHD)를 의심할 수 있습니다. 또한 눈을 자주 깜빡거리고 코를 씰룩이며 킁킁거리는 틱을 동반하고 있으니 보통의 ADHD의 경우 Methylphenidate 등을 사용하지만, 도파민 과다로 틱을 악화시킬 수 있기 때문에 틱을 동반한 경우 clonidine, atomoxetine 등을 이용해 치료할 수 있습니다."}, {"major": "소아정신의학", "minor": "주의력결핍 과다행동장애", "qnum": "03", "question": "8세 남아 가 잠시도 한 자리에 있지 못하고 부산하게 움직이며 주변 사람들과 마찰이 잦아 친구들이나 동생과 자주 다툰다. 다음 중 가능성이 가장 낮은 진단은?", "textbox": "", "images": [], "options": ["사회공포증", "갈색세포종", "양극성장애", "주의력결핍과다행동장애", "갑상샘기능항진증"], "answer": 0, "explanation": "주의력결핍 과다행동장애의 감별 진단\n① 정상행동\n② 적응장애, 품행장애\n③ 우울증, 조증, 불안장애\n④ 학습장애, 전반적 발달장애\n1) 사회공포증 : 사회적 활동이나 대인관계를 회피합니다.\n2), 5) 기질성 원인으로 과다활동을 나타낼 수 있습니다(주의력결핍보다 과다활동이 위주)."}, {"major": "소아정신의학", "minor": "주의력결핍 과다행동장애", "qnum": "04", "question": "다음 중 ADHD에서 충동성장애에 해당하는 것은?", "textbox": "", "images": [], "options": ["조심성 없이 실수를 한다.", "수업 중 딴 생각을 한다.", "차분히 앉아 있지 못한다.", "자기차례가 아닌데 대답한다.", "불필요하게 말이 너무 많다."], "answer": 3, "explanation": "ADHD의 DSM-5 진단 기준 중 충동성 항목\n① 질문이 다 끝나기도 전에 불쑥 대답한다.\n② 차례를 기다리지 못한다.\n③ 다른 사람이 하는 일을 자주 방해하거나 간섭한다(예: 대화를 하거나 게임을 하는 데 불쑥 끼어들어 참여한다)."}, {"major": "소아정신의학", "minor": "주의력결핍 과다행동장애", "qnum": "05", "question": "13세 여아가 학교를 안 가려고 해서 병원에 왔다. 초등학생 때부터 수업 시간마다 선생님 말을 듣지 않고 짝꿍에게 장난을 치며 수업을 방해했다. 답가지를 다 읽지도 않고 시험문제를 풀어서 성적이 낮았다. 숙제를 싫어하고, 억지로 시켜도 주변 소리에 관심을 갖거나 딴생각을 하여 시간 안에 마치지 못하였다. 중학교에 가서는 친구들과 어울리지 못하고 학교를 빠지기 시작했다. 진료실에서 손을 꼼지락거리고 의사의 말이 끝나기도 전에 불쑥 질문을 하며 말이 많았다. 지능지수는 91이고, 지속수행검사 결과는 다음과 같다. 치료는?", "textbox": "T점수 그래프\n누락(73) 오경보(46) 반응시간 평균(77) 반응시간 표준편차(93)\n• T점수가 65점 이상이면 정상범위에서 유의미하게(1.5σ) 벗어난 것으로 간주됨\n• T점수가 60점 이상이면 정상범위에서 약간(1σ) 벗어난 것으로 간주됨", "images": [], "options": ["아만타딘", "조피클론", "다이아제팜", "라모트리진", "아토목세틴"], "answer": 4, "explanation": "어렸을 때부터 수업 시간에 선생님 말을 듣지 않는 등의 부주의함을 보이고 있고, 말이 많고 질문이 끝나기도 전에 대답을 하는 등 충동성을 어울리지 못하고 학교를 빠지는 등 기능상의 장애를 일으키고, 학교 및 진료실에서 이러한 증상들이 발견된 점으로 보아 ADHD로 진단할 수 있다. 손을 꼼지락 거리는 것으로 보아 틱장애를 의심할 수 있고, 이때 치료는 아토목세틴이나 클로니딘을 사용합니다."}, {"major": "소아정신의학", "minor": "주의력결핍 과다행동장애", "qnum": "06", "question": "32세 남자가 우울하다며 병원에 왔다. 평소에 일을 순서대로 진행하거나 끝내는 데 어려움이 있고, 약속이나 해야 할 일을 잊어버려서 곤란을 겪어 1개월 전에 3번째 직장을 잃었다. 생각을 많이 해야 하는 업무를 피하거나 미루었다. 오래 앉아 있을 때 손을 많이 만지작거리거나 발을 꼼지락거리고 항상 분주하였다. 어릴 때는 아주 활발하고 말이 많았다. 부모나 선생님에게 지적을 많이 당하고 자주 다치거나 작은 사고가 끊이지 않았다. 치료는?", "textbox": "", "images": [], "options": ["졸피뎀", "부스피론", "클로자핀", "라모트리진", "메틸페니데이트"], "answer": 4, "explanation": "성인 ADHD에 관한 문제입니다. 성인의 경우 일을 조직하고 완수하지 못하며, 결과를 생각하지 않고 갑자기 의사결정하는 행동 등이 증상으로 나타날 수 있습니다. 환자는 가만있지 못하고 주의가 분산되는 증상이 있고 어렸을 때부터 부주의와 과활동 증상이 있었습니다. 이것을 토대로 어렸을 때 소아 ADHD가 성인까지 지속된 것을 의심할 수 있습니다. 성인 ADHD는 소아와 똑같이 메틸페니데이트가 일차치료제입니다."}, {"major": "소아정신의학", "minor": "주의력결핍 과다행동장애", "qnum": "07", "question": "25세 여자가 우울하다하며 병원에 왔다. 올해 대학원에 진학했는데, 하던 과제를 마무리 짓기도 전에 다른 과제를 맡아 시간에 쫓기었고, 강의를 들을 때나 논문을 읽을 때는 집중하기가 어려워 스트레스가 심했다. 정리를 못해서 물건을 자주 잃어버리고 약속시간에 자주 늦어 안절부절 못할 때가 많았다. 발표 중에 주제에 벗어난 말을 해서 창피를 당한 후 학교 가는 것을 불안해했다. 초등학교에 다닐 때 숙제를 마치지 못하거나 아침에 등교 준비가 느려져서 마치지 못할 때마다 학교를 가지 않으려 했다고 한다. 초등학교 4학년 때 말이 거칠어지고 생리가 시작되면서 감정기복이 심해졌다. 학교에서도 집중을 못 해 지적을 많이 받았다. 지능지수는 91이다. 진단은?", "textbox": "", "images": [], "options": ["강박장애", "양극성장애", "사회불안장애", "주요우울장애", "주의력결핍과잉행동장애"], "answer": 4, "explanation": "어렸을 때부터 학교 숙제나 등교 준비 등에서 어려움을 겪었고, 성인이 되어서도 학업 및 과제에 어려움을 겪고, 물건을 자주 잃어버리거나 약속시간에 늦는 등 부주의함이 지속된다. 이로 인해 우울을 호소하고 있다. 성인 ADHD의 임상 양상에 부합하는 모습이다."}, {"major": "소아정신의학", "minor": "주의력결핍 과다행동장애", "qnum": "08", "question": "7세 남아 가 산만해서 병원에 왔다. 수업시간에 자주 돌아다니고 앉아있으면 온몸을 심하게 꼼지락거렸다. 늘 말수가 많았고 조용히 있지 못하고 움직이고 돌아다녔다. 자기차례를 못 기다리고 친구들이 놀 때 불쑥 끼어들어 참견하였다. 다음 중 우선적으로 생각할 수 있는 치료제는?", "textbox": "", "images": [], "options": ["다이아제팜", "카바마제핀", "플루마제닐", "할로페리돌", "메틸페니데이트"], "answer": 4, "explanation": "수업시간 돌아다님, 온몸 꼼지락, 말 많음 - 과다활동\n차례 안 지킴, 끼어들어 참견 - 충동성\n이것을 통해 ADHD로 진단할 수 있고, 치료제는 methylphenidate가 TOC입니다."}, {"major": "소아정신의학", "minor": "주의력결핍 과다행동장애", "qnum": "09", "question": "10세 남아 가 낮은 성적으로 병원을 방문하였다. 집중을 요하는 수학공부를 특히 싫어했고, 준비물 가져오기, 숙제하기 등의 일상적인 활동을 자주 잊어버린다고 하였다. 시험 볼 때도 실수 때문에 많이 틀리며, 작은 소리에도 쉽게 산만해지고, 상대방과 대화할 때 귀 기울여 듣지 않는다고 하였다. 필기구 및 소지품을 자주 잃어버린다고 하였다. 진단은?", "textbox": "", "images": [], "options": ["학습장애", "주의력결핍과다활동장애", "간헐폭발장애", "행실장애", "적대적반항장애"], "answer": 1, "explanation": "주의력결핍과다활동장애(ADHD)는 부주의, 과잉행동, 충동성을 핵심 증상으로 하는 질환입니다. 그 중 부주의가 집중적으로 드러난 증례입니다. 적대적반항장애(ODD), 품행장애에서는 타인의 권리를 침해하는 공격적 행동이 나타납니다."}, {"major": "소아정신의학", "minor": "주의력결핍 과다행동장애", "qnum": "10", "question": "17세 여고생이 6개월 전부터 수업시간에 집중하기 어렵고 안절부절 못하여 학교에 가기 싫어하여 병원에 왔다. 유치원 때에도 차례를 기다리지 못하여 지적을 많이 받았으며 초등학교 때는 과제를 끝마치지 못하고 자주 미루어 엄마와 갈등이 많았다. 현재도 시험을 볼 때 실수가 많고 사소한 자극에 화를 내고 눈치 없이 끼어든다. 치료는?", "textbox": "", "images": [], "options": ["로라제팜", "발프로산", "카르바마제핀", "프로프라놀롤", "메틸페니데이트"], "answer": 4, "explanation": "이전에 출제된 문제들에 비해서 제시된 나이가 많이 혼동될 수 있습니다. 하지만 유치원 때부터 증상이 시작되었고 ADHD의 다양한 증상들을 보이고 있습니다. 이에 대한 치료로는 메틸페니데이트가 가장 효과적입니다."}, {"major": "소아정신의학", "minor": "주의력결핍 과다행동장애", "qnum": "11", "question": "9세 남아아가 학교 수업시간에 주의가 산만하여 여러 번 지적을 받았고, 숙제도 제대로 하지 않아 부모와 함께 정신과 외래를 방문하였다. 면담 중에도 가만히 있지를 못하고 이것저것 만지며 돌아다녔다. 주의 집중력이 떨어지고 부산한 행동을 보이지만 비행이나 남을 해치는 행위는 없었다. 이 환아의 장애에 관한 설명으로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["부모가 반사회성 인격장애인 경우가 많다.", "원인으로 뇌의 성숙지연이 있다.", "3세 이전에는 정상발달과 구별이 어렵다.", "약물치료로 haloperidol이 매우 효과적이다.", "사춘기 이전에 증상의 관해(remission)는 드물다."], "answer": 3, "explanation": "부모에서 ADHD, 반사회성 성격장애, 약물남용이 많습니다. 발달적 요인으로 뇌손상이 관여합니다. 소아가 어릴 때, 특히 3세 이전에는 기질적 특성상 다소 주의산만하고 과다활동이 있을 수 있으므로 감별을 요합니다. cf. 대부분 3세 이전에 전형적인 증상이 나타납니다. 진단은 학령기가 되기 전까지는 내리지 않습니다. 일차치료제는 정신자극제 증상의 관해는 12~20세에 주로 일어나지만 대부분 부분적 관해에 머뭅니다."}, {"major": "소아정신의학", "minor": "주의력결핍 과다행동장애", "qnum": "12", "question": "10세 남자 아이가 1주 전부터 눈을 하루 종일 깜빡거리고 머리를 끄덕거리는 행동이 갑자기 보였고, 3일 전부터 \"음음\"하며 혀를 차는 소리를 내기 시작했다. 1달 전부터 주의력결핍과다행동장애(ADHD)로 약물치료를 받고 있다고 하였다. 눈 깜빡거림과 머리 운동, 혀를 차는 소리 등의 시작과 관계있는 물질은?", "textbox": "", "images": [], "options": ["세로토닌", "코티솔", "글라이신", "글루탐산염", "도파민"], "answer": 4, "explanation": "ADHD의 치료에는 중추신경자극제를 사용합니다. 중추신경자극제는 과거 틱장애가 있었거나, 가족력에 뚜렛 장애가 있었을 경우 이를 악화시킬 수 있으므로 사용하지 않는 것이 좋습니다. 환아가 눈을 깜박거리고 \"음음\"소리를 동반한 틱 장애로 볼 수 있습니다. 중추신경자극제는 알파와 베타 아드레날린성 수용체의 효현제로 작용하며 간접적으로 연접전 신경말단에서 도파민과 노르에피네프린의 방출을 증가시킵니다. 이 중에서 도파민의 증가가 뚜렛 장애와 연관된다고 알려져 있습니다."}, {"major": "소아정신의학", "minor": "주의력결핍 과다행동장애", "qnum": "13", "question": "11세 남아가가 집에서 엄마 말을 안 듣고 숙제를 자주 빼먹었다. 학교에서는 집중하지 못하고 지나치게 떠들어 수업에 방해가 되어 선생님의 권유로 병원에 왔다. 4년 전부터 '음음' 소리를 내고 머리를 끄덕이고 얼굴을 씰룩거리는 증상이 있었다. 치료는?", "textbox": "", "images": [], "options": ["리튬", "디아제팜", "클로니딘", "라모트리진", "페노바르비탈"], "answer": 2, "explanation": "ADHD의 치료에 주로 사용되는 methylphenidate는 도파민의 과다로 틱을 악화시킬 수 있습니다. 틱장애가 동반되는 경우 clonidine의 사용이 효과적입니다."}, {"major": "소아정신의학", "minor": "주의력결핍 과다행동장애", "qnum": "14", "question": "다음 중 주의력결핍 과다행동장애에서 치료에 의해 가장 먼저 호전되는 증상은?", "textbox": "", "images": [], "options": ["학습저하", "주의산만", "강박적 행동", "과다행동", "충동조절장애"], "answer": 3, "explanation": "과다활동은 쉽게 소실되지만 주의력감퇴와 충동조절 문제는 오래 지속된다고 합니다."}, {"major": "소아정신의학", "minor": "주의력결핍 과다행동장애", "qnum": "15", "question": "다음 중 주의력결핍 과다행동장애 환아의 치료에서 가장 중요한 것은?", "textbox": "", "images": [], "options": ["약물치료", "가족치료", "행동치료", "인지치료", "정신분석치료"], "answer": 0, "explanation": "3/4에서 약물치료가 효과가 있으며 여러 정신장애 중 가장 약물치료의 반응이 좋은 질환 중 하나. 약물 단독치료로도 효과가 있으나 약물외적 치료의 병행이 효과적입니다."}, {"major": "소아정신의학", "minor": "주의력결핍 과다행동장애", "qnum": "16", "question": "주의력 결핍과 과민성행동장애의 치료약물 중, 불면, 식욕감퇴, 복통, 틱 유발 등의 부작용 발생 가능성이 큰 것은?", "textbox": "", "images": [], "options": ["fluoxetine", "imipramine", "haloperidol", "carbamazepine", "methylphenidate"], "answer": 4, "explanation": "ADHD의 치료에 대표적으로 사용되는 methylphenidate는 정신자극제로 시냅스에서 dopamine의 농도를 증가시키는 약리작용을 합니다. dopamine 증가에 의한 틱 증상들, 대표적으로 틱을 유발시키거나 악화시킬 수 있기에 틱의 가족력이나 과거력이 있으면 이 약의 사용은 금기가 되고 대신 clonidine을 사용합니다."}, {"major": "소아정신의학", "minor": "주의력결핍 과다행동장애", "qnum": "17", "question": "다음 중 주의력결핍 과다행동장애에 대한 설명으로 옳은 것은?", "textbox": "", "images": [], "options": ["지능에 비해 학습장애가 흔하다.", "성인에서는 나타나지 않는다.", "집을 벗어나면 증상이 나타나지 않는다.", "남아보다 여아에서 더 흔하다.", "대뇌 측두엽과 관련이 깊다."], "answer": 0, "explanation": "지능에 비해 학업이 부진한 경우가 많습니다.2) 청소년기나 성인 때까지 지속되기도 합니다.3) 학교생활에 지장이 많습니다.4) 남아에 더 흔합니다.5) 가장 주목받는 부위는 전두엽겉질과 선조체"}, {"major": "소아정신의학", "minor": "주의력결핍 과다행동장애", "qnum": "18", "question": "10세 여아가 산만하다며 병원에 왔다. 2년 전 입학 때부터 수업시간에 자꾸 돌아다니고 앉아 있을 때도 꼼지락거리고 학업을 따라가지 못해 선생님에게 지적을 자주 받았다. 차례를 기다리지 못하고 주변 상황에 참견도 하여 친구들에게 미움을 많이 받았다. 학교에서 지난 4개월간 눈을 심하게 깜빡거렸는데 5분 정도는 의식적으로 참을 수 있지만 이후에는 참기 어려워 깜빡임을 반복하였다고 한다. 지능지수는 78이다. 진단은?", "textbox": "", "images": [], "options": ["양극성장애", "순환기분장애", "정신지체", "뚜렛장애", "주의력결핍과다활동장애"], "answer": 4, "explanation": "부주의함, 과다활동, 충동성 등의 증상을 보여 주의력결핍과다행동장애(ADHD)를 의심할 수 있는 증례입니다.3) DSM-5에서는 삭제되었지만, ICD-10에 따르면 정신지체의 기준은 IQ 70 미만입니다.4) 뚜렛장애는 1년 이상 음성 틱과 운동 틱이 하나 이상씩 존재할 때 진단할 수 있습니다. 이 환아의 경우 운동 틱만 존재하며 기간 또한 1년 미만입니다."}, {"major": "소아정신의학", "minor": "주의력결핍 과다행동장애", "qnum": "19", "question": "초등학교 2학년 남학생이 부산한 행동과 주의 집중력 저하로 학업부진이 지속되자 부모와 함께 정신과 외래를 방문하였다. 다음 이 환아의 약물 치료에 관한 설명이다. 옳은 조합은?", "textbox": "가. 가장 기본적인 치료제는 중추신경자극제이다.\n나. 오랜 이환기간으로 평생 약물 복용이 필요하다.\n다. 뚜렛장애의 가족력이 있는 경우 methylphenidate는 피한다.\n라. Methylphenidate는 매 식사 후와 취침 전, 1일 4회 복용이 좋다.", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 1, "explanation": "가. 기본적인 약물치료\n나. 성인기까지 지속(2/3)되면 계속적 투약이 필요하나 대부분에서 평생 가지는 않습니다.\n다. 틱장애에 뚜렛장애가 있는 경우 틱 증상을 유발시키거나 악화시킬 수 있어 사용하지 않는 것이 좋습니다.\n라. 오전 8시, 12시에 두 번 투여합니다."}, {"major": "소아정신의학", "minor": "운동장애", "qnum": "01", "question": "11세 남아가 1년 전부터 눈을 자주 깜빡이고 킁킁거리는 소리를 내서 병원에 왔다. 8세부터 눈을 자주 깜빡이기 시작했고 9세부터는 어깨를 들썩이거나 머리를 흔드는 행동도 한 시간에 수십 번을 하여 머리와 어깨가 아프다고 한다. 10세에는 킁킁거리며 간혹 \"악\"하는 소리를 너무 크게 내고 산만하여 선생님에게 수업시간에 야단을 맞았다. 진단은?", "textbox": "", "images": [], "options": ["투렛장애", "소아무도병", "잠정적틱장애", "주의력결핍과다활동장애", "지속성운동또는음성틱장애"], "answer": 0, "explanation": "11세 남아가 틱 증상을 주소로 내원하였습니다. 눈깜빡임, 어깨 들썩거림, 머리 흔들기는 운동틱에 해당하고, 킁킁거리는 소리, \"악\"하는 소리는 음성 틱에 해당합니다. 18세 이전 발생하여 1년 이상 지속되고 있고, 기타 다른 의학적 상태에 의한 것이 아닌 경우 투렛장애로 진단할 수 있습니다.2) 소아무도병 : A군 연쇄상구균 감염 후 뇌의 기저핵에서 생긴 자가면역반응으로 인해 발생하는 질환입니다. 움직임 장애가 완전히 불수의적으로 나타나며 뇌전기적 틱 증상이 나타나지 않습니다. 환자의 증상을 고려할 때 부적절합니다.3) 잠정적틱장애 : 증상이 1년 미만 지속될 때 해당됩니다.4) 주의력결핍과다활동장애 : 수업 중 산만한 것으로 주의력결핍과다활동장애가 동반되었을 것이라고 의심할 수 있지만, 현재 주 증상은 투렛장애에 의해 발생했을 가능성이 높으므로 가장 적절한 진단은 투렛장애입니다.5) 지속성운동또는음성틱장애 : 1년 이상 운동 틱 또는 음성 틱 한가지만 지속되는 경우입니다. 본 환아의 경우 다수의 운동 틱과 음성 틱이 공존하므로 부적절합니다."}, {"major": "소아정신의학", "minor": "운동장애", "qnum": "02", "question": "9세 여아가 눈을 자주 깜박거리고 코를 씰룩이며 킁킁거려 병원에 왔다. 유치원에서 눈을 반복적으로 깜박거려 안과에서 검사를 받았으나 이상 소견은 없었다. 그 후 눈을 깜박이는 증상은 저절로 없어졌다가 1년 전부터 다시 발생하여 지속되고 있다. 치료는?", "textbox": "", "images": [], "options": ["리튬", "서트랄린", "아리피프라졸", "프로프라놀롤", "메틸페니데이트"], "answer": 2, "explanation": "운동 틱과 음성 틱이 1년 이상 나타나고 있으므로 뚜렛 장애를 진단할 수 있습니다. 뚜렛 장애의 치료에는 할로페리돌, 피모지드, 리스페리돈 등을 사용합니다. 본 문제에서는 비정형 항정신병 약물인 아리피프라졸을 사용할 수 있습니다."}, {"major": "소아정신의학", "minor": "운동장애", "qnum": "03", "question": "8세 남아이가 1년 전부터 눈을 깜박거리고 머리를 흔들며, 코를 킁킁거리고 '끙', '짹' 등의 이상한 소리를 내고 자신도 모르게 욕설을 뱉는 증상으로 내원하였다. 다음 중 적합한 치료제는?", "textbox": "", "images": [], "options": ["리스페리돈", "플루옥세틴", "이미프라민", "카바마제핀", "메틸페니데이트"], "answer": 0, "explanation": "뚜렛장애\n다양한 운동 틱과 음성 틱이 한 환자에서 동시에 혹은 번갈아서 나타나며 외화증, 반향어 등도 보임.\n가장 효과적인 치료는 약물치료이며 약 2/3에서 haloperidol이나 risperidone같은 항정신병약물에 반응합니다. ADHD가 동반된 경우 clonidine이나 desipramine을 많이 씁니다."}, {"major": "소아정신의학", "minor": "운동장애", "qnum": "04", "question": "10세 남아이가 2개월 전부터 자기도 모르게 '으랏차차'라는 고함을 지르고, 팔을 휘두르는 모습을 보여 병원에 왔다. 4년 전부터 눈을 깜박거리거나 입맛 다시는 제스처를 보이는 등의 증상을 지속적으로 보였다. 적합한 약제는?", "textbox": "", "images": [], "options": ["이미프라민(imipramine)", "플루옥세틴(fluoxetine)", "디아제팜(diazepam)", "할로페리돌(haloperidol)", "메틸페니데이트(methylphenidate)"], "answer": 3, "explanation": "음성틱과 운동틱이 보이고, 운동틱이 1년 이상 지속되었으므로 뚜렛증후군입니다. 뚜렛증후군의 치료는 할로페리돌이 가장 효과적입니다."}, {"major": "소아정신의학", "minor": "운동장애", "qnum": "05", "question": "뚜렛(Tourette)장애와 유전적으로 관련성이 높은 질환은?", "textbox": "", "images": [], "options": ["강박장애", "자폐장애", "행동장애", "경련성질환", "분리불안장애"], "answer": 0, "explanation": "뚜렛장애에는 ADHD, 강박장애와 관련성이 높습니다. 각각 뚜렛장애 환자의 40~50%, 40% 정도에서 나타납니다."}, {"major": "소아정신의학", "minor": "파괴적 기분조절부전장애", "qnum": "01", "question": "8세 남아이가 3개월 전부터 선생님에게 연필을 던지고 침을 뱉으며 선생님을 때려 병원에 왔다. 5세에 어린이집에 갈 때 엄마와 떨어지지 않으려고 했다. 6세에 유치원에서는 물건을 챙기지 못하고 기다리지 못하며 집중하지 못했다. 초등학교에 입학해서는 일부러 옷을 입은 채 오줌을 싸고 담임선생님이 예뻐하는 것 같은 친구들에게 화를 냈다. 2학년이 되어서도 늘 예민했고 하루에도 서너 번씩 욕을 하며 소리를 질렀고 친구와 자주 밀치며 싸우곤 했다. 진단은?", "textbox": "", "images": [], "options": ["적응장애", "품행장애", "순환성장애", "지속성우울장애", "파괴적기분조절장애"], "answer": 4, "explanation": "환아는 현재 파괴적 기분조절 장애의 핵심 증상인 잦은 분노 발작과 분노 발작 사이 과민한 기분이 12개월 이상 지속되고 있습니다. 하루에도 서너 번씩 욕을 하며 소리를 지르는 것으로 보아, 1주일에 3회 이상이라는 진단 기준에도 부합합니다. 학교와 가정 모두에서 해당 증상을 보이며 10세 이전에 증상이 발생하였습니다. 품행장애는 사회적 규범이나 규율을 위반하는 행동이 특징이므로 해당 환자의 증례에는 맞지 않습니다."}, {"major": "소아정신의학", "minor": "파괴적 기분조절부전장애", "qnum": "02", "question": "다음 중 성인과 달리 소아기 우울장애에서 특징적인 것은?", "textbox": "", "images": [], "options": ["우울감 대신 짜증을 흔히 보인다.", "여자에서 2~3배 더 흔히 발생한다.", "가족 중 우울증 발생 빈도가 높다.", "수면다원 검사에서 특이적인 소견을 보인다.", "덱사메타손 억제 검사에서 특이적인 소견이 보인다."], "answer": 0, "explanation": "남녀 빈도 차이가 별로 없고 초등학생인 경우 남>여\n일반 인구에 비해 가족 내 우울증의 빈도가 높지만 성인과의 차이라고 하기는 어렵다.\n수면다원검사와 덱사메타손억제검사에서 특이적 이상소견이 불명확"}, {"major": "소아정신의학", "minor": "선택적 함구증", "qnum": "01", "question": "6세 여아가 유치원에서 말을 하지 않아서 어머니와 함께 외래에 왔다. 유치원에 들어간 지 2개월이 지났는데도 말을 전혀 하지 않고 묻는 말에 고개만 끄덕거린다. 집에서는 10세 언니와 소꿉장난을 하면서 말도 하고 잘 논다고 한다. 진단은?", "textbox": "", "images": [], "options": ["언어장애", "전환장애", "말소리장애", "선택적 함구증", "사회의사소통장애"], "answer": 3, "explanation": "집에서는 말을 하지만 유치원(특정 사회적 상황)에서 말을 하지 않는 증상을 보이고 있으며, 2개월 이상 지속되고 있으므로 선택적 함구증으로 진단할 수 있습니다. 선택적 함구증의 경우 말을 하지 않고 고개를 끄덕이는 등의 다른 방식(눈짓, 몸짓, 글쓰기 등)으로 의사소통하기도 합니다."}, {"major": "소아정신의학", "minor": "선택적 함구증", "qnum": "02", "question": "초등학교 1학년 남아 가 오심 구토 및 두통을 주소로 병원에 왔다. 상기 증상은 초등학교 입학 후 시작되었고 엄마와 떨어지는 것을 불안해하고 싫어하였다. 이 환아에 관한 설명으로 옳은 것은?", "textbox": "", "images": [], "options": ["증상이 호전될 때까지 학교를 보내지 않는다.", "약물치료로 imipramine이 효과적이다.", "학교 가는 것 자체를 두려워하는 것이다.", "환아의 증상은 부모의 불안과 관계없다.", "증상은 등교 시간이 지나면서 급격히 심해진다."], "answer": 1, "explanation": "부모, 가정, 기타 친숙한 환경으로부터 격리되는 데 대한 극심한 불안\n엄마와 떨어지는 것을 불안해하고, 복통/두통/오심/구토 등 신체증상, 불면증에 시달림 → 이별불안장애\n1) 오히려 학교에 최대한 빨리 보내야 합니다.\n2) 약물치료로 imipramine이 효과적입니다.\n3) 학교를 무서워하는 것이 아니라 부모와 떨어져 집을 떠나는 것을 싫어합니다(cf. #품행장애의 무단결석).\n4) 학습이론에 의하면 부모가 소아에게 불안 공포를 심어 줄 수 있다고 합니다.\n5) 아침 일찍 시작되어 등교시간이 지나면 호전됩니다."}, {"major": "소아정신의학", "minor": "선택적 함구증", "qnum": "03", "question": "8세 여아 아이가 초등학교 입학 후부터 어머니와 떨어져 학교에 가는 것을 거부하고 쉽게 불안해하는 증상이 있었다. 아동은 학교 수업시간에도 어머니가 혹시 사고가 나서 집에 없으면 어쩌나 하는 생각에 집중을 하지 못했다. 평소에도 낯선 상황에서는 어머니 곁을 떠나지 못하는 편이라고 하였다. 이 환자에게 적합한 조치는?", "textbox": "", "images": [], "options": ["부모가 무관심하게 대하도록 교육한다.", "안정을 찾을 때까지 집에서 쉬게 한다.", "증세가 심하면 imipramine을 사용한다.", "처음부터 학교수업을 다 받도록 하는 것이 좋다.", "등교를 지속적으로 거부하더라도 통원치료가 좋다."], "answer": 3, "explanation": "1) 부모, 교사를 포함하여 치료\n2) 가능한 한 학교에 빨리 보내도록 격려함이 가장 중요\n3) 우선적으로 사용하는 약물치료\n4), 5) 등교를 너무 지나치게 강요하면 극도의 불안을 보이는 경우가 있으므로 조심해야 합니다."}, {"major": "소아정신의학", "minor": "선택적 함구증", "qnum": "04", "question": "9세 여아가 3개월 전부터 학교를 가지 않으려 하여 어머니와 함께 병원에 왔다. 머리와 배가 아프다며 학교에서 자주 조퇴를 했다. 유괴나 교통사고를 당해서 어머니를 보지 못하면 어떻게 하나 하고 줄곧 걱정을 한다. 혼자서 지내는 것을 무서워해서 어머니가 잠시도 외출을 하지 못할 정도라고 한다. 진단은?", "textbox": "", "images": [], "options": ["광장공포증", "범불안장애", "분리불안장애", "사회불안장애", "선택적함구증"], "answer": 2, "explanation": "3개월 전부터 학교를 가지 않으려는 증상으로 내원한 9세 여아입니다. 학교를 가지 않으려 하고, 유괴나 교통사고 등의 불행한 사건을 걱정하고, 혼자 있는 것에 대한 두려움이 4주 이상 지속되는 것을 통해 분리불안장애를 진단할 수 있습니다."}, {"major": "소아정신의학", "minor": "선택적 함구증", "qnum": "05", "question": "초등학교 3학년 여아가 1개월 전부터 배가 아프다며 조퇴하고 학교에 가지 않으려 했다. 학교에서는 수시로 엄마에게 문자를 보내고 전화를 했다. 집에서는 잘 지내다가도 아빠가 오실 때면 안절부절 못하고 엄마와 함께 자려고 했다. 진단은?", "textbox": "", "images": [], "options": ["선택적함구증", "분리불안장애", "학습장애", "주의력결핍과다활동장애", "반응성애착장애"], "answer": 1, "explanation": "애착의 대상인 엄마와의 이별에 대해 부적절하고 과도한 불안을 보이고 있습니다. 애착대상과 헤어질 때 신체증상(복통)을 보이고 있으며 학교를 가기 싫어하고 애착 인물을 떠나기 싫어하는 등의 증상이 4주 이상 지속되고 있으므로 분리불안장애로 진단할 수 있습니다."}, {"major": "소아정신의학", "minor": "선택적 함구증", "qnum": "06", "question": "초등학교 1학년 남아 가 매일 아침 학교에 가는 것을 거부하여 엄마와 함께 정신과 외래를 방문하였다. 평소 집에서는 잘 지내다가 학교에 갈 시간이 되면 두통, 복통 등 다양한 신체 증상을 호소하였다. 밤에 혼자 자는 것을 무서워해서 항상 엄마 옆에서 잠을 잔다고 하였다. 이 환아에 대한 설명으로 옳은 것은?", "textbox": "가. 자립성 향상을 위해 아이를 억지로 떼어놓아야 한다.\n나. 부모와 선생님이 관심을 갖는 것이 중요하다.\n다. 무슨 일이 있어도 억지로 학교에 가도록 강요해야 한다.\n라. 약물치료로 Imipramine 투여가 효과적이다.", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 2, "explanation": "가, 다. 가능한 한 빨리 학교를 보내도록 격려해야 합니다. 하지만 등교를 너무 지나치게 강요하면 극도의 불안을 보이는 경우가 있으므로 조심해야 합니다. 나. 이때 부모에게도 정신치료를 해야 하며 교사까지 치료과정에 포함시켜야 합니다. 라. 우선적으로 사용하는 약물치료입니다."}, {"major": "소아정신의학", "minor": "소아의 외상 및 스트레스 관련 장애", "qnum": "01", "question": "3세 남아이가 불러도 눈을 마주치지 않아서 병원에 왔다. 태어나면서부터 보육원에서 자랐고 돌봐 주는 사람이 자주 바뀌었다. 낯선 사람과는 어떤 의사소통도 하지 않았고 무관심했다. 보육원 선생님이 말을 걸면 잠시 관심을 보이며 적절히 말을 했다가도 바로 자리를 피했다. 작은 키에 마른 체구로 감정표현이 없고 멍한 표정이었으며, 유별난 관심이나 반복 행동은 없다. 시선을 회피하고 옆에 놓인 장난감에도 관심이 없다. 진단은?", "textbox": "", "images": [], "options": ["사회불안장애", "선택적함구증", "반응성애착장애", "조현성성격장애", "자폐스펙트럼장애"], "answer": 2, "explanation": "반응성 애착장애는 5세 이전에 충분한 보살핌을 받지 못한 것이 원인이 되어 사회적 관계를 맺지 못하는 것이 특징입니다. 성인 양육자에게 억제적인 행동을 보이며, 대부분 영양 상태가 나쁘고, 제한된 감정을 보입니다. 환아는 태어날 때부터 돌봐주는 사람이 자주 바뀌었고, 보육원 선생님에게 양가 감정적이어서 접근하다가 곧 피하는 모습을 보입니다. 또한 작은 키에 마른 체구, 감정표현 없이 멍한 표정을 보여 반응성 애착장애가 가장 의심이 됩니다.1) 사회불안장애 : 남이 지켜보는 것을 두려워하여 회피행동을 보입니다.2) 선택적 함구증 : 가까운 사람과는 말을 잘 하지만, 밖에서 다른 사람하고는 말을 하지 않습니다.4) 조현성 성격장애 : 사회관계에 대한 기피와 대인관계에서의 감정표현 제한이 성인기 초기에 시작됩니다.5) 자폐스펙트럼 장애 : 반응성애착장애와 달리 유별난 관심이나 반복행동이 나타납니다."}, {"major": "소아정신의학", "minor": "소아의 외상 및 스트레스 관련 장애", "qnum": "02", "question": "5세 남자 아이가 유치원에서 친구들과 놀지 않고 혼자서만 놀아 병원에 왔다. 자르지 않은 머리에 비듬이 많고, 냄새가 났으며 키는 작고 마른 체형이었다. 진료실에 있는 장난감을 보고도 흥미를 갖지 않았으며 표정이 거의 없었다. 아이가 치료자에게 관심을 보여 이름을 부르자 곧 모르는 척 했다. 생후 2일 경 고아원 입구에서 발견되어 고아원에서 자랐으며 노쇠한 할머니가 아이를 키웠으나 아이를 잘 돌보지 못하였다. 진단은?", "textbox": "", "images": [], "options": ["자폐장애", "분리불안장애", "아스퍼거장애", "반응성애착장애", "소아기붕괴장애"], "answer": 3, "explanation": "환아는 5세 이전에 양육자로부터 적절한 보살핌을 받지 못해서 사회적 유대관계를 형성하는 능력이 결여되었습니다. 작은 키, 마른 체형에 불량한 청결상태를 보이는 전형적인 양상을 보이며, 주변 사람이나 환경에 대해 무관심한 태도 역시 반응성애착장애를 시사합니다."}, {"major": "소아정신의학", "minor": "배설장애", "qnum": "01", "question": "4세 여아가 아직까지 밤에 소변을 가리지 못해 병원에 왔다. 낮에 활동할 때는 소변을 잘 가렸고, 소변검사 상 이상소견은 관찰되지 않았다. 이 아이에 대한 처치로 적합한 것은?", "textbox": "", "images": [], "options": ["소변을 가리지 못하면 벌을 준다.", "속옷에 벨 경보기를 부착한다.", "밤에 깨워 소변을 보게 한다.", "즉시 약물치료를 시작한다.", "부모에게 양성 경과를 설명하고 1년 동안 지켜본다."], "answer": 4, "explanation": "유뇨증의 DSM-5 진단 기준 : 나이가 5세 이상이거나 또는 동등한 발달 수준이다. 이러한 진단 기준의 항목으로 보아 이 환아는 아직 유뇨증으로 진단하기 어렵습니다. 낮에 소변을 가리는 것이 먼저이고 이 환아는 낮에 소변을 잘 가리고 소변검사상 이상이 없는 것으로 보아 5세가 될 때까지 지켜보는 것이 좋습니다."}, {"major": "소아정신의학", "minor": "배설장애", "qnum": "02", "question": "다음 중 소아 유뇨증에 관한 설명으로 옳은 것은?", "textbox": "", "images": [], "options": ["4세 이상이 되어야 진단 가능하다.", "유전적 소인의 영향은 적다.", "정상적인 수면이 가능하다.", "남아보다 여아에서 흔하다.", "소아기 후기 발병인 경우 예후가 더 좋다."], "answer": 2, "explanation": "1) 5세 이상이 되어야 진단합니다(DSM-5). 2) 환자의 75%에서 부모나 형제 중 유뇨증 병력 3) 최근 연구결과로는 수면주기의 모든 단계에서 나타나며, 수면의 질도 정상이라고 합니다. 4) 남아아가 여아에 비해 두 배 정도 많습니다. 5) 청소년기에 처음 발생하는 경우에는 정신병리가 더 많고 예후가 나쁩니다."}, {"major": "소아정신의학", "minor": "배설장애", "qnum": "03", "question": "7세 남아가 수면 중 소변을 못 가려서 병원을 방문하였다. 이 증상은 주 3회 정도고 4개월째 지속되었다. 소변검사와 복부 초음파 검사는 정상이었다. 행동치료와 함께 사용할 치료제는?", "textbox": "", "images": [], "options": ["리튬", "판큐로늄", "이미프라민", "프로프라놀롤", "사이클로포스파마이드"], "answer": 2, "explanation": "유뇨증의 치료는 부모에 대한 교육과 행동치료를 기본으로 하고 증상이 심할 때에는 약물치료를 고려해야 합니다. 치료약제로는 삼환계 항우울제 중 imipramine이 가장 효과적이며 50~80%에서 증상의 호전이 관찰됩니다."}, {"major": "소아정신의학", "minor": "배설장애", "qnum": "04", "question": "7세 남아이가 1주에 2회 이상 밤에 자다가 소변을 싸서 이불을 적실 때 가장 좋은 치료방법은?", "textbox": "", "images": [], "options": ["경보장치", "oxybutynin", "desmopressin acetate", "이불을 적실 때마다 야단을 친다.", "저절로 좋아지므로 관찰만 한다."], "answer": 0, "explanation": "부모에게 유뇨증에 대해 교육하고 적절한 배변훈련을 우선적으로 시행해야 합니다. 행동치료기법으로 벨-경보 요법이 제안되고 있으며 70% 이상의 환자에서 50% 이상의 치료효과가 있다고 합니다. 증상이 심할 때에는 약물요법을 고려합니다."}, {"major": "소아정신의학", "minor": "배설장애", "qnum": "05", "question": "10세 남아이가 1년 전부터 매일 밤 이불에 소변을 보는 것을 주소로 내원하였다. 그 전에는 정상적으로 대소변을 가렸다고 한다. 이 환아에 관한 설명으로 옳은 조합은?\n가. 특정 심리사회적 스트레스가 원인이 된다.\n나. 일차성 유뇨증으로 진단할 수 있다.\n다. 나이가 들면서 대개는 자연치유 된다.\n라. 취침 전 수분섭취 제한이 효과적이다.", "textbox": "", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 1, "explanation": "가. 특정 심리사회적 스트레스 후에 유뇨증이 생기는 경우가 많습니다.\n나. 중간기(1년 이상) 소변을 가린 기간이 있으면 이차성 야뇨증으로 진단합니다.\n다. 나이가 들면서 중추신경계와 근육계의 성숙과 더불어 자연히 치유되는 경우가 많습니다.\n라. 효과가 명확하지 않다고 합니다. 최신정신의학 6판에는 시도될 수 있다고 나와서 논란이 있을 수 있으나, 과거 문제이므로 참고만 하셔도 될 것 같습니다."}, {"major": "소아정신의학", "minor": "배설장애", "qnum": "06", "question": "다음 중 배설 기능 발달에 관한 설명으로 옳은 조합은?\n가. 가장 먼저 야간 대변가리기가 이루어진다.\n나. 대소변 훈련은 18~24개월에 시작하는 것이 좋다.\n다. 5세 이후에는 밤에 소변을 가린다.\n라. 낮 소변보다 밤 소변을 먼저 가린다.", "textbox": "", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 0, "explanation": "가, 라. 야간대변 - 주간대변 - 주간소변 - 야간소변\n나. 걸음마기에 대부분의 소아는 대소변을 가리기 시작합니다.\n다. 최소한 5세는 되어야 유뇨증을 진단할 수 있습니다."}, {"major": "소아정신의학", "minor": "소아의 파괴적, 충동조절 및 행실 장애", "qnum": "01", "question": "만 1세 남아아가 자신의 맘에 들지 않으면 울고 발작 증상을 보이다가, 청색증이 나타나기도 하였다. 심전도와 뇌파는 정상이었을 때, 이 환아에 대한 조치로 적합한 것은?", "textbox": "", "images": [], "options": ["경과관찰", "항우울제", "항경련제", "항불안제", "심리치료"], "answer": 0, "explanation": "이 환자는 12개월, 울고 발작, 청색증을 보이고 심전도와 뇌파가 정상인 것으로 보아 호흡정지발작입니다. 특별한 치료는 필요 없고 발작보다는 불안이나 좌절감에 관심을 두어야 합니다."}, {"major": "소아정신의학", "minor": "소아의 파괴적, 충동조절 및 행실 장애", "qnum": "02", "question": "정상발달 단계를 보이는 20개월 여아가 자신의 뜻대로 되지 않으면 울고, 심하면 발작과 함께 청색증을 보인다고 한다. 이 환아에 대한 조치로 옳은 것은?\n가. 혈청 전해질검사가 반드시 필요하다.\n나. 두부 전산화 단층 촬영을 실시한다.\n다. 발작을 보일 경우 항경련제를 투여한다.\n라. 부모에게 양성경과를 설명하고 관찰한다.", "textbox": "", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 3, "explanation": "생후 24개월까지 흔히 볼 수 있음. 호흡정지발작으로 주위 어른들을 조종하려 하기도 하지만 부모는 아동의 발작에 관심을 두기보다는 아동의 불안이나 좌절감을 이해하도록 해야 합니다."}, {"major": "소아정신의학", "minor": "소아의 파괴적, 충동조절 및 행실 장애", "qnum": "03", "question": "10세 남자 아이가 4년 전부터 일부러 방을 어지럽히고, 이를 혼내는 어른들에게 화를 내고 말다툼을 하여 병원에 왔다. 2년 전부터는 학교 숙제도 하지 않겠다며 화를 내었고, 방을 어지럽히는 것은 엄마 때문이라고 하는 경우가 많았다. 진단은?", "textbox": "", "images": [], "options": ["충동장애", "적대적반항장애", "간헐적폭발장애", "행실장애", "주의력결핍과다행동장애"], "answer": 3, "explanation": "거부적, 적대적, 반항적 행동을 보이나 사회적 규범을 위반하거나 타인의 권리를 침해하는 정도는 아니므로 적대적 반항장애입니다.3) 간헐적 폭발장애는 보통 10~20대에 진단이 되므로 제외됩니다.4) 재산 파괴, 사람과 동물에 대한 공격 등이 없기 때문에 품행장애도 제외됩니다.5) 주의력 결핍 및 행동 과다 증상도 없기 때문에 주의력 결핍과다 행동장애도 제외됩니다."}, {"major": "소아정신의학", "minor": "소아의 파괴적, 충동조절 및 행실 장애", "qnum": "04", "question": "15세 남자 환아가 부모와 잦은 말다툼으로 내원하였다. 타인을 괴롭히거나 사회 규범을 위반하지는 않았다. 부모의 지시를 잘 따르지 않는데 그 이유는 잔소리 때문이었다고 하였다. 진단은?", "textbox": "", "images": [], "options": ["행실장애", "적대적반항장애", "ADHD", "MDD", "적응장애"], "answer": 1, "explanation": "거부적, 적대적, 반항적 행동이 주요 증상이나, 사회적 규범을 위반하거나 타인의 권리를 침해하지 않는 것으로 보아 품행장애와 구별되는 적대적 반항장애에 해당한다고 볼 수 있습니다."}, {"major": "소아정신의학", "minor": "호흡정지 발작과 분노 발작", "qnum": "01", "question": "65세 남자가 은퇴 후 동창 모임에 갔다 온 뒤, 같이 늙어가는 것들이 돈 좀 있다고 목에 힘주고 으스대는 모습을 보고 조그마한 일에도 화를 내었다. 특히 자존심을 건드리는 말이나 행동에 민감한 반응을 보였다. 이 사람의 노년기 심리 변화에 해당하는 것은?", "textbox": "", "images": [], "options": ["자기애", "의존성", "독단성", "애착심", "정확성"], "answer": 0, "explanation": "자존심의 손상을 받으면 자기애적 발달단계로 퇴행합니다."}, {"major": "소아정신의학", "minor": "호흡정지 발작과 분노 발작", "qnum": "02", "question": "다음 중 노년기 정상 노화의 과정에 해당하는 것은?", "textbox": "", "images": [], "options": ["능동성 증가", "독단성 감소", "의존성과 순응성 감소", "자기애적 단계로의 퇴행", "친근한 사물에 대한 애착심 감소"], "answer": 3, "explanation": "노년기에 들면 이기주의, 의존성, 내향성, 수동성, 독단성, 경직성, 조심성, 순응주의 경향이 뚜렷해지며, 친근한 사물에 대한 애착심이 강해집니다. 자기애 : 노년기는 제2의 유년기, 자기중심적, 의존적으로 변한다. 부정, 투사, 위축 등 원시적 방어기제 동원"}, {"major": "노인정신의학", "minor": "노화에 따른 정신사회적 변화", "qnum": "01", "question": "86세 남자가 집에 쓰러져 있는 것을 1시간 전에 발견하여 지역 사회복지사가 데리고 응급실에 왔다. 남자는 식사를 거의 못했고, 집에는 썩은 음식과 쓰레기가 가득 차 있었다고 한다. 함께 사는 아들은 거의 집에 들어오지 않는다고 한다. 혈압 119/79mmHg, 맥박 81회/분, 호흡 22회/분, 체온 36.6℃이다. 날짜 감각은 있고, 병원에 와 있다는 것을 인지하고 있다. 다소 위축된 태도였지만 협조적으로 면담하였다. 오랫동안 세탁을 하지 않아 오물이 많이 묻은 옷을 입고 있다. 위생 상태도 불량하여 남자에게서 냄새가 많이 난다. 혈액검사 결과는 다음과 같다. 원인은?", "textbox": "혈색소 8.7g/dL", "images": [], "options": ["섬망", "학대", "조현병", "저장장애", "외상후스트레스장애"], "answer": 1, "explanation": "86세 노인이 의식을 잃고 쓰러져 발견되었습니다. 개인 위생상태가 불량하고, 식사를 거의 못했다고 하며 혈색소 수치가 낮아 영양부족이 의심되며, 집에는 썩은 음식과 쓰레기가 가득 차 있고 보호자인 아들은 거의 집에 들어오지 않는다고 하는 것으로 볼 때 방임에 해당하는 노인 학대입니다. 현재 섬망에 문제가 없고 협조적으로 면담도 가능하기 때문에 섬망의 가능성은 낮습니다. 또한 다른 정신장애의 증거를 찾을 수 없기 때문에 이 환자의 원인은 학대가 가장 적절합니다."}, {"major": "노인정신의학", "minor": "노화에 따른 정신사회적 변화", "qnum": "02", "question": "85세 여자가 넘어져 병원에 왔다. 파킨슨병으로 진단을 받았으나 치료는 못 받았고 배회하다가 자주 넘어졌다. 자녀들은 경제적인 이유로 병원이나 보호기관에도 데려가지 않으며 부양을 서로 미루어서 혼자서 자신의 집에서 힘들게 살고 있다. 단순한 찰과상 외 큰 외상은 없다. 대처는?", "textbox": "", "images": [], "options": ["찰과상을 치료하고 귀가시킨다.", "외상이 없다면 학대는 배제한다.", "할머니의 정신적 문제를 확인한다.", "벤조디아제핀 계열의 약물을 처방한다.", "할머니 요구대로 학대를 숨기는 데 협조한다."], "answer": 2, "explanation": "노인학대에 관한 문제로 2020년 국시에 처음 출제되었습니다. 고령의 환자가 자녀들에게 방임을 당하고 있는 상태로 노인학대에 해당합니다. 이에 대한 대처로는 우선 피해자의 정신적, 신체적, 성적 문제를 확인하고 평가해야 합니다."}, {"major": "노인정신의학", "minor": "노화에 따른 정신사회적 변화", "qnum": "03", "question": "정상적인 노화과정에서 감퇴하지 않고 평생 동안 유지되는 인지기능은?", "textbox": "", "images": [], "options": ["동작성지능(performance intelligence)", "언어성지능(verbal intelligence)", "삽화기억(episodic memory)", "작업 기억(working memory)", "최근 기억(recent memory)"], "answer": 1, "explanation": "언어성 지능은 비교적 안정되어 있으나, 시공간적 기술에 주로 의존하는 동작성 지능은 감퇴됩니다. 또한 노인에서 2차 기억은 분명히 장애가 있으나, 그 외 기억들은 분명한 장애가 관찰되지 않습니다. 여기서 2차 기억이란, recent memory, remote memory 등을 의미합니다. 언어성 지능은 semantic memory의 일종으로, 토끼를 보고 “토끼”라고 말할 수 있는 지능입니다. 인생 전반에 걸쳐 증가합니다. 요약하자면 semantic memory는 일생에 걸쳐 증가하며, 그 외 인지기능은 전반적으로 감소한다고 생각하시면 됩니다."}, {"major": "노인정신의학", "minor": "노화에 따른 정신사회적 변화", "qnum": "04", "question": "다음 중 노화에 따른 정상적인 신체·심리적 변화로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["정상 기능을 하는 뇌신경세포 수가 감소한다.", "친근한 사물에 대한 애착심이 감소한다.", "전반적인 인지 기능이 저하된다.", "시각 및 청각 기능이 저하된다.", "매사에 자신감이 감소된다."], "answer": 1, "explanation": "2) 친근한 사물에 대한 애착심이 강해집니다."}, {"major": "노인정신의학", "minor": "노인환자의 약물치료 원칙", "qnum": "04", "question": "82세 남자가 구급차에 실려 병원에 왔다. 8개월 전부터 걸음걸이가 느려지며 쉽게 넘어졌다. 이러한 증상을 자녀들에게 이야기해도 무시하고, 병원에서 검사가 필요하다고 권유해도 자녀들은 경제적인 이유로 거절하였다고 한다. 자녀들이 부양을 거부하여 환자는 끼니를 거를 때가 많았고 일상생활의 어려움에도 불구하고 현재 집에서 홀로 지낸다. 무료급식이라도 먹으려고 나갔다가 넘어진 후 일어날 수가 없어서 지나가던 사람이 119에 신고를 했다. 자녀에게 연락했지만 병원에 오지 않았다. 무릎이 아프다고 하지만 큰 외상은 없다. 우선해야 할 조치는?", "textbox": "", "images": [], "options": ["대처교육", "법률지원", "보호입원", "학대신고", "의료비지급"], "answer": 3, "explanation": "고령의 환자가 자녀들에게 방임(보호자로서 책임이나 의무를 거부, 불이행 혹은 포기하여 노인의 의식주 및 의료를 적절하게 제공하지 않는 행위)을 당하고 있는 상태로 노인학대에 해당합니다. 노인복지법에 따르면 “의료기관에서 의료업무를 행하는 의료인은 그 직무상 65세 이상의 사람에 대한 노인학대를 알게 된 때에는 즉시 노인보호전문기관 또는 수사기관에 신고하여야 한다”라고 규정하고 있으므로, 우선 학대신고를 하여야 합니다."}, {"major": "노인정신의학", "minor": "노인환자의 약물치료 원칙", "qnum": "05", "question": "다음 중 노인에서 정신과적 약물치료를 할 때 주의해야 할 사항으로 옳은 것은?", "textbox": "가. 통상 성인 용량의 1/2~1/3로 시작한다.\n나. 일반 성인 용량을 분복하면 체내에 축적되는 경향이 있다.\n다. 용량 증가는 부작용에 주의하며 서서히 시행한다.\n라. 약물 사용을 싫어하므로 하루에 한 번 복용할 수 있게 한다.", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 0, "explanation": "가. 약물은 소량부터 시작\n나. 약물의 흡수, 결합, 대사, 배설 저하\n다. 조심스럽게 서서히 증량\n라. 하루 용량을 3~4회 분복"}, {"major": "노인정신의학", "minor": "노인환자의 약물치료 원칙", "qnum": "06", "question": "다음 중 노인의 정신과적 약물치료에 관한 설명으로 옳은 조합은?", "textbox": "가. 적은 용량부터 시작하여 서서히 증량한다.\n나. 벤조디아제핀의 경우 반감기가 짧은 것을 사용한다.\n다. 체지방 증가로 지용성 약물의 효과가 오래 갈 수 있다.\n라. 알부민 감소로 복합약물치료 시 부작용의 위험이 낮다.", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 0, "explanation": "라. 동시다발성 질병 때문에 각종 약물들을 동시에 복용하는 경우가 흔하기 때문에 각종 약물의 부작용이나 약물 상호간의 작용으로 부정적인 효과가 나타날 위험이 높습니다."}, {"major": "노인정신의학", "minor": "노인학대", "qnum": "01", "question": "66세 여자가 기억력 저하로 병원에 왔다. 2개월 전부터 가스불을 켜거나 수도꼭지를 잠그지 않은 것을 잊어버리는 일이 잦아졌고 출입문 비밀번호를 잊어버려 외출 후 집에 들어가지 못하는 일이 반복되었다. 3개월 전부터 공허하고 만사가 다 귀찮고 재미없어 하루 종일 아무것도 하지 않고 누워서 잠만 자려고 했다. 입맛이 없다며 식사도 자주 걸러 체중이 3개월 동안 5kg이 빠졌다. 간이정신상태검사에서 대부분의 질문에 대답하지 않거나 모르겠다고 한다. 신경학적 검사와 뇌 자기공명영상 결과는 정상이다. 치료는?", "textbox": "", "images": [], "options": ["도네페질", "클로자핀", "보티옥세틴", "지프라시돈", "클로나제팜"], "answer": 2, "explanation": "2개월 전부터 기억력 감소와 함께 3개월 전부터 우울, 삶에 대한 흥미 감소, 과다 수면, 체중 감소 등이 신경인지장애보다 우울증으로 인한 가성치매의 가능성이 더 높은 모습입니다. MMSE에서 질문을 틀리는 것이 아닌 대답을 회피하는 모습 또한 가성치매의 가능성이 더 높음을 시사합니다. 노년기 우울증에는 항우울제를 사용하되, 부작용을 고려하여 사용합니다. 보기 중 항우울제는 보티옥세틴이 유일합니다. 비교적 자주 다루지 않았던 항우울제가 나와서 헷갈렸던 문제였습니다."}, {"major": "노인정신의학", "minor": "노인학대", "qnum": "02", "question": "72세 여자가 두 달 전부터 기억력이 떨어진다고 병원에 왔다. 이전과 달리 즐거운 일이 하나도 없었고 모든 것이 귀찮고 피곤하다며 움직이지 않으려고 하였다. 간이정신상태검사(MMSE) 점수는 27점이었고 학력은 초등학교 졸업이었다. 검사 중 조금만 어려워도 모른다고 포기하였으나 주의력과 집중력은 비교적 잘 보존되어 있었다. 치료는?", "textbox": "", "images": [], "options": ["도네페질(donepezil)", "둘록세틴(duloxetine)", "로라제팜(lorazepam)", "갈란타민(galantamine)", "발프로산(valproic acid)"], "answer": 1, "explanation": "두 달 전부터 기억력이 떨어지고 있고 기분 변화도 동반된 환자입니다. 주의력과 집중력이 잘 보존되어 있으며 MMSE 점수가 높은 것으로 보아 치매보다는 노인성 우울증으로 생각됩니다. 치료는 SSRI로 합니다. 항우울제 중에서도 duloxetine은 SNRI에 속하며 기분의 호전 뿐 아니라 인지기능의 향상에도 효과가 있으며, 통증을 감소시키는 역할도 하므로 노인성 우울증에서 효과적이라고 합니다."}, {"major": "노인정신의학", "minor": "노인학대", "qnum": "04", "question": "82세 남자가 구급차에 실려 병원에 왔다. 8개월 전부터 걸음걸이가 느려지며 쉽게 넘어졌다. 이러한 증상을 자녀들에게 이야기해도 무시하고, 병원에서 검사가 필요하다고 권유해도 자녀들은 경제적인 이유로 거절하였다고 한다. 자녀들이 부양을 거부하여 환자는 끼니를 거를 때가 많았고 일상생활의 어려움에도 불구하고 현재 집에서 홀로 지낸다. 무료급식이라도 먹으려고 나갔다가 넘어진 후 일어날 수가 없어서 지나가던 사람이 119에 신고를 했다. 자녀에게 연락했지만 병원에 오지 않았다. 무릎이 아프다고 하지만 큰 외상은 없다. 우선해야 할 조치는?", "textbox": "", "images": [], "options": ["대처교육", "법률지원", "보호입원", "학대신고", "의료비지급"], "answer": 3, "explanation": "고령의 환자가 자녀들에게 방임(보호자로서 책임이나 의무를 거부, 불이행 혹은 포기하여 노인의 의식주 및 의료를 적절하게 제공하지 않는 행위)을 당하고 있는 상태로 노인학대에 해당합니다. 노인복지법에 따르면 “의료기관에서 의료업무를 행하는 의료인은 그 직무상 65세 이상의 사람에 대한 노인학대를 알게 된 때에는 즉시 노인보호전문기관 또는 수사기관에 신고하여야 한다”라고 규정하고 있으므로, 우선 학대신고를 하여야 합니다."}, {"major": "노인정신의학", "minor": "노인학대", "qnum": "05", "question": "다음 중 노인에서 정신과적 약물치료를 할 때 주의해야 할 사항으로 옳은 것은?", "textbox": "가. 통상 성인 용량의 1/2~1/3로 시작한다.\n나. 일반 성인 용량을 분복하면 체내에 축적되는 경향이 있다.\n다. 용량 증가는 부작용에 주의하며 서서히 시행한다.\n라. 약물 사용을 싫어하므로 하루에 한 번 복용할 수 있게 한다.", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 0, "explanation": "가. 약물은 소량부터 시작\n나. 약물의 흡수, 결합, 대사, 배설 저하\n다. 조심스럽게 서서히 증량\n라. 하루 용량을 3~4회 분복"}, {"major": "노인정신의학", "minor": "노인학대", "qnum": "06", "question": "다음 중 노인의 정신과적 약물치료에 관한 설명으로 옳은 조합은?", "textbox": "가. 적은 용량부터 시작하여 서서히 증량한다.\n나. 벤조디아제핀의 경우 반감기가 짧은 것을 사용한다.\n다. 체지방 증가로 지용성 약물의 효과가 오래 갈 수 있다.\n라. 알부민 감소로 복합약물치료 시 부작용의 위험이 낮다.", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 0, "explanation": "라. 동시다발성 질병 때문에 각종 약물들을 동시에 복용하는 경우가 흔하기 때문에 각종 약물의 부작용이나 약물 상호간의 작용으로 부정적인 효과가 나타날 위험이 높습니다."}, {"major": "노인정신의학", "minor": "노년기 우울증", "qnum": "03", "question": "환자와 보호자가 병원에 내원하였다. 다음 면담 내용을 바탕으로 환자에게 필요한 치료는?", "textbox": "(환자와 딸이 같이 외래에 내원했다)\n• 의사 : 안녕하세요. 어디가 불편해서 오셨나요?\n• 환자 : (걱정하는 표정으로) 제가 기억력이 2~3달 전부터 떨어져요.\n• 의사 : 옛날 일이 기억이 안나세요? 최근 일이 기억이 안나시나요?\n• 환자 : 방금 들은 것도 그렇고, 옛날것도 기억이 잘 안나는거 같아요.\n• 의사 : 알겠습니다. 간단한 테스트를 좀 진행해보겠습니다. 제가 말하는 단어 따라해보세요. 나무, 모자, 자동차\n• 환자 : 아..아유 안돼요. 못하겠어요.\n• 의사 : (딸을 바라보며) 따님이 보시기에는 최근에 기억력 이외에도 달라진 점이 있어보이나요?\n• 딸 : 제 어머니께서 원래 부지런한 분이셨는데, 넉달 쯤 전에 아버 지께서 돌아가시고 그때부터 집안일도 안하고 하루 한끼도 겨 우 먹는 것 같다. 그때부터 잘 움직이지도 않고 잠도 잘 못주 무시는거 같아요.", "images": [], "options": ["메만틴", "부스피론", "파록세틴", "아토목세틴", "리스페리돈"], "answer": 2, "explanation": "기억력 장애를 호소하는 환자입니다. MMSE 에서 대답을 회피하는 모습을 보이고, 최근에 식욕 저하, 의욕 저하, 수면 장애 등의 문제도 있기 때문에 우울증으로 인한 가성 치매가 의 심되는 상황입니다. 이에 대해 SSRI인 파록 세틴을 사용할 수 있습니다."}, {"major": "노인정신의학", "minor": "노년기 우울증", "qnum": "04", "question": "72세 남자가 2개월 전부터 기억력이 떨어졌다고 병원에 왔 다. 우울하고 의욕이 없으며 식욕도 떨어져 체중이 5kg 줄었다. 밤에 잠도 잘 오지 않는다고 한다. 1년 전에도 기억력이 떨어지고 잠을 잘 못 자서 병원에 왔으며 그 당시 간이정신상태 검사는 29점이었다. 2년 전부터 파킨슨병으로 치료를 받고 있다. 오늘 시행한 간이정신상태검사는 27점 이다. 치료는?", "textbox": "", "images": [], "options": ["날트렉손", "발프로산", "플루옥세틴", "할로페리돌", "리바스티그민"], "answer": 2, "explanation": "2개월 전부터 기억력 저하, 우울함, 흥미감소, 체중감소, 수면장애를 호소하며, MMSE 점 수가 높은 것으로 보아 우울증이 가장 의심이 됩니다. 1년 전에도 파킨슨병으로 치료를 받 고 있기에 파킨슨병에 동반된 우울증으로 추 측할 수 있습니다. SSRI는 파킨슨병에 동반 된 우울증에서 도움이 되고 노년기 우울증의 일차선택약제입니다. 보기 중 플루옥세틴이 SSRI에 해당합니다. 추가로 파킨슨병에 동반 된 우울증인 경우 전기경련요법이 우울증과 운동 증상을 모두 호전시킬 수 있다고 합니다.1) 날트렉손 : 알코올사용장애 환자에서 보상 효과 감소를 위해 사용합니다.2) 발프로산 : 항경련제, 양극성장애와 뇌전 증에 사용합니다.4) 할로페리돌 : 정형 항정신병약물5) 리바스티그민 : 인지기능개선제, 치매에서 사용합니다."}, {"major": "노인정신의학", "minor": "노년기 우울증", "qnum": "05", "question": "다음 중 노년기 우울증의 특징으로 옳은 것은?", "textbox": "", "images": [], "options": ["신체적 증상 호소는 드물다.", "인지기능은 정상적으로 유지된다.", "망상장애와 감별이 힘들다.", "성인기에 비해 재발은 드물다.", "배우자 상실과 관계가 없다."], "answer": 2, "explanation": "신체적 증상 호소가 많습니다. 인지기능 장애 동반이 흔합니다. 질병망상, 빈곤망상, 허무망상이 흔합니다. 재발이 더 빈번합니다. 관계가 있습니다."}, {"major": "노인정신의학", "minor": "노년기 우울증", "qnum": "06", "question": "다음 중 고령의 우울증 환자에서 볼 수 있는 모습은?", "textbox": "", "images": [], "options": ["대부분 신체적으로는 건강하다.", "식욕과 체중 증가가 흔하다.", "인지기능은 정상적으로 유지된다.", "부적절한 죄책감이 흔하다.", "증상은 주로 오후에 심해진다."], "answer": 3, "explanation": "신체적 증상 호소가 많습니다. 식욕감소, 체중감소가 더 흔합니다. 인지기능 장애 동반이 흔합니다. 부적절하거나 과도한 죄책감이 흔합니다. 우울감이 아침에 악화됩니다."}, {"major": "노인정신의학", "minor": "노년기 우울증", "qnum": "07", "question": "다음 중 노년기 우울장애에 관한 설명으로 옳은 조합은?", "textbox": "가. 성인기에 비해 자살률이 더 낮다.\n나. 나이가 들수록 여성에서 더 많이 발병한다.\n다. 성인기 우울증에 비해 재발이 더 적다.\n라. 신체 증상을 호소하는 경우가 많다.", "images": [], "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": 2, "explanation": "가. 자살률이 더 높습니다. 다. 재발이 더 흔합니다."}, {"major": "사법지역사회 정신의학", "minor": "정신의학과 법", "qnum": "01", "question": "정신과 영역에서 환자의 기밀유지(confidentiality)를 지켜야 하는 경우는?1) 환자가 살인 가능성이 높은 경우2) 환자가 자살 가능성이 높은 경우3) 환자가 비행기 조종사인데 심한 판단의 장애를 보이는 경우4) 환자를 치료하는 다른 치료진과 검사, 치료 결과 등을 토론하는 경우5) 환자가 정신과에 입원한 사실이 있는 경우", "textbox": "", "images": [], function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function scrollTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

// ════════ 필터 모달 ════════
function openFilterModal() {
  buildMajorOptions();
  buildMinorOptions();
  document.getElementById('filter-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeFilterModal() {
  document.getElementById('filter-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function onOverlayClick(e) {
  if (e.target.id === 'filter-overlay') closeFilterModal();
}
function resetFilter() {
  activeMajor = 'all';
  activeMinor = 'all';
  buildMajorOptions();
  buildMinorOptions();
  applyFilters();
  updateFab();
}

function orderedMajorList() {
  const seen = new Set();
  const ordered = [];
  MAJOR_ORDER.forEach(m => { if (RAW.some(q => q.major === m)) { ordered.push(m); seen.add(m); } });
  RAW.forEach(q => { if (q.major && !seen.has(q.major)) { ordered.push(q.major); seen.add(q.major); } });
  return ordered;
}

function orderedMinorList(major) {
  const pool = RAW.filter(q => q.major === major);
  const csvOrder = MINOR_BY_MAJOR[major] || [];
  const seen = new Set();
  const ordered = [];
  csvOrder.forEach(s => { if (pool.some(q => q.minor === s)) { ordered.push(s); seen.add(s); } });
  pool.forEach(q => { if (q.minor && !seen.has(q.minor)) { ordered.push(q.minor); seen.add(q.minor); } });
  return ordered;
}

function buildMajorOptions() {
  const wrap = document.getElementById('major-options');
  wrap.innerHTML = '';
  const hint = document.getElementById('major-hint');
  hint.textContent = `${orderedMajorList().length}개 단원 · 총 ${RAW.length}문항`;

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-option' + (activeMajor === 'all' ? ' active' : '');
  allBtn.innerHTML = `<span class="opt-label">전체</span><span class="opt-cnt">${RAW.length}</span>`;
  allBtn.onclick = () => chooseMajor('all');
  wrap.appendChild(allBtn);

  orderedMajorList().forEach(m => {
    const count = RAW.filter(q => q.major === m).length;
    const btn = document.createElement('button');
    btn.className = 'filter-option' + (activeMajor === m ? ' active' : '');
    btn.innerHTML = `<span class="opt-label">${escapeHtml(m)}</span><span class="opt-cnt">${count}</span>`;
    btn.onclick = () => chooseMajor(m);
    wrap.appendChild(btn);
  });
}

function buildMinorOptions() {
  const wrap = document.getElementById('minor-options');
  const hint = document.getElementById('minor-hint');
  wrap.innerHTML = '';

  if (activeMajor === 'all') {
    hint.textContent = '대단원을 먼저 선택하세요';
    wrap.innerHTML = '<div class="filter-minor-empty">대단원을 선택하면 소단원이 표시됩니다</div>';
    return;
  }

  const minors = orderedMinorList(activeMajor);
  const pool = RAW.filter(q => q.major === activeMajor);
  hint.textContent = `${activeMajor} · ${minors.length}개 소단원 · ${pool.length}문항`;

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-option' + (activeMinor === 'all' ? ' active' : '');
  allBtn.innerHTML = `<span class="opt-label">전체</span><span class="opt-cnt">${pool.length}</span>`;
  allBtn.onclick = () => chooseMinor('all');
  wrap.appendChild(allBtn);

  minors.forEach(s => {
    const count = pool.filter(q => q.minor === s).length;
    const btn = document.createElement('button');
    btn.className = 'filter-option' + (activeMinor === s ? ' active' : '');
    btn.innerHTML = `<span class="opt-label">${escapeHtml(s)}</span><span class="opt-cnt">${count}</span>`;
    btn.onclick = () => chooseMinor(s);
    wrap.appendChild(btn);
  });
}

function chooseMajor(m) {
  activeMajor = m;
  activeMinor = 'all';
  buildMajorOptions();
  buildMinorOptions();
  applyFilters();
  updateFab();
  if (m === 'all') closeFilterModal();
}

function chooseMinor(s) {
  activeMinor = s;
  buildMinorOptions();
  applyFilters();
  updateFab();
  closeFilterModal();
}

function applyFilters() {
  let pool = [...RAW];
  if (activeMajor !== 'all') pool = pool.filter(q => q.major === activeMajor);
  if (activeMinor !== 'all') pool = pool.filter(q => q.minor === activeMinor);
  questions = pool;
  current   = 0;
  answers   = {};
  updateStats();
  renderDots();
  renderQuestion();
}

function updateFab() {
  const labelEl = document.getElementById('fab-label');
  const countEl = document.getElementById('fab-count');
  let label;
  if (activeMajor === 'all')      label = '전체 단원';
  else if (activeMinor === 'all') label = activeMajor;
  else                            label = `${activeMajor} · ${activeMinor}`;
  labelEl.textContent = label;
  countEl.textContent = questions.length + '문항';
}

// ════════ NAV DOTS ════════
function renderDots() {
  const wrap = document.getElementById('nav-dots');
  wrap.innerHTML = '';
  questions.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'nav-dot';
    dot.textContent = i + 1;
    if (i === current) dot.classList.add('current');
    else if (answers[i]) dot.classList.add(answers[i].correct ? 'correct' : 'wrong');
    dot.onclick = () => goTo(i);
    wrap.appendChild(dot);
  });
  const active = wrap.children[current];
  if (active) active.scrollIntoView({ inline: 'center', block: 'nearest' });
}

// ════════ STATS ════════
function updateStats() {
  const total    = questions.length;
  const answered = Object.keys(answers).length;
  const correct  = Object.values(answers).filter(a => a.correct).length;
  const wrong    = answered - correct;
  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent   = wrong;
  document.getElementById('stat-rate').textContent    = answered > 0 ? Math.round(correct / answered * 100) + '%' : '—';
  const pct = total > 0 ? Math.round(answered / total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
}

      <div class="q-meta">
        <span class="q-major-badge">${escapeHtml(q.major || '기타')}</span>
        ${q.minor ? `<span class="q-minor-badge">${escapeHtml(q.minor)}</span>` : ''}
        <span class="q-num">${qnumLabel} &nbsp;·&nbsp; ${current + 1} / ${questions.length}</span>
      </div>
      <div class="q-body">
        <p class="q-text">${escapeHtml(q.question || '')}</p>
        ${tbHTML}
        ${imgHTML}
        <div class="options-list">${optsHTML}</div>
      </div>
      ${explHTML}
      <div class="action-row">
        <button class="btn-nav" onclick="prevQ()" ${isFirst ? 'disabled' : ''}>← 이전</button>
        <span class="kbd-hint"><kbd>1</kbd>–<kbd>5</kbd> 선택 · <kbd>→</kbd> 다음</span>
        <button class="btn-next" onclick="nextQ()">${isLast ? '결과 보기 →' : '다음 →'}</button>
      </div>
    </div>`;
}

// ════════ 상호작용 ════════
function choose(i) {
  if (answers[current]) return;
  const q = questions[current];
  answers[current] = { selected: i, correct: (i === q.answer) };
  updateStats();
  renderDots();
  renderQuestion();
}
function prevQ() { if (current > 0) { current--; renderQuestion(); renderDots(); scrollTop(); } }
function nextQ() {
  if (current < questions.length - 1) { current++; renderQuestion(); renderDots(); scrollTop(); }
  else { showScore(); }
}
function goTo(i) {
  current = i;
  document.getElementById('score-container').classList.add('hidden');
  document.getElementById('quiz-container').classList.remove('hidden');
  renderQuestion(); renderDots(); scrollTop();
}

// ════════ 점수 화면 ════════
function showScore() {
  const total   = questions.length;
  const correct = Object.values(answers).filter(a => a.correct).length;
  const wrong   = Object.values(answers).filter(a => !a.correct).length;
  const skip    = total - Object.keys(answers).length;
  const pct     = total > 0 ? Math.round(correct / total * 100) : 0;

  let trophy = '🥇', msg = '완벽합니다!';
  if (pct < 40)       { trophy = '📚'; msg = '더 열심히 공부해봐요!'; }
  else if (pct < 60)  { trophy = '💪'; msg = '조금 더 노력이 필요해요.'; }
  else if (pct < 80)  { trophy = '👍'; msg = '잘 하고 있어요!'; }
  else if (pct < 100) { trophy = '🏆'; msg = '훌륭한 성적입니다!'; }

  document.getElementById('quiz-container').classList.add('hidden');
  const sc = document.getElementById('score-container');
  sc.classList.remove('hidden');
  sc.innerHTML = `
    <div class="score-screen">
      <div class="score-trophy">${trophy}</div>
      <h2 class="score-title">${pct}점 — ${msg}</h2>
      <p class="score-sub">총 ${total}문항 완료</p>
      <div class="score-grid">
        <div class="score-stat"><div class="score-stat-num">${correct}</div><div class="score-stat-label">정답</div></div>
        <div class="score-stat"><div class="score-stat-num wrong">${wrong}</div><div class="score-stat-label">오답</div></div>
        <div class="score-stat"><div class="score-stat-num" style="color:var(--gold-600)">${skip}</div><div class="score-stat-label">미응답</div></div>
      </div>
      <button class="btn-restart" onclick="restart()">다시 풀기</button>
    </div>`;
}
function restart() {
  current = 0; answers = {};
  document.getElementById('score-container').classList.add('hidden');
  document.getElementById('quiz-container').classList.remove('hidden');
  updateStats(); renderDots(); renderQuestion(); scrollTop();
}

// ════════ 라이트박스 ════════
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ════════ 키보드 ════════
document.addEventListener('keydown', e => {
  if (document.getElementById('pwd-gate').style.display !== 'none') return;
  if (document.getElementById('filter-overlay').classList.contains('open')) {
    if (e.key === 'Escape') closeFilterModal();
    return;
  }
  if (e.key === 'Escape')     closeLightbox();
  if (e.key >= '1' && e.key <= '5') {
    const idx = parseInt(e.key) - 1;
    const q = questions[current];
    if (q && q.options && idx < q.options.length && !answers[current]) choose(idx);
  }
  if (e.key === 'ArrowRight') nextQ();
  if (e.key === 'ArrowLeft')  prevQ();
});

// ════════ 앱 초기화 ════════
function initApp() {
  updateStats();
  renderDots();
  renderQuestion();
  updateFab();
}
</script>
</body>
</html>
