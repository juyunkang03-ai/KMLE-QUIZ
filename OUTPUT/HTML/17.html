의 종류에 따르는 명칭 앞에 그 개설기관의 명칭과 “부속”이라는 문자를 붙여야 합니다.\n⑤ 종합병원의 경우에는 종합병원 또는 병원이라고 씁니다."}, {"major": "의료법(의료기관)", "minor": "의료기관 인증", "qnum": "18", "question": "성형외과의원을 개원한 의사 이모씨는 일간신문에 광고를 내려고 한다. 의료광고심의위원회에서 허가한 사항은 무엇인가?", "textbox": "", "images": [], "options": ["실제 환자의 치료경험담", "평가받기 직전의 혁신적인 신의료기술 광고", "미국연수 3개월의 경력", "진료시간, 주차시설에 관한 광고", "다른 병원과 비교하는 내용"], "answer": 3, "explanation": "의료광고의 금지 기준 (시행령 제23조)\n1) 환자의 치료경험담 광고 금지\n2) 신의료기술평가를 받지 아니한 신의료기술 광고 금지\n3) 6개월 이하의 임상경력 광고 금지\n4) 가능합니다.\n5) 다른 의료기관을 비방할 목적으로 해당 의료기관의 불리한 사실 광고 금지"}, {"major": "의료법(의료기관)", "minor": "의료기관 인증", "qnum": "19", "question": "의료기관이 표시할 수 있는 진료과목은 무엇인가?", "textbox": "", "images": [], "options": ["가정의학과", "순환기내과", "예방의학과", "소아흉부외과", "여성의학과"], "answer": 0, "explanation": "진료과목의 표시(시행규칙 제41조) 제1항제2호\n병원·정신병원이나 의원 : 내과, 신경과, 정신건강의학과, 외과, 정형외과, 신경외과, 심장혈관흉부외과, 성형외과, 마취통증의학과, 산부인과, 소아청소년과, 안과, 이비인후과, 피부과, 비뇨의학과, 영상의학과, 방사선종양학과, 병리과, 진단검사의학과, 재활의학과, 결핵과, 예방의학과, 가정의학과, 핵의학과, 직업환경의학과 및 응급의학과"}, {"major": "의료법(의료기관)", "minor": "의료기관 인증", "qnum": "20", "question": "요양병원을 개설 운영하고 있는 의사 '갑'은 의료기관 인증평가를 받은 후 의료기관 인증서를 교부받았다. 의사 '갑'이 요양병원 진료내용과 인증 결과를 시내버스 차량의 외부 옆면에 광고하기 위해 미리 심의를 받으려 할 때 의료광고 심의신청서를 제출해야 하는 기관은?", "textbox": "", "images": [], "options": ["대한의사협회", "의료기관인증평가원", "건강보험심사평가원", "국민건강보험공단", "한국보건의료연구원"], "answer": 0, "explanation": "광고의 심의(제57조) 제2항\n다음 각 호의 기관 또는 단체는 대통령령으로 정하는 바에 따라 자율심의를 위한 조직 등을 갖추어 보건복지부장관에게 신고한 후 의료광고 심의의 업무를 수행할 수 있다.\n1. 제28조제1항에 따른 의사회·치과의사회·한의사회\n2. 「소비자기본법」 제29조에 따라 등록한 소비자단체로서 대통령령으로 정하는 기준을 충족하는 단체"}, {"major": "의료법(의료기관)", "minor": "의료기관 인증", "qnum": "21", "question": "병원급 의료기관의 장이 의료의 질과 환자 안전의 수준을 높이 위하여 보건복지부장관에게 신청하여 의료기관의 평가를 받는 제도는?", "textbox": "", "images": [], "options": ["의료기관 서비스평가제", "의료기관 인증제", "의료기관 평가제", "의료기관 의료질평가제", "의료기관 임상질지표평가제"], "answer": 1, "explanation": "의료기관 인증(제58조) 제1항\n보건복지부장관은 의료의 질과 환자 안전의 수준을 높이기 위하여 병원급 의료기관 및 대통령령으로 정하는 의료기관에 대한 인증(이하 “의료기관 인증”이라 한다)을 할 수 있다."}, {"major": "의료법(의료기관)", "minor": "의료기관 인증", "qnum": "22", "question": "외과 전문의인 김병만씨가 개원을 하려고 한다. 진료과목으로 항문외과를 쓰고 자 할 때 개업시 가능한 간판은?", "textbox": "", "images": [], "options": ["김병만의원", "서울항문외과의원", "서울의료원", "김병만외과클리닉", "김병만항문클리닉"], "answer": 0, "explanation": "의료기관의 고유명칭과 의료기관의 종류 명칭 사이에 인정받은 전문과목을 삽입해야 한다. 항문외과라는 전문과목을 쓸 수 없다.\n3) 의료원이라는 말은 의료기관의 종류 명칭은 개인 개원 의원에 쓸 수 없다.\n4), 5) 클리닉이라는 말은 의료기관의 종류에 따르는 명칭에 해당하지 않는다."}, {"major": "의료법(의료기관)", "minor": "의료기관 인증", "qnum": "23", "question": "의사 '갑'은 의원을 개설하면서 표시판에 진료과목으로 피부과, 비만클리닉, 피부미용을 표시하였다. 의원이 받을 수 있는 행정처분은?", "textbox": "", "images": [], "options": ["경고", "벌금", "과징금", "시정명령", "개설 허가 취소"], "answer": 3, "explanation": "의료법 제63조(시정 명령 등)제1항에서 의료기관이 제43조(진료과목 등)를 위반한 때 일정한 기간을 정하여 그 시설, 장비 등의 전부 또는 일부의 사용을 제한 또는 금지하거나 위반한 사항을 시정하도록 명할 수 있다고 규정하고 있습니다. 위반사항에 대한 행정처분을 모두 외우는 것은 현실적으로 불가하니 가볍게 보고 넘어가시면 될 것 같습니다."}, {"major": "의료법(의료기관)", "minor": "의료기관 인증", "qnum": "24", "question": "의사 '갑'은 자신의 병원 입구에 전광판을 설치하고, 최근 구입한 자기공명영상기기와 의료기관 인증을 받은 사실을 광고하려고 한다. 의사 '갑'이 해야 할 조치로 옳은 것은?", "textbox": "", "images": [], "options": ["별도의 심의 절차 불필요", "보건복지부 공표심의위원회에 심의 신청", "의료기관평가인증원에 심의 신청", "대한의사협회 의료광고심의위원회에 심의 신청", "건강보험심사평가원의 진료심사평가위원회에 심의 신청"], "answer": 3, "explanation": "많이들 헷갈려했던 문제로, 제56조(의료광고의 금지 등), 제57조(광고의 심의), 제58조(의료기관 인증)와 관련된 문제입니다. 먼저 최근 구입한 MRI 기기와 의료기관 인증을 받은 사실은 광고가능한 부분입니다. 또한 자신의 병원 입구에 전광판을 설치하는 것도 광고의 심의 대상에 포함되어 있으므로 대한의사협회의 심의를 받아야합니다. 참고로 의료기관 인증의 경우 인증을 받은 이후에는 그것을 광고에 사용한다고 해서 추가적인 심의를 받을 필요가 없습니다."}, {"major": "의료법(의료기관)", "minor": "의료법인의 부대사업", "qnum": "01", "question": "의사 '갑'은 광역시 지역에서 의원을 개설하여 운영하고 있다. '갑'이 「의료법」에 따라 비급여 진료비용의 항목, 기준, 금액 및 진료내역 등을 보고하여야 하는 대상은?", "textbox": "", "images": [], "options": ["질병관리청장", "관할 광역시장", "보건복지부장관", "건강보험심사평가원장", "국민건강보험공단 이사장"], "answer": 2, "explanation": "비급여 진료비용 등의 보고 및 현황조사 등(제45조의2)1) 의료기관의 장은 보건복지부령으로 정하는 바에 따라 비급여 진료비용 및 제45조 제2항에 따른 제증명수수료(이하 이 조에서 \"비급여진료비용 등\"이라 한다)의 항목, 기준, 금액 및 진료내역 등에 관한 사항을 보건복지부장관에게 보고하여야 한다.2) 보건복지부장관은 1)에 따라 보고받은 내용을 바탕으로 모든 의료기관에 대한 비급여진료비용 등의 항목, 기준, 금액 및 진료내역 등에 관한 현황을 조사·분석하여 그 결과를 공개할 수 있다. 다만, 병원급 의료기관에 대하여는 그 결과를 공개하여야 한다."}, {"major": "의료법(의료기관)", "minor": "의료법인의 부대사업", "qnum": "02", "question": "의원을 운영 중인 원장 'A'는 허리통증에 대한 최신 치료법을 광고하고 있다. 'A'는 의원의 홈페이지와 사회 관계망 서비스에 자신의 방법이 허리통증 치료에 반드시 효과가 있다는 내용을 지속적으로 광고하였다. 의원이 받을 수 있는 조치는?", "textbox": "", "images": [], "options": ["조치 없음", "경고", "벌금 부과", "과태료 부과", "1년의 범위에서 의료업 정지"], "answer": 4, "explanation": "의료법 제64조제1항에 따라 의료기관은 1년의 범위에서 정지되거나 개설허가의 취소 또는 의료기관의 폐쇄를 명 받을 수 있습니다. 전체 내용은 본문을 참고하세요.이 문제에서는 '반드시 효과가 있다는 내용'이 의료법 제56조(의료광고의 금지)제2항 중 소비자가 치료 효과를 오인하게 하는 것에 해당하므로 1년의 범위에서 의료업 정지, 개설허가의 취소 또는 의료기관의 폐쇄를 받을 수 있습니다.의료인의 면허 취소 및 자격정지 등의 의료기관의 정지 및 폐쇄는 비슷한 듯하면서 다르니 잘 구분해서 알아두세요!"}, {"major": "의료법(의료기관)", "minor": "의료법인의 부대사업", "qnum": "03", "question": "의사 '김'은 '최고'의원을 운영하던 중에 진료비를 거짓으로 청구해서 징역 1년을 선고받아 형이 확정되었다. 이에 '최고'의원 폐쇄명령을 받을 때 이후 상황은 어떻게 될 것인가?", "textbox": "", "images": [], "options": ["다른 의사가 '최고'의원에서 진료한다.", "형 집행 종료 후 '김'이 계속 '최고'의원에서 진료한다.", "'김'은 6개월 내에 의료기관을 개설·운영 못한다.", "'김'은 1년 이내에 의료기관을 개설·운영 못한다.", "'김'은 3년 이내에 의료기관을 개설·운영 못한다."], "answer": 4, "explanation": "의료기관 개설자가 거짓으로 진료비를 청구하고 금고 이상의 형을 선고받고 그 형이 확정되었다. 따라서 폐쇄명령을 받은 날부터 3년 안에는 의료기관을 개설·운영하지 못한다."}, {"major": "의료법(의료기관)", "minor": "의료법인의 부대사업", "qnum": "04", "question": "의원을 개설하여 운영하는 의사 '을'은 진료기록부 사본, 진단서 등 환자로부터 받는 제증명수수료의 비용을 환자나 환자의 보호자가 볼 수 있게 게시하지 않았다. 이때 '을'이 받게 되는 행정처분은?", "textbox": "", "images": [], "options": ["시정명령", "면허정지", "영업정지", "면허취소", "과태료 부과"], "answer": 0, "explanation": "'비급여 진료비용 등의 고지(제45조)'에 따르면, 의료기관 개설자는 환자로부터 받는 제증명수수료의 비용을 게시하여야 합니다. 이를 위반한 자는 '시정명령 등(제63조)'에 따라 보건복지부장관 또는 시·군·구청장에게 시정명령을 받게 됩니다. 시정명령 처분을 받을 수 있는 경우는 다양한데, 법조문의 양이 방대하여 본문에 싣지 않았습니다. 추가적으로 궁금하신 분은 국가법령정보센터 홈페이지(http://www.law.go.kr)에서 의료법 제63조 내용을 읽어보시길 바랍니다."}, {"major": "의료법(의료기관)", "minor": "의료법인의 부대사업", "qnum": "05", "question": "의료기관의 폐쇄 명령이 내려진 후 얼마 후에 의료기관을 개설 가능한가?", "textbox": "", "images": [], "options": ["1개월", "3개월", "6개월", "9개월", "12개월"], "answer": 2, "explanation": "개설 허가를 취소당하거나 폐쇄 명령을 받은 자는 그 취소된 날이나 폐쇄 명령을 받은 날부터 6개월 이내에는 의료기관 개설을 받은 자는 그 업무 정지기간 중에 각각 의료기관을 개설·운영하지 못한다. 다만, (8) (허위 진료비 청구)에 따라 의료기관 개설 허가를 취소당하거나 폐쇄 명령을 받은 자는 취소당한 날이나 폐쇄 명령을 받은 날부터 3년 안에는 의료기관을 개설·운영하지 못한다."}, {"major": "의료법(의료기관)", "minor": "의료법인의 부대사업", "qnum": "06", "question": "의료업의 폐업 또는 개설 취소가 되는 조건이 아닌 것은?", "textbox": "", "images": [], "options": ["태아의 성 감별 행위", "의료인에게 면허 외의 의료행위를 하게 한 경우", "무자격자에게 의료행위를 하게 한 경우", "개설 허가를 한 날부터 3개월 이내에 정당한 사유 없이 업무를 시작하지 아니한 경우", "의료법인의 설립허가가 취소된 때"], "answer": 0, "explanation": "1) 태아 성 감별 행위 등 금지(제20조) 제2항 의료인은 태아 성 감별을 목적으로 임부를 진찰하거나 검사하여서는 아니 되며, 같은 목적을 위한 다른 사람의 행위를 도 와서도 아니 된다. 이를 어길 시에는 개설취소가 아닌 면허정지입니다. 개설 취소 사항과 면허취소 사항, 자격정지 사항을 구분해서 알아두세요."}, {"major": "응급의료에 관한 법률(응급의료법)", "minor": "신고 의무 및 선의의 응급의료에 대한 면책", "qnum": "01", "question": "다음 중 응급환자에게 시행하는 응급처치에 해당하는 항목은?", "textbox": "", "images": [], "options": ["구강 내 이물질 제거", "출혈 환자의 활력징후 유지", "의료 기구를 이용한 기도의 확보", "심폐 소생술", "모두 다 응급처치에 해당"], "answer": 4, "explanation": "정의(제2조) 제3항\n응급처치 : 응급의료행위의 하나로서 응급환자의 기도를 확보하고 심장박동의 회복, 그 밖에 생명의 위험이나 증상의 현저한 악화를 방지하기 위하여 긴급히 필요로 하는 처치를 말한다.\n응급의료의 기본인 ABC(airway, breathing, circulation)를 생각해 보시면 1)~4) 모두 해당된다는 걸 알 수 있죠."}, {"major": "응급의료에 관한 법률(응급의료법)", "minor": "응급의료종사자의 권리와 의무", "qnum": "01", "question": "응급환자 5명이 비슷한 시각에 응급실로 실려 왔다. 응급실 의사 A는 5명 모두에게 응급의료를 실시해야 한다. 응급의료를 행할 때 A는 누구에게 우선순위를 두어야 하는가?", "textbox": "", "images": [], "options": ["위급한 환자", "나이 많은 환자", "먼저 도착한 환자", "먼저 동의를 받은 환자", "생존가능성이 높은 환자"], "answer": 0, "explanation": "응급환자에 대한 우선 응급의료 등(제8조) 제2항\n응급의료종사자는 응급환자가 2명 이상이면 의학적 판단에 따라 더 위급한 환자부터 응급의료를 실시하여야 한다."}, {"major": "응급의료에 관한 법률(응급의료법)", "minor": "응급의료종사자의 권리와 의무", "qnum": "02", "question": "지역응급의료센터에 내원한 환자가 응급환자는 아니었으나 진료의 필요성은 인정되었다. 의사가 이 환자를 본인의 동의를 얻어 응급실이 아닌 의료시설에 진료를 의뢰하는 경우 이 환자에게 해야 할 조치는?", "textbox": "", "images": [], "options": ["이송수단 알선", "진료과목 추천", "진료소견서 제공", "응급처치 교육", "진료의뢰 동의서 작성 요구"], "answer": 1, "explanation": "당해 환자가 응급환자에 해당하지 않는 이유를 설명하고 그에 필요한 진료내용 및 진료과목 등을 추천하여야 합니다.\n또한 그 이송받는 의료기관, 환자 또는 그 법정대리인이 진료에 필요한 의무기록을 요구하는 경우에는 이를 즉시 제공해야 합니다."}, {"major": "응급의료에 관한 법률(응급의료법)", "minor": "응급의료종사자의 권리와 의무", "qnum": "03", "question": "65세 남자가 길에서 쓰러져 보호자가 없이 119 구급대원에 의해 응급실에 도착하였다. 의식은 없고, 혈압 80/40mmHg, 맥박 30회/분, 호흡 5회/분, 체온 36.0℃이다. 「응급의료에 관한 법률」에 근거하여 응급실에서 혼자 근무하는 당직의사가 환자에게 행할 수 있는 적절한 조치는?", "textbox": "", "images": [], "options": ["즉각적인 응급처치 실시", "병원장에게 보고 후 응급처치", "보호자 도착 후 동의를 받아 응급처치", "구급대원에게 동의를 받은 후 응급처치", "인근 병원으로 옮겨 의사 1인의 동의를 받은 후 응급처치"], "answer": 0, "explanation": "응급의료의 거부금지 등(응급의료에 관한 법률 제6조제1항)응급의료기관에서 근무하는 응급의료종사자는 응급환자를 항상 진료할 수 있도록 응급의료업무에 성실히 종사하여야 한다.이에 따라 응급실에서 혼자 근무하는 당직의사는 응급의료업무(즉각적인 응급처치 실시)에 성실히 종사하여야 한다."}, {"major": "응급의료에 관한 법률(응급의료법)", "minor": "응급의료종사자의 권리와 의무", "qnum": "04", "question": "지역응급의료기관의 응급의학과 전문의 '갑'은 응급실에 온 응급환자에 대하여 해당 의료기관의 능력으로는 적정한 응급 의료를 행할 수 없다고 판단하였다. 그 환자를 '갑'이 소속된 의료기관의 구급차를 사용하여 적절한 응급의료가 가능한 권역응급의료센터로 이송하였다. 「응급의료에 관한 법률」에 따라 의료기관의 장은 환자이송에 든 비용을 누구에게 먼저 청구할 수 있는가?", "textbox": "", "images": [], "options": ["환자", "시·도지사", "건강보험심사평가원장", "응급의료지원센터의 장", "이송한 권역응급의료센터의 장"], "answer": 0, "explanation": "응급의료에 관한 법률 제11조에 따라 의료인은 해당 의료기관의 능력으로 응급환자에 대하여 적정한 응급의료를 할 수 없다고 판단한 경우에는 지체 없이 그 환자를 적절한 응급의료가 가능한 다른 의료기관으로 이송하여야 하며, 의료기관의 장은 이송에 든 비용을 환자에게 청구할 수 있다."}, {"major": "응급의료에 관한 법률(응급의료법)", "minor": "응급의료종사자의 권리와 의무", "qnum": "05", "question": "술에 취한 환자가 'A' 응급의료기관의 응급실에 왔다. 응급 의료기관의 장이 「응급의료에 관한 법률」에 따라 해당 환자의 진료를 보조하기 위한 환자 보호자의 응급실 출입을 최대 몇 명까지 허용할 수 있는가?", "textbox": "", "images": [], "options": ["1명", "2명", "3명", "4명", "5명"], "answer": 1, "explanation": "법 제31조의5제1항제3호에 따라 응급의료기관의 장이 응급실 출입을 허용할 수 있는 환자의 보호자는 1명으로 한다. 다만, 다음 각 호의 경우에는 2명으로 할 수 있다.(1) 소아, 장애인, 술 취한 사람 또는 정신질환자의 진료 보조를 위하여 필요한 경우(2) 그 밖에 진료 보조를 위하여 응급의료기관의 장이 필요하다고 인정하는 경우"}, {"major": "응급의료에 관한 법률(응급의료법)", "minor": "응급의료종사자의 권리와 의무", "qnum": "06", "question": "응급환자의 처치에 대해 설명한 것 중 옳지 않은 것을 고르시오.", "textbox": "", "images": [], "options": ["응급환자에 대해서는 정당한 사유가 없는 한 응급의료를 중단하여서는 아니 된다.", "응급 환자를 응급 처치 후에 다른 기관에 이송하는 것은 위법이다.", "응급 환자가 2인 이상인 경우에는 의학적 판단에 기초한 위급 정도에 따라 응급의료를 한다.", "응급 환자에게 응급의료에 관해 설명하고 동의를 얻어야 한다.", "누구나 응급환자를 발견한 경우에는 즉시 신고하여야 한다."], "answer": 1, "explanation": "응급의료중단의 금지(제10조)\n응급의료종사자는 정당한 사유가 없는 한 응급의료를 중단하여서는 아니 된다.\n응급환자의 이송(제11조) 제1항\n의료인은 응급환자에 대하여 당해 의료기관의 능력으로는 그 환자에 대하여 적정한 응급의료를 행할 수 없다고 판단한 때에는 지체 없이 그 환자를 적정한 응급의료가 가능한 다른 의료기관으로 이송하여야 한다.\n응급환자에 대한 우선 응급의료 등(제8조) 제2항\n응급의료종사자는 응급환자가 2인 이상인 경우에는 의학적 판단에 기초한 위급의 정도에 따라 응급의료를 실시하여야 한다.\n응급의료의 설명·동의(제9조) 제1항\n응급의료종사자는 다음 각 호의 1에 해당하는 경우를 제외하고는 응급환자에게 응급의료에 관하여 설명하고 그 동의를 얻어야 한다.\n(1) 응급환자가 의사결정능력이 없는 경우\n(2) 설명 및 동의절차로 인하여 응급의료가 지체됨으로써 환자의 생명에 위험 또는 신체상의 중대한 장애를 초래하는 경우\n응급환자에 대한 신고 및 협조의무(제5조) 제1항\n누구든지 응급환자를 발견한 때에는 즉시 이를 응급의료기관 등에 신고하여야 한다."}, {"major": "응급의료에 관한 법률(응급의료법)", "minor": "응급의료종사자의 권리와 의무", "qnum": "07", "question": "응급 환자를 적절하게 처치한 경우가 아닌 것은?", "textbox": "", "images": [], "options": ["응급 환자가 아니지만 응급실로 내원한 환자를 치료하느라 응급 환자를 진료하지 못했다.", "해당 의료기관의 능력으로 적절히 진료할 수 없는 환자가 있으면 다른 의료기관으로 환자를 이송한다.", "응급 환자는 다른 환자에 우선하여 진료한다.", "응급환자가 2인 이상일 경우에는 의학적 판단에 기초한 위급의 정도에 따라 응급의료를 실시한다.", "응급환자에 대해서는 진료를 위하여 필요한 최선의 조치를 한다."], "answer": 0, "explanation": "응급환자가 아닌 자에 대한 조치(제7조) 제1항\n의료인은 응급환자가 아닌 자에 대하여 응급실이 아닌 의료시설에 진료를 의뢰하거나 다른 의료기관에 이송할 수 있다.\n응급환자의 이송(제11조) 제1항\n의료인은 응급환자에 대하여 당해 의료기관의 능력으로는 그 환자에 대하여 적정한 응급의료를 행할 수 없다고 판단한 때에는 지체 없이 그 환자를 적정한 응급의료가 가능한 다른 의료기관으로 이송하여야 한다.\n응급환자에 대한 우선 응급의료 등(제8조)\n(1) 응급의료종사자는 응급환자에 대하여는 다른 환자에 우선하여 상담·구조 및 응급처치를 실시하고 진료를 위하여 필요한 최선의 조치를 하여야 한다.\n(2) 응급의료종사자는 응급환자가 2인 이상인 경우에는 의학적 판단에 기초한 위급의 정도에 따라 응급의료를 실시하여야 한다."}, {"major": "응급의료에 관한 법률(응급의료법)", "minor": "응급의료종사자의 권리와 의무", "qnum": "08", "question": "지역응급의료기관의 의사 'A'는 의사결정능력이 없는 응급환자의 법정대리인에게서 응급의료에 대한 동의를 얻지 못하였다. 그러나 이 응급환자에게 반드시 응급의료가 필요하다고 판단하였다. 「응급의료에 관한 법률」에 따라 'A'가 취하여야 할 조치는?", "textbox": "", "images": [], "options": ["응급의료 조치를 시행할 수 없음", "자신의 판단에 따라 응급의료 조치", "관할 보건소장에게 신고 후 응급의료 조치", "의료인 1명 이상의 동의를 얻어 응급의료 조치", "권역응급의료센터장에게 보고한 후 응급의료 조치"], "answer": 3, "explanation": "응급의료에 관한 설명·동의의 내용 및 절차 (시행규칙 제3조)\n③ 응급의료종사자가 의사결정능력이 없는 응급환자의 법정대리인  0, "explanation": "익명검진을 신청하는 경우에는 익명으로 검진을 실시해야 합니다."}, {"major": "후천성면역결핍증 예방법(에이즈예방법)", "minor": "검진", "qnum": "06", "question": "21세 남자 'A'는 전방에 위치한 부대에서 공동생활 중인 군인이다. 최근 친구들과 함께 휴가를 다녀온 후 스스로 병원을 방문하여 후천성면역결핍증 검진을 받았다. 「후천성면역결핍증 예방법」에 따라서 'A'의 검진 결과를 통보할 대상으로 옳은 것은?", "textbox": "", "images": [], "options": ["본인에게만", "본인+직계 가족", "본인+소속 부대장", "본인+함께 휴가를 다녀온 친구들", "본인의 요청이 없으면 누구에게도 통보하지 않는다."], "answer": 2, "explanation": "검진 결과의 통보(제8조의2) 제1항\n후천성면역결핍증에 관한 검진을 한 자는 검진 대상자 본인 외의 사람에게 검진 결과를 통보할 수 없다. 다만, 검진 대상자가 군(軍), 교정시설 등 공동생활자인 경우에는 해당 기관의 장에게 통보하고, 미성년자, 심신미약자, 심신상실자인 경우에는 그 법정대리인에게 통보한다."}, {"major": "후천성면역결핍증 예방법(에이즈예방법)", "minor": "검진", "qnum": "07", "question": "검진을 목적으로 혈액검사를 실시하는 기관에서 검사 결과 후천성면역결핍증 감염이 의심되는 가검물을 발견하였다. 당해 검진기관은 누구에게 검사를 의뢰하여 확인검사를 받아야 하는가?", "textbox": "", "images": [], "options": ["보건소장", "국립검역소장", "보건환경연구원의 장", "보건복지부 감염병관리위원회 위원장", "보건복지부 후천성면역결핍증대책위원회 위원장"], "answer": 2, "explanation": "확인검사기관의 장\n1. 질병관리청장\n2. 「보건환경연구원법」에 의한 보건환경연구원의 장\n3. 보건복지부장관이 지정·고시하는 확인검사기관의 장"}, {"major": "후천성면역결핍증 예방법(에이즈예방법)", "minor": "감염인의 보호·지원", "qnum": "01", "question": "인체면역결핍바이러스에 감염된 38세 남자를 진단한 의사가 전파 방지에 필요한 사항을 알리고 이를 준수하도록 지도하려고 한다. 의사가 할 보건지도의 내용으로 옳은 것은?", "textbox": "", "images": [], "options": ["다음 달부터는 헌혈을 하셔도 됩니다.", "환자분 아버님께 이 사실을 알릴 수밖에 없습니다.", "치료를 시작하겠습니다. 거부하셔도 법에 따라 강제로 할것입니다.", "환자분 직장의 보건관리자에게 이 사실을 알려서 전파 예방을 위한 조치를 취할 것입니다.", "전파 가능성이 이렇게 높은데도 다른 사람에게 전파를 매개하는 행위를 하면 형사처벌을 받을 수도 있습니다."], "answer": 4, "explanation": "2), 4) 검진 대상자가 군, 교정시설 등 공동생활자인 경우, 미성년자, 심신미약자, 심신상실자인 경우를 제외하고는 본인 외의 사람에게 검진 결과를 통보할 수 없습니 다(검진 결과의 통보 제8조의2).\n3) 치료를 권고할 수는 있으나 강제로 치료 할 수는 없습니다(치료 권고 제14조).\n5) 전파매개행위를 한 경우 벌칙(제25조)에 따라 형사 처벌을 받을 수 있습니다."}, {"major": "국민건강보험법", "minor": "요양기관", "qnum": "01", "question": "국민건강보험법에서 정한 보험급여 대상이 아닌 것은?", "textbox": "", "images": [], "options": ["질병", "출산", "사망", "부상", "고의적 사고"], "answer": 4, "explanation": "목적(제1조)이 법은 국민의 질병·부상에 대한 예방·진단·치료·재활과 출산·사망 및 건강증진에 대하여 보험급여를 실시함으로써 국민보건을 향상시키고 사회보장을 증진함을 목적으로 한다."} 수술 기타의 치료\n4. 예방과 재활\n5. 입원\n6. 간호\n7. 이송"}, {"major": "국민건강보험법", "minor": "보험급여", "qnum": "04", "question": "구 지역에 소재한 '가' 의원에서는 개원 후 최초로 요양급여비용을 청구하고자 한다. 「국민건강보험법」에 따라 '가' 의원 원장이 '가' 의원의 시설·장비 및 인력 등에 대한 현황을 신고하여야 하는 대상은?", "textbox": "", "images": [], "options": ["관할 구청", "질병관리청", "보건복지부", "국민건강보험공단", "건강보험심사평가원"], "answer": 4, "explanation": "요양기관 현황에 대한 신고(제43조)\n1) 요양기관은 제47조에 따라 요양급여비용을 최초로 청구하는 때에 요양기관의 시설·장비 및 인력 등에 대한 현황을 제62조에 따른 건강보험심사평가원(이하 “심사평가원”이라 한다)에 신고하여야 한다.\n2) 요양기관은 1)에 따라 신고한 내용(제45조에 따른 요양급여비용의 증감에 관련된 사항만 해당한다)이 변경될 경우에는 그 변경된 날부터 15일 이내에 보건복지부령으로 정하는 바에 따라 심사평가원에 신고하여야 한다.\n3) 1) 및 2)에 따른 신고의 범위, 대상, 방법 및 절차 등에 필요한 사항은 보건복지부령으로 정한다."}, {"major": "국민건강보험법", "minor": "보험급여", "qnum": "05", "question": "국민건강보험공단은 가입자와 피부양자에 대하여 질병의 조기 발견과 요양급여를 하기 위하여 건강검진을 실시한다. 건강검진에 대한 내용으로 옳은 것은?", "textbox": "", "images": [], "options": ["6세 미만 피부양자는 영유아건강검진을 받는다.", "지역가입자의 피부양자는 일반건강검진을 받는다.", "직장가입자는 2년마다 1회 건강검진을 받는다.", "대상자는 모든 의료기관에서 건강검진을 받을 수 있다.", "대상자는 연령에 상관없이 동일한 검진항목의 건강검진을 받는다."], "answer": 0, "explanation": "건강검진(제52조) 제2항\n제1항에 따른 건강검진의 종류 및 대상은 다음 각 호와 같다.\n1. 일반건강검진 : 직장가입자, 세대주인 지역가입자, 20세 이상인 지역가입자 및 20세 이상인 피부양자\n2. 암검진 : 「암관리법」 제11조제2항에 따른 암의 종류별 검진주기와 연령 기준 등에 해당하는 사람\n3. 영유아건강검진 : 6세 미만의 가입자 및 피부양자\n\n2) 가입자는 직장가입자와 지역가입자로 나뉘는데, 직장가입자의 경우에만 피부양자들 인정합니다.\n3) 사무직이 아니면 1년에 1회 받습니다.\n4) 지정된 기관에서만 받습니다.\n5) 연령에 따라 다릅니다."}, {"major": "국민건강보험법", "minor": "보험급여", "qnum": "06", "question": "의원에 대한 요양급여비용은 국민건강보험공단의 이사장과 대한의사협회 의 장의 계약으로 정한다. 요양급여비용의 산정을 위한 계약기간은?", "textbox": "", "images": [], "options": ["1년", "2년", "3년", "4년", "5년"], "answer": 0, "explanation": "요양급여비용의 산정 등(제45조) 제1항 요양급여비용은 공단의 이사장과 대통령령으로 정하는 의약계를 대표하는 사람의 계약으로 정한다. 이 경우 계약은 1년으로 한다(의약계를 대표하는 사람은 대한의사협회장이다)."}, {"major": "국민건강보험법", "minor": "보험급여", "qnum": "07", "question": "말기 암환자가 통증을 조절하기 위하여 자신의 집에서 가정 간호사에게 재가 암관리서비스를 받은 경우 「국민건강보험법」에 따른 보험급여의 종류는?", "textbox": "", "images": [], "options": ["요양비", "선별급여", "부가가급여", "방문요양급여", "장애인에 대한 특례"], "answer": 3, "explanation": "방문요양급여(제41조의5) 가입자 또는 피부양자가 질병이나 부상으로 거동이 불편한 경우 등 보건복지부령으로 정하는 사유에 해당하는 경우에는 가입자 또는 피부양자를 직접 방문하여 제41조에 따른 요양급여를 실시할 수 있다. 방문요양급여 실시 사유(제8조의3) 법 제41조의5에서 “질병이나 부상으로 거동이 불편한 경우 등 보건복지부령으로 정하는 사유에 해당하는 경우”란 다음 각 호의 어느 하나에 해당하여 의료기관을 방문하기 어려운 경우를 말한다. 1. 「장애인 건강권 및 의료접근성 보장에 관한 법률」 제16조 제1항 따른 장애인 건강증진 제도의 대상이 되는 중증장애인 2. 「호스피스·완화의료 및 임종과정에 있는 환자의 연명의료결정에 관한 법률」 제2조 제3호에 따른 말기환자(말기환자) 3. 가정형 인공호흡기를 사용하는 등 일정 수준 이상의 의료적 요구가 있어 방문요양급여를 제공받을 필요가 있는 18세 미만 환자 국민건강보험법 제41조의5 및 시행규칙 제8조의3에 의거하여 연명의료법에 따른 말기환자는 방문요양급여를 신청할 수 있다."}, {"major": "국민건강보험법", "minor": "보험급여", "qnum": "08", "question": "'A' 종합병원은 폐암으로 진단받은 환자 'B'에게 방사선치료와 항암화학요법을 시행하였다. 이에 'A' 종합병원이 「국민건강보험법」에 따라 요양급여비용을 심사청구할 대상은?", "textbox": "", "images": [], "options": ["보건복지부", "국민건강보험공단", "건강보험심사평가원", "의료기관인증위원회", "한국의료분쟁조정중재원"], "answer": 2, "explanation": "요양급여 비용의 청구와 지급 등(제47조) 요양급여비용을 공단으로부터 지급받기 위해서는 먼저 건강보험심사평가원에 심사청구를 요청하여 요청내용이 적절한지 심사받아야 합니다."}, {"major": "국민건강보험법", "minor": "보험급여", "qnum": "09", "question": "50세 남자환자 '김'은 만성신부전증을 앓고 있다. '김'은 의사 '박'의 처방전에 따라 자동복막투석에 사용하는 소모성 재료를 요양기관 외의 의약품판매업소에서 구입하여 사용하였다. 다음 중 환자 '김'이 국민건강보험공단에 지급을 청구할 수 있는 것은?", "textbox": "", "images": [], "options": ["요양비", "요양급여", "의료기기", "간병급여", "임의급여"], "answer": 0, "explanation": "요양비(시행규칙 제23조) 제1항\n1. 요양기관을 이용할 수 없거나 요양기관이 없는 경우\n2. 만성신부전증 환자가 복막관류액 또는 자동복막투석에 사용하는 소모성 재료\n3. 산소치료를 필요로 하는 환자가 가정에서 산소치료를 받는 경우\n4. 당뇨병 환자가 혈당검사 또는 인슐린주사에 사용하는 소모성 재료 또는 당뇨병 관리기기\n5. 선천성 신경인성 방광환자가 자가도뇨에 사용하는 소모성 재료\n6. 인공호흡기를 대여받아 사용하는 경우\n7. 수면무호흡증 환자의 양압기 대여"}, {"major": "국민건강보험법", "minor": "보험급여", "qnum": "10", "question": "국민건강보험 가입자인 사람이 긴급 기타 부득이한 사유로 요양기관으로 지정받지 않은 의료기관에서 진료를 받았을 때, 의료기관이 이 사람에게 교부해야 하는 것으로 맞는 것은?", "textbox": "", "images": [], "options": ["국민건강보험 보험자 자격취득 신고서", "요양기관 지정 신고서", "진단서", "보험급여 비용심사 청구서", "요양의 내역을 기재한 영수증"], "answer": 4, "explanation": "요양을 실시한 기관은 보건복지부장관이 정하는 요양비명세서 또는 요양의 내역을 기재한 영수증을 요양을 받은 자에게 교부하여야 하며, 요양을 받은 자는 이를 공단에 제출하여야 합니다."}, {"major": "국민건강보험법", "minor": "보험급여", "qnum": "11", "question": "공무원 김모씨는 휴일에 발생한 사고로 상지를 절단하였다. 이에 병원에서 치료를 받고 장애인복지법에 의해 장애인으로 등록한 뒤 병원에서의 의수를 했다. 그렇다면 의수는 국민건강보험법상 어떻게 처리하는 것이 맞는가?", "textbox": "", "images": [], "options": ["의족은 보험급여의 대상이 아니므로 본인이 부담한다.", "공무원은 국민건강보험의 대상이 아니므로 보험급여를 할 수 없다.", "근무시간 외에 발생한 사고이므로 보험급여를 할 수 없다.", "의족의 값은 환자가 부담하고, 병원의 진료비는 급여를 받는다.", "장애인복지법에 의해 등록한 장애인이므로 국민건강보험의 보험급여를 받는다."], "answer": 4, "explanation": "장애인에 대한 특례(제51조)\n공단은 「장애인복지법」에 따라 등록한 장애인인 가입자 및 피부양자에게는 「장애인·노인 등을 위한 보조기기 지원 및 활용촉진에 관한 법률」 제3조제2호에 따른 보조기기(이하 이 조에서 “보조기기”라 한다)에 대하여 보험급여를 할 수 있다."}, {"major": "국민건강보험법", "minor": "보험급여", "qnum": "12", "question": "국민건강보험법에 따라 요양비를 지급받을 수 있는 경우를 고르면?", "textbox": "", "images": [], "options": ["진단용 단순 방사선 촬영", "장애인복지법에 등록된 장애인이 보장구를 구입하는 경우", "분만 후 산후 조리", "자택에서 출산", "입원한 환자의 건강식품 구입"], "answer": 3, "explanation": "요양비(제49조) 제1항 공단은 가입자나 피부양자가 보건복지부령으로 정하는 긴급하거나 그 밖의 부득이한 사유로 요양기관과 비슷한 기능을 하는 기관으로서 보건복지부령으로 정하는 기관(제98조제1항에 따라 업무정지기간 중인 요양기관을 포함한다)에서 질병·부상·출산 등에 대하여 요양을 받거나 요양기관이 아닌 장소에서 출산한 경우에는 그 요양급여에 상당하는 금액을 보건복지부령으로 정하는 바에 따라 가입자나 피부양자에게 요양비로 지급한다."}, {"major": "국민건강보험법", "minor": "보험급여", "qnum": "13", "question": "국민건강보험법에 의해 요양급여가 가능한 항목은?", "textbox": "", "images": [], "options": ["영유아 건강검진", "미혼모 제왕절개술", "근로자 건강검진", "65세 이상 인플루엔자 예방접종", "소아 국가필수예방접종"], "answer": 1, "explanation": "1), 3) 보험급여의 항목 중 건강검진에 속합니다. 4), 5) 요양급여의 대상이 아니고, 보건소에서 무료로 받을 수 있습니다."}, {"major": "국민건강보험법", "minor": "보험급여", "qnum": "14", "question": "국민건강보험법에 의해 보험급여를 받을 수 있는 사람이 일정 기간 동안 보험급여가 정지되는 경우는?", "textbox": "", "images": [], "options": ["국내의 외국계 회사에 근무하는 경우", "병역법에 의한 현역병인 경우", "기초생활수급자가 된 경우", "건강검진을 5회 이상 받지 아니한 경우", "장애인이 된 경우"], "answer": 1, "explanation": "급여의 정지(제54조) 국외에 체류하는 경우, 현역병, 교도소 및 그에 준하는 시설에 수용되어 있는 경우"}, {"major": "국민건강보험법", "minor": "보험급여", "qnum": "15", "question": "의원에 대한 요양급여비용을 정하는 주체와 계약기간이 올바른 것은?", "textbox": "", "images": [], "options": ["국민건강보험관리공단의 이사장, 대한의사협회장, 1년", "국민건강보험관리공단의 이사장, 대한의사협회장, 2년", "보건복지부장관, 대한의사협회장, 1년", "보건복지부장관, 대한의사협회장, 3년", "국민건강보험관리공단의 이사장, 보건복지부장관, 2년 : "보건소", "qnum": "01", "question": "보건소가 제공하는 기능 및 업무 중, 「지역보건법」에 따라 지역주민의 건강증진 및 질병예방·관리를 위한 지역보건 의료서비스에 해당하는 것은?", "textbox": "", "images": [], "options": ["보건의료 취약계층의 건강유지·증진", "건강 친화적인 지역사회 여건의 조성", "보건의료 관련기관과의 협력체계 구축", "지역보건의료정책의 기획, 조사·연구 및 평가", "보건의료인 및 보건의료기관 등에 대한 지도·관리·육성"], "answer": 0, "explanation": "보건소의 기능 및 업무(제11조) 제1항 (5) 지역주민의 건강증진 및 질병예방·관리를 위 한 다음 각 목의 지역보건의료서비스의 제공 가. 국민건강증진·구강건강·영양관리사업 및 보건교육 나. 감염병의 예방 및 관리 다. 모성 및 영유아의 건강유지·증진 라. 여성·노인·장애인 등 보건의료 취약계층 의 건강유지·증진 마. 정신건강증진 및 생명존중에 관한 사항 바. 지역주민에 대한 진료, 건강검진 및 만성 질환 등의 질병관리에 관한 사항 사. 가정 및 사회복지시설 등을 방문하여 행 하는 보건의료 및 건강관리사업 아. 난임의 예방 및 관리 다른 보기들 또한 보건소의 기능 및 업무에 속하지만, 지역보건의료서비스에 해당하는 보 기는 1) 뿐입니다."}, {"major": "지역보건법", "minor": "보건소", "qnum": "02", "question": "지역주민의 건강을 증진하고 질병을 예방·관리하기 위하여 「지역보건법」 에 근거하여 설치 및 운영되고 있는 지역보건 의료기관에 속하는 것은?", "textbox": "", "images": [], "options": ["전문병원", "종합병원", "보건의료원", "권역별호스피스센터", "공공보건의료지원단"], "answer": 2, "explanation": "보건소의 설치(제10조) 제1항 지역주민의 건강을 증진하고 질병을 예방 관 리하기 위하여 시군구에 1개소의 보건소(보건 의료원을 포함한다)를 설치한다. 다만, 시군구 의 인구가 30만 명을 초과하는 등 지역주민의 보건의료를 위하여 특별히 필요하다고 인정되 는 경우에는 대통령령으로 정하는 기준에 따 라 보건소를 추가로 설치할 수 있다. 보건의료원(제12조) 보건소 중 「의료법」 제3조제2항제3호가목에 따른 병원의 요건을 갖춘 보건소는 보건의료 원이라는 명칭을 사용할 수 있다."}, {"major": "지역보건법", "minor": "보건소", "qnum": "03", "question": "「지역보건법」에 따른 지역사회 건강실태조사에 포함하여야 할 내용은?", "textbox": "", "images": [], "options": ["보건의료 인력 사항", "보건의료 시설 사항", "사고 및 중독에 관한 사항", "일정한 기간의 식품 섭취 사항", "일정한 기간에 사용한 식품의 조달 사항"], "answer": 2, "explanation": "국가와 지방자치단체는 매년 지역사회 건강실 태조사를 실시하여야 하며, 내용은 다음과 같다. (1) 흡연, 음주 등 건강 관련 생활습관에 관한 사항 (2) 건강검진 및 예방접종 등 질병 예방에 관한 사항 (3) 질병 및 보건의료서비스 이용 실태에 관한 사항 (4) 사고 및 중독에 관한 사항 (5) 활동의 제한 및 삶의 질에 관한 사항 (6) 그 밖에 지역사회 건강실태조사에 포함되어 야 한다고 보건복지부장관이 정하는 사항"}, {"major": "지역보건법", "minor": "보건소", "qnum": "04", "question": "다음 중 지역보건법, 대통령령(지역보건법 시행령), 보건복지부령(지역보건법 시행규칙)의 관계를 가장 적절하게 설명한 것을 고르면?", "textbox": "", "images": [], "options": ["시행령에서 보건지소 설치 기준의 대강을 정하고 자세한 기준은 시행규칙에서 지방자치단체의 조례로 정하도록 하여 법 단계적으로 접근하였다.", "지역보건법에서 보건지소의 설치를 명하고 있고, 보건소장의 업무는 시행규칙에 정하고 있다.", "보건소에 보건소장을 둔다는 내용을 지역보건법에서 규정하고 시행규칙에서 의사면허를 가진 자 중 임명하되 곤란한 경우에는 보건의무직군의 공무원을 임명할 수 있게 하였다.", "보건소의 업무는 지역보건법에 규정한 후 시행규칙에서 예시를 들어 업무의 내용을 구체화하였다.", "지역보건법에서 보건소를 시·군·구 당 1개씩 설치하도록 하고, 설치의 기준에 대해서는 시행규칙에서 지방자치단체의 조례로 정하도록 하였다."], "answer": 3, "explanation": "1) 보건지소 설치 기준의 대강은 지역보건법에서 정하고 있으며, 자세한 기준은 시행령이 정하는 기준에 따라 지방자치단체의 조례로 보건지소를 설치할 수 있도록 하고 있습니다.2) 보건지소의 설치는 지역보건법에서 설치를 명하고 있는 것은 맞으나, 보건소장의 업무는 시행령에 정하고 있습니다.3) 보건소에 보건소장을 1인을 둔다는 내용을 시행령에 정하고 있습니다. 나머지 보건소장의 임명에 대한 사항도 시행령에서 정하고 있는 내용입니다.4) 맞는 내용입니다. 시행규칙 별표 1에 자세한 예시가 있습니다.5) 보건지소의 설치를 시·군·구당 1개씩 설치하도록 한 것은 시행령에서 정하였습니다.설치 기준에 대해서는 시행령에 따라 지방자치단체의 조례로 정하도록 하였습니다.보건지소에 대한 보기는 뒤쪽 해설 “보건지소” 부분을 참조하세요."}, {"major": "지역보건법", "minor": "보건소", "qnum": "05", "question": "다음 중 보건소의 업무로 틀린 것은?", "textbox": "", "images": [], "options": ["보건교육", "모자보건 및 가족계획", "의약품 검사", "영양개선사업", "노인보건사업"], "answer": 2, "explanation": "3) 식품의약품안전처에서 관장합니다."}, {"major": "지역보건법", "minor": "보건소", "qnum": "06", "question": "「지역보건법」에 따라 시·도지사 또는 시장·군수·구청장이 지역주민의 건강을 증진하기 위하여 수립하는 지역보건의료 계획은 몇 년마다 수립되어야 하는가?", "textbox": "", "images": [], "options": ["1년", "2년", "3년", "4년", "5년"], "answer": 3, "explanation": "지역보건의료계획의 수립 등(제7조)① 특별시장·광역시장·도지사(이하 “시·도지사”라 한다) 또는 특별자치시장·특별자치도지사·시장·군수·구청장(구청장은 자치구의 구청장을 말하며, 이하 “시장·군수·구청장”이라 한다)은 지역주민의 건강 증진을 위하여 다음 각 호의 사항이 포함된 지역보건의료계획을 4년마다 제3항 및 제4항에 따라 수립하여야 한다.지역보건의료계획은 4년마다 수립합니다."}, {"major": "지역보건법", "minor": "보건소", "qnum": "07", "question": "다음은 보건소에 대한 설명이다. 옳게 설명한 것은?", "textbox": "", "images": [], "options": ["보건소는 시·군·구별로 1개소 이상 설치하여야 한다.", "보건소는 추가 설치가 불가능하다.", "보건소장이 될 수 있는 사람은 의료인뿐이다.", "보건의료원은 분만시설을 갖춘 보건소이다.", "보건소의 설치, 운영 주체는 보건복지부장관이다."], "answer": 0, "explanation": "보건소의 설치(시행령 제8조) 제1항 법 제10조에 따른 보건소는 시·군·구별로 1개소 이상 설치하여야 한다. 다만, 지역주민의 보건의료를 위하여 특별히 필요하다고 인정되는 경우에는 필요한 지역에 보건소를 추가로 설치·운영할 수 있다. 보건소장(시행령 13조) 제1항 보건소에 보건소장(보건의료원의 경우에는 원장을 말한다. 이하 같다) 1명을 두되, 의사 면허가 있는 사람 중에서 보건소장을 임명한다. 다만, 의사 면허가 있는 사람 중에서 임용하기 어려운 경우에는 「지방공무원 임용령」 별표 1에 따른 보건·식품위생·의료기술·의무·약무·간호·보건진료(이하 “보건 등”이라 한다) 직렬의 공무원을 보건소장으로 임용할 수 있다. 보건의료원(제12조) 보건소 중 「의료법」 제3조제2항제3호가목에 따른 병원의 요건을 갖춘 보건소는 보건의료원이라는 명칭을 사용할 수 있다."}, {"major": "지역보건법", "minor": "보건소", "qnum": "08", "question": "「지역보건법」에 따라서 지역주민의 건강 상태 및 건강 문제의 원인 등을 파악하기 위하여 매년 시·군·구별로 시행하는 조사는?", "textbox": "", "images": [], "options": ["국민건강영양조사", "국민보건계정조사", "한국의료패널조사", "보건의료 실태조사", "지역사회 건강실태조사"], "answer": 4, "explanation": "지역사회 건강실태조사(제4조) 제1항 국가와 지방자치단체는 지역주민의 건강 상태 및 건강 문제의 원인 등을 파악하기 위하여 매년 지역사회 건강실태조사를 실시하여야 한다. 1) 국민건강영양조사 : 국민건강증진법 제16조에 따라 질병관리청장이 매년 실시합니다. 4) 보건의료 실태조사 : 보건의료기본법 제55조에 따라 보건복지부장관이 5년마다 실시합니다."}, {"major": "지역보건법", "minor": "보건소", "qnum": "09", "question": "보건지소장의 업무를 지도 및 감독하는 사람은?", "textbox": "", "images": [], "options": ["시·군·구청장", "보건복지부장관", "시·도지사", "보건소장", "인근 종합병원장"], "answer": 3, "explanation": "① 보건소장 : 시군구청장이 지휘·감독 ② 보건지소장 : 보건소장이 지도·감독"}, {"major": "지역보건법", "minor": "보건지소", "qnum": "01", "question": "보건지소에 대해 옳게 설명한 것을 고르시오.", "textbox": "", "images": [], "options": ["보건지소장은 관내 보건의료원의 업무를 지도 및 감독한다.", "보건지소는 국가에서 설치와 운영에 필요한 비용 중 일부를 보조 받을 수 있다.", "보건지소장은 의사의 자격을 가져야 한다.", "보건지소는 시, 읍, 면당 1개씩 설치가 가능하다.", "보건지소장은 보건소장을 지휘 및 감독한다."], "answer": 1, "explanation": "보건지소장(시행령 제14조)\n① 보건지소에 보건지소장 1명을 두되, 지방의무직공무원 또는 임기제공무원을 보건지소장으로 임용한다.\n② 보건지소장은 보건소장의 지휘·감독을 받아 보건지소의 업무를 관장하고 소속 직원을 지휘·감독하며, 보건진료소의 직원 및 업무에 대하여 지도·감독한다.\n보건지소의 설치(시행령 제10조)\n법 제13조에 따른 보건지소는 읍·면(보건소가 설치된 읍·면은 제외한다)마다 1개씩 설치할 수 있다. 다만, 지역주민의 보건의료를 위하여 특별히 필요하다고 인정되는 경우에는 필요한 지역에 보건지소를 설치·운영하거나 여러 개의 보건지소를 통합하여 설치·운영할 수 있다.\n비용의 보조(제24조) 제1항\n국가와 시·도는 지역보건의료기관의 설치와 운영에 필요한 비용 및 지역보건의료계획의 시행에 필요한 비용의 일부를 보조할 수 있다."}, {"major": "지역보건법", "minor": "보건지소", "qnum": "02", "question": "「지역보건법」에 의하면 보건소의 업무 중 특별히 지역주민의 만성질환 예방 및 건강한 생활습관 형성을 지원하기 위하여, 보건소가 없는 읍·면·동에 설치할 수 있는 기관은?", "textbox": "", "images": [], "options": ["행정복지센터", "건강가정지원센터", "건강생활지원센터", "건강생활실천협의회", "바르게살기운동협의회"], "answer": 2, "explanation": "건강생활지원센터의 설치(제14조)\n지방자치단체는 보건소의 업무 중에서 특별히 지역주민의 만성질환 예방 및 건강한 생활습관 형성을 지원하는 건강생활지원센터를 대통령령으로 정하는 기준에 따라 해당 지방자치단체의 조례로 설치할 수 있다."}, {"major": "지역보건법", "minor": "보건의료원 및 보건진료소", "qnum": "01", "question": "다음 중에서 지역보건법에 의해 보건소 중 병원의 요건을 갖춘 보건소가 사용할 수 있는 명칭을 고르면?", "textbox": "", "images": [], "options": ["보건의료원", "의료원", "보건센터", "보건소부속병원", "보건병원"], "answer": 0, "explanation": "보건소 중 「의료법」 제3조제2항제3호가목에 따른 병원의 요건을 갖춘 보건소는 보건의료원이라는 명칭을 사용할 수 있다."}, {"major": "지역보건법", "minor": "보건의료원 및 보건진료소", "qnum": "02", "question": "농어촌 보건의료를 위한 특별조치법에서 농어촌 의료취약지역 서비스 이용의 접근성을 높이고 포괄적인 일차 보건서비스 제공을 통해 주민의 건강수준을 향상시킬을 목적으로 하는 지방보건행정조직은?", "textbox": "", "images": [], "options": ["보건소", "보건지소", "보건진료소", "보건의료원", "도 보건위생과"], "answer": 2, "explanation": "보건진료소는 농어촌 보건의료를 위한 특별조치법에 의해, 보건소는 지역보건법에 의해 설치됩니다."}, {"major": "지역보건법", "minor": "보건의료원 및 보건진료소", "qnum": "03", "question": "의료법 상 보건의료원과 동일한 의료기관은 무엇인가?", "textbox": "", "images": [], "options": ["보건진료소", "병원", "조산원", "의원", "종합병원"], "answer": 1, "explanation": "보건소 중 「의료법」 제3조제2항제3호가목에 따른 병원의 요건을 갖춘 보건소는 보건의료원이라는 명칭을 사용할 수 있다. 의원은 안 됩니다!"}, {"major": "지역보건법", "minor": "보건의료원 및 보건진료소", "qnum": "04", "question": "열거한 우리나라의 주요 보건의료정책 중 일차보건의료(primary health care)와 가장 밀접한 것은?", "textbox": "", "images": [], "options": ["의약분업 실시", "의료전달체계 시행", "정신보건법 제정", "의료보험 실시", "농어촌 보건의료를 위한 특별조치법 제정"], "answer": 4, "explanation": "농어촌 보건의료를 위한 특별조치법은 농어촌 등 보건의료취약지역의 주민에게 보건의료를 효율적으로 제공하여 국민의 의료균점과 보건 향상에 이바지함을 목적으로 합니다. 보기 중 일차보건의료와 가장 밀접한 정책입니다."}, {"major": "지역보건법", "minor": "건강검진 등의 신고", "qnum": "01", "question": "‘가’ 의원에서는 의료서비스 접근성이 떨어지는 ‘나’ 군의 군수가 요청한 바에 따라서 해당 지역 주민들을 대상으로 군청 주차장에 천막을 치고 건강검진을 시행하려고 한다. 이때, 「지역보건법」상 ‘가’ 의원은 건강검진 실시 며칠 전까지 해당 사항을 ‘나’ 군의 보건소장에게 신고하여야 하는가?", "textbox": "", "images": [], "options": ["1일", "3일", "5일", "7일", "10일"], "answer": 4, "explanation": "「의료법」 제27조(무면허 의료행위 등 금지) 제1항 각 호의 어느 하나에 해당하는 사람이 지역주민 다수를 대상으로 건강검진 또는 순회 진료 등 주민의 건강에 영향을 미치는 행위(이하 “건강검진 등”이라 한다)를 하려는 경우에는 보건복지부령으로 정하는 바에 따라 건강검진 등을 실시하기 10일 전까지 건강검진 등을 하려는 지역을 관할하는 보건소장에게 신고하여야 한다."}, {"major": "지역보건법", "minor": "건강검진 등의 신고", "qnum": "02", "question": "A 의원 원장인 B는 C군 소재 노인정에서 지역주민 다수를 상대로 건강검진을 하려고 한다. C군에는 보건소 대신 보건의료원이 설치되어 있다. 건강검진을 실시하기 전에 B가 할 조치는?", "textbox": "", "images": [], "options": ["건강검진 실시 3일 전까지 C군 군수에게 신고", "건강검진 실시 7일 전까지 C군 군수에게 신고", "건강검진 실시 3일 전까지 C군 보건의료원장에게 신고", "건강검진 실시 7일 전까지 C군 보건의료원장에게 신고", "건강검진 실시 10일 전까지 C군 보건의료원장에게 신고"], "answer": 4, "explanation": "건강검진 실시 10일 전까지 건강검진을 하려는 지역을 관할하는 보건소장(보건의료원장 포함)에게 신고하여야 합니다."}, {"major": "지역보건법", "minor": "건강검진 등의 신고", "qnum": "03", "question": "병원을 개설하고 있는 의사 ‘갑’은 의사, 물리치료사, 간호사, 미용사 등으로 구성한 봉사단체 회원들과 함께 서해에 위치한 섬 지역 주민을 대상으로 순회 진료봉사를 계획하였다. ‘갑’이 이를 실시하기 전에 취해야 할 조치는?", "textbox": "", "images": [], "options": ["3일 전까지 병원 소재지 관할 보건소장에게 신고", "10일 전까지 병원 소재지 관할 보건소장에게 신고", "3일 전까지 해당 섬 지역 관할 보건소장에게 신고", "10일 전까지 해당 섬 지역 관할 보건소장에게 신고", "별도 조치 불필요"], "answer": 3, "explanation": "건강진단 등을 하기 전에 건강 검진을 하려는 지역을 관할하는 보건소장에게 신고하여야 합니다. 이 때 신고는 건강검진을 시행하기 10일 전까지 이루어져야 합니다."}, {"major": "지역보건법", "minor": "건강검진 등의 신고", "qnum": "04", "question": "전라남도 여수시에 위치한 한 종합병원 원장 '갑'은 정형외과의사, 물리치료사 등으로 진료팀을 만들어 강원도 태백시로 검사 및 진료와 순회진료를 하려고 계획하였다. 건강검진을 실시하기 전에 취할 조치는?", "textbox": "", "images": [], "options": ["즉시 강원도지사에게 신고한다.", "건강검진 시행 7일 전까지 태백시 보건소장에게 신고한다.", "건강검진 시행 7일 전까지 여수시 보건소장에게 신고한다.", "건강검진 시행 10일 전까지 태백시 보건소장에게 신고한다.", "건강검진 시행 10일 전까지 여수시 보건소장에게 신고한다."], "answer": 3, "explanation": "건강진단 등을 하기 전에 건강 검진을 하려는 지역을 관할하는 보건소장에게 신고하여야 합니다. 이 때 신고는 건강검진을 시행하기 10일 전까지 이루어져야 합니다."}, {"major": "지역보건법", "minor": "건강검진 등의 신고", "qnum": "05", "question": "한 병원 건강검진센터장인 의사 '갑'은 주민자치센터에서 지역주민을 대상으로 건강검진을 실시하였다. 「지역보건법」상 그 지역을 관할하는 보건소장에게 이를 신고하지 않았을 때 '갑'이 받게 되는 벌칙은?", "textbox": "", "images": [], "options": ["벌금", "과징금", "과태료", "면허정지", "의료업무정지"], "answer": 2, "explanation": "다음 각 호의 어느 하나에 해당하는 자에게는 300만원 이하의 과태료를 부과한다. 1. 제23조(건강검진 등 신고)에 따른 신고를 하지 아니하거나 거짓으로 신고하고 건강검진 등을 한 자\n2. 제29조(동일 명칭 사용금지)를 위반하여 동일 명칭을 사용한 자\n② 제1항에 따른 과태료는 해당 지방자치단체의 조례에서 정하는 바에 따라 해당 시장·군수·구청장이 부과·징수한다.\n지역보건법의 벌칙 조항에서 출제된 문제입니다. 건강검진을 미리 신고하지 않고 하는 경우, 다른 의료기관이 보건소, 보건의료원, 보건지소, 건강생  "images": [], "options": ["노인에게 틀니 제공", "마약 중독자의 집중치료", "청소년 흡연실태 조사", "보건 교육자료 개발", "어린이 영양상태 조사"], "answer": 1, "explanation": "3), 5)는 보건통계의 작성 보급과 보건의료 관련 조사·연구 및 개발에 관한 사업에 해당하고, 1)은 구강건강관리사업, 4)는 보건교육 및 그 자료의 개발에 해당합니다. 마약 중독자의 집중치료는 국민건강증진기금의 사용 대상이 아닙니다."}, {"major": "혈액관리법", "minor": "혈액관리법", "qnum": "01", "question": "다음 중 혈액관리업무 중에서 수혈에 필요한 채혈을 할 수 없는 기관은?", "textbox": "", "images": [], "options": ["대한적십자사", "혈액제제제조업자", "종합병원", "의원", "요양병원"], "answer": 1, "explanation": "혈액관리업무(제6조) 제1항\n혈액관리업무는 다음 각 호의 1에 해당하는 자에 한하여 할 수 있다. 다만, 제3호에 해당하는 자는 혈액관리업무 중 채혈을 할 수 없다.\n1. 의료법에 의한 의료기관(이하 “의료기관”이라 한다)\n2. 대한적십자사조직법에 의한 대한적십자사(이하 “대한적십자사”라 한다)\n3. 보건복지부령이 정하는 혈액제제제조업자"}, {"major": "혈액관리법", "minor": "혈액관리법", "qnum": "02", "question": "구 지역에 있는 'A' 종합병원에서는 원활한 혈액관리업무를 위하여 혈액원을 개설하고자 한다. 「혈액관리법」에 따르면 'A'는 혈액원 개설을 누구에게 허가받아야 하는가?", "textbox": "", "images": [], "options": ["관할 구청장", "질병관리청장", "관할 광역시장", "관할 보건소장", "보건복지부장관"], "answer": 4, "explanation": "혈액관리업무(제6조)① 혈액관리업무는 다음 각 호의 어느 하나에 해당하는 자만이 할 수 있다. 다만, (3)에 해당하는 자는 혈액관리업무 중 채혈을 할 수 없다.(1) 「의료법」에 따른 의료기관(이하 “의료기관”이라 한다)(2) 「대한적십자사 조직법」에 따른 대한적십자사(이하 “대한적십자사”라 한다)③ (1) 또는 (2)에 해당하는 자로서 혈액원을 개설하려는 자는 보건복지부령이 정하는 바에 따라 보건복지부장관의 허가를 받아야 한다.혈액원을 개설하려는 자는 보건복지부 장관의 허가를 받아야 합니다."}, {"major": "혈액관리법", "minor": "혈액관리법", "qnum": "03", "question": "개방 골절로 수술을 받은 환자가 수혈을 받은 후 헌혈증서를 의료기관에 제출하였다. 이 때 의료기관에서는 수혈 비용을 누구에게 청구하는가?", "textbox": "", "images": [], "options": ["헌혈증서에 의한 무상수혈로 청구할 수 없음", "관할 보건소장에게 청구", "헌혈자가 헌혈한 혈액원장에게 청구", "국가 헌혈권장사업의 일환으로 청구할 수 없음", "대한적십자사 회장에게 청구"], "answer": 4, "explanation": "헌혈증서의 발급 및 수혈비용의 보상 등(제14조) 제4항보건복지부장관은 의료기관이 제2항에 따라 헌혈증서 제출자에게 수혈을 하였을 때에는 보건복지부령으로 정하는 바에 따라 제15조 제2항에 따른 헌혈환급적립금에서 그 비용을 해당 의료기관에 보상하여야 한다.권한의 위임ㆍ위탁 등(제17조) 제2항보건복지부장관은 이 법에 따른 다음 각 호의 업무를 대통령령으로 정하는 바에 따라 대한적십자사 회장에게 위탁할 수 있다.(3) 제14조제4항에 따른 보상업무→ 헌혈증서를 제출하였을 때의 수혈 비용의 보상은 보건복지부장관이 대한적십자사 회장에게 위임하게 됩니다."}, {"major": "혈액관리법", "minor": "혈액관리법", "qnum": "04", "question": "'A' 종합병원은 수술 환자에게서 헌혈증서 2장을 받고 농축적혈구 2단위를 무상으로 보시면,수혈 후 1년이 경과하지 아니한 자는 헌혈이 불가능합니다.체중은 50kg 이상이면 되고, 수축기혈압 180mmHg, 이완기혈압 100mmHg 미만이면 괜찮으며, 인플루엔자 예방접종 후 24시간이 지나면 괜찮습니다."}, {"major": "혈액관리법", "minor": "채혈금지대상자", "qnum": "04", "question": "다음 중에서 혈액관리법에 의해 채혈이 금지된 사람은?", "textbox": "", "images": [], "options": ["체온이 37.3℃인 회사원", "3년 전 막창자꼬리염으로 수술 중 수혈 받은 과거력이 있 주부", "혈압이 150/95인 50세 남성", "임신 5개월인 산모", "체중 50kg의 여자"], "answer": 3, "explanation": "임신중인 자, 분만 또는 유산 후 6개월 이내인 자는 채혈 금지 대상입니다. 다만, 본인이 출산한 신생아에게 수혈하고자 하는 경우에는 채혈 가능합니다.1) 체온은 37.5℃ 초과시 채혈 금지2) 수혈 받은 후 1년이 경과하지 않으면 채혈 금지3) 혈압은 수축기 혈압이 90mmHg(수은주압) 미만 또는 180mmHg(수은주압) 이상인 자, 이완기혈압이 100mmHg(수은주압) 이상인 자는 채혈 금지5) 남자는 50kg 미만, 여자는 45kg 미만이면 채혈 금지"}, {"major": "혈액관리법", "minor": "채혈금지대상자", "qnum": "05", "question": "다음 중에서 헌혈이 가능한 사람은?", "textbox": "", "images": [], "options": ["말라리아 병력자로 치료 후 1년이 지난 사람", "혈액 100mL 당 헤모글로빈이 13g인 사람", "15세 남자", "43kg 18세 여자", "분만 후 3개월이 지난 30세 여자"], "answer": 1, "explanation": "말라리아는 치료 종료 후 3년이 경과하여야 합니다.2) 혈색소는 전혈채혈의 경우에는 12.5g 이상, 성분채혈일 경우에는 12.0g 이상이어야 합니다.3) 16세 미만의 경우에는 채혈이 불가능합니다. 320mL 전혈채혈은 16세 이상부터, 400mL 전혈채혈은 17세 이상부터 가능합니다.4) 45kg 미만의 여자이므로 헌혈 불가능합니다.5) 임신중이거나 분만 후 6개월이 경과하지 않은 자는 채혈금지 대상입니다."}, {"major": "혈액관리법", "minor": "채혈금지대상자", "qnum": "06", "question": "B형 간염에 걸렸다가 완치된 환자가 있다. 얼마 후에 헌혈이 가능한가?", "textbox": "", "images": [], "options": ["1개월", "6개월", "12개월", "24개월", "36개월"], "answer": 1, "explanation": "채혈금지대상자(혈액관리법 시행규칙 별표 1의2) 중 질병요인으로 인해 일정기간 채혈이 금지된 감염병 목록① 말라리아 : 치료종료 후 3년② 브루셀라증 : 치료종료 후 2년③ 매독 : 치료종료 후 1년④ B형 간염 : 완치 후 6개월"}, {"major": "혈액관리법", "minor": "혈액의 안정성 및 관리", "qnum": "01", "question": "25세 남자가 헌혈을 하고자 한다. 「혈액관리법」에 따라 헌혈원이 헌혈자에 대하여 채혈 전 하여야 하는 건강진단 항목은?", "textbox": "", "images": [], "options": ["소변검사", "가슴 X선", "혈압 측정", "심전도검사", "컴퓨터단층촬영"], "answer": 2, "explanation": "헌혈자의 건강진단 등(시행규칙 제6조) ② 신원확인 후에 헌혈원은 헌혈자에 대하여 채혈 전 실시하여야 하는 건강진단을 실시하여야 한다. (1) 과거의 헌혈경력 및 혈액검사결과와 채혈금지대상자 여부의 조회 (2) 문진·시진 및 촉진 (3) 체온 및 맥박 측정 (4) 체중 측정 (5) 혈압 측정 (6) 다음 각 목의 어느 하나에 따른 빈혈 검사 1. 황산구리법에 따른 혈액비중검사 2. 혈색소검사 3. 적혈구용 된다."}, {"major": "호스피스·완화의료 및 임종과정에 있는 환자의 연명의료결정에 관한 법률(연명의료결정법)", "minor": "연명의료중단등결정의 이행", "qnum": "03", "question": "「호스피스·완화 의료 및 임종과정에 있는 환자의 연명의료결정에 관한 법률」에 따르면 의료기관의 장은 연명의료계획서를 연명의료중단결정 이행 후 몇 년 동안 보존하여야 하는가?", "textbox": "", "images": [], "options": ["2년", "3년", "5년", "7년", "10년"], "answer": 4, "explanation": "호스피스·완화의료 및 임종과정에 있는 환자의 연명의료결정에 관한 법률 제20조에 따라 의료기관의 장은 연명의료계획서를 연명의료중단결정 이행 후 10년 동안 보존하여야 한다."}, {"major": "호스피스·완화의료 및 임종과정에 있는 환자의 연명의료결정에 관한 법률(연명의료결정법)", "minor": "연명의료중단등결정의 이행", "qnum": "04", "question": "70세 남자가 폐렴으로 중환자실에서 인공호흡기 치료를 받고 있다. 폐렴은 호전되고 있으나 심한 섬망이 지속되고 있다. 중환자실 입원 5일째 환자의 보호자라며 사촌 누나가 찾아왔다. 사촌 누나가 환자가 가망이 없을 것 같다며 인공호흡기를 제거해 달라고 요구하였다. 환자는 독거노인이고 사촌 누나 외에는 문병을 온 사람은 없다. 조치는?", "textbox": "", "images": [], "options": ["현재 치료의 유지", "병원 법무팀에 자문", "사촌 누나의 의견 수용", "의료기관윤리위원회에 심의 요청", "사촌 누나에게 설명 후 연명의료계획서 작성"], "answer": 0, "explanation": "인공호흡기를 제거하는 것은 연명의료중단으로, 이를 결정하기 위해서는 환자의 의사 등을 파악하기 전에 우선 해당 환자가 임종과정에 있는지 해당 분야의 전문의 1명과 함께 판단하는 과정이 선행되어야 합니다. 이 문제에서는 폐렴이 호전되고 있고, 섬망은 회복가능성이 매우 높은 질환이므로 환자가 임종과정에 있다고 판단하기 어렵습니다. 따라서 현재 치료의 유지가 가장 올바른 답입니다."}, {"major": "호스피스·완화의료 및 임종과정에 있는 환자의 연명의료결정에 관한 법률(연명의료결정법)", "minor": "연명의료중단등결정의 이행", "qnum": "05", "question": "64세 'A'는 임종과정에 있다. 'A'의 연명의료에 대한 의사를 확인할 수 없고 현재 'A'는 의사표현을 할 수 없는 의학적 상태이다. 'A'의 가족으로는 배우자와 30세, 32세인 아들 두 명이 있다. 담당 주치의가 'A'의 연명의료를 중단하고자 할 때 「호스피스·완화의료 및 임종과정에 있는 환자의 연명의료결정에 관한 법률」에 따라 필요한 사항은?", "textbox": "", "images": [], "options": ["배우자의 동의 및 담당의사의 확인", "환자 가족 전원 합의 및 법원의 허가", "환자 가족 2명 이상의 일치하는 진술 및 법원의 허가", "환자 가족 2명 이상의 일치하는 진술 및 관할 보건소장의 허가", "환자 가족 전원 합의 및 담당의사와 해당 분야 전문의 1명의 확인"], "answer": 4, "explanation": "연명의료결정법 제17조에 해당하지 아니하여 환자의 의사를 확인할 수 없고, 환자가 의사표현을 할 수 없는 의학적 상태인 경우 환자의 배우자 및 1촌 이내의 직계존비속 전원의 합의로 연명의료중단결정의 의사표시를 하고, 담당의사 및 해당 분야 전문의 1명이 확인한 경우 연명의료를 중단할 수 있습니다."}, {"major": "호스피스·완화의료 및 임종과정에 있는 환자의 연명의료결정에 관한 법률(연명의료결정법)", "minor": "연명의료중단등결정의 이행", "qnum": "06", "question": "2세 남아 가 백혈병으로 항암치료를 받아왔는데 더 이상 반응을 보이지 않아 보호자에게 충분한 설명을 하고 항암치료는 중단하기로 했다. 현재 인공호흡기를 통해 호흡은 안정적으로 유지되고 있다. 1주 전부터 의식이 없어지고 다발장기부전이 악화되어 회생 가능성이 없고 사망이 임박한 상태이다. 아버지는 1년 전 산업재해로 사망했고, 현재 어머니와 친할머니와 함께 살고 있다. 담당 의사는 두 명의 보호자에게 아이가 임종기에 들어섰다는 사실을 설명했다. 어머니와 할머니는 더 이상 희망을 갖고 버틸 수 없다면서 담당 의사에게 연명의료 중단을 요구하여 이 내용을 의무기록에 명시했다. 담당 의사가 취해야 할 다음 조치는?", "textbox": "", "images": [], "options": ["호스피스 전담 치료를 이용할 수 있음을 어머니에게 설명", "어머니에게 충분히 설명하고 동의서를 받은 후 연명의료 중단", "어머니와 할머니에게 설명하고 동의서를 받은 후 연명의료 중단", "환자의 의사를 알 수 없으니까 연명의료를 중단할 수 없다고 설명", "해당 분야 전문의 1명과 함께 어머니의 연명의료중단의사와 환자의 임종과정을 확인하고 연명의료 중단"], "answer": 4, "explanation": "연명의료중단결정을 이행하기 위해서(법 제15조) 우선 담당 의사 및 해당 분야 전문의 1인이 환자가 임종과정임을 확인한 후(법 제16조), 환자의 의사를 먼저 확인합니다(법 제17조). 이를 확인할 수 없는 경우 법 제18조에 따라 결정하는데, 제18조제1호에 따르면 미성년자인 환자의 법정대리인(친권자)가 연명의료중단결정의 의사표시를 하고 이를 담당 의사 및 해당 분야 전문의 1인이 함께 확인한 후 연명의료를 중단할 수 있습니다."}];

const MINOR_BY_MAJOR = {"보건관계의료법규 개론": ["법체계"], "보건의료기본법": ["보건의료기본법"], "의료법(의료인)": ["의료인", "의료인의 결격사유", "의료인의 권리", "의료인의 의무", "진단서", "처방전", "진료기록부", "기록 열람", "의료행위의 제한", "보수 교육", "면허 취소와 재교부", "자격정지 등"], "의료법(의료기관)": ["의료기관", "의료기관의 개설 및 폐업·휴업", "의료기관의 운영", "특수의료장비의 설치·운영", "의료기관의 명칭표시", "진료과목의 표시", "의료관련감염 예방", "의료광고", "의료기관 인증", "개설 허가 취소 등", "비급여 진료비용 등의 고지 및 현황조사", "의료법인의 부대사업"], "응급의료에 관한 법률(응급의료법)": ["응급의료에 관한 법률-총칙", "신고 의무 및 선의의 응급의료에 대한 면책", "응급의료종사자의 권리와 의무", "응급의료기금", "응급의료기관", "응급환자 이송"], "감염병의 예방 및 관리에 관한 법률(감염병예방법)": ["감염병의 종류", "신고 및 보고, 감염병감시 및 역학조사", "예방접종", "감염 전파의 차단 조치"], "검역법": ["검역법", "질병관리청장이 할 수 있는 조치", "기타 조치"], "후천성면역결핍증 예방법(에이즈예방법)": ["후천성면역결핍증 예방법", "의사 또는 의료기관 등의 신고", "검진", "감염인의 보호·지원"], "국민건강보험법": ["목적", "요양기관", "보험급여", "건강보험심사평가원", "보험료 체납 및 부당이득 징수금", "이의신청 및 심판청구 등"], "지역보건법": ["지역보건법", "보건소", "보건지소", "보건의료원 및 보건진료소", "건강검진 등의 신고"], "마약류 관리에 관한 법률(마약류관리법)": ["마약류 관리에 관한 법률", "마약류취급자", "마약류 취급의 보고", "사고마약류 등의 처리", "마약류의 보관", "마약류 광고", "마약류 중독자"], "국민건강증진법": ["국민건강증진법", "금연을 위한 조치", "국민건강증진기금"], "혈액관리법": ["혈액관리법", "채혈금지대상자", "혈액의 안정성 및 관리", "특정수혈부작용"], "호스피스·완화의료 및 임종과정에 있는 환자의 연명의료결정에 관한 법률(연명의료결정법)": ["연명의료결정법", "연명의료중단등결정의 관리체계", "연명의료중단등결정의 이행", "호스피스·완화의료"], "의료법규 요약정리": ["의료법규 요약정리"]};

let questions   = [...RAW];
let current     = 0;
let answers     = {};
let activeMajor = 'all';
let activeMinor = 'all';

// ════════ 유틸 ════════
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function scrollTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

// ════════ 필터 모달 ════════
function openFilterModal() {
  buildMajorOptions();
  buildMinorOptions();
  document.getElementById('filter-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeFilterModal() {
  document.getElementById('filter-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function onOverlayClick(e) {
  if (e.target.id === 'filter-overlay') closeFilterModal();
}
function resetFilter() {
  activeMajor = 'all';
  activeMinor = 'all';
  buildMajorOptions();
  buildMinorOptions();
  applyFilters();
  updateFab();
}

function orderedMajorList() {
  const seen = new Set();
  const ordered = [];
  MAJOR_ORDER.forEach(m => { if (RAW.some(q => q.major === m)) { ordered.push(m); seen.add(m); } });
  RAW.forEach(q => { if (q.major && !seen.has(q.major)) { ordered.push(q.major); seen.add(q.major); } });
  return ordered;
}

function orderedMinorList(major) {
  const pool = RAW.filter(q => q.major === major);
  const csvOrder = MINOR_BY_MAJOR[major] || [];
  const seen = new Set();
  const ordered = [];
  csvOrder.forEach(s => { if (pool.some(q => q.minor === s)) { ordered.push(s); seen.add(s); } });
  pool.forEach(q => { if (q.minor && !seen.has(q.minor)) { ordered.push(q.minor); seen.add(q.minor); } });
  return ordered;
}

function buildMajorOptions() {
  const wrap = document.getElementById('major-options');
  wrap.innerHTML = '';
  const hint = document.getElementById('major-hint');
  hint.textContent = `${orderedMajorList().length}개 단원 · 총 ${RAW.length}문항`;

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-option' + (activeMajor === 'all' ? ' active' : '');
  allBtn.innerHTML = `<span class="opt-label">전체</span><span class="opt-cnt">${RAW.length}</span>`;
  allBtn.onclick = () => chooseMajor('all');
  wrap.appendChild(allBtn);

  orderedMajorList().forEach(m => {
    const count = RAW.filter(q => q.major === m).length;
    const btn = document.createElement('button');
    btn.className = 'filter-option' + (activeMajor === m ? ' active' : '');
    btn.innerHTML = `<span class="opt-label">${escapeHtml(m)}</span><span class="opt-cnt">${count}</span>`;
    btn.onclick = () => chooseMajor(m);
    wrap.appendChild(btn);
  });
}

function buildMinorOptions() {
  const wrap = document.getElementById('minor-options');
  const hint = document.getElementById('minor-hint');
  wrap.innerHTML = '';

  if (activeMajor === 'all') {
    hint.textContent = '대단원을 먼저 선택하세요';
    wrap.innerHTML = '<div class="filter-minor-empty">대단원을 선택하면 소단원이 표시됩니다</div>';
    return;
  }

  const minors = orderedMinorList(activeMajor);
  const pool = RAW.filter(q => q.major === activeMajor);
  hint.textContent = `${activeMajor} · ${minors.length}개 소단원 · ${pool.length}문항`;

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-option' + (activeMinor === 'all' ? ' active' : '');
  allBtn.innerHTML = `<span class="opt-label">전체</span><span class="opt-cnt">${pool.length}</span>`;
  allBtn.onclick = () => chooseMinor('all');
  wrap.appendChild(allBtn);

  minors.forEach(s => {
    const count = pool.filter(q => q.minor === s).length;
    const btn = document.createElement('button');
    btn.className = 'filter-option' + (activeMinor === s ? ' active' : '');
    btn.innerHTML = `<span class="opt-label">${escapeHtml(s)}</span><span class="opt-cnt">${count}</span>`;
    btn.onclick = () => chooseMinor(s);
    wrap.appendChild(btn);
  });
}

function chooseMajor(m) {
  activeMajor = m;
  activeMinor = 'all';
  buildMajorOptions();
  buildMinorOptions();
  applyFilters();
  updateFab();
  if (m === 'all') closeFilterModal();
}

function chooseMinor(s) {
  activeMinor = s;
  buildMinorOptions();
  applyFilters();
  updateFab();
  closeFilterModal();
}

function applyFilters() {
  let pool = [...RAW];
  if (activeMajor !== 'all') pool = pool.filter(q => q.major === activeMajor);
  if (activeMinor !== 'all') pool = pool.filter(q => q.minor === activeMinor);
  questions = pool;
  current   = 0;
  answers   = {};
  updateStats();
  renderDots();
  renderQuestion();
}

function updateFab() {
  const labelEl = document.getElementById('fab-label');
  const countEl = document.getElementById('fab-count');
  let label;
  if (activeMajor === 'all')      label = '전체 단원';
  else if (activeMinor === 'all') label = activeMajor;
  else                            label = `${activeMajor} · ${activeMinor}`;
  labelEl.textContent = label;
  countEl.textContent = questions.length + '문항';
}

// ════════ NAV DOTS ════════
function renderDots() {
  const wrap = document.getElementById('nav-dots');
  wrap.innerHTML = '';
  questions.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'nav-dot';
    dot.textContent = i + 1;
    if (i === current) dot.classList.add('current');
    else if (answers[i]) dot.classList.add(answers[i].correct ? 'correct' : 'wrong');
    dot.onclick = () => goTo(i);
    wrap.appendChild(dot);
  });
  const active = wrap.children[current];
  if (active) active.scrollIntoView({ inline: 'center', block: 'nearest' });
}

// ════════ STATS ════════
function updateStats() {
  const total    = questions.length;
  const answered = Object.keys(answers).length;
  const correct  = Object.values(answers).filter(a => a.correct).length;
  const wrong    = answered - correct;
  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent   = wrong;
  document.getElementById('stat-rate').textContent    = answered > 0 ? Math.round(correct / answered * 100) + '%' : '—';
  const pct = total > 0 ? Math.round(answered / total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
}

// ════════ RENDER QUESTION ════════
function renderQuestion() {
  const container = document.getElementById('quiz-container');
  document.getElementById('score-container').classList.add('hidden');
  container.classList.remove('hidden');

  if (questions.length === 0) {
    container.innerHTML = `
      <div class="q-card empty-card">
        <span class="empty-emoji">🔍</span>
        해당 조건의 문제가 없습니다.<br>
        <span style="font-size:12px;">우측 하단 '단원 선택'을 눌러 다른 조건을 시도해보세요.</span>
      </div>`;
    return;
  }

  const q        = questions[current];
  const ans      = answers[current];
  const answered = !!ans;

  const tbHTML = q.textbox ? `<div class="text-box">${escapeHtml(q.textbox)}</div>` : '';

  let imgHTML = '';
  if (q.images && q.images.length > 0) {
    imgHTML = '<div class="q-images">' +
      q.images.map((src, idx) =>
        `<img src="${src}" alt="문제 이미지 ${idx+1}" onclick="openLightbox(this.src)" loading="lazy">`
      ).join('') +
      '</div>';
  }

  const correctIdx = q.answer;
  const optsHTML = (q.options || []).map((opt, i) => {
    let cls = 'opt-btn';
    if (answered) {
      if (i === correctIdx) cls += ' correct-answer';
      else if (ans.selected === i && !ans.correct) cls += ' wrong-answer';
    }
    return `<button class="${cls}" ${answered ? 'disabled' : ''} onclick="choose(${i})">
      <span class="opt-num">${i + 1}</span>
      <span>${escapeHtml(opt)}</span>
    </button>`;
  }).join('');

  let explHTML = '';
  if (answered) {
    const isRight = ans.correct;
    explHTML = `
      <div class="explanation-box ${isRight ? '' : 'wrong'}">
        <div class="expl-label">${isRight ? '✓ 정답 해설' : '✗ 오답 해설'}</div>
        <div class="expl-text">${escapeHtml(q.explanation || '')}</div>
      </div>
      <div class="result-row">
        <span>${isRight ? '🎯' : '❌'}</span>
        <span class="result-msg ${isRight ? '' : 'wrong'}">${isRight ? '정답입니다!' : `오답 — 정답: ${correctIdx + 1}번`}</span>
      </div>`;
  }

  const isFirst = current === 0;
  const isLast  = current === questions.length - 1;
  const qnumLabel = q.qnum ? `#${q.qnum}` : '';

  container.innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="q-major-badge">${escapeHtml(q.major || '기타')}</span>
        ${q.minor ? `<span class="q-minor-badge">${escapeHtml(q.minor)}</span>` : ''}
        <span class="q-num">${qnumLabel} &nbsp;·&nbsp; ${current + 1} / ${questions.length}</span>
      </div>
      <div class="q-body">
        <p class="q-text">${escapeHtml(q.question || '')}</p>
        ${tbHTML}
        ${imgHTML}
        <div class="options-list">${optsHTML}</div>
      </div>
      ${explHTML}
      <div class="action-row">
        <button class="btn-nav" onclick="prevQ()" ${isFirst ? 'disabled' : ''}>← 이전</button>
        <span class="kbd-hint"><kbd>1</kbd>–<kbd>5</kbd> 선택 · <kbd>→</kbd> 다음</span>
        <button class="btn-next" onclick="nextQ()">${isLast ? '결과 보기 →' : '다음 →'}</button>
      </div>
    </div>`;
}

// ════════ 상호작용 ════════
function choose(i) {
  if (answers[current]) return;
  const q = questions[current];
  answers[current] = { selected: i, correct: (i === q.answer) };
  updateStats();
  renderDots();
  renderQuestion();
}
function prevQ() { if (current > 0) { current--; renderQuestion(); renderDots(); scrollTop(); } }
function nextQ() {
  if (current < questions.length - 1) { current++; renderQuestion(); renderDots(); scrollTop(); }
  else { showScore(); }
}
function goTo(i) {
  current = i;
  document.getElementById('score-container').classList.add('hidden');
  document.getElementById('quiz-container').classList.remove('hidden');
  renderQuestion(); renderDots(); scrollTop();
}

// ════════ 점수 화면 ════════
function showScore() {
  const total   = questions.length;
  const correct = Object.values(answers).filter(a => a.correct).length;
  const wrong   = Object.values(answers).filter(a => !a.correct).length;
  const skip    = total - Object.keys(answers).length;
  const pct     = total > 0 ? Math.round(correct / total * 100) : 0;

  let trophy = '🥇', msg = '완벽합니다!';
  if (pct < 40)       { trophy = '📚'; msg = '더 열심히 공부해봐요!'; }
  else if (pct < 60)  { trophy = '💪'; msg = '조금 더 노력이 필요해요.'; }
  else if (pct < 80)  { trophy = '👍'; msg = '잘 하고 있어요!'; }
  else if (pct < 100) { trophy = '🏆'; msg = '훌륭한 성적입니다!'; }

  document.getElementById('quiz-container').classList.add('hidden');
  const sc = document.getElementById('score-container');
  sc.classList.remove('hidden');
  sc.innerHTML = `
    <div class="score-screen">
      <div class="score-trophy">${trophy}</div>
      <h2 class="score-title">${pct}점 — ${msg}</h2>
      <p class="score-sub">총 ${total}문항 완료</p>
      <div class="score-grid">
        <div class="score-stat"><div class="score-stat-num">${correct}</div><div class="score-stat-label">정답</div></div>
        <div class="score-stat"><div class="score-stat-num wrong">${wrong}</div><div class="score-stat-label">오답</div></div>
        <div class="score-stat"><div class="score-stat-num" style="color:var(--gold-600)">${skip}</div><div class="score-stat-label">미응답</div></div>
      </div>
      <button class="btn-restart" onclick="restart()">다시 풀기</button>
    </div>`;
}
function restart() {
  current = 0; answers = {};
  document.getElementById('score-container').classList.add('hidden');
  document.getElementById('quiz-container').classList.remove('hidden');
  updateStats(); renderDots(); renderQuestion(); scrollTop();
}

// ════════ 라이트박스 ════════
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ════════ 키보드 ════════
document.addEventListener('keydown', e => {
  if (document.getElementById('pwd-gate').style.display !== 'none') return;
  if (document.getElementById('filter-overlay').classList.contains('open')) {
    if (e.key === 'Escape') closeFilterModal();
    return;
  }
  if (e.key === 'Escape')     closeLightbox();
  if (e.key >= '1' && e.key <= '5') {
    const idx = parseInt(e.key) - 1;
    const q = questions[current];
    if (q && q.options && idx < q.options.length && !answers[current]) choose(idx);
  }
  if (e.key === 'ArrowRight') nextQ();
  if (e.key === 'ArrowLeft')  prevQ();
});

// ════════ 앱 초기화 ════════
function initApp() {
  updateStats();
  renderDots();
  renderQuestion();
  updateFab();
}
</script>
