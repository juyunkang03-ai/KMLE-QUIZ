<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>의료법규 KMLE</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ivory:      #FAF7F2;
    --cream:      #F3EDE2;
    --white:      #FFFFFF;
    --purple-900: #2D0D5A;
    --purple-800: #3D1671;
    --purple-700: #5B2A99;
    --purple-500: #7B3FD1;
    --purple-300: #B896E8;
    --purple-100: #EEE5FB;
    --purple-50:  #F7F0FC;
    --gold-700:   #8A6526;
    --gold-600:   #A07432;
    --gold-100:   #F2E9D6;
    --rose-600:   #C94F7C;
    --rose-100:   #FBE7EE;
    --red-600:    #A32D2D;
    --red-100:    #FCEBEB;
    --gray-900:   #1a1530;
    --gray-700:   #3a3447;
    --gray-500:   #6b6378;
    --gray-400:   #958da0;
    --gray-300:   #d8d0e0;
    --gray-200:   #e8e2ea;
    --gray-100:   #f0ebea;
    --gray-50:    #f7f3f3;
    --shadow-sm:  0 2px 8px rgba(61,22,113,0.06);
    --shadow:     0 4px 20px rgba(61,22,113,0.10);
    --shadow-lg:  0 12px 40px rgba(45,13,90,0.22);
  }

  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--ivory);
    color: var(--gray-900);
    min-height: 100vh;
  }
  .hidden { display: none !important; }

  /* ───── 비밀번호 게이트 ───── */
  .pwd-gate {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, var(--purple-900) 0%, var(--purple-800) 55%, var(--purple-700) 100%);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .pwd-gate::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(184,150,232,0.18), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(123,63,209,0.22), transparent 55%);
    pointer-events: none;
  }
  .pwd-box {
    position: relative;
    background: var(--white);
    border-radius: 16px;
    padding: 40px 32px 32px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 16px 60px rgba(0,0,0,0.35);
    border-top: 3px solid var(--purple-500);
    animation: cardIn 0.3s ease;
  }
  .pwd-diamond { width: 44px; height: 44px; margin: 0 auto 14px; color: var(--purple-700); }
  .pwd-title {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 18px;
    color: var(--purple-800);
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .pwd-title .pwd-series {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--purple-500);
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
  }
  .pwd-sub { font-size: 12px; color: var(--gray-500); margin-bottom: 22px; }
  .pwd-input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--gray-300);
    border-radius: 10px;
    font-size: 16px;
    font-family: 'IBM Plex Mono', monospace;
    text-align: center;
    letter-spacing: 0.25em;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 8px;
    background: var(--ivory);
  }
  .pwd-input:focus { border-color: var(--purple-500); background: var(--white); }
  .pwd-input.shake { animation: shake 0.4s; border-color: var(--red-600); background: var(--red-100); }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-7px); }
    40%, 80% { transform: translateX(7px); }
  }
  .pwd-error { font-size: 11px; color: var(--red-600); min-height: 18px; margin-bottom: 6px; }
  .pwd-submit {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--purple-800);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.02em;
  }
  .pwd-submit:hover { background: var(--purple-700); }

  /* ───── 슬림 스티키 헤더 (~70px) ───── */
  .site-header {
    background: linear-gradient(180deg, var(--purple-800) 0%, var(--purple-900) 100%);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 10px rgba(45,13,90,0.22);
  }
  .header-main {
    max-width: 820px;
    margin: 0 auto;
    padding: 10px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    min-height: 40px;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .brand-diamond { color: var(--purple-300); flex: 0 0 auto; }
  .brand-title {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.005em;
  }
  .brand-sep { color: rgba(255,255,255,0.22); font-size: 12px; margin: 0 2px; }
  .brand-series {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--purple-300);
    font-weight: 500;
  }
  .header-stats {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'IBM Plex Mono', monospace;
    flex-wrap: wrap;
  }
  .stat-chip { display: flex; align-items: baseline; gap: 4px; }
  .stat-n { font-size: 14px; font-weight: 700; color: #fff; line-height: 1; }
  .stat-n.wrong  { color: #F8B4C6; }
  .stat-n.accent { color: var(--purple-300); }
  .stat-k {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    font-weight: 500;
  }
  .progress-track { height: 2px; background: rgba(255,255,255,0.08); }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple-300), var(--purple-500));
    transition: width 0.4s ease;
    width: 0;
  }
  .nav-dots-wrap {
    max-width: 820px;
    margin: 0 auto;
    padding: 5px 22px 3px;
    display: flex;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav-dots-wrap::-webkit-scrollbar { display: none; }
  .nav-dot {
    flex: 0 0 auto;
    min-width: 22px;
    height: 20px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.32);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    border-radius: 3px 3px 0 0;
    font-weight: 500;
    padding: 0 4px;
    transition: all 0.12s;
  }
  .nav-dot:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-dot.current { background: var(--ivory); color: var(--purple-800); font-weight: 700; }
  .nav-dot.correct { color: var(--purple-300); }
  .nav-dot.wrong   { color: #F8B4C6; }

  /* ───── 메인 ───── */
  .main { max-width: 820px; margin: 18px auto 0; padding: 0 22px 120px; }

  .q-card {
    background: var(--white);
    border-radius: 14px;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    animation: cardIn 0.25s ease;
    margin-bottom: 12px;
    border: 1px solid var(--gray-200);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .q-meta {
    background: var(--cream);
    padding: 12px 22px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--gray-200);
  }
  .q-major-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background: var(--purple-800);
    color: #fff;
    padding: 3px 11px;
    border-radius: 20px;
    letter-spacing: 0.03em;
    font-weight: 500;
  }
  .q-minor-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 11px;
    border-radius: 20px;
    background: var(--gold-100);
    color: var(--gold-700);
    border: 1px solid rgba(160,116,50,0.22);
  }
  .q-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--gray-500);
    margin-left: auto;
  }

  .q-body { padding: 22px 22px 0; }
  .q-text {
    font-size: 16px;
    line-height: 1.75;
    color: var(--gray-900);
    margin-bottom: 16px;
    white-space: pre-wrap;
  }
  .text-box {
    background: var(--gray-50);
    border-left: 3px solid var(--purple-500);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--gray-700);
    margin-bottom: 16px;
    white-space: pre-wrap;
  }
  .q-images {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .q-images img {
    max-height: 260px;
    max-width: 100%;
    border-radius: 8px;
    border: 1px solid var(--gray-300);
    object-fit: contain;
    cursor: zoom-in;
    background: var(--white);
  }

  .options-list { display: flex; flex-direction: column; gap: 9px; padding-bottom: 20px; }
  .opt-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    border: 1.5px solid var(--gray-300);
    border-radius: 10px;
    background: var(--white);
    cursor: pointer;
    text-align: left;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.55;
    color: var(--gray-700);
    transition: all 0.15s;
    width: 100%;
  }
  .opt-btn:not(:disabled):hover {
    border-color: var(--purple-500);
    background: var(--purple-50);
    color: var(--purple-800);
  }
  .opt-num {
    flex: 0 0 24px;
    height: 24px;
    background: var(--gray-100);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--gray-500);
    transition: all 0.15s;
  }
  .opt-btn:not(:disabled):hover .opt-num { background: var(--purple-700); color: #fff; }
  .opt-btn.correct-answer {
    border-color: var(--purple-500);
    background: var(--purple-100);
    color: var(--purple-800);
    cursor: default;
  }
  .opt-btn.correct-answer .opt-num { background: var(--purple-700); color: #fff; }
  .opt-btn.wrong-answer {
    border-color: var(--red-600);
    background: var(--red-100);
    cursor: default;
  }
  .opt-btn.wrong-answer .opt-num { background: var(--red-600); color: #fff; }
  .opt-btn:disabled { cursor: default; }

  .explanation-box {
    margin: 0;
    padding: 18px 22px;
    background: var(--purple-100);
    border-top: 1px solid rgba(91,42,153,0.15);
  }
  .explanation-box.wrong {
    background: var(--rose-100);
    border-top-color: rgba(201,79,124,0.2);
  }
  .expl-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--purple-700);
    margin-bottom: 8px;
  }
  .explanation-box.wrong .expl-label { color: var(--rose-600); }
  .expl-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--gray-700);
    white-space: pre-wrap;
  }

  .result-row {
    padding: 12px 22px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid var(--gray-200);
    background: var(--cream);
  }
  .result-msg { font-size: 14px; font-weight: 500; color: var(--purple-700); }
  .result-msg.wrong { color: var(--rose-600); }

  .action-row {
    padding: 16px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--gray-200);
    flex-wrap: wrap;
  }
  .btn-nav {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: 8px;
    border: 1.5px solid var(--gray-300);
    background: var(--white);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--gray-700);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-nav:hover:not(:disabled) { border-color: var(--purple-500); color: var(--purple-700); }
  .btn-nav:disabled { opacity: 0.35; cursor: default; }
  .btn-next {
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    background: var(--purple-800);
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-next:hover { background: var(--purple-700); }
  .btn-next:disabled { background: var(--gray-300); cursor: default; }
  .kbd-hint { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--gray-500); }
  kbd {
    display: inline-block;
    padding: 1px 5px;
    border: 1px solid var(--gray-300);
    border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--gray-700);
    background: var(--gray-50);
  }

  .empty-card { padding: 50px 30px; text-align: center; color: var(--gray-500); font-size: 14px; line-height: 1.7; }
  .empty-card .empty-emoji { font-size: 32px; margin-bottom: 10px; display: block; }

  /* ───── 점수 화면 ───── */
  .score-screen {
    background: var(--white);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 48px 32px;
    text-align: center;
    animation: cardIn 0.25s ease;
    border: 1px solid var(--gray-200);
  }
  .score-trophy { font-size: 52px; margin-bottom: 16px; }
  .score-title { font-size: 28px; font-weight: 700; color: var(--purple-800); margin-bottom: 6px; }
  .score-sub { font-size: 14px; color: var(--gray-500); margin-bottom: 32px; }
  .score-grid { display: flex; justify-content: center; gap: 32px; margin-bottom: 36px; flex-wrap: wrap; }
  .score-stat-num { font-family: 'IBM Plex Mono', monospace; font-size: 32px; font-weight: 700; color: var(--purple-700); }
  .score-stat-num.wrong { color: var(--rose-600); }
  .score-stat-label { font-size: 12px; color: var(--gray-500); margin-top: 4px; }
  .btn-restart {
    padding: 12px 30px;
    border-radius: 8px;
    border: none;
    background: var(--purple-800);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 0.02em;
  }
  .btn-restart:hover { background: var(--purple-700); }

  /* ───── 플로팅 필터 버튼 (FAB) ───── */
  .fab-filter {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--purple-800);
    color: #fff;
    border: none;
    padding: 11px 18px;
    border-radius: 26px;
    box-shadow: 0 6px 20px rgba(45,13,90,0.35);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 9px;
    z-index: 90;
    transition: all 0.18s;
    max-width: calc(100vw - 40px);
  }
  .fab-filter:hover {
    background: var(--purple-700);
    box-shadow: 0 10px 28px rgba(45,13,90,0.45);
    transform: translateY(-1px);
  }
  .fab-filter:active { transform: translateY(0); }
  .fab-icon { flex: 0 0 auto; opacity: 0.92; }
  .fab-text { display: flex; align-items: baseline; gap: 7px; min-width: 0; }
  .fab-label {
    font-weight: 600;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fab-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--purple-300);
    flex: 0 0 auto;
  }
  @media (max-width: 480px) {
    .fab-filter { padding: 10px 14px; font-size: 12px; bottom: 16px; right: 16px; }
    .fab-label  { max-width: 120px; }
  }

  /* ───── 필터 모달 ───── */
  .filter-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(45,13,90,0.42);
    backdrop-filter: blur(4px);
    z-index: 500;
    align-items: flex-start;
    justify-content: center;
    padding: 60px 16px 20px;
    overflow-y: auto;
  }
  .filter-overlay.open { display: flex; }
  .filter-panel {
    background: var(--white);
    border-radius: 16px;
    max-width: 600px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    animation: cardIn 0.22s ease;
    overflow: hidden;
    border-top: 3px solid var(--purple-500);
  }
  .filter-panel-head {
    padding: 16px 22px 14px;
    border-bottom: 1px solid var(--gray-200);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(180deg, var(--purple-50) 0%, var(--white) 100%);
  }
  .filter-panel-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--purple-800);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .filter-reset {
    font-size: 11px;
    background: transparent;
    border: none;
    color: var(--gray-500);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 6px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .filter-reset:hover { background: var(--gray-100); color: var(--purple-700); }
  .filter-close {
    background: transparent;
    border: none;
    font-size: 20px;
    color: var(--gray-500);
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 4px;
    line-height: 1;
  }
  .filter-close:hover { background: var(--gray-100); color: var(--purple-800); }
  .filter-head-right { display: flex; align-items: center; gap: 4px; }

  .filter-panel-body {
    padding: 16px 22px 22px;
    max-height: calc(100vh - 200px);
    overflow-y: auto;
  }
  .filter-panel-body::-webkit-scrollbar { width: 8px; }
  .filter-panel-body::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 4px; }

  .filter-section { margin-bottom: 20px; }
  .filter-section:last-child { margin-bottom: 0; }
  .filter-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--gray-200);
  }
  .filter-section-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--purple-700);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .filter-section-hint { font-size: 11px; color: var(--gray-500); }

  .filter-options {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 6px;
  }
  .filter-option {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 12px;
    border: 1px solid var(--gray-300);
    border-radius: 8px;
    background: var(--white);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    color: var(--gray-700);
    transition: all 0.13s;
    text-align: left;
    line-height: 1.3;
  }
  .filter-option:hover {
    border-color: var(--purple-500);
    background: var(--purple-50);
    color: var(--purple-800);
  }
  .filter-option.active {
    background: var(--purple-800);
    color: #fff;
    border-color: var(--purple-800);
  }
  .filter-option.active .opt-cnt { color: var(--purple-300); }
  .opt-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1 1 auto;
    min-width: 0;
  }
  .opt-cnt {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    opacity: 0.75;
    flex: 0 0 auto;
    margin-left: 8px;
    color: var(--gray-500);
  }
  .filter-minor-empty { padding: 16px 0; text-align: center; font-size: 12px; color: var(--gray-400); font-style: italic; }

  /* ───── 라이트박스 ───── */
  .lightbox {
    display: none;

전문의가 의료인으로서 부적합하다고 인정한 자", "약사법 위반으로 집행유예를 선고받고 그 기간에 있는 자"], "answer": 1, "explanation": "2) '금고' 이상의 실형을 선고받고 그 형의 집행이 종료되지 아니하였거나 집행을 받지 아니하기로 확정된 후 5년이 지나지 아니한 자는 의료인이 될 수 없습니다. 문제에서는 벌금 처분을 받았으므로 의료인의 결격사유에 해당하지 않습니다. 5) 어떤 처벌에 대한 집행유예를 선고받은 건지 명시되지 않아 명확하게 규정하기는 어렵습니다. 집행유예가 만약 벌금형에 대한 것이라면 금고 이상의 형이 아니므로 결격사유에 해당하지 않아 5번 선지 역시 의사가 될 수 있는 경우입니다. 과거에는 금고 이상의 형에 대해서만 집행유예가 가능했다는 점에서, 해당 선지의 사람은 금고 이상의 형을 받았다고 생각하고 풀어야 하는 문제였습니다. 다만 2016년부터는 벌금형에 대해서도 집행유예를 선고할 수 있으니 문제를 풀 때 어떤 처벌에 대해서 집행유예를 받은 것인지 확인해야겠습니다."}, {"major": "의료법(의료인)", "minor": "의료인의 결격사유", "qnum": "13", "question": "다음 중 의료인의 결격사유에 해당하는 사람은? (답 2개)", "textbox": "", "images": [], "options": ["1급 장애자", "파산 선고를 받고 복권된 자", "금고 이상의 형을 받고 집행을 받지 아니하기로 확정된 자", "맹자, 아자, 농자", "코데인 중독"], "answer": 2, "explanation": "의료인의 결격사유 등(제8조)\n① 정신질환자\n② 마약·대마·향정신성의약품 중독자\n③ 피성년후견인·피한정후견인(금치산자·한정치산자)\n④ 금고 이상의 실형을 선고받고 그 집행이 끝나거나 그 집행을 받지 아니하기로 확정된 후 5년이 지나지 아니한 자\n⑤ 금고 이상의 형의 집행유예를 선고받고 그 유예기간이 지난 후 2년이 지나지 아니한 자\n⑥ 금고 이상의 형의 선고유예를 받고 그 유예기간 중에 있는 자\n2) 파산 선고 후 복권된 자는 원래 결격사유가 아니었습니다(복권되지 아니한 자가 결격사유에서 제외됨). 헷갈리실 테니 파산과 관련한 조항은 결격사유에 없다고 기억하시면 되겠습니다."}, {"major": "의료법(의료인)", "minor": "의료인의 권리", "qnum": "01", "question": "의료법에 따른 의사의 권리로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["진료비를 청구할 권리", "의료 기술의 시행에 대해서 간섭받지 않을 권리", "의료용 시설, 기물을 파괴당하지 않을 권리", "의료 업무에 필요한 기구 및 재료를 압류 당하지 않을 권리", "의료행위에 필요한 기구 및 약품을 우선적으로 공급 받을 권리"], "answer": 0, "explanation": "의료인의 권리\n(1) 의료기술 등에 대한 보호(제12조)\n(2) 의료기재 압류 금지(제13조)\n(3) 기구 등 우선공급(제14조)\n의료법에는 비용 청구권이 명시되어 있지 않습니다."}, {"major": "의료법(의료인)", "minor": "의료인의 권리", "qnum": "02", "question": "의료인이 환자를 치료하면서 자신이 생각하기에 가장 적절한 치료 방법을 택할 수 있는 것은 의료인의 권리 중 어떤 내용에 해당하는가?", "textbox": "", "images": [], "options": ["기록 열람 불응", "의료기재 압류 금지", "비밀 누설 금지", "기구 등 우선 공급", "의료기술 등에 대한 보호"], "answer": 4, "explanation": "의료기술 등에 대한 보호(제12조) 제1항\n의료인이 하는 의료·조산·간호 등 의료기술의 시행(이하 “의료행위”라 한다)에 대하여는 이 법이나 다른 법령에 따라 규정된 경우 외에는 누구든지 간섭하지 못한다.\n이 조항을 근거로 의사들이 재량을 가지고 치료를 할 수 있습니다."}, {"major": "의료법(의료인)", "minor": "의료인의 권리", "qnum": "03", "question": "의료인의 권리로 틀린 것은?", "textbox": "", "images": [], "options": ["의료 기술의 시행에 대하여는 따로 규정된 경우를 제외하고는 누구든지 간섭하지 못한다.", "의료행위에 필요한 시설 및 재료를 우선공급 받을 권리가 있다.", "의료 업무에 필요한 기구, 약품, 재료를 압류당하지 않는다.", "진료행위에 관련하여 손해배상 책임을 면제받는다.", "누구든지 의료기관을 점거하여 진료를 방해해서는 아니 된다."], "answer": 3, "explanation": "의료인의 권리\n(1) 의료기술 등에 대한 보호(제12조)\n① 의료인이 하는 의료·조산·간호 등의 의료기술의 시행(이하 “의료행위”라 한다)에 대하여는 이 법이나 다른 법령에 따로 규정된 경우 외에는 누구든지 간섭하지 못한다.\n② 누구든지 의료기관의 의료용 시설·기재·약품, 그 밖의 기물 등을 파괴·손상하거나 의료기관을 점거하여 진료를 방해하여서는 아니 되며, 이를 교사하거나 방조하여서는 아니 된다.\n③ 누구든지 의료행위가 이루어지는 장소에서 의료행위를 행하는 의료인, 제80조에 따른 간호조무사 및 「의료기사 등에 관한 법률」 제2조에 따른 의료기사 또는 의료행위를 받는 사람을 폭행·협박하여서는 아니 된다.\n(2) 의료기재 압류 금지(제13조)\n의료인의 의료 업무에 필요한 기구·약품, 그 밖의 재료는 압류하지 못한다.\n(3) 기구 등 우선공급(제14조)\n① 의료인은 의료행위에 필요한 기구·약품, 그 밖의 시설 및 재료를 우선적으로 공급받을 권리가 있다.\n② 의료인은 ①의 권리에 부수되는 물품, 노력, 교통수단에 대하여서도 ①과 같은 권리가 있다."}, {"major": "의료법(의료인)", "minor": "의료인의 권리", "qnum": "04", "question": "다음 중 의사의 권리가 아닌 것은?", "textbox": "", "images": [], "options": ["의료행위에 필요한 물품, 노력, 교통수단을 우선 공급받을 권리", "진료 요청을 거부할 수 있는 권리", "의료기술 등에 대한 보호를 받을 권리", "의료 업무에 필요한 기구, 약품, 재료는 압류하지 못한다.", "의료행위에 필요한 기구, 약품, 시설 및 재료를 우선 공급받을 권리"], "answer": 1, "explanation": "의료인의 권리\n(1) 의료기술 등에 대한 보호(제12조)\n(2) 의료기재 압류 금지(제13조)\n(3) 기구 등 우선공급(제14조)\n2) 진료거부 금지 등(제15조)\n의료인은 진료나 조산 요청을 받으면 정당한 사유 없이 거부하지 못한다."}, {"major": "의료법(의료인)", "minor": "의료인의 의무", "qnum": "01", "question": "의사 '갑'은 마약류 중독자로 진단되어 면허가 취소되었다. 이후 취소의 원인이 된 사유가 없어지고 개선의 정이 뚜렷하다고 인정되어 면허를 재발급받았다. '갑'이 취업실태와 취업상황 등을 신고해야 할 시기는?", "textbox": "", "images": [], "options": ["최초 실태 신고한 날부터 매 3년이 되는 해", "면허증을 재발급받은 날부터 매 2년이 되는 해", "면허증을 재발급받은 날부터 매 3년이 되는 해", "최초 면허증을 발급받은 후부터 매 2년이 되는 해", "최초 면허증을 발급받은 후부터 매 3년이 되는 해"], "answer": 2, "explanation": "면허를 재발급 받은 해(면허증의 재발급 연도를)를 기준으로 매 3년이 되는 해의 12월 말일까지 신고합니다. 면허증에 적혀있는 발급 날짜가 다른데, 이미 취소된 이전 면허 기준으로 신고하는 건 행정적으로 곤란하겠죠?"}, {"major": "의료법(의료인)", "minor": "의료인의 의무", "qnum": "02", "question": "의사 'A'는 2022년도에 의사면허를 받고 의료기관에서 일반의로 근무하고 있다. 「의료법」에 따라 의사 'A'가 실태와 취업 상황 등을 보건복지부장관에게 신고하여야 하는 연도는?", "textbox": "", "images": [], "options": ["2023년", "2024년", "2025년", "2026년", "2027년"], "answer": 2, "explanation": "신고(제25조) 의료인은 대통령령으로 정하는 바에 따라 최초로 면허를 받은 후부터 3년마다 그 실태와 취업상황 등을 보건복지부장관에게 신고하여야 한다. 실태와 취업상황 등을 장관에게 신고하는 주기는 3년입니다. 따라서 2022년도에 의사면허를 받았으면 2025년에 보건복지부장관에게 신고하여야 합니다. 혹은 대한의사협회에도 신고서를 제출할 수 있습니다."}, {"major": "의료법(의료인)", "minor": "의료인의 의무", "qnum": "03", "question": "'갑'은 2013년 2월 의사면허증을 받았다. '갑'은 실태와 취업상황 등을 면허를 받은 해부터 매 몇 년이 되는 해의 12월 31일까지 보건복지부장관에게 신고하여야 하는가?", "textbox": "", "images": [], "options": ["1년", "2년", "3년", "5년", "7년"], "answer": 2, "explanation": "신고(제25조) 의료인은 대통령령으로 정하는 바에 따라 최초로 면허를 받은 후부터 3년마다 그 실태와 취업상황 등을 보건복지부장관에게 신고하여야 한다."}, {"major": "의료법(의료인)", "minor": "의료인의 의무", "qnum": "04", "question": "다음 중 의료법에 규정된 의료인의 의무와 권리에 대해 틀리게 설명한 것은?", "textbox": "", "images": [], "options": ["의료인은 진료나 조산 요청을 받으면 정당한 사유 없이 거부하지 못한다.", "의료인은 태아나 임부를 진찰하거나 검사하면서 알게 된 태아의 성을 임부, 임부의 가족이 알게 해서는 안 된다.", "의료인이 행하는 의료, 조산, 간호 등 의료기술의 시행에 대해서는 간섭하지 못한다.", "의료인은 의료, 조산 또는 간호를 하면서 알게 된 다른 사람의 비밀을 누설하거나 발표하지 못한다.", "의료인은 환자에 관한 기록을 열람하게 하거나 그 사본을 내주어야 한다."], "answer": 4, "explanation": "1) 진료거부 금지(제15조) 제1항 의료인은 진료나 조산 요청을 받으면 정당한 사유 없이 거부하지 못한다.2) 태아 성 감별을 목적으로 진찰하거나 검사하는 행위가 금지된 것이지, 검사하면서 알게 된 경우에는 태아의 성별을 알려줄 수 있습니다. (2024.12.20 개정으로 임신 32주 이전에 태아의 성을 알려줄 수 없다는 조항이 삭제되었습니다.)3) 의료기술 등에 대한 보호(제12조) 제1항 의료인이 하는 의료·조산·간호 등 의료기술의 시행에 대하여는 이 법이나 다른 법령에 따로 규정된 경우 외에는 누구든지 간섭하지 못한다.4) 비밀 누설 금지(제19조) 의료인은 이 법이나 다른 법령에 특별히 규정된 경우 외에는 의료·조산 또는 간호를 하면서 알게 된 다른 사람의 비밀을 누설하거나 발표하지 못한다.5) 기록 열람 등(제21조) 제1항"}, {"major": "의료법(의료인)", "minor": "의료인의 의무", "qnum": "05", "question": "의사 '갑'이 사체를 검안하였는데 사망자가 변사한 것으로 의심이 된다. 이때 의사 '갑'이 취할 조치는?", "textbox": "", "images": [], "options": ["의사회 지부에 신고", "지방검찰청 검사에게 신고", "사체의 소재지 관할 파출소장에게 신고", "사체의 소재지 관할 경찰서장에게 신고", "사체의 소재지 관할 보건소장에게 신고"], "answer": 3, "explanation": "변사체 신고(제26조)의사ㆍ치과의사ㆍ한의사 및 조산사는 사체를 검안하여 변사한 것으로 의심되는 때에는 사체의 소재지를 관할하는 경찰서장에게 신고하여야 한다."}, {"major": "의료법(의료인)", "minor": "의료인의 의무", "qnum": "06", "question": "의사의 의무에 관한 설명으로 옳은 것은?", "textbox": "", "images": [], "options": ["의료기관에서 나오는 세탁물은 직접 처리하여야 한다.", "생명보험회사로부터 보험금 지급을 위한 진료기록 열람 청구를 받은 경우 이에 응해야 한다.", "태아 성 감별을 목적으로 임부를 진찰하여서는 안 된다.", "5년마다 실태와 취업 상황을 보건복지부장관에게 신고하여야 한다.", "처방전과 진단서의 부분은 3년간 보관하여야 한다."], "answer": 2, "explanation": "의료인의 의무조항과 관련된 문제로, 보기 하나하나를 구체적으로 알아야 풀 수 있었던 문제였습니다.1) 의료기관에서 나오는 세탁물은 의료인, 의료기관 또는 시장ㆍ군수ㆍ구청장에게 신고한 자가 처리할 수 있습니다. 상식적으로 의사가 세탁물까지 직접 처리할 순 없겠죠?2) 생명보험회사의 요구는 제21조(기록 열람 등)에 해당하지 않으므로 할 수 없습니다. 해설을 참고하세요.3) 맞는 말입니다.4) 5년이 아니라 3년마다 실태와 취업 상황을 보건복지부장관에게 신고해야 합니다.5) 처방전은 2년, 진단서의 부분은 3년간 보관하여야 합니다. 각 기록부의 보존 기간을 잘 기억해두세요."}, {"major": "의료법(의료인)", "minor": "의료인의 의무", "qnum": "07", "question": "수술을 받기로 예정된 환자에서, 자기 결정권에 관한 의사의 설명 의무가 아닌 것을 고르면?", "textbox": "", "images": [], "options": ["수술의 방법", "수술 후 생길 수 있는 합병증", "수술에 따르는 위험성", "수술 참여 의료진의 구성", "수술 성공 가능성과 예후 및 부작용"], "answer": 3, "explanation": "의료행위에 관한 설명(제24조의2) 제2항1. 발생하거나 발생 가능한 증상의 진단명2. 수술 등의 필요성, 방법 및 내용3. 환자에게 설명을 하는 의사, 치과의사 또는 한의사 및 수술 등에 참여하는 주된 의사, 치과의사 또는 한의사의 성명4. 수술 등에 따라 전형적으로 발생이 예상되는 후유증 또는 부작용5. 수술 등 전후 환자가 준수하여야 할 사항풀기 조금 애매한 문제인데 실제 상황에서 어떻게 설명할지 상상해 보면 답을 고를 수 있습니다. 수술 등에 참여하는 주된 의사의 이름만 설명하면 됩니다. 수술에 함께 참여하는 전공의나 간호사의 이름까지 다 설명할 의무는 없습니다."}, {"major": "의료법(의료인)", "minor": "의료인의 의무", "qnum": "08", "question": "다음 중 관할 경찰서장에 즉시 신고하여야 하는 경우는?", "textbox": "", "images": [], "options": ["향정신성 약물 도난시", "변사체로 의심되는 사체 검안시", "예방접종 이상반응으로 사망한 사체 검안시", "전염병으로 사망한 것으로 의심되는 사체 검안시", "에이즈 진단시"], "answer": 1, "explanation": "1) 허가 관청에 지체 없이 사유를 보고해야 한다.2) 변사체 신고(제26조)의사·치과의사·한의사 및 조산사는 사체를 검안하여 변사한 것으로 의심되는 때에는 사체의 소재지를 관할하는 경찰서장에게 신고하여야 한다.3), 4) 관할 보건소장에게 신고해야 한다.5) 관할 보건소장에게 신고해야 한다.각각 누구에게 신고해야 하는지 잘 알아두세요. 의료법규 문제는 여러 곳에서 보기를 뽑아내는 경우가 많기 때문에, 생소한 보기가 있을 수 있습니다. 각 보기에 해당하는 법률 파트를 참고하세요."}, {"major": "의료법(의료인)", "minor": "의료인의 의무", "qnum": "09", "question": "'A' 종합병원의 병원장 'B'는 'C' 제약회사에서의 의약품 채택과 처방을 해 달라는 부탁을 받았다. 이때 'C' 제약회사에서 제공 받은 것 중, 부당한 경제적 이득에 해당하는 것은?", "textbox": "", 수 없다고 안내한다.", "원무과장이 'A'에게 구두로 확인한 뒤 진단서를 발급한다.", "같은 병원의 동료의사 'C'가 진료기록부에 근거하여 진단서를 발급한다.", "서명되지 않은 진단서를 발급한 뒤 'A'가 귀국한 후 'A'의 서명을 받도록 한다.", "진료기록부 사본을 발급한 뒤 이에 근거하여 보건소에서 진단서를 발급받도록 안내한다."], "answer": 2, "explanation": "진단서 등(제17조) 1항 중\n환자 또는 사망자를 직접 진찰하거나 검안한 의사·치과의사 또는 한의사가 부득이한 사유로 진단서·검안서 또는 증명서를 내줄 수 없으면 같은 의료기관에 종사하는 다른 의사·치과의사 또는 한의사가 환자의 진료기록부 등에 따라 내줄 수 있다."}, {"major": "의료법(의료인)", "minor": "진단서", "qnum": "06", "question": "의사의 진단서 교부에 대한 설명 중 옳은 것을 고르면?", "textbox": "", "images": [], "options": ["자신이 진찰하지 않은 환자라도 진료기록부를 가져와서 진단서 교부를 요청하면 진단서를 교부할 수 있다.", "진료 중이던 환자가 최종 진료 시부터 48시간 이내에 사망한 경우에는 다시 진료하지 아니하더라도 진단서를 내줄 수 있다.", "의사 면허를 가진 사람이면 누구나 진단서를 내줄 수 있다.", "환자가 진단서 교부를 요구한 경우 의사는 반드시 이에 응해야 한다.", "직접 진찰한 의사가 부득이한 사유로 진단서를 내줄 수 없을 때에는 의사 면허를 가진 사람이면 누구나 진단서를 내줄 수 있다."], "answer": 1, "explanation": "1), 3) 직접 진찰한 환자만 진단서를 교부 가능하다. 예외 조항이 있긴 하지만 같은 병원에 근무하는 의사여야 합니다.\n2) 최종 진료 시부터 48시간 이내에 사망한 경우에는 다시 진료하지 아니하더라도 진단서나 증명서를 내줄 수 있습니다.\n4) 정당한 사유가 있으면 거부 가능합니다.\n5) 직접 진찰한 의사가 진단서를 내줄 수 없을 때에는 같은 병원에 근무하는 다른 의사가 진료기록부 등에 따라 내줄 수 있습니다."}, {"major": "의료법(의료인)", "minor": "진단서", "qnum": "07", "question": "의사가 상해진단서 작성 시 추가 기입사항은?", "textbox": "", "images": [], "options": ["병명", "추정의료비", "진단연월일", "향후 치료에 대한 소견", "치료기간"], "answer": 4, "explanation": "진단서의 기재사항(시행규칙 제9조) 제2항\n1. 상해의 원인 또는 추정되는 상해의 원인\n2. 상해의 부위 및 정도\n3. 입원의 필요 여부\n4. 외과적 수술 여부\n5. 합병증의 발생 가능 여부\n6. 통상활동의 가능 여부\n7. 식사의 가능 여부\n8. 상해에 대한 소견\n9. 치료기간"}, {"major": "의료법(의료인)", "minor": "진단서", "qnum": "08", "question": "폐암 말기로 입원했던 환자의 배우자가 사망진단서 교부를 요구하였다. 환자는 가망 없는 퇴원(hopeless discharge)을 한 뒤, 30시간만에 사망하였다고 한다. 이때 진료를 담당했던 의사가 해야 할 옳은 조치는?", "textbox": "", "images": [], "options": ["시체를 검안한 후 시체검안서를 교부해 준다.", "시체를 검안한 후 사망증명서를 교부해 준다.", "병원내 사망이 아니므로 사망진단서를 교부할 수 없다고 설명한다.", "가망 없는 퇴원이라는 확인서를 작성해 준다.", "사망진단서를 교부한다."], "answer": 4, "explanation": "진료 중이던 환자가 최종 진료 시부터 48시간 이내에 사망한 경우에는 다시 진료하지 아니하더라도 진단서나 증명서를 내줄 수 있으며, 환자 또는 사망자를 직접 진찰하거나 검안한 의사·치과의사 또는 한의사가 부득이한 사유로 진단서·검안서 또는 증명서를 내줄 수 없으면 같은 의료기관에 종사하는 다른 의사·치과의사 또는 한의사가 환자의 진료기록부 등에 따라 내줄 수 있다."}, {"major": "의료법(의료인)", "minor": "진단서", "qnum": "09", "question": "의료인의 진단서 교부 의무에 대한 다음 내용 중 옳은 것은?", "textbox": "", "images": [], "options": ["의사는 그가 진찰한 자에 대한 진단서의 교부 요구를 받는 때에는 어떠한 경우에도 이를 거절하지 못한다.", "의사는 진료 중이던 환자가 최종 진료 시부터 48시간 이내에 사망한 경우에는 다시 진료하지 아니하더라도 사망진단서를 내줄 수 있다.", "전화로 환자를 문진한 뒤에 그 내용을 바탕으로 진단서를 교부할 수 있다.", "조산사는 출산 중 발생한 산도 열상에 대해서 진단서를 교부할 수 있다.", "산업 재해로 회사에서 치료비를 지불한 환자에 대해서는 의사가 환자에게 진단서를 내줄 의무가 없다."], "answer": 1, "explanation": "1) 의사·치과의사 또는 한의사는 자신이 진찰하거나 검안한 자에 대한 진단서·검안서 또는 증명서 교부를 요구받은 때에는 정당한 사유 없이 거부하지 못한다. 정당한 사유가 있으면 거절 가능합니다. 2) 진료 중이던 환자가 최종 진료 시부터 48시간 이내에 사망한 경우에는 다시 진료하지 아니하더라도 진단서나 증명서를 내줄 수 있다. 3) 직접 진찰하거나 검안한 의사, 치과의사, 한의사가 아니면 진단서·검안서·증명서 또는 처방전을 작성하여 교부하거나 발송하지 못한다. 4) ‘진단서’는 의사, 치과의사, 한의사만 교부 가능합니다(조산사는 출생, 사망, 사산에 대한 ‘증명서’를 교부할 수 있습니다). 5) 치료비를 누가 지불하였는지는 무관합니다."}, {"major": "의료법(의료인)", "minor": "진단서", "qnum": "10", "question": "상해진단서를 작성할 때 일반 진단서에 비해 추가로 적어야 하는 사항은?", "textbox": "", "images": [], "options": ["의료기관 소재지", "발병 연월일", "입원의 필요 여부", "향후 치료에 대한 소견", "한국표준질병·사인분류에 따른 병명"], "answer": 2, "explanation": "상해진단서의 추가 기재사항을 잘 기억해두세요. 1), 2), 4), 5)는 일반 진단서에도 들어가는 내용입니다."}, {"major": "의료법(의료인)", "minor": "진단서", "qnum": "11", "question": "소아과 병원 '갑' 의사에게 진료를 받았던 환자가 보호자와 함께 몇 주가 지난 후 진단서 교부를 위해 다시 방문하였다. '갑'이 해외 학회 참석을 위해 출장 중이라면 어떻게 해야 하는가?", "textbox": "", "images": [], "options": ["병원장이 '갑'의 이름으로 작성한다.", "동료의사가 '갑'의 이름으로 작성한다.", "동료의사가 진료기록부에 따라 작성한다.", "동료의사가 '갑'의 동의를 얻어 작성한다.", "'갑'의 부재로 진단서 교부가 불가함을 알리고, 다음에 방문할 것을 요청한다."], "answer": 2, "explanation": "환자를 직접 진찰한 의사가 부득이한 사유로 진단서를 내줄 수 없으면 같은 의료기관에 종사하는 다른 의사가 환자의 진료기록부 등에 따라 내줄 수 있습니다."}, {"major": "의료법(의료인)", "minor": "진단서", "qnum": "12", "question": "의료인의 진단서 교부의 의무에 대해서 맞게 설명한 것은?", "textbox": "", "images": [], "options": ["당뇨로 외래 진찰 중이던 환자가 교통사고로 사망한 경우 사체검안 없이 검안서를 교부가능하다.", "진료 중이던 환자가 최종진료 후 44시간 만에 사망하였다면 사망진단서를 교부가능하다.", "의사가 직접 전화로 문진하면 진단서를 교부가능하다.", "출산 중 발생한 질 열창에 대해서 조산사가 진단서를 교부가능하다.", "환자의 치료비를 보험회사가 지불하였다면 환자에게 진단서를 교부하지 않아도 된다."], "answer": 1, "explanation": "1) 의료업에 종사하고 직접 검안을 한 의사, 치과의사, 한의사만이 검안서를 교부 가능하다.2) 최종 진료 시부터 48시간 이내에 사망한 경우에는 다시 진료하지 아니하더라도 진단서 또는 증명서를 교부할 수 있다.3) 자신이 진찰 또는 검안한 의사·치과의사 또는 한의사가 발행하는 것이 원칙이며, 환자에게 또는 지방검찰청 검사에게 교부하거나 발송하지 못한다(문진은 안 됨).4) '진단서'는 의사, 치과의사, 한의사만 교부 가능(조산사는 출생, 사망, 사산에 대한 '증명서'만 교부할 수 있습니다)5) 의사·치과의사 또는 한의사는 자신이 진찰하거나 검안한 자에 대한 진단서·검안서 또는 증명서 교부를 요구받을 때에는 정당한 사유 없이 거부하지 못한다."}, {"major": "의료법(의료인)", "minor": "진단서", "qnum": "13", "question": "응급의학과 전공의가 내과로 파견되어 와 있는데, 내과 주치의가 외국 학회에 참석하여 부재한 상황에서 심부전 환자가 진단서를 교부 요청하였다. 이때 어떻게 해야 하는가?", "textbox": "", "images": [], "options": ["진단서를 교부할 수 없다고 설명한다.", "환자 진료기록부에 의해 교부한다.", "Chief resident에게 허락을 받아 교부한다.", "내과 과장의 허락을 받아 교부한다.", "주치의에게 전화로 통보한 뒤 교부한다."], "answer": 1, "explanation": "환자 또는 사망자를 직접 진찰하거나 검안한 의사·치과의사 또는 한의사가 부득이한 사유로 진단서·검안서 또는 증명서를 내줄 수 없으면 같은 의료기관에 종사하는 다른 의사·치과의사 또는 한의사가 환자의 진료기록부 등에 따라 내줄 수 있다."}, {"major": "의료법(의료인)", "minor": "진단서", "qnum": "14", "question": "다음 중 의료법에 합당한 사례는 무엇인가?", "textbox": "", "images": [], "options": ["의사 ‘양’은 변사가 의심되는 사체를 관할 시장에게 신고하였다.", "의사 ‘이’는 임상병리사에게 가슴 CT 촬영을 하게 하였다.", "치과의사 ‘박’은 치료 중 사망한 환자의 사망진단서를 발급하였다.", "한의사 ‘김’은 당뇨병 환자에게 인슐린을 주사하였다.", "간호사 ‘오’는 입원한 환자에게 진통제를 처방하였다."], "answer": 2, "explanation": "치과의사는 사망진단서를 발급할 수 있습니다.1) 관할 경찰서장에게 신고하여야 합니다.2), 4), 5)는 모두 면허된 것 이외의 의료행위입니다."}, {"major": "의료법(의료인)", "minor": "진단서", "qnum": "15", "question": "진단서에 기재할 사항은?", "textbox": "", "images": [], "options": ["통상활동의 가능여부", "상해의 원인", "합병증의 발생 가능 여부", "입원의 필요여부", "향후 치료에 대한 소견"], "answer": 4, "explanation": "1. 환자의 성명 주민등록번호 및 주소2. 병명 및 「통계법」 제22조제1항 전단에 따른 한국표준질병ㆍ사인 분류에 따른 질병분류기호3. 발병 연월일 및 진단 연월일4. 치료내용 및 향후치료에 대한 소견5. 입원ㆍ퇴원 연월일6. 의료기관의 명칭ㆍ주소 진찰한 의사ㆍ치과의사 또는 한의사(부득이한 사유로 다른 의사 등이 발급한 진단서의 경우에는 발급한 의사 등을 말한다)의 성명ㆍ면허자격ㆍ면허번호나머지 보기는 상해진단서의 추가 기재사항이네요."}, {"major": "의료법(의료인)", "minor": "진단서", "qnum": "16", "question": "상해 진단서의 기재 사항으로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["외과적 수술 여부", "가해자의 성명", "발병 연월일", "통상활동의 가능 여부", "합병증의 발생 가능 여부"], "answer": 1, "explanation": "1. 상해의 원인 또는 추정되는 상해의 원인2. 상해의 부위 및 정도3. 입원의 필요 여부4. 외과적 수술 여부5. 합병증의 발생 가능 여부6. 통상활동의 가능 여부7. 식사의 가능 여부8. 상해에 대한 소견9. 치료기간2) 가해자에 대한 정보는 상해진단서에 기재되지 않습니다.3) 발병 연월일은 상해 진단서의 추가 기재 사항은 아니지만 원래 진단서에 들어가야 하는 항목이므로 상해진단서의 기재 사항이 맞습니다."}, {"major": "의료법(의료인)", "minor": "진단서", "qnum": "17", "question": "환자를 직접 진찰 또는 검안한 의사가 부득이한 사유로 진단서를 내줄 수 없을 경우 환자의 진료기록부 등에 따라 진단서를 내줄 수 있는 사람은?", "textbox": "", "images": [], "options": ["병원협회장", "의사협회장", "관할 보건소장", "관할 보건소장이 지정하는 의사", "같은 의료기관에 종사하는 다른 의사"], "answer": 4, "explanation": "진단서 등(제17조) 제1항\n환자 또는 사망자를 직접 진찰하거나 검안한 의사·치과의사 또는 한의사가 부득이한 사유로 진단서·검안서 또는 증명서를 내줄 수 없으면 같은 의료기관에 종사하는 다른 의사·치과의사 또는 한의사가 환자의 진료기록부 등에 따라 내줄 수 있다."}, {"major": "의료법(의료인)", "minor": "진단서", "qnum": "18", "question": "상해진단서에 추가 기재해야 할 내용으로 맞는 것은?", "textbox": "", "images": [], "options": ["치료기간", "병명", "환자의 주소, 성명 및 주민등록번호", "의료기관의 명칭", "진단 연월일"], "answer": 0, "explanation": "진단서의 기재사항(시행규칙 제9조) 제2항\n1. 상해의 원인 또는 추정되는 상해의 원인\n2. 상해의 부위 및 정도\n3. 입원의 필요 여부\n4. 외과적 수술 여부\n5. 합병증의 발생 가능 여부\n6. 통상활동의 가능 여부\n7. 식사의 가능 여부\n8. 상해에 대한 소견\n9. 치료기간"}, {"major": "의료법(의료인)", "minor": "처방전", "qnum": "01", "question": "26세 남자 '갑'이 발이 가려워 인근에 있는 의원에 갔다. 의사 '을'은 '갑'의 질병을 무좀으로 진단하고 약물을 처방 하려고 한다. '을'이 처방전을 발급할 때, '갑'이 요구한 경우에 「의료법」상 적지 않아도 되는 사항은?", "textbox": "", "images": [], "options": ["의료인의 성명", "처방전의 사용기간", "처방 의약품의 분량", "환자의 주민등록번호", "질병분류기호"], "answer": 4, "explanation": "처방전의 기재 사항 등(시행규칙 제12조) 제1항\n법 제18조에 따라 의사 치과의사 또는 한의사에 게 처방전을 발급하는 경우에는 별지 제9호서 식의 처방전에 다음 각 호의 사항을 적은 후 서명(「전자서명법」에 따른 공인전자서명을 포함한다)하거나 도장을 찍어야 한다. 다만, (3)의 사항은 환자가 요구한 경우에는 적지 아 니한다.\n(1) 환자의 성명 및 주민등록번호\n(2) 의료기관의 명칭, 전화번호 및 팩스번호\n(3) 질병분류기호\n(4) 의료인의 성명·면허종류 및 번호\n(5) 처방 의약품의 명칭(일반명칭, 제품명이나 대한약전에 정한 명칭을 말한다)·분량· 용법 및 용량\n(6) 처방전 발급 연월일 및 사용기간\n(7) 의약품 조제시 참고 사항"}, {"major": "의료법(의료인)", "minor": "처방전", "qnum": "02", "question": "의사 '갑'은 역류후두염 환자를 진료한 후 처방전을 발행하였다. 처방전 에 따라 의약품을 조제하는 약사가 처방전에 표시된 약제의 용량이 의심 되어 전화로 의사 '갑'에게 이를 문의하였다. 의사 '갑'이 다른 환자를 치 료 중인 경우 해야 하는 조치는?", "textbox": "", "images": [], "options": ["처방전 환수 통보 후 의약품을 직접 투약", "환자의 처치를 마친 후 즉시 문의에 응함", "처방은 의사의 권한으로 문의에 응할 필요 없음", "식품의약품안전처에 의약품정보를 확인하도록 알려줌", "건강보험심사평가원에 요양급여 기준을 확인하도록 알려줌"], "answer": 1, "explanation": "처방전 작성과 교부(제18조) 제4항\n처방전에 따라 의약품을 조제하는 약사 또는 한의사가 약사법에 따라 문의한 때는 즉시 이 에 응하여야 한다. 다만, 다음 각 호의 어느 하나에 해당하는 사유로 약사 또는 한약사의 문의에 응할 수 없는 경우 사유가 종료된 때 즉시 이에 응하여야 한다.\n1. 응급환자를 진료 중인 경우\n2. 환자를 수술 또는 처치 중인 경우\n3. 그 밖에 약사의 문의에 응할 수 없는 정당 한 사유가 있는 경우"}, {"major": "의료법(의료인)", "minor": "처방전", "qnum": "03", "question": "73세 뇌졸중 환자(남자)의 배우자가 남편의 항고혈압제를 처방해달라고 의사 A에게 왔다. 환자는 거동이 현저히 곤란하고, A는 환자에게 2년 동안 계속 동일한 항고혈압제를 처방해왔다. 환자는 집에 누워만 지내는 상태로 A가 직접 진찰할 수는 없다. A가 판단하기에 환자에게 항고혈압제를 처방할 필요성과 안전성이 인정될 경우 취할 조치는?", "textbox": "", "images": [], "options": ["대리처방은 불법임을 설명하고 거절", "가족관계증명서 확인 후 처방전 교부", "관할 사회복지사 1인의 동의를 얻어 처방전 교부", "해당 분야 전문의 1인의 동의를 얻어 처방전 교부", "배우자와 환자의 신분증, 가족관계증명서 확인 후 대리수령 신청서를 제출받아 처방전 교부"], "answer": 4, "explanation": "환자의 의식이 없거나 환자의 거동이 현저히 곤란하고 동일한 상병에 대하여 장기간 동일한 처방이 이루어지는 경우 환자의 직계존속ㆍ비속, 배우자 및 배우자의 직계존속, 형제자매 또는 노인의료복지시설에서 근무하는 사람에게 처방전을 대리로 교부할 수 있습니다. 이 경우 대리수령자는 대리수령자의 신분증, 환자의 신분증, 가족관계 확인 서류/노인의료복지시설 재직증명서를 제시한 후 처방전 대리수령 신청서를 제출해야 합니다."}, {"major": "의료법(의료인)", "minor": "처방전", "qnum": "04", "question": "의사 '갑'은 자신이 진료한 역류식도염 환자에게 처방전을 작성하여 내주었다. 환자가 요구할 경우 처방전에 적지 않아야 할 사항은?", "textbox": "", "images": [], "options": ["환자의 주민등록번호", "의료기관의 전화번호", "처방전의 발급 연월일", "의료인의 성명", "질병분류기호"], "answer": 4, "explanation": "환자가 요구할 경우에는 질병분류기호를 적지 않습니다."}, {"major": "의료법(의료인)", "minor": "처방전", "qnum": "05", "question": "의사 '갑'이 환자 '을'에게 처방전을 교부하려고 한다. 이 때 '을'의 요구가 있을 때 처방전에 적지 아니해야 하는 것은?", "textbox": "", "images": [], "options": ["의약품 조제 시 참고사항", "질병분류기호", "처방의약품의 명칭", "환자의 주민등록번호", "환자의 이름"], "answer": 1, "explanation": "처방전의 기재 사항 등(시행규칙 제12조) 제1항 법 제18조에 따라 의사나 치과의사는 환자에게 처방전을 발급하는 경우에는 별지 제9호서식의 처방전에 다음 각 호의 사항을 적은 후 서명(「전자서명법」에 따른 공인전자서명을 포함한다)하거나 도장을 찍어야 한다. 다만, (3)의 사항은 환자가 요구한 경우에는 적지 아니한다. (1) 환자의 성명 및 주민등록번호 (2) 의료기관의 명칭, 전화번호 및 팩스번호 (3) 질병분류기호 (4) 의료인의 성명ㆍ면허종류 및 번호 (5) 처방 의약품의 명칭(일반명칭, 제품명이나 대한약전에서 정한 명칭을 말한다)ㆍ분량ㆍ용법 및 용량 (6) 처방전 발급 연월일 및 사용기간 (7) 의약품 조제시 참고 사항"}, {"major": "의료법(의료인)", "minor": "진료기록부", "qnum": "01", "question": "의사 '갑'은 'A' 의원에서 진료받은 환자들의 진료기록부를 관리하고자 한다. 「의료법」에 따르면 의사 '갑'은 최소 몇 년 동안 진료기록부를 보관해야 하는가?", "textbox": "", "images": [], "options": ["1년", "2년", "5년", "10년", "15년"], "answer": 3, "explanation": "진료기록부 등의 보존(시행규칙 제15조) 제1항 2호-진료기록부 : 10년"}, {"major": "의료법(의료인)", "minor": "진료기록부", "qnum": "02", "question": "의사의 진료기록부 작성·보존과 관련하여 옳은 것은?", "textbox": "", "images": [], "options": ["5년 동안 보존하여야 함", "한글로 기록하도록 노력하여야 함", "진료를 받은 사람의 주소는 기재하지 않음", "전자서명이 기재된 전자문서로 작성·보존할 수 없음", "추가 기재·수정된 경우 추가 기재·수정 전의 원본은 보존이 불필요함"], "answer": 1, "explanation": "1) 10년 동안 보존하여야 함\n2) 의료법 시행규칙 제14조제2항\n3) 의료법 시행규칙 제14조제1항제1호\n4) 전자서명법에 의거해 가능합니다.\n5) 의료법 제22조2항(진료기록부 등)"}, {"major": "의료법(의료인)", "minor": "진료기록부", "qnum": "03", "question": "진료에 관한 기록의 보존에 대해서 틀리게 설명한 것을 고르면?", "textbox": "", "images": [], "options": ["진단서·사망진단서 및 시체검안서 등의 부분은 별도 구분하여 보존하여야 한다.", "진료에 관한 기록은 마이크로필름이나 광디스크에 수록하여 보존할 수 있다.", "방사선사진을 5년간 보존해야 하나 그 소견서는 보관하지 않아도 된다.", "의료기관의 폐업 시에는 진료기록부 등 진료에 관한 기록을 관할 보건소장에게 이관하거나 보건소장의 허가를 받아 자체보관이 가능하다.", "진료기록부는 10년간 보존하여야 한다."], "answer": 2, "explanation": "3) 방사선 사진 및 그 소견서를 5년간 보존하여야 합니다.\n4) 제40조제2항\n의료기관 개설자는 제1항에 따라 폐업 또는 휴업 신고를 할 때 제22조나 제23조에 따라 기록·보존하고 있는 진료기록부 등을 관할 보건소장에게 넘겨야 한다. 다만, 의료기관 개설자가 보건복지부령으로 정하는 바에 따라 진료기록부 등의 보관계획서를 제출하여 관할 보건소장의 허가를 받은 경우에는 직접 보관할 수 있다.\n의료법 문제는 보기가 여러 파트에 걸쳐 나오는 경우도 있습니다. 의료기관 폐업시 진료기록부 등의 이관에 대해서는 뒤에서 다시 다루게 됩니다. 일단 여기서는 한번 읽고 넘어가세요."}, {"major": "의료법(의료인)", "minor": "진료기록부", "qnum": "04", "question": "진료 기록부의 기재 사항으로 틀린 것은?", "textbox": "", "images": [], "options": ["진료 경과 및 예견", "진료 내용", "병력 및 가족력", "요양 급여비용", "진료 일시분"], "answer": 3, "explanation": "진료기록부 등의 기재사항(시행규칙 제14조) 제1항제1호\n① 진료를 받은 자의 주소·성명·주민등록번호 등 인적사항\n② 주된 증상. 이 경우 의사가 필요하다고 인정하면 주된 증상과 관련된 병력·가족력을 추가로 기록할 수 있다.\n③ 진단결과 또는 진단명\n④ 진료경과(외래환자는 재진환자로서 증상·상태, 은 병원에 그의 장모를 보내어 복부 CT 사진 사본과 위내시경 사진 사본을 요구하도록 하였다. 이때 해당 의료기관이 하는 조치로 옳은 것은?", "textbox": "", "images": [], "options": ["진단한 병원 의사의 확인 요청이 없으므로 교부하지 않음", "'갑' 본인 또는 배우자의 친족관계 사실 확인을 거친 후 교부", "'갑'의 진료를 위해 불가피하다고 인정되므로 바로 사본을 교부", "배우자의 직계존속인 장모는 법정대리권이 없으므로 교부할 수 없음", "'갑' 본인의 동의서와 친족관계를 나타내는 증명서 등을 첨부하여 신청 시 교부"], "answer": 4, "explanation": "기록열람 등(제21조) 제3항\n① 환자의 배우자, 직계 존속ㆍ비속, 형제ㆍ자매(환자의 배우자 및 직계 존속ㆍ비속, 배우자의 직계 존속이 모두 없는 경우에 한정한다) 또는 배우자의 직계 존속이 환자 본인의 동의서와 친족관계를 나타내는 증명서 등을 첨부하는 등 보건복지부령으로 정하는 요건을 갖추어 요청한 경우\n'갑'의 장모는 '갑'의 아내의 어머니이므로, 배우자의 직계 존속에 해당합니다. 따라서 본인의 동의서와 친족관계 증명서를 첨부하면 기록의 열람이 가능합니다."}, {"major": "의료법(의료인)", "minor": "기록 열람", "qnum": "08", "question": "의료인은 환자에 대한 기록열람 및 기록의 내용탐지에 응해서는 안 된다. 이에 해당하는 내용은?", "textbox": "", "images": [], "options": ["환자가 이송된 병원에서 진료기록부사본, 치료경위서를 요구하여 송부하였다.", "폭력사고와 연루된 환자가 사망하여 재판부에서 사망자의 진료기록부 및 사망진단서 제출요구를 하여 이에 응하였다.", "환자가 퇴원하면서 방사선 필름에 대한 사본을 요구하여 이에 응하였다.", "생명보험회사 직원이 사망한 환자의 보험금 액수 산정을 위하여 진료기록부 사본을 요구하여 이에 응하였다.", "진료 중이던 환자를 병세악화로 3차 병원으로 이송할 때 환자의 초진기록부를 송부하였다."], "answer": 3, "explanation": "기록열람 등(제21조)\n4) 기록열람, 내용 탐지에 부적절하게 응함으로써 의무를 위반한 것입니다."}, {"major": "의료법(의료인)", "minor": "의료행위의 제한", "qnum": "01", "question": "다음 중 의료 행위에 대해서 옳게 설명한 것은?", "textbox": "", "images": [], "options": ["의료인이 아닌 사람이 대가를 바라지 않고 의료행위를 하였더라도 무면허 의료행위이다.", "의사의 휴가기간 동안 방사선사가 의사의 지시에 따라 단순 가슴 X선 촬영을 해줄 수 있다.", "한의사는 영양제를 정맥주사로 줄 수 있다.", "미용사는 미용목적의 눈썹문신을 할 수 있다.", "약사가 환자의 증세를 듣고 진단을 하여 그에 대한 약을 조제할 수 있다."], "answer": 0, "explanation": "무면허 의료행위 등 금지(제27조) 제1항 의료인이 아니면 누구든지 의료행위를 할 수 없으며 의료인도 면허된 것 이외의 의료행위를 할 수 없다.2), 4), 5) 미용사, 약사, 방사선사는 모두 의료인이 아닙니다.3) 한의사가 주사를 하는 것은 면허된 것 이외의 의료행위입니다."}, {"major": "의료법(의료인)", "minor": "의료행위의 제한", "qnum": "02", "question": "의료법 상 영리 목적으로 환자를 소개·알선·유인하는 행위 및 이를 사주하는 행위에 해당하지 않는 것을 고르면?", "textbox": "", "images": [], "options": ["거동이 불편한 환자의 요청에 따라 교통이 불편한 지역에서 교통 편을 제공하는 행위", "사회복지법인이 개설한 의료기관이 환자의 본인부담금을 감면해주는 행위", "의료기관이 상품권을 배부하는 경우", "택시기사에게 환자 운송의 대가를 주는 경우", "인터넷 사업체를 통해 문의해 오는 사람에게 주치의를 지정해 주는 행위"], "answer": 0, "explanation": "무면허 의료행위 등 금지(제27조) 제3항 누구든지 「국민건강보험법」이나 「의료급여법」에 따른 본인부담금을 면제하거나 할인하는 행위, 금품 등을 제공하거나 불특정 다수인을에게 교통편의를 제공하는 행위 등 영리를 목적으로 환자를 의료기관이나 의료인에게 소개·알선·유인하는 행위 및 이를 사주하는 행위를 하여서는 아니 된다. 다만, 다음 각 호의 어느 하나에 해당하는 행위는 할 수 있다.1) 불특정 다수가 대상인 것도 아니고, 환자의 특정한 사정이 있다고 볼 사유가 충분하므로 교통 편의를 제공하는 것이 가능합니다."}, {"major": "의료법(의료인)", "minor": "의료행위의 제한", "qnum": "03", "question": "다음 중 의사에게 허용된 면허행위에 해당하는 것은?", "textbox": "", "images": [], "options": ["정형외과 전문의가 한의학을 기초로 한 침술행위를 하는 경우", "상급종합병원 신경과 전문의가 자신의 지도하에 간호사에게 진료 보조를 하게 한 행위", "의사가 현장에서 감독하지 않고 간호사에게 젖은파바른표본검사를 위한 검체 채취를 하게 한 행위", "성형외과 전문의가 피부관리사에게 산화알루미늄 성분의 연마제가 든 크리스탈 필링기를 이용하여 피부박피술을 하게 한 행위", "피부과 전문의가 간호조무사에게 모발이식술 과정에서 식모기를 환자 머리부위의 진피층까지 찔러 넣어 모낭을 삽입하게 한 행위"], "answer": 1, "explanation": "무면허 의료행위 등 금지(제27조) 제1항 의료인이 아니면 누구든지 의료행위를 할 수 없으며 의료인도 면허된 것 이외의 의료행위를 할 수 없다.1), 3) 의사가 침습행위를 하는 것, 간호사가 젖은파바른표본검사 검체를 채취하는 것은 면허 이외의 의료행위입니다.4), 5) 피부관리사, 간호조무사는 의료인이 아닙니다."}, {"major": "의료법(의료인)", "minor": "의료행위의 제한", "qnum": "04", "question": "의과대학을 졸업하였으나 의사국가고시에서 불합격한 김모씨가 다른 의사 최모씨의 의사 자격증 사본을 위조하여 의원을 개설하여 의료행위를 시행하였다. 이에 대한 설명으로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["김모씨의 행위는 불법행위이다.", "김모씨는 의과대학 졸업생이므로 박모씨를 후견인으로 삼아 의료행위를 하는 것이 가능하다.", "최모씨가 의사면허를 자의로 대여하여 주었다면 면허취소의 사유가 된다.", "개설신고 접수 시 담당자는 면허증 원본을 대조하지 않은 위를 한 것이다.", "김모씨는 국가비상사태 시에는 국가의 요청을 받아 의료행위가 가능하다."], "answer": 1, "explanation": "1), 2) 의료인이 아니면 누구든지 의료행위를 할 수 없으며 의료인도 면허된 것 이외의 의료행위를 할 수 없다.3) 면허증 대여는 면허취소 사유에 해당4) 맞는 설명면허취소 사유에 대해서는 뒤에서 자세히 다룹니다. 아직 안 나온 내용 때문에 스트레스 받지는 마세요.^^"}, {"major": "의료법(의료인)", "minor": "보수 교육", "qnum": "01", "question": "'A' 병원이 있는 어떤 구에 정전이 발생하였다. 'A' 병원 원장은 입원 환자 'B'의 치료가 계속 지체될 경우 생명에 중대한 위험이 발생할 수 있다고 판단하여 'B'를 급히 다른 병원으로 전원하고자 한다. 'B'는 현재 의사 표현이 불가능하며, 'B'의 보호자와도 연락이 되지 않는다. 「의료법」에 따르면 'A' 병원 원장은 'B'의 전원을 누구에게 승인받아야 하는가?", "textbox": "", "images": [], "options": ["관할 구청장", "관할 광역시장", "관할 보건소장", "관할 경찰서장", "관할 소방서장"], "answer": 0, "explanation": "입원환자의 전원(제47조의2)\n의료기관의 장은 , "question": "의사 '갑'은 관련 서류를 위조·변조하거나 속임수 등 부정한 방법으로 진료비를 거짓 청구하였다. 「의료법」에 따라서 의사 '갑'에게 취해질 조치는?", "textbox": "", "images": [], "options": ["면허 취소", "과징금 처분", "과태료 처분", "의료업 정지", "면허 자격정지"], "answer": 4, "explanation": "자격정지 등(제66조) 제1항 7호 관련 서류를 위조·변조하거나 속임수 등 부정한 방법으로 진료비를 거짓 청구한 때 1년의 범위에서 면허자격을 정지시킬 수 있다."}, {"major": "의료법(의료인)", "minor": "자격정지 등", "qnum": "02", "question": "의원을 개설하여 운영하는 의사 '갑'은 자신이 운영하고 있는 의원에서 근무하는 간호조무사 '을'에게 환자에 대한 심전도 검사를 하도록 지시하였다. 「의료법」에 따라서 보건복지부 장관이 의사 '갑'에게 취할 수 있는 조치는?", "textbox": "", "images": [], "options": ["벌금", "과징금", "과태료", "면허취소", "면허자격정지"], "answer": 4, "explanation": "자격정지 등(제66조) 제1항 제6호 의료기사가 아닌 자에게 의료기사의 업무를 하게 하거나 의료기사에게 그 업무 범위를 벗어나게 한 때 의료기사 등에 관한 법률 및 시행규칙에 따르면 각종 화학적 또는 생리학적 검사(심전도·뇌파·심폐기능·기초대사·기타 생리 기능에 관한 검사)는 임상병리사의 업무 범위에 해당합니다. 따라서 의료기사가 아닌 간호조무사에게 심전도 검사를 하게 한 '갑'은 의료법 제66조(자격정지 등) 제1항 제6호에 따라 면허자격정지에 해당합니다. 유사한 판결 관련 기사 링크입니다. 참고용으로 읽어보셔도 좋을 것 같습니다. https://www.doctorsnews.co.kr/news/articleView.html?idxno=89769"}, {"major": "의료법(의료인)", "minor": "자격정지 등", "qnum": "03", "question": "의료인의 품위 손상 행위로 적절하지 않은 것은?", "textbox": "", "images": [], "options": ["시설 기준에 미치지 못하는 곳에서 하는 진료행위", "불필요한 검사, 투약, 수술 등 지나친 진료행위", "비도덕적 진료행위", "학문적으로 인정되지 아니하는 진료행위", "거짓 또는 과대광고 행위"], "answer": 0, "explanation": "의료인의 품위 손상 행위의 범위(시행령 제32조) 제1항 1. 학문적으로 인정되지 아니하는 진료행위(조산 업무와 간호 업무를 포함한다) 2. 비도덕적 진료행위 3. 거짓 또는 과대 광고 행위 4. 불필요한 검사·투약·수술 등 지나친 진료행위를 하거나 부당하게 많은 진료비를 요구하는 행위 5. 전공의의 선발 등 직무와 관련하여 부당하게 금품을 수수하는 행위 6. 다른 의료기관을 이용하려는 환자를 영리를 목적으로 자신이 종사하거나 개설한 의료기관으로 유인하거나 유인하게 하는 행위 7. 자신이 처방전을 발급하여 준 환자를 영리를 목적으로 특정 약국에 유치하기 위하여 약국개설자나 약국에 종사하는 자와 담합하는 행위"}, {"major": "의료법(의료인)", "minor": "자격정지 등", "qnum": "04", "question": "의사의 자격정지 요건에 해당하지 않는 것은? (답 2개)", "textbox": "", "images": [], "options": ["전공의 채용을 약속하고 승용차를 받은 경우", "치과의사에게 응급실 당직을 서게 한 경우", "외국의 의사 자격증을 소지한 자에게 자신의 휴가 동안 진료 행위를 시킨 경우", "교통사고 환자의 진료비를 허위로 청구한 경우", "의료기관의 주소를 이전한 후 일간 신문에 광고를 게재한 경우"], "answer": 1, "explanation": "1), 4) 의료인의 품위 손상 행위로 자격정지 요건에 해당합니다.2) 의료인에게 면허 이외의 행위를 하게 한 경우는 5년 이하의 징역이나 5천만원 이하의 벌금형에 처합니다.3) 의료법 시행규칙 제18조(외국면허 소지자의 의료행위)에 따르면 다음과 같은 경우에만 보건복지부장관의 승인을 받아 외국면허 소지자의 국내의료행위가 가능합니다.(1) 외국과의 교육 또는 기술협력에 따른 교환교수의 업무(2) 교육연구사업을 위한 업무(3) 국제의료봉사단의 의료봉사 업무5) 적법한 광고이므로 자격정지와 관련이 없습니다."}, {"major": "의료법(의료인)", "minor": "자격정지 등", "qnum": "05", "question": "의사 '갑'은 비만을 치료하려고 방문한 환자의 허벅지에 지방분해 주사를 시술하도록 임상병리사 '을'에게 지시하고 '을'은 이를 시행하였다. '갑'은 형사재판결과 법원으로부터 벌금형을 선고받아 확정되었다. 보건복지부장관이 의사 '갑'에게 내릴 수 있는 행정처분은?", "textbox": "", "images": [], "options": ["면허취소", "면허정지", "과태료 부과처분", "과징금 부과처분", "의료업 정지처분"], "answer": 1, "explanation": "'갑'은 의료기사에게 의료행위를 하게 만들었습니다. 이로 인해 제87조의2(벌칙) 2항3조에 따라 5년 이하의 징역형 또는 5천만원 이하의 벌금형에 처해지는데, 벌금형을 선고받은 상태입니다.자격정지 등(제66조) 제1항제6호의료기사가 아닌 자에게 의료기사의 업무를 하게 하거나 의료기사에게 그 업무 범위를 벗어나게 한 때여기에 해당하므로, 보건복지부장관은 의사 '갑'에게 1년의 범위 내에서 면허정지의 행정처분을 내릴 수 있습니다.참고로 징역형이나 벌금형은 형벌로, 행정처분이 아닙니다. 면허정지는 행정처분에 속합니다.또한, 만약 의사 '갑'이 벌금형이 아니라 징역형을 선고받았다면 의료 관련 법령 위반으로 금고 이상의 형을 선고 받았으므로 면허정지가 아니라 면허취소의 사유가 되었을 것입니다."}, {"major": "의료법(의료인)", "minor": "자격정지 등", "qnum": "06", "question": "개인의원을 개설 운영하고 있는 의사 '갑'은 임상병리사에게 자신이 진료한 환자의 가슴 X선 촬영을 하게 하였다. 이때 의사 '갑'이 받을 수 있는 행정 조치는?", "textbox": "", "images": [], "options": ["면허 취소", "과태료 부과", "의료기관 폐업 처분", "의료기관 개설신고 취소", "1년의 범위에서 자격정지"], "answer": 4, "explanation": "자격정지 등(제66조) 제1항제6호의료기사가 아닌 자에게 의료기사의 업무를 하게 하거나 의료기사에게 그 업무 범위를 벗어나게 한 때또한 답지에는 없지만, 의료인이 아닌 이에게 의료행위를 하게 하였으므로 면허정지 이외에도 5년 이하의 징역형이나 5천만원 이하의 벌금형을 선고할 수 있습니다. 징역이나 벌금은 행정 조치가 아닙니다."}, {"major": "의료법(의료인)", "minor": "자격정지 등", "qnum": "07", "question": "의료인의 품위 손상 행위에 해당하는 것은 무엇인가?", "textbox": "", "images": [], "options": ["경찰의 요청에 의해 운전자에게서 채혈한 뒤 혈중 알코올 농도를 경찰에게 알린 경우", "의료기관 개설자가 될 수 없는 자에게 고용되어 의료행위를 한 때", "노인 진료 후에 본인부담금을 면제해준 경우", "수혈을 거부하는 환자에서 수혈은 하지 않았으나 다른 필요한 조치를 시행한 때", "간호조무사에게 전산화 단층 촬영을 시행하게 한 때"], "answer": 2, "explanation": "의료인의 품위 손상 행위의 범위(시행령 제32조) 제1항\n1. 학문적으로 인정되지 아니하는 진료행위(조산 업무와 간호 업무를 포함한다)\n2. 비도덕적 진료행위\n3. 거짓 또는 과대 광고행위\n4. 불필요한 검사·투약·수술 등 지나친 진료 행위를 하거나 부당하게 많은 진료비를 요 구하는 행위\n5. 전공의의 선발 등 직무와 관련하여 부당 하게 금품을 수수하는 행위\n6. 다른 의료기관을 이용하려는 환자를 영리를 목적으로 자신이 종사하거나 개설한 의료기 관으로 유인하거나 유인하게 하는 행위\n7. 자신이 처방전을 발급하여 준 환자를 영 리를 목적으로 특정 약국에 유치하기 위 하여 약국개설자나 약국에 종사하는 자와 담합하는 행위\n3) 6.에 해당하는 내용으로, 본인 부담금을 면제해 주는 것은 영리 목적으로 환자를 유인하는 행위입니다."}, {"major": "의료법(의료인)", "minor": "자격정지 등", "qnum": "08", "question": "제약회사 직원 A는 종합병원 의사 B를 만나, 자사에서 생산하는 위산분비억제제의 처방량을 늘리는 조건으로 1,000만 원 상당의 상품권을 줄 테니 앞으로 잘 봐달라는 취지의 부탁을 했다. B는 이를 수락하여 상품권을 받았고, 후에 기소되어 법원으로부터 벌금형을 선고받아 확정되었다. 보건복지부장관이 B에게 할 수 있는 처분은?", "textbox": "", "images": [], "options": ["면허취소", "개설허가 취소", "면허자격 정지", "의료기관 폐쇄", "의료업무정지"], "answer": 2, "explanation": "자격정지 등(제66조) 제1항제9호\n제23조의5(부당한 경제적 이익 등의 취득 금 지)를 위반하여 부당한 경제적 이익 등을 제 공받은 때\n이 경우는 부당한 경제적 이익 등을 제공받은 때에 해당하므로 보건복지부장관이 자격정지 처분을 내릴 수 있습니다."}, {"major": "의료법(의료인)", "minor": "자격정지 등", "qnum": "09", "question": "의사 '갑'은 간호사로 하여금 환자의 복부초음파 검사를 하게 하였다. 이 때 의사 '갑'이 받을 수 있는 처분은?", "textbox": "", "images": [], "options": ["면허 취소", "1년의 범위에서 면허 정지", "300만 원 이하의 과태료 부과", "2,000만 원 이하의 과징금 부과", "5년 이하의 징역형이나 5000만 원 이하의 벌금형"], "answer": 4, "explanation": "2021년 3월 30일에 법이 개정되며 문제 풀이 법이 변경된 문제입니다. 이 문제에서는 의사 '갑'이 의료인인 간호사에게 면허사항 외의 의료행위인 복부초음파 검사를 하게 만들었습 니다. 이는 의료법 제87조의2에 해당하여 5 년 이하의 징역형이나 5천만원 이하의 벌금형 에 처하게 됩니다.\n참고로 벌금, 과태료, 과징금은 각각 의미하는 바가 다르므로, 헷갈리지 않도록 조심하기 바 랍니다."}, {"major": "의료법(의료인)", "minor": "자격정지 등", "qnum": "10", "question": "의료법에서 말하는 의료인의 품위 손상 행위의 범위에 들어가는 것은?", "textbox": "", "images": [], "options": ["불필요하게 과잉진료를 시행하는 경우", "의료인이 아닌 자에게 의료행위를 시키는 경우", "의료인이 아닌 자에게 고용되어 의료행위를 한 경우", "방사선사가 아닌 자에게 흉부 단순 방사선 촬영을 시킨 경우", "진단서를 허위로 작성한 경우"], "answer": 0, "explanation": "의료인의 품위 손상 행위의 범위(시행령 제32조) 제1항\n1. 학문적으로 인정되지 아니하는 진료행위\n(조산 업무와 간호 업무를 포함한다)\n2. 비도덕적 진료행위\n3. 거짓 또는 과대 광고행위\n4. 불필요한 검사·투약·수술 등 지나친 진료행위를 하거나 부당하게 많은 진료비를 요구하는 행위\n5. 전공의의 선발 등 직무와 관련하여 부당하게 금품을 수수하는 행위\n6. 다른 의료기관을 이용하려는 환자를 영리를 목적으로 자신이 종사하거나 개설한 의료기관으로 유인하거나 유인하게 하는 행위\n7. 자신이 처방전을 발급하여 준 환자를 영리를 목적으로 특정 약국에 유치하기 위하여 약국개설자나 약국에 종사하는 자와 담합하는 행위\n의료인의 품위 손상 행위의 항목과 품위 손상 행위는 아니지만 자격정지에 해당하는 항목을 구분하여 알아두세요."}, {"major": "의료법(의료인)", "minor": "자격정지 등", "qnum": "11", "question": "의사의 자격을 정지할 수 있는 행위가 아닌 것은?", "textbox": "", "images": [], "options": ["의료기사가 아닌 동생에게 흉부 단순 방사선 촬영 업무를 시켰다.", "환자의 맥을 짚어서 사상의학에 따라 체질을 분류하여 그에 맞는 항생제를 투여하였다.", "불필요한 CT 촬영을 시행하여 많은 진료비를 요구하였다.", "의원 개원시 신문에 의원의 광고를 게재하였다.", "허위 진단서를 발급하였다."], "answer": 3, "explanation": "1) 의료 기사가 아닌 자에게 의료 기사의 업무를 하게 하거나 의료기사에게 그 업무 범위를 벗어나게 한 때는 자격정지 사유\n2) 학문적으로 인정되지 않는 행위는 의료인의 품위 손상 행위로 자격정지 사유\n3) 불필요한 검사·투약·수술 등 과잉진료 행위를 하거나 부당하게 많은 진료비를 요구하는 행위는 품위 손상 행위로서 자격정지 사유\n4) 적법한 광고입니다.\n5) 진단서, 검안서 또는 증명서를 거짓으로 작성하여 내주거나 진료기록부 등을 허위로 작성하는 것은 자격정지 사유"}, {"major": "의료법(의료인)", "minor": "자격정지 등", "qnum": "12", "question": "사회복지법인이 개설한 의료기관이라도 환자의 경제적 능력과는 상관없이 노인환자에게 백내장 수술을 시행하고 본인 부담금을 받지 않은 뒤, 공단 부담금만 건강보험공단에 청구한다면 위법행위이다. 어떤 점에서 그러한가?", "textbox": "", "images": [], "options": ["법인의 대표자가 의료인이 아니기 때문에", "건강보험공단에 환자의 본인 부담금을 청구하지 않았으므로", "영리를 목적으로 환자를 유인하는 행위이기 때문에", "노인에게만 혜택을 주었기 때문에", "사회 복지 법인은 의료기관 개설이 불가능하기 때문에"], "answer": 2, "explanation": "환자의 경제적 능력과 무관하게 본인 부담금을 감면하면 당연히 더욱 많은 환자들이 그 의료기관을 찾게 됩니다. 의료기관은 그 환자들의 진료에 들어가는 비용을 안 받는 것이 아니라 건강보험 공단에 청구해서 받는다고 했으므로 결국 영리를 목적으로 더 많은 환자들을 끌어들이고자 하는 행동을 한 것으로 볼 수 있습니다."}, {"major": "의료법(의료인)", "minor": "자격정지 등", "qnum": "13", "question": "의사 '갑'은 건강한 45세 남성 '을'을 요추간판탈출로 거짓 진단하고 진단서를 발급하였다. 이때, 「의료법」에 따라 보건복지부장관이 의사 '갑'에게 취할 수 있는 조치는?", "textbox": "", "images": [], "options": ["과징금", "과태료", "지정 명령", "면허자격 정지", "의료기관 개설 허가 취소"], "answer": 3, "explanation": "진단서·검안서 또는 증명서를 거짓으로 작성하여 내주거나 제22조(진료기록부 등)제1항에 따른 진료기록부 등을 거짓으로 작성하거나 고의로 사실과 다르게 추가기재·수정한 때에는 자격정지가 됩니다."}, {"major": "의료법(의료인)", "minor": "자격정지 등", "qnum": "14", "question": "개업의가 의사면허를 소지하지 않은 피부관리사에게 피부박피술을 시행하도록 하였다. 어떠한 처분을 받을 수 있는가? (답 2개)", "textbox": "", "images": [], "options": ["과태료부과", "벌금형", "징역형", "면허정지", "면허취소"], "answer": 1, "explanation": "의료인이 아닌 자로 하여금 의료행위를 하게 하는 것은 원래 자격정지 요건에 해당하였으나 법이 개정되면서 5년 이하의 징역형이나 5천만원 이하의 벌금형에 처하는 것으로 바뀌었습니다."}, {"major": "의료법(의료인)", "minor": "자격정지 등", "qnum": "15", "question": "의사 '을'은 자신이 처방전을 발급해 준 환자를 특정한 약국에 가도록 알선하였다. '을'은 이 약국의 개설자로부터 환자 유치에 따른 보상을 받기로 담합하고 금품을 제공받았다. 이때 '을'에게 내릴 수 있는 행정처분은?", "textbox": "", "images": [], "options": ["면허정지", "벌금 부과", "면허취소", "과징금 징수", "과태료 부과"], "answer": 0, "explanation": "시행령 제32조(의료인의 품위 손상 행위의 범위)제1항제7호\n자신이 처방전을 발급하여 준 환자를 영리를 목적으로 특정 약국에 유치하기 위하여 약국개설자나 약국에 종사하는 자와 담합하는 행위"}, {"major": "의료법(의료인)", "minor": "자격정지 등", "qnum": "16", "question": "의사의 품위 손상 행위로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["가족의 부탁으로 환자를 자신이 수련 받은 종합병원에 소개하는 경우", "전공의 선발을 약속하고 금품을 수수한 경우", "공인받지 못한 유방암을 완치할 수 있다고 광고", "처방전을 발급해 주면서 약국을 소개하고 약국으로부터 그 대가를 받는 경우", "정신질환자에게 진료행위를 빙자하여 성추행을 한 경우"], "answer": 0, "explanation": "가족의 부탁으로 자신이 수련 받은 종합병원에 소개하는 것은 비영리적인 행위이므로 품위 손상 행위가 아닙니다."}, {"major": "의료법(의료인)", "minor": "자격정지 등", "qnum": "17", "question": "의료인의 품위 손상 행위가 아닌 것은?", "textbox": "", "images": [], "options": ["거짓 광고 행위", "면허증 대여 행위", "직무와 관련하여 부당하게 금품을 수수하는 행위", "비도덕적 진료행위", "학문적으로 인정되지 않는 진료행위"], "answer": 1, "explanation": "의료인의 품위 손상 행위의 범위(시행령 제32조) 제1항1. 학문적으로 인정되지 아니하는 진료행위 (조산 업무와 간호 업무를 포함한다)2. 비도덕적 진료행위3. 거짓 또는 과대 광고행위4. 불필요한 검사·투약·수술 등 지나친 진료행위를 하거나 부당하게 많은 진료비를 요구하는 행위5. 전공의의 선발 등 직무와 관련하여 부당하게 금품을 수수하는 행위6. 다른 의료기관을 이용하려는 환자를 영리를 목적으로 자신이 종사하거나 개설한 의료기관으로 유인하거나 유인하게 하는 행위7. 자신이 처방전을 발급하여 준 환자를 영리를 목적으로 특정 약국에 유치하기 위하여 약국개설자나 약국에 종사하는 자와 담합하는 행위2) 면허증 대여 행위는 의사면허 취소 사유입니다."}, {"major": "의료법(의료인)", "minor": "자격정지 등", "qnum": "18", "question": "의사가 약국의 약사와 담합했다면 어떤 법령을 근거로 규제할 수 있는가?", "textbox": "", "images": [], "options": ["비도덕적 진료행위", "지나친 진료행위", "거짓 또는 과대광고", "의료인의 품위 손상", "학문적으로 인정되지 않는 진료 행위"], "answer": 3, "explanation": "자신이 처방전을 발급하여 준 환자를 영리를 목적으로 특정 약국에 유치하기 위하여 약국개설자나 약국에 종사하는 자와 담합하는 행위는 의료인의 품위 손상 행위에 해당합니다."}, {"major": "의료법(의료인)", "minor": "자격정지 등", "qnum": "19", "question": "의료기관 개설자가 될 수 없는 자에게 고용되어 의료행위를 하여 의사 면허의 자격이 정지된 경우 최대 몇 년까지 의사 면허를 정지시킬 수 있는가?", "textbox": "", "images": [], "options": ["6개월", "1년", "2년", "3년", "5년"], "answer": 1, "explanation": "자격정지 등(제66조) 제1항보건복지부장관은 의료인이 다음 각 호의 어느 하나에 해당하면 1년의 범위에서 면허자격을 정지시킬 수 있다."}, {"major": "의료법(의료기관)", "minor": "의료기관", "qnum": "01", "question": "'A' 요양병원에서 근무하는 의사 '갑'은 환자에 대한 입원 가능 여부를 판단하고 있다. 「의료법」에 따라서 'A' 요양병원에 입원 가능한 대상은?", "textbox": "", "images": [], "options": ["A형 간염환자", "노인성 치매환자", "신종인플루엔자 의사환자", "외과적 수술을 앞둔 환자", "기본의 장애로 인하여 독립적으로 일상생활을 영위하는 데 중대한 제약이 있는 환자"], "answer": 1, "explanation": "요양병원의 운영(시행규칙 제36조)제1항-요양병원의 입원 대상은 다음 각 호의 어느 하나에 해당하는 자로서 주로 요양이 필요한 자로 한다. 1. 노인성 질환자, 2. 만성 질환자, 3. 외과적 수술 또는 상해 후 회복 기간에 있는 자제3항-정신질환자(노인성 치매환자는 제외한다)는 같은 법 제3조제3호에 따른 정신의료기관 외의 요양병원의 입원 대상으로 하지 아니한다."}, {"major": "의료법(의료기관)", "minor": "의료기관", "qnum": "02", "question": "다음 중 의료법 상 의료기관이 아닌 것은?", "textbox": "", "images": [], "options": ["조산원", "보건의료원", "요양병원", "종합병원", "한의원"], "answer": 1, "explanation": "의료기관의 종류는 종합병원 병원 치과병원 한방병원 요양병원 의원 치과의원 한의원 및 조산원으로 나눈다(제3조제2항).보건의료원은 보건소 중 병원의 요건을 갖춘 기관으로, 보건의료기관에 속하나 의료기관은 아닙니다."}, {"major": "의료법(의료기관)", "minor": "의료기관", "qnum": "03", "question": "다음 설명 중 틀린 것을 고르시오.", "textbox": "", "images": [], "options": ["의료인은 의료기관을 개설할 수 있다.", "종합병원은 의사, 치과의사가 진료하는 곳이다.", "조산원은 의료기관이다.", "종합병원은 100명 이상을 수용할 수 있는 시설을 갖추어야 한다.", "병원은 30명 이상을 수용할 수 있는 시설을 갖추어야 한다."], "answer": 0, "explanation": "1) 간호사는 의료인이지만 의료기관을 개설하지는 못합니다.의료법 문제는 보기가 여러 파트를 조합해서 나오기도 합니다. 뒤쪽에 나오는 내용이지만 미리 살펴볼까요?의료기관의 개설은 의료법 제33조에서 다룹니다. 제2항을 보면, 의료기관을 개설할 수 있는 자는,① 의사, 치과의사, 한의사 또는 조산사② 국가나 지방자치단체③ 의료업을 목적으로 설립된 법인(이하 “의료법인”이라 한다)④ 「민법」이나 특별법에 따라 설립된 비영리 법인⑤ 「정부투자기관 관리기본법」에 따른 정부 투자기관, 「지방의료원의 설립 및 운영에 관한 법률」에 따른 지방의료원, 「한국보훈복지 의료공단법」에 따른 한국보훈복지의료공단따라서 간호사는 의료인이지만 의료기관을 개설할 수 없습니다."}, {"major": "의료법(의료기관)", "minor": "의료기관", "qnum": "04", "question": "「의료법」상 병원급 의료기관 중에서 특정 진료과목이나 특정 질환 등에 대하여 난이도가 높은 의료행위를 하는 병원으로, 다음의 요건을 갖춘 경우 보건복지부장관이 지정할 수 있는 것은?", "textbox": "• 특정 질환별•진료과목별 환자의 구성비율 등이 보건복지부령으로 정하는 기준에 해당할 것\n• 보건복지부령으로 정하는 수 이상의 진료과목을 갖추고 각 진료과목마다 전속하는 전문의를 둘 것", "images": [], "options": ["병원", "종합병원", "전문병원", "정신병원", "상급종합병원"], "answer": 2, "explanation": "전문병원 지정(제3조의 5)\n1) 보건복지부장관은 병원급 의료기관 중에서 특정 진료과목이나 특정 질환 등에 대하여 난이도가 높은 의료행위를 하는 병원을 전문병원으로 지정할 수 있다.\n2) 1)에 따른 전문병원은 다음 각 호의 요건을 갖추어야 한다.\n(1) 특정 질환별/진료과목별 환자의 구성비율 등이 보건복지부령으로 정하는 기준에 해당할 것\n(2) 보건복지부령으로 정하는 수 이상의 진료과목을 갖추고 각 진료과목마다 전속하는 전문의를 둘 것"}, {"major": "의료법(의료기관)", "minor": "의료기관", "qnum": "05", "question": "150병상을 갖춘 종합병원에 반드시 설치하여야 하는 진료과목은?", "textbox": "", "images": [], "options": ["치과", "내과", "병리과", "마취통증의학과", "정신건강의학과"], "answer": 3, "explanation": "300병상 이하 : 내과•외과•소아청소년과•산부인과 중 3개 진료과목, 영상의학과, 마취통증의학과와 진단검사의학과 또는 병리과를 포함한 7개 이상의 진료과목"}, {"major": "의료법(의료기관)", "minor": "의료기관", "qnum": "06", "question": "의사 'A'는 본인이 운영하는 50병상 규모의 'B' 병원을 200병상 규모의 종합병원으로 확장하여 운영하고자 한다. 'B' 병원에는 현재 내과, 외과, 산부인과, 소아청소년과, 마취통증의학과, 병리과가 개설되어 있다. 「의료법」에 따라서 추가로 설치해야 하는 진료과목은?", "textbox": "", "images": [], "options": ["치과", "정형외과", "영상의학과", "진단검사의학과", "정신건강의학과"], "answer": 2, "explanation": "종합병원(제3조의3)\n① 종합병원은 다음 각 호의 요건을 갖추어야 한다.\n1. 100개 이상의 병상\n2. 300병상 이하 : 내과, 외과, 소아청소년과, 산부인과 중 3개 진료과목, 영상의학과, 마취통증의학과와 진단검사의학과 또는 병리과를 포함한 7개 이상의 진료과목, 각 진료과목마다 전속하는 전문의를 둘 것\n의료기관 중 종합병원의 개설요건에 대한 문제입니다. 현재 'B' 병원에 개설되어 있는 진료과목 외에 추가로 필요한 진료과목은 영상의학과입니다. 이 문제와 비교해서 300 병상을 초과하는 종합병원의 요건에 대해서도 알아둡시다."}, {"major": "의료법(의료기관)", "minor": "의료기관", "qnum": "07", "question": "'A' 종합병원은 병상 수를 400개 병상에서 200개 병상 규모로 축소하고자 한다. 병상 수 변경 후 'A' 종합병원에서 「의료법」에 따라서 반드시 남겨야 하는 진료 과목은?", "textbox": "", "images": [], "options": ["정형외과", "가정의학과", "소아청소년과", "마취통증의학과", "정신건강의학과"], "answer": 3, "explanation": "종합병원은 다음 각 호의 요건을 갖추어야 한다.1. 100개 이상의 병상2. 300병상 이하: 내과, 외과, 소아청소년과, 산부인과 중 3개 진료과목, 영상의학과, 마취통증의학과와 진단검사의학과 또는 병리과를 포함한 7개 이상의 진료과목, 각 진료과목마다 전속하는 전문의를 둘 것3. 300병상 초과: 내과, 외과, 소아청소년과, 산부인과, 영상의학과, 마취통증의학과, 진단검사의학과 또는 병리과, 정신건강의학과 및 치과를 포함한 9개 이상의 진료과목, 각 진료과목마다 전속하는 전문의를 둘 것300병상 초과 종합병원에서 300병상 이하 종합병원이 되는 경우입니다. 영상의학과와 마취통증의학과는 두 경우 모두 필수진료과목에 해당합니다."}, {"major": "의료법(의료기관)", "minor": "의료기관", "qnum": "08", "question": "300병상 이하의 종합병원에서 반드시 갖추어야 하는 진료과목은?", "textbox": "", "images": : 2, "explanation": "개설 등(의료법 제33조) 제8항\n제2항제1호의 의료인은 어떠한 명목으로도 둘 이상의 의료기관을 개설·운영할 수 없다. 다만, 2 이상의 의료인 면허를 소지한 자가 의원급 의료기관을 개설하려는 경우에는 하나의 장소에 한하여 면허 종별에 따른 의료기관을 함께 개설할 수 있다."}, {"major": "의료법(의료기관)", "minor": "의료기관의 개설 및 폐업·휴업", "qnum": "25", "question": "'구' 지역에서 의원을 개설 운영하고 있는 의사 '갑'은 3주간 예정으로 해 외여행을 가려고 한다. 그 기간에는 대신할 다른 의사를 구하지 않고 의 료기관을 관리하지 않으나 돌아와 환자를 계속 볼 생각이다. 이 경우 '갑' 이 취해야 할 조치로 옳은 것은?", "textbox": "", "images": [], "options": ["구청장에게 폐업신고를 하여야 한다.", "구청장에게 휴업신고를 하여야 한다.", "관할 보건소장에게 이 사실을 신고한다.", "의원 입구에 안내문을 걸고 휴업한다.", "소속 의사협회 분회장에게 이 사실을 신고한다."], "answer": 3, "explanation": "폐업·휴업 신고와 진료기록부 등의 이관(제40조) 제1항\n의료기관 개설자는 의료업을 폐업하거나 1개월 이상 휴업하려면 보건복지부령으로 정하는 바에 따라 관할 시장·군수·구청장에게 신고 하여야 한다.\n이 문제의 경우 의원이므로 입원환자가 없어 1개월 미만 휴업을 신고하지 않아도 됩니다."}, {"major": "의료법(의료기관)", "minor": "의료기관의 개설 및 폐업·휴업", "qnum": "26", "question": "80병상의 내과 병원이 최근 마취통증의학과와 정신건강의학과 진료과목 을 추가하고, 입원실을 100병상으로 늘리면서 의료기관의 명칭까지 변 경하고자 한다. 개설자가 해야 하는 행정절차는?", "textbox": "", "images": [], "options": ["의료기관 개설사항 변경신고서를 소속 의사협회 분회장에게 제출", "의료기관 신고사항 변경신고서를 관할 구청장에 제출", "의료기관 재개설 허가신청서를 관할 보건소장에게 제출", "의료기관 허가사항 변경신청서를 광역시장에 제출", "별도 신고나 허가를 받을 필요가 없음"], "answer": 3, "explanation": "의료기관 종류가 병원이기 때문에 개설허가 사항의 변경허가(시행규칙 28조)에 따르면 개 설허가 사항 변경신청서를 시·도지사에게 제 출해야 합니다."}, {"major": "의료법(의료기관)", "minor": "의료기관의 개설 및 폐업·휴업", "qnum": "27", "question": "의원의 의사가 6개월의 해외연수를 위해 폐업 신고를 하려고 한다. 진료기록부를 자체 보관하고자 할 때 누구의 허가를 받아야 하는가?", "textbox": "", "images": [], "options": ["관할 보건소장", "시군구청장", "시도지사", "의사협회 해당 지역 지부장", "보건복지부장관"], "answer": 0, "explanation": "폐업 휴업 신고와 진료기록부 등의 이관(제40조) 제2항\n폐업이나 휴업 신고를 할 때 기록·보존하고 있는 진료기록부 등을 관할 보건소장에게 넘겨야 한다. 다만, 보관계획서를 제출하여 보건소장의 허가를 받은 때에는 직접 보관할 수 있다."}, {"major": "의료법(의료기관)", "minor": "의료기관의 개설 및 폐업·휴업", "qnum": "28", "question": "의원의 원장인 김씨는 연수를 위해 6개월간 휴업하려고 하며, 진료기록부를 자체 보관하고자 한다. 이 때 해야 할 일은?", "textbox": "", "images": [], "options": ["지방자치단체장에게 진료기록 보관 허가를 받는다.", "관할 보건소장에게 임의의 서식으로 서면신고를 한다.", "관할 보건소장에게 전화로 신고하고 자체 보관할 수 있다.", "관할 경찰서장에게 보관계획서를 제출하여 허가를 받는다.", "관할 보건소장에게 보관계획서를 제출하여 허가를 받는다."], "answer": 4, "explanation": "폐업·휴업 신고와 진료기록부 등의 이관(제40조) 제1항\n① 의료기관 개설자는 의료업을 폐업하거나 1개월 이상 휴업하려면 보건복지부령으로 정하는 바에 따라 관할 시장·군수·구청장에게 신고하여야 한다.\n② 의료기관 개설자는 ①에 따라 폐업 또는 휴업 신고를 할 때 제22조나 제23조에 따라 기록·보존하고 있는 진료기록부 등을 관할 보건소장에게 넘겨야 한다. 다만, 의료기관 개설자가 보건복지부령으로 정하는 바에 따라 진료기록부 등의 보관계획서를 제출하여 관할 보건소장의 허가를 받은 경우에는 직접 보관할 수 있다."}, {"major": "의료법(의료기관)", "minor": "의료기관의 개설 및 폐업·휴업", "qnum": "29", "question": "의료법에 명시된 의사의 신고의무로 옳지 않은 것은?", "textbox": "", "images": [], "options": ["의원의 개설", "검안 변사체", "의사 실태", "20일 동안 휴업 시", "취업 현황"], "answer": 3, "explanation": "1) 시장·군수·구청장에 신고\n2) 관할 경찰서장에 신고\n3), 5) 보건복지부장관에 신고\n4) 의료기관 개설자는 의료업을 폐업하거나 1개월 이상 휴업하려면 보건복지부령으로 정하는 바에 따라 관할 시장·군수·구청장에게 신고하여야 한다."}, {"major": "의료법(의료기관)", "minor": "의료기관의 개설 및 폐업·휴업", "qnum": "30", "question": "의료기관 개설자는 의료업을 어느 기간 이상 휴업하게 될 때 시군구청장에게 신고해야 하는가?", "textbox": "", "images": [], "options": ["1일", "1주", "1달", "3달", "6달"], "answer": 2, "explanation": "폐업 휴업 등의 신고와 진료기록부 등의 이관(제40조) 제1항\n의료기관 개설자는 의료업을 폐업하거나 1개월 이상 휴업하려면 보건복지부령으로 정하는 바에 따라 시군구청장에게 신고하여야 합니다."}, {"major": "의료법(의료기관)", "minor": "의료기관의 개설 및 폐업·휴업", "qnum": "31", "question": "군 지역에 위치하는 '○○의원'은 내과, 영상의학과, 진단검사의학과를 진료과목으로 개설하여 15병상을 운영하고 있다. 진료과목에 피부과, 재활의학과를 추가하려 할 때 개설자가 해야 할 행정적 조치는?", "textbox": "", "images": [], "options": ["군수에게 신고", "도지사에게 신고", "보건소장에게 신고", "소속 의사회 분회에 신고", "아무런 조치가 필요하지 않다."], "answer": 0, "explanation": "개설(제33조) 제5항개설된 의료기관이 개설 장소를 이전하거나 개설에 관한 신고 또는 허가사항 중 보건복지부령으로 정하는 중요사항을 변경하려 하는 때에도 제3항 또는 제4항(의원은 시군구청장에게, 병원은 시도지사에게 허가를 받음)과 같다."}, {"major": "의료법(의료기관)", "minor": "의료기관의 개설 및 폐업·휴업", "qnum": "32", "question": "의료법 위반으로 볼 수 있는 행위는?", "textbox": "", "images": [], "options": ["환자가 병원에 방문하지 않고 보호자에게 처방한 경우", "한의사가 한방물리치료를 한 경우", "한의사가 청진기로 진단을 내린 경우", "의사, 치과의사의 면허를 다 가진 사람이 의원과 치과의원을 각각 다른 건물에 동시에 개원한 경우", "한의사가 흉부 X선 촬영 사진 판독을 의사에게 의뢰한 경우"], "answer": 3, "explanation": "의료인은 하나의 의료기관만을 개설할 수 있다. 다만, 2 이상의 의료인 면허를 소지한 자가 의원급 의료기관을 개설하려는 경우에는 하나의 장소에 한하여 면허 종별에 따른 의료기관을 함께 개설할 수 있다."}, {"major": "의료법(의료기관)", "minor": "의료기관의 개설 및 폐업·휴업", "qnum": "33", "question": "광역시에서 개인 의원을 개설하고 있는 의사가 부득이한 사유로 4개월 동안 한시적으로 휴업하고자 한다. 진료기록부의 보관방법으로 옳은 것은?", "textbox": "", "images": [], "options": ["관할 의사회 지부에 넘겨 보관", "휴업신고서와 함께 광역시장에게 넘김", "인접 의료기관의 개설자인 의사가 보관하도록 넘김", "관할 국민건강보험관리공단 지역사무소에 넘겨 보관", "보관계획서를 제출하여 관할 보건소장의 허가를 받고 직접 보관"], "answer": 4, "explanation": "폐업·휴업 신고와 진료기록부 등의 이관(40조) 제2항의료기관 개설자는 제1항에 따라 폐업 또는 휴업 신고를 할 때 제22조나 제23조에 따라 기록·보존하고 있는 진료기록부 등을 관할 보건소장에게 넘겨야 한다. 다만, 의료기관 개설자가 보건복지부령으로 정하는 바에 따라 진료기록부 등의 보관계획서를 제출하여 관할 보건소장의 허가를 받은 경우에는 직접 보관할 수 있다."}, {"major": "의료법(의료기관)", "minor": "의료기관의 운영", "qnum": "01", "question": "원격 의료에 대해 설명한 것 중 옳은 것을 고르면?", "textbox": "", "images": [], "options": ["원격지 의사의 진료 및 처방전 교부는 적법하다.", "원격지 의사의 진료는 불법이나 처방전 교부는 적법이다.", "원격지 의사의 진료 및 현지 의사의 처방전 교부는 적법하다.", "현지 의사의 진료는 적법하나 처방전 교부는 불법이다.", "현지 의사의 처방전 교부는 적법하나 진료는 불법이다."], "answer": 2, "explanation": "원격지 의사는 진료와 의료지식 및 기술을 현지 의사에게 지원해 주는 역할을 합니다. 또한 현지 의사는 그러한 지원을 바탕으로 처방전을 교부하고 원격지 의사의 원격 의료에 따라 의료행위를 하게 됩니다. 그러므로 환자에 대한 책임은 현지 의사에게 있습니다.※ 원격지 의사 : 진료만현지 의사 : 진료+처방전 교부"}, {"major": "의료법(의료기관)", "minor": "의료기관의 운영", "qnum": "02", "question": "의료기관 개설자 또는 관리자가 준수해야 할 사항이 아닌 것은?", "textbox": "", "images": [], "options": ["입원실의 정원을 초과하여 입원시키지 않는다.", "입원실은 소아와 성인별로 구분한다.", "임부와 해산부는 입원실에만 입원시킨다.", "전염의 우려가 있는 환자는 그 밖의 환자와 같이 입원시키지 않는다.", "정신병 환자는 정신병 입원실 외에는 입원시키지 않는다."], "answer": 1, "explanation": "의료기관의 운영 기준(시행규칙 제35조의2)1) 입원실의 정원을 초과하여 환자를 입원시키지 말 것2) 입원실은 남·여별로 구별하여 운영할 것3) 입원실이 아닌 장소에 환자를 입원시키지 말 것4) 요양병원의 운영(시행규칙 제36조) 제2항5) 요양병원의 운영(시행규칙 제36조) 제3항"}, {"major": "의료법(의료기관)", "minor": "의료기관의 운영", "qnum": "03", "question": "의사 '갑'이 개설·운영하는 의원에서 방사선 관계 종사자에 대한 피폭관리를 실시하지 않은 사실이 적발되었다. 이때 「의료법」에 따라 의사 '갑'이 받을 조치는?", "textbox": "", "images": [], "options": ["과징금", "과태료", "면허취소", "면허자격정지", "의료기관 개설허가 취소"], "answer": 1, "explanation": "진단용 방사선 발생장치(제37조) 제2항에 따라 의료기관 개설자나 관리자는 진단용 방사선 발생장치를 설치한 경우 방사선 관계 종사자에 대한 피폭관리를 하여야 한다. 과태료(제92조) 제1항 다음 각 호의 어느 하나에 해당하는 자에게는 300만원 이하의 과태료를 부과한다. 3. 제37조 제2항에 따른 안전관리책임자를 선임하지 아니하거나 정기검사와 측정 또는 방사선 관계 종사자에 대한 피폭관리를 실시하지 아니한 자"}, {"major": "의료법(의료기관)", "minor": "의료기관의 운영", "qnum": "04", "question": "'A' 병원에서 근무하는 의사 '갑'은 정보통신기술을 활용하여 먼 곳에 소재한 'B' 병원 소속 의사 '을'에게 원격으로 의료 기술을 지원하였다. 원격의료에 따른 의료행위는 의사 '을'이 수행하였다. 해당 진료 중 의료사고가 발생하였다. 'B'병원 원장 '병'이다. 「의료법」상 의사 '갑'의 과실을 인정할 만한 명백한 근거가 없을 때 해당 진료에 대한 책임은 누구에게 있는 것으로 보는가?", "textbox": "", "images": [], "options": ["의사 '갑'", "의사 '을'", "의사 '갑'과 의사 '을'", "'B' 병원 원장 '병'", "의사 '갑', 의사 '을' 및 'B' 병원 원장 '병'"], "answer": 1, "explanation": "비대면진료(제34조) 1) 의료인(의료업에 종사하는 의사·치과의사·한의사만 해당한다)은 제33조(개설)제1항에도 불구하고 컴퓨터·화상통신 등 정보통신기술을 활용하여 먼 곳에 있는 의료인에게 의료지식이나 기술을 지원하는 비대면 협진(이하 “비대면협진”이라 한다)을 할 수 있다. 2) 비대면협진을 행하거나 받으려는 자는 보건복지부령으로 정하는 시설과 장비를 갖추어야 한다. 3) 비대면협진을 하는 자(이하 “원격지의사”라 한다)는 환자를 직접 대면하여 진료하는 경우와 같은 책임을 진다. 4) 원격지의사의 비대면협진에 따라 의료행위를 한 의료인이 의사·치과의사 또는 한의사(이하 “현지의사”라 한다)인 경우에 는 그 의료행위에 대하여 원격지의사의 과실을 인정할 만한 명백한 근거가 없으면 환자에 대한 책임은 3)에도 불구하고 현지의사에게 있는 것으로 본다. 해당 문제에서는 의사 '갑'의 과실을 인정할 만한 명백한 근거가 없으므로 해당 진료에 대한 책임은 현지 의사인 '을'에게 있습니다."}, {"major": "의료법(의료기관)", "minor": "의료기관의 운영", "qnum": "05", "question": "연평균 1일 입원환자가 32명, 외래 환자가 240명인 50병상의 병원에서 개설자가 지켜야 할 의사의 최소 정원은 몇 명인가?", "textbox": "", "images": [], "options": ["3명", "4명", "5명", "6명", "7명"], "answer": 3, "explanation": "연평균 1일 입원환자 20명당 1명, 외래 환자 3명은 입원환자 1명으로 환산합니다. 총 입원환자 112명이 되며, 소수점은 올림하므로 5.6명 → 6명이 최소 정원입니다."}, {"major": "의료법(의료기관)", "minor": "의료기관의 운영", "qnum": "06", "question": "안과 전문의 'A'는 자신이 소속된 의료기관이 아닌, 같은 구에 소재하는 'B' 안과의원의 시설과 장비 등을 이용하여 진료하고자 한다. 「의료법」에 따르면 'A'는 누구에게 동의를 받아야 하는가?", "textbox": "", "images": [], "options": ["관할 구청장", "관할 보건소장", "'B' 안과의원 원장", "건강보험심사평가원장", "국민건강보험공단 이사장"], "answer": 2, "explanation": "의료인은 다른 의료기관의 장의 동의를 받아 그 의료기관의 시설·장비 및 인력 등을 이용하여 진료할 수 있다. 의료 시설의 공동이용 시에는 의료기관 장의 동의를 얻어야 한다."}, {"major": "의료법(의료기관)", "minor": "의료기관의 운영", "qnum": "07", "question": "80병상 이상의 입원 시설을 갖춘 병원에서 반드시 필요한 의료인 이외의 직종은?", "textbox": "", "images": [], "options": ["응급구조사", "간병인", "의무기록사", "영양사", "사회복지사"], "answer": 3, "explanation": "1. 병원급 의료기관에는 약사 또는 한약사를 두어야 한다. 2. 입원시설을 갖춘 종합병원·병원·치과병원·한방병원 또는 요양병원에는 1명 이상의 영양사를 둔다. 3. 의료기관에는 보건복지부장관이 정하는 바에 따라 각 진료과목별로 필요한 수의 의료기사를 둔다. 4. 종합병원에는 보건복지부장관이 정하는 바에 따라 필요한 수의 의무기록사를 둔다. 5. 의료기관에는 보건복지부장관이 정하는 바에 따라 필요한 수의 간호조무사를 둔다. 6. 종합병원에는 「사회복지사업법」에 따른 사회복지사 자격을 가진 자 중에서 환자의 갱생·재활과 사회복귀를 위한 상담 및 지도 업무를 담당하는 요원을 1명 이상 둔다. 따라서 이 문제에서 법에 규정된 '반드시 필요한 직종'은 4번 영양사입니다."}, {"major": "의료법(의료기관)", "minor": "의료기관의 운영", "qnum": "08", "question": "상급종합병원의 비뇨의학과 의사 'A'는 후배 의사 'B'가 근무하는 비뇨의학과 전문병원 병원장의 동의를 받고 'B'와 함께 전문병원에서 전립선암 수술을 하였다. 이때 사용한 전문병원의 로봇 수술 장비 결함으로 의료사고가 발생하였다. 「의료법」에 따라 책임이 있는 것으로 보는 자는?", "textbox": "", "images": [], "options": ["의사 'A'", "의사 'B'", "전문병원 개설자", "의사 'A'와 'B'의 공동책임", "의사 'A'와 전문병원 개설자의 공동책임"], "answer": 2, "explanation": "의료인이 다른 의료기관의 시설·장비 및 인력 등을 이용하여 진료하는 과정에서 발생한 의료사고에 대하여는 진료를 한 의료인의 과실 때문이면 그 의료인에게, 의료기관의 시설·장비 및 인력 등의 결함 때문이면 그것을 제공한 의료기관 개설자에게 각각 책임이 있는 것으로 본다."}, {"major": "의료법(의료기관)", "minor": "의료기관의 운영", "qnum": "09", "question": "군 지역에 위치한 'A' 의원에서는 건강검진을 제공하기 위하여 진단용 방사선 발생장치를 설치하려고 한다. 「의료법」에 따르면 'A'는 이를 누구에게 신고하여야 하는가?", "textbox": "", "images": [], "options": ["관할 군수", "관할 도지사", "관할 보건소장", "건강보험심사평가원장", "국민건강보험공단 이사장"], "answer": 0, "explanation": "진단용 방사선 발생장치(제37조)① 진단용 방사선 발생장치를 설치·운영하려는 의료기관은 보건복지부령으로 정하는 바에 따라 시장·군수·구청장에게 신고하여야 하며, 보건복지부령으로 정하는 안전관리기준에 맞도록 설치·운영하여야 한다. 군 지역에 위치한 의료기관에서 진단용 방사선 발생장치를 설치할 때는 군수에게 신고하여야 한다."}, {"major": "의료법(의료기관)", "minor": "의료기관의 운영", "qnum": "10", "question": "'시' 지역에서 병원을 개설 운영하고 있는 의사 '갑'은 최신형 컴퓨터단층촬영장치를 원내에 추가로 설치하였다. 이를 누구에게 신고하여야 하는가?", "textbox": "", "images": [], "options": ["시장", "방사선영상품질관리위원회", "방사선안전관리센터의 장", "국민건강보험공단 이사장", "대한병원협회 회장"], "answer": 0, "explanation": "진단용 방사선 발생장치의 설치는 시장·군수·구청장에게 신고해야 합니다."}, {"major": "의료법(의료기관)", "minor": "의료기관의 운영", "qnum": "11", "question": "'○○시' 지역에 소재한 '○○영상의학과의원'이 디지털방사선촬영장치(digital radiography system)를 설치운영하려고 할 때 누구에게 신고해야 하는가?", "textbox": "", "images": [], "options": ["시장", "보건복지부장관", "보건소장", "국민건강보험관리공단", "도지사"], "answer": 0, "explanation": "진단용 방사선 발생장치(제37조) 제1항 진단용 방사선 발생장치를 설치·운영하려는 의료기관은 보건복지부령으로 정하는 바에 따라 시장·군수·구청장에게 신고하여야 하며, 보건복지부령으로 정하는 안전관리기준에 맞도록 설치·운영하여야 한다."}, {"major": "의료법(의료기관)", "minor": "의료기관의 운영", "qnum": "12", "question": "방사선 진료기를 새로 설치하고자 한다. 이 때 해야 할 일은?", "textbox": "", "images": [], "options": ["시장·군수·구청장에게 신고", "시장·군수·구청장에게 허가", "시장·도지사에게 신고", "시장·도지사에게 허가", "방사선 안전관리 책임자에게 신고"], "answer": 0, "explanation": "진단용 방사선 발생장치(제37조) 제1항 진단용 방사선 발생장치를 설치·운영하려는 의료기관은 보건복지부령으로 정하는 바에 따라 시장·군수·구청장에게 신고하여야 하며, 보건복지부령으로 정하는 안전관리기준에 맞도록 설치·운영하여야 한다."}, {"major": "의료법(의료기관)", "minor": "의료기관의 운영", "qnum": "13", "question": "의료법 상 원격의료에 관해 옳게 설명한 것은 무엇인가?", "textbox": "", "images": [], "options": ["장비에 대한 규정이 없어서 화상 통신만 가능하다면 원격 진료가 가능하다.", "원격지 의사는 먼 곳에 있는 의료인에게 화상통신으로 의료지식을 지원할 수 있다.", "유병률이 높은 질병은 원격 의료의 대상이 아니다.", "조산사나 간호사도 원격지 의료인의 자격이 있다.", "원격지 의사는 환자에 대해서 처방전 교부가 가능하다."], "answer": 1, "explanation": "비대면협진(제34조)\n① 의료인(의료업에 종사하는 의사·치과의사·한의사만 해당한다)은 제33조제1항에도 불구하고 컴퓨터·화상통신 등 정보통신기술을 활용하여 먼 곳에 있는 의료인에게 의료지식이나 기술을 지원하는 비대면협진(이하 “비대면협진”이라 한다)을 할 수 있다.\n② 비대면협진을 행하거나 받으려는 자는 보건복지부령으로 정하는 시설과 장비를 갖추어야 한다.\n③ 비대면협진을 하는 자는 환자를 직접 대면하여 진료하는 경우와 같은 책임을 진다.\n④ 원격지 의사의 원격의료에 따른 의료행위를 한 의료인이 의사·치과의사 또는 한의사인 경우에는 그 의료행위에 대하여 원격지 의사의 과실을 인정할 만한 명백한 근거가 없으면 환자에 대한 책임은 (3)에도 불구하고 현지의사에게 있는 것으로 본다.\n* 비대면협진: 의사, 치과의사, 한의사에 한함"}, {"major": "의료법(의료기관)", "minor": "의료기관의 운영", "qnum": "14", "question": "종합병원의 재활의학과 전문의 A가 신체거동이 불편한 82세 여자 환자와 외래 진료실에서 나누는 대화이다. 현재 감염병은 유행하지 않는다.\n「의료법」에 따라 밑줄 부분에 들어갈 A의 답변으로 옳은 것은?\n환 자 : 선생님, 제가 사는 곳이 산간 오지에 있어서 병원까지 오는 데만 3시간 이상 걸리는데다, 혼자 사는 처지라 누구 도와줄 사람도 없고… 병원까지 오기가 너무 힘이 듭니다.\n의사 A : 그래도 꾸준히 진료를 받으셔야 합니다.\n환 자 : 요즘 세상이 좋아져서 비대면으로 온갖 것들이 다 된다는데, 직접 안 만나고 집에서 선생님 진료를 받고 싶습니다.\n의사 A :", "textbox": "", "images": [], "options": ["“그러면 화상통화로 집에서 진료를 받으시면 되겠습니까?”", "“집에 원격진료실을 갖추면 제가 원격으로 진료할 수 있습니다.”", "“환자분 본인 여부만 확인되면 제가 전화를 통해 진료할 수 있습니다.”", "“제가 원격으로 집에 계신 환자분을 직접 진찰하고 진료하는 것은 불법입니다.”", "“집에 방문간호사가 오면 간호사를 통해 제가 원격으로 진료할 수 있습니다.”"], "answer": 3, "explanation": "비대면협진(제34조) 제1항\n의료인(의료업에 종사하는 의사·치과의사·한의사만 해당한다)은 제33조제1항에도 불구하고 컴퓨터·화상통신 등 정보통신기술을 활용하여 먼 곳에 있는 의료인에게 의료지식이나 기술을 지원하는 비대면협진(이하 “비대면협진”이라 한다)을 할 수 있다.\n1), 2), 3) 비대면협진은 의료인과 의료인 사이에서만 이루어져야 합니다.\n5) 간호사는 의료인에 해당하나 간호사가 의사의 지도를 받아 환자를 진료하는 것은 ‘의료지식이나 기술을 지원하는’ 범위를 넘는 행위입니다."}, {"major": "의료법(의료기관)", "minor": "의료기관 인증", "qnum": "01", "question": "‘A’ 병원에서는 현수막을 이용하여 지방자치단체에서 받은 인증·보증을 표시한 의료광고를 하려고 한다. 「의료법」에 따라 ‘A’ 병원이 광고심의를 받아야 하는 기관은?", "textbox": "", "images": [], "options": ["의사회", "시·군·구청", "국민건강보험공단", "건강보험심사평가원", "의료심사조정위원회"], "answer": 0, "explanation": "의료광고의 심의(제57조) 제2항\n다음 각 호의 기관 또는 단체는 대통령령으로 정하는 바에 따라 자율심의를 위한 조직 등을 갖추어 보건복지부장관에게 신고한 후 의료광고 심의 업무를 수행할 수 있다.\n1호-제28조제1항에 따른 의사회·치과의사회·한의사회\n이에 따라 의료광고를 하려면 의사회에 광고 심의를 받아야 한다."}, {"major": "의료법(의료기관)", "minor": "의료기관 인증", "qnum": "02", "question": "정형외과 전문의인 홍길동은 의원을 개설하고 보건소에 해당 의원의 명칭을 신고하고자 한다. 「의료법」에 따른 의원의 명칭으로 옳은 것은?", "textbox": "", "images": [], "options": ["홍척추클리닉", "홍길동관절센터", "HGD정형외과의원", "홍길동정형외과의원", "홍정형외과전문의원"], "answer": 3, "explanation": "의료기관의 명칭(제42조)\n1항-의료기관은 제3조제2항에 따른 의료기관의 종류에 따르는 명칭 외의 명칭을 사용하지 못한다.\n의료기관의 명칭 표시(시행규칙 제40조)\n6호(6)-병원·한방병원·치과병원·의원·한의원 또는 치과의원의 개설자가 전문의인 경우에는 해당 개설자의 전문의 자격 및 전문과목\n7호-6호(1)에 따른 의료기관의 명칭은 한글로 표시하되, 외국어를 함께 표시할 수 있다."}, {"major": "의료법(의료기관)", "minor": "의료기관 인증", "qnum": "03", "question": "의사 ‘A’는 비만 치료를 전문으로 하는 ‘B’ 병원을 운영하고 있다. ‘B’ 병원에 대한 의료광고를 하고자 할 때, 「의료법」에 따라 가능한 광고 문구는?", "textbox": "", "images": [], "options": ["‘B’ 병원은 보건복지부로부터 의료기관 인증을 획득하였습니다.", "‘C’ 병원의 비만 치료법보다 체중 감량 효과가 더 뛰어납니다.", "‘D’ 신문으로부터 비만 치료 우수 의료기관으로 추천되었습니다.", "4주 이내에 몸무게를 10kg 이상 감량하지 못하면 치료비를 돌려드리겠습니다.", "2개월 전 비만 치료를 시작한 ‘E’는 치료 시작 4주 만에 15kg을 감량하였습니다."], "answer": 0, "explanation": "의료법 제56조제2항의 각 호에 따라 아래의 사항은 광고 시 금지되어 있습니다.\n② 4호에 따라 다른 의료인 등과 비교하는 내용은 포함할 수 없습니다.\n③ 14호에 따라 인증, 보증, 추천을 받았다는 내용을 사용할 수 없습니다.\n④ 13호에 따라 소비자를 속이거나 소비자로 하여금 잘못 알게 할 우려가 있는 방법으로 제45조에 따른 비급여 진료비용을 할인하거나 면제하는 내용의 광고는 금지되어 있습니다.\n⑤ 2호에 따라 환자
